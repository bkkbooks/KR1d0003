body:
  text: 周禮注疏卷二十七漢鄭氏注唐陸德明音義賈公彥疏御史掌邦國都鄙及萬民之治令以贊冢宰注王所以治之令冢宰掌王治音義治直吏反注及下凡治同疏釋曰天官冢宰六典治邦國八則治都鄙及畿內萬民之治今此御史亦掌之以贊佐故同其事凡治者受法令焉注為書寫其治之法令來受則授之疏釋曰言凡語廣謂外內官所有治職者皆御史書王之法令授與受者故言凡以該之也掌贊書注王有命當以書致之則贊為辭若今尚書作詔文疏注釋曰謂若今出詔敕之書是王有命頒下於外其詔敕書則御史贊王為此書故云掌贊也凡數從政者注自公卿以下至胥徒凡數及其見在空缺者鄭司農讀言掌贊書數書數者經禮三百曲禮三千法度皆在𤣥以為不辭故改之云音義數所主反見賢遍反疏釋曰自公卿已下至胥徒在王朝者皆是凡數又是從政之人故云凡數從政者也先鄭所云以掌贊書數為句讀之𤣥以為不辭故改之云者掌贊書數書數既為三百三千有何可贊也且書數既為三百三千下别言從政者有何義意乎故後鄭以為不辭而改之也巾車掌公車之政令辨其用與其旗物而等叙之以治其出入注公猶官也用謂祀賔之屬旗物太常以下等叙之以封同姓異姓之次序疏釋曰云公車之政令者以下辨其用及等叙出入皆是政令故先言其總也出入謂若下文凡車之出入則㑹之冬官造車訖來入巾車又當出封同姓之等亦是也注釋曰云公猶官也者謂若言公似據三公及諸侯若言官則王家皆是故從官也云用謂祀賔之屬者其中仍有朝及田戎之等故言之屬以總之云太常以下仍有大旗大赤大白大麾之等故云以下云等序之以封同姓異姓之次叙者周人先同姓次異姓後云四衛蕃國以下故云次序也王之五路一曰玉路鍚樊纓十有再就建大常十有二斿以祀注王在焉曰路玉路以玉飾諸末鍚馬面當盧刻金為之所謂鏤鍚也樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸士喪禮下篇曰馬纓三就禮家說曰纓當胸以削革為之三就三重三匝也𤣥謂纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也大常九旗之畫日月者正幅為縿斿則屬焉音義鍚音陽樊步干反下同斿音留鞶步干反重直龍反罽居例反縿所銜反又所亷反屬音燭疏釋曰云王之五路此言與下為總目一曰已下析别言之云以祀者以下諸路皆非祭祀之事則是各外內大小祭祀皆用此一路而已注釋曰言王在馬曰路者謂若路門路寢路車路馬皆稱路故廣言之云王在焉曰路路大也王之所在故以大為名諸侯亦然左氏義以為行於道路故以路名之若然門寢之等豈亦行於路乎云玉路以玉飾諸末者凡言玉路金路象路者皆是以玉金象為飾不可以玉金象為路故知玉金等飾之言諸末者凡車上之材於末頭皆飾之故云諸末也云鍚馬面當盧刻金為之者眉上曰鍚故知當額盧按韓奕詩鉤膺鏤鍚金稱鏤故知刻金為之故鄭引詩云所謂鏤鍚也彼詩毛傳亦云金鏤其鍚鄭箋云眉上曰鍚刻金飾之云樊讀如鞶帶之鞶者按易訟卦上九云或錫之鞶帶注云鞶帶佩鞶之帶但易之鞶謂鞶囊即內則云男鞶革是也此鞶謂馬大帶音字同故讀從之是以鄭即云馬大帶也先鄭云纓謂當胸引士喪禮下篇馬纓以削革為之賈馬亦云鞶纓馬飾在膺前十有二匝以毛牛尾金塗十二重後鄭皆不從之者以鞶為馬大帶明纓是夾馬頸故以今馬鞅解之也後鄭云玉路之樊及纓皆以五采罽飾之者按爾雅釋言云氂罽也郭氏云毛氂所以為罽知是罽染毛為之鄭必知罽飾之者蓋以今時所見擬之必知用五采者按典瑞云鎮圭繅五采五就則知王者就飾用五采惟有外傳小采以朝月者用三采耳繅藉五采即云五就則一采一匝為一就此樊纓十二就之屬就數雖多亦一采一匝為一就如玉菜十二就然云大常九旗之畫日月者按司常云日月為常是也云正幅為縿者爾雅文知斿則屬焉者爾雅云纁帛縿練旒九縿旒用物不同旒又有數明知别屬可知也金路鉤樊纓九就建大旗以賔同姓以封注金路以金飾諸末鉤婁頷之鉤也金路無鍚有鉤亦以金為之其樊及纓以五采罽飾之而九成大旗九旗之畫交龍者以賔以㑹賔客同姓以封謂王子母弟率以功德出封雖為侯伯其畫服猶如上公若魯衛之屬其無功德各以親疏食采畿內而已故書鉤為拘杜子春讀為鉤音義旗其依反賔如字劉沈方刃反頷户感反率音律又音類疏釋曰上玉路云一曰此以下皆不云二曰三曰之等者若據王而言玉路言一曰則金路已下二曰三曰之等可知若據諸侯言之從此金路以下所受得各自為上故此已下略不言二曰三曰之等也云同姓以封者周人先同姓故得金路賜異姓已下則用象路之等同姓雖尊仍不得玉路玉路以祭祀故不可分賜注釋曰云金路以金飾諸末者亦如玉路所飾也云鉤婁頷之鉤也者詩云鉤膺鏤鍚鉤連言膺明鉤在膺前以今驗古明鉤是馬婁頷也云金路無鍚有鉤者以玉路金路二者相參知之何者玉路云鍚金路云鉤明知金路有鉤無鍚上得兼下言之則玉路直言鍚兼有鉤可知云亦以金為之者鍚用金明鉤亦用金為飾也云九成者亦如上一采罽為一成凡九就九成也云大旗九旗之畫交龍者司常職文云以賔以㑹賔客者按齊右㑹同賔客前齊車故知以賔是以㑹賔客至於載主亦同焉故曽子問云天子巡守以遷廟主行載於齊車注云齊車金路若王弔亦乘金路是以士喪禮注云君弔蓋乘象路謂得金路之賜者弔時降一等乘象路明知王有玉路弔時降一等乘金路可知云同姓以封謂王子母弟率以功德出封雖為侯伯其畫服猶如上公若魯衛之屬者周之法二王之後稱公王之同姓例稱侯伯而已若魯衛稱侯鄭稱伯故兼云雖為侯伯也知畫服如上公者典命云上公九命車旗衣服以九為節是上公九命服衮冕又云侯伯七命車旗衣服以七為節則服鷩冕為異姓侯伯若魯衛鄭雖為侯伯則服衮受五百里之封是以明堂位魯侯服衮冕是雖為侯伯服如上公也言此者欲見二王後上公雖是異姓得以乘金路今同姓王子母弟以衣服與上公同明乘金路亦同矣云其無功德各以親疏食采畿內而已者天工不可私非其才其無功德不可輒授之以職禮運云天子有田以處其子孫故封之於畿內而已是以司裘云諸侯則共熊侯豹侯是王子母弟封於畿內者也言親疏食采者按載師職家邑任稍地小都任縣地大都任疆地其中非直有公卿大夫食采若親王母弟則與公同食大都百里稍疏者與卿同食小都五十里更疏者與大夫同食家邑二十五里耳故云各以親疏食采畿內而已象路朱樊纓七就建大赤以朝異姓以封注象路以象飾諸末象路無鉤以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝異姓王甥舅音義朝直遙反注皆同疏注釋曰象路以象飾詣末者此所飾亦如玉金矣但用象為異也云象路無鉤以朱飾勒而已者經不云鉤明無鉤經直云朱鄭知以朱飾勒者見下文革路云龍勒明知此朱同為飾勒也云大赤九旗之通帛者司常職文以日視朝者謂於路門外常朝之處乘之此雖據常朝而言至於三朝皆乘之按司常云道車建旞鄭注云道車象路也王以朝夕燕出入乘此象路則建旞若在朝廷大赤也其車則同也云異姓王甥舅者謂先王及今王有舅甥之親若陳國杞國則别於庶姓故乘象路之車也革路龍勒條纓五就建大白以即戎以封四衛注革路鞔之以革而漆之無他飾龍駹也以白黑飾韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五成不言樊字蓋脫爾以此言絛知玉路金路象路飾樊纓皆不用金玉象矣大白殷之旗猶周大赤蓋象正色也即戎謂兵事四衛四方諸侯守衛者蠻服以內音義龍如字戚音厖條依注作絛他刀反鞔莫干反疏注釋曰云革路鞔之以革而漆之無他飾者自玉路金路象路四者皆以革鞔則冬官云飾車欲侈者也但象路以上更有玉金象為飾謂之他物則得玉金象之名此革路亦用革鞔以無他物飾則名為革路也鄭知駹是白黑飾韋雜色為勒者以繢人云白與黑為之黼黑白相形之物且下有駹車邊側有黑漆為駹此革路既素又有大白之旗故以白黑駹為雜也云以此言絛知玉路金路象路飾樊纓皆不用金玉象矣者上玉路鞶纓十有二就馬氏以為旄牛尾金塗十二重有此嫌故微破之也云大白殷之旗猶周大赤蓋象正色也者明堂位云殷之大白周之大赤相對而言故云猶周大赤周以十一月為正物萌色赤殷以十二月為正物牙色白是象正色兼正文故云蓋云即戎謂兵事也者司服兵事韋辨服車服相配俱是即戎故云謂兵事也趙商問中車職云建大白以即戎注曰謂兵事司馬職仲秋辨旗物以治兵王載大常下注云凡班旗物以出軍之旗則如秋不知巾車大白以即戎為在何時答曰殷之正色者或㑹事或勞師不親將故建先王之正色異於親自將又按司馬法云章夏以日月上明殷以虎上威周以龍上文不用大常者周雖以日月為常以龍為章故郊特牲云龍章而設日月又按周本紀武王遂入至紂之死所王射之三發而后下車以輕劒斬紂頭懸於大白之旗不用大常者時未有周禮故武王雖親將猶用大白也云四衛四方諸侯守衛者蠻服以內者此四衛非謂在衛服者以其諸侯非同姓與王無親即是庶姓在四方六服已內衛守王大司馬以要服為蠻服故云蠻服以內也木路前樊鵠纓建大麾以田以封蕃國注木路不鞔以革漆之而已前讀為緇翦之翦翦淺黑也木路無龍勒以淺黑飾韋為樊鵠色飾韋為纓不言就數飾與革路同大麾不在九旗中以正色言之則黑夏后氏所建田四時田獵蕃國謂九州之外夷服鎮服蕃服杜子春云鵠或為結音義前依注作翦子踐反淺也鵠戶篤反疏注釋曰鄭知木路不鞔以革者以其言木則木上無革可知必知有漆者以其喪車尚有漆者況吉之乘車有漆可知云前讀為緇翦之翦者讀從既夕文也彼為加茵用疏布緇翦有幅亦縮二橫三鄭云翦淺也此前亦取淺義故讀從之知木路無龍勒者以經不云勒明降於革路無龍勒可知云大麾不在九旗中者上大白亦不在九旗之中而不言者九旗之中雖無大白仍有雜帛為物兼有殷正色故此特言之云以正色言之則黑夏后氏所建者此亦以正色言之上文火赤據周大白據殷則此大麾當夏之正色黑故言夏后氏所建也按明堂位有虞氏之旗夏后氏之綏鄭注云有虞氏當言綏夏氏當言旗若然則夏后氏有旗無綏今此大麾則綏而為夏后氏所建者彼以前代質後代文差之則綏當有虞氏旗當夏后氏但旌旗皆上有綏夏之旗去旒旐而用之即是綏故以正色推之當夏也云田四時田獵者趙商問中車職曰建大麾以田注云田四時田臘商按大司馬職曰四時皆建大常今又云建大麾以田何答曰麾夏之正色雖習戰春夏尚生其時宜入兵夏本不以兵得天下故建其正色以春田秋冬出兵之時乃建大常故雜問志云四時治兵王自出禮記天子殺則下大綏司馬職王建大常足相參正云蕃國謂九州之外夷服鎮服蕃服者按司馬職要服已內為九州其外更有三服夷鎮蕃總而言之皆號蕃國是以此文及大行人謂之蕃國也杜子春云鵠或為結者按馬氏云前樊結纓謂再重樊纓在前有結在後往往結革以為堅且飾韋以為樊纓皆有采就則前與鵠亦可以為飾而賈氏為前纓有結其義非今子春為結後鄭引之在下得通一義故也凡五等諸侯所得路者在國祭祀及朝天子皆乘之但朝天子之時乘至天子館則舍之於館是以覲禮記云偏駕不入王門謂舍之於客館乘墨車龍旗以朝鄭云在旁與已同曰偏若兩諸侯自相朝亦應乘之若齊弔及朝并朝夕燕出入可降一等若在軍皆乘廣車若以田以鄙則乘木路也若五等諸侯親迎皆乘所賜路以其士親迎攝盛乘大夫車則大夫以上尊則尊矣不可更攝盛轉乘在上之車當乘所賜車與祭祀同則王乘玉路可也若然同姓金路無鍚韓侯受賜得有鏤鍚者正禮雖不得後有功特賜有之也若如鄭注同姓雖為侯伯畫服如上公得乘金路若為子男似不得當與異姓同乘象路也異姓象路則降上公以其上公雖庶姓亦乘金路其異姓侯伯子男皆乘象路也言四衛革路者亦謂庶姓侯伯子男蕃國木路者夷狄惟有子男同木路也無問祀賔已下皆乘之王后之五路重翟鍚面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋注重翟重翟雉之羽也厭翟次其羽使相迫也勒面謂以如王龍勒之韋為當面飾也雕者畫之不龍其韋安車坐乘車凡婦人車皆坐乘故書朱總為䌆鷖或作繄鄭司農云鍚馬面鍚䌆當為總書亦或為總鷖讀為鳬鷖之鷖鷖總者青黑色以繒為之總著馬勒直兩耳與兩鑣容謂幨車山東謂之裳幃或曰幢容𤣥謂朱總繢總其施之如鷖總車衡輨亦宜有焉繢畫文也蓋如今小車蓋也皆有容有蓋則重翟厭翟謂蔽也重翟后從王祭祀所乘厭翟后從王賓饗諸侯所乘安車無蔽后朝見於王所乘謂去飾也詩國風碩人曰翟蔽以朝謂諸侯夫人始來乘翟蔽之車以朝見於君盛之也此翟蔽蓋厭翟也然則王后始來乘重翟乎音義重直龍反注同總作動反厭於涉反注同繢戶對反鷖烏兮反劉烏計反乘繩證反下坐乘皆同或如字䌆戚云檢字林蒼雅及說文皆無此字衆家亦不見有音者唯昌宗音廢以形聲㑹意求之實所未了當是廢而不用乎非其音也李兵廢反本或作緦恐是意改也繄烏兮反著直略反鑣表驕反幨昌亷反幢本亦作潼詩注作童皆音同輨劉音管一音胡瞎反蔽劉音弗下及文并同一音必世反見賢遍反下同去起呂反下去戈去毛同疏釋曰言王后之五路亦是總口之言也凡言翟者皆謂翟鳥之羽以為兩旁之蔽言重翟者皆二重為之厭翟者謂相次以厭其本下有翟車者又不厭其本也凡言總者謂以總為車馬之飾若婦人之總亦既繫其本又垂為飾故皆謂之總也按下翟車尊於安車而進安車在上者以其翟車有幄無蓋安車重翟同無幄而有容蓋故進安車與重厭之車同在上也注釋曰云勒面謂以如王龍勒之韋為當面飾也者按上龍勒不言面此勒言面則所施之處不同則上言勒者馬之轡飾皆是不在面此言勒面則在面矣用物則同故鄭引龍勒以釋此也云安車坐乘車凡婦人車皆坐乘者按曲禮上文婦人不立乘是婦人坐乘男子立乘曲禮上大夫七十而致事若不得謝則必賜之几杖乘安車則男子坐乘亦謂之安車也若然則王后五路皆是坐乘獨此得安車之名者以餘者有重翟厭翟翟車輦車之名可稱此無異物之稱故獨得安車之名也云鷖讀為鳬鷖之鷖者從毛詩鳬鷖之篇名鷖者取鳥之鷖色青黑為義知以繒為之總著馬勒直兩耳與兩鑣者先鄭蓋見當時以況古也云容謂幨車山東謂之裳幃或曰幢容者按昏禮云婦車亦如之有裧注云裧車裳幃周禮謂之容又衛詩漸車幃裳毛氏亦云潼容是容潼容與幨及裳幃為一物也𤣥謂朱總繢總其施之如鷖總車衡輨亦宜有焉者後鄭取先鄭總著馬勒直兩耳與兩鑣為本其於車之衡輨亦宜有焉以其皆是革飾之事故兼施於車也云蓋如今小車蓋也者此舉漢法小車有蓋以況周凡蓋所以表尊亦所以禦雨故三者皆有之也云皆有容有蓋則重翟厭翟謂蔽也者按馬氏等云重翟為蓋今之羽蓋是也為有此嫌故微破之若重翟厭翟是蓋何須下文云皆有容蓋乎是以後鄭約下王之喪車五乘皆有蔽明后之車言翟者亦謂蔽也云重翟后從王祭祀所乘者此約王之五路則重翟當玉路后無外事惟祭先王先公羣小祀皆乘此重翟也云厭翟后從王賔饗諸侯所乘者按內宰職云賔客之祼獻瑤爵皆贊注云謂王同姓及二王之後王祼賔客亞王而禮賔獻謂王饗燕亞王獻賔也此時后則乘厭翟故云從王賔饗諸侯也不言祼者文略耳云安車無蔽后朝見於王所乘謂去飾也者以其安車不言翟明無蔽以其朝王質故去飾也引詩國風碩人曰翟蔽以朝謂諸侯夫人始來乘翟蔽之車以朝見於君盛之也此翟蔽蓋厭翟也者彼是諸侯之夫人當乘厭翟則上公夫人亦厭翟以其王姬下嫁於諸侯車服不繫於其夫下王后一等不得乘重翟則上公與侯伯夫人皆乘厭翟可知若子男夫人可以乘翟車至於祭祀及嫁皆乘之云然則王后始來乘重翟乎者王姬下嫁下后一等及諸侯夫人皆乘厭翟則王后自然始來乘重翟可知若然王之三夫人與三公夫人同乘翟車九嬪與孤妻同乘夏篆二十七世婦與卿妻同乘夏縵女御與大夫妻同乘墨車士之妻攝盛亦乘墨車非嫁攝盛則乘棧車也諸侯已下夫人祭祀賔饗出桑朝君差之皆可知也若然諸侯夫人亦當有安車以朝君也翟車貝面組總有握注翟車不重不厭以翟飾車之側爾貝面貝飾勒之當面也有握則此無蓋矣如今軿車是也后所乘以出桑音義握劉音屋下馬皆作幄烏學反沈云劉音非軿薄經反疏釋曰上言朱總繢總鷖總彼皆以繒為之今此言組總則以組絛為之總亦施於勒及兩耳兩鑣并車衡輨焉注釋曰翟車不重不厭明以翟飾車之側可知云貝而貝飾勒之當面也者貝水物謂餘泉條蚳之貝文以飾勒之當面者也云有握則此無蓋矣者但蓋所以禦雨無幄乃施之今既有幄故知無蓋矣云如今軿車是也者漢法軿車無蓋故舉以況之云后所乘以出桑者按月令三月薦鞠衣於先帝又后妃親桑於東郊二者后皆乘此翟車以其告先帝非祀親桑又非大事故知乘翟車也連車組挽有翣羽蓋注連車不言飾后居宮中從容所乘但漆之而已為輇輪人挽之以行有翣所以禦風塵以羽作小蓋為翳日也故書翣為䭷杜子春云當為翣書亦或為音義連音輦本亦作輦組音祖挽音晚翣所甲反從七容反輇市專反翳烏帝反䭷竝音獵䭷或音毛疏注釋曰輦車不言飾者以其不言翟又不言面總之等是不言飾也此無所供事直是后居宮中從容所乘車也知漆之者凡吉之車器之等皆漆之明此亦有漆也知為輇輪者按禮記云載以輲車輲車載柩之車則地官蜃車人挽之以行此輦車組挽亦是人挽行者按雜記注引許氏說文解字曰有輻曰輪無輻曰輇則人挽行者皆是無輻曰輇按上雜記注輇崇蓋半乘車之輪乘車髙六尺六寸則此當三尺三寸云有翣所以禦風塵者翣即扇也扇所以為障蔽亦所以禦風塵也云以羽作小蓋為翳日也者翣既禦風塵明羽蓋所以翳日可知也王之喪車五乘木車蒲蔽犬􅍜尾櫜疏飾小服皆疏注木車不漆者鄭司農云蒲蔽謂裸蘭車以蒲為蔽天子喪服之車漢儀亦然犬􅍜以犬皮為覆笭故書疏為揟杜子春讀揟為沙𤣥謂蔽車旁禦風塵者犬白犬皮既以皮為覆笭又以其尾為戈㦸之韜粗布飾二物之側為之緣若攝服云服讀為箙小箙刀劒短兵之衣此始遭喪所乘為君之道尚微備姦臣也書曰以虎賁百人逆子釗亦為備焉音義五乘繩證反下五乘同􅍜莫歷反櫜沈音羔劉姑道反裸魯火反劉又音果笭力丁反劉又音泠揟本又作偦同思如反韜吐刀反緣悅絹反下同箙音服賁音奔釗古堯反又音昭疏注釋曰云木車不漆者喪中無飾後至禫乃漆之此明木車及下素車等皆未漆也若然上王之木路鄭注云不革鞔漆之而已彼亦稱木而有漆者彼此各有所對上文木路對革路有革又有漆則木路漆之而已據吉時言耳此木路對禫始有漆明此木路不漆飾指本體而言也先鄭云謂螺蘭車者此舉漢時有螺長蘭乘不善之車故舉以說之也云犬􅍜以犬皮為覆笭者古者男子立乘須馮軾軾上須皮覆之故云犬􅍜子春讀揟為沙於義無所取故不從也𤣥謂蔽車旁禦風塵者上文重翟厭翟之等為蔽皆是禦風塵故知此蔽亦是禦風塵也云犬白犬皮者以喪無飾明用犬之白者是以士喪記主人乘惡車白狗幦是也云既以皮為覆笭又以其尾為戈㦸之韜者以經云犬􅍜尾櫜明􅍜與櫜共用犬櫜則韜也云粗布飾二物之側為之緣者按喪服齊衰已下皆稱疏禮之通例凡言疏布者皆據大功布而言若然此則以八升布為二物之緣也云若攝服云者按既夕記云二車白狗攝服注云攝猶緣也狗皮緣服差飾引之者證此二物為緣之事也云小箙刀劒短兵之衣者此小箙即既夕記云主人乘惡車白狗幦蒲蔽犬服鄭彼注云笭間兵服以犬皮為之是也云此始遭喪所乘者此喪車五乘貴賤皆同乘之是以士喪禮主人乘惡車鄭注引雜記曰端衰喪車皆無等然則此惡車王喪之木車也是以尊卑同也云為君之道尚微備姦臣也者按士喪有犬服則此小服亦是其常今言為君之道尚微備姦臣者此言非為小兵服以戈㦸人君乃有之然則備姦臣為尾櫜戈㦸而言也引書曰者顧命文彼以成王崩子釗康王也康王常在尸所以為適子故使康王出鄉門外以虎賁百人更以大子之禮迎之别於庶子必用虎賁備姦臣引之者證人君有戈㦸亦是備姦臣素車棼蔽犬􅍜素飾小服皆素注素車以白土堊車也棼讀為薠薠麻以為蔽其􅍜服以素繒為緣此卒哭所乘為君之道益著在車可以去戈㦸音義棼扶云反堊烏路反又烏洛反薠扶文反疏注釋曰鄭知素車以白土堊者以上有木車下有漆車中有駹藻素三者非漆非木皆以所飾為名明素是白土飾之也爾雅釋宮云地謂之黝牆謂之堊堊謂以白土為飾則此素車亦白土為飾可知云棼讀為薠薠麻者棼字非所以飾物之事故破棼為薠義取用麻為蔽之意云其􅍜服以素繒為緣者禮之通例素有二種其義有色飾者以素為白土義有以繒為飾者即以素為繒故鄭釋二素以白繒别釋之也云此卒哭所乘者按士虞禮卒哭大夫說絰帶於廟門外婦人說首絰不說帶是卒哭變服變服即易車按喪服大功章注云凡天子諸侯卿大夫既虞士卒哭而受服此鄭云卒哭據士而言也云為君之道益著在車可以去戈㦸者以經不云尾櫜明去戈㦸故為此解也薻車薻蔽鹿淺􅍜革飾注故書薻作􅠘杜子春􅠘讀為華藻之藻直謂華藻也𤣥謂薻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺􅍜以鹿夏皮為覆笭又以所治去毛者緣之此既練所乘音義􅠘音總又音藻李一音倉曹反疏注釋曰後鄭云藻水草者就足子春藻為華藻也鄭為蒼色者上文素車為白色下文駹車邊側有漆差之此當蒼色且薻之水草見為蒼文色也云鹿淺􅍜以鹿夏皮為覆笭者夏時鹿毛新生為淺毛故鄭云鹿夏皮為覆笭也云又以所治去毛者緣之者以經云革飾皮去毛曰革故以去毛言之云此既練所乘者王喪十三月練是變除之節故知此即既練所乘也駹車雚蔽然􅍜髤飾注故書駹作龍髤為軟杜子春云龍讀為駹讀為漆垸之漆直謂髤漆也𤣥謂駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘音義雚音丸髤香求反音次漆音七垸胡玩反疏注釋曰故書駹作龍上文龍勒後鄭已破龍為白黑之色故此注從子春為駹髤為於義無所取故不從子春以為漆亦不從也後鄭知駹為邊側之飾者以下文漆車全有漆則此時未全為漆故知駹是邊側少有漆也云漆則成藩者下文藩蔽者因此舊蔽而漆之則藩者以此為本故云漆則成藩也云然果然也者果然獸名是以賈氏亦云然獸名也云髤赤多黑少之色韋也知色如此者按下注雀黑多赤少故知此髤是赤多黑少者也云此大祥所乘者以二十五月大祥除服之節故知此車是大祥所乘也漆車藩蔽犴􅍜雀飾注漆車黑車也藩今時小車藩漆席以為之犴胡犬雀黑多赤少之色韋也此禫所乘音義犴五旦反禫直感反疏注釋曰知漆是黑者凡漆不言色者皆黑且大夫所乘墨車及篆縵之飾直得黑名是凡車皆黑漆也知漆席以為之者以其席即上文雚上注云漆則成藩是也云犴胡犬者謂胡地之野犬或作狐字者謂狐與犬合所生之犬也云雀黑多赤少之色韋也者鄭以目驗雀頭黑多赤少雀即緅也此禫所乘者以二十七月釋祥之節釋素縞麻衣而服禫服朝服綅冠故知當禫所乘也按下文大夫乘墨車士乘棧車皆吉時所乘之車既言天子至士喪車五乘尊卑等則大夫士禫亦得乘漆車所以大夫士禫即乘漆車與吉同者禮窮則同也服車五乘孤乘夏卿乘夏縵大夫乘墨車士乘棧車庶人乘役車注服車服事者之車故書夏為夏緣鄭司農云夏赤也緣緣色或曰夏讀為圭瑑之瑑夏轂有約也𤣥謂夏五采畫轂約也夏縵亦五采畫無瑑爾墨車不畫也棧車不革鞔而漆之役車方箱可載任器以共役音義篆音瑑直轉反縵莫干反棧才産反又仕板反約如字又於貌反下同箱息羊反疏注釋曰云服車服事者之車者其孤卿以下皆是輔佐之臣服事於上故以服事之車解之也先鄭云夏赤也緣緣色後鄭不從者夏翟是采五采備乃為夏而以夏為赤而從古書篆為色於義不可故後鄭解之以夏為五采也云或曰夏篆篆讀為圭瑑之瑑者以篆為轂約後鄭從之云夏縵亦五采畫無瑑爾者言縵者亦如縵帛無文章故云無瑑也以其篆為轂約則言縵者無約也云墨車不畫也者言墨漆革車而已故知不畫也棧車不革鞔而漆之者此則冬官棧車欲弇恐有坼壞是不革鞔者也此已上尋常所乘若親迎則士有攝盛故士昏禮主人乘墨車婦車亦如之有裧為異耳王后别見車五乘此卿孤已下不見婦人車者婦人與夫同故昏禮云婦車亦如之但大夫以上尊則尊矣親迎不假攝盛轉乘上車也知士車有漆飾者按唐傳云古之帝王必有命民於其君得命然後得乘飾車駢馬衣文駢錦注云飾漆之駢並也是其事云役車方箱可載任器以共役者庶人以力役為事故名車為役車知方箱者按冬官乘車田車橫廣前後短大車柏車羊車皆方故知庶人役車亦方箱是以唐傳云庶人木車單馬衣布帛此役車亦名棧車以其同無革鞔故也是以何草不黃詩云有棧之車行彼周道注云棧車役車是也凡良車散車不在等者其用無常注給遊燕及恩惠之賜不在等者謂若今輜車後戶之屬作之有功有沽音義散素旱反輜側其反沽音古疏釋曰云凡者以其衆多故也此良車散車二者皆不在於服車五乘之等列作之有精粗故有良散之名注釋曰云給遊燕及思惠之賜者君臣遊燕歡樂或有賜言及恩惠之賜雖非遊燕君於臣有恩好而惠及之者亦有賜此釋經其用無常云不在等者謂若今輜車後戶之屬者漢時輜車與古者從軍所載輜重財貨之車皆車後開戶故舉以說之云作之有功有沽者釋經良車散車精作為功則曰良粗作為沽則曰散也凡車之出入歲終則㑹之注計其完敗多少疏釋曰車之出謂出給官用車之入謂用罷歸官於當時録為簿帳至歲終則總㑹計完敗多少以入計㑹也凡賜闕之注完敗不計疏注釋曰以其賜人以後完敗隨彼受賜之人在官不復須知故闕之不計㑹毁折入齎于職幣注計所傷敗入其直杜子春云齎讀為資資謂財也乘官車毁折者入財以償繕治之直音義齎音咨償時讓反疏注釋曰謂乘官車者毁損有折壞其車不堪乘用者或全輸價直入官或計所損處酬其價直入官皆入其資資即貨物也以此貨物入於職幣職幣主受給官物所用之餘此之財物亦授之職幣既得此物還與冬官繕治之故鄭云以償繕治之直也大喪飾遣車遂廞之行之注廞興也謂陳駕之行之使人以次舉之以如墓也遣車一曰鸞車音義遣弃戰反注同疏釋曰大喪謂王喪遣車謂將葬遣送之車入壙者也言飾者還以金象革飾之如生存之車但粗小為之耳注釋曰後鄭訓廞為興即言謂陳駕之者解廞為陳駕也按下車僕云大喪廞革車彼廞謂作之此文既言飾遣車已是作更言遂廞之故以陳駕解廞也云行之使人以次舉之以如墓也者按檀弓云諸侯大牢苞七箇遣車七乘大夫亦大牢苞五箇遣車五乘鄭注云諸侯不以命數喪數略天子當大牢苞九箇遣車九乘此時當在朝廟之時於始祖廟陳器之明旦大遣奠之後則使人以次抗舉人各執其一以如墓也云遣車一曰鸞車者按冢人云及葬言鸞車象人是名遣車為鸞車以其遣車亦有鸞鈴故也及葬執蓋從車持旌注從車隨柩路持蓋與旌者王平生時車建旌雨則有蓋今蜃車無蓋執而隨之象生時有也所執者銘旌音義從才用反注同疏釋曰及葬者謂至葬時將向壙云執蓋從車者謂此巾車之官執蓋以隨柩車之後云持旌者亦使巾車之官執持銘旌此在柩車之前而文在下者以執蓋是巾車因言持旌耳非謂持旌亦從車也以銘旌表柩車象殯時在柩前是以既夕禮云祝取銘置於茵注云以重不藏故於此移銘加於茵上若然茵既行時在柩車前明銘旌亦與茵同在柩車前可知也注釋曰云從車隨柩路者鄭欲以經車為蜃車柩路解之云今蜃車無蓋執而隨之象生時有也者蓋所以表尊亦執而隨之所以禦雨今蜃車既設帷荒不得設蓋是以執而隨柩車雖無用但象生時有也云所執者銘旌者將葬之旌士有二旌大夫已上皆有三旌知者以既夕禮是士禮而有乘車所建旃是攝盛故用孤卿所建通帛之旃也又有銘旌以其士無遣車故無廞旌也大夫以上有乘車所建旌卿已上尊矣無攝盛以尋常所建旌王則大常孤卿建旃大夫亦應攝盛用旃是一也又有廞旌又有銘旌也及墓呼啓關陳車注關墓門也車二車也士喪禮下篇曰車至道左北面立東上疏注釋曰鄭知車是二車者以其遣車在明器之中按既夕陳明器在道東西面此不言明器而别陳車是二車可知天子二車象生時當十二乘也士喪禮下篇曰者是既夕禮也而言士喪禮下篇者以其士喪禮論初死并在殯之事既夕禮論葬時事既夕之下同有一記記士喪及既夕不備之事總為一記故鄭以既夕連士喪而言下篇也此所引者引記彼云車至道左北面立東上者士無二車惟據乘車道車槀車三乘此王禮亦有此三乘車於後别有二車十二乘若然則此車非止二車而已鄭直云二車者舉其士喪禮不見者而言耳小喪共匶路與其飾注匶路載柩車也飾棺飾也疏注釋曰言小喪者上言大喪據王不别言后與世子則此小喪中可以兼之鄭云匶路載柩車也者即蜃車也云飾棺飾也者即帷荒柳翣池紐之屬皆是棺之飾歲時更續共其弊車注故書更續為受讀杜子春云受當為更讀當為續更續更受新共其弊車歸其故弊車也𤣥謂俱受新耳更易其舊續續其不任用共其弊車巾車既更續之取其弊車共於車人材或有中用之音義弊婢世反任音壬疏注釋曰言歲時更續者謂一歲四時皆有受官車更謂車雖未破壞日月已久舊者更易以新者續謂雖未經久其有破壞不中用者復以新車續之云共其弊車者此言為二者而設以其既易續以新車其本或舊或壞皆是弊車巾車受取以共冬官車人耳子春以為更續謂更受新若然則更續共為一事不當經㫖故後鄭不從也云共其弊車歸其故弊車者此言亦不從也後鄭以為俱受新者謂更與續二者於彼用車之人俱受其新車也云更易其舊者釋更也云續續其不任用者别釋續也云共於車人者此巾車不專主車人所造大車柏車而已兼主輪人輿人所造乘車兵車而云共車人者則車人謂造車之人兼輪人輿人等造車人也大祭祀鳴鈴以應雞人注雞人主呼旦鳴鈴以和之聲且警衆必使鳴鈴者車有和鸞相應和之象故書鈴或作軨杜子春云當為鈴音義和胡卧反下相應和同警音景軨音零劉音領疏注釋曰云雞人主呼旦雞人職文按韓詩云升車則馬動馬動則鸞鳴鸞鳴則和應是車有和鸞相應之象故鳴鈴以應雞人典路掌王及后之五路辨其名物與其用說注用謂將有朝祀之事而駕之鄭司農云說謂舍車也春秋傳曰雞鳴而駕日中而說用謂所宜用音義說書鋭反注及下駕說并注同朝直遙反下同疏釋曰上巾車已主王后之五路今此又掌之者以其冬官造得車訖以授巾車飾以玉金象之等其王及后所乘者又入典路别掌之注釋曰此經雖不言所用之處典路所掌還依巾車朝祀所用故鄭依巾車而言也先鄭所引春秋者在左氏傳宣十二年楚與晉戰于邲之事云用謂所宜用者還是朝祀之等也若有大祭祀則出路贊駕說注出路王當乘之贊駕說贊僕與趣馬也音義趣倉口反疏注釋曰按上巾車玉路以祀此云若有大祭祀則出路鄭云王當乘之惟出玉路也按下文大喪大賓客亦如之注云亦出路當陳之不言王乘之者以此惟云大祭祀則出路據王所乘之亦當陳之為華國下注曰當陳之謂陳之以華國亦有當乘之法但大賓客王乘金路也其大喪則無乘吉時路故注為陳之而說也知贊僕與趣馬者夏官大馭戎僕齊僕之等及趣馬之官主駕說故知所贊駕說者贊僕與趣馬也大喪大賓客亦如之注亦出路當陳之鄭司農說以書顧命曰成王崩康王既陳先王寶器又曰大路在賓階面贅路在阼階面先路在左孰之前次路在右孰之前漢朝上計律陳屬車於庭故曰大喪大賓客亦如之音義贅章鋭反又作綴張衛反孰音孰上時掌反屬音燭疏注釋曰先鄭引顧命云康王既陳先王寶器者按彼上文云陳寶及列玉五重大訓之等乃陳車乘故云既陳先王寶器云又曰大路在賓階面注云大路玉路云贅路在阼階面注云贅路次在玉路後謂玉路之二也云先路在左孰之前注云先路象路門側之堂謂之孰謂在路門內之西北面與玉路相對也云次路在右孰之前注云象路之二與玉路之二相對在門內之東北面云漢朝上計律陳屬車於庭者漢朝集使上計律法謂上計㑹之法禮記射義注亦謂之計然大祭祀亦陳車乘但古典無陳列之事故不引之也凡㑹同軍旅弔于四方以路從注王出於事無常王乘一路典路以其餘路從行亦以華國音義從才用反注及下注同疏注釋曰鄭云王出於事無常王乘一路典路以其餘路從行者按經㑹同軍旅及弔有三事則是衣裳之㑹及弔王乘金路兵車之㑹及軍旅王乘革路是王出於事無常也王雖乘一路典路以其餘路皆從惟玉路祭祀之車尊不出其餘皆出以華國也車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃注萃猶副也此五者皆兵車所謂五戎也戎路王在軍所乘也廣車橫陳之車也闕車所用補闕之車也蘋猶屏也所用對敵自蔽隱之車也輕車所用馳敵致師之車也春秋傳曰公喪戎路又曰其君之戎分為二廣則諸侯戎路廣車也又曰帥斿闕四十乘孫子八陳有蘋車之陳又曰馳車千乘五者之制及萃數未盡聞也書曰武王戎車三百兩故書蘋作平杜子春云平車當為軿車其字當為蘋書亦或為蘋音義萃七內反下及注同廣古曠反注同蘋薄經反又薄田反輕遣政反注同陳直刃反下同屏并領反又薄經反喪息浪反千乘繩證反下千乘乘車同軿薄經反疏注釋曰云此五者皆兵車者以其廣闕之等皆在軍所用故知皆兵車云所謂五戎也者凡言所謂者謂他成文檢諸文不見更有五兵車為五戎之文惟有月令季秋云以習五戎鄭彼注以五戎為弓矢殳矛戈㦸不為五兵車解之則未知鄭所謂五戎者所謂何文或可鄭解彼五戎或為此五兵解之以五戎之事無正文故鄭兩解之也云戎路王在軍所乘也者此言戎路則巾車所云革路即戎路故知戎路是王在軍所乘也若然此車僕惟掌五戎之萃其五戎之正不言所掌者巾車雖掌正戎之一其下四戎之正亦巾車掌之矣其廣車闕車蘋輕四者所解無正文皆鄭據字以意釋之也云春秋傳者是莊九年齊魯戰于乾時我師敗續公喪戎路傳乘而歸又曰下是宣十二年楚與晉戰于邲楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而說左則受之日八而說楚子使潘黨率斿闕四十乘從唐侯為左拒欒武子曰楚其君之戎分為二廣是也云則諸侯戎路廣車也者以時楚雖僣號其兵車仍號為廣故知餘諸侯兵車竝以廣車為之避天子不得以戎路也云又曰帥斿闕四十乘者即是潘黨所帥者也云孫子八陳有蘋車之陳者是孫子兵法有此言也云又曰馳車千乘者亦是兵書之言引之以證廣闕蘋輕為兵車之義也云五者之制及萃數未盡聞也者言未盡聞則亦有聞者其斿闕四十乘及馳車千乘并戎車三百兩等略得少聞之其餘未聞故云未盡聞也書曰者是牧誓武王伐紂戰于牧野之事也凡師共革車各以其萃注五戎者共其一以為王優尊者所乘也而萃各從其元焉疏注釋曰知戎惟共其一者按巾車王所乘惟革路而已即此上文戎路是也是王惟乘一路耳今此經不云革路總云共革路則革車之言所含者多五戎皆是則王雖乘一路四路皆從是優尊所乘也云而萃各從其元者元即五戎車以下皆云之萃明萃皆從其元可知㑹同亦如之注巡守及兵車之㑹則王乘戎路乘車之㑹王雖乘金路猶共以從不失備也疏注釋曰鄭知巡守及兵車之㑹王乘戎路者以戎僕云掌馭戎車凡巡守及兵車之㑹亦如之云乘車之㑹王雖乘金路猶共以從不失備也者上經凡師總云共革車此文亦云共明無問巡守乘車之㑹皆從以不失備故也大喪廞革車注言興革車則遣車不徒戎路廣闕蘋輕皆有焉疏注釋曰經不云戎路革路而云革車亦是五戎之總名故知不徒戎路廣闕蘋輕皆有可知若然王喪遣車九乘除此五乘之外加以金玉象木四者則九乘矣大射共三乏注鄭司農云乏讀為匱乏之乏疏注釋曰乏一名容則射人云三獲三容是也以其為革車用皮其乏亦用皮故因使為之若然直云大射共乏至於賓射燕射之等則亦使共乏矣舉大射尊者而言先鄭讀乏為匱乏之乏者以其矢於侯匱乏不去故讀從之司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌注物名者所畫異物則異名也屬謂徽識也大傳為之徽號今城門僕射所被及亭長著絳衣皆其舊象通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳音義旜之然反隼息允反旟音餘旐音兆旞音遂識式志反又音志又昌志反下同被普皮反又皮寄反著丁略反又直略反疏注釋曰鄭云所畫異物則異名也者按九旗之中有旃物旌旞之等不畫異物而鄭所總云畫異物者鄭據名者而總言之非謂九旗皆畫異物也云屬謂徽識也者謂在朝在軍所用小旌故以屬言之鄭引大傳者欲見此屬與大傳徽識為一物則詩所云織文鳥章亦一物引今漢法欲見古有此物遺及漢時也云通帛謂大赤者巾車及明堂位皆用大赤也云從周正色無飾者以周建子物萌色赤今旌旗通體盡用絳之赤帛是用周之正色無他物之飾也云雜帛者以帛素飾其側白殷之正色者殷以建丑為正物牙色白今用帛素飾其側者明以先王正道佐職故兼用白雜之也云全羽析羽皆五采繫之於旞旌之上者按序官夏采注云夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采若然冬官鍾氏染鳥羽是周法染鳥羽為五色故鄭云皆五采羽繫之於旞旌之上云所謂注旄於干首也者言所謂者謂爾雅之文也若然則此旞旌非直有羽亦有旄故鄭引爾雅注旄以證旞旌明其兩有是以干旄詩云孑孑干旄孑孑干旌鄭彼注云周禮孤卿建旃大夫建物首皆注旄焉明干首旄羽皆有之此雖據旞旌旄羽竝有至於太常已下首皆有旄羽故衛之臣子雖旃物而有旄羽則大常已下皆有明矣故夏采云乘車建綏復於四郊注綏以旄牛尾為之綴於橦上王祀四郊乘玉路建大常今以之復去其旒異之於生是其旌首皆有旄之驗也云九旗之帛皆用絳者以周尚赤故爾雅云纁帛縿也按全羽析羽直有羽而無帛而鄭云九旗之帛者據衆有者而言或解以為旞旌之下亦有旄旒而用絳帛也其旄之下斾似不用絳故爾雅云緇廣充幅長尋曰旐繼旐曰斾詩云白斾央央斾即左氏定四年傳云分康叔以少帛綪茷旃旌是旌斾色異也爾雅别云素錦綢杠素升龍練旒九彼施於喪葬之旗也及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌注仲冬教大閲司馬主其禮自王以下治民者旗畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄉遂出軍賦象其守猛莫敢犯也州里縣鄙鄉遂之官互約言之鳥隼象其勇捷也龜蛇象其扞難辟害也道車象路也王以朝夕燕出入斿車木路也王以田以鄙全羽析羽五色象其文德也大閲王乘戎路建大常焉玉路金路不出音義閲音悅朝直遙反下朝各就同難乃旦反辟音避疏釋曰按大司馬仲春教振旅仲夏教茇舍仲秋教治兵仲冬教大閲大閲謂仲冬無事大簡閲軍禮司常主旗物故贊司馬頒物也此九旗發首雖總為大閲而言其道車載旞斿車載旌非為軍事也注釋曰案大司馬云主四時軍法故云司馬主其禮也云自王以下治民者旗畫成物之象者謂自王以下至諸侯并鄉遂之官是也云王畫日月象天明也者聖人與日月齊其明故旌旗畫日月象之按桓二年臧哀伯云三辰旗旗昭其明也三辰日月星則此太常之畫日月者也此直言日月不言星者此舉日月其實兼有星也云諸侯畫交龍一象升朝一象下復也者以衣服不言交龍直云衮龍則衣服直有升龍無降龍以其天子之衣無日月星直有龍龍有升龍降龍則諸侯不得與天子同故直有升龍也至於天子旌旗有日月星辰故諸侯旌旗無日月星故龍有升降也象升朝天子象下復還國也云孤卿不畫者謂不畫異物帛而已云言奉王之政教而已者以其直有時王政教故云奉王之政教而已云大夫士雜帛者謂中央赤旁邊白白是先王殷之正色而在旁故云以先王正道佐職也云師都六鄉六遂大夫也謂之師都都民之所聚也者以師衆也都聚也主鄉遂民衆所聚故謂之師都也六鄉大夫皆卿六遂大夫皆大夫也卿合建旐大夫合建物今總建旗以其領衆在軍為將故同建熊虎之旗故鄭云畫熊虎者鄉遂出軍賦象其守猛莫敢犯也云州里縣鄙鄉遂之官者州是鄉之官里與縣鄙是遂之官故總言鄉遂之官云互約言之者遂之里是下士得與鄉之州中大夫同建旟則知鄉之閭亦得與遂之縣同建旐也遂之鄙得與縣同建旐鄉之黨亦得與州同建旟可知是互也言約者鄉之族上從黨同建旟比上從間同建旐也遂之酇上從鄙同建旐鄰上從里同建旟是約也但族師已下并鄙師已下皆是士官雖與在上大夫同建其刃數則短當三刃已下云鳥隼象其勇捷也者熊虎龜蛇皆二物相對則此鳥隼亦别物若然則鄭以勇解隼故王制云鷹隼擊然後罻羅設是隼勇也以捷解鳥鳥亦謂捷疾者也云龜蛇象其扞難避害也者龜有甲能扞難蛇無甲見人避之是避害也云道車象路也者按巾車云象路建大赤以朝朝所以行道故謂象路為道車是以士冠禮及郊特牲皆云牟追夏后氏之道章甫殷道委貌周道是與在朝服乘者皆從道故知道車是象路但在朝則建大赤今以朝夕燕出入則建旞也鄭知斿車是木路者巾車云木路以田是游樂之所囿人掌囿游之獸禁是知斿車是木路也但正田獵時建大麾今以小小田獵及巡行縣鄙則建旌為異耳云全羽析羽五色象其文德也者此羽是鍾氏所染鳥羽象翟羽而用故知皆五色以象文德也云大閲王乘戎路建大常焉玉路金路不出者鄭據此文大閲之時王乘戎路金玉之路不出其祀帝於郊及乘車之㑹金路玉路皆出也皆畫其象焉官府各象其事州里各象其名家各象其號注事名號者徽識所以題别衆臣樹之於位朝者各就焉覲禮曰公侯伯子男皆就其旗而立此其類也或謂之事或謂之名或謂之號異外內也三者旌旗之細也士喪禮曰為銘各以其物亡則以緇長半輻頳末長終幅廣三寸書名於末此蓋其制也徽識之書則云某某之事某某之名某某之號今大閲禮象而為之兵凶事若有死事者亦當以相别也杜子春云畫當為書𤣥謂畫畫雲氣也異於在國軍事之飾音義别彼列反下相别同亡音無疏釋曰上云旌旗之大此言旌旗之細者也云皆畫其象焉與下為目此則官府已下三象是也注釋曰鄭云事名號者徽識者大傳云殊徽號昭公二十一年宋厨人濮曰揚徽者公徒也是名徽也詩六月云織文鳥章箋云識徽識是名識也今鄭合而言之故云徽識也云所以題别衆臣者此經雖為軍事而言而云題别衆臣者亦據在朝位而言也故鄭即言樹之於位朝者各就焉而引覲禮為證也按覲禮秋覲在廟諸侯前期皆受舍於朝文王廟外上介樹君之旗於位明日公侯伯子男入各就其旗而立即此經象故云此其類云或謂之事或謂之名或謂之號異外內也者官府在朝是內其州里在百里二百里家在三百里四百里五百里竝是外也云三者旌旗之細也者對上大常已下為旌旗之大者也云士喪禮曰為銘各以其物者謂為銘旌各以生時物王則大常已下為之云亡則以緇長半幅者謂不命之士生時無旌旗者故云亡也以緇繒長半幅長一尺也云赬未長終幅廣三寸者以赤繒為之長二尺廣三寸云書名於末者書死者名於廣三寸之上云此蓋其制也者此在朝表朝位其銘旌制亦如此按禮緯云天子之旌髙九刃諸侯七刃大夫五刃士三刃按士喪禮竹杠長三尺則死者以尺易刃天子九尺諸侯七尺大夫五尺士三尺其旌身亦以尺易刃也若然在朝及在軍綴之於身亦如此故云蓋其制也云徽識之書則云某某之事者官府在軍天官之下當云大宰之下某甲之事地官之下當云大司徒之下某甲之事餘四官之下皆然云某某之名者此據州里而言假令六鄉之下則言某鄉之下某甲之名若六遂之下當云某遂之下某甲之名也云某某之號者此據都家之內假令三百里大夫家之下當云某家之下某甲之號此三者則遍其畿內矣云今大閲禮象而為之者此在軍之旌綴於身大小象銘旌及在朝者為之云兵凶事者隱公傳云兵凶器戰危事亦是凶事也杜子春破畫為後鄭不從還從畫雲氣者按鄉射記云凡畫者丹質則射侯之等皆有畫雲氣之法明此經所云畫者畫雲氣也云異於在國軍事之飾者覲禮及銘旌皆不云畫以其在國質故也惟在軍畫之故云軍事之飾文也凡祭祀各建其旗注王祭祀之車則玉路疏注釋曰云土祭祀之車則玉路者偏據王而言乘玉路則建大常經云各建其旗則諸侯已下所得路各有旗按上文諸侯建旗大行人云建常九旒雖言常皆是交龍為旗散文通故名旗為常孤卿則旜大夫則物故言各建其旗也㑹同賓客亦如之置旌門注賓客朝覲宗遇王乘金路巡守兵車之㑹王乘戎路皆建其大常掌舍職曰為帷宫設旌門疏注釋曰鄭知賓客朝覲宗遇王乘金路者見齊僕云掌馭金路以賓又齊右亦云㑹同賓客前齊車齊車即金路朝覲宗遇即㑹同故總以金路解之也知巡守兵車之㑹王乘戎路者以其同是軍事故知亦皆乘戎路也知皆建其大常者此大閲禮王建大常即知巡守兵車之㑹皆建大常也云掌舍職曰為帷宫設旌門者彼注云謂王行畫止則樹旌以為門彼官樹之此官供旌大喪共銘旌注銘旌王則大常也士喪禮曰為銘各以其物建廞車之旌及葬亦如之注葬云建之則行廞車解說之音義說吐活反疏釋曰此謂在廟陳時建之謂以廞旌建於遣車之上及葬亦如之此謂入壙亦建之注釋曰鄭云葬云建之則行廞車解說之者此釋經及葬亦如之在廟陳時云建葬時亦建則惟有在道去之使人各執遣車又當各執廞旌是行廞車解說之也凡軍事建旌旗及致民置旗弊之注始置旗以致民民至仆之誅後至者音義弊婢世反劉薄計反仆薄北反一音赴疏釋曰云凡軍事建旌旗者當大司馬欲致衆之時司常建之此言為及致而設注釋曰云始置旗以致民者解經及致民置旗也又云民至仆之誅後至者釋經弊之甸亦如之疏釋曰上云軍事謂出軍征戰今此云甸謂四時田獵言亦如之者亦如上建旌及致與弊之也凡射共獲旌注獲旌獲者所持旌音義甸音田獲如字李一音胡霸反疏釋曰言凡射者則大射賓射及燕射皆共之注釋曰謂若大射服不氏唱獲所持之旌三侯皆有獲旌也歲時共更旌注取舊與新疏釋曰謂受官旌旗用之者歲之四時來換易則司常取彼之舊與此之新也都宗人掌都宗祀之禮凡都祭祀致福于國注都或有山川及因國無主九皇六十四氏之祀王子弟則立其祖王之廟其祭祀王皆賜禽焉主其禮者警戒之糾其戒具其來致福則帥而以造祭僕疏注釋曰知都有山川者見祭法云山川丘陵能興雲雨諸侯在其地則祭亡其地則不祭都祀畿內諸侯明亦祭境內山川也云及因國無主九皇六十四氏之祀者按王制云天子諸侯祭因國之在其地而無主後者注云謂所因之國先王先公有功德宜享世祀今絶無後為之祭主者按史伏義已前九皇六十四氏竝是上古無名號之君絶世無後今宜主祭之也云王子弟則立其祖王之廟者左氏傳莊二十八年云邑有先君之主曰都明天子禮亦然故知都內王子弟有祖王之廟也云其祭祖王皆賜禽焉者見祭僕云王所不與則賜之禽都家亦如之𤣥謂王所不與同姓有先王之廟是賜禽法云其來致福則帥而造祭僕知者見祭僕云凡祭祀致福者展而受之是造祭僕之事正都禮與其服注禁督其違失者服謂衣服及宫室車旗疏注釋曰鄭云禁督其違失者解經正都禮禮中所含者多故總以違失解之云服謂衣服及宫室車旗者解經與其服鄭并言宫室車旗者經雖直舉其服服中可以兼宫室車旗是以下文家宗人兼言宫室車旗之禁明衣服之外總須正之若有寇戎之事則保羣神之壝注守山川丘陵墳衍之壇域音義壝惟癸反劉欲鬼反疏注釋曰此經所云據寇戎從外而入故先保在郊之神位而言是以鄭云守山川丘陵墳衍之壇域也按小宗伯云兆山川丘陵於四郊彼雖不言墳衍墳衍之位亦在四郊皆須保之言壝者謂於中為壇四畔為壝舉壝則壇見矣國有大故則令禱祠既祭反命于國注令令都之有司也祭謂報塞也反命還白王音義禱本亦作禱丁老反一音丁報反塞西代反疏注釋曰鄭知所令令有司者此都宗人是王家之官王命使禱祠是都內之事明所令令都內之有司有事於神者也云祭謂報塞也者凡祈福曰禱至於得福則曰祭當與正祭同名祭則是經言祭據報塞而言也云反命還白王者本以禱祠為奉王命今祭訖反以王命還白於王故言還白王也家宗人掌家祭祀之禮凡祭祀致福注大夫采地之所祀與都同若先王之子孫亦有祖廟疏注釋曰鄭云大夫采地之所祀者則家止謂大夫不通公卿也故載師職云家邑任稍地小都任縣地大都任疆地是大夫采地稱家在三百里之內卿為小都在四百里公為大都在五百里則上都宗人所主是也言所祀與都同者據山川九皇六十四氏在其地者云若先王之子孫亦有祖廟者亦如上都宗人但天子與諸侯禮異諸侯之卿大夫同姓邑有先君之主則曰都無曰邑天子之臣同姓大夫雖有先君之主亦曰邑也此不言凡家祭祀致福于國者舉都而言此家從可知國有大故則令禱祠反命祭亦如之注以王命令禱祠歸白王於獲福又以王命令祭之還又反命疏釋曰云則令禱祠反命者王以命令禱祠禱祠訖反命于王則與上文都宗人既祭反命于國為一也此更言祭亦如之者與上異則此是禱祠訖王復更有命祭祭訖亦反命然彼此無異但文有詳略則彼亦有此王命更祭之法文不具也掌家禮與其衣服宫室車旗之禁令注掌亦正也不言寇戎保羣神之壝則都家自保之都宗人所保者謂王所祀明矣疏注釋曰云掌亦正者都宗人云正故知此掌與彼正同云不言寇戎保羣神之壝則都家自保之者此鄭都家自保者鄭欲釋經二處互見其文何者彼經言若有寇戎之事則保羣神之壝者據王所命祀者而言則此家宗人亦有王所命祀者家宗人亦保之可知此家宗人不言寇戎保羣神之壝者是王所不祀家宗人自保之則都宗人亦有王不祀者都宗人自保之可知故鄭二者雙言之云都宗人所保者謂王所祀明矣者以王所不祀宗人不保之明宗人保者王所祀也凡以神仕者掌三辰之法以猶鬼神示之居辨其名物注猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神人鬼地祗之坐者謂布祭衆寡與其居句孝經說郊祀之禮曰燔燎掃地祭牲繭栗或象天酒旗坐星厨倉具黍稷布席極敬心也言郊之布席象五帝坐禮祭宗廟序昭穆亦又有似虛危則祭天圜丘象北極祭地方澤象后妃及社稷之席皆有明法焉國語曰古者民之精爽不攜二者而又能齊肅中正其知能上下比義其聖能光遠宣朗其明能光照之其聰能聽徹之如是則神明降之在男曰覡在女曰巫是以使制神之處位次主而為之牲器時服巫既知神如此又能居以天法是以聖人用之今之巫祝既暗其義何明之見何法之行正神不降惑於淫厲苟貪貨食遂誣人神令此道滅痛矣音義居紀慮反句紀具反繭工典反齊側皆反知音智覡胡歷反李胡隔反令力呈反疏釋曰序官注云神仕者男巫之俊知是巫者此云掌三辰之法以猶鬼神祗之居按外傳云在男曰覡在女曰巫使制神之處位次主之度與此文合故知此神仕是巫注釋曰云天者羣神之精日月星辰其著位也者鄭以經直見三辰不言天者天體無形人所不覩惟覩三辰故鄭云天者羣神之精日月星辰是其著位者也云以此圖天神人鬼地祗之坐者謂布祭衆寡與其居句者鄭意鬼神祗之居止是布祭於神神有衆寡多少或居方為之或句曲為之也引孝經說郊祀者後神契文敢問章云周公郊祀后稷以配天云郊祀之禮燔燎掃地已下至敬心之言釋之也言郊之布席已下是鄭君語云郊之布席象五帝坐者按天文有五帝坐星東方蒼帝靈威仰南北赤帝赤熛怒中央黃帝含樞紐西方白帝白招拒北方黑帝汁光紀各於其面是布神坐也云禮祭宗廟序昭穆者春秋文二年大事於太廟毁廟之主陳於大祖未毁廟之主皆升合食昭南面穆北面是人鬼之席坐也云亦又有似虛危者虛危有墳墓四司又為宗廟布席象之故云又有似虛危也云則祭天圜丘象北極者北極有三星則中央明者為太乙常居傍兩星為臣子位焉云祭地方澤象后妃者天有后妃四星天子象天后象地后妃是其配合也云及社稷者天有天社之星祭社之位象焉故云及社稷之席之席之言結五帝已下也孝經說云祭牲繭栗者據祭地或象天酒旗坐星酒旗星名云厨倉具黍稷者厨倉亦星名言厨倉所以具黍稷以祭祀云布席極敬心也者總結語也國語曰以下者欲見巫能制神之處位者必由精爽之意云精爽不攜二者言其專一也云上下比義者上謂天神下謂地祗能比方尊卑大小之義言聖能通知神意云神明降之者正謂神來降於其身言在男曰覡在女曰巫者男子陽有兩稱名巫名覡女子隂不變直名巫無覡稱言今之已下欲言今世邪巫誑惑世間之事故鄭痛之以冬日至致天神人鬼以夏日至致地示物魅以禬國之凶荒民之札喪注天人陽也地物隂也陽氣升而祭鬼神隂氣升而祭地祗物魅所以順其為人與物也致人鬼於祖廟致物魅於墠壇蓋用祭天地之明日百物之神曰魅春秋傳曰螭魅魍魎杜子春云禬除也𤣥謂此禬讀如潰癰之潰音義鬼眉祕反禬依注胡對反劉又户外反札側八反又音截墠音善螭敕知反疏釋曰言以冬日至夏日至此則大司樂云冬日至於地上之圜丘奏之若樂六變天神皆降夏日至於澤中之方丘奏之地祗皆出是也但其時天之神地之祗皆降仍於祭天之明日更祭此等小神祗故於此别之也注釋曰鄭云天人陽也者此解冬曰至祭天神人鬼之意以其陽故十一月一陽生之月當陽氣升而祭之也云地物隂也者此解夏日至祭地祗之意以其隂故五月一隂生之日當隂氣升而祭之也云所以順其為人與物也者各順隂陽而在冬夏至也云致人鬼於祖廟致物魅於墠壇此鄭惟釋人鬼物魅不言致天神之處者文略亦當在墠壇也云蓋用祭天地之明日者當冬至夏至之日正祭天地之神示事繁不可兼祭此等雖無正文鄭以意量之故云蓋用祭天地之明日也云百物之神曰魅春秋傳曰螭魅魍魎者按左氏宣公三年楚子問鼎之大小輕重王孫滿對曰夏之方有德也遠方圖物貢金九牧鑄鼎象物故民入川澤山林不逢不若魑魅魍魎莫能逢之服氏注云螭山神獸形魅怪物魍魎木石之怪文十八年注螭山神獸形或曰如虎而噉虎或曰魅人面獸身而四足好惑人山林異氣所生為人害如賈服義與鄭異鄭君則以螭魅為一物故云百物之神曰魅引春秋螭魅以證之經無魍魎連引之以國語木石之怪夔魍魎賈服所注是也杜子春云禬除也後鄭云此禬讀如潰癰之潰者就足子春之義以其癰潰則膿血除故讀從之云此禬讀從潰言此以對彼彼大祝云類造禬禜之禬禬為會合之義不為潰也周禮注疏卷二十七周禮注疏卷二十七考證巾車象路朱樊纓七就疏經直云朱鄭知以朱飾勒者上朱字監本訛先今改正木路前樊鵠纓疏且飾韋以為樊纓韋監本訛作節良今從注飾韋為樊改正之王后之五路鍚面朱總張參五經文字云此總字宜從匆作總者訛今釋文石經竝作總及墓疏陳明器在道東西面西面二字据士喪禮下篇當作西北上司常及國之大閲疏鄉之黨亦得與州同建旟可知旟監本訛旃又遂之酇上從鄙同建旐酇監本訛鄰並以經之節次核定改正又故王制云鷹隼擊然後罻羅設鷹隼擊監本訛作鳩化鷹今改正皆畫其象焉家各象其號象字石經訛作相又注樹之於位朝者各就焉監本脫者字今補正都宗人掌都宗祀之禮宗石經作祭凡以神仕者仕序官作士經文互異石經人旁刓缺豈本作士而後人或添人旁既又去之與周禮注疏卷二十七考證
