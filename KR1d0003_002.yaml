body:
  text: 周禮注疏卷二漢鄭氏注唐陸德眀音義賈公彥疏大宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以糾萬民六曰事典以富邦國以任百官以生萬民注大曰邦小曰國邦之所居亦曰國典常也經也法也王謂之禮經常所秉以治天下也邦國官府謂之禮法常所守以為法式也常者其上下通名擾猶馴也統猶合也詰猶禁也書曰度作詳刑以詰四方任猶倳也生猶飬也鄭司農云治典冢宰之職故立其官曰使帥其屬而掌邦治以佐王均邦國教典司徒之職故立其官曰使帥其屬而掌邦教以佐王安擾邦國禮典宗伯之職故立其官曰使帥其屬而掌邦禮以佐王和邦國政典司馬之職故立其官曰使帥其屬而掌邦政以佐王平邦國刑典司寇之職故立其官曰使帥其屬而掌邦禁以佐王刑邦國此三時皆有官唯冬無官又無司空以三隅反之則事典司空之職也司空之篇亡小宰職曰六曰冬官其屬六十掌邦事音義邦國干云國天子諸侯所理也邦疆國之境治直吏反注下治典邦治治官治職之治皆同擾而小反鄭而昭反徐李尋倫反諧户皆反詰起一反禁也干云彈正糾察也馴似倫反度待洛反倳側吏反下同猶立也疏釋曰自此已下至職末分為二段從此職首至以富得民一段十條眀經國之大綱治政之條目自正月之吉以下至職末眀頒宣前法依事而施言掌建邦之六典者謂大宰總御羣職故六典俱建也以佐王治邦國者以六典是王執治邦國王不獨治故云佐王也一曰治典以經邦國至六曰事典皆云邦國者邦國皆謂諸侯之國但治典云經者所以經紀為名故云經教典云安者地道主安故云安禮典云和者禮之用和為貴故云和政典云平者司馬主六軍以平定天下故云平刑典云詰者以其刑者所以詰禁天下故云詰事典云富者作事所以富國家故云富也又治典教典云官府禮典已下四典皆云百官者尊天地二官不局其數故不云百官而云官府也若然六官其屬各六十得稱百官者舉全數故云百官也且天官言治官府地官云教官府夏官云以正百官秋官云刑百官皆依本職而言之至於春官主禮不可云禮百官禮所以統叙萬事故云統百官也冬官不可云事百官故變事云任任謂任使任使即事也又天官主治治所以紀綱天下故云紀萬民也地道主民故云擾萬民擾則馴順之義也春官主禮禮所以諧和故云諧萬民夏官主政九畿職方制其貢有貢賦之事故云均萬民秋官主刑刑者所以糾正天下故云糾萬民也冬官主事作事者所以生飬萬民故云生萬民也然天子曰兆民諸侯曰萬民此天子之禮不言兆民而言萬民者但兆民據天子而言之今言萬民以畿外封諸侯惟有畿內不封故以畿內據近而言注釋曰周禮凡言邦國者皆是諸侯之國此言大曰邦小曰國者止據此文邦在上國在下故為此解案儀禮覲禮云同姓大國異姓小邦則邦國大小通也又云邦之所居亦曰國即據王國而言故上云惟王建國匠人營國方九里與典命國家皆是邦之所居亦曰國也又云典常也經也法也者爾雅釋詁云典常也孫氏云禮之常也釋言云典經也又云法者以其經常者即是法式又云王謂之已下鄭所解也云王謂之禮經常所秉以治天下也者凡言經者以經紀天下故王言禮經常所秉以治天下也云邦國官府謂之禮法者凡言法者下法於上故邦國官府謂之禮法常所守以為法式也云常者上下通名者經據在上法據在下至於王與邦國官府俱有常義故云常者上下通名也又云擾猶馴也者案地官注訓擾為安此言馴不同者馴是順之義順即安義亦通也云統猶合也者統者相統同故為合詰猶禁也者窮詰即禁止之義也引尚書曰度作詳刑以詰四方此尚書呂刑文是呂侯訓夏贖刑以詳審詰禁四方引證詰為禁之義也云任猶倳也者倳猶立也東齊人物立地中為倳蒯通說范陽令曰天下之人所以不敢倳刃於公之腹者畏秦法也欲使百官皆立其功也云生猶飬也者若直云生萬民則諸官皆生萬民彼何異也於義不安故轉為飬冬官主土地所以飬民故也云鄭司農云治典冢宰之職者及下教典司徒之職禮典宗伯之職六典皆言之職此竝是序官之下次有此文故立其官曰使帥其屬而掌邦治此以下六者皆是六官之首有此文司農總引以釋六典也云此三時皆有官唯冬無官者謂各六十官唯冬無云無司空者對餘官有大宰司徒宗伯司馬司寇此則無司空卿也云以三隅反之者凡物不圓則方方則四隅既有三隅眀有四隅以言既有春夏秋三時之官眀有冬時之官可知則事典司空之職是也云司空之萹亡者謂六國時亡其時以考工記代之引小宰職者欲見當有冬官之屬也以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聨以㑹官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治注百官所居曰府弊斷也鄭司農云官屬謂六官其屬各六十若今博士大史大宰大祝大樂屬大常也小宰職曰以官府之六屬舉邦治一曰天官其屬六十是也官職謂六官之職小宰職曰以官府之六職辨邦治一曰治職二曰教職三曰禮職四曰政職五曰刑職六曰事職官聨謂國有大事一官不能獨共則六官共舉之聨讀為連古書連作聨聨謂連事通職相佐助也小宰職曰以官府之六聨合邦治一曰祭祀之聨事二曰賔客之聨事三曰喪荒之聨事四曰軍旅之聨事五曰田役之聨事六曰斂弛之聨事官常謂各自領其官之常職非連事通職所共也官成謂官府之成事品式也小宰職曰以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽賣買以質劑八曰聽出入以要㑹官法謂職所主之法度官職主祭祀朝覲㑹同賔客者則皆自有其法度小宰職曰以法掌祭祀朝覲㑹同賔客之戒具官刑謂司刑所掌墨􅖄劓􅖄宫􅖄刖􅖄殺􅖄也官計謂三年則大計羣吏之治而誅賞之𤣥謂官刑司寇之職五刑其四曰官刑上能糾職官計謂小宰之六計所以斷羣吏之治音義法古法字聨音連弊必世反斷也鄭蒲計反徐劉府世反斷丁亂反下同弛尸氏反比毗志反鄭房利反稽古奚反鄭又音啓版音板傅音附别彼列反契苦計反劑子隨反爾雅云劑翦齊也要於妙反徐於召反後不音者放此朝直遙反凡言朝覲皆同􅖄古罪字劓魚冀反刖音月又五刮反疏釋曰此八法雖不云建亦有建義故鄭注大史職云六典八法八則冢宰所建以治百官大史又建焉是也上六典云治邦國此八法云治官府官府在朝廷之官府也一曰官屬以舉邦治以下皆單言邦據王國而言之言官屬者謂六官各有六十官之屬也長官有屬官官事得舉故云以舉邦治二曰官職以辨邦治者謂六官各有職若天官治職之等官各有職辨别也官事有分别故云以辨邦治也三曰官聨以㑹官治者聨即連也一官不能獨共則衆官共舉之然後事得合㑹故云以㑹官治四曰官常以聽官治者官常非連事通職各自於當官常職而聽治之故云以聽官治也五曰官成以經邦治者官成者謂官自有成事品式依舊行之以經紀邦治也六曰官法以正邦治者官法謂當職所主舊法度將此法度是正邦之治政也七曰官刑以糾邦治者言官刑非尋常五刑謂官中之刑以糾察邦治八曰官計以弊邦治者官計謂平治官府之計也弊斷也謂就計㑹之中有失者斷之故云弊邦治也此八法皆云邦治官常官聨二者不云邦而云官者其官聨言官欲取㑹合衆官乃始得治官常言官欲取官有常職各自治其官故二者不言邦而云官也及小宰還從邦治注釋曰言百官所居曰府者欲以官府為一事解與上府史之府别彼府主藏文書此府是百官所居處皆是府聚之義也鄭司農云官屬謂六官其屬各六十下引小宰所云者是也云若今博士云云屬大常也者司農據漢百官年表漢始叔孫通為奉常後改為大常博士官刑先鄭謂司刑所掌墨􅖄劓􅖄宫􅖄刖􅖄殺􅖄此是正五刑施于天下非為官中之刑故後鄭不從之也官計謂三年大計羣吏之治而誅賞者此為三年一考乃一計之此官計每歲計之故後鄭亦不從之𤣥謂官刑司寇之職五刑其四曰官刑上能糾職是專施于官府之中於義為當也官計謂小宰之六計所以斷羣吏之治羣吏之治即是官中之計於義亦當矣故引破司農也以八則治都鄙一曰祭祀以馭其神二曰法則以馭其官三曰廢置以馭其吏四曰祿位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆注都之所居曰鄙則亦法也典法則所用異異其名也都鄙公卿大夫之采邑王子弟所食邑周召毛聃畢原之屬在畿內者祭祀其先君社稷五祀法則其官之制度廢猶退也退其不能者舉賢而置之祿若今月奉也位爵次也賦口率出泉也貢功也九職之功所稅也禮俗昏姻喪紀舊所行也鄭司農云士謂學士音義馭魚慮反賦貢干云賦上之所求於下貢下之所納於上采音菜召上照反聃乃甘反奉符用反本或作俸率徐劉音類戚音律一音所律反下同稅舒鋭反疏釋曰則亦法也以八則治三等采地之都鄙也一曰祭祀以馭其神者采地之中祭祀宗廟社稷五祀下注云凡云馭者所以驅之內之於善則於祭祀之中宗廟先祖則無可去取是社稷配食者若取句龍后稷上功有功是內之善也二曰法則以馭其官者法則謂官之制度制度與在官為法則使不僭差亦所以驅之使入善也三曰廢置以馭其吏者謂有罪則廢退之有賢則舉置而贊之亦所以驅人於善也四曰祿位以馭其士者士謂學士學士有賢行學業則詔之以爵位祿賞亦是驅之於善也五曰賦貢以馭其用者采地之民口率出泉為賦又井田之法一夫之田稅入於官官得之節財用亦是使人入善故云以馭其用也六曰禮俗以馭其民者俗謂昏姻之禮舊所常行者為俗還使民依行使之入善故云以馭其民七曰刑賞以馭其威者謂有罪刑之有功賞之使人入善畏威故云以馭其威八曰田役以馭其衆者謂采地之中得田獵使役於民皆當不奪農時使人入善故云以馭其衆也據此文則卿大夫得田獵而春秋左氏傳鄭大夫豐卷請田子産不許者彼常田之外臨祭取鮮唯人君耳大夫唯得常田故禮云大夫不掩羣亦是常田豐卷欲僭取鮮故子産云唯君用鮮眀大夫不合也注釋曰上言邦國則諸經有邦國别言之者故解為大曰邦小曰國此采地云都鄙諸文無或言都或言鄙别號故鄭云都之所居曰鄙大司徒云凡造都鄙鄭云其界曰都鄙所居也春秋傳曰遷鄭焉而鄙留是鄙所居不遷也云則亦法也典法則所用異異其名也者謂典法則三者相訓其義既同但邦國言典官府言法都鄙言則是所用處異故别言之其實義通也云都鄙公卿大夫之采邑者載師職云家邑任稍地則大夫之采也小都任縣地則六卿之采也大都任疆地則三公之采也云王子弟所食邑者親王子母弟與公同處而百里次疏者與六卿同處而五十里次疏者與大夫同處二十五里案禮記禮運云天子有田以處其子孫鄭注中庸云同姓雖恩不同義必同也尊重其祿位所以貴之不必授以官守然則王子母弟雖食采地未必别有官有官則依公卿大夫食邑不假别言也云周召毛聃畢原之屬者僖二十四年左傳召穆公云管蔡郕霍魯衛毛聃郜雍曹滕畢原豐郇文之昭也邘晉應韓武之穆也今鄭直云周召毛聃畢原之屬在畿內者其餘或在畿外故不盡言也引之者證王子弟有采邑也云祭祀其先君社稷五祀者案孝經大夫章不云社稷則諸侯卿大夫也若王子母弟及三公稱諸侯者五廟五祀三社三稷故云祀先君社稷五祀也云法則其官之制度者謂宫室車旗衣服之等皆不得僭也云祿若今月奉也者古者祿皆月别給之漢之月奉亦月給之故云若今月奉也云位爵次也者言朝位者皆依爵之尊卑為次則經云位據立故云爵次也云賦口率出泉也者下文九職九賦職賦相繼而言故知賦即九賦口率出泉也云貢功也九職之功者亦約下文言九賦上言九職九職任之九賦斂之是以大府云九賦九功九功即九職之功故鄭於此以貢為功是九職之功出稅也云禮俗昏姻喪紀者曲禮云君子行禮不求變俗若不醴醮用酒是其一隅也云鄭司農云士謂學士者經云祿位以馭其士使進受祿位故知士學士也以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過注柄所秉執以起事者也詔告也助也爵謂公侯伯子男卿大夫士也詩云誨爾序爵言教王以賢否之第次也班祿所以富臣下書曰凡厥正人既富方穀幸謂言行偶合於善則有以賜豫之以勸後也生猶飬也賢臣之老者王有以養之成王封伯禽於魯曰生以飬周公死以為周公後是也五福一曰夀奪謂臣有大罪沒入家財者六極四曰貧廢猶放也舜殛鯀于羽山是也誅責讓也曲禮曰齒路馬有誅凡言馭者所以驅之內之於善音義柄兵命反行下孟反注同殛紀力反鯀古本反驅起俱反疏釋曰大宰以此八柄詔告于王馭羣臣餘條皆不言詔獨此與下八統言詔王者餘竝羣臣職務常所依行嵗終致事乃考知得失此乃王所操持王不獨執羣臣佐之而已故特言詔也言馭者此八者皆是驅羣臣入善之事故皆言馭也一曰爵以馭其貴者司士云以德詔爵有賢乃受爵是馭之以貴也二曰祿以馭其富者司士云以功詔祿祿所以富臣下故云以馭其富三曰豫以馭其幸謂言語偶合於善有以賜豫之故云以馭其幸四曰置以馭其行者有賢行則置之于位故云以馭其行五曰生以馭其福者生猶飬也臣有大勳勞者使子孫享養之是福祐之道也故云以馭其福六曰奪以馭其貧者謂臣有大􅖄身殺奪其家資故云以馭其貧七曰廢以馭其􅖄者廢放也謂臣有大罪君不忍刑殺放以逺之故云以馭其􅖄八曰誅以馭其過者臣有過失非故為之者誅責也則以言語責讓之故云以馭其過也此經八事自五曰已上皆是善事則大善者在前小善者在後自六曰已下皆是惡事則大惡者在前小惡者在後案內史亦言此八柄之事唯一曰爵二曰祿與此同三曰廢四曰置五曰殺六曰生七曰豫八曰奪文亂與此不同者彼欲視事起無常故所言不次也又彼變誅言殺欲見為惡不止則殺之或可見此過失則圜土之刑人也出圜土則殺之故內史變誅言殺也且此中爵與祿廢與置皆别文以王德為大能眀辨之四者設文有别八則中爵祿及廢置皆共文者以其德小不能辨故也注釋曰柄者謂八者若斧斤之柄人所秉執以起事故以柄言之也云爵謂公侯已下者欲見周法爵及命士不言孤者卿中含之故考工記云中有九室九卿朝焉九卿謂三孤六卿是卿中含孤也引詩誨爾序爵者大雅桑柔詩序是先後次第之言誨教也故鄭云言教王以賢否之第次也又引書者是尚書洪範之文云凡厥正人既富方穀者厥其也方道也穀善也凡其正直之人既以爵祿富之又以善道接之引之者證以馭其富也云成王封伯禽於魯曰生以養周公死以為周公後是也者此竝文公十三年公羊傳文彼云周公拜乎前魯公拜乎後曰生以養周公死以為周公主此云為周公後不同者鄭以義言之又云五福一曰夀者此亦洪範文引之者證賢臣老養之是五福一曰夀故曰以馭其福也云六極四曰貧亦洪範文引之者證大罪奪之家資以馭其貧也云廢猶放也舜殛鯀于羽山者鯀治水九載績用不成殛誅也羽山東裔也云曲禮曰齒路馬有誅者齒謂年之路馬君之所乘馬輒年之則有誅責引之者證誅為言語責之非有刑罪也以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賓注統所以合率以等物也親親若堯親九族也敬故不慢舊也晏平仲久而敬之賢有善行也能多才藝者保庸安有功者尊貴尊天下之貴者孟子曰天下之達尊者三曰爵也德也齒也祭義曰先王之所以治天下者五貴有德貴貴貴老敬長慈幼達吏察舉勤勞之小吏也禮賓賓客諸侯所以示民親仁善鄰疏釋曰鄭云統所以合率以等物也此八者民與在上同有物事也謂率下民使與上合皆有以等其事上行之下效之也故以萬民為主也一曰親親者君與民俱親九族之親二曰敬故者君與民皆須恭敬故舊朋友三曰進賢者有賢在下君當招之民當舉之是君民皆進賢也四曰使能者下有技能君民共舉任之五曰保庸者保安也庸功也有功者上下俱賞之以祿使心安也六曰尊貴者臣有貴者君民共尊敬之七曰達吏者吏勤勞在民間在下位不能自達者進之於上而用之也八曰禮賓者天子待朝聘之賔在下皆當禮於賓客此八者先親親後賓客亦是先後之次也注釋曰云親親謂若堯親九族也者堯典云克眀峻德以親九族則堯能任用峻德之賢以自輔乃能親九族上至髙祖下及𤣥孫之親旁及五服民亦效之而親九族也云敬故不慢舊也引晏平仲久而敬之者謂他人久敬平仲由平仲敬於他人善在平仲故親親引堯敬故引平仲欲見上下通有是以伐木詩是文王敬故也云賢有善行也能多才藝者案鄉大夫云興賢者出使長之興能者入使治之是賢有六德六行者能者直六藝而已云尊貴尊天下之貴者謂天下有貴皆尊之云孟子曰天下之達尊者三謂三者天下通達行之三者即爵德齒也爵即經云賢者為大夫能者為士皆是用德為爵證經任賢能也云齒也者謂若黨正飲酒之禮六十已上在堂上以齒此連引之於經無所當也云祭義曰先王之所以治天下者五貴有德者即舉賢者也貴貴即尊貴也貴老敬長慈幼者三者於經無所當亦連引之耳云達吏察舉勤勞之小吏也者小吏在民間謂若比長閭胥之等雖小吏堪任大官故察舉用之云禮賓賔客諸侯者謂若大行人上公侯伯子男之禮皆為等級以禮之是賓客諸侯也云所以示民親仁善鄰者親仁善鄰左氏隱公六年陳五父之辭親仁善鄰則當禮賓故引以證禮賔也以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰閒民無常職轉移執事注任猶倳也鄭司農云三農平地山澤也九穀黍稷秫稻麻大小豆大小麥八材珠曰切象曰瑳玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析閒民謂無事業者轉移為人執事若今傭賃也𤣥謂三農原隰及平地九穀無秫大麥而有粱苽樹果蓏曰圃園其樊也虞衡掌山澤之官主山澤之民者澤無水曰藪牧牧田在逺郊皆畜牧之地行曰商處曰賈阜盛也金玉曰貨布帛曰賄嬪婦人之美稱也堯典曰釐降二女嬪于虞臣妾男女貧賤之稱晉惠公卜懷公之生曰將生一男一女男為人臣女為人妾生而名其男曰圉女曰妾及懷公質於秦妾為宦女焉疏材百草根實可食者疏不熟曰饉音義圃布古反又音布育古育字藪速苟反牧牧養之牧徐音目劉音茂蕃扶元反飭音敕賈音古下注同閒音間秫音述瑳七何反琢陟角反鏤婁豆反為人于僞反傭音容賃女鴆反苽音孤雕胡也字或作菰蓏力果反樊如字又方元反畜許又反又許六反稱尺證反下同釐力之反圉魚吕反養馬曰圉質猪二反疏色居反菜也劉音蘇饉其靳反疏釋曰此九者皆是民之職業故云萬民也一曰三農生九穀者言三農謂農民於原隰及平地三處營種故云三農生九穀也二曰園圃育草木者此圃即載師所云場圃任園地謂在田畔樹菜蔬果蓏者故云育草木也三曰虞衡作山澤之材者謂在山澤之民所作事業材木而已四曰藪牧養蕃鳥獸者謂在藪牧之民事業使之長養蕃滋飛鳥走獸而已五曰百工飭化八材者謂百種巧作之工所為事業變化八材為器物飭之而已飭勤也勤力以化八材六曰商賈阜通貨賄者謂商賈之家所為事業通貨賄使之阜盛七曰嬪婦化治絲枲者嬪婦謂國中婦人有德行者治理變化絲枲以為布帛之等也八曰臣妾聚斂疏材者謂男女貧賤號為臣妾者所為事業聚斂百草根實而已九曰閒民無常職轉移執事者其人為性不營已業為閒民而好與人傭賃非止一家轉移為人執事以此為業者耳注釋曰云任猶倳也者倳謂立也使民之業得立云鄭司農云三農平地山澤也者以其積石曰山水鍾曰澤不生九穀故後鄭不從之也云九穀黍稷秫稻麻大小豆大小麥者此九者後鄭以為無秫大麥而有粱苽八材云珠曰切之下竝爾雅文皆是治器用之名也然今爾雅云骨曰切者蓋司農讀爾雅本作珠也云𤣥謂三農原隰及平地者爾雅髙平曰原下濕曰隰原及平地可種黍稷之等隰中可種稻麥及苽也云九穀無秫大麥而有粱苽者以秫為赤粟與稷黏疏為異故去之大麥所用處少故亦去之必知有粱苽者下食醫云凡膳食之宜有犬宜粱魚宜苽故知有粱苽也且前七穀之中依月令麥屬東方黍屬南方麻屬西方豆屬北方稷屬中央故知有黍稷麻豆麥稻與小豆所用處多故知有稻有小豆也必知有大豆者生民詩云藝之戎菽戎菽大豆后稷之所殖故知有大豆也云樹果蓏曰圃園其樊者案漢書食貨志云田中不得有樹用妨五穀環廬樹桑麻菜茹瓜瓠果蓏應劭曰木曰果草曰蓏張晏曰有核曰果無核曰蓏臣瓚曰木上曰果地上曰蓏劭與瓚義同晏獨異也案載師云場圃任園地則圃在園中故鄭云樹果蓏曰圃園其樊是以詩云折栁樊圃謂與圃為樊樊其蕃蔽也云虞衡掌山澤之官主山澤之民者案地官掌山澤者謂之虞掌川林者謂之衡則衡不掌山澤而云虞衡作山澤者欲互舉以見山澤兼有川林之材也鄭既云虞衡掌山澤之官復云山澤之民者欲見虞衡是官非出稅之人以山澤之民無名號故借虞衡之官以表其民所任者任山澤之萬民山虞澤虞之官非是以任出稅之物但主山澤之民也云澤無水曰藪者地官澤虞云大澤大藪藪澤别言詩云叔在藪火烈具舉藪若有水不得田獵故知澤無水曰藪也云牧牧田在逺郊知者見載師云牧田賞田任逺郊之地云皆畜牧之地者謂藪牧皆是畜牧之地案載師職鄭注牧田畜牧者之家所受田也非畜牧之地此解違者但牧六畜之地無文鄭約與家人所受田處即有六畜之地故云在逺郊也云行曰商處曰賈者諸官之下有賈人無行法故曰處易復象曰至日閉關商旅不行是行曰商也云金玉曰貨者案食貨志王莽居攝更作金銀龜貝錢布之器名曰寶貨是自然之物曰貨也聘禮曰賄用束紡是人所為曰賄也若然王制云錦文珠玉不粥于市此商賈得通之在市者彼據珠玉有錦文者或彼異代禮也案左氏襄十五年宋人獻玉于子罕子罕置諸其里使玉人為之攻之富而後使復其所服氏云富賣玉得富是其得粥玉也云嬪婦人之美稱也者此是國中婦人有德行故稱嬪引堯典釐降二女嬪于虞者欲見嬪是婦人美稱之義耳云臣妾男女貧賤之稱者或奴戮之餘𦙍或背德之質子晉衛之男女皆是故引晉惠以釋之也云晉惠已下皆左氏傳僖十七年夏晉大子圉為質于秦初惠公在梁梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾及生男曰圉女曰妾注養馬曰圉不聘曰妾後子圉西質妾為宦女是也此鄭與文異者鄭以義增之也云疏材百草根實者百草或取根謂若菱芡之屬或取實謂若榛栗之屬皆是根實可食也云疏不熟曰饉者爾雅云穀不熟為饑疏不熟為饉疏穀皆不熟則曰大荒以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦注財泉穀也鄭司農云邦中之賦二十而稅一各有差也幣餘百工之餘𤣥謂賦口率出泉也今之算泉民或謂之賦此其舊名與鄉大夫以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之遂師之職亦云以徵其財征皆謂此賦也邦中在城郭者四郊去國百里邦甸二百里家削三百里邦縣四百里邦都五百里此平民也關市山澤謂占㑹百物幣餘謂占賣國中之斥幣皆末作當增賦者若今賈人倍算矣自邦中以至幣餘各入其所有穀物以當賦泉之數每處為一書所待異也音義削本亦作稍又作所教反徐所召反幣鄭婢世反干必世反與音餘鄉劉音香處昌慮反後可以意求疏釋曰云以九賦斂財賄者此賦謂口率出泉其處有九故云九也既云賦計口率出泉則財賄非泉而云斂財賄者計口出泉無泉者取財賄以當算泉之賦故云斂財賄也一曰邦中之賦者謂國中之民出泉也二曰四郊之賦者計逺郊百里之內民所用出泉也三曰邦甸之賦者謂郊外曰甸百里之外二百里之內民所出泉也四曰家削之賦者謂二百里之內地名削其中有大夫采地謂之家故名家削大夫采地中賦稅入大夫家但大夫家采地外其地為公邑公邑之內其民出泉入王家故舉家稍以表公邑之民也五曰邦縣之賦者四百里地名縣有小都賦入采地之主其中公邑之民出泉入王家也六曰邦都之賦者其五百里中有大都大都采地其賦入主外為公邑其中民所出泉入王家也七曰關市之賦者王畿四面皆有關門及王之市㕓二處其民之賦口稅所得之泉也八曰山澤之賦者謂山澤之中財物山澤之民以時入而取之出稅以當邦賦所稅得之物貯之而官未用有人占㑹取之為官出息此人口稅出泉謂之山澤之賦也九曰幣餘之賦者謂為國營造用物有餘竝歸之於職幣得之不入府藏則有人取之為官出泉此人亦口稅出泉謂之幣餘之賦然關市山澤幣餘不出上六處而特言者以其末作當增賦故也注釋曰知財得為泉者見外府云掌邦布之出入賜豫之財用以此知財中有泉也又知財中有穀者案禮記喪大記云納財朝一溢米米即是穀故知財中有穀也云鄭司農云邦中之賦二十而稅一各有差也者先鄭約載師園㕓二十而一近郊十一逺郊二十而三故云各有差後鄭不從者以關市山澤幣餘之賦皆無地稅即上云邦中四郊之等亦非地稅故不從也云幣餘百工之餘後鄭不從者若是百工之餘當歸之職幣何有稅乎云𤣥謂賦口率出泉也者案大府云九貢九賦九功各别又見司㑹云以九貢致邦國之財用以九賦令田野之財用以九功令民職之財用貢賦及功各别賦為口泉也是以鄭君引漢法民年二十五已上至六十出口賦錢人百二十以為算故鄭於此注亦云今之算泉民或謂之賦此其舊名與又引鄉大夫以歲時登其夫家已下及遂師職者欲見征賦為一皆是口率出泉破司農為地稅也云邦中在城郭已下至五百里此皆約載師所云逺郊甸地削地縣地疆地之等逺近之差云此平民也者謂六曰已上皆是平善之民先王以農為本故謂之平民也對七曰已下非農民者為末作也云關市山澤謂占㑹百物者謂關上以貨出入有稅物市若泉府㕓布總布之等亦有稅物山澤民人入山澤取材物亦有稅物此人占㑹百物為官出息幣餘謂占賣國中斥幣斥幣謂此物不入大府指斥出而賣之故名斥幣云當增賦者謂口率出泉增於上農民故云若今賈人倍算矣云自邦中以至幣餘各入其所有穀物以當賦泉之數者以經云斂財賄財賄即是穀物取之以當賦泉之數若漢法人百二十云每處為一書所待異也者此九賦所得財物給下九式之用九式用處不同故此九賦分為九處是以每一處為一書以待其出式謂用財之節度是所待異也以九式均節財用一曰祭祀之式二曰賓客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式注式謂用財之節度荒凶年也羞飲食之物也工作器物者幣帛所以贈勞賔客者芻秣養牛馬禾穀也鄭司農云匪分也頒讀為班布之班謂班賜也𤣥謂王所分賜羣臣也好用燕好所賜豫音義羞服干云羞飲食也服車服也服或作膳芻初俱反頒鄭音班徐音墳好呼報反注同勞力報反疏釋曰云以九式均節財用者式謂依常多少用財法式也一曰祭祀之式者謂若大祭次祭用大牢小祭用特牲之類二曰賔客之式者謂若上公饔餼九牢五積之類三曰喪荒之式者喪謂若諸侯諸臣之喪含襚贈奠賻賵之類王家之喪所用大非此所共也荒謂凶年穀不熟有所施與也四曰羞服之式者謂王之膳羞衣服所用也五曰工事之式者謂百工巧作器物之法六曰幣帛之式者謂若贈勞賔客也七曰芻秣之式者謂牛馬禾穀也八曰匪頒之式者謂若分賜羣臣也九曰好用之式者燕好所施豫也此九者亦依尊卑緩急為先後之次也注釋曰云荒凶年也者曲禮云嵗凶年穀不登是凶年也云羞飲食之物也者謂若膳夫飲用六清食用六穀醬用百有二十罋之類云工作器物者若考工所作器物也云幣帛所以贈勞賔客者謂若司儀職上公三問三勞之等皆有束帛聘禮賄用束紡云芻秣養牛馬禾穀者謂若聘禮致饔餼芻秣之等也云𤣥謂王所分賜羣臣者就足司農班賜之義也云好用燕好所賜豫者以其言好則知是燕飲有所愛好自因歡樂則有賜豫也以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢注嬪故書作賓鄭司農云祀貢犧牲包茅之屬賓貢皮帛之屬器貢宗廟之器幣貢繡帛材貢木材也貨貢珠貝自然之物也服貢祭服斿貢羽毛物貢九州之外各以其所貴為摯肅慎氏貢楛矢之屬是也𤣥謂嬪貢絲枲器貢銀鐵石磬丹漆也幣貢玉馬皮帛也材貢櫄幹栝柏􅪬簜也貨貢金玉龜貝也服貢絺紵也斿讀如囿游之游斿貢燕好珠璣琅玕也物貢雜物魚鹽橘柚音義嬪鄭音頻司農音賔摯音至本亦作贄楛音户櫄敕倫反幹古旦反􅪬西了反簜大黨反絺敕其反紵直呂反璣徐音畿劉音其既反一音機琅音郎玕音干柚羊救反一音羊受反或音喻疏釋曰云致邦國之用者謂此貢諸侯邦國嵗之常貢則小行人云令春入貢是也大行人云侯服歲一見其貢祀物彼謂因朝而貢與此别也但諸侯國內得民稅大國貢半次國三之一小國四之一所貢者市取當國所出美物則禹貢所云厥篚厥貢之類是也注釋曰言故書者鄭注周禮時有數本劉向未校之前或在山巖石室有古文考校後為今文古今不同鄭據今文注故云故書作賔此九貢皆是諸侯賔之所貢不得特以一事為賔貢云賔貢者非也若言嬪貢謂絲枲堪為婦人所作是也鄭司農云祀貢犧牲包茅之屬者按禮記禮器云三牲魚臘九州之美物故知祀貢有犧牲也案僖公四年齊責楚包茅不入王祭不供無以縮酒故知祀貢中有包茅云賓貢皮帛之屬後鄭從嬪不從賔如上釋也云器貢宗廟之器者大行人因朝而貢者得有成器此嵗之常貢不得有成器故後鄭不從也云幣貢繡帛者禹貢有厥篚織貝及𤣥纎縞之等故知幣貢中有繡帛也云材貢木材也者案禹貢中有惟木故知材貢中有木材也云貨貢珠貝自然之物也者亦據食貨志為說云服貢祭服者後鄭亦不從以大行人因朝而貢有祭服此嵗之常貢不得有成服云斿貢羽毛者亦不從者以其斿據人宴好不得據物上生稱故不從也云物貢九州之外各以其所貴為摯又引肅慎氏貢楛矢之屬後鄭不從者以其九州之外世一見無此嵗之常貢之法也云𤣥謂嬪貢絲枲者絲枲青州所貢此破先鄭為賔貢云器貢銀鐵石磬丹漆也者銀鐵梁州所貢漆兖州所貢石即礪砥荆州所貢磬即泗濵浮磬徐州所貢云幣貢玉馬皮帛也者禹貢堯時無貢馬法覲禮諸侯享禮云匹馬卓上九馬隨之周則有之玉即球琳皮即熊羆狐貍竝雍州所貢帛即織貝之類揚州所貢此增成先鄭之義云材貢櫄幹栝柏􅪬簜也者竝荆州所貢此亦增成先鄭之義云貨貢金玉龜貝也者亦增成先鄭之義龜出九江荆州所貢玉即球琳亦雍州所貢金即金三品及貝揚州所貢云服貢絺紵也者豫州所貢云斿讀如囿游之游斿貢燕好珠璣琅玕也者此破先鄭物上生名為羽毛也珠即蠙珠徐州所貢璣即璣組荆州所貢琅玕雍州所貢云物貢雜物魚鹽橘柚者此亦破先鄭之義魚即暨魚徐州所貢鹽青州所貢橘柚荆揚所貢已上所貢之物皆據禹貢而言以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民注兩猶耦也所以協耦萬民繫聨綴也牧州長也九州各有封域以居民也長諸侯也一邦之貴民所仰也師諸侯師氏有德行以教民者儒諸侯保氏有六藝以教民者宗繼别為大宗收族者鄭司農云主謂公卿大夫世世食采不絶民稅薄利之𤣥謂利讀如上思利民之利謂以政教利之吏小吏在鄉邑者友謂同井相合耦鋤作者孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦藪亦有虞掌其政令為之厲禁使其地之民守其材物以時入于王府頒其餘於萬民富謂藪中材物音義繫音計治直吏反下注王治凡治視治皆同藪干云宜作叟行下孟反鋤音助疏釋曰言邦國即據諸侯及萬民而言謂王者於邦國之中立法使諸侯與民相合耦而聨綴不使離散有九事故云以九兩繫邦國之民也一曰牧以地得民者謂畿外八州之中州别立一州牧使侯伯有功德者為之使統領二百一十國以有一州土地集安萬民故云牧以地得民也二曰長以貴得民者謂一國立諸侯與民為君長是一國之貴民所仰效而民歸之故云以貴得民也三曰師以賢得民者謂諸侯已下立教學之官為師氏以有三德三行使學子歸之故云以賢得民民則學子是也四曰儒以道得民者諸侯師氏之下又置一保氏之官不與天子保氏同名故號曰儒掌養國子以道德故云以道得民民亦謂學子也五曰宗以族得民者謂大宗子與族食族燕序以昭穆故云以族得民民即族人也六曰主以利得民者主謂大夫宣君政教以利得民民則采邑之民也七曰吏以治得民者吏在民間若比長閭胥有以治政之所得民八曰友以任得民者言以任則非同門之朋友謂在田里之間相佐助以相任使而得民即鄰伍聚居者九曰藪以富得民者以上八者皆據人而言此一者不據人而言藪者見民之所居之處利益於人澤藪之中多有材物以富得民舉藪而言則山澤十等皆有材物民居可知也注釋曰訓兩猶耦者欲取在上與民相協耦聨綴使不離散也云牧州長也者禮記王制云二百一十國以為州州有伯伯則長故云牧州長也鄭注下曲禮云選賢侯為之云九州各有封域以居民也者詩云帝命式于九圍九圍則九州各有封域疆界也言此者證以地得民云長諸侯也者對則大夫稱長諸侯稱君今此上言牧下言長故據諸侯也云師諸侯師氏者此一經皆據諸侯又經云以賢得民是諸侯師氏也云有德行者師氏職云以三德三行教國子故知有德行也云儒諸侯保氏有六藝者以經云以道得民保氏職云掌養國子以道教之六藝故知諸侯保氏不可同天子之官故變保言儒儒亦有道德之稱也云宗繼别為大宗收族者見禮記大傳云繼别為大宗對繼禰為小宗故云大又云敬宗故收族族食族燕是所以收族也鄭司農云主謂公卿大夫世世食采不絶民稅薄利之者先鄭意以薄稅為利後鄭不從者稅法有常故孟子云若輕之於堯舜大貉小貉重之於堯舜大桀小桀是不得有輕重皆以什一為正何得薄稅以利民乎故不從也云𤣥謂利讀如上思利民之利謂以政教利之者上思利民忠也此左氏傳隨季良之辭也云吏小吏在鄉邑者謂若比長閭胥或在鄉或在公邑采邑皆是云友謂同井相合耦鋤作者鄭意非謂同師曰友正是同在井邑之間共居若里宰職合耦于鋤注云合耦使相佐助者也云孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦引孟子鄉田同井者以證友是同井之友但鄉遂為溝洫不為井田而云鄉田同井者鄉遂雖不為井田亦三三相任以出稅與井田同故云同井或解同井水義亦通也云藪亦有虞者地官澤虞職云每大澤大藪中士二人是藪有虞也云掌其政令已下皆澤虞職文云富謂藪中材物者謂有薪蒸蒲葦藪中所有之物也正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之注正月周之正月吉謂朔日大宰以正月朔日布王治之事於天下至正歲又書而縣于象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而往皆所以重治法新王事也凡治有故言始和者若改造云爾鄭司農云象魏闕也故魯災季桓子御公立于象魏之外命藏象魏曰舊章不可忘從甲至甲謂之挾日凡十日音義縣音懸注同挾子協反字又作浹同干本作匝子合反十日也鐸待洛反徇辭俊反疏釋曰自此已下皆謂施前事條以建子周之正月言之吉謂朔日也始調和上六典八法已下之事和訖當月即頒布此治職文書于諸侯邦國卿大夫都鄙言乃縣者乃緩辭至建寅之正月乃縣治象之法于雉門象魏使萬民共觀治象挾日者從甲至甲凡十日斂藏之于眀堂於後月月受而行之謂之告朔也注釋曰知正月是周之正月者下文乃縣是建寅眀上云正月是周正月知吉是朔日者論語鄉黨云吉月必朝服而朝是吉謂朔日禮記玉藻云諸侯皮辨聽朔于大廟或云吉或云朔聽朔在月一日是知吉為朔日也云大宰以正月朔日布王治之事于天下者言天下即經邦國都鄙是畿外畿內遍天下即鄉大夫職云正月之吉受法于司徒退而頒之於其鄉吏是司徒布教法從六鄉已下出則此大宰布法亦從六鄉已下出也云至正歲又書而縣于象魏者此鄭釋經中乃縣必知乃縣是正歲建寅之月者下小宰所以佐大宰彼云正歲縣之與此乃縣為一事故知正歲縣也鄭知振木鐸者約小宰而知也云凡治有故言始和者若改造云爾者上六典已下至九兩國法常定今云始和似更新其事改造云爾其實不改鄭司農云象魏闕也者周公謂之象魏雉門之外兩觀闕髙魏魏然孔子謂之觀春秋左氏定二年夏五月雉門災及兩觀是也云觀者以其有教象可觀望又謂之闕者闕去也仰視治象闕去疑事或解闕中通門是以莊二十一年云鄭伯享王于闕西辟注闕象魏也案公羊傳云子家駒謂昭公云諸侯僭天子大夫僭諸侯久矣公曰吾何僭矣哉子家駒曰設兩觀乘大路何氏云天子兩觀諸侯臺門則諸侯不合有觀也若然雉門災及兩觀及禮運云遊於觀之上有觀亦是僭也云故魯災季桓子御公立于象魏之外命藏象魏曰舊章不可忘者此哀公三年左氏傳辭案彼桓僖廟災天火曰災謂桓僖廟被天火所燒舊章象魏在大廟中恐火連及故命藏之若然象魏縣教治也以其建寅之月縣之象魏十日藏之大廟中季桓子因與公立於雉門象魏之外覩舊縣之處命藏大廟中象魏引之者證象魏是教象之法又云從甲至甲謂之挾日凡十日者破諸家從甲至癸謂之挾日通也若從甲至癸仍有癸日不挾故以從甲至甲得通言之乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔注乃者更申敕之以侯伯有功德者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國書曰王啓監厥亂為民參謂卿三人伍謂大夫五人鄭司農云殷治律輔為民之平也𤣥謂殷衆也謂衆士也王制諸侯上士二十七人其中士下士各居其上之三分輔府史庶人在官者也音義參七南反干云三公也傅戚音附徐方慕反監古銜反為于僞反平音評疏釋曰上已言六典治邦國更言施典于邦國故鄭云乃者更申敕之所施之典則建其牧已下是也建立也每一州之中立一牧立其監者每一國之中立一諸侯使各監一國設其參者謂諸侯之國各立三卿傅其伍者謂三卿下各立五大夫陳其殷者三卿下各陳士九人三九二十七置其輔者謂三卿下各設府史胥徒注釋曰鄭云以侯伯有功德者加命作州長謂之牧者案下曲禮云州牧於外曰侯即是先取侯有功德者為牧若無賢侯伯亦得故連言侯伯有功德者云加命作州長者以其侯伯七命州牧八命故云加命作州長云所謂八命作牧者案大宗伯職云七命賜國八命作牧是也若殷之牧下天子使大夫三人為三監至周使伯佐牧不使大夫故詩旄丘序云旄丘責衛伯也鄭云衛康叔爵稱侯今曰伯者時為州伯也周之法使伯佐牧即僖公四年五侯九伯五侯是州牧九伯是牧下之伯云監謂公侯伯子男各監一國引書曰王啓監厥亂為民者此是尚書梓材之篇周公封康叔而敕之證監是諸侯之義也云參謂卿三人者案左氏傳杜泄云吾子為司徒夫子為司馬孟氏為司空則諸侯三卿司徒司馬司空也云伍謂大夫五人者謂司徒下二大夫一大夫為司徒大夫一大夫為大宰大夫司空下二大夫一大夫主司空事一大夫為司寇大夫司馬事省闕一大夫故五人鄭司農云殷治律輔為民之平也者謂置官主法律輔為人之平者謂置輔是平斷此先鄭蓋是後代之法故後鄭易之云𤣥謂殷衆也謂衆士者士稱殷與旅同竝是衆義故鄭𤣥謂衆士也又引王制諸侯上士已下者按彼注大國之士為上次國之士為中小國之士為下言數各居其上之三分者此謂盟㑹立位之序大國之士為上北面前行上九中九下九次國之士下士當其空小國之上士當大國之下士中士當次國之下士下士當其空故云數各居其上之三分引之為破司農殷為治律云輔府史庶人在官者破司農輔為民之平若然建立陳置其義可知其伍言傅者謂大夫上有卿下有士受上政傅於下受下政傅於上故獨云傅乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔注長謂公卿大夫王子弟食采邑者兩謂兩卿不言三卿者不足于諸侯鄭司農云兩謂兩丞疏釋曰上已言八則治都鄙更令施則於都鄙故言乃亦是更申敕之義建其長謂公卿王子弟為采邑之主以是一邑之長故言建其長立其兩者謂每采地之中立其兩卿設其伍陳其殷置其輔義與上邦國同注釋曰云長謂公卿大夫者案典命云三公八命其卿六命其大夫四命案大宗伯云六命賜官彼注王六命之卿賜官者使得自置其臣治家邑如諸侯則此云長唯據公卿已上大夫四命不合立官此鄭云長謂公卿大夫并言大夫者以其大夫雖立官不與公卿同亦得稱長是廣解長義其實大夫不合有兩卿五大夫當與諸侯之卿同官事當相兼也云王子弟食采邑者謂親王子弟食邑與三公同在五百里疆地各百里其次疏者在四百里縣地各五十里與六卿同已上二者得立兩卿五大夫之等其次更疏者在三百里稍地各食二十五里與大夫同不得立兩卿五大夫亦職相兼也云兩謂兩卿不言三卿者不足於諸侯者以畿外諸侯南面為尊故得申而立三卿天子三公六卿雖尊以其在天子之下故屈而立兩卿不足於諸侯鄭司農云兩謂兩丞者以其兩卿丞副其長先鄭以後代之官況之故云兩丞也此中唯有都鄙無家邑之名故都鄙中含有公卿大夫春官都宗人家宗人都家竝有故公卿入都宗人中大夫入家宗人中以其公卿雖有大都小都之别而同名都故大夫不得都名直有宗稱故在家宗人也至於夏官都司馬家司馬又與家宗人都宗人異故鄭注都司馬唯云三公與王子弟其卿又入家司馬中以其司馬辨尊卑六卿卑又自使其臣為司馬若叔孫氏之臣名騣戾王家不為之立司馬故卿入家司馬中若然都鄙之內其號有三若得諸侯之號唯三公王子弟故司裘諸侯熊侯豹侯卿大夫麋侯是卿不入諸侯也若立臣如諸侯即此文卿與公同若稱長可及大夫亦此注含大夫是也乃施法于官府而建其正立其二設其考陳其殷置其輔注正謂冢宰司徒宗伯司馬司寇司空也二謂小宰小司徒小宗伯小司馬小司寇小司空也考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考疏釋曰案上官府在都鄙上此文在都鄙下者欲見都鄙置臣與諸侯同又見諸侯下亦有都鄙之義故進都鄙在上使文承邦國之下也已上言八法治官府今更言施法于官府言乃者亦是更申敕之也而建其正正長也亦是一官之長若大宰之等云立其二者謂小卿副二大卿即小宰之等設其考者考成也佐成事者宰夫之等也殷輔義與前同注釋曰宰夫已下竝是五官之考云司空亡未聞其考者案鄉師云及葬執纛以與匠師御匶注云匠師事官之屬其於司空若鄉師之於司徒若然鄉師是司徒之考則匠師亦司空之考而此云未聞者彼文以義約之司空考匠師也無正文故此云未聞也凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賓客之治注成八成禮賔禮也疏釋曰以其天官主治故以目之六典本以治邦國故云以典待邦國之治八則本以治都鄙故云以則待都鄙之治八法本以治官府故云以法待官府之治八成本以治萬民故云以官成待萬民之治禮者本以接賔客故云以禮待賔客之治據上文官成在八法治官府中今特出之者以其八成本待萬民不待官府若不特出之則無此待萬民之事在八法官府者欲見官府執行故禮記云誰能秉國成成則八成也以禮待賔客本在八統今特見之者以上親親敬故進賢使能保庸尊貴達吏皆是王行之於朝以示於民使民觀之入善不必更别有禮唯禮賔特别有禮若聘禮之類此皆言以者當别有篇卷使人執持施行之知然者以周禮六官皆邦國之治則六官掌事不可專主邦國故知别有篇卷但在三百之中亡逸也注釋曰八成小宰職掌禮賓禮者若聘禮覲禮掌客之等是也祀五帝則掌百官之誓戒與其具修注祀五帝謂四郊及眀堂誓戒要之以刑重失禮也眀堂位所謂各揚其職百官廢職服大刑是其辭之略也具所當共修掃除糞灑音義要一遙反糞弗運反灑色賣反疏釋曰祀五帝則掌百官之誓戒者謂祭前十日已前誓戒百官則大宰掌之與其具修者使百官供祭祀之具及掃除之修也注釋曰五帝者東方青帝靈威仰南方赤帝赤熛怒中央黃帝含樞紐西方白帝白招拒北方黑帝叶光紀依月令四時迎氣及季夏六月迎土氣於南郊其餘四帝各於其郊并夏正祭所感帝於南郊故云祀五帝於四郊也鄭云及眀堂者總饗五帝於眀堂依月令秦用季秋鄭云未知周以何月案下曲禮云大饗不問卜鄭云祭五帝於眀堂莫適卜也彼明堂不卜此下經云帥執事而卜日則此祀五帝不合有眀堂鄭云及眀堂者廣解祀五帝之處其實此處無眀堂云誓戒要之以刑重失禮者言要之以刑則服大刑是也言重失禮者以失禮為重故要之以刑引眀堂位彼在祭祀之下陳之謂祭日此是未祭前引之者欲見祭前示戒還用祭日之辭以敕之故或前或後其辭同云是其辭之略者謂誓戒之時其辭應多不應唯有此言故云辭之略也又云具所當供者祭祀之聨事祭祀之具百官共供故云具謂所當供又云修掃除糞灑者案宫人云掌六寢之修守祧云其廟有司修除之是其修掃除糞灑也前期十日帥執事而卜曰遂戒注前期前所諏之日也十日容散齊七日致齊三日執事宗伯大卜之屬既卜又戒百官以始齊音義前如字干本同徐昨見反本或作先如字又悉薦反諏子須反謀也散西但反齊側皆反下同疏釋曰前期者謂祭日前夕為期云前期十日者即是祭前十一日大宰帥宗伯大卜之屬執事之人而卜日又言遂戒者謂祭前十日遂戒百官始齊注釋曰云前期前所諏之日者此依少牢所諏之日即祭日也凡祭祀謂於祭前之夕為期今言前期十日者眀祭前十一日卜卜之後日遂戒使散齊致齊故云十日容散齊七日致齊三日案禮記祭統云散齊七日以定之致齊三日以齊之云執事宗伯大卜之屬者大宗伯職云凡祀大神享大鬼祭大示帥執事而卜日謂宗伯蒞卜又案大卜云大祭祀視髙命龜故知執事中有宗伯大卜之屬中含有小宗伯及卜師故言之屬但四時迎氣冬至夏至郊天等雖有常時常日猶須審慎仍卜日故表記云不犯日月不違卜筮注日月謂冬夏至正月及四時也所不違者日與牲尸也假令不吉改卜後日故針膏盲云天子郊以夏正上旬之日魯之卜三正下旬之日是雖有常時常日猶卜日也及執事視滌濯注執事初為祭事前祭日之夕滌濯謂溉祭器及甑甗之屬音義視音視本又作視後皆同滌直歷及濯直角反溉古愛反甗魚善反徐音彥一音言本又作䰛音歷疏釋曰及猶至也謂至祭前夕大宰視滌濯案春官小宗伯大祭祀視滌濯大宗伯亦云宿視滌濯彼二官親視滌濯大宰尊亦往涖之注釋曰云執事初為祭事前祭日之夕知者案下經及納亨者是祭日此云視滌濯儀禮特牲亦云前祭日之夕視壺濯及豆籩士卑得與人君同少牢大夫禮當祭日溉祭器者下人君也注又云滌濯謂溉祭器及甑甗之屬知然者案少牢饔人溉鼎七俎廩人溉甑甗司宫溉豆籩及勺爵此不言七俎豆籩勺爵者之屬中含之及納亨贊王牲事注納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祭祀君親牽牲大夫贊之音義亨普庚反注同劉普孟反鄉許亮反疏釋曰及猶至也至納亨者案禮記眀堂位君肉袒迎牲于門卿大夫贊君及殺訖納與亨人故言納亨云贊王牲事者即是卿大夫贊幣一人也注釋曰云納亨納牲將告殺者謂牽牲入時也禮器云納牲詔于庭殺訖毛以告純血以告殺腥其俎豚解而腥之以此訖乃納與亨人爛祭此言納亨者以牽牲也云謂嚮祭之晨者案檀弓云周人大事以日出故知納亨是嚮祭之晨此祭天無祼故先迎牲若宗廟之祭有祼而後迎牲也云既殺以授亨人者案亨人職職外內饔之爨亨謂腥其俎後云凡大祭祀君親牽牲大夫贊之者此眀堂位文彼魯侯用天子禮故還引以證天子法及祀之日贊玉幣爵之事注日旦眀也玉幣所以禮神玉與幣各如其方之色爵所以獻齊酒不用玉爵尚質也三者執以從王至而授之音義齊才計反疏釋曰及猶至也至祭日謂質眀贊助也執此玉幣爵三者助而授王也注釋曰案特牲少牢皆質眀行事故知旦眀云玉幣所以禮神玉與幣各如其方之色者上云祀五帝以為迎氣於四郊之等案大宗伯以玉作六器以禮天地四方又云青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方季夏六月迎土氣於南郊亦用赤璋下云牲幣彼雖幣不是禮神之幣亦云各放其器之色是其禮神幣與玉亦各如其方色也云爵所以獻齊酒者案幂人云疏布幂八尊八尊者五齊三酒之尊以其祭天無祼故無彝尊也云不用玉爵尚質也者對下經享先王用玉爵尚文此祭天不用玉爵故云尚質云三者執以從王至而授之者謂至此祀圓丘方澤祭所而授之王親自執玉幣奠於神坐親酌以獻尸祀大神示亦如之注大神祇謂天地音義示本又作祇音畿疏釋曰云祀大神謂冬至祭天於圓丘云祀大祇謂夏至祭地於方澤亦如之者從掌百官誓戒已下贊玉幣爵之事已上皆如祀五帝之禮注釋曰此天謂大天對五帝為小天此地謂大地對神州之神為小地故云天地也享先王亦如之贊玉几玉爵注玉几所以依神天子左右玉几宗廟獻用玉爵音義享許兩反劉音向注享幣同疏釋曰亦如之下别言贊玉几玉爵則天地不用玉几玉爵其言亦如之者謂亦贊王牲事已上不云大者欲見宗廟六享同然注釋曰云天子左右玉几者此是司几筵文彼所云者謂王受諸侯朝覲㑹同所設今此享先王鬼神之几亦與王平生同故引為證此享先王有玉几玉爵天地有爵但不用玉飾祭宗廟用玉几天地亦應有質几不言之者文不具云宗廟獻用玉爵者按眀堂位獻用玉盞謂王朝踐饋獻酳尸時若祼則用圭瓚也大朝覲㑹同贊玉幣玉獻玉几玉爵注助王受此四者時見曰㑹殷見曰同大㑹同或於春朝或於秋覲舉春秋則冬夏可知玉幣諸侯享幣也其合亦如小行人所合六幣云玉獻獻國珍異亦執玉以致之玉几王所依也立而設几優尊者玉爵王禮諸侯之酢爵王朝諸侯立依前南面其禮之於阼階上音義見賢遍反下同朝直遙反下文同酢音昨依於豈反本亦作扆疏釋曰諸侯四時常朝不稱大今朝覲稱大者諸侯為大㑹同而來故稱大朝覲贊助也助王受此玉幣玉獻玉几玉爵也注釋曰云時見曰㑹者此大宗伯文案彼注時見者言無常期諸侯有不順服者其順服者皆來㑹以師助王討之故云時見曰㑹云殷見曰同者亦大宗伯職文殷猶衆也謂十二歲王如不巡狩諸侯衆來同見天子故曰殷見曰同云大㑹同或於春朝或於秋覲者大㑹雖無常期當春來即是春朝當秋來即是秋覲當夏來即是夏宗當冬來即是冬遇若大同則有常期春東方六服盡來夏南方六服盡來秋冬可知云舉春秋即冬夏可知者經直云大朝覲不言宗遇有宗遇可知在國行朝禮訖乃皆為壇於國外而命事焉云玉幣諸侯享幣也者諸侯㑹同皆依四時常朝亦春夏受贄于朝受享幣者于廟秋冬一受之於廟受朝既訖乃受享獻國所有珍異其行享之時亦璧琮加束帛以致之云其合亦如小行人所合六幣云者案小行人所合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼據彼鄭注五等諸侯享天子用璧以帛享后用琮以錦則圭以馬璋以皮者謂二王之後享天子用圭以馬享后用璋以皮則琥以繡璜以黼者子男自相享法但小行人所云者謂四時常朝不見大朝覲㑹同法約與四時常朝同無正文故言云也云玉獻獻國珍異亦執玉以致之者謂三享之外别有獻國珍異亦如三享執玉以致之故言玉獻謂以玉致獻也云玉几王所依也者謂王所馮依云立而設几優尊者知立而設几者案司几筵云大饗射凡封國命諸侯王位設黼依依前南鄉左右玉几是立而設几也但春夏受享秋冬一受之於廟廟中則有扆前設几法几為坐設今立而設几故云優至尊也云玉爵王禮諸侯之酢爵者案大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢此祼時大宗伯攝祼非冢宰所贊但諸侯酢王用玉爵則冢宰贊王受之故云贊玉爵云王朝諸侯立扆前南面者此約司几筵知之謂秋冬朝時云其禮之於阼階上者言禮之謂祼諸侯是也知王在阼階上者當依賓主之禮案燕禮主君在阼賓在牖户之間故知禮之王在阼階上也大喪贊贈玉含玉注助王為之也贈玉既窆所以送先王含玉死者口實天子以玉雜記曰含者執璧將命曰寡君使某含則諸侯含以璧鄭司農云含玉璧琮音義含本又作唅户暗反後同窆彼驗反徐補贈反琮才宗反疏釋曰大喪謂王喪贊王為此二者也注釋曰大喪既是王喪云助王為之也者謂助嗣王也云贈玉既窆所以送先王者案既夕士禮既窆謂下棺訖主人贈用𤣥纁以入壙王喪雖無文應更有加亦當以𤣥纁為主也所贈亦既窆時也云含玉死者口實者案士喪記用貝三鄭注左右齻及中央象齒堅王含用玉義亦然也又檀弓云飯用米貝不忍虛也故云口實也云天子以玉者此云含玉玉府典瑞皆直云玉無異物之稱對大夫已下不用玉其實亦為璧形故引雜記復引先鄭為璧琮之形也但含玉始死用之贈玉於葬乃用此文後云含玉者用之則有先後此作文先後無義例典瑞并云飯玉此不云者文不具也作大事則戒于百官贊王命注助王為教令春秋傳曰國之大事在祀與戎疏釋曰上已云祀五帝及大神祇祭祀大事戒百官訖則此云作大事戒于百官唯戎事也注釋曰春秋傳者成十三年劉康公成肅公㑹諸侯伐秦成子受脤于社不敬劉子曰國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎引之者證經大事是戎事連引在祀耳王視治朝則贊聽治注治朝在路門外羣臣治事之朝王視之則助王平斷疏注釋曰王有三朝必知此是路門外朝者但外朝是斷疑獄之朝路寢庭朝圖宗人嘉事二者竝於事簡非正朝故知治朝是路門外司士所掌者也視四方之聽朝亦如之注謂王巡守在外時音義守音狩本亦作狩後巡守皆放此疏注釋曰經云四方聽朝故知巡狩時此鄭據依常者而言征伐在外亦有聽朝法以非常法故不言也凡邦之小治則冢宰聽之待四方之賓客之小治注大事決於王小事冢宰専平疏釋曰重出冢宰之名者據百官總焉故特云冢宰也歲終則令百官府各正其治受其㑹注正正處也㑹大計也疏注釋曰言正正處也者經云令百官府各正其治謂正處其所治文書大宰乃受其計㑹也云㑹大計者一歲計㑹即宰夫職云歲計曰㑹是也聽其致事而詔王廢置注平其事來至者之功狀而奏白王疏釋曰百官致其治政功狀與冢宰聽斷其所致之功狀文書而詔告于王有功者置之進其爵有罪者廢之退其爵也三歲則大計羣吏之治而誅賞之注事久則聽之大無功不徒廢必罪之大有功不徒置必賞之鄭司農云三載考績疏釋曰三年一閏天道小成則大計㑹百官羣吏之治功文書上計當年已有廢置今三年上大計大無功不徒廢更加罪大有功不徒置更加賞也注釋曰此尚書舜典文彼云三載考績黜陟幽眀彼三年一考與此同故引證三嵗大計也周禮注疏卷二周禮注疏卷二考證太宰之職疏地道主民故云擾萬民道當作官以五官例之可見以八法治官府疏及小宰還從邦治監本脫邦字今依經文補之以八則治都鄙注禮俗昏姻喪紀舊所行也俗監本訛祀今依經文改正疏言朝位者皆依爵之尊卑為次則經云位據立故云爵次也立疑當作爵又貢功也九職之功者據注應作九職之功所稅者脫所稅二字以九職任萬民疏以秫為赤粟赤監本訛作亦今改正又晉衛之男女皆是故引晉惠以釋之也衛當作惠以九賦斂財賄三曰邦甸之賦邦字監本訛郊今依石經及注改正以九式均節財用疏王家之喪所用大非此所共也臣照按賈公彥之意謂九式皆畿內所共大喪必天下共之故謂非此所共顧喪事總總奚能天下共之即畿內亦豈有無式者其說似未可信也又聘禮賄用束紡聘監本訛作職今改正以九兩繫邦國之民疏若比長閭胥有以治政之所得民有以治政之所得民疑當作有政治之所以得民又舉藪而言則山澤十等十當作之乃施典于邦國注諸侯上士二十七人其中士下士各居其上之三分中士下士下當有一數字觀本疏可知乃施法于官府疏宰夫已下並是五官之考考監本訛作長今改正大朝覲㑹同疏春東方六服盡來夏南方六服盡來秋冬可知可知監本訛作司農或云當作西北又但春夏受享秋冬一受之於廟臣浩按上文云諸侯㑹同皆依四時常朝亦春夏受贄於朝受享幣者於廟秋冬一受之於廟則此云春夏受享疑有闕文似當作春夏受贄於朝受享於廟周禮注疏卷二考證
