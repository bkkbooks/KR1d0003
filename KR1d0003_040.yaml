body:
  text: 周禮注疏卷四十漢鄭氏注唐陸德明音義賈公彥疏輈人為輈注輈車轅也詩云五楘梁輈音義輈張留反方言云椘衛之間轅謂之輈楘音木本又作鞪同疏釋曰按三十工無輈人之官但車事是難故車官别主此職也注釋曰云詩云五楘梁輈者秦詩引之者證輈是車轅之事彼注云楘歷録也梁輈上句衡也一輈五束束有歷録是也輈有三度軸有三理注目下車度深淺之數疏注釋曰云度深淺之數者四尺七寸之等是也國馬之輈深四尺有七寸注國馬謂種馬戎馬齊馬道馬髙八尺兵車乘車軹崇三尺有三寸加軫與轐七寸又并此輈深則衡髙八尺七寸也除馬之髙則餘七寸為衡頸之間也鄭司農云深四尺七寸謂轅曲中音義種章勇反齊側皆反轐音卜舊方木反又音僕疏注釋曰知國馬謂種戎齊道者校人馬有六種下文有田馬駑馬明此四者當國馬也廋人云馬八尺以上為龍故鄭云髙八尺云兵車乘車軹崇三尺有三寸者上文云兵車輪崇六尺有六寸軹崇三尺三寸加軫與轐四尺是也云餘七寸為衡頸之間也者按下文注衡圍一尺三寸五分寸之一頸圍九寸十五分寸之九并尺三寸與九寸為二尺二寸衡圍五分寸之一於十五分寸之九當得十五分寸之三并頸圍十五分寸之九為十五分寸之十三圍三徑一二十一寸徑七寸餘有一寸十五分寸之十二一寸復分之為十五分通前十五分寸之十二為二十七徑得十五分寸之九此九分當為馬頸低消之先鄭云深四尺七寸謂轅曲中者此據輿以上而言故後鄭從之也田馬之輈深四尺注田車軹崇三尺一寸半并此輈深為七尺一寸半今田馬七尺衡頸之間亦七寸則軫與轐五寸半則衡髙七尺七寸疏注釋曰鄭以上文田車輪崇六尺有三寸軹崇三尺一寸半并此輈深四尺為七尺一寸半加軫與轐五寸半總七尺七寸駑馬髙七尺則七寸亦衡頸之間消之也知加軫與轐五寸半不七寸者亦約軹崇與兵車軹崇校寸半明軫轐亦校寸半也云田馬七尺者亦約廋人馬七尺曰騋以其兵車乘車駕國馬明田車駕騋馬也以此約之明役車駕駑馬也駑馬之輈深三尺有三寸注輪軹與軫轐大小之咸率寸半也則駑馬之車軹崇三尺加軫與轐四寸又并此輈深則衡髙六尺七寸也今駑馬六尺除馬之髙則衡頸之間亦七寸音義咸本又作減同洽斬反率音類又音律下同疏注釋曰鄭以田車之輪下於兵車乘車軹崇及軫轐皆校減一寸半則駑馬是六尺之馬所駕之車又宜下故知輪軹軫轐大小之減率例一寸半與田車減兵車乘車同也是以鄭解駑馬之車皆減田車一寸半也若然衡頸之間同七寸著車雖有髙下至于衡頸不得不同故下云小于度謂之無任衡頸用力是同是以不得有粗細軸有三理一者以為􅍇也注無節目也疏釋曰上文雖輈與軸並列輈有三度已言軸有三理未説故于此重起端序耳云一者以為􅍇也者無節目是軸之美狀也二者以為久也注堅刃也三者以為利也注滑密軓前十尺而䇿半之注謂輈軓以前之長也䇿御者之䇿也十或作七合七為弦四尺七寸為鉤以求其股股則短矣七非也鄭司農云軓謂式前也書或作􅓶玄謂􅓶是軓法也謂輿下三面之材輢式之所尌持車正也音義軓劉音犯注同􅓶音犯尌音樹疏注釋曰云軓謂車式式前十尺謂轅曲中而䇿半之半之策則五尺矣言策者策以禦馬欲取策與輈長短相準合度之意也云十或作七合七為弦四尺七寸為鈎以求其股股則短矣者七七四十九四丈九尺四四十六丈六尺七七四十九又得四尺九寸并之二丈九寸算法以鈎除弦以二丈九寸除四丈九尺仍有二丈八尺一寸在然後以求其股以二丈八尺一寸方之為五尺之方五五二十五用二丈五尺為方五尺也餘有三尺一寸皆以方一寸乘之得三百一十寸方之三百寸得廣六寸長五尺中分之裨前五尺之方一廂得三寸角頭方三寸三三而九又用一寸之方九餘有一寸之方一在總得方五尺三寸餘方一寸以此言之則軓前惟有五尺三寸不容馬故云股則短矣七非也云書或作􅓶玄謂􅓶是軓法也謂輿下三面之材輢式之所尌持車正也者若然經作軓字不為􅓶先鄭以軓為式前後鄭從古書􅓶不從軓者以􅓶為法是定雖有少儀祭軓字為車旁凡與此古書車旁已字雖異同是式前若作軌則不可軌謂轍廣轂末亦為軌故少儀云祭左右軌軌即轂末考工經塗九軌軌即轍廣是軌不定故從􅓶也凡任木注目車持任之材疏釋曰此與下經為目任木即下云任正以下是也任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小於度謂之無任注任正者謂輿下三面材持車正者也輈軓前十尺與隧四尺四寸凡丈四尺四寸則任正之圍尺四寸五分寸之二衡任者謂兩軛之間也兵車乘車衡圍一尺三寸五分寸之一無任言其不勝任音義隧雖遂反軛于革反勝音升疏釋曰任正與衡任粗細不同者各有所宜故不同也是以云小于度謂之無任無任謂折壞不任用也注釋曰名任正者此木任力車輿所取正以其兩輢之所樹于此木較式依于兩輢故曰任正也云三面材者此木下及兩旁見面其上面託著輿板其面不見故云三面材也云輈軓前十尺與隧四尺四寸凡丈四尺四寸者以其經云輈則軓前與下總是輈故鄭通計之一丈得一尺四尺得四寸四寸者一寸為五分四寸為二十分得二分故云任正之圍尺四寸五分寸之二云衡任者謂兩軛之間也者服馬有二一馬有一軛軛者厄馬領不得出云兩厄之間則當輈頸之處費力之所者也云兵車乘車衡圍一尺三寸五分寸之一者田車之衡更無别文亦應與兵車乘車同鄭特言此二者都無正文且據尊者而言其田車之衡任亦當同也衡長六尺六寸五尺得一尺又以尺五寸得三寸又以一寸者為五分得一分故云衡圍一尺三寸五分寸之一也五分其軫間以其一為之軸圍注軸圍亦一尺三寸五分寸之一與衡任相應疏注釋曰上輿人云輪崇車廣衡長參如一則軫間即車廣與衡長俱六尺六寸以六尺六寸五分取一與衡任同故軸圍亦一尺三寸五分寸之一與衡任相應也十分其輈之長以其一為之當兔之圍注輈當伏兔者也亦圍尺四寸五分寸之二與任正者相應疏注釋曰當兔謂輿下當橫軸之處亦通計輈之軓前及隧總計一丈四尺四寸十分取一故輈之伏兔之處粗細之圍有一尺四寸五分寸之二與相應也參分其兔圍去一以為頸圍注頸前持衡者圍九寸十五分寸之九疏注釋曰衡在輈頸之下其頸于前向下持制衡鬲之輔故云頸前持衡轅者也云圍九寸十五分寸之九者以前當兔圍有一尺四寸五分寸之二今以一尺二寸三分之去四寸得八寸又以一寸者分為十五分二寸為三十分又以五分寸二者為六分并三十分為三十六分三十分去十分得二十分六分者去二分得四分總得二十四分以十五分為一寸仍有九分在添前八寸總九寸十五分寸之九也五分其頸圍去一以為踵圍注踵後承軫者也圍七寸七十五分寸之五十一疏注釋曰輈後承軫之處似人之足跗在後名為踵故名承軫處為踵也還以上注九寸十五分寸之九計之取五寸去一寸得四寸仍有四寸九分在一寸為七十五分四寸為三百分又以十五分寸之九者轉為四十五分三百分五分去一去六十分得二百四十分四十五分者五九四十五為五分十五分寸之九去一九得三十六分并前總二百七十六分還以七十五分約寸取二百二十五分為三寸添前四寸為七寸餘有五十一是以鄭云圍七寸七十五分寸之五十一也凡揉輈欲其孫而無弧深注孫順理也杜子春云弧讀為淨而不汙之汙玄謂弧木弓也凡弓引之中參中參深之極也揉輈之倨句如二可也如三則深傷其力音義孫音遜注同弧音胡杜音烏汙李音烏一音紆疏釋曰言揉者以火揉使曲也欲其孫者欲使順理揉之云無弧深者無得如弓之深弓之深大曲也注釋曰玄謂弧木弓也者見于三倉六弓皆是角反張者也易云弦木為弓是木弓也云凡弓引之中參中參深之極也者弓之下制六尺引之三尺是中參深之極也云如二可也者六尺引二尺若然九尺得三尺則是弓一尺得三寸三分寸之一輈軓以前十尺國馬之輈深四尺七寸與二不相當者通計一丈四尺四寸并輿下數之故得二也二者輈總長丈四尺四寸且取丈二尺得四尺餘二尺四寸復得八寸總為四尺八寸是國馬之輈猶不滿二之數也言二舉大而言今夫大車之轅摯其登又難既克其登其覆車也必易此無故惟轅直且無橈也注大車牛車也摯輖也登上阪也克能也音義夫音符摯竹二反覆芳服反易以豉反下注之易喻易同輖音周一音弔或竹二反上時掌反下登上也疏釋曰攻木之工有七輪人輿人造四馬車自上以來所陳者是也車人造大車柏車羊車是駕牛車自在下車人今于此説大車者但輈人造輈主為四馬車轅因説駕牛者亦須曲橈之意是以下文云是故輈欲頎典已下還説四馬之轅也此一經説牛車轅不橈之意注釋曰知大車牛車也者車人大車柏車皆牛車又下文云縊其牛故知牛車也是故大車平地既節軒摯之任及其登阤不伏其轅必縊其牛此無故唯轅直且無橈也注阤阪也故書伏作逼杜子春云逼當作伏音義縊一臂反劉一計反逼音逼故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故唯轅直且無橈也注倍任用力倍也故書緧作䱸鄭司農云䱸讀為緧關東謂紂為緧䱸魚字音義援音袁邸丁禮反緧音秋䱸音秋與緧同疏注釋曰云故書緧作䱸先鄭云䱸讀為緧關東謂紂為緧者按方言車紂自關而東韓鄭汝潁而東謂之為緧或謂之為曲綸自關而西為紂云䱸魚字者破故書為䱸也字猶名也既䱸是魚名明不從故書也是故輈欲頎典注頎典堅刃貌鄭司農云頎讀為懇典讀為殄駟馬之轅率尺所一縳懇典似謂此也音義頎苦很反典音殄又敕殄反注同疏注釋曰此已下還説四馬車轅也先鄭云四馬之轅率一尺所一縛者此即詩五楘梁輈一也輈深則折淺則負注揉之大深傷其力馬倚之則折也揉之淺則馬善負之音義倚於綺反疏注釋曰揉之大深則如上弧深云馬倚之則折也者馬不倚深亦不折故以馬倚之乃折云揉之淺則馬善負之者輈直似在馬背負之相似故善負之本或作若負皆合義不須改也輈注則利準利準則久和則安注故書準作水鄭司農云注則利水謂轅脊上雨注令水去利也玄謂利水重讀似非也注則利謂輈之揉者形如注星則利也準則久謂輈之在輿下者平如準則能久也和則安注與準者和人乘之則安音義準音水又如字下及注皆同重直用反又直龍反疏注釋曰依後鄭讀當云輈注則利也準則久也和則安也利準不重讀先鄭依故書準為水解之後鄭不從者輈轅之上縱不為雨注水無停處故不從也後鄭云輈之揉者形如注星則利也者此無正文亦是後鄭以意解之輈注謂形勢似天上注星車之利也云準則久者準平也亦水之類故以準為平解之云輈之在輿下者平如準者輈平輿亦平平則穩故得長久也云和則安注與準者和人乘之則安者注謂轅曲中以前準謂在輿下前後曲直調和則人乘之安穩安知據人者見下文云終曰馳騁左不倦又云終嵗御衣衽不敝是安據人可知也輈欲弧而無折經而無絶注揉輈大深則折也經亦謂順理也疏注釋曰云輈欲弧而無折者按上文云孫而無弧深此云欲弧而無折者此欲得如弧無使折無使折則不弧深亦一也此云經而無絶即上文欲其孫亦一也故鄭云經亦謂順理也進則與馬謀退則與人謀注言進退之易與人馬之意相應馬行主于進人則有當退時疏注釋曰車是無情之物人馬則有情有情乃有謀今言車與人馬謀者若下文猶能一取皆是喻其利也故鄭云言進退之易與人馬之意相應云馬行主于進人則有當退時者馬之進退由人縱止恐策及之惟知其進故云馬行主于進人則有當退時去住自由路逺則倦故當有退時終日馳騁左不楗注杜子春云楗讀為蹇左面不便馬苦蹇輈調善則馬不蹇也書楗或作劵玄謂劵今倦字也輈和則久馳騁載在左者不罷倦尊者在左音義楗杜音蹇鄭音倦便婢面反罷音皮疏注釋曰子春意據軍將乘車之法將在中故御者在左楗為蹇澀解之四馬六轡在御之手而不在中央在于左故云左面不便馬苦蹇輈調善則馬不蹇也云書楗或作劵玄謂今倦字也者以為尋常在國乘車之法尊在左御者中央故取上文和安解之言輈和而久馳騁載在左者不罷倦尊者在左者曲禮云乘君之乘車不敢曠左左必式注云君存惡空其位是尊者在左也行數千里馬不契需注鄭司農云契讀為爰契我龜之契需讀為畏需之需謂不傷蹄不需道里音義契苦結反注同需音須又乃亂反注同疏注釋曰云先鄭云契讀為爰契我龜之契者詩之文也需讀為畏需之需謂從易需卦之需終嵗御衣衽不敝注衽謂裳也音義衽而甚反又而鴆反疏注釋曰禮記深衣績衽鉤邊者據在旁屬帶處至于問喪云扱上衽及曲禮云苞屨扱衽不入公門此皆據深衣十二幅要間之裳皆是衽故此注云衽謂裳也此唯輈之和也注和則安是以然也謂進則與馬謀而下疏注釋曰總結上進則與馬謀已下四經四者皆由輈和勸登馬力注登上也輈和勸馬用力馬力既竭輈猶能一取焉注馬止輈尚能一前取道喻易進良輈環灂自伏不至軓七寸軓中有灂謂之國輈注伏至軓蓋如式深兵車乘車式深尺四寸三分寸之二灂下至軌七寸則是半有灂也輈有筋膠之𬒳用力均者則灂逺鄭司農云灂讀為灂酒之灂環灂謂漆沂鄂如環音義灂子召反李音在學反被皮寄反沂魚斤反鄂五各反疏注釋曰經云自伏兔不至軓七寸者是從內向外之言更云軓中有灂者灂謂漆則七寸外軓內乃有灂云伏兔至軓蓋如式深者伏兔銜車軸在輿下短不至軓軓即輿下三面材是也無伏兔處去軓逺近無文以意斟酌經云自伏兔不至軓七寸明七寸之外更有寸數故鄭云伏兔至軓蓋如式深也即引兵車乘車式深一尺四寸三分寸之二為證此數即上云隧四寸三分一在外以揉其式是也若然自伏兔至軓亦一尺四寸三分寸之二如是輈轅之深入式下半一尺四寸三分寸之二有七寸三分寸之一直言半有灂者據七寸不言三分寸之一舉全數而言也言用力均者則灂逺者用力均謂軓前十尺并入式下曲直皆用力則漆入式下七寸是灂逺也先鄭讀灂為灂酒之灂者讀從士冠禮若不醴灂用酒之灂也云環灂謂漆沂鄂如環者指謂漆之文理也軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也注輪象日月者以其運行也日月三十日而合宿疏釋曰此言總結上車及蓋取象之意云軫之方也以象地也者據輿方而言不言輿言軫者軫是輿之本故舉以言之云蓋之圜也以象天也者即上與人所造者也云以象星者星則二十八宿一面有七角亢之等是也若據日月合會于其處則名宿亦名辰亦名次亦名房也若不據會宿即指星體而言星也注釋曰云輪象日月者以其運行也日月三十日而合宿者輪乃運行之物至于日則一日行一度一年一周天月行十三度十九分度之七一月一周天又行一辰遂及日而合宿是日月亦是運行之物故以輪象之也龍旗九斿以象大火也注交龍為旗諸侯之所建也大火蒼龍宿之心其屬有尾尾九星音義斿音留宿音秀下同疏釋曰自此以下為上造車車上皆建旌旗故因説斿旗之義也然此以下九斿七斿六斿四斿之旌旗皆謂天子自建非謂臣下知者以此九七六四不與臣下命相當故也若臣下則皆依命數然天子以十二為節而今建九斿七斿六斿四斿者蓋謂上得兼下也注釋曰云交龍為旗諸侯之所建也者皆司常文此既非臣下所建而鄭引司常者蓋取彼交龍以釋此旗因言諸侯亦建旗非謂此經論諸侯事云大火蒼龍宿之心者書大傳云夏大火中可種黍菽及春秋火出皆此大火一也東方木色蒼東方七宿畫為龍故曰蒼龍日月季秋會于此星則曰宿角亢氐房心尾箕次比言之則曰心故云大火蒼龍宿之心也云其屬有尾尾九星者是九斿所象也言九斿若此正謂天子龍旗其上公亦九斿若侯伯則七斿子男則五斿大行人所云者是也鳥旟七斿以象鶉火也注鳥隼為旟州里之所建鶉火朱鳥宿之栁其屬有星星七星疏注釋曰云鳥隼為旟州里之所建司常職文州長中大夫四命里宰下士一命皆不得建此七斿之旟言州里建旟者亦取彼成文以釋旟非謂州里得建七斿也云鶉火朱鳥宿之栁其屬有星星七星者南方七宿畫為鶉畫為鳥火色朱日月六月會于栁故云宿之栁也云其屬有星星七星者月令云旦七星中是也不指七星言栁乃云其屬有星者當鶉火三星栁為首故先舉其首後言其屬也若然上心與尾别辰心非尾之首亦舉心後言其屬尾者心為大辰雖非本辰亦為其首也熊旗六斿以象伐也注熊虎為旗師都之所建伐屬白虎宿與參連體而六星音義伐如字劉扶廢反參色林反疏注釋曰云熊虎為旗師都之所建者亦司常職文云伐屬白虎宿與參連體而六星者西方七宿畫為虎金色白孟夏日月會則曰宿參伐六星為上下是連體也師都鄉遂大夫也鄉大夫雖是六命即得建六斿遂大夫是中大夫四命即不得建六斿此亦謂天子所建也龜蛇四斿以象營室也注龜蛇為旐縣鄙之所建營室玄武宿與東璧連體而四星音義璧音壁疏注釋曰龜蛇為旐縣鄙之所建者亦司常職文縣正雖是下大夫四命鄙師上士三命即不得建四斿此亦謂天子所建也云營室玄武宿者玄武龜也有甲能禦捍故曰武水色玄孟春日月會故曰宿云與東璧連體而四星者營室是北方七宿室在東璧在西西璧而言東璧者據十月在南方璧在東故云東璧也此星一名室璧一名營室一名水春秋傳云水昏正而栽是也一名定定之方中是也弧旌枉矢以象弧也注覲禮曰侯氏載龍旗弧韣則旌旗之屬皆有弧也弧以張縿之幅有衣謂之韣又為設矢象弧星有矢也妖星有枉矢者蛇行有尾因此云枉矢蓋畫之音義韣音獨幓所銜反本又作縿同為于偽反疏釋曰云弧旌者弧弓也旌旗有弓所以張縿幅故曰弧旌也云枉矢者就旌旗張縿弓上亦畫枉矢于上云以象弧也者象天上弧星弧星則矢星也注釋曰引覲禮侯氏載弧韣而云旌旗之屬皆有弧者按司常云全羽為旞析羽為旌則無縿幅可張而云旌旗之屬皆弧者此二者無弧而云之屬者舉衆而言謂若司常注云九旗之帛皆用絳亦舉衆而言也云有衣謂之韣者韣韜也以衣韜其弓謂之弓韣月令帶以弓韣是也云又為設矢象弧星有矢也者天上弧星有枉矢即引孝經緯枉矢者蛇行有尾因此云枉矢蓋畫之知畫之者以其弓所以張幅幅非弦不可著矢故畫于縿上也按孝經援神契云枉矢所以射慝謀輕考異郵曰枉矢狀如流星蛇行有尾又天文志曰枉矢類大流星蛇行而蒼黑長數尺攻金之工築氏執下齊冶氏執上齊鳬氏為聲栗氏為量段氏為鎛器桃氏為刃注多錫為下齊大刃削殺矢鑒燧也少錫為上齊鍾鼎斧斤戈戟也聲鍾錞于之屬量豆區釜也鎛器田器錢鎛之屬刃大刃刀劒之屬音義齊才細反下及注皆同段丁亂反削如字李音笑下同燧音遂錞音淳區烏侯反釜音輔錢子淺反疏釋曰此經與下為月云築氏執下齊冶氏執上齊者據下文六等言之四分已上為上齊三分以下為下齊築氏為削在二分中上仍有三分大刃之等亦是下齊若然築氏于下齊三等之內于此舉中言之鳬氏為聲按鳬氏為鍾此言聲者鍾類非一故言聲以包之故注云聲鍾錞于之屬桃氏為刃按下文桃氏為劒此言刃變言之者亦是劒類非一故注云刃大刃刀劒之屬也注釋曰云多錫為下齊者據下文參分其金而錫居其一謂之大刃之齊云削殺矢者即下文云五分其金而錫居二謂之削殺矢之齊是也云鑒燧也者即下文金錫半謂之鑒燧之齊是也云少錫為上齊鍾鼎斧斤戈戟也者即上文四分其金而錫居一謂之戈戟之齊已上皆是上齊若然鳬氏入上齊桃氏入下齊其栗氏為量段氏為鏄器亦當入上齊中云量豆區釜也者左氏傳晏子云齊舊四量豆區釜鍾四升為豆四豆為區各自其四以登于釜釜十則鍾云鎛器田器錢鎛之屬者詩云庤乃錢鏄注云錢銚鎛耨是也云刃大刃刀劒之屬者桃氏為劒及刀皆大刃也金有六齊注目和金之品數六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈戟之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊注鑒燧取水火于日月之器也鑒亦鏡也凡金多錫則忍白且眀也音義忍音刃疏釋曰上文築氏執下齊冶氏執上齊今于此文戈戟之齊在四分其金而錫居一之中則此已上六分其金與五分其金在上齊中參分其金已下為下齊中可知其斧斤在上齊上齊中惟有冶氏造戈戟則斧斤亦當冶氏為之矣注釋曰云取水火于日月之器也者司烜氏職文云凡金多錫則刃白且明也者刃白據大刃已下削殺矢等鑒燧入且明之內築氏為削長尺博寸合六而成規注今之書刀疏釋曰鄭云今之書刀者漢時蔡倫造紙蒙恬造筆古者未有紙筆則以削刻字至漢雖有紙筆仍有書刀是古之遺法也若然則經削反張為之若弓之反張以合九合七合五成規也此書刀亦然馬氏諸家等亦為偃曲却刃也欲新而無窮注謂其利也鄭司農云常如新無窮已敝盡而無惡注鄭司農云謂鋒鍔俱盡不偏索也玄謂刃也脊也其金如一雖至敝盡無瑕惡也音義鍔五各反冶氏為殺矢刃長寸圍寸鋌十之重三垸注殺矢與戈戟異齊而同其工似補脫誤在此也殺矢用諸田獵之矢也鋌讀如麥秀鋌之鋌鄭司農云鋌箭足入稿中者也垸量名讀為丸音義鋌徒頂反垸音丸齊才細反稿古老反疏注釋日云殺矢與戈戟異齊而同其工者按上文戟在上齊內殺矢在下齊中是異齊今此同工不可也云似補脫誤在此也者按下矢人自造八矢殺矢彼已者此亦有是彼脫漏有人于彼補脫訖更有人補于此是誤在此也云殺矢用諸田獵之矢也者司弓矢職文先鄭直云垸量名讀為丸者其垸是稱兩之名非斛量之號又讀為丸未知欲取何義後鄭引之在下者以其垸之度量其名未聞無以破之故引之在下也戈廣二寸內倍之胡三之援四之注戈今句孑戟也或謂之雞鳴或謂之擁頸內謂胡以內接柲者也長四寸胡六寸援八寸鄭司農云援直刃也胡其孑音義句古侯反下句兵同柲音祕疏釋曰戈廣二寸者據胡寬狹云內倍之者據胡下柄入處之長胡三之據胡之長援四之據最上刺刃之長也注釋曰據此上下文戈與戟别而鄭云戈今句孑戟戈戟共為一者據漢法而言漢特見橫胡之向孑戟云或謂之雞鳴者以其胡似雞鳴故也云或謂之擁頸者以其胡曲故謂之擁頸有此數名也云內謂胡以內接柲者即柄也已倨則不入已句則不決長內則折前短內則不疾注戈句兵也主於胡也已倨謂胡微直而邪多也以啄人則不入已句謂胡曲多也以啄人則創不決胡之曲直鋒本必橫而取圜於磬折前謂援也內長則援短援短則曲於磬折曲於磬折則引之與胡並鉤內短則援長援長則倨於磬折倨於磬折則引之不疾音義邪似嗟反啄丁角反橫劉華孟反又如字折之設反疏釋曰此經論戈之所用主于胡故此經言胡之四疾之事注釋曰云戈句兵也者下文廬人云句兵欲無彈鄭注云句兵戈戟屬是戈為向兵以其有胡孑故為句兵也云主于胡也者以胡為主言此者欲見此經戈不説援専言胡之意也此經已皆為大也已倨謂胡頭大舒故云胡微直而邪多也已句謂胡曲多者謂胡大橫也云以啄人則創不決者橫則擁不削物故創不決也云胡之曲直鋒本必橫而取圜于磬折者胡孑橫捷微邪向上不倨不句似磬之折殺也云前謂援也者以其援在上故云前云內長則援短者按上文內倍之四寸援四之八寸並有定數若胡內長則胡向上侵援援無八寸故云內長則援短援短則曲于磬折曲于磬折者由胡向上近援胡頭低胡頭低則胡曲于磬析也胡既與援相近故援共胡並鉤並鉤則援折故云折前也云內短則援長者胡內本四寸今胡近下為之胡下無四寸故胡上援則長踰八寸矣故云內短則援長也云援長則倨于磬折者以其由胡近下安之則頭舒頭舒則倨于磬折也以頭舒故引之不疾是故倨句外博注博廣也倨之外胡之裏也句之外胡之表也廣其本以除四病而便用也俗謂之曼胡似此音義便婢面反曼莫干反疏釋曰此經為除上四疾而生此文故云是故謂起上義也注釋曰云倨之外胡之裏也句之外胡之表也者倨謂胡上句謂胡下倨與句皆有外廣故云倨之外胡之裏謂于胡下近本增之使廣句之外胡之表謂于胡上近本增之使廣若然則胡本上下俱寬自然合于磬折無上四疾而便用矣云俗謂之曼胡似此者由胡外廣而本寬曼胡然俗呼為曼胡似此經所云者也按莊公四年左氏傳椘武王荆尸授師孑焉以伐隨注云孑句孑凡戟而無刃秦普之間謂之孑或謂之鏕吳揚之間謂之伐東齊秦普之間其大者謂之曼胡其曲者謂之句孑曼胡重三鋝注鄭司農云鋝量名也讀為刷玄謂許叔重説文解字云鋝鍰也今東萊稱或以大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣則三鋝為一斤四兩音義鋝色劣反又音劣或音環鍰户關反又于眷反稱尺證反疏注釋曰先鄭讀鋝為刷取音同後鄭引許叔重説文解字云鋝鍰也者尚書呂刑有墨罰疑赦其罰百鍰及大辟千鍰許氏以此鋝與尚書鍰為一云今東萊稱或以大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣者鋝鍰輕重無文故王肅之徒皆以六兩為鍰是以鄭引許氏及東萊稱為證也云大半兩為鈞者凡數言大者皆三分之二為大三分之一為少以一兩二十四銖十六銖為大半兩也云十鈞為鍰者鍰則百六十銖二十四銖為兩用百四十四銖為六兩餘十六銖為大半兩是銖有六兩大半兩也云鍰鋝似同矣者此從許君之説戟廣寸有半寸內三之胡四之援五之倨句中矩與刺重三鋝注戟今三鋒戟也內長四寸半胡長六寸援長七寸半三鋝者胡直中矩言正方也鄭司農云刺謂援也玄謂刺者著柲直前如鐏者也戟胡橫貫之胡中矩則援之外句磬折與音義中丁仲反注同刺七賜反注同著直略反鐏祖悶反劉徂悶反折與音餘疏注釋曰鄭知此戟三鋒者見此經言援言胡又言刺又按上文戈廣二寸援及接柲長一尺二寸胡長六寸重三鋝此戟廣寸半援及接柲亦長尺二寸胡長六寸狹于戈半寸亦重三鋝明知刺與援别為三鋒矣云三鋝者胡直中矩言正方也者經云倨句中矩鄭云胡中矩則倨句不中矩謂援為磬折故為倨句也先鄭云刺謂援也後鄭不從者經上言援及胡下别言刺明刺與援别若不三鋒輕于戈不得同重三鋝也玄謂刺者著柲直前如鐏者也者謂於援胡之橫上中使出者也但長短無文蓋與胡同六寸乃可充三鋝之數也云戟胡橫貫之者胡六寸橫貫三寸直下三寸云胡中矩則援之外句磬折與者援七寸半亦以三寸為橫稍舉之使不中矩以四寸半者向上為磬折磬折向外故云外句言與者以經直言倨句中矩鄭以意分中矩于胡似倨句于援上為磬折故云與以疑之也若然讀經倨句上屬必知三鋒胡向下者三鋒皆向上者無用故廬人注句兵戈戟屬也桃氏為劒臘廣二寸有半寸注臘謂兩刃音義臘力闔反音獵李魯頰反疏注釋曰此劒兩刃與今同短則與今異言兩刃者兩面各有刃也兩從半之注鄭司農云謂劒脊兩面殺趨鍔疏注釋曰謂劒脊兩面殺趨鍔鍔即鋒兩廂俱然故云兩也以其臘廣為之莖圍長倍之注鄭司農云莖謂劒夾人所握鐔以上也玄謂莖在夾中者莖長五寸音義莖户耕反夾古協反又古洽反下同鐔戚音淫徐劉音尋一音徒南反疏注釋曰二鄭意劒夾是柄莖又在夾中即劒鐔是也倍上臘二寸半故五寸也中其莖設其後注鄭司農云中謂穿之也玄謂從中以郤稍大之也後大則於把易制音義把劉音霸戚必雅反易以豉反疏注釋曰先鄭云穿之謂穿劒夾內莖于中故云中其莖後鄭意設訓為大故易繫辭云益長裕而不設鄭注云設大也周禮考工曰中其莖設其後故云從中以郤稍大之後大則于把易制也參分其臘廣去一以為首廣而圍之注首圍其徑一寸三分寸之二疏注釋曰此首廣謂劒把接刃處之徑也臘廣二寸半參分去一二寸以一寸為六分二寸為十二分半寸為三分添十二為十五分三分去一得十分取六分為一寸餘四分名為六分寸之四六分寸之四即三分寸之二故云一寸三分寸之二也而圍之者正謂圍之故廬人皆以圍為圜之也身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之注上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩之二下制長二尺重二斤一兩三分兩之一此今之匕首也人各以其形貌大小帶之此士謂國勇力之士能用五兵者也樂記曰武王克商裨冕搢笏而虎賁之士説劒音義裨妓支反劉音卑笏音忽賁音奔説吐活反劉詩悅反疏注釋曰知上制長三尺者以其言五其莖長上文長倍之莖長五寸五其莖長二尺五寸并莖五寸為三尺也以下皆如此計之可知重三斤十二兩者以其言九鋝鋝别六兩大半兩六九五十四為五十四兩九鋝皆有大半兩鋝别有十六銖為百四十四銖二十四銖為一兩總為六兩添前五十四為六十兩十六兩為一斤取四十八兩為三斤餘十二兩故云重三斤十二兩已外皆如此計之亦可知也云此今之匕首也者漢時名此小劒為匕首也云人各以形貌大小帶之解經上士中士下士非謂三命為上士之屬直以據形長者為上次者為中短者為下士云此士謂國勇力之士能用五兵者也者此司右文彼不言勇力之士用劒而言勇力士者以樂記説劒之事知之故引之為證也武王克商在軍皆韋辨韋辨兵服克商還皆裨冕裨冕則五冕各以尊卑服之而助祭于明堂虎賁之士即勇力之士者也鳧氏為鍾兩欒謂之銑注故書欒作樂杜子春云當為欒書亦或為欒銑鍾口兩角音義欒本又作鸞力端反銑先典反疏注釋曰欒銑一物俱謂鍾兩角古之樂器應律之鍾狀如今之鈴不圜故有兩角也銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞注此四名者鍾體也鄭司農云于鍾脣之上袪也鼓所擊處音義鉦音征袪丘書反徐丘庶反疏注釋曰云此四名為鍾體對下甬衡非鍾體也以于為袪者以鍾脣厚褰袪然故謂之袪也舞上謂之甬甬上謂之衡注此二名者鍾柄音義甬音勇鍾縣謂之旋旋蟲謂之幹注旋屬鍾柄所以縣之也鄭司農云旋蟲者旋以蟲為飾也玄謂今時旋有蹲熊盤龍辟邪音義旋如字李信犬反蹲音存盤畔干反辟必亦反邪似嗟反疏注釋曰後鄭舉漢法鍾旋之上以銅作蹲熊及盤龍辟邪辟邪亦獸名古法亦當然也鍾帶謂之間謂之枚枚謂之景注帶所以介其名也介在于鼓鉦舞甬衡之間凡四鄭司農云枚鍾乳也玄謂今時鍾乳俠鼓與舞每處有九面三十六音義直轉反疏注釋曰云帶所以介其名也者介間也言四處則中二通上下畔為四處也舉漢法一帶有九古法亦當然鍾有兩面面皆三十六也于上之攠謂之隧注攠所擊之處攠弊也隧在鼓中窐而生光有似夫隧音義攠音靡劉亡竒反又莫賀反隧音遂窐劉烏車反徐于蛙反又于圭反夫音符疏注釋曰有二名者攠據所擊之處攠弊若禮記云國家靡弊是也隧者據生光而言故引司烜氏夫隧彼隧若鏡亦生光窐而生光者本造鍾之時即窐于後生光十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣注此言鉦之徑居銑徑之八而銑間與鉦之徑相應鼓間又居銑徑之六與舞修相應舞修舞徑也舞上下促以橫為修從為廣舞廣四分今亦去徑之二分以為之間則舞間之方恆居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四此鍾口十者其長十六也鍾之大數以律為度廣長與圜徑假設之耳其鑄之則各隨鍾之制為長短大小也凡言間者亦為從以介之鉦間亦當六今時鍾或無鉦間音義從子容反下同疏注釋曰此鍾從鼓鉦舞三處上下為十六口徑十而言故鄭云此鍾口十者其長十六云鍾之大數以律為度廣長與圜徑假設之耳者按周語云景王將鑄無射問律于伶州鳩對曰律所以立均出度古之神瞽考中聲而量量以制度度律均鍾韋昭云均平也度律呂之長短以平其鍾和其聲也據此義假令黃鍾之律長九寸以律計身倍半為鍾倍九寸為尺八寸又取半得四寸半通二尺二寸半以為鍾餘律亦如是是以律為廣長與圜徑也此口徑十上下十六者假設之耳其鑄之形則各隨鍾之制為長短大小者此即度律均鍾也凡言間者亦為從篆以介之即所圗者是也云鉦間亦當六此經不言鉦間故鄭言之以其鼓間六舞間四鉦間方六可知經不言者可知故也今時或無鉦間者見此經無鉦間故也以其鉦之長為之甬長注并衡數也音義數色主反疏注釋曰知并衡數以其衡不言其長又以鉦長六為甬長大長不類故并衡數也以其甬長為之圍參分其圍去一以為衡圍注衡居甬上又小疏注釋曰以自兩欒已上至甬皆下寬上狹衡又在甬上故宜小于甬一分故三分去一為衡也參分其甬長二在上一在下以設其旋注令衡居一分則參分旋亦二在上一在下以旋當甬之中央是其正疏注釋曰上文惟以其鉦之長為甬長并衡數則未知衡與甬長短之定故云令衡居一分假令三分甬居二衡居一一則于甬中央下有一分上通衡有二分故云令衡居一分則參分旋亦二在上一在下以旋當甬之中央是其正正謂上有二分下有一分也薄厚之所震動清濁之所由出侈弇之所由興有説注説猶意也故書侈作移鄭司農云當為侈音義説徐始鋭反注同疏釋曰此鍾薄厚之所震動由鍾體薄厚出聲震動有石有播也云清濁之所由出者清濁據聲亦由鍾之厚薄云侈弇之所由興者由鍾口侈弇所興之聲亦有柞有鬱按典同病鍾有十等此但言薄厚侈弇者典同具陳于此略言其意言猶意者即下文已厚已薄不得所之意是也鍾已厚則石注大厚則聲不發音義大音泰劉他賀反下同疏注釋曰典同亦云厚聲石已薄則播注大薄則聲散疏注釋曰典同云薄聲甄鄭云甄猶掉也與此聲播亦一也以聲散則掉也侈則柞注柞讀為咋咋然之咋聲大外也音義柞側百反注咋同疏注釋曰典同注云侈則聲迫筰出去疾此聲大外亦一也弇則鬱注聲不舒揚疏注釋曰典同注云聲鬱勃不出與此注不舒揚亦一也長甬則震注鍾掉則聲不正音義掉徒弔反疏注釋曰典同云薄聲甄甄猶掉也謂聲掉者據鍾形薄則聲掉此不據鍾體據甬長縣之不得所則鍾掉故聲不正也是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚注言若此則不石不播也鼓鉦之間同方六而今宜異又十分之一猶大厚皆非也若言鼓外鉦外則近之鼓外二鉦外一音義近附近之近疏注釋曰云鼓鉦之間同方六者據上圜可知言今宜異者此鍾有大小不同明厚薄宜異不得同取六也云又十分之一猶大厚皆非也若言鼓外鉦外則近之者鄭不敢正言是故云近之云鼓外二鉦外一者據上所圖鼓外有銑間乃銑外有二間鉦外唯一間就外中十分之一為鍾厚可也鍾大而短則其聲疾而短聞注淺則躁躁易竭也音義聞音問下同易以豉反鍾小而長則其聲舒而逺聞注深則安安難息疏釋曰此二者于樂器中所擊縱聲舒而逺聞亦不可是以樂記云止如稿木不欲逺聞之驗也故鄭云深則安安難息也為遂六分其厚以其一為之深而圜之注厚鍾厚深謂窐之也其窐圜故書圜或作圍杜子春云當為圜疏釋曰此遂謂所擊之處初鑄作之時即已深而圜以擬擊也栗氏為量改煎金錫則不耗注消涷之精不復咸也栗古文或作厯玄謂量當與鍾鼎同齊工異者大器音義湅音練下同復扶又反咸洽斬反本亦作減齊才計反疏注釋曰言改煎金錫者如重煎謂之改煎也不耗耗減也故鄭云消湅之精不復減也玄謂量當與鍾鼎同齊工異者大器者按上文云鳧氏為磬栗氏為量六等之中云六分其金而錫居其一謂之鍾鼎之齊是上齊中不言栗氏為量在上齊中鄭以鳧氏為鍾鍾鼎在上齊之中栗氏為量量是鍾類故知亦在上齊之中矣故云量當與鍾鼎同齊也云工異者鳧氏為鍾不使鳧氏兼造量器大雖同齊使别工為之不耗然後權之注權謂稱分之也雖異法用金必齊音義稱尺證反疏注釋曰云稱分之也者謂稱金多少分之以擬鑄器也云雖異法用金必齊者法謂模假令為兩箇釜即為兩箇模是異法用金必齊者器之用金多少必須齊均也權之然後準之注準故書或作水杜子春云當為水金器有孔者水入孔中則當重也玄謂準擊平正之又當齊大小疏注釋曰子春從故書為水謂以水齊器後鄭不從者此金未鑄器何得已有器以盛水也後鄭以準為平前經已稱知輕重然後更擊鍛金令平正之齊其金之大小也準之然後量之注鑄之於法中也量讀如量人之量疏注釋曰此量謂既準訖量金汁以入模中鑄作之時也言量讀如量人之量者夏官量人直以量地逺近及物多少此量是量金少多之事故讀從之也量之以為釜深尺內方尺而圜其外其實一釜注以其容為之名也四升曰豆四豆曰區四區曰釜釜六斗四升也釜十則鍾方尺積千寸於今粟米法少二升八十一分升之二十二其數必容釜此言內方耳圜其外者謂之脣疏釋曰言量之以為釜者謂量金汁入模以為六斗四升之釜云深尺內方尺者此據模之形狀云圜其外者謂向下方尺者釜之形向上謂之外繞口圜之又厚之以為脣云其實一釜受六斗四升也注釋曰云以其容為之名也者此量器受六斗四升曰釜因名此器為釜故云以其容為之名也云四升曰豆已下至則鍾左氏傳昭三年齊晏子辭連引豆區釜鍾者以其四者皆量器之名也云方尺積千寸者云方尺者上下及旁徑為方尺縱橫皆十破一寸一截一截得方寸之方百十截則得千寸也又云于今粟米法者算術有算粟為米之法故云粟米法也算法方一尺深尺六寸二分容一石如前以縱橫十截破之一方有十六寸二分容一升百六十二寸容一斗千六百二十寸容一石今計六斗四升為釡以百六十二寸受一斗六斗各百為六百六斗各六十六六三十六又用三百六十六斗又各二寸二六十二又用十二十總用九百七十二寸為六斗于千寸之內仍有二十八寸在于六斗四升曰釜又少四升未計入今二十八寸取十六寸二分為一升添前為六斗一升餘有十一寸八分又取一升分為八十一分以十六寸二分一寸當五分十寸當五十分又有六寸五六三十又當三十分添前為八十分是十六寸當八十也仍有十分寸之二當一分都并十六寸二分當八十一分如是十一寸八分于八十一分當五十九更得八十一分升之二十二分始得一升添前為六斗二升復得二升乃滿六斗四升為釜也其臀一寸其實一豆注故書臀作脣杜子春云當為臀謂覆之其底深一寸也音義臀徒門反徐劉徒恩反覆方服反疏釋曰此謂釜之底著地者故子春云覆之其底深一寸也其耳三寸其實一升注耳在旁可舉也疏釋曰此釜之耳在旁可舉謂人以手指舉之處云實一升亦謂覆之所受也重一鈞注重三十斤疏注釋曰此據律厯志三十斤曰鈞百二十斤曰石其聲中黃鍾之宮注應律之首音義中丁仲反應應對之應疏注釋曰十二辰各有律十二律以黃鍾為初九故擊釜器之時其聲中黃鍾之宮也不直言中黃鍾之聲而云之宮者十二辰其變聲辰各有五聲則子上有宮商角徴羽五聲具今之所中者中其宮聲不中商角之等故以宮言之也槩而不稅注鄭司農云令百姓得以量而不租稅音義槩古愛反疏注釋曰按鄭志趙商問栗氏為量槩而不稅廛人職有稅何答曰官量不稅若然此官量鎮在市司所以勘當諸廛之量器以取平非是尋常所用故不稅彼廛人所稅在肆常用者也其銘曰時文思索允臻其極注銘刻之也時是也允信也臻至也極中也言是文德之君思求可以為民立法者而作此量信至於道之中音義索所白反求也臻側巾反為于偽反疏釋曰自此至維則是釜器之上銘文注釋曰云刻之者正謂在模上刻之非謂在器上刻今之鍾鼎為文亦爾嘉量既成以觀四國注以觀示四方使放象之音義觀古亂反示也又如字注同放方往反永啓厥後兹器維則注永長也厥其也兹此也又長啓道其子孫使法則此器長用之音義道音導凡鑄金之狀注故書狀作壯杜子春云當為狀謂鑄金之形狀疏釋曰此文與下為目自金與錫已下栗氏鑄冶所候煙氣以知生熟之節金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也注消湅金錫精粗之候段氏闕函人為甲犀甲七屬兕甲六屬合甲五屬注屬讀如灌注之注謂上旅下旅札續之數也革堅者札長鄭司農云合甲削革裏肉但取其表合以為甲音義屬之樹反下及注同合如字舊音閣注同疏注釋曰云屬讀如灌注之注者意取注著之意也云上旅下旅札續之數也者謂上旅之中及下旅之中皆有札續一葉為一札上旅之中續札七節六節五節下旅之中亦有此節故云札續之數也云革堅者札長者則五屬者以其堅夀年多即下經三百年者也犀甲夀百年兕甲夀二百年合甲夀三百年注革堅者又支久凡為甲必先為容注服者之形容也鄭司農云容謂象式疏注釋曰凡造衣甲須稱形大小長短而為之故為人之形容乃制革也然後制革注裁制札之廣袤疏注釋曰上旅七節六莭莭數已定更觀人之形容長大則札長廣短小則札短狹故云裁制札之廣袤廣即據橫而言袤即據上下而説也權其上旅與其下旅而重若一注鄭司農云上旅謂要以上下旅謂要以下音義要于遙反下同疏釋曰謂札葉為旅者以札衆多故言旅旅即衆也先鄭云上旅腰以上謂衣也下旅腰以下謂裳也故春秋傳曰棄其甲裳者也以其長為之圍注圍謂札要廣厚疏注釋曰此據一札之上先量上下之長乃以長中央圍之一匝如此則長短廣狹相稱也凡甲鍛不摯則不堅已敝則橈注鄭司農云鍛鍛革也摯謂質也鍛革大孰則革敝無強曲橈也玄謂摯之言致音義煆丁亂反摯音至大音泰劉菟餓反致直置反下同疏注釋曰先鄭以摯為質後鄭不從者質即革之别名非生孰之稱故後鄭為致致謂孰之至極也凡察革之道視其鑽空欲其惌也注鄭司農云惌小孔貌惌讀為菀彼北林之菀音義鑽作官反空音孔又如字下同惌于阮反或云司農音鬱疏注釋曰先鄭云惌小孔貌者革惡則孔大革善則孔小驗今亦然讀如菀彼北林之菀者以音讀之視其裏欲其易也注無敗薉也音義易以䜴反下同薉音穢本或作視其朕欲其直也注鄭司農云朕謂革制音義朕直忍反櫜之欲其約也注鄭司農云謂卷置櫜中也春秋傳曰櫜甲而見子南音義櫜音羔劉古道反卷眷勉反下文同疏注釋曰先鄭引春秋者按昭元年左氏傳鄭公孫黑與子南爭徐吾犯之妹適子南氏子晳怒既而櫜甲而見子南欲殺之彼以衣衷著甲謂之櫜與此别引之者彼以衣藏甲為櫜此亦以甲衣藏甲為櫜藏甲為櫜相似故引以為證也舉而視之欲其豐也注豐大疏釋曰此文與上經相對舉之正謂于櫜中取而舉之衣之欲其無齘也注鄭司農云齗謂如齒齘音義衣于既反齘户界反疏注釋曰人之齒齘前却不齊札葉參差與齒齘相似故以齘為喻視其鑽空而惌則革堅也視其裏而易則材更也視其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也注周密致也明有光耀鄭司農云更善也變隨人身便利音義更音庚便婢面反疏釋曰此文歷序上文于此總結之也鮑人之事注鮑故書或作鞄鄭司農云蒼頡篇有鞄􅠙音義鞄匹學反劉音朴頡户結反􅠙人兖反疏釋曰此文與下經為總目注釋曰先鄭取蒼頡篇從故書為鞄字者鮑乃從魚此官治皮宜從革故玄引先鄭于此取從革旁之義望而視之欲其荼白也注韋革逺視之當如茅莠之色音義荼音徒莠音酉又音秀疏釋曰此官主革不主韋韋自韋氏為之鄭云韋革者夾句而言耳荼即茅莠也進而握之欲其柔而滑也注謂親手煩撋之音義撋人專反劉而垂反或如詬反卷而摶之欲其無迆也注鄭司農云卷讀為可卷而懷之之卷摶讀為縛一如瑱之縳謂卷縳韋革也迆讀為既建而迆之之迆無迆謂革不音義摶直轉反或除面反下同縛直轉反瑱他見反本或作顛音同音虧又許皮反疏注釋曰先鄭云可卷而懷之論語文云摶讀為縛一如瑱之縛者按昭二十六年左氏傳云以幣錦二兩縛一如瑱視其著欲其淺也注鄭司農云謂郭韋革之札入韋革淺緣其邊也玄謂韋革調善者鋪著之雖厚如薄然音義著直略反下視其著同札側八反劉側列反鋪普吳反又音孚著之直略反又丁略反察其線欲其藏也注故書線或作綜杜子春云綜當為糸旁泉讀為絤謂縫革之縷音義線思賤反注絤同革欲其荼白而疾浣之則堅注鄭司農云韋革不欲久居水中音義浣户管反欲其柔滑而腛脂之則需注故書需作􅧶鄭司農云腛讀如沾渥之渥􅧶讀為柔需之需謂厚脂之韋革柔需音義腛于角反劉音屋需人兖反注同􅧶而髓反又人兖反渥于角反疏注釋曰先鄭據詩云既沾既渥生我百榖引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也注鄭司農云帴讀為翦謂以廣為狹也玄謂翦者如俴淺之淺或者讀為羊豬戔之戔音義信音申劉音新下皆同帴音踐或山箭反俴音踐劉仕顯反戔劉音普見反依字才丹反字林昨善反沈云馬融音淺干寶為殘與周易戔戔之字同亦音素干反不知其義或云字則如沈釋而羊豬戔之語未見出處俗謂羊豬脂為音素干反豈取此乎按周禮注殘餘字本多作戔宜依殘音疏注釋曰先鄭讀帴為翦者翦亦是狹少之意後鄭轉帴為俴者從小戎詩小戎俴收之俴讀為羊豬戔者義亦同按彼小戎詩俴者淺也謂車深四尺四寸其車廣六尺六寸是廣深不得是一方緩一方急以博為淺以廣為狹之喻卷而摶之而不迆則厚薄序也注序舒也謂其革均也視其著而淺則革信也注信無縮緩察其線而藏則雖敝不甐注甐故書或作鄰鄭司農云鄰讀為磨而不磷之磷謂韋革縫縷沒藏於韋革中則雖敝縷不傷也音義甐音吝或作鄰音同注同疏注釋曰先鄭云鄰讀為磨而不磷之磷者論語孔子辭韗人為臯陶注鄭司農云韗書或為􅕦臯陶鼓木也玄謂􅕦者以臯陶名官也􅕦則陶字從革音義韗況刃反衆家並音運􅕦音陶徒刀反疏注釋曰先鄭知臯陶鼓木者以上言為臯陶下即云長六尺有六寸鼓木之事明臯陶即是長六尺六寸者故知也玄謂􅕦者以臯陶名官者依先鄭從􅕦為鼓木還以􅕦為􅕦人之官是臯陶官名也􅕦即陶字從革若然後鄭謂􅕦人為臯陶不取韗字為官名長六尺有六寸左右端廣六寸中尺厚三寸注版中廣頭狹為穹隆也鄭司農云謂鼓木一判者其兩端廣六寸而其中央廣尺也如此乃得有腹音義穹起弓反下同疏注釋曰先鄭以經論鼓木一判更不言版數多少而知得有腹者以版兩端廣六寸中廣一尺自然有腹可知穹者三之一注鄭司農云穹讀為志無空邪之空謂鼓木腹穹隆者居鼓三之一也玄謂穹讀如穹蒼之穹穹隆者居鼓面三分之一則其鼓四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二也此鼓合二十版音義邪似嗟反疏注釋曰先鄭云穹讀為志無空邪之空者無所指斥故後鄭讀從穹蒼之穹也先鄭云穹隆者居鼓三之一也者言猶未足故後鄭增成玄謂穹讀如穹蒼之穹者謂從詩云以念穹蒼者也云穹隆者下至合二十版此鄭所言皆從二十版計之乃得面四尺及穹之尺數經既不言版數知二十版者此以上下相約可知何者此鼓言版之寬狹不言面之尺數下經二鼓皆言鼓四尺不言版之寬狹明皆有鼓四尺乃鼓版之廣狹也若然下二鼓皆云鼓四尺明此鼓亦四尺據面而言若然鼓木兩頭廣六寸面有四尺二十版二六十二長丈二尺圍三徑一是一丈二尺得面徑四尺矣以此面四尺穹隆加三之一三尺加一尺其一尺者取九寸加三寸其一寸者為三分取一分并之得一尺三寸三分寸之一也此據一廂而言倍之為二尺六寸三分寸之二乃知鼓面四尺總為六尺六寸三分寸之二也上三正注鄭司農云謂兩頭一平中央一平也玄謂三讀當為參正直也參直者穹上一直兩端又直各居二尺二寸不弧曲也此鼓兩面以六鼓差之賈侍中云普鼓大而短近普鼓也以普鼓鼓金奏音義三音參七南反近附近之近疏注釋曰先鄭據經云三正解之亦得合義但不定尺寸之數雖言三平恐平中有長短故後鄭增成之云三當讀為參正直也參直者穹上一直兩端又直各居二尺二寸是三處尺數等是為參直也云不弧曲也者下臯鼓倨句磬折即弧曲不參直故引證此為與彼異也云此鼓兩而者下經二鼓言四尺之面此經不言四尺之面故言之對祭祀三鼓四面已下云以六鼓差之者鼓人雷鼓祀天靈鼓祭地路鼓享鬼下二鼓據鼓人賁鼓鼓軍事臯鼓鼓役事惟此鼓經不言其名五鼓已配訖惟有普鼓當此鼓可知故引賈侍中云普鼓大而短近普鼓也此後鄭所解也云普鼓鼓金奏者鼓人文也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓注中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版穹六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺音義賁扶云反本或作又作鼖皆同疏釋曰云鼓四尺者謂鼓面也云中圍加三之一者謂將中央圍加于面之圍三分之一也注釋曰云面四尺其圍十二尺加以三分一四尺者添四面圍丈二尺為十六尺然後徑之十五尺徑五尺餘一尺取九寸徑三寸取餘一寸者破為三分得一分總徑五尺三寸三分寸一此言中圍加三之一與上穹三之一者異彼據一相之穹加面三之一故兩相加二尺六寸三分寸二此則于面四尺總加三分之一則總一尺三寸三分寸一若然此穹隆校少普鼓一尺三寸三分寸之一也與彼穹隆異也云今亦合二十版者此經云鼓四尺若不二十版亦不合此數也云則版穹六寸三分寸二者此亦據一相而言云大鼓謂之鼖者鼖訓為大對晉鼓長六尺六寸而言若對下文臯鼓長丈二尺則彼又大矣云鼖鼓鼓軍事者鼓人文為臯鼓長尋有四尺鼓四尺倨句磬折注以臯鼓鼓役事磬折中曲之不參正也中圍與鼖鼓同以磬折為異疏注釋曰云以臯鼓鼓役事者鼓人文磬折中曲之不參正也者磬折者粗處近上故不得參正也凡冒鼓必以啓蟄之日注啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所取象也冒蒙鼓以革注釋曰云啓蟄孟春之中也者正月立春莭啓蟄中故云中也云蟄蟲始聞雷聲而動者蟄蟲啓户由聞雷聲是鼓所取象故以此時冒之按月令仲秋云雷乃始收注雷乃收聲在地中動內物則此云孟春始聞雷聲而動者亦謂未出地時故蟄蟲聞之而動至二月即雷乃發聲出地蟄蟲啓户而出故月令仲春云日夜分雷乃發聲蟄蟲咸動啓户而出是也良鼓瑕如積環注革調急也疏注釋曰瑕與環皆謂漆之文理謂革調急故然若急而不調則不得然也鼓大而短則其聲疾而短聞音義聞音問下同鼓小而長則其聲舒而逺聞疏釋曰此乃鼓之病大小得所如上三者所為則無此病韋氏闕裘氏闕畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次也赤與黑相次也玄與黃相次也注此言畫繢六色所象及布采之第次繢以為衣疏釋曰此一經言次次畫于衣之事畫繢並言者言畫是總語以其繢繡皆須畫之言繢則據對方而言自東方已下是也自言東方謂之青至謂之黃六者先舉六方有六色之事但天玄與北方黑二者大同小異何者玄黑雖是其一言天止得謂之玄天不得言黑天若據北方而言玄黑俱得稱之是以北方云玄武宿也青與白相次已下論繢于衣為對方之法也注釋曰鄭云畫繢六色所象者解經地謂之黃已上文云及布采之第次者解經青與白已下文云繢以為衣者案虞書云豫欲觀古人之象日月星辰山龍華蟲作繢是據衣而言繢故鄭云繢以為衣也青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡注此言刺繡采所用繡以為裳疏釋曰此一經皆比方為繡次凡繡亦須畫乃刺之故畫繡二工共其職也注釋曰云繡以為裳者案虞書云宗彝藻火粉米黼黻絺繡鄭云絺紩也謂刺繡于裳故鄭云刺以為裳也衣在上陽陽主輕浮故畫之裳在下隂隂主沈重故刺之也土以黃其象方天時變注古人之象無天地也為此記者見時有之耳子家駒曰天子僭天意亦是也鄭司農云天時變謂畫天隨四時色疏釋曰此乃六色之外别增此天地二物于衣故于下特言之也注釋曰鄭云古人之象無天地也者此據虞書日月已下不言天地云為此記者見時有之耳者古人既無天地若記者不見時君畫于衣記人何因輒記之為經典也子家駒曰天子僭天意亦是也者按公羊傳云昭公謂子家駒云季氏僭于公室久矣吾欲殺之何如子家駒曰天子僭天諸侯僭天子彼云僭天者未知僭天何事要在古人衣服之外别加此天地之意亦是僭天故云意亦是也先鄭云天時變謂畫天隨四時色者天逐四時而化育四時有四色今畫天之時天無形體當畫四時之色以象天地若然畫土當以象地色也火以圜注鄭司農云為圜形似火也玄謂形如半環然在裳音義圜音環疏注釋曰先鄭云為圜形似火也後鄭云如半環然此亦與先鄭不别增減之耳孔安國以為大字也與此别也知在裳者虞書藻火已下皆在裳山以章水以龍注章讀為獐獐山物也在衣齊人謂麇為獐龍水物在衣音義獐音章麇俱倫反疏注釋曰馬氏以為獐山獸畫山者并畫獐龍水物畫水者并畫龍鄭即以獐表山以龍見水此二者各有一是一非古人之象有山不言獐有龍不言水今記人既有獐有水止可畫山兼畫獐畫龍兼畫水何有棄本而遵末也鳥獸蛇注所謂華蟲也在衣蟲之毛鱗有文采者疏注釋曰云所謂華蟲也者所謂虞書云山龍華蟲彼畫華蟲次在龍下此文亦次龍下故知當華蟲也言華者象章華言蟲者是有生之總號言鳥以其有翼言獸以其有毛言蛇以其有鱗以首似鷩亦謂之鷩冕也故云蟲之毛鱗有文采也虞書有十二章于此惟言四章又兼言天地而不云日月星藻與宗彞者記人之言略説之耳雜四時五色之位以章之謂之巧注章明也繢繡皆用五采鮮明之是為巧疏注釋曰此經總結上文也上有六色此言五者下别言素功故言五或可玄黑共説也凡畫繢之事後素功注素白采也後布之為其易漬汙也不言繡繡以絲也鄭司農説以論語曰繢事後素音義為于偽反易以䜴反鍾氏染羽以朱湛丹秫三月而熾之注鄭司農云湛漬也丹秫赤粟玄謂湛讀如漸車帷裳之漸熾炊也羽所以飾旌旗及王后之車音義湛子潛反或子鴆反又音鴆秫音述漸子潛反下漚漸同疏釋曰染布帛者在天官染人此鍾氏惟染鳥羽而已要用朱與秫則同彼染祭服有玄纁與此不異故也案染人云春暴練夏纁玄注云石染當及盛暑熱潤始湛研之三月而後可用若然云以朱湛丹秫三月而熾之熾之當及盛暑熱潤則初以朱湛丹秫當在春日豫湛至六月之時即染之矣注釋曰玄謂湛讀如漸車帷裳之漸者讀從衛詩也云羽所以飾旌旗及王后之車者司常云全羽為旞析羽為旌自餘旌旗竿首亦有羽旄巾車有重翟厭翟翟車之等皆用羽是也案夏采注云夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采此是鍾氏所染者也淳而漬之注淳沃也以炊下湯沃其熾蒸之以漬羽漬猶染也音義淳章均反注及下同疏注釋曰上熾之謂以朱湛丹秫三月末乃熾之即以炊下湯淋所炊丹秫取其汁以染鳥羽而又漸漬之也三入為纁五入為緅七入為緇注染纁者三入而成又再染以黑則為緅緅今禮俗文作爵言如爵頭色也又復再染以黑乃成緇矣鄭司農云以論語曰君子不以紺緅飾又曰緇衣羔裘爾雅曰一染謂之縓冉染謂之竀三染謂之纁詩云緇衣之宜兮玄謂此同色耳染布帛者染人掌之凡玄色者在緅緇之間其六入者與音義纁許云反緅側留反劉祖侯反復扶又反紺古閭反縓倉絹反范倉亂反竀勑貞反本又作赬亦作頳與音餘疏注釋曰凡染纁玄之法取爾雅及此相兼乃具按爾雅一染謂之縓再染謂之竀三染謂之纁三入謂之纁即與此同此三者皆以丹秫染之此經及爾雅不言四八及六入案士冠冇朱紘之文鄭云朱則四入與是更以纁入赤汁則為朱以無正文約四入為朱故云與以疑之云論語曰君子不以紺緅飾者淮南子云以涅染紺則黑于涅涅即黑色也纁若入赤汁則為朱若不入赤而入黑汁則為紺矣若更以此紺入黑則為緅而此五入為緅是也紺緅相類之物故連文云君子不以紺緅飾也若更以此緅入黑汁即為玄則六入為玄但無正文故此注與士冠禮注皆云玄則六入與更以此玄入黑汁則名七入為緇矣但緇與玄相類故禮家每以緇布衣為玄端也云禮俗文作爵言如爵頭色者以其爵赤多黑少故也筐人闕㡆氏湅絲以涗水漚其絲七日去地尺暴之注故書涗作湄鄭司農云湄水溫水也玄謂涗水以灰所泲水也漚漸也椘人曰漚齊人曰涹音義㡆音茫湅音練下同涗書鋭反漚烏豆反李又烏侯反暴步卜反劉步莫反下同湄劉音眉一音奴短反泲子禮反涹烏禾反又于偽反一音乃罪反疏注釋曰諸家及先鄭皆以涗水為溫水後鄭獨不從者禮有涗齊謂泲酒為涗則此涗亦當泲灰汁為涗故不從溫水也云齊人曰涹者亦是漚義晝暴諸日夜宿諸井七日七夜是謂水湅注宿諸井縣井中湅帛以欄為灰渥淳其帛實諸澤器淫之以蜃注渥讀如繒人渥菅之渥以欄木之灰漸釋其帛也杜子春云淫當為涅書亦或為湛鄭司農云澤器謂滑澤之器蜃謂灰也士冠禮曰素積白屨以魁柎之説曰魁蛤也周官亦有白盛之蜃蜃蛤也玄謂淫薄粉之令帛白蛤今海旁有焉音義欄音練李又來踐反或音蘭渥烏豆反與漚同注渥菅同蜃常軫反繒似陵反菅古顔反湛子潛反冠古亂反屨九具反魁苦回反又作魁柎方于反蛤古盍反粉如字劉方問反疏注釋曰鄭云渥讀如鄫人渥菅之渥者按哀八年吳伐魯云初武城人或有因于吳競田焉拘鄫人之漚菅者曰何故使吾水滋是其事引士冠禮曰素積白屨以魁柎之者謂皮辨服白布衣而素積以為裳屨裳同色故素積白屨白屨以蜃灰柎之也清其灰而盝之而揮之注清澄也於灰澄而出盝晞之晞而揮去其蜃音義盝音鹿揮音輝去起呂反而沃之而盝之而塗之而宿之注更渥淳之明日沃而盝之注朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也音義朝此一字張遙反餘皆朝廷之朝晝暴諸日夜宿諸井七日七夜是謂水湅疏釋曰湅帛湅絲者有三法上文為灰湅法此文是水湅法也周禮注疏卷四十周禮注疏卷四十考證輈人田馬之輈疏駑馬髙七尺駑當作騋見夏官廋人職文五分其頸圍去一以為踵圍注踵後承軫者也疏輈後承踵之處輈監本訛作踵殆因注文而誤也今改正良輈環灂疏即上云隧四寸三分一在外以揉其式隧下脫四尺二字四尺四寸隧深之度也冶氏是故倨句外博疏或謂之鏕吳揚之間謂之伐揚雄方言鏕作鏔伐作戈桃氏兩從半之疏謂劒脊兩面殺趨鍔脊訛刃依注改正鳧氏洗間謂之于疏對下甬衡甬監本訛作角今從下文舞上謂之甬甬上謂之衡改正十分其銑疏古之神瞽考中聲而量量以制度度律均鍾國語作考中聲而量之以制度律均鍾此引之略有異同鮑人之事注蒼頡篇有匏􅠙􅠙當作從瓦諸本皆訛説已見攻皮之工注韗人凡冒鼓必以啓蟄之日注啓蟄孟春之中也以啓蟄為正月中與今法異畫繢之事山以章水以龍此二句舊分二莭今從疏合解之故為一節周禮注疏卷四十考證
