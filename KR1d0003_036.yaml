body:
  text: 周禮注疏卷三十六漢鄭氏注唐陸德明音義賈公彥疏秋官司寇下布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達于四海注憲表也謂縣之也刑禁者國之五禁所以左右刑罰者司寇正月布刑于天下正嵗又縣其書于象魏布憲於司寇布刑則以旌節出宣令之於司寇縣書則亦縣之于門閭及都鄙邦國刑者王政所重故屢丁寧焉詰謹也使四方謹行之爾雅曰九夷八蠻六戎五狄謂之四海音義詰起吉反縣音懸下同疏釋曰云掌憲邦之刑禁者此文與正月以下為目禁者則士師之五禁所以左右刑罰故連刑言之也云正月之吉者此與大司寇正月之吉事同大司寇布刑之時此布憲亦布之於四方也於司寇正嵗縣之時此布憲亦憲邦之刑禁以詰四方邦國以達于四海也布憲為司寇屬官於刑禁為重故每事共丁寧之也注釋曰云國之五禁所以左右刑罰者士師職文知布憲所縣在門閭者以其司寇所縣在雉門不可共處此經云執旌節以為行道之使明在巷門之閭可知云門閭據在城內經雖不云城內門閭舉外以見內有門閭可知經先邦國後都鄙注先都鄙後邦國者以都鄙據畿內三等采地經後言之者尊邦國輕都鄙注先都鄙者既見門閭即先近後遠乃及四海故注先都鄙見從近及遠之義也引爾雅者見刑禁遠至夷狄名此夷狄為四海者海之言晦晦慢禮儀也凡邦之大事合衆庶則以刑禁號令疏釋曰云邦之大事合衆庶者謂征伐巡守田獵皆是大事合衆庶也以其是布禁之官故於聚衆每皆以刑禁號令也禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之注司猶察也察此四者告於司寇罪之也斬殺戮謂吏民相斬相殺相戮者傷人見血見血乃為傷人耳鄭司農云攘獄者距當獄者也遏訟者遏止欲訟者也𤣥謂攘猶郤也卻獄者言不受也疏注釋曰云司猶察也者此禁殺戮之官恆在民間私覘惡事而告於上執而與之罪也故以司為察也知斬殺戮是吏民相斬相殺相戮者以傷民云不以告則相殺戮之等盡是不以告明是吏民自相殺戮也云傷人見血見血乃為傷人耳者恐經傷人與見血事别傷人見血連言者是見血乃為傷人若不見血不為傷人也若然踠跌折肢之等不見血豈得不為傷人乎若今言見血乃為傷人者止為蹉跌及刃物麗歷應見血之等不為餘事而言先鄭云攘獄者距當獄者也後鄭不從者此經皆為未在官司而先鄭云距獄據在官而言故不從也云遏訟者遏止欲訟者也者有人見欺犯欲向官所訟之而遏止不使去也𤣥謂攘猶卻也卻獄者言不受也者謂人有罪過官有文書追攝不肻受者禁暴氏掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之注民之好為侵陵稱詐謾誕此三者亦刑所禁也力正以力强得正也音義嬌居表反好呼報反為于僞反下則為注皆為同謾武諫反一音亡半反又免仙反徐望山反本或作慢誕音但疏注釋曰云民之好為者此言為下三事而發皆是好為侵陵釋經亂暴力正者也稱詐釋經嬌誣犯禁者也謾誕釋經作言語而不信者也謾誕謂浮謾虛誕也凡國聚衆庶則戮其犯禁者以徇凡奚隸聚而出入者則司牧之戮其犯禁者注奚隸女奴男奴也其聚出入有所使疏釋曰云聚衆庶者謂征伐之等云凡奚隸聚而出入若謂國有煩辱之處使奚隸則有此出入而司牧之注釋曰案司厲其奴男子入於罪隸女子入于舂槀是男女同坐為奴天官酒人漿人之等皆名女奴為奚五隸又是男奴故云奚隸女奴男奴野廬氏掌達國道路至于四畿注達謂巡行通之使不陷絶也去王城五百里曰畿音義行下孟反疏注釋曰云巡行者國之道路使其地之人治之野廬氏直巡行不通之處使人治之使無陷絶也比國郊及野之道路宿息井樹注比猶較也宿息廬之屬賓客所宿及晝止者也井共飲食樹為蕃蔽疏注釋曰此經所云主為賓客在道須得供承守衛之事國郊謂近郊遠郊野謂百里外至畿宿謂十里有廬三十里有宿五十里有市直言宿者舉中言之故云廬之屬以包之息賓客晝止之處井樹者賓客所須者也若有賓客則令守涂地之人聚柝之有相翔者誅之注守涂地之人道所出廬宿旁民也相翔猶昌翔觀伺者也鄭司農云聚柝之聚擊柝以宿衛之也有姦人相翔於賓客之側則誅之不得令寇盜賓客音義柝音託令力呈反下欲令同疏注釋曰云守涂地之人道所出廬宿旁民也者道路之旁皆有民當處有賓客止宿即使聚柝之不使失脫也云相翔猶昌翔觀伺者也者謂昌狂翺翔觀伺賓客先鄭云聚柝之聚擊柝以宿衛之也者謂其地之人自聚擊柝無行夜故使宿衛自擊宫正之等使行夜者擊柝較比直宿者彼行夜者與此異也凡道路之舟車轚互者敘而行之注舟車轚互謂於迫隘處也車有轘轅坻閣舟有砥柱之屬其過之者使以次敘之音義轚音計沈古的反隘烏賣反環户關反本亦作轘同坻徐之爾反劉都禮反砥音㫖疏注釋曰云轚互者謂水陸之道舟車往來狹隘之所更五相轚故云轚互也云車有轘轅坻閣者案襄三十一年晉欒盈有罪適楚過于周周西鄙掠之告於周使侯出諸轘轅是轘轅也坻閣道路之名也云舟有砥柱之屬者案禹貢導河積石至于龍門南至于華隂東至于底柱孔安國云底柱山名河水分流包山而過山見水中若拄然在西虢之界是底柱為水之隘道者也凡有節者及有爵者至則為之辟注辟辟行人亦使守涂地者疏釋曰云凡有節者謂若諸侯之使則有山國用虎節之等若民自往來則有道路用旌節之等及有爵已上皆為之辟止行人使無侵犯者也禁野之橫行徑踰者注皆為防奸也橫行妄由田中徑踰射邪趍疾越隄渠也音義射食亦反邪似嗟反隄丁兮反疏注釋曰言橫行者不要東西為橫南北為縱但是不依道塗妄由田中皆是橫也徑謂不遵道而射邪趍疾踰越也謂越隄渠者也凡國之大事比修除道路者注比校治道者名若今次金叙大功疏注釋曰大事謂若征伐巡守田獵郊祀天地王親行所經竝須修除道路及修廬校比民夫使有功效故云比校治道者名也云若今次金叙大功者謂漢時主役之官官名次金叙主以丈尺賦功今俗本多誤為次叙大功也掌凡道禁注禁謂若今絶蒙布巾持兵杖之屬音義杖直亮反疏注釋曰古時禁書亡故舉漢法而言也邦之大師則令掃道路且以幾禁行作不時者不物者注不時謂不夙則莫者也不物謂衣服操持非比常人也幾禁之者備姦人內賊及反閒音義莫音暮操七曹反閒閒厠之閒疏注釋曰不言大事而云大師惟謂征伐者也云幾禁之者備姦人內賊及反閒者內賊謂賊在內起反閒謂外賊密來覘探閒候國家反彼論說按孫子兵法云三軍之事莫密於反閒是也蠟氏掌除胔注曲禮四足死者曰漬故書胔作脊鄭司農云脊讀為㱴謂死人骨也月令曰掩骼埋胔骨之尚有肉者也及禽獸之骨皆是音義蠟清預反胔似賜反注㱴胔皆同㱴又作漬脊子亦反李慈益反骼古百反疏注釋曰曲禮者彼謂四足之獸相漸漬而有疫死此胔謂肉腐義理有殊引之者直取音同仍取四足死者即有肉腐之胔也先鄭云死人骨也者以人骨為主其中兼四足之骨也月令者彼據孟春春是生氣骨是死氣為死氣逆生氣故埋之此官在秋者是隂故屬秋引之者除胔是同故也彼注云骨枯曰骼肉腐曰胔胔言埋亦掩之骼言掩亦埋之義無異互言耳故云腐骨之尚有肉者也則肉腐曰胔亦一也云及禽獸之骨皆是者即四足曰漬在其中按詩云行有死人尚或殣之又下云若有死於道路者則令埋之今得有死人骨者近道人見者令埋之其有死於溝壑者蠟氏除之凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賓客亦如之注蠲讀如吉圭惟饎之圭圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服服衰絰也此所禁除者皆為不欲見人所薉惡也音義蠲古弦反舊音圭潔也饎昌志反罷音皮衰七雷反為于僞反下為其陷為其就禽同薉紆廢反今本多作穢惡烏路反疏釋曰大祭祀謂郊祭天地大賓客為諸侯來朝若據天地其神位在郊至郊而已若賓客則至畿故兼言野郊外曰野大總言也注釋曰云蠲讀如吉圭惟饎之圭者毛詩云吉蠲為饎無此言鄭從三家詩故不同云刑者黥劓之屬者之屬中含有宫刖也云任人司圜所收教罷民也者經任人文承刑者之下則罷民亦刑之類是以司圜云任之以事是也凶服五服皆是故曰凶服服衰絰也祭者皆齊齊者潔靜不欲見穢惡也若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人注有地之官主此地之吏也其人其家人也鄭司農云楬欲令其識取之今時楬櫫是也有地之官有部界之吏今時鄉亭是也音義楬音竭縣音懸疏注釋曰此經主謂行人在路死者云有地之官主此地之吏也者謂比閭族黨之等皆有長吏若比長閭胥黨正之輩皆是若今時鄉亭治事之處縣衣服任器等仍使守掌使不失也掌凡國之胔禁注禁謂孟春掩骼埋胔之屬疏注釋曰孟春者月令文也雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者秋令塞阱杜擭注溝瀆澮田間通水者也池謂陂障之水道也害於國稼謂水潦及禽獸也阱穿地為塹所以禦禽獸其或超踰則陷焉世謂之陷阱擭柞鄂也堅地阱淺則設柞鄂於其中秋而杜塞阱擭收刈之時為其陷害人也書粊誓曰􅖏乃擭敜乃阱時秋也伯禽以出師征徐戎音義澮古外反阱在性反塹也擭胡化反陂披宜反障之尚反􅢾七艷反本又作塹柞劉才伯反戚在洛反鄂劉五格反戚五各反粊音祕􅖏音杜敜乃協反又乃結反徐劉本作䣄音徐疏釋曰掌溝瀆澮池之禁凡害於國稼者溝瀆澮池或田間通水或在田外所須本為利民而造其中有放溢奔流為害者則禁之凡害於國稼者謂水潦之等春令為阱擭溝瀆之利於民者阱擭以取禽獸溝瀆所以通水是皆利於民故春使為之也注釋曰云溝瀆澮田間通水者也者按遂人匠人惟有遂溝洫澮川不見有瀆此云瀆亦田間通水者但注瀆曰川或可以川為瀆舉其類也云池謂陂障之水道也者詩云彼澤之陂毛云澤障曰陂今云陂障之水道謂障澤為陂之時於澤通水入陂之道曰池云阱穿地為􅢾者此則深為不須别設柞㮙擭則堅地不可得深故須柞鄂柞鄂者或以為豎柞於中向上鄂鄂然所以載禽獸使足不至地不得躍而出謂之柞鄂也書粊誓者彼云魯侯伯禽宅曲阜徐戎竝興伯禽往征有此塞阱杜擭之事故引以為證云時秋也者彼不見時節但此說在秋明彼亦秋故得有􅖏擭敜阱之事也禁山之為苑澤之沈者注為其就禽獸魚鱉自然之居而害之鄭司農云不得擅為苑囿於山也澤之沈者謂毒魚及水蟲之屬音義苑於阮反劉於願反疏注釋曰先鄭云不得擅為苑囿於山義雖與後鄭異得為一義故引之在下文云沈者謂毒魚及水蟲之屬者謂别以藥沈於水中以殺魚及水蟲不謂鴆故不作鴆作沈也萍氏掌國之水禁注水禁謂水中害人之處及入水捕魚鱉不時音義捕音步疏注釋曰水中害人之處或有深泉洪波沙蟲水弩云捕魚鱉不時者案月令春秋及冬取魚夏不合取魚夏取則不時故云不時皆禁之也幾酒注苛察沽買過多及非時者音義苛音何又呼何反沽音姑又音故買如字一本作賣疏釋曰萍氏幾酒者酒亦水之類故也不得非時時謂若酒誥惟祀兹酒及鄉飲酒及昏娶為酒食以召鄉黨僚友是其時也謹酒注使民節用酒也書酒誥曰有政有事無彝酒疏釋曰此戒謹慎於酒故引酒誥有政之大臣有事之小臣彝常也不得常飲明如上文合飲時乃飲也禁川游者注備波洋卒至沈溺也音義洋音翔又音羊卒寸忽反疏釋曰游謂浮游不乘橋船恐溺故禁之也司寤氏掌夜時注夜時謂夜晚早若今甲乙至戌疏注釋曰此文與下為目故注云謂夜晚早甲乙則早時戌亥則晚時也以星分夜以詔夜士夜禁注夜士主行夜徼候者如今都候之屬音義行下孟反下行夜同徼古弔反疏注釋曰云以星分夜者若今時觀參辰知夜早晚是以書傳云春昏張中可以種稷夏大火中可以種黍菽秋虛中可以種麥冬昴中可以收斂蓋藏彼雖非分夜以詔夜士亦是以星知早晚之類也言行夜徼候者若宫伯掌授八次八舍注云於徼候便也則行夜來往周旋謂徼候者也禦晨行者禁宵行者夜遊者注備其遭寇害及謀非公事禦亦禁也謂遏止之無刑法也晨先明也宵定昏也書曰宵中星虛春秋傳曰夜中星隕如雨音義先悉薦反隕于敏反疏注釋曰晨亦得名旦月令云旦尾中亦得名曰明案三光考靈耀云日入三刻為昏不盡三刻為明昏亦得名星故奔喪云日行百里不以夜行惟父母之喪見星而行見星而舍明見星時即為夜也如是宵亦得名曰昏昏參中是也亦名日夜爾雅云宵夜也然則夜是明之首不通於前宵是昏之末不通於後也惟夜中之時止一名耳此云禁晨行者禁宵行者謂在道路中禮志云男女夜行以燭謂在宫中也晨行宵行者惟罪人與奔父母之喪若天子祭天之時則通夜而行故禮記云泛掃反道鄉為田燭禁夜遊者禁其無故遊者引春秋者莊公七年夏四月辛卯夜中星隕如雨是也司烜氏掌以夫遂取明火於日以鑒取明水於月以共祭祀之明齍明燭共明水注夫遂陽遂也鑒鏡屬取水者世謂之方諸取日之火月之水欲得隂陽之潔氣也明燭以照饌陳明水以為𤣥酒鄭司農云夫發聲明齍謂以明水滫滌粢盛黍稷音義夫方符反或云司農音符齍音資注作粢同疏注釋曰云夫遂陽遂也者以其日者太陽之精取火於日故名陽遂取火於木為木遂者也鑒鏡屬者詩云我心匪鑒不可以茹彼鑒是鏡可以照物此鑒形制與彼鑒同所以取水也云取水者世謂之方諸者漢世謂之方諸言取水謂之方諸則取火者不名方諸别名陽遂也明者潔也日月水火為明水明火是取日月隂陽之潔氣也云明燭以照饌陳者謂祭日之旦饌陳於堂東未明須燭照之云明水以為𤣥酒者鬱鬯五齊以明水配三酒以𤣥酒配𤣥酒井水也𤣥酒與明水别而云明水以為𤣥酒者對則異散文通謂之𤣥酒是以禮運云𤣥酒在堂亦謂明水為𤣥酒也先鄭云明水滫滌粢盛黍稷者滫謂滫瀡滌謂蕩滌俱謂釋米者也凡邦之大事共墳燭庭燎注故書墳為蕡鄭司農云蕡燭麻燭也𤣥謂墳大也樹於門外曰大燭於門內曰庭燎皆所以照衆為明音義墳扶云反燎力召反蕡扶云反李一音婦輩反疏釋曰大事者謂若大喪紀大賓客則皆設大燭在門外庭燎在大寢之庭注釋曰先鄭從故書蕡為麻燭者以其古者未有麻燭故不從是以禮記少儀云主人執燭抱燋鄭云未爇曰燋是知未有麻燭也後鄭云樹於門外曰大燭者非人所執也燕禮云甸人執大燭於庭不言樹者彼諸侯燕禮不樹於地使人執彼注云庭大燭為位廣也此言大燭亦為位廣又樹之於地也云於門內曰庭燎者於門內在庭中故謂之庭燎庭燎與大燭亦一也皆所以照衆為明是以詩庭燎云夜如何其夜未央庭燎之光君子至止鸞聲將將謂宣王時諸侯來朝之事按郊特牲云庭燎之百由齊桓公始也鄭云庭燎之差公蓋五十侯伯子男皆三十大戴禮文其百者天子禮庭燎所作依慕容所為以葦為中心以布纒之飴蜜灌之若今蠟燭百者或以百根一處設之或百處設之若人所執者用荆燋為之執燭抱燋曲禮云燭不見跋是也中春以木鐸修火禁于國中注為季春將出火也火禁謂用火之處及備風燥音義中音仲為于僞反下為葬皆為同燥素早反又素報反疏注釋曰云為季春將出火也者三月昏時大辰星在卯南見是火星出此二月未出故云為季春將出火也軍旅修火禁邦若屋誅則為明竁焉注鄭司農曰屋誅謂夷三族無親屬收葬者故為葬之也三夫為屋一家田為一夫以此知三家也𤣥謂屋讀如其刑剭之剭剭誅謂所殺不於市而以適甸師氏者也明竁若今揭頭明書其罪法也司烜掌明竁則罪人夜葬與音義竁昌鋭反剭徐音屋劉音握與音餘疏釋曰屋誅謂甸師氏屋舍中誅則王之同族及有爵者也是以易鼎卦云鼎折足覆公餗其刑屋鄭義以為餗美饌鼐三足三公象若三公傾覆王之美道屋中刑之與此同云為明竁焉者明用刑以板書其姓名及罪狀著於身竁壙中也注釋曰先鄭以屋為夫三為屋者謂夷三族解之後鄭不從者夷三族乃是戰國韓信等用商鞅連相坐之法造三夷之誅既亂世之法何得以解太平制禮之事乎鄭知罪人亦有明刑書於木者見昭二年鄭公孫黑作亂子産數其罪云不速死大刑將至七月壬寅縊尸諸周氏之衢加木焉注云書其罪於木以加尸上而罪之非禮故書殺以惡黑知明刑者書可知知夜葬者以其司烜主明火掌夜事既令掌之則罪人夜葬可知故曾子問云見星而行者惟罪人是夜葬之事也條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人注趨辟趨而辟行人若今卒辟車之為也孔子曰富而可求雖執鞭之士吾亦為之言士之賤也音義趨七須反辟婢亦反又音避劉薄易反徐扶亦反注趨辟辟行人同卒子忽反下羡卒同辟車必亦反又婢亦反疏釋曰按序言條狼氏下士六人胥六人徒六十人今云天子八人少二人矣蓋取胥徒中兼充也凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨注前謂所誓衆之行前也有司讀誓辭則大言其刑以警所誓也誓者謂出軍及將祭祀時也出軍之誓誓左右及馭則書之甘誓備矣郊特牲說祭祀之誓曰卜之日王立于澤親聽誓命受教諫之義也車轘謂車裂也師樂師也大史小史主禮事者鄭司農云誓大夫曰敢不關謂不關於君也𤣥謂大夫自受命以出則其餘事莫不復請音義轘户串反一音環大音泰注同行户剛反警京領反復劉音服請劉音情疏釋曰誓自有大官若月令田獵司徒北面以誓之誓時此條狼氏則為之大言使衆聞知故云且命之誓僕右者僕大僕與王同車故大僕職云軍旅贊王鼓注云佐擊其餘面通右與馭及王四乘也右謂勇力之士在車右備非常誓馭謂與王馭車者也注釋曰云謂出軍及將祭祀時也者若且命以下軍旅祭祀同有此事僕有四乘據軍旅時師與大史小史皆據祭祀時大夫敢不關亦據祭祀須關君是以鄭引甘誓證軍旅引郊特牲證祭祀也云甘誓備矣者按甘誓云左不攻于左汝不恭命右不攻于右汝不恭命馭非其馬之正汝不恭命用命賞于祖弗用命戮于社豫則孥戮汝是其備也郊特牲者王將祭之時故云卜之日王立于澤謂在澤宫也澤宫者擇士可與祭者之宫親自聽有司誓命此是受教諫之義也云車轘謂車裂也者春秋左氏傳云轘觀起於四境是也師知是樂師者以其下有大史小史皆掌禮禮樂相將故知師是樂師大師瞽人之長也鄭司農云誓大夫曰敢不關謂不關於君也此先鄭義未足故後鄭增成之𤣥謂大夫自受命以出則其餘事莫不復請言此者欲見受命出征外之事將軍裁之不須復請除此以外其餘皆須請於君乃得行事是以襄公十九年秋七月辛卯齊侯環卒晉士丐帥師侵齊至穀聞齊侯卒乃還公羊傳曰還者何善辭也何善爾大其不伐喪也此受命于君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也是其不復請君之事也若榖梁大夫雖在外猶當復請于君不敢專故曰還者事未畢之辭也受命而誅生死無所加其怒不伐喪善之也善之則何為未畢也君不尸小事臣不専大名善則稱君過則稱已則民作讓矣士丐外專君命故非之也然則為士丐者宜奈何宜墠帷而歸命乎介是其雖在外不得專命之事也修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之注國中城中也粥養也國所游養謂羡卒也追逐寇也胥讀為偦故書互為巨鄭司農云宿謂宿衛也巨當為互謂行馬所以障互禁止人也柝謂行夜擊柝音義比毗志反下同宿如字劉息就反粥音育追如字劉張類反偦音胥又息吕反疏釋曰云掌比國中宿互柝者互謂行馬所以為遮障宿者所守衛柝者謂宿復擊柝持更也云與其國粥者謂國家粥養未入正卒且為羡卒者云而比其追胥者使此羡卒追而逐冦胥為伺搏盜賊二事也禁徑踰者與以兵革趨行者與馳騁於國中者注皆為其惑衆疏釋曰以其職作修閭當修理門閭故禁此三者也邦有故則令守其閭互唯執節者不幾注令者令其閭內之閭胥里宰之屬疏注釋曰邦有故謂有寇戎大喪札喪皆是恐有姦非則命各遣守閭閭巷門有執節公使者不幾訶也但言閭惟據鄉內注兼云里宰者官名修閭以六鄉為主其實兼主六遂故言里宰以包之也冥氏掌設弧張注弧張罿罦之屬所以扃絹禽獸音義冥音覓罿昌容反劉上凶反罦音浮扃古熒反絹古犬反一音古縣反翨氏注同疏注釋曰弧弓也謂張弓以取猛獸云罿罦之屬者詩云雉罹于罿雉罹于罦竝是取禽獸之物言之屬仍有罝之等皆是扃絹禽獸者也為阱擭以攻禽獸以靈鼓驅之注靈鼓六面鼓驅之使驚趨阱擭音義驅丘于反後同疏注釋曰知靈鼓六面者以鼓人云靈鼓鼓社祭晉鼓鼖鼓等非祭祀之鼓竝兩面路鼓祭宗廟故知加兩面為四面地神尊於宗廟加四面為六面天尊於地神加兩面為八面以此差之知靈鼓六面鼓也若得其獸則獻其皮革齒須備注鄭司農云須直謂頤下須備為搔也音義搔音爪疏釋曰猛獸有不得之法故云若以不定之言也若得猛獸之時猛獸之肉不堪人噉故當獻其皮革須備也皮謂若虎豹熊羆革謂無文章者去毛而獻之齒即牙也須備如先鄭所說虎豹有須備獻之以擬器物之用也庶氏掌除毒蠱以攻說禬之嘉草攻之注毒蠱毒物而病害人者賊律曰敢蠱人及教令者棄市攻說祈名祈其神求去之也嘉草藥物其狀未聞攻之謂燻之鄭司農云禬除也𤣥謂此禬讀如潰癰之潰音義庶章預反蠱音古禬劉音潰户內反草音草本亦作草令力呈反去起吕反燻許云反疏釋曰除毒蠱目言之攻說禬之據云其神也嘉草攻之據去其身者也注釋曰云攻說祈名者大祝六祈有類造禬榮攻說故知也先鄭云禬除也後鄭增成其義潰癰之潰俗讀也凡驅蠱則令之比之注使為之又校次之疏釋曰云驅之止謂用嘉草燻之時并使人驅之既役人衆故須校比之穴氏掌攻蟄獸各以其物火之注蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於六外以誘出之乃可得之疏注釋曰如熊羆之屬者鄭目驗而知猛獸之蟄惟有熊羆之屬也言以其物火之明是燒其所食之物誘之使出穴外乃可得也以時獻其珍異皮革疏釋曰謂熊羆之皮革及熊蹯之等翨氏掌攻猛鳥各以其物為媒而掎之注猛鳥鷹隼之屬置其所食之物於絹中鳥來下則掎其腳音義掎居綺反注同隼息允反疏注釋曰云各以其物為媒者若今取鷹隼者以鳩鴿置於羅網之中以誘之云鷹隼之屬者王制云鷹隼擊然後罻羅設易云公用射隼於高墉之上隼即謂之鶻者也以時獻其羽翮音義翮户革反柞氏掌攻草木及林麓注林人所養者山足曰麓音義柞側百反麓音鹿疏注釋曰此柞氏與剃氏治地皆擬後年乃種田但下有剃氏除草此柞氏攻木兼云草者以攻木之處有草兼攻之故云草也云林人所養者若林衡所掌者未必人所養此乃人所攻治以擬種殖故知此林麓人所養治者也漆林之征亦此類也山足曰麓爾雅文林麓謂麓上有林者也此掌攻與下文為目也夏日至令刋陽木而火之冬日至令剝隂木而水之注刋剝互言耳皆謂斫去次地之皮生山南為陽木生山北為隂木火之水之則使其肄不生音義刋若干反去起吕反肄以四反疏釋曰夏日至謂五月夏至之日為之也令刋陽木而火之謂先刋削以去其皮乃燒之冬日至謂十一月冬至之日為之剝隂木而水之亦謂剝去其皮乃水之此與下文相兼乃足也必以夏刋陽木冬剝隂木者夏至之日則隂生冬至陽生陽木得隂而鼓隂木得陽而發故須其時而刋剝之也山虞取其堅刃冬斬陽夏斬隂此欲死之故夏陽木冬隂木注釋曰云刋剝互言耳者謂削之亦剝之剝謂剝去其皮亦削之故云互也云生山南為陽木生山北為隂木者爾雅云山南曰陽山北曰隂云火之水之則使其肄不生者斬而復生曰肄若以水火斬而不復重生故云使其肄不生也若欲其化也則春秋變其水火注化猶生也謂時以種榖也變其水火者乃所火則水之所水則火之則其土和美疏注釋曰此覆釋上文此刋本正欲種田生榖故云若欲使前刋木之土生榖則當以春秋變其水火也變之者前文云夏日至刋陽木火之者至秋以水漬之前冬日至剝隂木以水之者至後春以火燒之如此則地和美也凡攻木者掌其政令注除木有時疏注釋曰凡國家有欲攻木者皆來取柞氏政令所以取政令者除木有時如上冬夏者也剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之注故書萌作甍杜子春云甍當為萌謂耕反其萌牙書亦或為萌𤣥謂萌之者以茲其斫其生者夷之以鉤鎌迫地芟之也若今取茭矣含實曰繩芟其繩則實不成孰耜之以耜側凍土剗之音義繩音孕以證反注同芟所銜反甍音萌其音基茲其鉏也鎌音兼茭音交剗初産反劉則展反疏注釋曰此剃氏所掌治地從春至冬亦一年之事後年乃可種也子春云萌謂耕反其萌芽後鄭不從者此經云殺草則是萌謂草始生出地之時非是十一月草木萌動其色赤十二月芽其色白何得耕反其萌芽乎以是不從子春之說也𤣥謂萌之者以茲其斫其生者漢時茲其即今之鋤也云夷之以鉤鎌迫地芟之也若今取茭矣者見今取茭草亦於夏迫地取之故舉為況也云含實曰繩者秋時草物含實也云耜之以耜側凍土剗之者耜廣五寸謂耒頭金冬時地凍故以耜附側凍土剗之如此春種則地和美若欲其化也則以水火變之注謂以火燒其所芟萌之草已而水之則其土亦和美矣月令季夏燒剃行水利以殺草如以熱湯是其一時著之掌凡殺草之政令硩蔟氏掌覆夭鳥之巢注覆猶毁也夭鳥惡鳴之鳥若梟鵩音義覆芳復反注同夭音妖後夭鳥同梟于嬌反鵩音服疏注釋曰禮記云無覆巢者謂非夭鳥者也此官覆毁夭鳥之巢窠也云梟鵩者梟之與鵩二鳥俱是夜為惡鳴者也以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣其巢上則去之注方版也日謂從甲至癸辰謂從子至亥月謂從娵至荼歲謂從攝提格至赤奮若星謂從角至軫夭鳥見此五者而去其詳未聞音義縣音懸娵徐劉竝子須反荼劉沈音餘李音舒又音徒按爾雅正月為娵即離騷所云攝提貞于孟陬皆側留反又子侯反爾雅又云十二月為涂音徒今注作娵荼二字是假借耳當依爾雅讀從攝提格至赤奮若爾雅曰太歲在寅曰攝提格在丑曰赤奮若疏注釋曰云日謂從甲至癸者據十幹而言辰謂從子至亥者據十二支而說月謂從陬至荼歲謂從攝提格至赤奮若者彼爾雅釋天文太歲在寅曰攝提格在卯日單閼在辰曰執徐在己曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰暗茂在亥曰大淵獻在子曰困敦在丑曰赤奮若是也又云正月為泰二月為如三月為寎四月為余五月為皋六月為且七月為相八月為壯九月為𤣥十月為陽十一月為辜十二月為涂是也星謂從角至軫右旋數之翦氏掌除蠧物以攻禜攻之以莽草熏之注蠧物穿食人器物者蠧魚亦是也攻禜祈名莾草藥物殺蠱者以熏之則死故書蠧為櫜杜子春云櫜當為蠧音義蠧丁故反攻如字劉音貢禜音詠莾亡蕩反又莾草藥名櫜劉古毛反本或作橐他各反疏釋曰以攻榮攻之據祈去其神故以六祈而言之以莽草熏之據去其身也注釋曰云蠧魚亦是者除蠧物穿食餘器物至於蠧魚惟見書內有白魚及白蠧食書故云亦是也凡庶蠱之事注庶除毒蠱者蠱蠧之類或熏以莽草則去音義庶章預反疏注釋曰翦氏主除蠧物其蠱毒自是庶氏今此云凡庶蠱者同類相兼左右而掌之故鄭云庶除毒蠱者蠱蠧之類或熏以莽草則去此鄭解翦氏兼掌蠱之意以其翦氏有用莽草熏蠧是以蠱毒亦使翦氏除之也赤犮氏掌除牆屋以蜃炭攻之以灰灑毒之注灑灑也除牆屋者除蟲豸藏逃其中者蜃大蛤也搗其炭以坌之則走淳之以灑之則死故書蜃為晨鄭司農云晨當為蜃書亦或為蜃音義唇市軫反灑色買反劉霜寄反豸直氏反坌蒲悶反淳之純反疏釋曰赤犮氏掌除蠱豸自藏埋者今不指其蠱豸之名直云除牆屋者以其蠱豸自埋藏人所不見故不指蠱而云牆屋所藏之處而已爾雅有足曰蠱無足曰豸藏逃之類有此二者淳即沃也謂灑沃以汁則死也蜃炭地官掌蜃以共蜃炭蜃炭者謂蜃灰是也凡隙屋除其貍蟲注貍蟲䗪肌求之屬音義貍莫皆反劉莫拜反䗪章夜反肌居其反求本或作蛷音求劉音俱疏釋曰禮記云如駟之過隙隙謂孔穴也埋藏之蠱在屋孔穴之中故以隙屋言之注釋曰䗪肌蛷皆是自貍之蟲也蟈氏掌去蛙黽焚牡蘜以灰灑之則死注牡蘜蘜不華者齊魯之閒謂蛙為蟈黽耿黽也蟈與耿黽尤恐鳴為聒人耳去之音義去起吕反注去之同蛙户媧反黽莫幸反牡莫口反蘜弓六反為聒于僞反聒古活反銜枚氏放此疏釋日掌去蛙黽此文與下為目也注釋曰云牡蘜蘜不華者此則月令季秋云蘜有黃華是牝蘜也云齊魯之閒謂蛙為蟈者官號蟈氏及經無云蟈故鄭以齊魯之言為證蛙即蟈故名蟈氏也以其煙被之則凡水蟲無聲注杜子春云假令風從東方來則於水東面為煙令煙西行被之水上音義被皮義反注同令力呈反注同疏釋曰上文云焚牡蘜灑之則死此經云以其煙明還用牡蘜之煙被之水上也壺涿氏掌除水蟲以炮土之鼓驅之以焚石投之注水蟲狐蜮之屬故書炮作泡杜子春讀炮為苞有苦葉之苞𤣥謂燔之炮之之炮炮土之鼓瓦鼓也焚石投之使驚去音義炮步交反注炮苞同蜮音或燔音煩疏注釋曰云水蟲狐蜮之屬者蜮即短狐一物南方水中有之含沙射人則死者也言之屬者水蟲衆矣故云之屬以包之子春讀從詩苞有苦葉之苞者取其聲同耳不取義也𤣥謂燔之炮之之炮者亦讀從詩此取炮燒之義故云炮土之鼓瓦鼓也云焚石投之使驚去者石之燔燒得水作聲故驚去也若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵注神謂水神龍罔象故書橭為梓午為五杜子春云梓當為橭橭讀為枯枯榆木名書或為樗又云五貫當為午貫音義橭劉音沽杜讀為枯劉亦音枯案如杜義則音姑山榆也梓音子本或作橭樗敕居反疏釋曰云以牡橭午貫象齒而沈之者按儀禮大射云若丹若墨度尺而午彼物射者所履記安足之處十字為之今此亦然神謂水神龍罔象也橭讀為枯枯榆木名以橭為幹穿孔以象牙從橭貫之為十字沈之水中則其神死淵為陵所謂深谷為陵者也庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢射之注不見鳥獸謂夜來鳴呼為怪者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食所作弓矢𤣥謂日月之食隂陽相勝之變也於日食則射太隂月食則射太陽與音義射食亦反下注同呼喚故反下文􅑧呼同大音泰下文同與音餘疏釋曰云掌射國中之夭鳥者城郭之所人聚之處不宜有夭鳥故去之注釋曰云獸狼狐之屬不言鳥者上文注梟鵩已解也𤣥謂日月之食隂陽相勝之變也者日之食晦朔之間月之食惟在於望日食是隂勝陽月食是陽勝隂未至為災故云隂陽相勝之變也所以救日月用弓矢射之者鄭以意推量日食則射太隂者以隂侵陽臣侵君之象故射太隂是其常不足可疑月食是陽侵隂君侵臣之象陽侵隂非逆既用弓不得不射若射當射太陽以是為疑故云月食則射太陽與以疑之若神也則以大隂之弓與枉矢射之注神謂非鳥獸之聲若或呌于宋太廟嘻嘻出出者太隂之弓救月之弓枉矢救日之矢與不言救月之弓與救日之矢者互言之救日用枉矢則救月以恆矢可知也音義嘻許其反詘劉音出本亦作出疏釋曰若神也者謂不見其身直聞其聲非鳥獸之神耳則以太隂救月之弓與救日枉矢射之注釋曰鄭知神謂非鳥獸之聲者見宋太廟有聲非鳥獸之聲既有聲又非鳥獸之聲故知是神聲若神降于莘之類是也云若或呌於宋大廟嘻嘻出出者左傳文云大隂救月之弓枉矢救日之矢與者大隂之弓為救月之弓不言與則不疑不疑者以其與經云救日之弓相對彼言救日之弓明此大隂之弓是救月之弓可知若然上言救月之矢則此枉矢是救日可知而言與以疑之者但救日與大隂相對故不疑上言救月此不言大陽之矢直言枉矢矢名而已故須疑之云不言救月之弓與救日之矢者互言之者若此文云救月之弓與救日之矢為文自足何假須互既不須互則上下二文全不見弓矢之名矣是以互見其文欲見有弓矢之名故也互者上文云救日明太隂是救月此文救月是大隂則上文救日是太陽也又枉矢見矢名不言救明有救名救月之矢見救不見矢名明亦有名亦是互也云救日用枉矢則救月以恆矢可知也者見司弓矢枉矢最在前明救月矢當在枉矢之下故知救月用恆矢可知不用庳矢以其庳矢弩所用故也銜枚氏掌司囂注察囂攘者為其聒亂在朝者之言語音義囂五羔反下同歡呼凡反朝直遙反下同疏注釋曰以銜枚不得語是止歡囂之官故掌司察囂歡之事國之大祭祀令禁無囂注令令主祭祀者疏注釋曰國之大祭祀謂天地宗廟令主祭祀之官使禁止無得歡囂歡囂則不敬鬼神故也軍旅田役令銜枚注為其言語以相誤疏注釋曰軍旅田役二者銜枚氏出令使六軍之士皆銜枚止言語也禁􅑧呼歎嗚於國中者行歌哭於國中之道者注為其惑衆相感動嗚吟也音義􅑧音呌吟魚今反疏注釋曰此經四事皆是在道為之為其惑衆釋􅑧呼歌也相感動解嘆嗚與哭也云嗚吟也者以嗚與嘆相連則嗚是歎之類故知嗚吟也伊耆氏掌國之大祭祀共其杖咸注咸讀為函老臣雖杖於朝事鬼神尚敬去之有司以此函藏之既事乃授之音義函音咸去起吕反疏注釋曰下二文云授杖此經惟言共杖函止謂祭祀時臣雖老合杖但為祭祀尚敬暫去之去杖之時共杖函盛之祭祀訖還與老臣柱之老臣雖杖於朝事鬼神尚敬去之謂七十有德君不許致仕者也王制云七十杖於國八十杖於朝謂得致仕者與此異也軍旅授有爵者杖注别吏卒且以扶尊者將軍杖鉞音義别彼烈反卒子忽反杖直亮反又音丈鉞音越疏注釋曰此謂在軍之時有爵謂士以上若然自伍長下士兩司馬中士卒帥上士旅帥下大夫師帥中大夫等竝得杖云别吏卒者吏則命士以上卒謂一乘車步卒七十二人等若然甲士三人亦是民之無爵亦與步卒同無杖也知將軍杖鉞者今文泰誓師尚父左杖黃鉞右把白旄是將軍杖鉞之事也共王之齒杖注王之所以賜老者之杖鄭司農云謂年七十當以王命受杖者今時亦命之為主杖𤣥謂王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝疏注釋曰既共王之齒杖明皆據王賜老者之杖而言若不得王賜者自拄之也先鄭惟據七十故後鄭增成之引王制為證也周禮注疏卷三十六周禮注疏卷三十六考證邦之大師石經大師上有有字司寤氏掌夜時注若今甲乙至戌臣紱按甲乙丙丁戊為五夜此作戌蓋戊之誤也司烜氏注明齍謂以明水滫滌粢盛黍稷修監本訛作修今從內則疏改正硩蔟氏以方書十日之號疏正月為泰泰爾雅作陬豈賈以泰為正月之卦改作泰與周禮注疏卷三十六考證
