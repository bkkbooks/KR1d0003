body:
  text: 周禮注疏禮類一周禮之屬目録周禮正義序序周禮廢興周禮注疏原目卷一天官冢宰第一治官之屬合六十三人卷二天官大宰之職卷三天官小宰之職宫伯宰夫之職宫正卷四天官膳夫亨人庖人甸師内饔獸人外饔􅈄人鼈人腊人卷五天官醫師獸醫食醫酒正疾醫酒人痬醫漿人凌人籩人卷六天官醢人宫人醯人掌舎鹽人幕人幂人掌次大府司㑹玉府内府外府卷七天官司書司裘職内掌皮職歳内宰職幣臣内小閽人寺人内豎九嬪卷八天官世婦功典婦女御典絲女祝典枲女史服内司縫人夏采染人追師屨人巻九地官司徒第二教官之屬合七十八人卷十地官大司徒之職卷十一地官小司徒之職鄉大夫之職鄉師之職卷十二地官州長比長黨正封人族師鼓人閭胥舞師牧人牛人充人卷十三地官載師均人閭師縣師遺人卷十四地官師氏調人保氏媒氏司諌司市司救卷十五地官質人司虣廛人司稽胥師胥賈師肆長泉府遂人司門遂師司關夫遂大掌節縣正鄙師酇長里宰鄰長卷十六地官旅師草人稍人稻人委人土訓土均誦訓山虞迹人林衡卝人川衡角人澤虞羽人掌葛掌蜃掌染草囿人掌炭場人掌荼廩人舎人舂人倉人饎人司禄槁人司稼卷十七春官宗伯第三禮官之屬合七十人卷十八春官大宗伯之職卷十九春官小宗伯之職鬯人肆師之職鬱人卷二十春官雞人典瑞司尊彝司几筵天府卷二十一春官典命世婦司服内宗典祀外宗守祧冢人墓大夫職喪卷二十二春官大司樂卷二十三春官樂師小師大胥瞽矇小胥眂瞭大師典同卷二十四春官磬師韎師鍾師旄人笙師籥師鎛師籥章鞮鞻氏卜師典庸器龜人司干菙氏大卜占人簭人卷二十五春官占夢眂祲大祝小祝卷二十六春官䘮祝男巫甸祝女巫詛祝大史司巫小史馮相氏保章氏内史外史卷二十七春官御史司常巾車人都宗典路人家宗車僕神士卷二十八夏官司馬第四政官之屬合七十人卷二十九夏官大司馬之職卷三十夏官小司馬之職勲行司馬司軍司馬馬質輿司馬量人小子司險羊人掌疆司爟候人掌固環人挈壺氏羅氏射人掌畜服不氏射鳥氏卷三十一夏官司士氏旅賁諸子氏節服司右氏方相虎賁氏大僕小臣祭僕御僕隸僕卷三十二夏官弁師矢司弓司甲繕人司兵槀人司戈盾戎右齊右齊僕道右道僕大馭田僕戎僕馭夫卷三十三夏官校人廋人趣馬圉師巫馬圉人牧師氏職方土方氏形方氏懐方氏山師合方氏川師訓方氏邍師匡人撢人都司馬家司馬卷三十四秋官司宼第五刑官之屬合六十六人之職大司寇之職小司宼士師之職卷三十五秋官鄉士訝士遂士朝士縣士司氏方士司刑司刺司厲司約犬人司盟司圜職金掌囚掌戮閩隸司隸夷隸罪隸貉隸蠻隸卷三十六秋官布憲蜡氏禁殺戮雍氏禁暴氏萍氏野廬氏司寤氏司烜氏庶氏條狼氏穴氏修閭氏翨氏冥氏柞氏薙氏蟈氏硩蔟氏壺涿氏翦氏庭氏赤犮氏銜枚氏伊耆氏卷三十七秋官大行人小行人卷三十八秋官司儀掌客行夫掌訝環人掌交象胥掌察掌貨賄家士朝大夫都則都士卷三十九冬官考工記第六三十工總敘輿輪人為輪輪人為蓋人為車卷四十冬官考工記輈人為輈矢冶氏為殺築氏為削桃氏為劍鳧氏為鍾段氏㮚氏為量函氏為甲鮑人之事韋氏韗人為臯陶裘氏畫繪之事筐人鍾氏染羽㡛氏湅絲卷四十一冬官考工記玉人之事雕人楖人為磬磬氏矢人為矢旊人為簋陶人為甗虡梓人為筍梓人為飲器廬人為廬器梓人為侯匠人建國匠人營國卷四十二冬官考工記匠人為溝洫車人為耒庛車人之事車人為車弓人為弓臣等謹按周禮注疏四十二巻漢鄭元注唐賈公彦疏元有易注已著録公彦洺州永年人永徽中官至太學博士事迹具舊唐書儒學傳周禮一書上自河間獻王于諸經之中其出最晚其真偽亦紛如聚訟不可縷舉惟横渠語録曰周禮是的當之書然其閒必有末世増入者鄭樵通志引孫處之言曰周公居攝六年之後書成歸豐而實未嘗行葢周公之為周禮亦猶唐之顯慶開元禮預為之以待他日之用其實未嘗行也惟其未經行故僅述大畧俟其臨事而損益之故建都之制不與召誥洛誥合封國之制不與武成孟子合設官之制不與周官合九畿之制不與禹貢合云云案此條所云惟召誥洛誥孟子􅂋相舛異至禹貢乃唐虞之制武成周官乃梅賾古文尚書王制乃漢文帝博士所追述皆不足以為難其説盖離合參半其説差為近之然亦未盡也夫周禮作于周初而周事之可考者不過春秋以後其東遷以前三百餘年官制之沿革政典之損益除舊布新不知凡幾其初去成康未逺不過因其舊章稍為改易而改易之人不皆周公也于是以後世之法竄入之其書遂雜其後去之愈逺時移勢變不可行者漸多其書遂廢此亦如後世律令條格率數十年而一修修則必有所附益特世近者可考年逺者無徴其増刪之迹遂靡所稽統以為周公之舊耳迨乎法制既更簡編猶在好古者留為文獻故其書閲乆而仍存此又如開元六典政和五禮在當代已不行用而今日尚有傳本不足異也使其作偽何不全偽六官而必闕其一至以千金購之不得哉且作偽者必剽取舊文借真者以實其贋古文尚書是也劉歆宗左傳而左傳所云禮經皆不見于周禮儀禮十七篇皆在七畧所載古經七十篇中禮記四十九篇亦在劉向所録二百十四篇中而儀禮聘禮賔行饔餼之物禾米芻薪之數籩豆簠簋之實鉶壺鼎甕之列與掌客之文不同又大射禮天子諸侯侯數侯制與司射之文不同禮記雜記載子男執圭與典瑞之文不同禮器天子諸侯席數與司几筵之文不同如斯之類與二禮多相矛盾歆果贋託周公為此書又何難牽就其文使與經傳相合以相証驗而必留此異同以啟後人之攻擊然則周禮一書不盡原文而非出依託可概覩矣考工記稱鄭之刀又稱秦無廬鄭封于宣王時秦封于孝王時其非周公之舊典已無疑義南齊書稱文惠太子鎮雍州有盗𤼵楚王冢獲竹簡書青丝編簡廣數分長二尺有竒得十餘簡以示王僧䖍僧䖍曰是科斗書考工記則其為秦以前書亦灼然可知雖不足以當冬官然百工為九經之一共工為九官之一先王原以制器為大事存之尚稍見古制俞庭椿以下紛紛割裂五官均無知妄作耳鄭注隋志作十二卷賈疏文繁乃析為五十卷新舊唐志並同今本四十二卷不知何人所併元於三禮之學本為専門故所釋特精惟好引緯書是其一短歐陽修集有請校正五經劄子欲刪削其書然緯書不盡可據亦非盡不可據在審别其是非而已不必竄易古書也又好改經字亦其一失然所注但曰當作某耳尚不似北宋以後連篇累牘動稱錯簡則亦不必苛責于元矣公彦之疏亦極博核足以𤼵明鄭學朱子語録稱五經疏中周禮疏最好葢宋儒惟朱子深于禮故能知鄭賈之善云乾隆四十二年三月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書周禮正義序唐朝散大夫行太學博士𢎞文館學士臣賈公彥等奉勅撰夫天育蒸民無主則亂立君治亂事資賢輔但天皇地皇之日無事安民降自燧皇方有臣矣是以易通卦驗云天地成位君臣道生君有五期輔有三名注云三名公卿大夫又云燧皇始出握機矩表計寘其刻日蒼牙通靈昌之成孔演命眀道經注云拒燧皇謂人皇在伏羲前風姓始王天下者斗機云所謂人皇九頭兄弟九人别長九州者也是政教君臣起自人皇之世至伏羲因之故文耀鉤云伏羲作易名官者也又案論語撰考云黄帝受地形象天文以制官伏羲已前雖有三名未必具立官位至黄帝名位乃具是以春秋緯命歴序云有九頭紀時有臣無官位尊卑之别燧皇伏羲既有官則其間九皇六十四氏有官眀矣但無文字以知其官號也案左傳昭十七年云秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也杜氏注云少皥金天氏黄帝之子已姓之祖也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名注云黄帝軒轅氏姬姓之祖也黄帝受命有瑞雲故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名注云炎帝神農氏姜姓之祖也亦有火瑞以火紀事名百官也共工氏以水紀故為水師而水名注云共工以諸侯霸有九州者在神農前大皥後亦受水瑞以水名官也大皥氏以龍紀故為龍師而龍名注云大皥伏羲氏風姓之祖也有龍瑞故以龍命官也我髙祖少皥摰之立也鳳鳥適至故紀於鳥故為鳥師而鳥名又云鳳鳥氏厯正之類又以五鳥五鳩九扈五雉竝為官長亦皆有屬官但無文以言之若然則自上以來所云官者皆是官長故皆云師以目之又云自顓頊以來不能紀逺乃紀於近是以少皥以前天下之號象其徳百官之號象其徴顓頊以來天下之號因其地百官之號因其事事即司徒司馬之類是也若然前少皥氏言祝鳩氏為司徒者本名祝鳩言司徒者以後代官況之自少皥以上官數略如上説顓頊及堯官數雖無眀説可略而言之矣案昭二十九年魏獻子曰社稷五祀誰氏之五官蔡墨對曰少皥氏有四叔曰重曰該曰脩曰熙實能金木及水使重為句芒該為蓐收脩及熙為𤣥冥世不失職遂濟窮桑此其三祀也注云窮桑帝少皥之號也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之故外傳犂為髙辛氏之火正此皆顓頊時之官也案鄭語云重犂為髙辛氏火正故堯典注髙辛氏之世命重為南正司天犂為火正司地以髙辛與顓頊相繼無隔故重犂事顓頊又事髙辛若稷契與禹事堯又事舜是以昭十七年服注顓頊之下云春官為木正夏官為火正秋官為金正冬官為水正中官為土正髙辛氏因之故傳云遂濟窮桑窮桑顓頊所居是度顓頊至髙辛也若然髙辛時之官唯有重犂及春之木正之等不見更有餘官也至於堯舜官號稍改楚語云堯復育重犂之後重犂之後即羲和也是以堯典云乃命羲和注云髙辛之世命重為南正司天犂為火正司地堯育重犂之後羲氏和氏之子賢者使掌舊職天地之官亦紀於近命以民事其時官名蓋曰稷司徒是天官稷也地官司徒也又云分命羲仲申命羲叔分命和仲申命和叔使分主四方注仲叔亦羲和之子堯既分隂陽四時又命四子為之官掌四時者字曰仲叔則掌天地者其曰伯乎是有六官案下驩兜曰共工注共工水官也至下舜求百揆禹讓稷契暨咎繇帝曰棄黎民阻饑汝后稷播時百榖注稷棄也初堯天官為稷又云帝曰契百姓不親汝作司徒又云帝曰咎繇汝作士此三官是堯時事舜因禹讓述其前功下文云舜命伯夷為秩宗舜時官也以先後參之唯無夏官之名以餘官約之夏𫝊云司馬在前又後代況之則羲叔為夏官是司馬也故分命仲叔注云官名蓋春為秩宗夏為司馬秋為士冬為共工通稷與司徒是六官之名見也鄭𤣥分隂陽為四時者非謂時無四時官始分隂陽為四時但分髙辛時重犂之天地官使兼主四時耳而云仲叔故云掌天地者其曰伯乎若然堯典云伯禹作司空四時官不數之者鄭云初堯冬官為共工舜舉禹治水堯知其有聖徳必成功故改命司空以官名寵異之非常官也至禹登百揆之任捨司空之職為共工與虞故曰垂作共工益作朕虞是也案堯典又云帝曰疇咨若時登庸鄭注云堯末時羲和之子皆死庶績多闕而官廢當此之時驩兜共工更相薦舉下又云帝曰四岳湯湯洪水有能俾乂鄭云四岳四時之官主四岳之事始羲和之時主四岳者謂之四伯至其死分岳事置八伯皆王官其八伯唯驩兜共工放齊􅦡四人而已其餘四人無文可知案周官云唐虞稽古建官惟百内有百揆四岳則四岳之外更有百揆之官者但堯初天官為稷至堯試舜天官之任謂之百揆舜即真之後命禹為之即天官也案尚書傳云惟元祀巡狩四岳八伯注云舜格文祖之年堯始以羲和為六卿春夏秋冬者幷掌方岳之事是為四岳出則為伯其後稍死驩兠共工求代乃置八伯元祀者除堯䘮舜即真之年九州言八伯者據畿外八州鄭云畿内不置伯鄉遂之吏主之案明堂位云有虞氏官五十夏后氏官百殷二百周三百鄭注云有虞氏官蓋六十夏百二十殷二百四十周三百六十不得如此記也昬義云三公九卿二十七大夫八十一元士鄭云蓋夏制依此差限故不從記文但虞官六十唐則未聞堯舜道同或皆六十幷屬官言之則皆有百故成王周官云唐虞建官惟百也若然自髙陽已前官名略言於上至於帝嚳官號略依髙陽不可具悉其唐虞之官惟四岳百揆與六卿又堯典有典樂納言之職至於餘官未聞其號夏官百有二十公卿大夫元士具列其數殷官二百四十雖未具顯案下曲禮云六大五官六府六工之等鄭皆云殷法至於屬官之號亦蔑云焉案昬義云三公九卿者六卿幷三孤而言九其三公又下兼六卿故書傳云司徒公司馬公司空公各兼二卿案顧命太保領冢宰畢公領司馬毛公領司空别有芮伯為司徒彤伯為宗伯衛侯為司寇則周時三公各兼一卿之職與古異矣但周監二代郁郁乎文所以象天立官而官益備此即官號㳂革粗而言也周禮正義序周禮正義序考證周禮正義序臣紱按孔穎達作五經疏皆曰正義賈公彦作周禮儀禮疏直云疏不稱正義此序不云周禮疏序而云正義者疑後人所改或唐人疏與正義可以通稱燧皇伏羲既有官則其間九皇六十四氏有官明矣氏一本作民周禮正義序考證欽定四庫全書序周禮廢興唐賈公彥撰周公制禮之日禮教興行後至幽王禮儀紛亂故孔子云諸侯専行征伐十世希不失鄭注云亦謂幽王之後也故晉侯趙簡子見儀皆謂之禮孟僖子又不識其儀也至於孔子更脩而定之時已不具故儀禮注云後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反於魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎至孔子卒後復更散亂故藝文志云昔仲尼没微言絶七十二弟子䘮而大義乖諸子之書紛然散亂至秦患之乃燔滅文章以愚黔首又云禮經三百威儀三千及周之衰諸侯將踰法度惡其害已滅去其籍自孔子時而不具至秦大壊漢興至髙堂生博士傳十七篇孝宣世后倉最明禮戴徳戴聖慶普皆其弟子三家立于學官案儒林傳漢興髙堂生傳禮十七篇而魯徐生善為容孝文時徐生以容為禮官大夫而瑕丘蕭奮以禮至淮陽太守孟卿東海人也事蕭奮以授后倉后倉説禮數萬言號曰后氏曲臺記授戴徳戴聖鄭云五傳弟子則髙堂生蕭奮孟卿后倉戴徳戴聖是為五也此所傳者謂十七篇即儀禮也周官孝武之時始出秘而不傳周禮後出者以其始皇特惡之故也是以馬融傳云秦自孝公已下用商君之法其政酷烈與周官相反故始皇禁挾書特疾惡欲絶滅之搜求焚燒之獨悉是以隠蔵百年孝武帝始除挾書之律開獻書之路既出於山巖屋壁復入于秘府五家之儒莫得見焉至孝成皇帝達才通人劉向子歆校理秘書始得列序著于録略然亡其冬官一篇以考工記足之時衆儒竝出共排以為非是唯歆獨識其年尚幼務在廣覽博觀又多鋭精于春秋末年乃知其周公致太平之迹迹具在斯奈遭天下倉卒兵革竝起疾疫䘮荒弟子死䘮徒有里人河南緱氏杜子春尚在永平之初年且九十家于南山能通其讀頗識其説鄭衆賈逵往受業焉衆逵洪雅博聞又以經書記轉相證眀為解逵解行於世衆解不行兼攬二家為備多所遺闕然衆時所解説近得其實獨以書序言成王既黜殷命還歸在豐作周官則此周官也失之矣逵以為六鄉大夫則冢宰以下及六遂為十五萬家絙千里之地甚謬焉此比多多吾甚閔之久矣六鄉之人實居四同地故云絙千里之地者誤矣又六鄉大夫冢宰以下所非者不著又云多多者如此解不著者多又云至六十為武都守郡小少事乃述平生之志著易尚書詩禮傳皆訖惟念前業未畢者唯周官年六十有六目瞑意倦自力補之謂之周官傳也案藝文志云成帝時以書頗散亡使謁者陳農求遺書于天下詔光禄大夫劉向校書經傳諸子詩賦向輒條其篇目撮其指意録而奏之㑹向卒哀帝復使向子歆卒父業歆於是總羣書奏其七略故有六藝七略之屬歆之録在於哀帝之時不審馬融何云至孝成皇帝命劉向子歆考理秘書始得列序著於録略者成帝之時蓋劉向父子竝被帝命至向卒哀帝命歆卒父所脩者故令文乖理則是也故鄭𤣥序云世祖以來通人達士大中大夫鄭少贛名興及子大司農仲師名衆故議郎衛次仲侍中賈君景伯南郡太守馬季長皆作周禮解詁又云𤣥竊觀二三君子之文章顧省竹帛之浮辭其所變易灼然如晦之見眀其所彌縫奄然如合符復析斯可謂雅達廣攬者也然猶有參錯同事相違則就其原文字之聲類考訓詁捃秘逸謂二鄭者同宗之大儒眀理于典籍觕識皇祖大經周官之義存古字發疑正讀亦信多善徒寡且約用不顯傳于世今讚而辨之庶成此家世所訓也又其名周禮為尚書周官者周天子之官也書序曰成王既黜殷命滅淮夷還歸在豐作周官是言蓋失之矣案尚書盤庚康誥説命泰誓之屬三篇序皆云某作若干篇今多者不過三千言又書之所作據時事為辭君臣相誥命之語作周官之時周公又作立政上下之别止有一篇周禮乃六篇文異數萬终始辭句非書之類難以屬之時有若兹焉得從諸又云斯道也文武所以綱紀周國君臨天下周公定之致隆平龍鳳之瑞然則周禮起於成帝劉歆而成于鄭𤣥附離之者大半故林孝存以為武帝知周官末世瀆亂不驗之書故作十論七難以排棄之何休亦以為六國隂謀之書唯有鄭𤣥徧覽羣經知周禮者乃周公致太平之迹故能答林碩之論難使周禮義得條通故鄭氏傳曰𤣥以為括囊大典􅃠羅衆家是以周禮大行後王之法易曰神而化之存乎其人此之謂也序周禮廢興序周禮廢興考證乃周公致太平之迹故能答林碩之論難使周禮義得條通林王制篇題下疏作臨序周禮廢興考證欽定四庫全書周禮注疏原目漢鄭氏目録唐賈公彥疏天官冢宰第一注象天所立之官冢大也宰者官也天者統理萬物天子立冢宰使掌邦治亦所以總御衆官使不失職不言司者大宰總御衆官不主一官之事也疏釋曰第一者第次也一者數之始也次第之中處一故云第一也注釋曰鄭云象天者周天有三百六十餘度天官亦總攝三百六十官故云象天也云官者亦是管攝為號故題曰天官也鄭又云冢大宰官也者下注對大宰則云冢者大之上此不對大宰故云冢大也宰者調和膳羞之名此冢宰亦能調和衆官故號大宰之官鄭又云不言司者大宰總御衆官不主一官之事者此官不言司對司徒司馬司寇司空皆云司以其各主一官不兼羣職故言司此天官則兼攝羣職故不言司也若然則春官亦不言司者以其祭祀鬼神鬼神非人所主故亦不言司也其地官鄭云象地所立之官彼言象地實主地事此天官言天直取總攝為言全無天事天事又並入於春官者言象天自取總攝為名象地自取掌物為號各取一邉為義理無嫌也周禮鄭氏注疏釋曰鄭氏者漢大司農北海郡鄭沖之孫名𤣥字康成注者於經之下自注已意使經意可申故云注也孔君王肅之等則言傳傳者使可傳述若然或云注或言傳不同者立意有異無義例也地官司徒第二注象地所立之官司徒主衆徒地者載養萬物天子立司徒掌邦教亦所以安擾萬民疏釋曰既言象地所立則此六十官皆法也與天官言象天義異矣春官宗伯第三注象春所立之官也宗尊也伯長也春者出生萬物天子立宗伯使掌邦禮典禮以事神為上亦所以使天下報本反始不言司者鬼神示人之所尊不敢主之故也夏官司馬第四注象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬共掌邦政政可以平諸侯正天下故曰統六師平邦國秋官司寇第五注象秋所立之官寇害也秋者遒也如秋義殺害收聚斂藏於萬物也天子立司宼使掌邦刑刑者所以驅恥惡納人於善道也冬官考工記第六注象冬所立官也是官名司空者冬閉蔵萬物天子立司空使掌邦事亦所以富充國家使民無空者也司空之篇亡漢興購求千金不得此前世識其事者記録以備大數古周禮六篇畢矣古周禮六篇者天子所專秉以治天下諸侯不得用焉六官之記可見者堯育重黎之後羲和及其仲叔四子掌天地四時夏書亦云乃召六卿商周雖稍增改其職名六官之數則同矣疏釋曰鄭義既然今按漢書藝文志云禮經三百威儀三千及周之衰諸侯將踰灋度惡其害己皆滅去其籍孔子時多不具故鄭注鄉飲酒云後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎以此觀之冬官一篇其亡已久有人尊集舊典録此三十工以為考工記雖不知其人又不知作在何日要之在於秦前是以得遭秦滅焚典籍韋氏裘氏等闕也故鄭云前世識其事者記録以備大數耳周禮注疏原目周禮注疏原目考證天官冢宰第一周禮鄭氏注臣學健按石經每卷下皆有周禮鄭氏注五字蓋古人專門之學傳寫相承者如此監本唯第一卷有之餘皆刪去今亦從省冬官考工記第六臣紱按司空篇亡後人以考工記補之考工記本無冬官二字漢人所加耳周禮注疏原目考證
