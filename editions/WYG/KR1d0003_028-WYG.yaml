body:
  text: 周禮注疏卷二十八漢鄭氏注唐陸徳眀音義賈公彦疏夏官司馬第四惟王建國辨方正位體國經野設官分職以爲民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國注政正也政所以正不正者也孝經説曰政者正也正徳名以行道疏注釋曰為政者取平正之義大司馬主六軍所以正諸侯違王命不正者故鄭云所以正不正是以康子問政孔子云子帥以正孰敢不正孝經説者是孝經緯文云政者正也正徳名以行道者亦是正者先自正已之德名以行道則天下自然正引之以證正不正之事政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人注輿衆也行謂軍行列晉作六軍而有三行取名於此音義輿音餘行户剛反注同行行列也疏釋曰此序官從大司馬至府六人其數與諸官同自史以下則異諸官皆云史十二人胥十二人徒百二十人獨此官史十有六人胥三十二人徒三百二十人與諸官異者以大司馬大總六軍軍事尚嚴特須監察故胥徒獨多是以襄公三年六月晉悼公㑹諸侯盟于雞澤秋晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒對曰使臣斯司馬臣聞師衆以順為武是其尚嚴也注釋曰輿衆者按左氏傳信二十八年晉侯聽輿人之誦是輿為衆之義也云行謂軍行列者詩云寘彼周行是行得為行列云晉作六軍而有三行取名於此者左氏僖二十八年云晉侯作三行以禦狄注云晉置上中下三軍今復増置三行避天子六軍之名以所加三軍者謂之三行彼名軍為行取於此行司馬之名也凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人爲伍伍皆有長注軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選於六官六鄉之吏自卿以下徳任者使兼官焉鄭司農云王六軍大國三軍次國二軍小國一軍故春秋傳有大國次國小國又曰成國不過半天子之軍周為六軍諸侯之大者三軍可也詩大雅常武曰赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既儆既戒惠此南國大雅文王曰周王于邁六師及之此周為六軍之見于經也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見于傳也百人為卒二十五人為兩故春秋傳曰廣有一卒卒偏之兩音義軍將子匠反凡軍將將帥之類放此帥所類反下將帥之字皆同卒子忽反後皆同卒長丁丈反卷内不出者放此比毗志反大祖音泰下大師及下文大僕同皇父音甫儆本亦作敬京領反見賢遍反下同廣光浪反疏釋曰云此大國次國小國者皆以命數同者軍數則同則上公為大國侯伯為次國子男為小國也魯是侯爵而魯頌云公徒三萬注云萬二千五百人為軍大國三軍合三萬七千五百人言三萬者舉成數也然當公之時其實二軍故襄公十一年作三軍則前無三軍矣若僖公時有三軍則中間應有舎文詩言為三軍者作詩之人舉魯盛時而言若然魯公伯禽之時則三軍矣魯語季武子為三軍叔孫昭子曰不可又云今我小侯也明大侯之時有三軍矣鄭答林碩為三萬之大數者以實言之也此言軍將皆命卿及師帥皆中大夫旅帥皆下大夫卒長皆上士兩司馬皆中士伍皆有長者皆據在鄊為鄉大夫州長黨正族師閭胥比長時尊卑命數而言伍皆有長是比長下士不言皆下士者以衆多官卑故畧而不言也注釋曰鄭以經伍兩卒旅師軍皆據在鄉内民數而言者以其凡出軍皆據六鄉為數是以小司徒云凡起徒役無過家一人是以鄭據在鄉之數而以家出一人結之也鄭云言凡軍將皆命卿則凡軍帥不特置選於六官六鄉之吏者鄭言選於六官者謂王朝六卿此六軍之將還選六卿中有武者為軍將也又别言六鄉之吏者據六鄉大夫及州長黨正族師閭胥比長中有武者今出軍之時還遣在鄉所管之長為軍吏也鄭必知還遣本長為軍吏者見管子云因内政寄軍令且經並據在鄉時尊卑而言故知因遣其鄉之官而領之也是以州長職注云掌其戒令賞罰則是於軍因為師帥自黨已下注皆云因為旅帥因為卒長閭胥以下雖不言因為義可知又云自卿已下徳任者使兼官焉者按大司馬云師都載旃鄉遂載物鄭云鄉遂大夫或載旃或載物衆屬軍吏無所将則自卿已下至伍長有武徳堪任為軍之吏者乃兼官兼官者在鄉為鄉官在軍為軍吏若無武徳不堪任為軍吏者則衆屬他軍吏身不得為軍吏是無所将也是以詩云韎韐有奭以作六師鄭云諸侯世子除三年之䘮未遇爵命服士服而來時有征伐之事天子以其賢任為軍将是代為軍将之事則王朝之官有武徳者皆可代為軍吏也先鄭云王六軍已下復引諸文者以當時有不信周禮者故引為證言春秋有大國有次國有小國者此非春秋正文成三年冬十一月晉侯使荀庚来聘衞侯使孫良夫来聘公問諸臧宣叔曰中行伯之於晋其位在三孫子之於衞也位為上卿将誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其将先之丙午盟晉丁未盟衞盖指此為大國次國小國也云又曰成國不過半天子之軍周為六軍諸侯之大者三軍可也者襄十四年晉侯舎新軍禮也成國禮不過半天子之軍周為六軍諸侯之大者三軍可也晉雖為侯爵以其為霸主得置三軍故為禮也云此周為六軍之見于經也者此引春秋及大雅常武與文王皆是正經故云之見于經也此經言軍而詩云師者此皆軍也故鄭答林碩云軍者兵之大名軍禮重言軍為其大悉故春秋之兵雖有累萬之衆皆稱師詩云六師即六軍也然軍旅卒兩皆衆名獨舉師者按易師彖云師貞丈人吉无咎軍二千五百人為師丈之言長也以法度為人之長故吉無咎謂天子諸侯而主軍軍将皆命卿天子六軍兵衆之名移矣正言師者出兵而多以軍為名次以師名少旅為名言衆舉中言之也由此言之故以師為大名不言軍為其大悉不言旅為其中故以師表名見其得中以兼上下言多以軍為名謂征伐次以師為名謂君行師從少以旅為名謂卿行旅從之時也云春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見於傳者荘十六年傳文以其新并晉國雖為侯爵以小國軍法命之故一軍也云故春秋傳曰廣有一卒卒偏之兩者宣十二年欒武子説楚之軍法云其君之戎分為二廣服氏云左右廣各十五乘廣有一卒服氏云百人為卒言廣有一卒為承也卒偏之兩服氏云五十人曰偏二十五人曰兩廣既有一卒為承承有偏偏有兩故曰卒偏之兩引之以證卒是百人兩為二十五人意也一軍則二府六史胥十人徒百人疏釋曰此非常也有軍則置之無則已府史不言府二人史六人而逆言其数者欲見所置非常故倒言以見義也司勲上士二人下士四人府二人史四人胥二人徒二十人注故書勲作勛鄭司農云勛讀為勲勲功也此官主功賞故曰掌六鄉賞地之法以等其功音義勛香云反劉音訓疏釋曰此已下六十官以大司馬主軍法所有軍事及武勇官爵賞賚整齊之等皆屬焉序官前後亦不據尊卑直取事急者居前事緩者居後是以司勲及馬質已下皆士官而居前射人諸子司士之等大夫官而居後也但司馬主征伐軍無賞士不往凡軍以賞為先故僖二十八年秋七月晉文公獻俘授馘飲至大賞武王入殷封功臣謀士師尚父為首故司勲列位在前上士二人為官下士四人為之佐府二人主藏文書史四人作文書草胥二人為什長徒二十人給徭役注釋曰先鄭不從古書勛而從勲者勛是古字從今之勲也云掌六鄉賞地之法以等其功者司勲職文馬質中士二人府一人史二人賈四人徒八人注質平也主買馬平其大小之賈直音義賈音嫁注及下同疏釋曰司馬者主以供軍之用馬質主平馬賈買之故亦列職居前也然不使與校人相近而在此者平馬大小賈直故使與量人相近也以其主司馬故屬夏官量人下士二人府一人史四人徒八人注量猶度也謂以丈尺度地音義量音亮或音良下同度待洛反下同疏釋曰在此者以其掌營軍之壘舎量其市朝州塗軍社之所里其中雖有餘事要以軍事為重故亦列職於此也小子下士二人史一人徒八人注小子主祭祀之小事疏釋曰在此者以其職有掌小祭祀羞羊肆釁軍噐師田掌斬牲徇陳之事故屬此也羊人下士二人史一人賈二人徒八人疏釋曰羊人在此者以其職有掌羊牲又祭祀割牲等之事羊屬南方火司馬火官故在此按説卦云兌為羊注云其畜好剛鹵又易説云大山失金雞西嶽亡玉羊玉羊者西嶽之精而羊不在西方者羊有二義按五行傳云視之不明則有羊禍注云羊畜之逺視者屬視故列在夏官兌為羊又屬西方也司爟下士二人徒六人注故書爟為燋杜子春云燋當為爟書亦或為爟爟為私火𤣥謂爟讀如予若觀火之觀今燕俗名湯熱為觀則爟火謂熱火與音義爟古喚反燋哉約反李又音灼觀古喚反下同與音餘疏釋曰在此者按其職有行火之政令火屬南方故在此也注釋曰子春不從古書燋還從爟爟為私火者民間理爨之火為私火亦如後鄭為熱火也後鄭讀如予若觀火者盤庚告其羣臣不欲徙而匿情者予若觀􅉯也我有刑罰如􅉯火可畏故引燕俗以湯􅉯為觀亦取􅉯火之義後鄭云謂熱火與者對秋官司烜氏以夫燧取火於日中為明者為冷火破字為疑故云與也孔安國以觀為視我觀汝情如視火與鄭義異也若然司烜氏不在此者彼取金義故在秋官也掌固上士二人下士八人府二人史四人胥四人徒四十人注固國所依阻者也國曰固野曰險易曰王公設險以守其國疏注釋曰鄭云固國所依阻者也者欲見固據在國而言云國曰固野曰險者對下文司險是在野之義也以其掌固職云掌修城郭溝池樹渠之固並據國而言司險職云周知山林川澤之阻而達其道路皆據在野而言故知在野曰險又引易者易坎卦彖云天險不可升地險山川丘陵王公設險以守其國引之證固是在國王公設之以守國若然易云王公設險險即此固以其言王公設之非是在野自然之險者也是對文則險固異散則險固通名也掌固司險在此者取整齊之義故也司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人注疆界也音義疆居良反注及後同疏釋曰在此者按其職闕雖未知其事盖掌守疆界亦是禁戒之事故在此也候人上士六人下士十有二人史六人徒百有二十人注候候迎賓客之來者疏釋曰在此者案其職云各掌其方之道治與其禁令以設候人是候迎賓客之事故詩云彼候人兮荷戈與祋亦是武事故在此也環人下士六人史二人徒十有二人注環猶卻也以勇力卻敵音義環戸闗反劉戸串反卻起畧反下同疏釋曰在此者按其職云掌致師察軍慝皆是軍師之事故在此也挈壺氏下士六人史二人徒十有二人注挈讀如絜髮之絜壺盛水器也世主挈壺水以為漏音義挈劉苦結反一音結又戸結反盛音成疏釋曰在此者按其職云掌挈壺以令軍井挈轡以令舎挈畚以令糧又云凡軍事懸壺以序聚􅈀皆為軍事故在此也注釋曰鄭讀挈如絜髮之絜者詩云總角之晏毛傳云總角結髮此鄭依毛傳絜即結之義也鄭云世主挈壺水以為漏者以其稱氏此則官有世功則以官為氏故以世主解之也射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人疏釋曰在此者以其主射事射即武事故在此也服不氏下士一人徒四人注服不服不服之獸者疏釋曰在此者以其服不服之獸象王者伐叛柔服之義故在此也射鳥氏下士一人徒四人音義射食亦反疏釋曰在此者按其職云掌射鳥亦是武事在此冝也羅氏下士一人徒八人注能以羅網搏鳥者郊特牲曰大羅氏天子之掌鳥獸者音義搏音博一音付本又作捕音歩疏釋曰在此者按其職云掌羅鳥羅亦是武事故在此也注釋曰引郊特牲云大羅氏天子之掌鳥獸者按彼云大羅氏天子之掌鳥獸者諸侯貢屬焉彼大羅氏與此羅氏為一彼稱大對諸侯此直曰羅氏無所對故不稱大此職唯羅鳥不主獸彼兼言獸者諸侯所貢鳥獸屬焉則兼掌所貢之獸也掌畜下士二人史二人胥二人徒二十人注畜謂斂而養之音義畜許六反注同劉許又反疏釋曰在此者按其職云掌養鳥而阜蕃教擾之是専養鳥其職注謂鵞鶩之屬是斂而養之鳥是羽蟲屬南方故在此也司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人疏釋曰在此者以其職云掌以徳詔爵以功詔禄與大司馬云進賢興功同故列職於此也諸子下大夫二人中士四人府二人史二人胥二人徒二十人注諸子主公卿大夫士之子者或曰庶子疏釋曰在此者按其職云若有甲兵之事則授之車甲故亦在此也注釋曰鄭云諸子主公卿大夫士之子者按其職云掌國子之倅倅副代父者是公卿大夫士之適子皆是倅故鄭歴言之云或曰庶子者按禮記燕義稱此諸子為庶子故言或曰以其燕禮有庶子執燭之事彼稱諸子謂之庶子故燕義兼説天子諸子之事諸庶為一皆掌公卿大夫士之適故通謂之庶子也司右上士二人下士四人府四人史四人胥八人徒八十人注右謂有勇力之士充王車右疏釋曰在此者王車之右執干戈以衞王亦是武事故在此也注釋曰鄭知勇力者其職云國之勇力之士能用五兵者屬焉鄭云選右當於中是用勇力充之者也虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人注不言徒曰虎士則虎士徒之選有勇力者音義賁音奔下同疏釋曰在此者亦衞守王在此宜也注釋曰鄭云不言徒曰虎士則虎士徒之選有勇力者以其在胥下例皆是徒今不言徒而曰虎士明先是徒之選有勇力者乃為之以當徒處旅賁氏中士二人下士十有六人史二人徒八人疏釋曰在此者按其職云掌執戈盾夾王車而趨左八人右八人車止則持輪言旅見其衆言賁見其勇亦是衞守王事故在此也節服氏下士八人徒四人注世為王節所衣服音義爲于偽反疏釋曰在此者按其職云郊祀二人執戈送逆尸從車亦是武事故在此也注釋曰鄭云世為王節所衣服者以其著服與王為節而稱氏故知官有世功則曰官族然凡稱氏者鄭雖不釋為世功但注有詳畧從可知也方相氏狂夫四人注方相猶言放想可畏怖之貌音義放方丈反本或作瓬音同疏釋曰在此者按其職云蒙熊皮黄金四目𤣥衣朱裳執戈揚盾可畏怖亦是武事故在此也注釋曰鄭云方相猶言放想者漢時有此語是可畏怖之貌故云方相也大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人注僕侍御於尊者之名大僕其長也疏釋曰在此者凡言僕御者是武衞之事又太僕職凡軍旅田役贊王鼓故凡僕御皆連類在此也太僕已下四官因仍同府史之等者太僕已下至御僕乃是别職同官故同府史也小臣其職云掌王之小命詔相王之小法儀祭僕其職云掌受命於王以視祭祀御僕其職云掌羣吏之逆及庶民之復太僕為長故連類在此若然府史胥徒在御僕下者是四官别職同官故共府史胥徒也隸僕下士二人府一人史二人胥四人徒四十人注此吏而曰隸以其事䙝音義䙝息列反疏釋曰在此者以僕皆在此故亦在此但所掌事褻故别官職不屬太僕注釋曰鄭云此吏而曰𨽻以其事褻者此經言下士二人即是吏按秋官有罪隸已下是奴稱隸以其掌䙝故與賤同稱隸也弁師下士二人工四人史二人徒四人注弁者古冠之大稱委貌緇布曰冠音義弁皮彦反稱尺證反疏釋曰在此者以夏物長大而盛壯人年長大乃冠以象夏故不同司服在春官而在此也注釋曰按禮記郊特牲及士冠記皆云夏收殷冔周弁三代皆祭冠則弁亦冕也即是六冕皆得稱弁若然皮弁爵弁自然是弁故鄭云弁者古冠之大稱也云委貌緇布曰冠者此二者對皮弁爵弁六冕惟曰冠若散文亦得言弁故司服云凡田冠弁服凶事服弁服皆得言弁也司甲下大夫二人中士八人府四人史八人胥八人徒八十人注甲今之鎧也司甲兵戈盾官之長音義鎧苦愛反盾常允反又音允疏釋曰在此者其職雖闕但甲者軍師所用在此冝也注釋曰言甲今之鎧者今古用物不同其名亦異古用皮謂之甲今用金謂之鎧從金為字也云司甲兵戈盾官之長者以其此官下大夫又在上已下皆士官故云長也司兵中士四人府二人史四人胥二人徒二十人疏釋曰在此者按其職云掌五兵五盾及授兵從司馬之法此亦為軍事在此宜也司戈盾下士二人府一人史二人徒四人注戈今時句孑㦸音義句古侯反孑音結疏釋曰在此者按其職云祭祀授旅賁殳故士戈盾授舞者兵皆武事故在此也注釋曰按冬官冶氏為戈㦸戈則兩刅長六尺六寸㦸則三刃長丈六尺形既不同鄭云戈句孑㦸而為一物解之者鄭舉漢法以況之漢時見戈有旁出者為句孑亦名胡孑故號戈為句孑㦸也司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人注司弓矢弓弩矢箙官之長音義箙音服疏釋曰在此者按其職云掌六弓四弩八矢給武之所用在此宜也注釋曰云司弓矢弓弩矢箙官之長者司弓矢下大夫已下繕人槀人皆士官故得與之為長也鄭云司弓弩即繕人也繕人上士二人下士四人府一人史二人胥二人徒二十人注繕之言勁也善也疏釋曰在此者按其職云掌王之用弓弩矢箙亦是武事故在此也注釋曰云繕之言勁也善也者以其所掌弓弩有堅勁而善堪為王用者乃入繕人以共王故鄭為此解之也稾人中士四人府二人史四人胥二人徒二十人注鄭司農云稾讀為芻槀之稾箭幹謂之槀此官主弓弩箭矢故謂之稾人音義稾古老反幹如字沈古旱反疏釋曰在此者按其職云掌六弓八矢四弩是軍事所用故在此也注釋曰先鄭云箭幹謂之稾按冬官矢人云以其笴厚為之羽深後鄭云笴讀為稾謂矢幹古文假借字則此稾人非直掌矢稾兼主弓弩矢箙等而云稾人者以稾為主耳故云此官主弓弩箭矢故謂之稾人戎右中大夫二人上士二人注右者參乘此充戎路之右田獵亦為之右焉音義乘䋲證反疏釋曰此戎右并下僕馭在此者皆是防衞之官故皆在此注釋曰云右者參乘者若在軍為元帥則將居鼓下將在中御者在左若凡平兵車則射者左御者居中若在國則尊者在左御者亦中央其右是勇力之士執干戈常在左右故云右者參乘也云此充戎路之右田獵亦為之右者按巾車王路有五按下文僕亦有五惟此戎右已下有三不見玉路祀之右又不見木路田路之右者以田戎相類齊祀相因故以類相兼故戎右兼田右齊右兼祀右若然僕有五不兼者僕難於右是以六藝之中有五御而不言右也按巾車玉路居前戎路在後此右在前又戎右中大夫齊右下大夫道右上士戎右官又尊者夏官主事尚威武故戎右居前使官尊也齊右下大夫二人注充玉路金路之右音義齊側皆反下齊僕并注同疏注釋曰充金路為主故云齊按曲禮云立如齊注齊謂祭祀時則齊雖施於祭前當祭時亦名齊故得兼金玉二路而鄭不言亦以其齊同故也道右上士二人注充象路之右疏釋曰在朝所以行道是以名車為道車以巾車五路差之上已有玉金革木之等此道右當充象路之右可知不兼而官卑者以其上四事行事簡故使兼此道右日日視朝行事繁故不兼以其事卑於齊戎之等故官職卑也大馭中大夫二人注馭之最尊音義馭音御疏釋曰在此者亦是衞守之事在此宜也注釋曰云馭之最尊者以其御玉路以祀故云最尊以是特尊不與下同名僕而謂之大馭也若然戎右在前尚威武此大馭在前者以其僕雖駕馭為難仍非武事故退戎僕於後進大馭於前也仍尊戎僕在齊僕之上而使中大夫為之與戎右尊卑同也戎僕中大夫二人注馭言僕者此亦侍御於車疏注釋曰上太僕已下言僕並是侍御之官稱僕今此馭車之人亦言僕者在車亦是侍御之類故云亦侍御於車也齊僕下大夫二人注古者王將朝覲㑹同必齊所以敬宗廟及神明音義朝直遥反後朝覲皆同疏注釋曰齊而敬神明者按曲禮下注云春夏受贄於朝受享於廟秋冬一受之於廟是朝覲敬宗廟按覲禮及司儀㑹同之時設方明於壇上設六玉以禮方明之神是㑹同敬神明巾車云金路建大旂以賓則金路主為賓路賓路則諸侯與王行朝覲㑹同之禮故鄭以朝覲㑹同釋齊也道僕上士十有二人注王朝朝莫夕主御王以與諸臣行先王之道音義朝朝上如字下直遥反莫音暮疏釋曰按上齊右已下至齊僕皆二人唯戎右與道僕人數多者則戎右有所斬殺故左氏傳晉縛秦囚萊駒為右使萊駒斬之故人多也道僕所以特多者以朝夕在朝來往駕脱難而且煩故人最多也注釋曰鄭云王朝朝莫夕主御者此釋人多之意云王以與諸臣行先王之道者此釋稱道之言也田僕上士十有二人疏釋曰人亦多者王有四時之田兼有園囿遊獵及取鮮獸之等亦是事繁而難故亦特多也馭夫中士二十人下士四十人疏釋曰按其職云掌馭貳車從車使車之等馭僕之類故亦在此馭夫總六十人按校人三乘為皁皁一趣馬三皁為繫繫一馭夫則馬三十六匹一馭夫計良二千一百六十匹則六十馭夫又駑六麗一師六師一趣馬六趣馬一馭夫則一馭夫主四百三十二匹駑千二百九十六匹則馭夫三人并前六十三人與此不合者蓋此序官脱三人也校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人注校之為言校也主馬者必仍校視之校人馬官之長音義校戸教反字從木若從手旁作是比校之字耳今人多亂之注校之校人同疏釋曰在此者以馬共軍所用故其職云凡軍事物馬而頒之故在此官特尊而多者以王馬多故也注釋曰云校之為言校也者讀從曲禮與少儀效馬效羊取效見義以其養官畜者必效見之故鄭云主馬者必仍校視之仍者相仍有時數數程見之也云校人馬官之長者與下趣馬至圉人為長有事皆取長官法度趣馬下士皁一人徒四人注趣馬趣養馬者也鄭司農說以詩曰蹶維趣馬音義趣七口反劉清須反注同皁才早反趣養清須反又七口反一音七句反蹶居衞反疏釋曰在此者按其職云掌正良馬而齊其飲食是以鄭云趣馬趣養馬者故在此也注釋曰先鄭説以詩云蹶惟趣馬者彼詩是刺幽王之詩其時臣名蹶惟作趣馬之官權寵之例引以證趣馬是官名也巫馬下士二人醫四人府一人史二人賈二人徒二十人注巫馬知馬祖先牧馬社馬歩之神者馬疾若有犯焉則知之是以使與醫同職疏釋曰巫知馬祟醫知馬病故連類在此也有賈者治馬死生須知馬價故有賈人也注釋曰馬祖之等竝在下文有人犯者與為祟巫則知之為之謝過必與醫同職者巫言無祟則是時氣及損傷付醫治之故二官同職也牧師下士四人胥四人徒四十人注主牧放馬而養之音義牧舊音目劉音茂沈音木疏釋曰在此者按其職云掌牧地是放馬故與校人連類在此也廋人下士閑二人史二人徒二十人注廋之言數也音義廋所求反數色主反數之同疏釋曰在此者按其職云掌十有二閑之政阜馬佚特之等故與馬官連類在此也圉師乘一人徒二人圉人良馬匹一人駑馬麗一人注養馬曰圉四馬為乘良善也麗耦也音義圉魚吕反乘䋲證反注同麗如字疏釋曰在此者以其掌養馬也圉人在此者按其職云掌養馬芻牧之事以役圉師亦是為馬故亦連類在此也職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人注職主也主四方之職貢者職方氏主四方官之長疏釋曰在此者司馬主九畿職方制其貢事相成故在此官尊而人多以其主天下人民貢賦之事事繁故也注釋曰云主四方官之長者與下諸言方者為長也土方氏上士五人下士十人府二人史五人胥五人徒五十人注土方氏主四方邦國之土地疏釋曰在此者按其職云以土地相宅而建邦國都鄙與職方連類在此也故主四方邦國之土地懷方氏中士八人府四人史四人胥四人徒四十人注懷來也主來四方之民及其物疏釋曰在此者按其職云掌來逺方之民致方貢致逺物故與職方連類在此也合方氏中士八人府四人史四人胥四人徒四十人注合方氏主合同四方之事疏釋曰在此者按其職云掌達天下之道路通其財利同其數器故注云主合同四方之事故亦連類在此也訓方氏中士四人府四人史四人胥四人徒四十人注訓道也主教道四方之民音義道音導下同疏釋曰在此者按其職云掌道四方之政事與其上下之志誦四方之傳道故注云敎導四方之民故連類在此也形方氏中士四人府四人史四人胥四人徒四十人注形方氏主制四方邦國之形體疏釋曰在此者按其職云掌制邦國之地域而正其封疆故注云主制四方邦國之形體故連類在此也山師中士二人下士四人府二人史四人胥四人徒四十人疏釋曰在此者按其職云掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物按王制云名山大澤不以封故天子立􅋄師以遥掌之使貢故與職方亦連類在此也川師中士二人下士四人府二人史四人胥四人徒四十人疏釋曰在此者按其職與山師同故亦連類在此邍師中士四人下士八人府四人史八人胥八人徒八十人注邍地之廣平者音義邍音原疏釋曰在此者按其職云掌四方之地名辨其丘陵墳衍原隰之名故連類在此也注釋曰云邍地之廣平者爾雅文也匡人中士四人史四人徒八人注匡正也主正諸侯以法則疏釋曰在此者按其職云掌達法則匡邦國而觀其慝使無敢反側以聼王命注云主正諸侯以法則故連類在此也撢人中士四人史四人徒八人注撢人主撢序王意以語天下音義撢他南反與探同語魚據反疏釋曰在此者按其職云掌誦王志道國之政事以廵天下之邦國而語之故注云主撢序王意以語天下故連類在此也都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人注都王子弟所封及三公采地也司馬主其軍賦疏釋曰言每都上士二人已下者此王自以臣為司馬遥掌都内故其職云掌都之士庶子及其衆庶車馬兵甲之戒令聽於國司馬既是軍故在此也注釋曰鄭據何知都惟有王子弟所封及三公采地不通卿大夫者案司裘云諸侯則共熊侯豹侯卿大夫則共麋侯卿不入諸侯之中故知義然云司馬主其軍賦者即司馬法云成出士十人徒二十人之等並是都司馬所主也家司馬各使其臣以正於公司馬注家卿大夫采地正猶聽也公司馬國司馬也卿大夫之采地王不特置司馬各自使其家臣為司馬主其地之軍賦往聽政於王之司馬王之司馬其以王命來有事則曰國司馬疏注釋曰云家卿大夫采地者按載師職家邑任稍地謂大夫采地小都任縣地謂卿之采地大都任疆地謂三公采地則卿入小都中今此經直言家而小都入家中不在上都中者司馬主軍事嚴凝為主須辨尊卑故依司裘卿與大夫不得稱諸侯者為家又不使王臣為之也若然都宗人家宗人及都士家士皆使王臣為之者都家宗人有祖王之廟九皇六十四氏王所當祭故使王臣為之都家之士以獄訟刑罪王政之重非王臣不決故亦使王臣為之但非嚴凝故卿入都耳云王之司馬其以王命來有事則曰國司馬者其職云以聼於國司馬對此從下向上則曰公司馬周禮注疏卷二十八周禮注疏卷二十八考證凡軍制卒長皆上士二十五人為兩石經上士下作二十有五人當從之又注卒一族族監本訛作旅今改正疏是以州長職注云掌其戒令賞罰則是於軍因為師帥監本脱則是於軍因為師七字今考州長注補之節服氏疏故知官有世功則曰官族族監本訛旅今据左傳改正大馭疏此大馭在前者大馭監本訛戎僕今據下文云退戎僕於後進大馭於前改正之趣馬下士皁一人徒四人下士無員數疑有脱文以立政與虎賁綴衣並列推之未必即以皂為下士也周禮注疏卷二十八考證
