body:
  text: 周禮注疏卷二十九漢鄭氏注唐陸徳眀音義賈公彦疏大司馬之職掌建邦國之九灋以佐王平邦國注平成也正也疏釋曰此九灋已下皆言邦國則施於諸侯為主故云邦國也云以佐王平邦國者九灋以糾察諸侯使之成正故以平言之也但此九灋據殷同之時建之故大行人云殷同以施天下之政注云政謂邦國之九灋則殷同之時司馬眀布告之故云建也制畿封國以正邦國注封謂立封於疆為界音義畿音祈疏釋曰謂制諸侯五百四百里之等各有封疆界分乃得正故云以正邦國設儀辨位以等邦國注儀謂諸侯及諸臣之儀辨别也别尊卑之位音義别彼列反下皆同疏注釋曰鄭知儀中有諸侯及諸臣者以此經云等邦國按大行人云以九儀辨諸侯之命等諸臣之爵鄭云九儀謂命者五公侯伯子男也爵者四孤卿大夫士也知九儀中唯有諸侯諸臣無天子之臣者按大宗伯云以九儀之命正邦國之位注云每命異儀則九儀之中謂一命以至九命之儀其中有六命八命并九命作伯兼有王臣則與此異也進賢興功以作邦國注興猶舉也作起也起其勸善樂業之心使不惰廢音義樂如字又音洛一音五敎反疏釋曰進賢謂臣舊在位有徳行者在草萊有徳行未遇爵命者進之使稱才任用興舉也臣有功者舉之亦使任用作起也以臣有賢有功舉與之官則起邦國之内勸善樂業之心使不惰廢善業也建牧立監以維邦國注牧州牧也監監一國謂君也維猶連結也音義監古銜反疏釋曰二百一十國以為州州有牧使維持諸侯又一國立一監以監察一國上下相維故云以維邦國也此則太宰云建其牧立其監亦一也制軍詰禁以糾邦國注詰猶窮治也糾猶正也音義詰去吉反疏釋曰制軍者按上文大國三軍次國二軍小國一軍詰禁者按士師有五禁天子禮此諸侯國亦當有五禁以相窮治相糾正故云以糾邦國施貢分職以任邦國注職謂賦税也任猶事也事以其力之所堪疏釋曰施貢多少據國地大小故地官大國貢半次國三之一小國四之一皆由天子施之此大宰九貢并小行人春令入貢皆是歳之常貢與大行人因朝而貢者異也分職者即太宰所云九職是也彼據畿内此據諸侯諸侯邦國亦由天子分之使民有職業因使税之所税者市之以充貢若然言貢據向天子而言云税據民所為為説事相因皆所以任邦國故云以任邦國也簡稽鄉民以用邦國注簡謂比數之稽猶計也音義鄉許亮反疏釋曰注云簡謂比數之稽猶計也謂比數計㑹鄉民而用之故云以用邦國也均守平則以安邦國注諸侯有土地者均之尊者守大卑者守小則法也疏釋曰言均守謂五等諸侯有五等受地五百里以下是均守也平則者則法也謂五等職貢之等皆有常法則邦國獲安故云以安邦國比小事大以和邦國注比猶親使大國親小國小國事大國相合和也易比象曰先王以建萬國親諸侯音義比毗志反注同疏注釋曰按司儀有五等諸侯自相為賓亦有五等諸侯之臣相為國客按春秋有小國朝大國大國聘小國故鄭云使大國親小國釋經比小也云小國事大國釋經事大使相合和故云以和邦國也引易比象者其卦坤下坎上坤為土坎為水水得土而流土得水而柔是水土和合故象先王建萬國親諸侯謂法卦行事使諸侯相親引之者證比小事大之義以九伐之灋正邦國注諸侯有違王命則出兵以征伐之所以正之也諸侯之于國如樹木之有根本是以言伐云音義伐如字劉扶發反疏注釋曰鄭云諸侯有違王命則出兵以征伐之所以正之也者此經與下文為目則下九者皆是違王命者也若然按下文九者唯有賊賢害民一者稱伐其餘八者皆不言伐此經總言伐者侵滅二者亦是伐之例其餘六者皆先以兵加其境服乃眚之墠之削之正之殘之杜之故皆以伐言之云諸侯之於國如樹木之有根本是以言伐云者按月令孟夏云無伐大樹孔子云伐一木不以其時非孝子是樹木稱伐此九伐施於邦國在於時㑹之時是以大行人云時㑹以發四方之禁注云禁謂九伐之法是當時㑹者也馮弱犯寡則眚之注馮猶乗陵也言不字小而侵侮之眚猶人眚瘦也王霸記曰四面削其地音義馮皮氷反眚所景反瘦所又反疏注釋曰云馮弱據以强陵弱云犯寡據以大侵小如此者眚瘦其地使不得强大也引王霸記者其記王及霸事者云四面削其地者對下文削之者不四面削之為異也賊賢害民則伐之注春秋傳曰粗者曰侵精者曰伐又曰有鐘鼓曰伐則伐者兵入其竟鳴鐘鼓以徃所以聲其罪音義粗音麤本亦作麤竟音境疏注釋曰云賊賢者亂王所任任同已者如此則賊虐諌輔故云賊賢也云害民者以君臣俱惡重賦多徭其民被害故曰害民如此者則聲鐘鼓伐之也引春秋傳者按莊十年二月公侵宋公羊傳曰觕者曰侵精者曰伐何休云觕麤也彼不言麤此言麤者鄭讀傳與何異觕即麤義亦同也又曰有鐘鼓曰伐者此荘二十九年夏鄭人侵許左氏傳曰凡師有鐘鼓曰伐無曰侵引此二者皆證侵輕伐重之義也暴内陵外則壇之注内謂其國外謂諸侯壇讀如同墠之墠王霸記曰置之空墠之地鄭司農云壇讀從憚之以威之憚書亦或為憚𤣥謂置之空墠以出其君更立其次賢者音義壇依注作墠音善憚之以徒旦反下同本或無之字疏釋曰暴内即上云賊賢害民是也陵外即上云馮弱犯寡是也上二文各有其一故伐之眚之不奪其位此則外内之惡兼有故壇之奪其位立其次賢注釋曰鄭云讀如同墠之墠從金縢三壇同墠之墠取其除地曰墠謂置之空地先鄭讀從憚之以威之憚此罪既重而直憚之於義不可故後鄭還從王霸記為正鄭知立其次賢者以其古者不滅國故知更立次已下賢子弟野荒民散則削之注荒蕪也田不治民不附削其地明其不能有音義蕪音無疏釋曰古者量地以制邑度地以居民地邑民居必參相得無曠土無逰民今言野荒民散由君政惡民竝適彼樂國故民散而野荒是其君不能有故削之負固不服則侵之注負猶恃也固險可依以固者也不服不事大也侵之者兵加其竟而已用兵淺者詩曰宻人不恭敢距大邦疏釋曰謂倚恃險固不服事大國則以兵侵之使弱其勢也注釋曰云固險可依以固者也者謂若僖四年楚屈完云楚國方城以為城漢水以為池雖君之衆無所用之是其負固不服也云不服不事大即上云比小事大是其服者也云用兵淺者對伐是用兵深者以其罪輕直侵之而已也詩云者大雅皇矣篇引之者證不服也賊殺其親則正之注正之者執而治其罪王霸記曰正殺之也春秋僖二十八年冬晉人執衞侯歸之于京師坐殺其弟叔武音義坐才卧反疏注釋曰鄭云正之者執而治其罪者其正未必即是殺但賊殺其親其罪尤重故以正為殺觧之是以王霸記以正為殺也引晉人執衛侯歸于京師京師據洛邑而言也云坐殺其弟叔武者按彼傳晉侯伐衛衞侯出奔楚晉侯敗楚於城濮其弟以受盟既受盟國則無罪衛侯即入將入與弟叔武為期衞侯先期入叔武將沐聞君至喜捉髮走出前驅歂犬射而殺之衛侯知其無罪枕之股而哭之元咺舊在國是叔武黨見衞侯殺弟遂訴衛侯於晉晉以衛侯有罪諸侯不相治罪遂執衛侯歸於京師時使醫衍酖衞侯寗俞貨醫衍薄其酖不死是坐殺弟合正之事也放弑其君則殘之注放逐也殘殺也王霸記曰殘滅其為惡音義弑本又作殺同音試疏注釋曰鄭以逐解放則若季氏逐昭公之類是也鄭雖不解弑弑其君則若慶父弑二君及崔杼弑君之類是也鄭云殘殺者以殺解殘也經本不云殺不云滅云殘者盖取殘賊殺之殺之苦毒故尚書梓材云戕敗人宥注戕殘也又云無胥戕無胥虐注云無相殘賊無相暴虐是戕為殘賊也異義鄭君以為左氏宣十八年秋七月邾人戕鄫子于鄫傳曰凡自内虐其君曰弑自外曰戕戕即邾人戕鄫子是也自内弑其君曰弑者晉人弑其君州蒲是也雖他國君不加虐亦曰殺若加虐殺之乃謂之戕之取殘賊之意也若自上殺下及兩下自相殺之等皆曰殺若然此經云殘者是加虐殺之雖非他國君至於賊臣亦云殘也犯令陵政則杜之注令猶命也王霸記曰犯令者違命也陵政者輕政灋不循也杜之者杜塞使不得與鄰國交通疏注釋曰鄭訓令為命者欲就王霸記之命解之為王命之意也但犯命陵政是不受上命不通之事故還杜塞之使不與四鄰交通外内亂鳥獸行則滅之注王霸記曰悖人倫外内無以異于禽獸不可親百姓則誅滅去之也曲禮曰夫唯禽獸無禮故父子聚麀音義行下孟反悖必内反去起吕反夫音符麀於牛反牝鹿也疏注釋曰外亂謂滛於外若齊襄公魯桓夫人文姜之等是也内亂謂家内若衛宣公上烝父妾下納子妻之等是也引曲禮者鹿之父子聚麀獸之亂不言鳥之亂義可知故畧而不言也按春秋公羊左氏説凡征戰有六等謂侵戰伐圍入滅用兵麤觕不聲鐘鼓入境而已謂之侵侵而不服則戰之謂兩陳交刄戰而不服則伐之謂用兵精而聲鐘鼓伐而不服則圍之謂帀其四郭圍而不服則入之謂入其四郭取人民不有其地入而不服則滅之謂取其君此皆舉重而言假令先入後滅書入舉重已外盡然正月之吉始和布政于邦國都鄙乃縣政象之灋于象魏使萬民觀政象挾日而歛之注以正月朔日布王政於天下至正嵗又縣政灋之書挾日十日也音義縣音𤣥注同始直史反挟子協反疏釋曰正月謂周正建子之月之吉謂朔日始和凡政有故言始和者若改造云耳布政于邦國都鄙者謂上九灋九伐并下凡令以下皆此時布之邦國據畿外都鄙據畿内不言鄉遂及公邑布政可知此則徧天下也云乃縣已下亦謂正歳乃縣之一與大宰同不復具釋也乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿注畿猶限也自王城以外五千里為界有分限者九籍其禮差之書也政職所共王政之職謂賦税也故書畿為近鄭司農云近當言畿春秋傳曰天子一畿列國一同詩殷頌曰邦畿千里維民所止音義分符問反共音恭凡供字皆作共後倣此疏釋曰乃以九畿之籍者謂以面五千里為九畿皆有典籍之書今大司馬以此籍書施其政職之事於邦國諸侯也云方千里曰國畿者此據王畿内千里而言非九畿之畿但九畿以此國畿為本向外每五百里加為一畿也云侯者侯也為天子伺候非常也云甸者為天子治田以出賦貢云男者任也任王者之職事云采者采取美物以共天子云衛者為天子衛守云蠻者縻也以近夷狄縻繋之以政教自此以上六服是中國之九州自此已外是夷狄之諸侯此蠻服與大司徒云要服亦一也言要者亦見要束以文敎也云夷者以夷狄而得夷稱也云鎮者盖中國稍逺理湏鎮守云蕃者以其最逺故得蕃屏之稱此三服總號蕃服故大行人云九州之外謂之蕃國世一見指此三服也此九者衞服之内各舉一邊而言其實通稱唯蠻服以外直據彼為號不通中國之言也注釋曰云王城以外五千里為界者兩面相距則方萬里此則易之一君二民之地若然堯舜之時固應萬里而五服面二千五百里兩面相距止有五千里無萬里者此據未治洪水時服各五百里至禹治洪水之後弼成五服服加五百則亦萬里若孔君義則不然若據鳥飛直路此周之九服亦止五千若随山川屈曲則禹貢亦萬里彼此不異也云九籍其禮差之書也者諸侯賦貢多少有常則大國貢半次國三之一小國四之一是其禮差也云政職所共王政之職謂賦税也者按大宰云以九職任萬民據畿内此九職亦施與邦國則此政職也但施職事與之使萬民勤職而出賦税諸侯得之以半與三之一四之一市取土毛以貢之則禹貢篚貢是也據民而出謂之賦税據諸侯所送謂之貢也引春秋傳者按襄二十五年鄭子産對晉云昔天子之地一圻列國一同今大國多數圻矣若無侵小何以至焉殷頌邦畿千里是殷頌𤣥鳥詩之言引此二者證王畿千里之義凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人注賦給軍用者也令邦國之賦亦以地之美惡民之衆寡為制如六遂矣鄭司農云上地謂肥美田也食者參之二假令一家有三頃歳種二頃休其一頃下地食者參之一田薄惡者所休多音義令力呈反疏釋曰此文承上邦國之下而云令賦是還振邦國諸侯而説也此經有三等之地按小司徒注云有夫有婦然後為家自二人以至於十人為九等七六五者為其中則地有上中下各分為三等九等則十口食上上九口食上中八口食上下七人食中上六人食中中五人食中下四人食下上三人食下中二人食下下又按遂人上地夫一㕓田百畮萊五十畮中地家二百畮下地家三百畮與此上地食者參之二合故鄭云邦國如六遂矣若然則上地是上下之地應家八人一人為家長可任者當云家七人今云家三人者經欲互舉以眀義故以中地之上家七人見出上地之下八人者眀亦有上地之中上地之上又言下地食者參之一其民可用者家二人地即據下地之上人即據中地之下家五人者亦是互舉以眀義故地舉其下人舉其中欲見亦有下内三等其地及人也先鄭云食者參之二假令一家有三頃嵗種二頃休其一頃者舉上地只應云一頃五十畮而云三頃者直取參之二舉整言之或并二家而説也中春教振旅司馬以旗致民平列陳如戰之陳注以旗者立旗期民於其下也兵者守國之備孔子曰以不教民戰是謂棄之兵者凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入收衆専於農平猶正也音義中音仲下放此陳直覲反下之陳可陳陳前狥陳行陳廵陳皆同餘以意求之蒐所留反疏注釋曰鄭云以旗者立旗期民於其下也者謂大司馬素有田獵之期日今至期日立熊虎之旗於期處以集衆故云期民於其下云兵者守國之備者鄭欲解田獵者所以習兵故云兵是守國之備引孔子語欲見須田獵以教戰云兵者凶事者隠公傳文云不可空設因蒐狩而習之者蒐狩是田獵之名欲行蒐狩先芟草萊教戰訖乃入防田獵故云因蒐狩而習之是以書傳云戰鬬不可空習故於蒐狩以閑之閑之者習之是其習兵因蒐狩也云凡師出曰治兵入曰振旅皆習戰者按莊公八年正月師次於郎甲午祠兵公羊傳曰祠兵者何出曰祠兵注云禮兵不徒使故将出兵必祠於近郊陳兵習戰殺牲饗士卒又曰入曰振旅其禮一也皆習戰也左氏説治兵於廟禮也注云三年而治兵與秋同名兵革将出故曰治兵榖梁傳亦云出曰治兵習戰也入曰振旅習戰也鄭𤣥於異義駮不從公羊云祠兵故云祠兵者公羊字之誤因而作之説亦不從左氏説治兵為授兵於廟云於周司馬職曰仲夏教茇舎仲秋教治兵其下皆云如戰之陳仲冬教大閲修戰法虞人萊所田之野乃為之如是治兵之屬皆習戰非授兵於廟又無祠五兵之禮是以爾雅釋天云出為治兵尚威武也入為振旅反尊卑也言反尊卑者出則壯者在前老弱在後入則壯者在後老弱在前是以鄭此云振旅兵入收衆專於農也云四時各教民以其一焉者春教振旅夏教茇舎秋教治兵至冬大閲是各教民以一也辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲注鼓人職曰以路鼓鼓鬼享以賁鼓鼓軍事以晉鼓鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓鄭司農云辨鼓鐸鐲鐃之用謂鉦鐸之屬鐲讀如濁其源之濁鐃讀如讙嘵之嘵提讀如攝提之提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提杜子春云公司馬謂五人為伍伍之司馬也𤣥謂王不執賁鼓尚之於諸侯也伍長謂之公司馬者雖卑同其號音義辨如字劉万免反鐸直各反鐲直角反鐃女交反賁扶云反将軍如字本或作軍將提徒兮反鼙薄兮反鉦音征讙火官反嘵女交反攝提爾雅云太歳在寅曰攝提格疏釋曰此春夏秋三時各教其一必春辨鼓鐸者鼓雷之類象仲春雷發聲於外言辨鼓鐸鐲鐃之用者此句與下文為總目也注釋曰鄭引鼔人職者欲見鼓人有六鼓四金據本各依所用今此所用或有不依本者以其唯賁鼓鼓軍事是依本王執路鼓軍將執晉鼓等竝不依本用而在軍兼用也先鄭云辨鼓鐸鐲鐃之用謂鉦鐸之屬者按司馬灋云十人之長執鉦百人之帥執鐸千人之帥執鼙萬人之主執大鼓義與此同故引之為證也云鐲讀如濁其源之濁者此讀取音同之義濁其源者淮南子云濁其源其流不清故讀從之云鐃讀如讙嘵之嘵者從毛詩云以謹讙嘵云提讀如攝提之提者從爾雅云寅為攝提格取音同而已云提謂馬上鼓者此先鄭盖據當時已有單騎舉以況周其寔周時皆乗車無輕騎灋也後鄭云王不執賁鼓尚之於諸侯也者按鼓人職賁鼓鼓軍事計王在軍自為元帥自合執賁鼓今不執賁鼓者見諸侯因朝而來與王為賓客故讓之使執賁鼓故云尚之於諸侯王既不用賁鼓而用路鼓者以其雷鼓靈鼓祭天地之鼓不敢用故用祭宗廟之路鼓也軍將用晉鼓者是鼓金奏與之相應故也不用鼛鼓者鼓役事之鼓故不用云伍長謂之公司馬者雖卑同其號者按諸官大夫乃與大官同號宰夫已下并上士中士下士皆不得與大官同號今於序官大司馬之下上士得號行司馬及在軍二十五人長中士號兩司馬五人長下士號公司馬皆與大官同號者以司馬主軍軍事主嚴雖卑得同號也以敎坐作進退疾徐疏數之節注習戰灋音義疏數音朔下注疏數同疏釋曰按下大閲禮備軍法虞人萊所田之野下又云中軍以鼙令鼓鼓人皆三鼓已下有此坐作進退疾徐疏數之節彼大閲具言於此畧説有此坐作之法此於敎戰之處為之故鄭云習戰法也遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社注春田為蒐有司大司徒也掌大田役治徒庻之政令表貉立表而貉祭也誓民誓以犯田灋之罰也誓曰無干車無自後射立旌遂圍禁旌弊爭禽而不審者罰以假馬禁者虞行守禽之厲禁也既誓令鼓而圍之遂蒐田火弊火止也春田主用火因焚萊除陳草皆殺而火止獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻肩于公春田主祭社者土方施生也鄭司農云貉讀為禡禡謂師祭也書亦或為禡音義貉莫駕反注同弊婢世反劉薄計反射食亦反下王射同豵子工反肩詩作豜音同施式豉反禡莫駕反疏釋曰按下大閲禮遂以狩田以下云以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之既陳乃設驅逆之車有司表貉于陳前此亦當如彼但春非大備故亦畧言也言誓民者即下大閲禮羣吏聼誓於陣前鄭引月令司徒北面誓之是也云鼓者即下文中軍以鞞令鼓鼓人皆三鼓已下是也云遂圍禁者既誓令鼓而圍之云火弊者謂田止也云獻禽以祭社者此因田獵而祭非月令仲春祭社也注釋曰云春田為蒐者蒐搜也春時鳥獸孚乳搜擇取不孕任者故以蒐為名云有司大司徒也者即大司徒職云大田役治其徒庻之政令故知有司是大司徒也云表貉立表而貉祭也者此即詩及爾雅云類也禡也師祭是也云誓民誓以犯田法之罰也者當司徒北面誓之時小子斬牲以左右廵陳也云誓曰無干車無自後射者此據漢田律而言無干車謂無干犯他車無自後射象戰陳不逐奔走又一解云前人已射中禽後人不得復射彼又云無面傷之等象降者不逆撃之云立旌遂圍禁者旌則下文大閲禮云旗居卒間者是也云旌弊者弊仆也田止旌則仆云爭禽而不審者罰以假馬者謂獲禽所算之籌罰者謂效功時爭禽不審即罰去其籌云禁者虞衡守禽之厲禁也者按山虞皆云使地之民守其厲禁謂遮厲之禁不得非時入也若然按地官川衡小田獵之所無厲禁之事言衡者川林或有與山澤連者則亦有厲禁之事故連言之也中夏敎茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅注茇讀如萊沛之沛茇舍草止之也軍有草止之灋撰讀曰算算車徒謂數擇之也讀書契以簿書校録軍實之凡要號名者徽識所以相别也鄉遂之屬謂之名家之屬謂之號百官之屬謂之事在國以表朝位在軍又象其制而為之被之以備死事帥謂軍將及師帥旅帥至伍長也以門名者所被徽識如其在門所樹者也凡此言以也象也皆謂其制同耳軍将皆命卿古者軍将盖為營治於國門魯有東門襄仲宋有桐門右師皆上卿為軍將者也縣鄙謂縣正鄙師至鄰長也家謂食采地者之臣也鄉以州名亦謂州長至比長也野謂公邑大夫百官以其職從王者此六者皆書其官與名氏焉門則襄仲右師眀矣鄉則南鄉甀東鄉為人是也其他象此云某某之名某某之號某某之事而已未盡聞也鄉遂大夫文錯不見以其素信于民不為軍將或為諸帥是以闕焉夜事戒夜守之事草止者慎於夜於是主别其部職音義茇蒲末反撰息轉反又仕轉反注音算息緩反沛歩未反一音貝又普貝反數色主反簿歩古反後簿書皆放此識音志一音試下同朝直遥反被皮偽反下同治直吏反比毗志反甀直偽反見賢遍反疏釋曰如振旅之陳者四時各敎其一故春敎振旅夏教茇舎但設經不可文文具設故云如振旅之陳皆轉相如也云羣吏撰車徒者羣吏謂軍将至伍長各有部分皆選擇其在車甲士三人歩徒七十二人之等云讀書契者書契謂兵士簿書之要契此小宰之八成云師田以簡稽一也云辨號名者此帥以門名已下是也注釋曰茇讀如萊沛之沛者按王制云居民山川沮澤注云沮謂萊沛時俗有水草謂之萊沛故讀從之也云茇舍草止之也者以草釋茇以止釋舍故即云軍有草止之法云數擇之也者以解撰為數擇取其善者云軍實之凡要者凡軍有三種或以俘囚為軍實或以戈盾弓矢為軍實或以禽牲為軍實今此所云軍實者據兵器為軍實凡要即名籍之總名也云號名者徽識者即下注三者旌旗之細者也云所以相别也者皆綴之於膊上以别死者也云鄉遂之屬謂之名者言之屬即經云縣鄙是遂之屬從縣鄙至鄰里州是鄉之屬從州至比長故言之屬以總之云家之屬謂之號者謂都家之内從大夫至士云百官之屬謂之事者從王朝六卿已下至下士野以邑名鄭雖不言亦在鄉遂之例以其同是溝洫之人出軍出貢又等故知亦入名中也其號也名也事也三者據經而言云在國以表朝位者即覲禮云上介各奉其君之旗置於宫者是也云凡此言以也象也皆謂其制同耳者以謂若經云帥以門名已下至野以邑名已上五者皆言以也惟百官云象是以也象也此六者以象雖異其制則同皆小旌旗也云軍将皆命卿者欲解帥以門名之意止由卿居於國門使為軍将故軍將得以門為名云古者軍将盖為營治於國門者此解軍將得以門為名者只由非常之急要在於門故使卿在門住而營治其門故也云魯有東門襄仲者按昭三十二年左傳云魯文公薨而東門遂殺適立庻魯君於是乎失國公子遂字襄仲號為東門只由居東門宋有桐門右師者按春秋左氏傳昭二十五年春叔孫婼聘於宋桐門右師見之注云右師宋卿樂大心也其室居桐門故曰桐門右師是宋有桐門右師也引之證將帥得以門名之事經直云縣鄙鄭知鄰長者以其在軍之時從遂大夫已下至鄰長皆在今畧言縣鄙眀皆有也云家謂食采地者之臣也者食采地是公卿大夫其身在朝其臣在采地若公山弗擾之類今随主在軍故以其號為名也鄉以州名亦謂州長至比長者亦如六遂自鄉大夫已下至比長皆在今畧舉州為首也云野謂公邑大夫者謂為四等公邑若載師職公邑自甸以出至五百里其長二百里三百里如州長四百里五百里如縣正長下皆有屬官在軍者皆以邑為名云百官以其職從王者謂三百六十官各以其職事從王在軍若大宰下六十官随其長從王皆以事為號也云此六者皆書其官與名氏焉者六者謂經五以一象假令為官則云大司徒下某官姓名某也云門則襄仲右師眀矣者經直云帥以門名恐直以門為名不加官與名字諸官皆須名氏眀門亦有官與氏名故云眀矣云鄉則南鄉甀東鄉為人是也者甀與為人皆當時鄉名故舉以為況云其他象此者此鄭畧舉門名與鄉名其他仍有縣鄙與家野百官亦依此而稱焉云某某之名者即經云門縣鄙鄉野四者皆是某某之名謂若門名當云桐門右師之下某官某姓某甲之名三者皆放此云某某之號者即經云家以號名是也謂若魯之費邑即云費邑之下某官某姓某甲之號云某某之事者即經云百官各象其事謂若地官之下則云大司徒之下某官某姓某甲之事云未盡聞也者鄉來所釋六者畧聞帥以門名鄉以州名舉以為況其餘未聞故云未盡聞也云鄉遂大夫文錯不見者此經六遂直云縣鄙不言遂六鄉言以州名雖見鄉亦不見鄉大夫之身其文交錯不見鄉遂大夫故云文錯不見也云以其素信於民者兵書孫子云素信者與衆相得是也舊素與民相信者必情義相得故鄉遂之官還使為軍吏云不為軍将或為諸帥是以闕焉者管子云因内政寄軍令則鄉遂大夫已下至比長鄰長皆因為軍吏以領本民在上或别使人為軍将則鄉遂大夫别領人為師帥旅帥以下經在軍吏帥以門名之内故闕鄉遂大夫也必知有别使人為軍将法者見外傳穆叔云天子作師公帥之以征不徳詩曰周公東征四國是遑此竝上公為軍将詩云韎韐有奭以作六師此乃諸侯世子為軍将田獵亦容如此於是時鄉遂大夫則為諸帥也若然按下文云師都載旜鄉遂載物注云鄉遂大夫或載旜或載物衆屬軍吏無所将也者謂鄉遂大夫全無武用則諸帥亦不為則是衆屬他軍吏已身全無所將故或載旜或載物不載旗義與此不違也云於是主别其部職者釋經以辨軍之夜事分别其當部當職不與外交雜也遂以苗田如蒐之灋車弊獻禽以享礿注夏田為苗擇取不孕任者若治苗去不秀實者云車弊驅獸之車止也夏田主用車示所取物希皆殺而車止王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵礿宗廟之夏祭也冬夏田主于祭宗廟者隂陽始起象神之在内音義礿餘若反孕羊證反去起吕反綏而誰反下同疏釋曰在敎戰之處辨號名既訖遂入防行苗田之法云如蒐之法者如上蒐時有司表貉誓民令鼓遂圍禁之等云車弊及以享礿二者則與春異以其春時火弊祭社此時車弊享礿也注釋曰以其春夏為陽主其生長故春田為蒐搜取不孕任者夏田為苖若治苖去不秀實者其義但春時主孚乳故以不孕任解之也云車弊驅獸之車止也夏田主用車示所取物希者春秋左氏傳云彼徒我車懼其侵軼我也是車行遲取獸少故知用車示取物希也引王制曰天子殺則下大綏已下據殺訖而言毛詩傳云天子發抗大綏諸侯發抗小綏者據始殺而言也云大夫殺則止佐車者王制注佐車驅逆之車按田僕云掌佐車之政設驅逆之車佐車似與驅逆之車别者但王制佐車與田僕驅逆之車為一其田僕佐車自是田車之貳曰佐佐文雖同其義則異也若然驅逆之車言佐者能逐禽故以佐言之云礿宗廟之夏祭也者大宗伯文云冬夏田主於祭宗廟隂陽始起象神之在内者仲冬一陽生仲夏一隂生是隂陽在内故神象之而行祭也此祭因田獵獻禽為祭若正祭自在孟月中秋敎治兵如振旅之陳疏釋曰言敎治兵者凡兵出曰治兵人曰振旅春以入兵為名春尚農事秋以出兵為名秋尚嚴威故也云如振旅之陳者如春振旅時坐作進退疾徐疏數之法也辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅注軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也或載旜或載物衆屬軍吏無所将也郊謂鄉遂之州長縣正以下也野謂公邑大夫載旐者以其将羨卒也百官卿大夫也載旟者以其屬衛王也凡旌旗有軍衆者畫異物無者帛而已書當為畫事也號也皆畫以雲氣音義書音畫出注氣本或作气同疏釋曰按下文注以出軍之旗則如秋則此經是在軍旌旗也云各書其事與其號焉者此二者即是仲夏百官各象其事及號名之等此秋雖不具辨號名亦畧舉之見四時皆有此物也云其他皆如振旅者亦謂坐作進退疾徐之法如振旅之陳也注釋曰云軍吏諸軍帥也者亦謂從軍將至下伍長皆是軍吏也云師都遂大夫也鄉遂鄉大夫也者按司常云孤卿建旜大夫士建物則鄉大夫是卿建旜是其常師都載旜不嫌無鄉大夫故鄭直舉遂大夫也云鄉遂鄉大夫者以其遂大夫是中大夫建物是其常今鄉遂建物不嫌無遂大夫故鄭直舉鄉大夫也云或載旜或載物衆屬軍吏無所將也者鄉遂大夫若為軍将則在軍吏載旗軍中領衆來時亦載旗今載旜載物不載旗故知已之所管之衆屬他軍吏已無所将以其已無武用非直不為軍将亦不為諸帥故全無所将以是載旜載物而已若然既不為軍吏遂大夫上得與卿同載旜鄉大夫則是卿下得與大夫同載物也以鄉遂大夫掌衆同故同載物也俱兩載者以其不為軍将又不任鄉職卿大夫尊卑之常當載旜載物而已故容其兩載也云郊謂鄉遂之州長縣正以下也者郊内有六鄉州長以下郊外有六遂縣正已下故知言郊有此二等人也云野謂公邑大夫者按載師職云公邑之田任甸地郊外曰甸甸則郊外曰野故以野言之但公邑自甸以出至疆五百里有四等公邑皆有大夫治之故司馬法云二百里三百里如州長四百里五百里如縣正是公邑大夫也云載旐者以其将羨卒也者以其六鄉之内上劑致民一家一人為正卒其餘皆為羨卒六遂之内下劑致民家一人為正卒一人為羨卒其餘為餘夫正卒既屬軍吏其餘羨卒使此州長已下等不為軍吏者領之但公邑之内雖不見有出軍之法若出軍亦當與鄉遂同以其得為溝洫法故也若出軍亦正卒使大夫等為軍吏其餘羨卒亦使不為軍吏者領之云百官卿大夫也載旟者以其屬衛王也者以其天地四時之卿大夫其屬各六十有選當行衛守王者即是有衆故載鳥隼之旟云凡旌旗有軍衆者畫異物者即經天子諸侯軍吏郊野百官是也云無者帛而已者鄉遂載旜物是也云書當為畫事也號也皆畫以雲氣者事即上百官言事號即上家言號不言名此亦有名文畧耳云畫以雲氣者鄭解經典言畫者皆以雲解之謂畫五色雲也遂以獮田如蒐田之灋羅弊致禽以祀祊注秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方音義獮息淺反祊音方出注皆殺如字劉色界反疏釋曰上文敎戰班旗物訖遂入防行獮田之禮其法如蒐田之法云羅弊致禽以祀祊者秋田主用羅羅止田畢入國過郊之神位乃致禽以祀四方之神注釋曰云祊當為方聲之誤也者以祊乃是廟門外之西惟因祭宗廟及眀日繹祭乃為祊祭今既因秋田而祭當是祭四方之神故云誤也云秋田主祭四方報成萬物者以秋物成四方神之功故報祭之云詩曰以社以方者詩小雅引之證方是四方之神也中冬敎大閲注春辨鼓鐸夏辨號名秋辨旗物至冬大閲簡軍實凡頒旗物以出軍之旗則如秋以尊卑之常則如冬司常佐司馬時也大閲備軍禮而旌旗不如出軍之時空辟實音義閲音悦辟音避疏釋曰以冬時農隙故大簡閲軍實之凡要也注釋曰云春辨鼓鐸已下欲見春夏秋各敎其一至冬大閲之時總敎之故云至冬大閲軍實云凡頒旗物以出軍之旗則如秋以尊卑之常則如冬司常佐司馬時也者以其王與諸侯所建秋冬同又秋云軍吏建旗師都載旜鄉遂載物郊野載旐百官載旟不言旞旌二者以其是出軍之法故不言道車游車所載大閲之時見尊卑之常故司常云孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞游車載旌此為異也鄭云大閲備軍禮而旌旗不如出軍之時空辟實者大閲雖備禮是敎戰非實出軍法是其空也秋敎治兵治兵是出軍法故寄出軍之旗於彼是冬之空辟實出軍法者也趙商問巾車職建大麾以田注田四時田獵商按大司馬職四時皆建大常何鄭荅曰麾夏之正色田雖習戰春夏尚生其時宜入兵夏本不以兵得天下故建其正色以春夏田至秋冬出兵之時乃建大常趙商又問巾車職曰建大白以即戎注云謂兵車司馬職仲秋辨其物以治兵王建大常注凡頒物以出軍之旗則如秋不知大白以即戎為何時荅曰白者殷之正色王即戎者或命将或勞師不自親将故建先王之正色異於親自將也前期羣吏戒衆庻修戰灋注羣吏鄉師以下疏注釋曰言前期者謂若大宰職云前期十日此亦在敎戰前不必要十日前也知羣吏鄉師以下者見鄉師職云凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍是其事也言鄉師以下則不及鄉鄉是鄉大夫則卿也則可及州長故州長職云若國作民而師田行役之事則帥而致之掌其戒令與其賞罰黨正云凡作民而師田行役則以其法治其政事族師亦云若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而致是其以下之事也虞人萊所田之野為表百歩則一為三表又五十歩為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質眀弊旗誅後至者乃陳車徒如戰之陳皆坐注鄭司農云虞人萊所田之野芟除其草萊令車得驅馳詩曰田卒汚萊𤣥謂萊芟除可陳之處後表之中五十歩表之中央表所以識正行列也四表積二百五十歩左右之廣當容三軍歩數未聞致致之司馬質正也弊仆也皆坐當聽誓音義芟所銜反令力呈反下令走同卒子恤反汚音烏行户剛反下行列行陳皆同仆音赴疏釋曰虞人者若田在澤澤虞若田在山山虞謂使其地之民於可陳之處芟除草萊故云萊所田之野云為表百歩則一為三表者按下注引月令司徒北面以誓之此經云司馬建旗於後表之中車徒皆坐則此於可陳之中從南頭立表以北頭為後表也注釋曰先鄭云虞人萊所田之野芟除其草萊令車得驅馳者謂芟除其田獵之處故云令車得驅馳引詩者證田處草萊按王制云昆蟲未蟄不以火田則仲冬之時放大田獵何須芟除草萊是以車攻詩毛傳云大艾草以為防然後焚而射焉是田處不得芟草萊故後鄭易之以為芟除可陳之處云後表之中五十歩表之中央者謂從南表至北表云表所以識正行列也者於可陳之中央立此四表表兩相各有三軍之衆至表則閒一而坐坐而更起是表正行列也云積二百五十歩者以三表之間有二百歩又加一表五十歩故總為二百五十歩也云左右之廣當容三軍者天子六軍左右之地各容三軍此鄭據天子六軍整數而言其實兼羨卒之等故小司徒職云凡起徒役無過家一人惟田與追胥竭作鄭云國人盡行是非止六鄉之民六軍而已云歩數未聞者但先南北二百五十歩東西不言歩數故云未聞也云皆坐當聽誓者下文即云聽誓於陳前故先當聽誓也羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之注羣吏諸軍帥也陳前南面鄉表也月令季秋天子敎于田獵以習五戎司徒搢扑北面以誓之此大閲禮實正嵗之中冬而説季秋之政於周為中冬為月令者失之矣斬牲者小子也凡誓之大畧甘誓湯誓之屬是也音義鄉許亮反搢劉如字又音箭一音初洽反扑普卜反甘如字劉胡甘反疏釋曰云羣吏聽誓於陳前者士卒皆於後表北面坐羣吏諸軍帥皆在士卒前南面立以聽誓云斬牲以左右徇陳者從表左右向外以徇陳注釋曰云羣吏諸軍帥者從軍將以至伍長謂象軍吏建旗者也引月令者證所誓者是司徒使司徒誓者此軍吏及士本是六鄉之民今雖屬司馬猶是已之民衆故使司徒誓之也云此大閲禮實正嵗之中冬者周雖建子為正及其行事皆用夏之正嵗則此經中夏中春中秋中冬皆據夏法也云而説季秋之政於周為中冬為月令者失之矣者吕不韋作月令以為此經中冬為周之中冬當夏之季秋故説於季秋是失之矣按月令季秋云是月也天子乃敎於田獵以習五戎班馬政云云注引中秋敎治兵法王載大常已下為證不云失至此乃以月令是中冬敎大閲法而言為月令者失鄭君兩解之以其彼云司徒誓衆與此誓衆之等同故為大閲彼為治兵法者以彼文授車以等級及命主祠祭于四方文與中秋治兵者同故彼為治兵法也云斬牲者小子也者小子職云凡師田斬牲以左右徇陳是也云凡誓之大畧甘誓湯誓之屬是也者甘誓是啟與有扈戰湯誓是湯伐桀誓衆辭言之屬者仍有泰誓費誓之等故云之屬中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼔摝鐸羣吏弊旗車徒皆坐注中軍中軍之將也天子六軍三三而居一偏羣吏既聽誓各復其部曲中軍之將令鼓鼓以作其士衆之氣也鼓人者中軍之將師帥旅帥也司馬兩司馬也振鐸以作衆作起也既起鼓人撃鼓以行之伍長鳴鐲以節之伍長一曰公司馬及表自後表前至第二表也三鼓者鼔人也鄭司農云摝讀如弄𤣥謂如涿鹿之鹿掩上振之為摝摝者止行息氣也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過琅音義摝音鹿李扶表反鐸待洛反涿丁角反沈音濁劉音獨閶吐剛反闒吐獵反劉湯荅反琅音郎疏釋曰此經總説聽誓既已將欲向南第二表象戰陳初發面敵此即仲春振旅疾徐坐作之事一也注釋曰中軍中軍之将也者此六軍三軍居一偏皆自有中軍也是以鄭云天子六軍三三而居一偏也言三三者非謂如算法云三三而九者直是兩箇三為三而復三而已也云羣吏既聽誓命各復其部曲者軍吏本各主其部分曲别謂若伍長主五人兩司馬主二十五人卒長主百人之等皆是部曲至於誓之時出向衆前聽誓訖各復其部伍本處故云復其部曲也云中軍之將令鼔者經云中軍以鼙令鼓故知中是中軍之将也云鼔以作其士衆之氣者春秋左氏傳曹劌云一鼔作氣再而衰三而竭是鼔以作士衆之氣也云鼓人者中軍之将師帥旅帥也者按成二年左傳晉與齊戰于鞌郤克傷於矢曰余病矣張侯曰師之耳目在吾旗鼓進退從之於是右援枹而鼓之時郤克撃鼓哀二年左傳鐡之戰趙簡子云伏弢嘔血鼓音不衰是皆將居鼓下知兼有師帥旅帥者按上文春辨鼓鐸云軍將執晉鼓師帥執提旅帥執鼙皆是鼓人故知是軍将師帥旅帥也其卒長執鐃已下皆金非鼔也云司馬兩司馬也者以其上文云兩司馬執鐸故知此經云司馬振鐸者是兩司馬也云以作衆者金雖非鼓振之者亦是以作衆也云作起也既起鼓人撃鼓以行之者釋經車徒皆作鼓行也云伍長鳴鐲以節之者上文云公司馬執鐲鼔人職云金鐲節鼓故云伍長鳴鐲以節之也云伍長一曰公司馬者上文云公司馬執鐲是伍長故云一曰公司馬也先鄭云摝讀如弄者直以摝弄聲相近以振鐸謂之弄也𤣥謂如涿鹿之鹿者謂從史記黄帝與蚩尤戰于涿鹿之鹿直取音同不從義也此是鹿鹿然作聲也云掩上振之者以手在上向下掩而執之云止行息氣也者按鼓人云金鐸通鼓金鐃止鼓則金鐸是通鼔而云止行息氣者見經云摝鐸即云羣吏弊旗故知金鐸亦得止行息氣也司馬法鼓聲不過閭以下者證鼔鼙與鐸聲之有異也又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初注趨者赴敵尚疾之漸也春秋傳曰先人有奪人之心及表自第二前至第三音義驟在救反劉才遘反先悉薦反疏注釋曰昭二十一年冬十月華登以呉師救華氏宋厨人濮曰軍志有之先人有奪人之心注云戰氣未定故也後人有待其衰注云待敵之衰乃攻是其事也乃鼓車馳徒走及表乃止注及表自第三前至前表鼓戒三闋車三發徒三刺注鼔戒戒攻敵鼓壹闋車壹轉徒壹刺三而止象服敵音義闋苦穴反疏注釋曰經并言三闋三發三刺鄭厯言鼓一闋車一轉徒一刺三而止者鄭據實而言非是一時而三故也乃鼓退鳴鐃且郤及表乃止坐作如初注鐃所以止鼓軍退卒長鳴鐃以和衆鼓人為止之也退自前表至後表鼓鐸則同習戰之禮出入一也異者廢鐲而鳴鐃音義郤起畧反和胡卧反為于偽反下為相疑同疏釋曰此言乃鼓退者謂至南表軍吏及士卒囘身向北更從南為始也云鳴鐃且郤者此鳴鐃且郤據初至南表退軍之時象在軍軍退亦鳴鐃是以左氏哀公艾陵之戰陳子云吾聞鼓不聞金亦是鳴鐃退軍法及其向北即更為習戰之事故云及表乃止坐作如初故鄭云習戰之禮出入一也注釋曰云鐃所以止鼓者鼓人職云金鐃止鼓是也知卒長鳴鐃者春辨鼓鐸云卒長執鐃是也云退自前表至後表者經畧言表則及表乃止坐作如初者總向北三表故鄭云自前表至後表也云鼓鐸則同者鼓人三鼓兩司馬執鐸與向南時同以其習戰之禮出入一也云異者廢鐲而鳴鐃者前向南時云鼓行鳴鐲此北向不言鳴鐲而言鼓退鳴鐃以其雖習戰出入一猶衆退軍故鳴鐃也遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百歩有司廵其前後險野人為主易野車為主注冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之叙和出用次第出和門也左右或出而左或出而右有司平之鄉師居門正其出入之行列也旗軍吏所載分地調其部曲疏數前後有屯百歩車徒異羣相去之數也車徒畢出和門鄉師又廵其行陳鄭司農云險野人為主人居前易野車為主車居前音義分扶問反又如字注同易以豉反注同壘力軌反疏釋曰此一節總論敎戰訖入防田獵之事故云遂以狩田也云以旌為左右和之門者六軍分三軍各處東西為左右各為一門云以敘和出者以教戰處内故以田處出云旗居卒間者軍吏各領己之士卒執旗以表之故旗居卒間也注釋曰云冬田為狩言守取之無所擇者對春夏言蒐言苗有所擇又秋名獮中殺者多對此圍守之此又多於獮故得守名也云軍門曰和者左氏傳云師克在和不在衆田獵象戰伐故其門曰和門也云今謂之壘門者漢時軍壘為門名曰壘門與古和門同故舉為説云立兩旌以為之者昭八年榖梁傳云秋蒐于紅正也又云刈蘭以為防置旜以為轅門以葛覆質以為槷注云質椹也槷門中臬又云流旁握御轚者不得入注流旁握謂車兩轊頭各去門邊空握握四寸也又車攻詩傳云大艾草以為防或舍其中褐纒旃以為門裘纒質以為槸門容握驅而入擊則不得入左者之左右者之右然後焚而射焉又云古者戰不出頃田不出防是其事也云有司平之鄉師居門正其出入之行列也者按鄉師職云廵其前後之屯而戮其犯命者斷其爭禽之訟故知此經云有司皆是鄉師也云車徒異羣者出軍之時一車甲士三人歩卒七十二人車徒同羣今在軍行列之時則車徒異羣故車人有異也既陳乃設驅逆之車有司表貉于陳前注驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也音義驅起其反又如字要於遙反疏釋曰前經論陳車徒訖故此云既陳云乃設驅逆之車設訖即為表貉之祭於陳前也注釋曰云驅驅出禽獸使趨田者按王制云天子發諸侯發皆不云佐車者其實天子諸侯田時皆有驅逆之佐車直於大夫言之者據終而言也知設此車是田僕者見田僕職云設驅逆之車故知也中軍以鼙令鼓鼔人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳注羣司馬謂兩司馬也枚如箸銜之有繣結項中軍法止語為相疑惑也進行也鄭司農云大獸公之輸之於公小禽私之以自畀也詩云言私其豵獻肩于公一嵗為豵二歳為豝三嵗為特四嵗為肩五嵗為慎此眀其獻大者於公自取其小者𤣥謂慎讀為麎爾雅曰豕生三曰猣豕牝曰豝麋牝曰麎獲得也得禽獸者取左耳當以計功音義箸直慮反繣户卦反劉又胡麥反或音卦畀必二反與也豝音巴本亦作巴慎如字亦音辰麎音辰又音腎止尸反麎糜牝也猣本亦作豵子工反疏釋曰此令鼓之事與上文敎戰時大同惟徒銜枚為異注釋曰鄭知羣司馬謂兩司馬者上文春辨鼓鐸云兩司馬振鐸故知之也云枚如箸銜之有繣結項中者雖無正文以意言之繣即兩頭繋也既有兩繋眀於項後中央結之先鄭引詩云言私其豵獻肩于公一嵗為豵已下鄭皆不從者豳詩毛傳云三嵗曰豜此云四嵗為肩爾雅云豕生一曰特二曰師三曰豵又爾雅云麋牝曰麎無五嵗為慎又魏詩云三嵗曰特先鄭皆無可依據故不從也若然豜還是鹿之絶有力者也及所弊鼓皆駴車徒皆譟注鄭司農云及所弊至所弊之處𤣥謂至所弊之處田所當於止也天子諸侯蒐狩有常至其常處吏士鼓譟象攻敵尅勝而喜也疾雷擊鼓曰駴譟讙也書曰前師乃鼓䵾譟亦謂喜也音義駴本亦作駭胡楷反李一音亥譟素報反䵾音符又芳甫反疏釋曰云及所弊者各徒弊止之處謂百姓獵止注釋曰引書曰者書傳文彼説武王伐紂時事徒乃弊致禽饁獸于郊入獻禽以享烝注徒乃弊徒止也冬田主用衆物多衆得取也致禽饁獸于郊聚所獲禽因以祭四方神于郊月令季秋天子既田命主祠祭禽四方是也入又以禽祭宗廟音義饁于輙反劉于法反烝之升反後皆放此疏釋曰云致禽饁獸于郊者亦謂因田過郊之神位而饋之注釋曰月令季秋天子既田云云者證彼祭禽于四郊與此饁獸于郊為一物其實彼一解以為是仲秋祭禽以祠祊為一也及師大合軍以行禁令以救無辜伐有罪注師所謂王廵守若㑹同司馬起師合軍以從所以威天下行其政也不言大者未有敵不尚武音義從才用反下同疏注釋曰云師所謂王廵守若㑹同者以對下文云若大師是出軍法故鄭云未有敵不尚武也若大師則掌其戒令涖大卜帥執事涖釁主及軍器注大師王出征伐也涖臨也臨大卜卜出兵吉凶也司馬法曰上卜下謀是謂參之主謂遷廟之主及社主在軍者也軍器鼓鐸之屬凡師既受甲迎主于廟及社主祝奉以從殺牲以血塗主及軍器皆神之疏釋曰云師執事涖釁主及軍器者按小子職云釁邦器及軍器彼官釁之而大司馬臨之注釋曰鄭知臨大卜者按大卜云掌龜之八命一曰征故知也云司馬法曰上卜下謀是謂參之者卜在廟又龜有神故云上卜謀人在下故云下謀君居其中故云參也云主謂遷廟之主及社主在軍也者曾子問云軍行則以遷廟之主行左傳祝佗云軍行祓社釁鼓祝奉以從尚書云用命賞于祖不用命戮于社皆是在軍者也及致建大常比軍衆誅後至者注比或作庀鄭司農云致謂聚衆也庀具也𤣥謂致鄉師致民於司馬比校次之也音義比必履反注同或毗志反劉方旨反庀匹是反劉芳美反具也沈方二反疏注釋曰先鄭云庀具也者先鄭從古書庀後鄭不從以為校次者凡物有數者皆須校次乃知具不故不從具也𤣥謂致鄉師致民於司馬者據鄉師職知之其司馬用王大常者以上文大師王親御六軍故司馬用王之大常致衆若王不親則司馬自用大旗致之及戰廵陳眡事而賞罰注事謂戰功也音義眡音視疏釋曰廵陳者司馬當戰對陣之時廵軍陳眡其戰功之事知其有功無功而行賞罰也若師有功則左執律右秉鉞以先愷樂獻于社注功勝也律所以聽軍聲鉞所以為將威也先猶道也兵樂曰愷獻于社獻功于社也司馬法曰得意則愷樂愷歌示喜也鄭司農云故城濮之戰春秋傳曰振旅愷以入于晉音義鉞音越道音導濮音卜疏釋曰云若師有功則左執律右秉鉞以先者謂戰陳知有勝功訖乃執律者示此律聽軍聲尅勝耳右秉鉞示威也注釋曰云律所以聽軍聲者大師職云彼初出軍時大師執聽至此尅勝司馬執之先鄭引城濮之戰者僖二十八年晉文公敗楚於城濮兵入曰振旅整衆而還歌愷樂而入晉彼諸侯法與此天子禮同故引為證也趙商問夏官師有功則獻于社春官大司樂王師大獻則令奏愷樂注云大獻獻捷於祖不達異意鄭荅曰司馬主軍事之功故獻於社大司樂宗伯之屬宗伯主宗廟故獻于祖若然軍有功二處俱獻以其出軍之時告于祖宜于社故反必告也若師不功則厭而奉主車注鄭司農云厭謂厭冠喪服也軍敗則以喪禮故秦伯之敗於殽也春秋傳曰秦伯素服郊次鄉師而哭𤣥謂厭伏冠也奉猶送也送主歸於廟與社音義厭於渉反李一音於入反注同殽户交反劉音豪鄉許亮反疏注釋曰春秋秦伯事左傳僖三十三年秦師襲鄭之事按彼僖三十年秦晉圍鄭鄭使燭之武説秦伯秦師退使把子逄孫楊孫戍鄭至僖三十三年秦使孟眀視白乙丙西乞術襲鄭將至鄭逢商人弦髙將市于周詐之秦師還至殽晉師與姜戎敗之獲三帥囚之於晉晉舍三帥還秦伯素服郊次鄉師而哭之是其事也𤣥謂厭伏冠也者按下曲禮云厭冠不入公門彼差次當緦小功之冠以義言之五服之冠皆厭以其喪冠反吉冠吉冠於武上向内縫之喪冠於武下向上縫之以伏冠在武故得厭伏之名按檀弓注厭冠喪冠其服亦未聞若然先鄭引秦伯素服者彼據在國向外哭此則從外向内不同故云其服未聞後鄭不破者已有檀弓注此從破可知王弔勞士庻子則相注師敗王親弔士庻子之死者勞其傷者則相王之禮庻子卿大夫之子從軍者或謂之庻士音義勞老報反注同相息亮反注同疏注釋曰按宫伯云掌宫中士庻子注云士適子庻子其支庻與此注云庶子為卿大夫之子適庻俱兼則經中士為卿大夫士之身與宫伯注不同者彼宫正掌卿大夫士身宫伯别掌士庻子士庻子為適子支子眀矣此惟一文云弔勞士庻子不見别有弔勞卿大夫士身故分之鄭望經為注故不同也若然此注不云士之子者以其卿大夫之適子為王與后與士同故親弔勞之士之子如衆人不得為王及后如士故不弔勞之也大役與慮事屬其植受其要以待攷而賞誅注大役築城邑也鄭司農云國有大役大司馬與謀慮其事也植謂部曲將吏故宋城春秋傳曰華元為植廵功屬謂聚㑹之也要者簿書也攷謂考校其功𤣥謂慮事者封人也於有役司馬與之植築城槙也屬賦丈尺與其用人數音義與慮音預又如字注與謀同屬音燭注同植直吏反注同華户化反槙音貞疏釋曰此謂築城邑之時封人慮事計功大司馬雖不掌徒役亦得與謀也屬其植者屬謂屬聚徒役計其人數賦其丈尺以課其功也植者版幹之屬計其人數各使備足也注釋曰先鄭以為與慮事大司馬與在謀慮其事中後鄭從之増成其義按宣十一年楚令尹蒍艾獵城沂使封人慮事以授司徒注云封人司徒之屬官是封人慮事司馬與在謀慮中也春秋宋華元者按宣二年左氏傳云宋城華元為植廵功注云植将主也先鄭云植謂部曲将吏屬謂聚㑹之後鄭不從以為植築城槙也屬賦丈尺與其用人數者按昭三十二年晉士彌牟營成周計丈數揣髙卑度厚薄仭溝洫又云以令役於諸侯屬役賦丈又宣十一年計慮用人功之數以此知屬謂賦丈尺與人數也大㑹同則帥士庻子而掌其政令注帥師以從王疏注釋曰知帥師以從王者按諸子職云若㑹同賔客作羣子從注云從從王是其事也若大射則合諸侯之六耦注大射王將祭射于射宫以選賢也王射三侯以諸侯為六耦疏釋曰王大射之時有諸侯來朝在京師者大司馬合之為六耦注釋曰云大射王将祭射于射宫以選賢也者按禮記射義云古者天子之制諸侯嵗獻貢士於天子天子試之於射宫而中多者得與於祭大射禮亦射於郊學宫中皆是為祭選士故云選賢也云王射三侯者司裘云王大射則共虎侯熊侯豹侯是也此大射是将祭而射故用諸侯為六耦若賔射射人亦用六耦但不用諸侯當用卿大夫為之燕射三耦自然用卿大夫已下為之大祭祀饗食羞牲魚授其祭注牲魚魚牲也祭謂尸賓所以祭也鄭司農云大司馬主進魚牲音義食音嗣後饗食皆放此疏釋曰大祭祀謂天地宗廟此大祭據宗廟而言其中小之祭祀亦為之矣饗食謂諸侯來朝上公三饗三食之等行之在廟故與大祭祀同皆羞進魚牲注釋曰云祭謂尸賓所以祭也者大祭祀授尸祭饗食授賓祭祭者魚之大臠即少牢下篇云尸爼五魚侑主人皆一魚加膴祭於其上膴謂魚之反覆者公食大夫亦云授賓祭故云祭謂尸賓所以祭若王祭則膳夫云授王祭是也先鄭云大司馬主進魚牲者必使司馬進之者司馬夏官夏隂氣所起魚水物亦隂類故使司馬進之也大喪平士大夫注鄭司農云平一其服也𤣥謂平者正其職與其位疏釋曰必使司馬平之者司馬之屬有司士主羣吏今王喪不得使司士故司馬平之注釋曰先鄭云平一其服也者後鄭不從者小宗伯已懸衰冠故後鄭以為平者正其職與其位也喪祭奉詔馬牲注王䘮之以馬祭者蓋遣奠也奉猶送也送之至墓告而藏之音義遣奠棄戰反後遣奠遣車之類皆同疏注釋曰鄭知喪祭是大遣奠者以其喪奠反虞卒哭喪祭之等無奉送詔告惟有大遣奠入壙之時有奉送之事故知喪祭是大遣奠耳周禮注疏卷二十九周禮注疏卷二十九考證大司馬施貢分職注職謂賦税也賦一本作職言因職而有税也故疏引大宰九職當從之乃以九畿之籍疏此蠻服與大司徒云要服亦一也司徒二字疑行人之訛以大司徒無要服之文而大行人有之也又五千里為界者兩面相距則方萬里此則易之一君二民之地臣宗楷按易之一君二民之地八字不可解當作據其一面而言之也而傳寫誤耳以敎坐作進退疏下又云中軍以􅎏令鼓鼙監本訛作舉今考下經正之遂以苗田疏案田僕云掌佐車之政監本脫政字今考經文補之辨旗物之用疏故司馬法云二百里三百里如州長四百里五百里如縣正監本脱三百里三字補之遂以獮田如蒐田之灋石經無下田字疏以祊乃是廟門外之西廟門外之西五字監本訛作廟門之外内今考郊特牲注文正之前期羣吏戒衆庻疏言鄉師以下則不及鄉鄉是鄉大夫則卿也鄉是二字疑大夫之訛中軍以鼙令鼓疏哀二年左傳鐡之戰二訛三今据左傳改正乃鼓退疏是以左氏哀公艾陵之戰艾陵之戰監本訛作鐡之戰今考左傳改正中軍以鼙令鼓疏魏詩云三嵗曰特臣浩按此係毛傳之文魏詩下當增毛傳二字大祭祀疏尸爼五魚侑主人皆一魚此二句監本訛作主人主婦尸侑客各一魚今考有司徹經文改正周禮注疏卷二十九考證
