body:
  text: 周禮注疏卷三十二漢鄭氏注唐陸德明音義賈公彦疏弁師掌王之五冕皆𤣥冕朱裏延紐注冕服有六而言五冕者大裘之冕蓋無旒不聨數也延冕之覆在上是以名焉紐小鼻在武上笄所貫也今時冠卷當簪者廣袤以冠縰其舊象與音義數所主反卷起全反簪莊林反袤音茂縰所買反劉霜綺反與音餘疏釋曰云皆𤣥冕者古者績麻三十升布染之上以𤣥下以朱衣之於冕之上下云延者即是上𤣥者紐者綴於冕兩旁垂之武兩旁作孔以笄貫之使其得牢固也凡冕體周禮無文叔孫通作漢禮器制度取法於周今還取彼以釋之按彼文凡冕以版廣八寸長尺六寸以此上𤣥下朱覆之乃以五采繅繩貫五采玉垂於延前后謂之邃延故玉藻云天子玉藻前后邃延龍卷以祭是也注釋曰云冕服有六者按司服祭祀六服皆連冕言之今此惟云五冕者但此弁師所掌冕以旒為主祭天用大裘取質其冕亦當無旒為質故此不數之惟有五冕耳故云王之五冕也云延冕之覆在上者按玉藻注延冕上覆言雖不同義則不異皆以𤣥表覆之在冕上也以爵弁前后平則得弁稱冕則前低一寸餘得冕名冕則俛也以低為號也云紐小鼻在武上笄所貫也今時冠卷當簪者廣袤以冠縱其舊象與者古之紐武笄貫之處若今漢時冠巻當簪所貫者於上下之廣及隨縱之袤以冠縰者貫簪之處當冠縰之中央云舊象者是周冕垂紐於武貫笄之舊象也言與者以無正文故云與以疑之五采繅十有二就皆五采玉十有二玉笄朱紘注繅雜文之名也合五采絲為之繩垂於延之前后各十二所謂邃延也就成也繩之每一帀而貫五采玉十二斿則十二玉也每就閒蓋一寸朱紘以朱組為紘也紘一條屬兩端於武繅不言皆有不皆者此為衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十𤣥衣之冕三斿用玉七十二音義繅音早司農云古藻字邃息遂反劉詩遂反斿音留下同屬音燭鷩必滅反希張里反劉豬履反疏釋曰言五采藻十有二者此據衮冕而言謂合五采絲為藻繩十二道為十二旒也就皆五采玉十有二者此各據一旒而言以玉有靑赤黄白黒五色於一旒之上以此五色玉貫於藻繩之上每玉閒相去一寸十二玉則十二寸就成也以一玉為一成結之使不相幷也玉笄朱紘者以玉笄貫之又以組為紘仰屬結之也注釋曰云繅雜文者若水草之藻有五采故云雜文之名也云所謂邃延也者謂玉藻文云繩之每一帀而貫五采玉十二斿則十二玉也者以其云就皆五采玉十有二明十二玉可知也云紘一條屬兩端於武者謂以一條繩先屬一頭於左旁笄上以一頭繞於頤下至向上於右相笄上繞之是以鄭注士冠禮云有笄者屈組以為紘垂為飾無笄者纓而結其絛彼有笄據皮弁爵弁此五冕皆有笄與彼同此言屬於武者據笄貫武故以武言之其實在笄云繅不言皆有不皆者謂王之五冕繅則有十二有九有七有五有三其玉旒皆十二故繅不言皆有不皆者則九旒以下是也玉言皆則五冕旒皆十二玉也此經十二旒據衮冕而言是以鄭云此為衮衣之冕十二旒以其十二旒旒各十二玉前后二十四旒故用二百八十八巳下計可知諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄注侯當為公字之悞也三采朱白蒼也其餘謂延紐皆𤣥覆朱裏與王同也出此則異繅斿皆就皆三采也每繅九成則九旒也公之冕用玉百六十二玉瑱塞耳者故書瑉作璑鄭司農云繅當為藻繅古字也藻今字也同物同音璑惡玉名音義侯依注音公瑉本又作珉亡貧反瑱吐練反璑音無疏釋曰諸公云繅九就又云繅斿皆就與上言繅十有二就皆五采玉十有二異上繅玉别文則繅有差降玉無差降此諸公繅玉同文則惟有一冕而已故鄭計一冕為九旒旒各九玉據冕九旒不别計鷩冕已下以其一冕而已冠五服故也已下侯伯子男亦皆一冕冠數服也王不言玉瑱於此言之者王與諸侯互見為義是以王言𤣥冕朱裏延紐及朱紘明諸侯亦有之諸公言玉瑱明王亦有之是其互有也注釋曰鄭知侯當為公者以下别見諸侯又此經云九就當上公以九為節故知是公也知三采朱白蒼者聘禮記公侯伯繅藉三采朱白蒼故知三采亦朱白蒼也云出此則異者異謂天子朱紘諸侯當青組紘之等不得與王同也云繅斿皆就皆三采也每繅九成則九旒也者此釋有一冕九旒之意也云無惡玉名者按許氏説文璑三采玉從玉無聲以其三采又非璵璠故云惡玉名也說文又云珉石之美者從玉民聲如是經云瑉玉三采當以璑為正故先鄭從璑為惡玉名也王之皮弁㑹五采玉璂象邸玉笄注故書㑹作䯤鄭司農云讀如馬㑹之㑹謂以五采束髪也士喪禮曰檜用組乃笄檜讀與䯤同書之異耳說曰以組束髪乃著笄謂之檜沛國人謂反紛為䯤璂讀如綦車轂之綦𤣥謂㑹讀如大㑹之㑹㑹縫中也璂讀如薄借綦之綦綦結也皮弁之縫中每貫結五采玉十二以為飾謂之綦詩云㑹弁如星又曰其弁伊綦是也邸下柢也以象骨為之音義㑹劉古外反注同并體檜二字亦同或一音户外反璂音其本亦作琪邸丁禮反著張畧反紛本又作紒音計綦音其下同縫扶用反下同薄劉芳惡反柢丁禮反劉音帝疏注釋曰先鄭以㑹為五采束髮讀經以為皮弁㑹五采引士喪禮及沛國之事後鄭皆不從故以㑹為縫中解之先鄭讀從馬㑹取㑹結之義又讀璂如車轂綦之綦直取音同未知何義也𤣥謂㑹如大㑹之㑹漢歴有大㑹小㑹取㑹聚之義故為縫中又云璂讀如薄借綦之綦綦結也者漢時有薄借綦之語故讀從之亦取結義薄借之語未聞云皮弁之縫中每貫結五采玉十二以為飾謂之綦者天子以十二為節約同冕旒也引詩㑹弁如星者衛詩彼注云㑹謂弁之縫中飾之以玉皪皪而處狀似星也與經義合故為證也又曰其弁伊綦是也者璂旣為玉又得為結義得兩合耳云邸下柢也者謂於弁内頂上以象骨為柢王之弁絰弁而加環絰注弁絰王弔所服也其弁如爵弁而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事弁絰服疏注釋曰云弁絰王弔所服也者司服文又雜記云凡弁絰其衰侈袂故知弁絰是王弔服云其弁如爵弁而素者按曽子問云麻弁絰鄭云麻弁絰者布弁而加環絰也此不言麻者皆素為之故云而素也云所謂素冠者詩云庶見素冠兮彼素冠謂祥冠與此雖義别同是素為之云而加環絰者謂先著素弁於下乃上加環絰故云加也環絰者大如緦之絰者緦麻絰五服之輕者弔服乃五服之外故約同之但緦之絰則兩股此環絰以一股纒之不糾麤細同耳引司服者證弁絰是弔服之絰諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令注各以其等繅斿玉璂如其命數也冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫藻再就用玉八藻玉皆朱緑韋弁皮弁則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采弁絰之弁其辟積如冕繅之就然庶人弔者素委貌一命之大夫冕而無旒士變冕為爵弁其韋弁皮弁之㑹無結飾弁絰之弁不辟積禁令者不得相僭踰也玉藻曰君未有命不敢即乘服不言冠弁冠弁兼於韋弁皮弁矣不言服弁服弁自天子以下無飾無等音義辟積必亦反劉博歴反下同疏釋曰諸侯者上巳言公則此諸侯據侯白子男云及孤卿大夫者此文既承諸侯之下故鄭以為諸侯之孤卿大夫解之也既不别見天子之臣文中可以兼之上天子與公不言韋弁此言之亦是互見之義云各以其等為之不言爵而言等則依命數矣注釋曰云各以其等謂藻旒玉璂如其命數也者經云冕故云旒經云弁故云璂如其命數釋經云等也侯伯子男之冕亦據一冕如上公矣侯伯子男繅玉皆三采者亦約聘禮記藻三采朱白蒼而言之四命巳下皆據典命公之孤四命公侯伯之卿三命其大夫二命子男之卿再命大夫一命而言二采朱緑亦據聘禮記聘臣藻皆二采朱緑而言也云弁絰之弁其辟積如冕繅之就然者以其弔服非吉故無飾故辟積有數也云庶人弔者素委貌者此經不云庶人鄭云此者以有大夫已上因言庶人且欲從下向上因推出士變冕為爵弁之意也云一命之大夫冕而無旒者此亦無文鄭知然者凡冕旒所以為文飾一命若有則止一旒一玉而已非華美又見一命大夫衣無章士又避之變冕為爵弁若一命大夫有旒士則不湏變冕為爵弁直服無旒之冕矣故知一命大夫無旒也若然爵弁制如冕但無旒為異則無旒之冕亦與爵弁不殊得謂之冕者但無旒之冕亦前低一寸餘故亦得冕名也云韋弁皮弁之㑹無結飾弁絰之弁不辟積者一命大夫及士冕弁既無旒故知無此等云禁令者不得相僭踰而引玉藻君未有命不敢即乘服者彼諸侯之卿大夫聘於天子天子賜之冕服歸國告君得君命乃服之未得君命則為僭踰故引為證也云不言冠弁冠弁兼於韋弁皮弁矣者𤣥冠緇布衣緇帯素韠天子以為田服卽諸侯及臣之朝服亦皮弁之類不言之者兼於韋弁皮弁也云不言服弁者服弁卽衰絰喪服也云服弁自天子以下無飾無等者則喪服目天子逹士共一章是也自此一經總包諸侯及臣不言天子之臣但天子三公八命卿六命大夫四命士三命以下冕弁之屬亦各以其等為之可知司甲闕疏釋曰此亦與冬官同時闕也司兵掌五兵五盾各辨其物與其等以待軍事注五盾干櫓之屬其名未盡聞也等謂功沽上下鄭司農云五兵者戈殳㦸酋矛夷矛音義櫓音魯疏釋曰言各辨其物與其等者五矣五盾各有物色與其善惡長短大小之等云以待軍事者按此下有舞者兵及廞五兵直云以待軍事者五兵五盾以軍事為主故也注釋曰鄭云五盾干櫓之屬其名未盡聞也者按祭統云朱干玉戚以舞大武秦詩云蒙伐有苑注云伐中干左氏傳建大車之輪以為櫓而當一隊則有朱干中干及櫓聞其三者二者未聞故云其名未盡聞也云等謂功沽上下者功謂善者為上等沽謂麤惡者為下等也必知有此法者見槀人職云書其等以饗工乘其事試其弓弩以下上其食明兵盾亦當然先鄭云五兵者戈殳㦸酋矛夷矛者此謂車之五兵故下注云車之五兵司農所云者是也及授兵從司馬之灋以頒之及其受兵輸亦如之及其用兵亦如之注從司馬之法令師旅卒兩人數所用多少也兵輸謂師還有司還兵也用兵謂出給衛守音義卒子忽反下同疏注釋曰云授兵從司馬之法者司馬主六軍是一官之長先受命於王知多少乃始出軍故從司馬法以頒之鄭知用兵是出給衛守者以其旣言授兵下别言用兵明是衛守之處湏兵者也祭祀授舞者兵注授以朱干玉戚之屬疏主釋曰鄭知此兵是朱于玉戚者祭統云朱干玉戚以舞大武則大武用朱干玉戚矣又按下司戈盾云祭祀授旅賁殳故士戈盾司兵尊於司戈盾明所授兵據以大武朱干玉戚也其司干所授者又是羽籥之等非干戚可知也大喪廞五兵注故書廞為滛鄭司農云淫陳也淫讀為廞𤣥謂廞興也興作明器之役器五兵也士喪禮下篇有甲胄干笮音義廞虛金反興虛應反下同笮字又作筰側白反劉舟伯反疏注釋曰先鄭一部之内廞皆從淫故曰淫淫為陳後鄭皆不從皆以為廞興解之者見司服云大喪共其復衣服歛衣服掌其陳序圉人職云凡賔客喪紀牽馬而入陳廞馬亦如之以此言之廞陳既别則廞不得為陳以興象為義也云興作明器之役器五兵也者按既夕禮明器之用器有弓矢役器之内甲胄干笮彼雖不具五兵此旣言五兵明五者皆有也故鄭引士喪禮下篇甲胄干笮為證士喪禮下篇即既夕禮也言士喪禮下篇者以其士喪論葬事士喪與既夕二篇同有記皆在既夕篇下故二篇連言之也按彼注笮謂矢服也軍事建車之五兵㑹同亦如之注車之五兵鄭司農所云者是也歩卒之五兵則無夷矛而有弓矢疏釋曰云建車之五兵者凡器在車皆有鐵器屈之在車較及輿以兵揷而建之故有出先刃入後刃之事注釋曰鄭司農所云者是也即上文注是也必知如先鄭義者見考工記廬人云戈殳㦸酋矛夷矛乃云六建既備車不反覆注六建五兵與人也以是故從司農所云也云歩卒之五兵則無夷矛而有弓矢者即司右注引司馬法所云者是也有弓矢是能用五兵者若前驅所建則有四兵故詩云伯也執殳為王前驅注引考工記車有六等之數除軫與人四兵為證是也司戈盾掌戈盾之物而頒之注分與受用疏注釋曰分與受用者即下文祭祀㑹同之等皆是祭祀授旅賁殳故士戈盾授舞者兵亦如之注亦頒之也故士王族故士也與旅賁當事則衛王也殳如杖長尋有四尺疏注釋曰云故士王族故士者據司士而言云與旅賁當事則衛王者按旅賁氏掌執戈盾而趨此執殳者以其與故士同衛王時以為儀衛故不執戈盾知殳如杖者廬人所為不見有刃故知如杖知尋有四尺者車有六等云殳長尋有四尺崇於人四尺也軍旅㑹同授貳車戈盾建乘車之戈盾授旅賁及虎士戈盾注乘車王所乘車也軍旅則革路㑹同則金路音義乘繩證反後乘馬陪乘參乘皆準此注王所乘依字讀疏釋曰軍旅㑹同皆貳車貳皆有車右故授之以干盾云乘車之戈盾者王所乘車有車右故建戈盾授旅賁氏及虎士戈盾者衛王故也注釋曰車旅乘革路㑹同乘金路皆巾車文㑹同則彼以賓一也及舍設藩盾行則斂之注舍止也藩盾盾可以藩衛者如今之扶蘓與音義與音餘疏注釋曰按掌舍王行止注不言設藩盾者當宿衛之事非止一重除彼梐枑車宫之外别有此藩盾之等也云如今扶蘇者舉漢法以況之也司弓矢掌六弓四弩八矢之灋辨其名物而掌其守藏與其出入注法曲直長短之數音義守劉手又反亦如字下攻守同藏才浪反沈如字疏釋曰此經與下為目辨其名物者六弓八矢各有名號物色出入者頒之受之注釋曰曲直者謂若主弓弧弓合九成規已下或合七合五合三是曲者合少直者合多長短者弓人云弓之上制六尺六寸中制六尺三寸下制六尺是其長短也中春獻弓弩中秋獻矢箙注弓弩成於和矢箙成於堅箙盛矢器也以獸皮為之音義中音仲下同箙音服詩云象弭魚服盛音成疏注釋曰矢箙獸皮為之者按詩云象弭魚箙雖不言用獸蓋魚之似獸者為之若然此獸則魚形也惟有國語云檿弧箕箙不用獸皮也及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者使者勞者注王弧夾庾唐大六者弓異體之名也徃體寡來體多曰王弧徃體多來體寡曰夾庾往體來體若一曰唐大甲革革甲也春秋傳曰蹲甲而射之質正也樹椹以為射正射甲與椹試弓習武也豻侯五十歩及射鳥獸皆近射也近射用弱弓則射大侯者用王弧射參侯者用唐大矣學射者弓用中後習强弱則易也使者勞者弓亦用中逺近可也勞者勤勞王事若晉文侯文公受王弓矢之賜者故書椹為鞎鄭司農云椹字或作鞎非是也圉師職曰射則充椹質又此司弓矢職曰澤共射椹質之弓矢言射椹質自有弓謂王弧弓也以此觀之言鞎質者非音義射甲食亦反下以意求之椹張林反夾古洽反劉古恊反庾師儒相傳讀庚本或作庾豻音岸又音鴈使者所吏反注同蹲音存劉才官反參桑感反易以豉反鞎户根反一音魂或胡本反李音艮一音居言反又音很疏釋曰此經六弓强弱相對而言王弧直徃體寡夾庾曲往體多故四者自對在先唐大徃來若一故退之在後也注釋曰云六者弓異體之名也者即所引弓人之職徃體來體之等是也此據體而言若以色而言即春秋尚書所云彤弓玈弓之等是也云甲革革甲也者欲見甲以革為之其實一物也引春秋傳者事在成十六年楚之養由基善射之事云質正也樹椹以為射正者謂若賓射之正然也云射甲與椹試弓習武也者見圉人云澤則共椹質是在澤宮中試弓習武也云豻侯五十歩及射鳥獸皆近射也近射用弱弓則射大侯者用王弧射參侯者用唐大矣者此據諸侯言之若據天子則用王弧射虎侯用唐大射熊侯用夾庾射豹侯也云學射者弓用中後習强弱則易也者用中謂唐大徃來體如一是中也云使者勞者弓亦用中逺近可也者使有逺有近皆可也云勞者勤勞王事若晉文侯者謂文侯之命賜之彤弓玈弓是也云文公者謂僖二十八年晉文公敗楚於城濮襄王賜之以彤弓玈弓是也其矢箙皆從其弓注從弓數也每弓者一箙百矢疏注釋曰云從弓數也者以經云矢箙皆從其弓故知從弓數也云每弓者一箙百矢者按文侯之命及僖二十八年晉文公受弓矢皆云彤弓一彤矢百雖是所賜之弓矢射之弓矢約同之按詩頌云束矢其搜毛注云五十矢為束鄭從之至此為百矢者無正文鄭兩從不定也凡弩夾庾利攻守唐大利車戰野戰注攻城壘者與其自守者相廹近弱弩發疾也車戰野戰進退非强則不及弩無王弧王弧恒服弦徃體少者使矢不疾音義攻如字劉音貢強其丈反又其良反疏注釋曰云攻城壘者城謂城郭壘謂軍壁若宣公十二年云御靡旌麾壘而還之類也云與其自守者即城壘也云弩無王弧王弧恒服弦者按上弓有六等有王弧至此弩已有夾庾等四種故云弩無王弧也恒服弦者若弓用則服弦不用則弛惟弩則用與不用一張之後竟不弛故云恒服弦也若然恒服弦用弱者以其强弓乆不弛則就弦弱則隨體不就弦也又王弧徃體少使之恒服弦則使矢不疾故不用也凡矢枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢痹矢用諸散射注此八矢者弓弩各有四焉枉矢殺矢矰矢恒矢弓所用也絜矢鍭矢茀矢痹矢弩所用也枉矢者取名變星飛行有光今之飛矛是也或謂之兵矢絜矢象焉二者皆可結火以射敵守城車戰前於重後微輕行疾也殺矢言中則死鍭矢象焉鍭之言候也二者皆可以司候射敵之近者及禽獸前尤重中深而不可逺也結繳於矢謂之矰矰髙也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也前於重又微輕行不低也詩云弋鳧與鴈恒矢安居之矢也痹矢象焉二者皆可以散射也謂禮射及習射也前後訂其行平也凡矢之制枉矢之屬五分二在前三在後殺矢之屬三分一在前二在後矰矢之屬七分三在前四在後恒矢之屬軒輖中所謂志也鄭司農云痹矢讀為人罷短之罷𤣥謂痹讀如痹病之痹痹之言倫比音義枉紆徃反絜劉苦結反又音結一音户結反弩矢也鍭音候劉音侯弩矢矰音增茀劉扶弗反李一音孚忽反一音㪍或音弗弩矢痹方二反弩矢散素旦反注同中丁仲反下中深射中同繳章藥反刜孚物反訂李音亭呂沈同劉當定反輖音周一音定周反痹方二反比毗志反疏注釋曰鄭知此八矢弓弩各有四者以上文六弓四弩俱陳於下總列八矢則知八矢為弓弩所設故鄭分之四矢屬弓四矢屬弩也八矢兩兩相附必知在上者屬弓在下者屬弩者此上文六弓在上四弩在下故還以在上配弓在下配弩也云枉矢者取名變星飛行有光今之飛矛是也者按輈人云弧旌枉矢以象弧也按孝經緯援神契云枉矢射慝考異郵曰枉矢精状如流星蛇行有尾見天文志曰枉矢状大流星是其妖變之星行時有光故鄭云枉矢者取名變星飛行有光漢時名此矢為飛矛故舉以為説也云或謂之兵矢者矢人職文云絜矢象焉者謂輕重象枉矢也云二者皆可結火以射敵守城車戰者謂枉矢絜矢二者故鄭矢人職注以枉絜二矢俱為兵矢云前於重後微輕行疾也者以殺矢三分一在前二在後是最重者也此枉絜二矢則五分二在前三在後故云前於重後微輕微輕對已下矰矢恒矢等為最輕也云殺矢言中則死者觧稱殺矢之名以其最重中則死故也云鍭矢象焉者亦尤重者也云二者皆可以司候射敵之近者及禽獸者釋經用諸近射田獵之文云前尤重中深而不可逺也者以其三分一在前二在後故云尤重中深故殺名不可逺故用之近射也云結繳於矢謂之矰矰髙也者繳則繩也謂結繩於矢以弋射鳥獸者言矰髙者欲取向上射飛鳥之義也云茀矢象焉者亦結繳為射也云茀之言刜也二者皆可以弋飛鳥刜羅之也者解結繳以羅取而刜殺之義云前於重又微輕者此又對枉矢絜矢五分者是重此於五分之重又微輕於彼以此矢七分故也引詩者證弋是取禽鳥之義也云恒矢安居之矢也者按弓人有其人安其弓安其矢安之文則此恒矢軒輖訂是安居之矢也云痹矢象焉二者皆可以散射也謂禮射及習射也者已上六矢皆用之攻守及弋射惟此矢云散射明散射是禮射也其禮射者即大射賔射燕射之等皆是其習亦於此三射中為之故并言之也云前後訂其行平也者以矰矢七分三在前四在後則知此八分四在前四在後即行平也云凡矢之制枉矢之屬至四在後皆矢人職文云恒矢之屬軒輖中所謂志也者既夕記云志一乘軒輖中是也先鄭云痹矢讀為人罷短之罷此依谷讀於義無取𤣥謂痹讀為痹病之痹痹之言倫比倫比則與安居之義同也此八矢六弓四弩不相配者以四矢配四弩於義為可以四矢配六弓其數參差不可相當故不得相配但依六弓四弩與矢隨義相當而用之天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓注體徃來之衰也徃體寡來體多則合多徃體多來體寡則合少而圜弊猶惡也句者惡則車者善矣音義弊婢世反徐扶滅反衰初危反圜音圓疏釋曰按上注王弧射大侯夾庾射豻侯言之則天子之弓王弧也以其徃體寡故合九成規諸侯之弓則唐大以其徃來體若一故合七成規大夫之弓則夾庾以其徃體多故合五成規也士之弓則六弓之外句曲合三成規云句者謂之弊弓者但句之至極無過合三合三之外雖别言句者還指合三者而言耳按天子諸侯三侯士與大夫同射近侯無與大夫别侯之法今以士合三與大夫弓别者以士與大夫尊卑次暫以合三者託之于士其實士無合三之弓也注釋曰云體徃來之衰也者此皆據角弓反張不被弦而合之從合九合七合五合三降殺以兩故言衰也云徃體寡來體多則合多者據王弧而言云徃體多來體寡則合少而圜者據夾庾而説不言唐大者在此二者中閒可知凡祭祀共射牲之弓矢注射牲示親殺也殺牲非尊者所親惟射為可國語曰禘郊之事天子必自射其牲疏釋曰言凡語廣則天地宗廟皆有射牲之事注釋曰言殺牲非尊者所親惟射為可者按禮記君親制祭詩云執其鸞刀以啓其毛則射外兼為而言惟射者彼亦示行之非正制之耳引國語者欲見有射牲之事彼據祭天而言澤共射椹質之弓矢注鄭司農云澤澤宫也所以習射選士之處也射義曰天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭音義與音預疏注釋曰此所共弓矢據王弧故上云王弓弧弓以射甲革椹質引射義欲見射椹質是試弓習武在澤宫也大射燕射共弓矢如數并夾注如數如當射者之數也每人一弓乘矢并夾矢籋也音義夾音甲注同乘繩證反四矢曰乘矢籋劉奴輒反又女十反疏注釋曰知每人四矢者見大射鄉射禮每人各乘矢也云并夾矢籋也者矢籋之言出於漢時大喪共明弓矢注弓矢明器之用器也士喪禮下篇曰用器弓矢疏注釋曰云明器之用器也者明器中有用器役器役器中有甲胄干笮用器中有弓矢故鄭還引用器為證也凡師役㑹同頒弓弩各以其物從授兵甲之儀注物弓弩矢箙之屬音義從才用反疏釋曰言師役據王廵狩征伐而言與㑹同異頒弓弩則不殊也田弋充籠箙矢共矰矢注籠竹箙也矰矢不在箙者為其相繞亂將用乃共之音義籠魯東反為于偽反疏釋曰田謂四時田時弋謂弋鳧與鴈云充籠箙矢者籠箙皆盛矢物及矢皆共之云共矰矢者謂矢之有繳者注釋曰云矰矢不在箙者以其共矰矢在箙下别言之故言不在箙也凡亡矢者弗用則更注更償也用而棄之則不償音義更音庚注同繕人掌王之用弓弩矢箙矰弋抉拾注鄭司農云抉者所以縱弦也拾者所以引弦也詩云抉拾既次詩家説或謂抉謂引弦彄也拾謂韝扞也𤣥謂抉挟矢時所以持弦飾也著右手巨指士喪禮曰抉用正王棘若檡棘則天子用象骨與韝扞著左臂裏以韋為之音義抉古穴反注同彄若侯反韝古侯反劉云彄字之異者扞胡旦反挾子恊反一音户牒反著丁畧反或直畧反下同檡劉音澤又音亦一音徒洛反與音餘疏釋曰此繕人所掌王之用弓弩者謂司弓矢選擇大善者入繕人以共王用也注釋曰先鄭所解抉拾二家為説前非後是故後鄭増成其義引士喪禮者欲見凶時有文吉時無文約出吉禮也無正文故云天子用象骨與韝用韋雖不言與亦同疑可知掌詔王射注告王當射之節疏注釋曰王射先行燕禮以大夫為賔賓與王為耦所告之事亦如大射禮大射正告公之儀贊王弓矢之事注授之受之疏注釋曰按大射禮大射正授弓小臣授矢天子禮繕人授之受之按大僕職已授之受之此又為者大僕尊大僕賛時此官助賛也凡乘車充其籠箙載其弓弩注充籠箙者以矢疏釋曰繕人惟主王所乘之車而言凡乘車則除革路之外玉金象木之車車皆有右備制非當皆充其籠箙及所載弓矢注釋曰以籠是盛矢器今云充之明所充實者是矢可知也旣射則斂之注歛藏之也詩云彤弓弨兮受言藏之音義弨昌遙反疏注釋曰所斂者惟據王所乘車上有弓矢者既射還歛取藏之引詩證既射弛而藏之義也無㑹計注亡敗多少不計音義㑹古外反下大㑹同後㑹計之類放此疏釋曰以其王所費損故不㑹計之稾人掌受財于職金以齎其工注齎其工者給市財用之直音義齎音咨後皆同疏釋曰掌受財于職金者謂有罪人出贖之物金罰貨罰故湏財者往受之注釋曰弓弩矢箙皆是冬官百工造之故云齎其工者給市財用之直也弓六物為三等弩四物亦如之注三等者上中下人各有所宜弓人職曰弓長六尺六寸謂之上制上士服之弓長六尺三寸謂之中制中士服之弓長六尺謂之下制下士服之弩及矢箙長短之制未聞疏釋曰弓人惟云弓之長短不言弩之長短盖當與弓同但無正文故注亦云未聞注釋曰云三等者上中下人各有所宜者皆據凡人長短為上中下士非謂命數者也此經惟言弓弩不言矢箙以下經有矢箙因此弩井云未聞按矢人造矢云五分其長而羽其一注云羽者六寸其羽六寸則矢長三尺而此云矢未聞者彼矢長三尺約而言之亦無正文且弓之長短既不同明矢亦當有差等其矢之差等未聞及箙亦未聞也但弓六物為三等不言皆者下别言弩故六弓不言皆下矢八物皆三等言皆者矢八物中兼有弩矢故湏言皆也矢八物皆三等箙亦如之春獻素秋獻成注矢箙春作秋成疏釋曰按司弓矢注弓弩各有四矢應作四等而言三等盖據長短為三等法矢人注矢長三尺者假設言之弩既無長短之文矢亦未聞長短也若然箙隨矢長則弓之矢箙與弓矢齊弩之矢箙亦與弩矢齊但矢既未聞故箙亦未聞也注釋曰按士喪禮明器有獻素獻成注云形法定為素飾治畢為成此矢箙亦然書其等以饗工注鄭司農云書工攻拙髙下之等以制其饗食也𤣥謂饗酒肴勞之也上工作上等其饗厚下工作下等其饗薄音義勞力報反疏注釋曰按下文自有下上共食此文饗據以酒肴饗之先鄭以饗為食非故後鄭不從後鄭不言中饗者舉有上下明有中可知也乘其事試其弓弩以下上其食而誅賞注鄭司農云乘計也計其事之成功也故書試為考𤣥謂考之而善則上其食尤善又賞之否者反此音義試音考出注上時掌反注同疏注釋曰云故書試為考後鄭亦從考為義也乃入功于司弓矢及繕人注功成凡齎財與其出入皆在稾人以待㑹而攷之亡者闕之注皆在稾人者所齎工之財及弓弩矢箙出入其簿書稾人藏之闕猶除也弓弩矢箙棄亡者除之計今見在者音義見賢在反疏釋曰數事皆在稾人者以稾人是弓矢官之主故皆有簿書藏之也戎右掌戎車之兵革使注使謂王使以兵有所誅斬也春秋傳曰戰於殽晉梁𢎞御戎萊駒為右戰之明日襄公縛秦囚使萊駒以戈斬之音義使色吏反注使謂同疏汪釋曰戎右者與君同車在車之右執戈盾備制非常并充兵中使役故云掌戎車之兵革使謂執兵著甲之使也引春秋者文二年左傳文秦晉戰於殽時囚呼萊駒失戈引之者證戎右以兵革使事詔贊王鼓注既告王當鼓之節又助擊之疏注釋曰大僕已贊王鼓此亦同是助擊其餘面也傳王命于陳中注為王大言之也音義傳直宣反下注傳敦同陳直愼反劉直吝反為于偽反下為衆同㑹同充革車注㑹同王雖乘金路猶以革路從行也充之者謂居左也曲禮曰乘君之乘車不敢曠左疏注釋曰知㑹同王乘金路者巾車云金路以賔是也此言充革車故知猶以革路從云充之者謂居左也者尊者左載王既不乘故戎右居左贊王處是以引曲禮為證彼注云君在惡空其位是也盟則以玉敦辟盟遂役之注鄭司農云敦器名也辟法也𤣥謂將㰱血者先執其器為衆陳其載辭使心皆開辟也役之者傳敦血授當㰱者音義敦音對劉又都愛反沈都廻反注同㰱所洽反徐所輒反疏注釋曰先鄭以辟為法此無取於法義故後鄭為開辟盟者之心云將㰱血者先執其器者凡盟先割牛耳盛於珠盤以玉敦盛血戎右執此敦血為陳其盟約之辭使心開辟乃㰱之贊牛耳桃茢注鄭司農云贊牛耳春秋傳所謂執牛耳者故書茢為滅杜子春云滅當為厲𤣥謂尸盟者割牛耳取血助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執之桃鬼所畏也茢苕帚所以掃不祥音義茢音列沈音例盛音成苕音條帚之受反疏注釋曰引春秋者按哀十七年公㑹齊侯盟于蒙孟武伯問於髙柴曰諸侯盟誰執牛耳季羔曰鄫衍之役呉公子姑曹注云在七年發陽之役衛石魋注云發陽鄖地在十二年武伯曰然則彘也以其魯於齊為小國故也云𤣥謂尸盟者割牛耳者尸盟即是小國也云桃鬼所畏也茢苕帚所以掃不祥者殺牲取血旁有不祥故執此二者於血側也齊右掌祭祀㑹同賓客前齊車王乘則持馬行則陪乘注齊車金路王自整齊之車也前之者已駕王未乘之時陪乘參乘謂車右也齊右與齊僕同車而有祭祀之事則兼玉路之右然則戎右兼田右與音義齊側皆反下齊車齊僕皆同乘劉繩證反沈音繩與音餘疏注釋曰云前之者已駕王未乘之時者曲禮曰僕執策立於馬前備驚奔謂未乘時此亦未乘之時在馬前備驚奔也云參乘者王與僕及車右為參乘也云齊右與齊僕同車而有祭祀之事則兼玉路之右者齊僕同乘金路惟可據齊時今此經云祭祀不言齊明是兼祭祀乘玉路時為右可知也以其玉路有五其右惟有齊右道右三者不見祀右及田右祭祀時亦名齊田與戰伐俱用兵可以相通故知齊右兼玉路右戎右兼田右也無正文故云與以疑之也凡有牲事則前馬注王見牲則拱而式居馬前郤行備驚奔也曲禮曰國君下宗廟式齊牛音義拱居勇反郤音却疏注釋曰云王見牲則拱而式者凡男子立乘前視五巂若有敬事則式式視馬尾當湏端拱故云拱而式也云居馬前郤行備驚奔也者以其王既拱而式是以齊右居馬前郤行備驚奔故也引曲禮曰國君下宗廟式齊牛者按彼經云國君式宗廟下齊牛此所引不同者但宗廟尊宜下將彼經為誤故鄭改之依正而言也道右掌前道車王出入則持馬陪乘如齊車之儀注道車象路也王行道徳之車疏釋曰齊右云王乘則持馬此云王出入則持馬文不司者為右之義不異不同者互換為義故也注釋曰云道車象路也王行道徳之車者若言象據飾為名言道據行道為稱是以大司馬亦云道車自車上諭命于從車注自由音義從才用反下及注同馭夫職放此疏釋曰按馭夫掌馱貳車從車彼注貳車象路之副從車戎路田路之副此所諭從車即彼貳車與彼從車别同名耳詔王之車儀注顧式之屬疏注釋曰禮云式視馬尾顧不過轂皆是車上威儀故湏詔之齊右不云者文不具王式則下前馬王下則以蓋從注以蓋從表尊疏注釋曰蓋有二種一者禦雨二者表尊此則表尊之蓋也大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之注行山曰軷犯之者封土為山象以菩芻棘栢為神主既祭之以車轢之而去喻無險難也春秋傳曰跋渉山川自由也王由左馭禁制馬使不行也故書軷作罰杜子春云罰當為軷軷讀為别異之别謂祖道轢軷磔犬也詩云載謀載惟取蕭祭脂取羝以軷詩家説曰將出祖道犯軷之祭也聘禮曰乃舍軷飲酒于其側禮家説亦謂道祭音義軷蒲末反注跋渉同祝之又反菩劉音負一音倍芻初俱反轢音歴難乃旦反别彼列反下同磔陟格反羝丁兮反舍音釋疏釋曰此據祭天之時故有犯軷之事云及犯軷者出國門封土為山象祭軷王在左自馭馭下祝登受取王手之轡犯軷遂驅之而出注釋曰行山曰軷者謂水行曰渉山行曰軷云封土為山象者鄭注月令祀行之禮為軷壇厚三寸廣五尺此道祭亦宜然云菩芻棘栢為神主者謂於三者之中但用其一以為神主則可也云既祭之以車轢之而去喻無險難也者祭天在近郊雖無險難審愼故也引春秋傳曰者按襄二十八年子太叔云跋渉山川蒙犯霜露以逞君心是其山行曰軷之事也子春讀軷為别異之别者盖取軷訖行去之意引聘禮大夫道祭者無牲牢酒脯而已又於旁飲酒餞别故云飲酒於其側也及祭酌僕僕左執轡右祭兩軹祭軓乃飲注故書軹為􅛓軓為範杜子春云文當如此左不當重重非是書亦或如子春言又曰􅛓當作軹軹謂兩轊也其或言軷亦非是又云軓當為􅓶􅓶謂車軾前也或讀􅛓為簪笄之笄音義軹音紙軓音犯注軓同􅛓劉音雞重直龍反轊音衛軌媿羙反又音犯疏釋曰此云及祭酌僕者即上文將犯軷之時當祭左右轂末及軾前乃犯軷而去酌僕者使人酌酒與僕僕即大馭也大馭則左并轡右手祭兩軹并祭軓之軾前三處訖乃飲飲者若祭末飲福酒乃始轢軷而去注釋曰云謂兩轊者轊即轂末云軓當為􅓶􅓶謂車軾前也者按少儀祭左右軌范乃飲注云周禮大馭祭兩軹祭軓乃飲軌與軹於車同謂轊頭也範與范聲同謂軾前也若然此云軹少儀作軌軌與車轍之軌同名此云軓少儀云范同是軾前也凡馭路行以肆夏趨以采齊注凡馭路謂五路也肆夏采齊樂章也行謂大寢至路門趨謂路門至應門音義薺才私反疏釋曰樂師亦有此法彼下有車亦如之即上云行趨者據歩迎賔客法此既馭路亦云行趨者此雖馭路行趨遲疾准歩迎賔客為法故雖車亦行趨也注釋曰此大馭惟馭玉路而云謂五路者大馭雖馭玉路以經云凡所含廣則餘四路亦准玉路為法故云五路也若然迎賔客惟乘金路餘四路雖不用迎賔客至於乘車皆自内而出自外而入經路寢及門故鄭據大寢為正也云肆夏采薺樂章也者肆夏在鍾師與九夏同是樂章可知其采薺雖逸詩既與肆夏同歌明亦樂章也知行謂大寢至路門趨謂路門至應門者爾雅云堂上謂之行門外謂之趨行雖在堂亦人之行由堂始發故堂至門皆謂之為行故云行謂大寢至路門趨謂路門至應門也鄭注樂師云及入應門路門亦如之此注不言亦同於彼也若然應門外亦應有樂節但無文故鄭亦不言也凡馭路儀以鸞和為節注舒疾之法也鸞在衡和在軾皆以金為鈴音義鈴音零疏注釋曰鄭知鸞在衡和在軾者鄭見韓詩傳云升車則馬動馬動則鸞鳴鸞鳴則和應乘車先馬動次鸞鳴乃和應明鸞近馬首和更近後故知鸞在衡和在軾也且按秦詩云輶車鸞鑣毛云鸞在衡鄭云鸞在鑣不從毛義者鄭以田車鸞在鑣乘車鸞在衡此云鸞在衡據乘車而言故也云皆以金為鈴者鼓人掌四金鈴則四金之類故知用金為之乃可得有聲也戎僕掌馭戎車注戎車革路也師出王乘以自將音義將子匠反疏汪釋曰此云戎車巾車云革路建太白以即戎故云戎車革路也掌王倅車之政正其服注倅副也服謂衆乘戎車者之衣服音義倅七内反劉倉愛反疏注釋曰鄭注坊記云僕右恒朝服據非在軍時若在軍則服韋弁服衆乘戎車者之衣服謂此服也言衆乘戎車者之服則副車十二乘及廣闕苹輕之倅皆是也犯軷如玉路之儀凡廵守及兵車之㑹亦如之注如在軍疏注釋曰云如在軍者謂如其犯軷廵守及兵車㑹亦乘革路若乘車之㑹即乘金路也掌凡戎車之儀注凡戎車衆之兵車也書序曰武王戎車三百兩疏注釋曰云凡語廣故知衆兵車即三百兩也按武王伐紂時王自廵六師則有六軍千乘及諸戎狄三分二諸侯其車多矣只有三百兩者據在陳與紂戰者而言齊僕掌馭金路以賓注以待賔客音義賓如字劉方刃反疏釋曰此經與下為目所待賔客即下文是也朝覲宗遇饗食皆乘金路其灋儀各以其等為車送逆之節注節謂王乘車迎賔客及送相去逺近之數上公九十歩侯伯七十歩子男五十歩司儀職曰車逆拜辱又曰及出車送音義乘車如字疏注釋曰受享於廟則迎之大行人云上公九十歩介九人擯者五人廟中將幣三享鄭注云朝先享不言朝朝正禮不嫌有等是春夏受贄於朝無迎法受享則有之秋冬一受之於廟亦無迎法故郊特牲云覲禮天子不下堂而見諸侯是受贄受享皆無迎法今言朝覲宗遇饗食皆乘金路者謂因此朝覲宗遇而與諸侯行饗食在廟即有乘金路迎賔客之法也云上公九十歩已下大行人文彼據受享於廟非饗食禮也引之者欲見饗食迎賔與受享同司儀所云亦據受饗食之禮也道僕掌馭象路以朝夕燕出入其灋儀如齊車注朝夕朝朝莫夕音義朝直遙反注朝夕同朝朝上如字下直遙反莫音暮疏注釋曰朝朝莫夕在正朝來徃而言燕者以其在宫中行事皆稱燕掌貳車之政令注贰亦副疏注釋曰上文戎僕倅車云副故此貳亦副也田僕掌馭田路以田以鄙注田路木路也田田獵也鄙循行縣鄙音義行下孟反疏注釋曰云田路木路也者按巾車云木路建大麾以田故知田路即木路也云田田獵也者據四時田也云鄙循行縣鄙者謂在百里外六遂之中王廵六遂縣鄙則六鄉州黨廵之可知舉逺以明近也掌佐車之政注佐亦副疏注釋曰天子尊故戎車田車之貳有别名諸侯卑戎車田車之貳同曰佐無倅名是以檀弓云戰於乘丘公隊佐車授綏少儀注亦云朝祀之副曰貳戎獵之副曰佐也設驅逆之車注驅驅禽使前趨獲逆衙還之使不出圍音義驅如字又起遇反後同衙本又作御同五嫁反疏釋曰按王制云大夫殺則止佐車佐車止則百姓田獵彼佐車則此驅逆之車也令獲者植旌注以告獲也植樹也音義植直吏反又時力反樹如字一音豎疏釋曰按山虞植旗屬禽此官又云植旌比禽者彼此共其事故並見之及獻比禽注田弊獲者各獻其禽比種物相從次數之音義比毗志反次也注同種章勇反下同數所主反疏注釋曰大司馬春火弊夏車弊秋羅弊冬徒弊弊止也田止百姓所得禽大獸公之小禽私之公之者獻於旌下每禽擇取三十其餘為主皮之射而取之故云比種物相從次數之也凡田王提馬而走諸侯晉大夫馳注提猶舉也晉猶抑也使人扣而舉之抑之皆止奔也馳放不扣音義扣音口下同疏釋曰凡田亦謂四時田天子發抗大綏諸侯發抗小綏大夫下君不得云綏云大夫發止佐車其時有提馬晉馬之事晉提遲於馳皆取尊者體促之義也馭夫掌馭貳車從車使車注貳車象路之副也從車戎路田路之副也使車驅逆之車疏注釋曰知貳車是象路之副者以道僕云掌贰車之政令故知之也知從車是戎路田路之副者見戎僕與田僕俱不言貳田與戎俱是職煩故知兼此二者也不掌玉路金路之副者二者事暇盖車僕不共掌也知使車是驅逆者以使役勞劇之事故知是驅逆之車也分公馬而駕治之注乘調六種之馬疏注釋曰趣馬自主駕脱故知此駕治者是調習之也周禮注疏卷三十二周禮注疏卷三十二考證弁師掌王之五冕疏兩旁作孔以笄貫之貫監本訛作冠今据注云笄所貫也改正諸侯及孤卿大夫之冕疏𤣥冠緇布衣緇帯素韠監本緇訛繅韠訛蹕今考士冠禮及春官司服注正之司戈盾掌戈盾之物而頒之注分與受用受監本訛作授今改正凡師役㑹同從授兵甲之儀甲監本訛作至今從石經改正繕人凡乘車充其籠箙載其弓弩疏及所載弓矢矢當作弩戎右掌戎車之兵革使注使萊駒以戈斬之戈訛戎今据春秋傳改正周禮注疏卷三十二考證
