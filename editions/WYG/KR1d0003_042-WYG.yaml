body:
  text: 周禮注疏卷四十二漢鄭氏注唐陸德明音義賈公彦疏匠人爲溝洫注主通利田間之水道音義洫況域反疏注釋曰古者人耕皆畎上種穀畎遂溝洫之間通水故知通利田間水道此文與下爲目下别爲之耳耜廣五寸二耜爲耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之隧注古者耜一金兩人倂發之其壟中曰􅍒􅍒上曰伐伐之言發也􅍒畎也今之耜岐頭兩金象古之耦也田一夫之所佃百畝方百步地遂者夫間小溝遂上亦有徑音義􅍒古犬反隧音遂本又作遂倂步頂反畎古犬反與􅍒同古今字也劉古善反佃音田又音電疏釋曰云耜謂耒頭金金廣五寸来面謂之庛庛亦當廣五寸云二耜爲偶者二人各執一耜若長沮桀溺耦而耕此兩人耕爲耦共一尺廣一尺深者謂之畎畎上高土謂之伐伐發也以發土於上故名伐也此二人雖共發一尺之地未必竝發知者孔子使子路問津於長沮長沮不對又問桀溺若竝頭共發不應别問桀溺明前後不竝可知雖有前後其畎自得一尺不假要竝也注釋曰鄭云古者耜一金者對後代耜岐頭二金者云兩人倂發之者謂共爲一畎謂二人竝頭也云今之耜岐頭者至後漢用牛耕種故有岐頭兩脚耜今制猶然也但以牛種用二耜則畎下布種與古異也云田一夫之所佃百畝方百步地者遂人云夫一廛田百畝彼雖爲溝洫法一夫則與此同也云遂者夫間小溝遂上亦有徑者按遂人云夫間有遂遂上有徑彼溝洫法此井田法雖不同遂在夫間遂上有徑則同故云亦有徑也按彼鄭云以南畝圖之遂縱溝横洫縱澮横九澮而川周其外以彼遂在夫間故以南畝遂則縱矣此井田云田首倍之爲遂以南畝圖之遂卽横也九夫爲井井間廣四尺深四尺謂之溝方十里爲成成間廣八尺深八尺謂之洫方百里爲同同間廣二尋深二仞謂之澮注此畿内采地之制九夫爲井井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫爲屋屋具也一井之中三屋九夫三三相具以岀賦税共治溝也方十里爲成成中容一甸甸方八里岀田稅緣邊一里治洫方百里爲同同中容四都六十四成方八十里岀田稅緣邊十里治澮采地者在三百里四百里五百里之中戴師職曰園廛二十而一近郊十一遠郊二十而三甸稍縣都皆無過十二謂田稅也皆就夫稅之輕近重遠耳滕文公問爲國於孟子孟子曰夏后氏五十而貢殷人七十而莇周人百畝而徹其實皆什一徹者徹也莇者藉也龍子曰治地莫善於莇莫不善於貢貢者校數歲之中以爲常文公又問井田孟子曰請野九一而莇國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徙無岀鄉鄉田同井岀入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中爲公田八家皆私百畝同養公田公事畢然後治私事所以别野人也又曰詩云雨我公田遂及我私惟莇爲有公田由此觀之雖周亦莇也魯哀公問於有若曰年饑用不足如之何有若對曰盍徹與曰二吾猶不足如之何其徹也春秋宣十五年秋初税畝傳曰非禮也穀岀不過藉以豐財也此數者世人謂之錯而疑焉以載師職及司馬法論之周制畿内用夏之貢法稅夫無公田以詩春秋論語孟子論之周制邦國用殷之助法制公田不稅夫貢者自治其所受田貢其稅穀莇者借民之力以治公田又使收斂焉畿内用貢法者鄉遂及公邑之吏旦夕從民事爲其促之以公使不得恤其私邦國用莇法者諸侯專一國之政爲其貪暴稅民無蓺周之畿内稅有輕重諸侯謂之徹者通其率以什一爲正孟子云野九夫而稅一國中什一是邦國亦異外内之法耳圭之言珪潔也周謂之士田鄭司農說以春秋傳曰有田一成又曰列國一同音義仞音刃澮古外反廛直連反莇音助校音教數色主反下此數者同别彼列反雨于付反徹與音餘爲其于僞反下爲其與此同蓺音藝率音律又音類下同疏釋曰井田之法畎縱遂横溝縱洫橫澮縱自然川橫其夫間縱者分夫間之界耳無遂其遂注溝溝注入洫洫注入澮澮注自然入川此圖略舉一成於一角以三隅反之一同可見矣遂人云夫間有遂以南畝圖之則遂縱而溝橫此不云夫問有遂云田首倍之謂之遂遂則横而溝縱也自餘洫澮川依此遂溝縱横參之可知但彼云九澮而川周其外川則人造之此百里有澮澮水注入川相去遠故宜爲自然川也自畎遂溝洫皆廣深等其澮廣二尋深二仞若以孔安國八尺曰仞則澮亦廣深等但度廣以尋度深以仞故别言之類若王肅依小爾雅四尺曰仞深二仞八尺與廣二尋不鄭以仞七尺淺於廣二尋二尺者以涂爲大故宜淺校二尺與溝洫不得相類也注釋曰云此畿内采地之制者對畿外諸侯亦制井田與此同云九夫爲井井者方一里九夫所治之田也者小司徒注制似井字也云采地制井田異於鄉遂及公邑者案遂人云夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川方三十三里少半里九而方一同以南畝圖之遂縱溝橫洫縱澮橫九澮而川周其外若以九而方一同則百里之内九九八十一澮爲井田則一同惟一澮卽溝澮稀稠不同又彼溝洫法以爲貢皆就夫稅之十一而貢此則九夫爲井井稅一夫美惡取於此不稅民之所自治是溝洫井田異也小司徒注不云異於公邑者據遂人成文此兼云公邑者據事實而說云三夫爲屋屋具也一井之中三屋九夫三三相具以出賦稅共治溝也者一井有九夫據南畝言之則三夫竝一屋而三夫相具以出賦稅幷相具共治溝以言三屋共一井井間有溝故共治溝也云方十里爲成成中容一甸甸方八里出田稅緣邊一里治洫者司馬法有二法有甸方八里出長轂一乘又有成方十里出長轂一乘言甸者據實出税者而言云成者據通治溝洫而說爲有二種故鄭細分計之八里爲甸出田稅緣邊一里倂之則二里治洫以成間有洫故使共治洫也云方百里爲同同中容四都六十四成者此據小司徒而言彼經四縣爲都注云方四十里四都方八十里旁加十里乃得方百里爲一同今言六十四成者據出田稅者言之故云方八十里出田稅緣邊十里治澮也云采地者在三百里四百里五百里之中者據載師職而言按彼云家邑任稍地小都任縣地大都任畺地是三百里外至畿五百里内言此者欲見三者采地之中有此井田助法又引載師職園廛之下者欲見鄉遂及公邑之等爲溝洫貢子法與采地井田異云輕近重遠耳者彼注云近者多役故輕稅也滕文公問孟子爲國已下至以爲常皆孟子對文公之辭自文公又問井田已下至雖周亦助按彼是文公使畢戰問今以爲文公問者畢戰文公臣君統臣功亦得爲文公問也云夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一徹者徹也助者藉也者竝孟子對文公之辭按彼趙岐注夏禹之世號后氏后君也禹受禪於君故夏稱后殷周順人心而征伐故言人也民耕五十畝貢上五畝耕七十畝以七畝助公家耕百畝者徹取十畝以爲賦雖異名而多少同故曰皆什一也徹猶人徹取物藉者借也猶人相借助之者或有解者云三代受地多少應同今云夏后氏五十而貢殷人七十周人百畝者據地有不易一易再易幷六遂上地不易加五十畝有四等據授地之法夏言五十而貢者據一易之地家得二百畝常佃百畝荒百畝共佃百畝常稅之據二百畝爲稅百畝爲五十而貢殷人七十而助者據六遂上地百畝有萊五十畝而言百五十畝稅一百畝猶百畝稅七十五畝舉全數言之故云七十畝而助也周人百畝而徹者據上地不易者而言百畝全稅之故云百畝而徹也夏據一易之地亦有上地不易上地加五十畝者殷據上地加萊則亦有一易及上地無萊者也周言百畝而徹則亦有上地有萊及一易者也三代皆不言再易三百畝者明皆有可知以其云貢貢子無助法殷人云助稅幷無貢法周人云徹貢助兼有也云龍子曰治地莫善於助莫不善於貢貢者校數歲之中以爲常者按彼趙岐注龍子古賢人也言治地之賦無善於助者也貢者校數歲以爲常類而上之民供奉之有易有不易故謂貢爲莫不善也孟子本爲莫不善於貢今注有無不字者蓋轉寫脫耳文公又問按彼文公使畢戰問孟子孟子對此辭上文公總問爲國之法故對助貢兼有此問井田之法孟子云請野九一而助國中什一使自賦者彼注云九一者井田以九頃爲數而供什一郊野之賦也助者殷家税名周亦用之龍子所謂莫善於助者也時諸侯不行助法國中什一者周禮園廛二十而稅一時行重賦責之什一也而如也自從也孟子欲請使野人如助法什一而稅之國中從其本賦二十而稅一以寛之又云卿以下必有圭田圭田五十畝餘夫二十五畝注云古者卿以下至於士皆受圭田五十畝所以供祭祀圭絜也士田故謂之圭田所謂惟士無田則亦不祭言絀士無絜田也井田之民養公田者受百畝圭田半之故五十畝餘夫者一家一人受田其餘老小有餘力者受二十五畝半於圭田謂之餘夫也受田者田業多少有上中下周禮曰餘夫亦如之亦如上中下之制也王制曰夫圭田無征謂餘夫圭田皆不出征賦時無圭田餘夫孟子欲令復古所以重祭祀利民之道也云死徙無出鄉注云死謂葬也徙謂變土易居平肥磽也不出其鄉易爲功云鄉田同井出入相友守望相助疾病相扶持則百姓親睦注云同鄉之田共井之家各相勞也出入相友相友偶也周禮太宰八曰友以任得民守望相助助察姦也疾病相扶持扶持其羸弱也救其困急皆所以敎民相親睦之道睦和也但鄉遂爲溝洫法而云鄉田同井者此謂殷之助法雖鄉亦爲井田故云鄉田同井以其孟子雜說三代故也云方里而井井九百畝其中爲公田八家皆私百畆同養公田公事畢然後治私事所以别野人也注云方一里者九百畝之地也爲一井八家各私得百畝同共養其公田之苗公田八十畝其餘二十畝以爲廬宅園囿家二畝半也先公後私遂及我私之義也則是野人之事所以别於士伍者也鄭所引孟子證井田之法則卿已下必有圭田及餘夫其文旣間在井田之中則二者亦爲井田之法故引之也云又曰詩云至亦助也按彼是上文孟子對滕文公爲國之法今退在此者詩是周井田之法故引之在下也云雖周亦助者是周兼夏殷貢助也云魯哀公論語文按彼注二謂十二而税但哀公已行十二而稅有若亦知哀公十二故抑之使從十一之正而云盍徹盍何不也徹通也謂十一之通稅哀公憂國有若憂民故也春秋譏宣公欲厚斂棄中央一夫之公田就八家之私田以取之故譏厚斂也云穀出不過藉者藉卽借也借民力所治公田是也云此數者世人謂之錯者論語孟子春秋與詩文義不同故世人謂之錯而疑焉云以載師職及司馬法論之周制畿内用夏之貢法稅夫無公田者以世人疑之爲錯故鄭以諸文辨之按載師職云從國中園廛二十而一及甸稍縣都無過十二皆據鄉遂及四等公邑皆用夏之貢法云司馬法者按左氏杜服所引司馬法云甸方八里出長轂一乘鄭注論語引司馬法云成方十里出長轂一乘鄭注小司徒引司馬法成方十里士十人徒二十人竝據郊遂之外及采地法未見鄭所引證周之畿内之事而云以司馬法論必論周之畿内用夏之貢法者但彼司馬法必論周之畿内用夏之貢法非鄭虛言但餘儕所不見耳云以詩春秋論語孟子論之周制邦國用殷之助法制公田不稅夫者詩云雨我公田公田是助法春秋初稅畝亦是助法論語云盍徹乎徹是天下之通法亦助法也孟子答畢戰井田引詩爲證亦周之助法故總云助法不稅夫也云貢者自治其所受田貢其稅穀助者借民之力以治公田者鄭重釋夏貢殷助之事皆取孟子爲義也云畿内用貢法者至恤其私者鄉遂公邑之内皆鄰里比閭等治民之官旦夕從民事因此促之使先治公田故不得恤其私故爲貢法不得有公田也云邦國用助法諸侯專一國之政爲其貪暴稅民無藝者藝謂準法宣公初稅畝就井田上取民之所自治况爲貢法有何準法故爲井田不爲貢也周之畿内稅有輕重者鄭云近者多役故輕其稅云諸侯謂之徹者通其率以什一爲正者謂郊外用助郊内用貢故引孟子云野九夫而稅一國中什一此云野九夫而稅一卽彼云請野九一而助此云國中什一卽彼云國中什一使自賦云九一而助者一井九夫之地四面八家各自治一夫中央一夫八家各治十畝八家治八十畝入公餘二十畝八家各得二畝半以爲廬宅井竈葱韭是十外稅一也國内據民住在城中其地卽在郊内郊外鄉遂之民爲溝洫爲貢法言十一亦十外稅一者也漢書食貨志旣有井田饒民二畝半之事是以宋均注樂緯何休注公羊趙岐注孟子皆饒民詩云倬彼甫田歲取十千鄭云井稅一夫其田百畝通稅十夫其田千畝成稅百夫其田萬畝不言饒民者以經云歲取十千校一成之内舉全數而言鄭亦順經從整數而說其實與諸家不殊也云邦國亦異外内者上云畿内畿外據天子總天下大判而言此旣引孟子野與國中不同是細而分之邦國亦倣天子異外内也云圭之言珪絜也者謂有珪絜之德也云周謂之士田者卽載師士田是也先鄭引春秋有田一成事在哀元年彼夏后相爲澆所滅其子少康奔虞思爲庖正有田一成有衆一旅據一成之地九百夫宫室塗巷三分去一餘六百夫上地家百畝中地家二百畝下地家三百畝通率三家受六夫之地則一成六百夫定受地有三百家而云有衆一旅五百家者據上地多家亦多也又曰列國一同者事在襄二十五年彼鄭子産適晉獻捷晉人責之曰何故侵小子産對曰昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉是也引之者證經成與同之事也貢稅之法古來皆什一故孟子說三代而云其實皆什一是以公羊傳云古者什一而藉多乎什一大桀小桀注云奢泰多取於民比於桀也寡乎什一大貉小貉注云蠻貉無社稷宗廟百官制度之費稅薄什一者天下之中正也什一行而頌聲作矣注云聖人制井田之法而口分之一夫一婦受田百畝以養父母妻子五口爲一家公田十畝卽所謂什一而稅也廬舍二畆半凡爲田一頃十二畝半八家而九頃共爲一井故曰井田孟子又云白圭曰吾欲二十而取一何如孟子曰子之道貉道也欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀大桀也率指言先王什一供貢下富上尊按其典籍萬世可道若然自古以來貢與助皆不得過什一者也專達於川各載其名注達猶至也謂澮直至於川復無所注入載其名者識水所從出疏注釋曰上澮水所入更無注入故云直至於川云識水所從出者據澮水出注入川處諸澮卽多當各記水所出之處著其名使人言有所稱謂者也凡天下之地埶兩山之間必有川焉大川之上必有涂焉注通其雍塞音義雍於勇反疏注釋曰此言同間有澮澮水入川其川是自然而有又非平地而出必因山間有之又大川不可輙越廵川必當有涂地勢然也注釋曰言通其壅塞者川與涂皆是通其壅塞也凡溝逆地阞謂之不行水屬不理孫謂之不行注溝謂造溝阞謂脉理屬讀爲注孫順也不行謂決溢也禹鑿龍門播九河爲此逆阞與不理孫也音義阞音勒屬讀爲注之樹反孫音遜注同疏注釋曰經言凡溝注云謂造溝則此溝非謂其田間廣深四尺者下云梢溝三十里而廣倍當是人所造溝瀆引水者故此鄭引鑿龍門播九河爲證旣不得逆地阞不理遜水不行當依地阞理順行水乃可爲之川也禹鑿龍門播九河事見尚書禹貢梢溝三十里而廣倍注謂不墾地之溝也鄭司農云梢讀爲桑螵蛸之蛸梢謂水漱齧之溝故三十里而廣倍音義梢劉音蕭注蛸一音色交反螵婢遥反疏注釋曰此溝雖是不墾地之溝與上異亦是非田間者也必使三十里得廣倍者亦謂依地勢而爲之使水梢溝故得三十里而廣倍也先鄭云梢讀爲桑螵蛸之蛸梢謂水潄齧之溝上云梢其藪亦讀從螵蛸之蛸同是梢齧之義故同讀從之也凡行奠水磬折以參伍注坎爲弓輪水行欲紆曲也鄭司農云奠讀爲停謂行停水溝形當如磬直行三折行五以引水者疾焉音義奠音亭折之設反後放此疏釋曰言凡行停水者水去遲似停住正由川直故也是以曲爲之因其曲勢則水去疾是以爲磬折以參伍也注釋曰云坎爲弓輪者說卦文謂坎所以行水如弓輪輪則水疾故云行水欲紆曲也欲爲淵則句於矩注大曲則流轉流轉則其下成淵疏注釋曰凡川溝欲得使致淵之深當句曲於矩使水勢到向上句曲尺則爲廻涹自然深爲淵驗今皆然也凡溝必因水埶防必因地埶善溝者水漱之善防者水淫之注漱猶齧也鄭司農云淫讀爲廞謂水淤泥土留著助之爲厚𤣥謂淫讀爲淫液之淫音義漱色救反前注同廞許金反淤於據反著直畧反液音亦疏注釋曰先鄭讀淫爲廞者周禮之内云廞者先鄭皆爲淫淫爲陳故此讀淫爲廞先鄭餘處淫廞旣爲陳於此不得爲淤泥解之故後鄭不從也是以後鄭以淫液之淫爲義謂以淤泥淫液使厚也凡爲防廣與崇方其閷參分去一注崇髙也方猶等也閷者薄其上音義閷色界反劉又色例反注下同去起吕反疏釋曰凡爲堤防言廣與高等者假令堤高大二尺下基亦廣丈二尺云其閷參分去一者三四十二上宜廣八尺者也大防外閷注又薄其上厚其下疏注釋曰此文承上參分去一而云外閷故云又薄其上厚其下雖不知尺數但知三分去一之外更去也凡溝防必一日先深之以爲式注程人功也溝防爲溝爲防也疏注釋曰程人功者將欲造溝防先以人數一日之中所作尺數是程人功法式後則以此功程賦其丈尺歩數言深者謂深淺尺數故下云已爲式然後可以傅衆力傅謂付之里爲式然後可以傅衆力注里讀爲已聲之誤也音義里音以傳音附疏注釋曰必破里爲已者里則於義無取爲已則於義合故從已也凡任索約大汲其版謂之無任注故書汲作沒杜子春云當爲汲𤣥謂約縮也汲引也築防若墻者以繩縮其版大引之言版橈也版撓築之則鼓土不堅矣詩云其繩則直縮版以載又曰約之格格椓之橐橐音義格音各椓丁角反橐音託疏注釋曰引詩云其繩則直縮版以載者此大雅緜之篇文也又曰約之格格椓之橐橐者謂斯干羙宣王之詩言築室百堵之時有此約椓之事彼注云格格猶歴歴也橐橐用力也引之者證索約約亦繩縮之事也葺屋參分瓦屋四分注各分其脩以其一爲峻音義葺七入反劉音集又子入反疏注釋曰葺屋謂草屋草屋宜峻於瓦屋云各分其脩以其一爲峻者按上堂脩二七言之則此注脩亦謂東西爲屋則三分南北之間尺數取一以爲峻假令南北丈二尺葺屋三分取四尺爲峻瓦屋四分取三尺爲峻也囷窌倉城逆墻六分注逆猶郤也築此四者六分其高郤一分以爲閷囷圜倉穿地曰窌音義囷丘貧反窌劉古孝反依字當爲窖作窌假借也疏注釋曰地上爲之方曰倉圜曰囷穿地曰窌郤牆六分者六分其高去一以爲閷假令髙丈二尺下厚四尺則於上去二尺爲閷上惟二尺其囷倉城地上爲之須爲此殺其窌入地亦爲此閷者雖入地口宜寛則牢固也堂涂十有二分注謂階前若今令甓裓也分其督旁之脩以一分爲峻也爾雅曰堂涂謂之陳音義令音零甓薄歴反爾雅云瓴甋謂之甓郭璞云今㼾甎裓音階疏注釋曰鄭云若今令甓裓也者漢時名堂涂爲令甓裓令甓則今之塼也裓則塼道者也云分其督旁之脩者名中央爲督督者所以督率兩旁脩謂兩旁上下之尺數假令兩旁上下尺二寸則取一寸於中央爲峻峻者取水兩向流去故也引爾雅者釋宫文卽詩云彼何人斯胡逝我陳言渉堂涂引之證陳與此堂涂爲一也竇其崇三尺注宫中水道音義竇音豆疏注釋曰言爲竇通水高不得過此按禮記儒行云蓽門圭竇則此竇一也墻厚三尺崇三之注高厚以是爲率足以相勝音義勝音升疏注釋曰云高厚以是爲率者高恒三倍於厚厚三尺高九尺假令厚六尺高丈八尺皆依此法故云以是爲率足以相勝也車人之事半矩謂之宣注矩法也所法者人也人長八尺而大節三頭也腹也脛也以三通率之則矩二尺六寸三分寸之二頭髮皓落曰宣半矩尺三寸三分寸之一人頭之長也柯欘之木頭取名焉易巽爲宣髮音義之宣如字本或作寡亦作宣脛户定反皓胡老反本或作顥音同劉作皓音灰柯古阿反疏釋曰言車人之事謂車人爲造車之事此與下爲總目也云半矩謂之宣者以下文取此宣爲尺度故先定宣之長短如上十分寸之一謂之枚之類也注釋曰知所法者人也者以易云巽爲宣髪則人頭名宣又見下云一柯有半謂之磬折與人帶以下四尺半爲磬折同故知法人也人長八尺已下鄭欲推出宣之長短之數以人長八尺三分之六尺各得二尺其二尺又取尺八三分之各得六寸又以二寸寸爲三分爲六分三分之各三分寸之二故云頭也腹也脛也以三通率之則二尺六寸三分寸之二也云頭髮皓落曰宣者以得爲宣去之義人髪皓白則落墮故云此者解頭名宣意也云半矩尺三寸三分寸之一人頭之長也者矩旣二尺六寸三分寸之二故減半爲人頭之長有此數也云柯欘之木頭取名焉者下云一宣有半謂之欘一欘有半謂之柯柯欘皆從宣上取數故云頭取名焉猶言取名於頭也云易曰巽爲宣髪者按說卦云其於人爲宣髪注宣髪取四月靡草死髪在人體猶靡草在地今易文不作宣作寡者蓋宣寡義得兩通故鄭爲宣不作寡也引之者證宣爲頭意也一宣有半謂之欘注欘斵斤柄長二尺爾雅曰句欘謂之定音義欘張玉反郭云斫也句音劬又音俱定丁甯反或音如字疏注釋曰一宣有半得長二尺者以一宣尺三寸三分寸之一取半添之一尺得五寸三寸每寸三分得九分幷前一分爲十分取半得五分三分爲一寸餘二分總爲六寸三分寸之二添前尺三寸三分寸之一爲二尺也斵斤卽爾雅句一也彼云句欘謂之定故知此欘斵斤柄也一欘有半謂之柯注伐木之柯柄長三尺詩云伐柯伐柯其則不遠鄭司農云蒼頡篇有柯欘疏注釋曰知長三尺者以其欘長二尺云一欘有半故知三尺引詩者伐柯詩之文也先鄭引蒼頡者蒼頡造文字有篇名蒼頡云柯欘竝是柄也一柯有半謂之磬折注人帶以下四尺五寸磬折立則上俛玉藻曰三分帶下紳居二焉紳長三尺音義俛音免疏注釋曰此據人之所立磬折之儀以上有宣及欘柯之長短又下文造耒亦以磬折之度云之故因解立磬折之淺深也云一柯有半謂之磬折據紳帶以下而言也引玉藻者按彼子㳺曰參分帶下紳居二焉鄭注云三分帶下而三尺則帶高於中也以其人長八尺中則四尺今云三分帶下紳居二分明帶上有一分上三尺半是帶下有四尺半可知也車人爲耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸注鄭司農云耒謂耕耒庛讀爲其顙有疵之疵謂耒下岐𤣥謂庛讀爲棘刺之刺刺耒下前曲接耜音義耒力對反劉音誄或良水反庛依注音刺七賜反李又似斯反庛似斯反疏釋曰此車人旣爲車因使爲耒之田器也庛者耒之面但耒狀若今之曲杴柄也面長尺有一寸云中直者謂手執處爲句故謂庛上句下爲中直者三尺有三寸也句者謂人手執之處二尺有二寸也注釋曰先鄭云庛讀爲其顙有疵之疵者俗人謂顙額之上有疵病故從之也云謂耒下岐者古法耒下惟一金不岐頭先鄭云耒下岐據漢法而言其實古者耜不岐頭是以後鄭上注亦云今之耜岐頭明古者耜無岐頭也𤣥謂庛讀爲棘刺之刺者以其入地故讀從刺也云刺耒下前曲接耜者耜謂耒頭金故云下前曲接耜者也自其庛緣其外以至於首以弦其内六尺有六寸與步相中也注緣外六尺有六寸内弦六尺應一步之尺數耕者以田器爲度宜耜異材不在數中音義緣如字沈悅戰反中如字又丁仲反應應對之應疏釋曰云自其庛緣其外以至於首者據庛下至手執句者逐曲量之云以弦其内者據庛面至句下望直量之故云以弦其内内謂上下兩曲之内云六尺有六寸與步相中也者言逐曲之外有六尺六寸今弦其内與歩相中中應也謂正與歩相應應一歩之尺數注釋曰云耕者以田器爲度宜者在野度以步以人步或大或小恐其不平故以六尺之耒以代步以量地也云耜異材不在數中者未知耜金廣狹要耒自長六尺不通耜若量地時脫去耜而用之也堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地注中地之耒其庛與直者如磬折則調矣調則弦六尺音義推如字李湯雷反疏釋曰此直庛及句庛皆不合六尺之度惟中地之耒磬折者乃合六尺之度故鄭云中地之耒其庛與直者如磬折則調矣調者謂弦六尺則餘句直者不合六尺可知也車人爲車柯長三尺博三寸厚一寸有半五分其長以其一爲之首注首六寸謂今剛關頭斧柯其柄也鄭司農云柯長三尺謂斧柯因以爲度疏釋曰此車人謂造車之事凡造作皆用斧因以量物故先論斧柄長短及刃之大小也注釋曰云謂今剛關頭斧者漢時斧近刃皆以剛鐵爲之又以柄關孔卽今亦然故舉漢法爲說也轂長半柯其圍一柯有半注大車轂徑尺五寸疏注釋曰鄭知此是大車者此論載輻牙下柏車别論轂輻牙又柏車轂長以行山此車轂短以行澤故知此是大車平地載任者也鄭知徑尺五寸者以其圍一柯有半四尺半圍三徑一故知徑一尺五寸也輻長一柯有半其博三寸厚三之一注輻厚一寸也故書博或爲摶杜子春云當爲博音義摶徒丸反渠三柯者三注渠二丈七尺謂罔也其徑九尺鄭司農云渠謂車輮所謂牙音義牙五嫁反李五家反下同本或作迓疏注釋曰云渠二丈七尺者按上輻長一柯有半兩兩相對則九尺尚有轂空壺中於二丈七尺不合者云輻長一柯有半兩相九尺者通計轂而言其實輻無一柯有半也云所謂牙者謂下文云牙圍也行澤者欲短轂行山者欲長轂短轂則利長轂則安注澤泥苦其大安山險苦其大動音義大音泰又莬餓反下同疏釋曰此總言大車柏車所利之事以大車在平地并行澤柏車山行各有所宜也注釋曰此釋長轂安短轂利之事行澤者反輮行山者仄輮反輮則易仄輮則完注故書仄爲側鄭司農云反輮謂輪輮反其木裏耎者在外澤地多泥柔也側當爲仄山地剛多沙石𤣥謂反輮爲泥之粘欲得心在外滑仄輮爲沙石破碎之欲得表裏相依堅刃音義輮人九反劉音柔仄音側易以豉反耎人兗反爲泥于僞反下同疏釋曰此經言車牙所宜外内堅濡之事注釋曰此注後鄭増成先鄭之義言仄輮者堅者在外柔者在内以其取堅刃相成故也六分其輪崇以其一爲之牙圍注輪高輪徑也牙圍尺五寸疏注釋曰輪崇九尺六尺得一尺三尺得五寸故尺五寸也柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一爲之牙圍注柏車山車輪高六尺牙圍尺二寸疏釋曰此柏車山行故轂長輪崇又下皆欲取安故也其輻一柯其渠二柯者三者兩輻相對六尺渠圍二柯者三圍丈八尺亦謂通轂空壺中幷數而言也注釋曰柏車山車對大車爲平地之車也牙圍尺二寸者以其輪崇六尺五分取一五尺取一尺一尺取二寸故尺二寸也大車崇三柯綆寸牝服二柯有參分柯之二注大車平地載任之車轂長半柯者也綆輪算牝服長八尺謂較也鄭司農云牝服謂車箱服讀爲負音義綆方頴反牝歩忍反又扶死反李扶緬反服依注音負詩音如字算薄歷反較音角疏注釋曰云大車平地載任之車轂長半柯者也者以其上文云轂長半柯不言車名故云轂長半柯者也云綆輪算者謂輪之四面外一寸則安言牝服者謂車較卽今人謂之平鬲皆有孔内軨子於其中而又向下服故謂之牝服也是以先鄭云牝服謂車箱服讀爲負以衆軨所依負然也羊車二柯有參分柯之一注鄭司農云羊車謂車羊門也𤣥謂羊善也善車若今定張車較長七尺疏注釋曰先鄭云羊車謂車羊門也者其言無所當故後鄭易之也後鄭云羊善也善車若今定張車雖舉當時漢法以曉人漢時去今久遠亦未知定張車將何所用但知在宫内所用故差小爲之謂之羊車也按此羊車較長七尺下柏車較長六尺則羊車大矣而論語謂大車爲柏車小車爲羊車者以柏車皆說轂輻牙惟羊車不言惟言較而已是知柏車較雖短轂輻牙則長羊車較雖長轂輻牙則小故得小車之名也柏車二柯注較六尺也柏車輪崇六尺其綆大半寸疏注釋曰鄭云柏車輪崇六尺其綆大半寸知者以大車輪崇九尺綆一寸此柏車輪崇六尺三分減一明柏車輪崇六尺三分減一其綆亦宜三分減一三分寸之二卽大半寸也凡爲轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺注鄭司農云鉤鉤心鬲謂轅端厭牛領者音義鬲沈於革反劉音隔厭於甲反疏釋曰云凡爲轅者言凡語廣則柏車大車羊車皆在其中輪崇雖不同其轅當各自三其輪崇假令柏車輪崇六尺三之爲轅丈八尺大車輪崇九尺三之爲轅二丈七尺但羊車雖不言輪崇亦三之以爲轅也徹廣六尺者不與四馬車八尺者同徹鬲長六尺者以其兩轅一牛在轅内故狹四馬車鬲六尺六寸者以其一轅兩服馬在轅外故鬲長也弓人爲弓取六材必以其時注取榦以冬取角以秋絲漆以夏筋膠未聞疏注釋曰鄭知取榦以冬者見山虞云仲冬斬陽木仲夏斬隂木二時俱得斬但冬時尤善故月令仲冬云日短至伐木取竹箭注云堅成之極時是知冬善於夏故指冬而言也云取角以秋者下云秋殺者厚故知用秋也絲漆以夏者夏時絲孰夏漆尤良故知也筋膠未聞必知六材據此六者皆依下文而説也六材旣聚巧者和之注聚猶具也音義聚似主反疏釋曰爲弓須此六材故云聚巧者卽此弓人之工者也和之謂春液角夏治筋之類是也榦也者以爲遠也角也者以爲疾也筋也者以爲深也膠也者以爲和也絲也者以爲固也漆也者以爲受霜露也注六材之力相得而足疏注釋曰此一經主論六材在弓各有所用六材相得乃可爲足也凡取幹之道七柘爲上檍次之檿桑次之橘次之木瓜次之荆次之竹爲下注鄭司農云檍讀爲億萬之億爾雅曰杻檍又曰檿桑山桑國語曰檿弧箕箙音義檍於力反一音意劉又烏克反檿烏簟反杻女丑反箙音服疏釋曰此經説弓榦善惡者也注釋曰引國語者彼爲幽王寵褒姒以至亡國故彼云檿弧箕箙實亡周國也凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則遠根注陽猶清也木之類近根者奴音義相息亮反下同鄉許亮反遠于萬反下遠於同近附近之近疏注釋曰此經説相幹善惡之法凡析幹射遠者用埶射深者用直注鄭司農云埶謂形埶假令木性自曲則當反其曲以為弓故曰審曲面埶𤣥謂曲埶則宜薄薄則力少直則可厚厚則力多音義射食亦反下同疏釋曰此説弓力多少之事凡析幹射遠者用埶者弓弱則宜射遠謂若夾㬰之類云射深者用直者弓直則宜射深謂若王弧之類也注釋曰此注後鄭增成先鄭之義先鄭惟見隨木形埶而用之後鄭則論厚薄力多少之法也二鄭相兼乃具居幹之道菑栗不迤則弓不發注鄭司農云菑讀爲不菑而畬之菑栗讀爲榛栗之栗謂以鋸副析幹迤讀爲倚移從風之移謂邪行絶理者弓發之所從起𤣥謂栗讀爲裂繻之裂音義菑側冀反又側其反沈子冀反劉音厠栗音烈李又如字迤羊氏反不菑側其反畬音餘鋸音據副普逼反析星歴反倚於綺反移羊氏反下同邪似嗟反繻音須疏釋曰居謂居處解析弓幹之法但菑栗皆謂以鋸剖析弓幹之時不邪迤失理則弓後不發傷也注釋曰先鄭云菑讀爲不菑而畬之菑禮記坊記云不菑畬此菑即耕故爾雅云田一歳曰菑二歲曰新田三歲曰畬菑取彼義也云栗讀爲榛栗之栗者詩云樹之榛栗栗者亦取破之義迤讀爲倚移從風之移讀從司馬相如上林賦云倚移從風𤣥謂栗讀爲裂繻之裂者讀從隱元年左氏傳紀裂繻來逆女彼裂繻字子帛則爲裂破衣義亦與先鄭大同皆取破義但從裂繻之裂勝從栗以其栗是栗栗堅硬之意於破義爲疏故從裂也凡相角秋閷者厚春閷者薄穉牛之角直而澤老牛之角紾而昔注鄭司農云紾讀爲抮縛之抮昔讀爲交錯之錯謂牛角觕理錯也𤣥謂昔讀履錯然之錯音義閷色界反劉色例反下同紾劉徒展反許慎尚展反又徒展反與注抮縛之抮同角絞縛之意昔七各反下同抮縳竝與紾同縳又徒轉反觕才若反又七奴反錯七各反李云鄭且若反疏釋曰上文已言幹訖至此更宜相角但以秋對春以穉對老而言之秋閷者厚謂角厚肉少春閷者薄謂角薄肉多穉牛之角直而澤謂角直而潤澤老牛之角紾而錯者紾謂理麤錯錯然不潤澤也注釋曰先鄭云紾讀爲抮縛之抮者未知讀從何文蓋從俗讀云昔讀爲交錯之錯者讀從詩獻酬交錯𤣥謂昔讀履錯然之錯者讀從離卦爻辭疢疾險中注牛有久病則角裏傷疏注釋曰以疢疾爲久病故云牛有久病險傷也中卽裏謂角裏傷也瘠牛之角無澤注少潤氣音義瘠在亦反疏釋曰上云疢疾爲久病則此云瘠者惟瘦瘠非病角則無潤澤也角欲青白而豐末注豐大也疏注釋曰凡牛角善者按下注云本白中青末豐夫角之本蹙於􅑠而休於氣是故柔柔故欲其埶也白也者埶之徵也注蹙近也休讀爲煦鄭司農云欲其形之自曲反以爲弓𤣥謂色白則埶音義夫音扶下皆同蹙於子六反注同李又音促又且六反􅑠乃老反本又作腦休音煦下同煦況付反劉音休下同疏釋曰此說角之執也言角之本近於􅑠得和煦之氣於􅑠是故柔柔故欲其形之自曲反是爲埶也然可以爲弓夫角色白者則埶之徵驗也夫角之中恒當弓之畏畏也者必橈橈故欲其堅也青也者堅之徵也注故書畏作威杜子春云當爲威威謂弓淵角之中央與淵相當𤣥謂畏讀如秦師入隈之隈音義畏烏囘反下同疏釋曰此說角之堅也注釋曰子春從故書威後鄭不從而爲隈者威謂威儀不得謂曲中故從隈爲曲隈之義按僖二十五年秋秦晉伐鄀秦人過析隈鄭以爲人隈夫角之末遠於􅑠而不休於氣是故脃脃故欲其柔也豐末也者柔之徵也注末之大者􅑠氣及煦之音義脃七歲反疏釋曰此説角欲豐末之意云角之末遠於􅑠而不休於氣是故脃脃故欲其柔也豐末也者柔之徵也則末不豐者脃末豐則柔柔則不脃可知故鄭云末之大者􅑠氣及煦之角長二尺有五寸三色不失理謂之牛戴牛注三色本白中青末豐鄭司農云牛戴牛角直一牛凡相膠欲朱色而昔昔也者深瑕而澤紾而摶亷注摶圜也亷瑕嚴利也音義摶徒丸反疏釋曰已上相幹角次及相膠此云欲朱色按下鹿膠青白已下惟牛膠火赤自餘非純赤則牛膠爲善矣紾而摶亷者謂有紾理而摶圜又亷瑕嚴利注釋曰膠之性叚叚皆摶圜也亷瑕二者俱是嚴利之狀鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃注皆謂煑用其皮或用角餌色如餌疏注釋曰云煑用其皮或用角者經惟鹿用皮亦用角今人鹿猶用角自餘皆用皮云餌色如餌者時有餌之色故從之也凡昵之類不能方注鄭司農云謂膠善戾故書昵或作樴杜子春云樴讀爲不義不昵之昵或作䵑䵑黏也𤣥謂樴脂膏䐈敗之䐈䐈亦黏也音義昵女乙反又音職樴音職黏女乙反爾雅云膠也劉沈竝音刃䐈音職吕忱云膏敗也疏注釋曰子春云不義不昵者按隠元年鄭大叔段爲不義莊公曰不義不昵厚將崩彼不昵爲不親兄則昵爲親近不相捨離後鄭以爲還從古書樴音故轉爲脂膏䐈敗之䐈若今人頭髪有脂膏者則謂之䐈䐈亦粘也凡相筋欲小簡而長大結而澤小簡而長大結而澤則其爲獸必剽以爲弓則豈異於其獸注剽疾也鄭司農云簡讀爲􅏌然登陴之􅏌𤣥謂讀如簡札之簡謂筋條也音義剽芳妙反戚芳昭反或扶召反後同􅏌下板反或胡簡反陴婢支反劉蒲隹反又房卑反疏釋曰上已相角膠次及相筋言此筋之獸剽疾爲弓亦剽疾故云豈異於其獸也注釋曰先鄭云簡讀爲􅏌然登陴之􅏌者讀從左氏傳也義無所取𤣥謂讀如簡札之簡謂筋條也竹簡一片爲一札此筋條亦有簡别故讀從之也筋欲敝之敝注鄭司農云嚼之當孰音義敝婢世反徐扶哲反嚼才略反疏注釋曰筋之椎打嚼齧欲得勞敝故云嚼之當孰也漆欲測注鄭司農云測讀爲惻隱之惻𤣥謂測讀如測度之測測猶清也音義隱本或作㦩同度徒洛反疏釋曰先鄭云測讀爲惻隱之惻此惻隱爲痛切之義非漆之善狀故後鄭以爲測度之測測清也從水義取漆爲良也絲欲沈注如在水中時色疏注釋曰言絲欲沈則據乾燥時色還如在水凍之色故云如在水中時色得此六材之全然後可以爲良注全無瑕病良善也疏注釋曰全無瑕病者幹角膠筋漆絲六材皆令善而無瑕病然後爲善也凡爲弓冬析幹而春液角夏治筋秋合三材注三材膠絲漆鄭司農云液讀爲醳音義液音亦下同醳音亦劉沈音釋下同疏釋曰凡治弓材各於其時言秋合三材膠漆絲則幹角筋須三材乃合則秋是作弓之時故至冬寒而定體也注釋曰鄭知三材是膠漆絲者以經旣言幹角及筋六材之中惟少膠漆絲故知三材謂此也先鄭液讀爲醳者醳是醳酒之醳亦是漬液之義故讀從之也寒奠體注奠讀爲定至冬膠堅内之檠中定往來體音義奠讀爲定下同檠音景疏注釋曰檠謂弓㭱至寒膠堅而牢故内之檠中定往來體則六弓往體來體多少者是也冰析灂注大寒中下於檠中復内之音義灂子召反復扶又反疏注釋曰十二月小寒節大寒中是氷盛之時故以大寒解氷也云下於檠中復内之者謂復如上寒奠體内之於檠中相似但上内爲定體而内此爲析灂而内之所爲有異故别言也冬析幹則易注理滑致音義易以豉反致直致反下言致同疏釋曰自此以下重釋上文各以其時之意春液角則合注合讀爲洽夏治筋則不煩注煩亂秋合三材則合注合堅密也寒奠體則張不流注流猶移也疏注釋曰體旣定則後用時雖張不流移謂不失往來之體也冰析灂則審環注審猶定也疏注釋曰納之檠中析其漆灂其漆之灂環則定後不鼓動故冰析之也春被弦則一年之事注朞歲乃可用音義被皮寄反疏注釋曰通春被弦則二年之事而云一年者據冰折灂已前爲一年春被弦是用時不數也析幹必倫注順其理也析角無邪注亦正之音義邪似嗟反斲目必荼注鄭司農云荼讀爲舒舒徐也目幹節目音義荼音舒下同疏注釋曰按禮記學記云善問者如攻堅木先其易者後其節目是斲目必徐之義也斲目不荼則及其大脩也筋代之受病注脩猶久也疏釋曰筋代之受病者以筋在弓皆與幹爲力必須筋幹相得今弓幹有節目用力不得其所則幹不用力故筋代幹受病以其偏用力故也夫目也者必强强者在内而摩其筋夫筋之所由幨恒由此作注摩猶隱也故書筋或作薊鄭司農云當爲筋幨讀爲車幨之幨𤣥謂幨絶起也音義幨昌亷反注同疏注釋曰此還重釋筋幹不得所之意先鄭讀幨爲車幨之幨者衛詩云漸車帷裳昏禮亦云婦車亦如之有裧故讀從之後鄭云幨絶起也者由絶起則亷幨然也故角三液而幹再液注重醳治之使相稱音義重直龍反稱尺證反下各稱同疏注釋曰或三液再液不等者角須三液幹須再液乃得相稱厚其帤則木堅薄其帤則需注需謂不充滿鄭司農云帤讀爲襦有衣絮之絮絮謂弓中裨音義帤女居反需人兗反下注罷需同襦劉音須沈音儒本亦作絮本亦作帤周易作袽皆女居反裨符支反又音卑疏注釋曰需謂不充滿者需襦不進故爲不充滿謂弓中裨者造弓之法弓幹雖用整木仍於幹上裨之乃得調適也是故厚其液而節其帤注厚猶多也節猶適也疏注釋曰多其液者謂角幹其裨須節適厚薄得所也約之不皆約疏數必侔注不皆約纒之繳不相次也皆約則弓帤侔猶均也音義數音朔侔莫侯反或亡又反繳音灼疏注釋曰約謂以絲膠横纒之今之弓猶然云不皆約謂不次比爲之疏數必侔約之多少須稀踈必均也斲摯必中膠之必均注摯之言致也中猶均也疏釋曰斲幹厚薄必調均爲之施膠亦均不得偏厚也自此以下說弓之隈裏施膠之事斲摯不中膠之不均則及其大脩也角代之受病夫懐膠於内而摩其角夫角之所由挫恒由此作注幹不均則角蹴折也音義挫子臥反蹴子六反疏釋曰此總釋經角代之受病及角之所由挫二事者也云摩其角謂幹不均而有髙下則摩其角凡居角長者以次需注當弓之隈也長短各稱其幹短者居簫音義隈鳥囘反疏注釋曰云長短各稱其幹復云短者居簫簫謂兩頭則長者自然在隈内可知恒角而短是謂逆橈引之則縱釋之則不校注鄭司農云恒讀爲裻縆之縆𤣥謂恒讀爲㮓㮓竟也竟其角而短於淵幹引之角縱不用力若欲反橈然校疾也旣不用力放之又不疾音義恒古鄧反又如字下同校古卯反注及下同裻音督縆古鄧反或古登反沈又居肯反㮓古鄧反疏釋曰竟角而短謂施角竟滿兩畔而上下短於隈者也云是謂逆橈者被弦引之時以角寛而短引之角縱不用力若欲反橈然故云引之則縱也釋之則不校者角所以放矢今角不用力故釋放之不校疾也恒角而達辟如終紲非弓之利也注達謂長於淵幹若達於簫頭紲弓䪐角過淵接則送矢太疾若見紲於䪐矣弓有䪐者爲發弦時備頓傷詩云竹䪐緄縢音義辟音譬下注變辟同或房亦反紲息列反䪐音祕又補結反爲于僞反緄古本反劉古魂反縢本又作徒登反疏注釋曰先鄭上讀爲裻縆之縆者從俗也此弓非直兩畔角滿讀之爲㮓角而角又上下長於淵幹如達於簫頭若然則譬如終紲紲謂弓䪐謂弓在䪐中然非弓之利引詩云竹䪐緄縢者緄繩縢繫約之也以竹爲䪐發弦時裨於弓之背上又繩橫繫之使相著䪐與弓爲力備頓傷也今夫茭解中有變焉故校注鄭司農云茭讀爲激發之激茭謂弓檠也校讀爲絞而婉之絞𤣥謂茭讀如齊人名手足掔爲骹之骹茭解謂接中也變謂簫臂用力異校疾也音義茭司農古厯反鄭户卯反解户賣反注同茭讀音交下交亦同激古歷反掔烏喚反骹户卯反臂如字下文同本或作辟一音房亦反疏釋曰記人别起義端故言今夫言茭解中謂弓隈與弓簫角接之處云有變者卽異也謂弓簫與臂用力異異者引之則臂中用力放矢則簫用力旣用力異故絞絞謂矢去疾也注釋曰先鄭讀茭爲激發之激者當時有激發之語故從俗讀之云茭謂弓檠也者此據用時輙言弓檠於義不合後鄭不從之云校讀爲絞而婉之絞者按昭元年左氏傳虢之會楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉退會子羽謂子皮曰叔孫絞而婉故讀從之此後鄭増成其義𤣥謂茭讀如齊人名手足掔爲骹之骹者時齊人有名手足節掔間爲茭取弓隈與簫角相接名茭也於挺臂中有柎焉故剽注挺直也柎側骨剽亦疾也鄭司農云剽讀爲湖漂絮之漂音義挺勅頂反注同或徒令反柎方輔反下同湖音胡漂匹妙反絮相預反疏注釋曰直臂中正謂弓把處有柎焉者謂角弓於把處兩畔有側骨骨堅强所以與弓爲力故剽疾也先鄭云剽讀爲湖漂絮之漂者時有此語從俗讀之恒角而達引如終紲非弓之利注重明達角之不利變辟言引字之誤音義引依注音譬重直用反撟幹欲孰於火而無贏撟角欲孰於火而無燂引筋欲盡而無傷其力鬻膠欲角而水火相得然則居旱亦不動居濕亦不動注贏過孰也燂炙爛也不動者謂弓也故書燂或作朕鄭司農云字從燂音義撟居兆反劉枯老反沈古了反燂音潛又音尋或大含反鬻章吕反疏釋曰此一經明料理幹角筋膠四者得所不得所之事不言漆絲者用力少故不言也苟有賤工必因角幹之濕以爲之柔善者在外動者在内雖善於外必動於内雖善亦弗可以爲良矣注苟渝也濕猶生也音義愉吐侯反或吐豆反疏釋曰此經說弓幹須外内皆善不得外善内惡者也凡爲弓方其峻而高其柎長其畏而薄其敝宛之無已應注宛謂引之也引之不休止常應弦言不罷需也峻謂簫也鄭司農云敝讀爲蔽塞之蔽謂弓人所握持者音義畏烏囘反敝讀爲蔽必世反劉又博壻反宛於阮反應應對之應注下皆同罷音皮疏釋曰方其峻峻謂簫簫宜方爲之而高其柎柎把中高對方則此高者謂爲柎骨宜高爲之長其隈謂柎之上下宜長爲之而薄其敝敝謂人所握持手敝之處宜薄爲之有此四善故引之無休止而應弦故云宛之無已應謂常用而不就弦也下柎之弓末應將興注末猶簫也興猶動也發也弓柎卑簫應弦則柎將動音義卑劉音婢疏注釋曰言下柎者謂把骨大下爲之由弓隈下短故簫應弦則將動發也爲柎而發必動於閷注閷接中音義閷色界反劉色例反注下同疏釋曰此重釋上文末應將興者若上爲柎而發動則接中亦動也弓而羽閷末應將發注羽讀爲扈扈緩也接中動則緩閷簫應弦則角幹將發音義羽音户疏注釋曰破羽爲扈者羽於弓義無所取故破從扈也必知此有緩義者以其上文云必動於閷故知此云羽閷者當從緩閷弓有六材焉維幹强之張如流水注無難易也音義易以豉反下同疏釋曰弓有六材惟以幹爲强者以其幹外五材當依幹而有以幹爲本故指幹爲强張如流水者以幹得所以制五材故張如流水無難易無難易則强弱得所也維體防之引之中參注體謂内之於檠中定其體防深淺所止謂體定張之弦居一尺引之又二尺疏注釋曰云體謂内之於檠中定其體者此亦謂内之檠中則往來體定體定然後防之防之者鄭云深淺所止若王弧之弓往體寡來體多弛之乃有五寸張之一尺五寸夾庾之弓往體多來體寡者弛之一尺五寸張之得五寸唐弓大弓往來體若一者弛之一尺張之亦一尺是防之深淺所止云謂體定張之弦居一尺引之又二尺者此據唐大中者而言餘四者弛之張之雖多少不同及其引之皆三尺以其矢長三尺須滿故也維角䟫之欲宛而無負弦引之如環釋之無失體如環注負弦辟戾也負絃則不如環如環亦謂無難易鄭司農云䟫讀如牚距之牚車牚之牚音義䟫直庚反或之亮反又詩尚反注同沈云或音堂非辟劉必亦反衆家皆匹亦反疏注釋曰云維角䟫之䟫正也謂置角於隈中旣正云欲宛而無負弦者引之弓體不辟戾故也云引之如環者亦由無負弦故也云釋之無失體如環者謂放矢後無失體得如環然先鄭云䟫讀如牚距之牚牚距取其正也車牚之牚謂車輢之木亦取正也材美工巧爲之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和注有三讀爲又參量其力又參均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺假令弓力勝三石引之中三尺弛其弦以繩緩擐之每加物一石則張一尺故書勝或作稱鄭司農云當言稱謂之不參均𤣥謂不勝無負也音義勝音升下注同被皮寄反擐户串反劉郭犬反疏注釋曰云有三讀爲又參者以經上文已云參均此云三均故宜破三爲參也上文已二參均此文加一參均當云又參均故破有爲又也云量其力又參均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺者此言謂弓未成時幹未有角稱之勝一石後又按角勝二石後更被筋稱之卽勝三石引之中三尺者此據幹角筋三者具總稱物三石得三尺若據初空幹時稱物一石亦三尺更加角稱物二石亦三尺又被筋稱物三石亦三尺鄭又云假令弓力勝三石引之中三尺者此卽三石力弓也必知弓力三石者當弛其弦以繩緩擐之者謂不張之别以一條繩繫兩簫乃加物一石張一尺二石張二尺三石張三尺則與前三幹角筋力各一石也先鄭從古書爲稱者欲以不稱爲不參均後鄭不從者此勝卽彼負此不勝卽彼不負故爲不勝解之九和之弓角與幹權筋三侔膠三鋝絲三邸漆三斞上工以有餘下工以不足注權平也侔猶等也角幹旣平筋三而又與角幹等也鋝鍰也邸斞輕重未聞音義侔本又作牟亦作桙同莫侯反鋝色劣反又音劣邸丁禮反或丁計反斞羊主反鍰音環又于卷反疏釋曰此說上九和之弓輕重相參不可妄爲加減之事注釋曰云鋝鍰也者尚書云其罰百鍰之等言鍰此與冶氏言鋝鋝與鍰爲一物皆是六兩大半兩也邸斞之輕重未聞經旣無文故云未聞也爲天子之弓合九而成規爲諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規注材良則句少也音義合如字一音閤下同疏釋曰此據角弓形不張而言按下文及司弓矢六弓爲三等王弓弧弓往體寡來體多當此天子弓合九成規唐弓大弓往來體若一當此諸侯弓合七成規夾弓庾弓往體多來體寡當此大夫之弓合五成規於彼六弓已盡此别云士合三成規則六弓之外弊惡之弓按大射與鄉射大夫士同射五十步侯又同用夾庾無士用合三成規之弓者於此言之者六弓通弊弓有四等故弊弓暫記士而言其實士不用合三成規之弓也注釋曰材良則句少據王弧及唐大已上而言也弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之注人各以其形貌大小服此弓疏釋曰此以弓有長短三等人亦有長短三等而言取其弓與人相稱之事此上士中士下士以長者爲上士次者爲中士短者爲下士皆非命士者故鄭云人各以其形貌大小服此弓也凡爲弓各因其君之躬志慮血氣注又隨其其人之情性疏釋曰上文據人形爲弓此據人性故鄭云又隨其人之情性也此亦與下文爲目下别以躬與志相配而言也躬卽身也志慮據在心血氣據言與舉動也豐肉而短寛緩以荼若是者爲之危弓危弓爲之安矢骨直以立忿埶以奔若是者爲之安弓安弓爲之危矢注言損贏濟不足者奔猶疾也骨直謂强毅荼古文舒假借字鄭司農云荼讀爲舒音義肉如字劉而樹反埶音勢疏釋曰此經以下說君之躬與志慮弓之所宜者也危弓謂夾庾弱者而言安弓謂王弧之類强者而言若然危矢據恒矢安矢據殺矢者也注釋曰言損贏濟不足者言豐肉寛緩是不足則危弓濟之危弓爲贏則以安矢損之骨直忿埶是贏則安弓損之安弓是不足則以危矢濟之其人安其弓安其矢安則莫能以速中且不深注故書速或作數鄭司農云字從速速疾也三舒不能疾而中言矢行短也中又不能深音義中丁仲反注及下同數音朔疏釋曰上文以安危損益卽於射事爲可此三安而無損益故不可其人危其弓危其矢危則莫能以愿中注愿慤也三疾不能慤而中言矢行長也長謂過去音義愿音願一音元慤苦角反疏釋曰此三危亦無損益故亦不可也注釋曰云三疾不能慤而中言矢行長也長謂過去者危弓危矢謂夾庾恒矢之等皆射遠兼人且危躁故矢行長故去也往體多來體寡謂之夾臾之屬利射侯與弋注射遠者用埶夾臾之弓合五而成規侯非必遠顧執弓者材必薄薄則弱弱則矢不深中侯不落大夫士射侯矢落不獲弋繳射也故書與作其杜子春云當爲與音義夾古洽反劉古協反臾音庾射食亦反注下除繳射大射小射用射外皆同獲劉胡檗反繳諸若反疏釋曰六弓兩兩相將下文王弓不言弧弓唐弓不言大弓故言之屬今此夾庾並言亦云之屬者夾庾雖竝言以夾庾其類非一故亦云之屬也注釋曰云射遠者用埶者謂審曲面埶夾庾反張多隨曲埶向外弱則射遠不能深則近亦不深故射近侯用之故云侯非必遠顧執弓者材必薄薄則弱弱則矢不深也中侯不落者謂弓射遠以其材弱縱射近亦不深故近侯矢但不落也云大夫士射侯矢落不獲者按大射云中離維綱揚觸捆復君則釋獲衆則否大夫士矢落侯不獲故不得用是唐大之等也云弋繳射也者按司弓矢職云夾弓庾弓以授射豻侯鳥獸者豻侯鳥獸則射侯與弋也按彼注近射用弱弓則射大侯者用王弧射參侯者用唐大矣如是君用王弧射大侯大夫用唐大射參侯士用夾庾射豻侯若然此大夫與士同用夾庾射近侯者據天子之臣然則三公王子爲諸侯者射熊侯卿大夫士同射豹侯也若然射七十歩侯用唐大其遠中侯亦不落也往體寡來體多謂之王弓之屬利射革與質注射深者用直此又直焉於射堅宜也王弓合九而成規弧弓亦然革謂干盾質木椹天子射侯亦用此弓大射曰中離維綱揚觸捆復君則釋獲其餘則否音義椹張林反捆苦本反疏釋曰言王弓之屬則之屬中弧弓及王弧之輩類也云利射革與質此卽司弓矢職云王弓弧弓以授射甲革椹質者亦一也注釋曰云天子射侯亦用此弓不言者舉射革與質有上文弱弓射近可參故不言可知也云大射曰中離維綱揚觸捆復中謂中侯離猶過也麗也維謂侯身與左右舌一幅兩相及角亦以綱維持之而繫於柱綱謂左右舌上畔下畔以一大綱繩各繫於其柱上以持侯其綱皆出布幅一尋謂之爲綱揚觸捆復者矢高揚而過侯彼注云揚觸者謂中他物揚而觸侯也捆復謂矢至侯不著而還復復反也如此五者君則釋獲其餘則否則臣不得獲惟中乃可釋獲往體來體若一謂之唐弓之屬利射深注射深用直唐弓合七而成規大弓亦然春秋傳曰盜竊寳玉大弓疏釋曰唐弓之外仍有弓故云之屬也按司弓矢職云唐弓大弓以授學射者使者勞者此不言者亦各舉一邊而言兼有彼事可知注釋曰言射深用直唐弓合七而成規者則王弧之弓亦射深用直唐大合七成規則王弧之弓射深可知引春秋者定八年公羊傳文彼以陽虎爲盜竊寳玉大弓彼公羊云寳者何璋判白弓綉質引之者證大弓同也大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂注大和尤良者也深謂灂在中央兩邊無也角無灂謂隈裏疏釋曰大和謂九和之弓以其六材俱善尤良故無漆灂也其次筋角皆有灂而深者筋在背角在隈皆有灂但深在其中央兩邊無也其次有灂而疏者以上參之此謂兩邊亦有但疏之不皆有也其次角無灂謂隈裏無灂簫頭及背有之合灂若背手文注弓表裏灂合處若人合手背文相應鄭司農云如人手背文理音義背補内反注同疏釋曰言合灂者謂弓表裏灂漆相合之處若人合手背上文理相應角環灂牛筋蕡灂麋筋㡿蠖灂注蕡枲實也㡿蠖屈蟲也音義環如字又户串反蕡扶文反注同㡿音尺蠖枉縛反又於郭反枲絲子反疏釋曰此說弓表及弓裏灂文也角環灂謂隈裏灂文如環然牛筋蕡灂者此說弓背用牛筋之漆如麻子文若用麋其灂文如斥蠖文云蕡枲實者枲乃牡麻無實而云蕡枲實舉其類爾若簞笥然也斥蠖屈蟲者易云斥蠖之屈以求信是也和弓􅌛摩注和猶調也􅌛拂也將用弓必先調之拂之摩之大射禮曰小射正授弓大射正以袂順左右隈上再下一音義上時掌反疏注釋曰引大射云大射正以袂順左右隈者左手橫執之時上隈向右下隈向左而上再下一拂去塵乃授與君大射雖不言調亦調可知也覆之而角至謂之句弓注句於三體材敝惡不用之弓也覆猶察也謂用射而察之至猶譱也但角善則矢雖疾而不能遠音義覆孚服反注下皆同句劉九具反沈音鉤譱音善本又作善下同疏釋曰此以下論弓有六材角幹筋用力多特言之若三者全善則爲尤良若一善者爲敝二善者爲次今此先察一善者謂若餘幹筋不善直角善可以爲句弓注釋曰云句於三體材敝惡不用之弓也者謂不入上三文所用之内言矢雖疾不能遠者上云射遠用埶埶是弱弓而射遠但此句弓爲弱於彼雖疾不能射遠也覆之而幹至謂之侯弓注射侯之弓也幹又善則矢疾而遠疏釋曰此察次弓此非直角至兼幹善謂之射侯之弓則上夾庾利射侯與弋言矢疾而遠對上句弓疾而不遠不及侯者也覆之而筋至謂之深弓注射深之弓也筋又善則矢旣疾而遠又深疏釋曰此弓三善者也按上文唐大射深則王弧三善亦射深可知舉中以見上者也周禮注疏卷四十二周禮注疏卷四十二考證匠人爲溝洫疏古者人耕皆畎上種穀臣照按畮高畎低畮以種穀畎以通水此畎字當作畮賈氏弗檢偶訛耳耜廣五寸疏共一尺廣一尺深者謂之畎監本脫廣字今依經廣尺深尺句補之凡溝逆地阞疏注云謂造溝則此溝非謂其田間廣深四尺者監本其田間三字訛在廣深四尺之下牆厚三尺疏高恒三倍於厚厚三尺高九尺三監本訛兩今改正車人爲車行澤者反輮注耎者在外耎卽軟字監本訛作需今從釋文作耎弓人爲弓凡相幹注木之類近根者奴奴監本訛妙木以遠根者爲貴奴言其賤也今從訂義本改正絲欲沈疏如在水凍之色凍當是湅字之訛恒角而達引如終紲非弓之利石經利下有也字材美工巧爲之時謂之參均角不勝幹幹不勝筋謂之參均石經第二句參均上有不字蓋一正一反說注亦云謂之不參均當從石經大和無灂其次筋角皆有灂而深其次有灂而疏石經有灂而疏上有角字周禮注疏卷四十二考證
