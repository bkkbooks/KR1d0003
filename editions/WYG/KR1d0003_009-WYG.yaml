body:
  text: 周禮注疏卷九漢鄭氏注唐陸德明音義賈公彥疏地官司徒第二惟王建國辨方正位體國經野設官分職以爲民極疏釋曰六官皆有此敘者欲見六官所主雖異以爲民極是同故也乃立地官司徒使帥其屬而掌邦敎以佐王安擾邦國注敎所以親百姓訓五品有虞氏五而周十有二焉擾亦安也言饒衍之疏釋曰此經所云爲立官之意六官亦同有此語唯地官司徒與安擾之字不同欲見所主雖曰有殊佐王之事是一故也注釋曰云敎所以親百姓者案尚書舜典云帝曰契百姓不親五品不遜汝作司徒敬敷五敎在寛彼舜欲使契布五敎親百姓遜五品是鄭君所取義也但五敎據所施而言五品據人品列有五所從言之異其義一也云有虞氏五而周十有二焉者有虞氏五卽舜典所云敬敷五敎又文十八年云舜臣堯舉八元使敷五敎于四方父義母慈兄友弟恭子孝是也而周十有二者據司徒之職云一曰以祀禮敎敬以下是也案成王周官云司徒敷五典擾兆民則周亦有五敎而云至周十有二者鄭據此周禮之文言十二以對於虞其實五中雖不含十二十二亦含有五云擾亦安也言饒衍之者以言饒益衍長亦是安義以其民爲邦本不安則散特須安而復安故云擾亦安也案天官敎典鄭注擾爲馴者以其司徒主敎敎使馴順馴亦是安之義也敎官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人注師長也司徒掌六鄉鄉師分而治之二人者共三鄉之事相左右也音義鄉師音香下以意求之長丁丈反後皆同左音佐右音又疏釋曰上經説立官之意此經説立官尊卑相副貳云敎官之屬者自此以下至稾人總六十官皆是敎官之屬若然敎官總目於下也云大司徒卿一人六命小司徒中大夫二人四命鄉師下大夫四人與小司徒同四命分爲中下上士八人三命中士十有六人再命旅下士三十有二人一命自此已上皆得王命謂之王臣以卑佐尊尊少卑多各與上一倍云府六人主藏文書史十有二人主作文書胥十有二人爲什長徒百有二十人給徭役此四者皆不得王命官長所自辟除者也注釋曰此鄉師司徒之老謂之鄉師者謂佐司徒主六鄉亦與在下民臣爲長故云師長也云司徒掌六鄉者案下云鄉老二鄉則公一人已下是主六鄉之事云鄉師分而治之者以其鄉師佐司徒主六鄉故言分而治之以鄉有六其人有四故二人共三鄉云相左右者左右助也以其二人共主三鄉不得各專其鄉事故相助而已鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人注老尊稱也王置六鄉則公有三人也三公者内與王論道中參六官之事外與六鄉之敎其要爲民是以屬之鄉焉州黨族閭比鄉之屬别正師胥皆長也正之言政也師之言帥也胥有才知之稱載師職曰以官田牛田賞田牧田任遠郊之地司勲職曰掌六鄉之賞地六鄉地在遠郊之内則居四同鄭司農云百里内爲六鄉外爲六遂音義比毗志反徐扶二反注下同稱尺證反下同爲于僞反帥所類反知音智疏釋曰鄉老者謂三公案下曲禮三公於諸侯曰天子之老此鄭注云老尊稱未必是年老二鄉則公一人者在朝三公八命卽典命云三公八命是也分陜而治則九命則大宗伯云九命作伯是也鄉大夫每鄉卿一人者六鄉則卿六人各主一鄉之事然總屬司徒非六官典兼鄉大夫知者以鄭注大司馬云軍吏選於六官六鄉之吏爲之旣六官六鄉竝言故知别置州長每州中大夫一人者每鄉有五州州長以中大夫爲之亦四命黨正每黨下大夫一人者五黨爲州黨正使下大夫爲之亦四命族師每族上士一人者五族爲黨族師使上士一人爲之亦三命閭胥每閭中士一人者四閭爲族巷門爲閭胥有才智之稱閭胥使中士一人爲之亦再命比長五家下士一人者五比爲閭比長使下士一人爲之亦一命特言五家者明閭胥已上至鄉皆有家數故其職云五家爲比五比爲閭四閭爲族五族爲黨五黨爲州五州爲鄉從少至多故於此言五家爲本也注釋曰言老尊稱也者以其天子所父事二老者同名故云老尊稱也云王置六鄉則公有三人也者於周禮不見公之人數六鄉之數周禮有其文此經云二鄉則公一人明知公有三人案成王周官立太師太傅太保兹惟三公亦是公有三人之事云三公者内與王論道者成王周官云兹惟三公論道經邦考工記云坐而論道謂之王公鄭雖言天子諸侯公中亦含三公是其内與王論道也云中參六官之事者案書傳云天子三公一曰司徒公二曰司馬公三曰司空公彼注云周禮天子六鄉與大宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司寇司空同職者則謂之司空公一公兼二卿舉下以爲稱是其中參六官之事云外與六鄉之敎卽此經是也云其要爲民是以屬之鄉焉者三公無正職是以三百六十官之中不見三公之任唯此六鄉之内而言三公故云屬之鄉焉不言三孤者以其佐公論道三公有事之所亦有三孤故不言之云州黨族閭比鄉之屬别者五者皆屬於鄉而名號有别也云正師胥皆長也者自州已下至比長五官州比自稱長矣唯有黨正族師閭胥不言長故鄭云正師胥皆長也云正之言政也者取施政敎者先自正故也云師之言帥也者以其帥領百家故言帥也云胥有才智之稱者此釋閭胥以其有才智故爲中士以領一閭雖不稱長亦有長義引載師職云賞田任遠郊之地又引司勲職言掌六鄉之賞地者欲見賞地在六鄉之中同在遠郊之内云六鄉地在遠郊之内則居四同者案司馬法王城百里爲遠郊於王城四面則方二百里開方之二二如四故云居四同言此者破賈馬六鄉之地在遠郊五十里内五十里外置六遂鄭司農云百里内爲六鄉外爲六遂者司徒掌六鄉在百里内上已釋訖百里外爲六遂以其遂人掌六遂案遂人職云掌邦之野郊外曰野故知百里外爲六遂封人中士四人下士八人府二人史四人胥六人徒六十人注聚土曰封謂壝堳埒及小封疆也音義堳音眉埒音劣疆居良反疏釋曰封人在此者以其掌設王之社壝及畿封又大司徒設社稷壝相左右故在地官而爲職首也胥徒多者以其畿封事廣故也鼓人中士六人府二人史二人徒二十人疏釋曰鼓人在此者以其主敎六鼓四金以是敎官故在此也舞師下士二人胥四人舞徒四十人注舞徒給繇役能舞者以爲之音義繇音遙疏釋曰舞師在此者以其主敎野人之舞亦是敎官之類故也若然樂師亦敎舞不在此者彼敎國子學樂必須合於禮故入春官也注釋曰餘官直言徒此官徒言舞者徒是給繇役之人今兼云舞卽徒中使能舞者以充徒數也牧人下士六人府一人史二人徒六十人注牧人養牲於野田者詩云爾牧來思何蓑何笠或負其餱三十維物爾牲則具音義牧牧養之牧徐音目何胡可反又音河下同蓑素禾反笠音立餱音侯乾食疏釋曰牧人在此者以其掌牧六牲以供祭祀亦是地事故也注釋曰鄭云養牲於野田者對充人養牲於國中又引詩曰者謂無羊詩美宣王之事也爾宣王牧人來之時荷揭蓑之與笠蓑所以禦雨笠所以禦暑或負其餱糧也三十唯物物色也異毛色者三十爾宣王牲則備矣引之者以證牧人牧六牲之事也牛人中士二人下士四人府二人史四人胥二十人徒二百人注主牧公家之牛者詩云誰謂爾無牛九十其􅧄􅧄耆九十其餘多矣音義􅧄而純反一音而專反黃牛黑脣曰􅧄疏釋曰主牧公家之牛者亦是地事又鄭下注云牛能任載地之類故在此也詩云者亦無羊詩言誰謂爾宣王無牛九十其犉黃牛黑脣曰犉云犉者九十其餘多矣者證經牛多故徒有二百人牧之也充人下士二人史二人胥四人徒四十人注充猶肥也養繫牲而肥之疏釋曰祭祀之牲本以諸牲堪入祭祀者送付牧人至祭前三月選入充人芻之使之肥充故其職云祀五帝則繫于牢芻之三月故與牧人連類在此也載師上士二人中士四人府二人史四人胥六人徒六十人注載之言事也事民而税之禹貢曰冀州旣載載師者閭師縣師遺人均人官之長疏釋曰案其職云掌任土之法以物地事皆是土地之事故在此注釋曰鄭知事民而税之者案其職上云任土之法下云近郊什一之等是其任民而税之者也云禹貢曰冀州旣載引之者彼是禹治洪水訖事而税之引之證此事民之類也云載師者閭師縣師遺人均人官之長者以其閭師縣師徵斂之官所斂之賦有入遺人者均人主掌地守地職皆與載師事通故載師與之爲長閭師中士二人史二人徒二十人注主徵六鄉賦貢之税者鄉官有州黨族閭比正言閭者徵民之税宜督其親民者凡其賦貢入大府穀入倉人疏注釋曰主徵六鄉賦貢之税者案其職云任農以耕事貢九穀任圃以樹事貢草木六鄉之内有二十五家爲閭今以閭爲名故知閭師主徵六鄉賦貢者也云鄉官有州黨族閭比正言閭者徵民之税宜督其親民者鄉官有五者之名正取二十五家爲閭以爲徵斂之官號者徵民之税恐不能細悉其民故以近民之官爲號云凡其賦貢者此貢非是大宰九貢正是九職之貢卽其職云任農以耕事貢九穀之類是也此云賦謂大宰九賦之内則國中四郊二者是也故其職云掌國中及四郊之人民六畜之數又云凡無職者出夫布是其九職之内故云凡其賦貢入大府故大府職云掌九賦九貢九功之貳以受其貨賄之入焉云穀入倉人者案倉人云掌粟入之藏故知穀入倉人也縣師上士二人中士四人府二人史四人胥八人徒八十人注主天下土地人民已下之數徵野賦貢也名曰縣師者自六鄉以至邦國縣居中焉鄭司農云四百里曰縣疏注釋曰主天下土地人民已下之數者案其職云掌邦國都鄙稍甸郊里之地域辨其夫家六畜車輦是其主天下土地人民已下之數人民之外仍有六畜車輦故言已下云徵野貢賦也者案其職云以歳時徵野之賦貢郊外曰野以其二百里外至邦國以其地廣縣師徵之旅師斂之徵斂别官百里之内六鄉之中閭師徵之閭師斂之以其地狹徵斂同官云名曰縣師者自六鄉以至邦國縣居中焉者自百里以至邦國分爲五等二百里曰甸三百里曰稍四百曰縣五百曰都畿外邦國是其縣居中焉以其徵外内之賦舉中爲名鄭雖言自六鄉六鄉仍舊郊内據六鄉已外而言鄭司農云四百里曰縣者據載師職小都任縣地在四百里中故云四百里曰縣此縣師與閭師竝在此者以其徵斂地税故與載師連類在此遺人中士二人下士四人府二人史四人胥四人徒四十人注鄭司農云遺讀如詩曰棄予如遺之遺𤣥謂以物有所饋遺音義遺維季反注饋遺同司農音維疏釋曰在此者案其職云掌邦之委積以待施惠故與徴斂之官連類在此注釋曰先鄭云遺讀如詩曰棄予如遺之遺者此小雅谷風詩彼謂朋友道絶相棄如遺忘物𤣥謂以物有所饋遺者此是將物與人非是遺忘之事故不從先鄭也均人中士二人下士四人府二人史四人胥四人徒四十人注均猶平也主平土地之力政者疏釋曰均人在此者案其職云掌均地政均地守均地職皆是土地之事故在此注釋曰知平土地之力政者案其職均地職已下更有均人民牛馬車輦之力政是其平土地力政者也師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人注師敎人以道者之稱也保氏司諫司救官之長鄭司農云詩云楀維師氏音義楀俱禹反疏釋曰師氏在此者以其主敎與地官掌十二敎同故亦在此以其敎國子有道藝故使中大夫尊官爲之也其徒百有二十人者以其國子人衆使役處衆故其徒多矣注釋曰案其職云以三德敎國子一曰至德以爲道本是其敎人以道者之稱也云保氏司諫司救官之長者以其保氏佐師氏敎國子以其司諫諫萬民司救救萬民皆是敎之義故師氏與爲長鄭司農云詩云楀惟師氏者此詩小雅刺幽王之詩其臣氏曰楀者惟作師氏之官引之者證與此師氏同也保氏下大夫一人中士二人府二人史二人胥六人徒六十人注保安也以道安人者也書敘曰周公爲師召公爲保相成王爲左右聖賢兼此官也音義召上照反相息亮反疏釋曰保氏在此者以其佐師氏敎國子亦是敎官故在此旣與師氏同敎國子官與府史别者以其敎國子雖同館舍别所故置官有異注釋曰云以道安人者也者人則是國子也案其職云掌敎國子以道人有道則安故云以道安人者也此師氏保氏皆稱氏者案鄭下注云官有世功則以官族此二官父祖以來皆以道敎國子世爲師氏保氏之官則賜之以氏曰師氏保氏自此以下官稱氏者皆此類也云書敘曰周公爲師召公爲保相成王爲左右者此是尚書君奭篇敘云聖賢兼此官也者召公爲賢周公爲聖此二人爲三公分陜以其周公聖下兼此師氏官召公爲賢下兼此保氏官故云聖賢兼此官此鄭君之意謂三公之號無師保之名兼此二官得師保之稱鄭志趙商問案成王周官立太師太傅太保兹惟三公卽三公之號自有師保之名成王周官是周公攝政三年事此周禮是周公攝政六年時則三公自名師保起之在前何也鄭荅曰周公左召公右兼師保初時然矣若如此解周公兼師在成王周官前故成王周官稱三公爲太師太傅太保若然太傅者畢公爲之兼世子之官故稱太傅是以文王世子云太傅在前少傅在後若孔君之義三公之號自名師保不由兼師氏保氏司諫中士二人史二人徒二十人注諫猶正也以道正人行音義行下孟反疏釋曰司諫在此者案其職云掌糾萬民之德勸之朋友正其行而强之道藝此官則主諫萬民亦是敎之義此官徒二十人無胥者以得徒則了不假長帥故無胥也上下文有徒無胥者皆此類注釋曰鄭訓諌爲正言以道正人行者案其職云正其行故鄭就而解之司救中士二人史二人徒二十人注救猶禁也以禮防禁人之過者也疏釋曰案其職云掌萬民之衺惡過失而誅讓之以禮防禁而救之是其以禮防禁人之過者亦是敎之類故在此調人下士二人史二人徒十人注調猶和合也疏釋曰言調人者鄭云調猶和合也人相殺傷共其難者此調人和合之在此者會赦之後設敎使之相避是敎官之類故在此媒氏下士二人史二人徒十人注媒之言謀也謀合異類使和成者今齊人名麴􅨠曰媒音義媒劉音梅麴起六反􅨠魚列反又五結反徐去穢反疏釋曰媒氏在此者集名云配儷男女取地道生息故在此也注釋曰言謀合異類使和成者異類謂别姓三十之男二十之女和合使成婚姻云今齊人名麴􅨠曰媒麴􅨠和合得成酒醴名之曰媒言此者欲見謀合異姓得名爲媒之意司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人注司市市官之長疏釋曰案其職云掌市之治敎政刑量度禁令以其事治敎卽敎官之類又市以聚人猶地之容衆故在此以其市官之長經紀事大故使下大夫尊官爲之也屬官及胥徒又衆也注釋曰市官謂質人已下至泉府司市與之爲長也質人中士二人下士四人府二人史四人胥二人徒二十人注質平也主平定物賈者音義賈音嫁下物賈及賈八人同疏釋曰在此者案其職云掌成市之貨賄人民牛馬鄭彼注成平也此注質平也主平定物賈者故亦與司市連類在此廛人中士二人下士四人府二人史四人胥二人徒二十人注故書廛爲壇杜子春讀壇爲廛説云市中空地𤣥謂廛民居區域之稱音義廛直連反徐長戰反疏釋曰在此者案其職云掌斂市之絘布總布質布罰布廛布五種之泉入于泉府故與司市連類在此也注釋曰子春讀壇爲廛不從故書於義是也又説云市中空地以解廛則於義非也故後鄭不從𤣥謂廛民居區域之稱者見遂人云夫一廛田百畝及載師廛里任國中之地皆是民之所居區域又其職有廛布謂貨賄停儲邸舍之税卽市屋舍名之爲廛不得爲市中空地胥師二十肆則一人皆二史賈師二十肆則一人皆二史司虣十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人注自胥師以及司稽皆司市所自辟除也胥及肆長市中給繇役者胥師領羣胥賈師定物賈司虣禁暴亂司稽察留連不時去者音義賈音古辟必亦反徐方厯反疏釋曰自胥師至司稽皆是府史之類非是命士已上其職云平其貨賄胥者有才智之稱師長也肆謂行列胥師二十肆則一人皆有二史副之助作文書賈師知物價者其職云凡國之賣儥各帥其屬而嗣掌其月亦二十肆則一人亦二史副之司虣司猶主也主在市虣亂十肆則一人司稽司主也主在市稽留之人不時去者五肆則一人胥二肆則一人者此謂市中給繇役少有才智者屬胥師肆長謂行頭每肆則一人亦是市中給繇役者注釋曰知胥師及司稽皆司市所自辟除者以其胥師越賈師等領羣胥則知胥師等竝非官賈師與胥師同二十肆則一人二史賈師非官明胥師亦非官也故知皆司市所自辟除也又知胥及肆長是給繇役者以其司稽已上是府史之類明此二者與胥徒同是給繇役者也又知胥師領羣胥者以其同名爲胥二肆則一人其數衆多明有所屬故知胥爲胥師所領也泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人注鄭司農云故書泉或作錢疏釋曰在此者案其職云掌以市之征布故與司市連類在此注釋曰泉與錢今古異名故後鄭引之得通一義司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人注司門若今城門校尉主王城十二門音義校胡孝反疏釋曰司門在此者案其職云正其貨賄凡物犯禁者舉之以其掌貨賄與司市相連故亦在此注釋曰案經有每門下士二人據在門開閉者此司門鄭云若今城門校尉則是都司總監十二門官故舉漢法況之知王城有十二門者案匠人云營國九里旁三門四面各三門是有十二門鄭注云十二門以通十二子十二子則十二辰也司關上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人注關界上之門疏釋曰在此者案其職云掌國貨之節以聯門市故與司市連類在此此司關亦是總檢校十二關所司在國内下云每關下士二人者自在關門開閉注釋曰王畿千里王城在中面有五百里界首面置三關則亦十二關故云關界上門也掌節上士二人中士四人府二人史四人胥二人徒二十人注節猶信也行者所執之信疏釋曰案其職云掌守邦節辨其用在此者以其節連於門市故亦連類在此注釋曰案其職云邦國之使節山國虎節凡節者皆行道所用無節者不達有節乃得行故云行者所執之信遂人中大夫二人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人注遂人主六遂若司徒之於六鄉也六遂之地自遠郊以達于畿中有公邑家邑小都大都焉鄭司農云遂謂王國百里外疏釋曰遂人主六遂如司徒主六鄉但官校卑一等司徒六命卿一人小司徒中大夫二人鄉師下大夫四人此遂人中大夫二人當小司徒處遂師下大夫四人當鄉師處但無六命卿一人以其六鄉爲正六遂爲副故尊卑不同以主事相似故上士已下其數與司徒同自此已下至旅師皆是地事故在此注釋曰鄭知遂人主六遂若司徒之於六鄉者旣名遂人下文承以遂大夫遂官之等似若大司徒下卽有鄉大夫鄉官之等故知遂人主六遂若司徒之於六鄉也云六遂之地自逺郊以達于畿者案其職云遂人掌邦之野下文以達于畿是其義也云中有公邑家邑小都大都焉但六遂之地只在二百里内亦有公邑故載師職云公邑之田任甸地其公邑自二百里以出至五百里皆有焉家邑大夫采地在稍地三百里小都卿之采地在縣地四百里大都三公王子弟在畺地五百里故載師職云家邑任稍地小都任縣地大都任畺地遂人雖專六遂以其言掌野郊外曰野大總之言以言達于畿故知兼掌此等焉鄭司農云遂謂王國百里外者以其在二百里中故知百里外遂大夫毎遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人注縣鄙酇里鄰遂之屬别也音義酇作管反疏釋曰此遂大夫於六遂各主一遂似鄉大夫各主一鄉但遂大夫已下其官皆卑於鄉官命數皆減一等是以遂大夫每遂中大夫一人不使卿爲之差次至鄰長五家則一人者是不命之士爲之其鄉内比長亦五家一人彼使下士爲之注釋曰以其鄰長已上至縣正皆屬於遂大夫故言遂之屬别與上文州黨族閭比鄉之屬别相似旅師中士四人下士八人府二人史四人胥八人徒八十人注主斂縣師所徵野之賦穀者也旅猶處也六遂之官里宰之師也正用里宰者亦斂民之税宜督其親民疏釋曰六鄉之内所有賦税閭師徵之閭師斂之此二百里以外至五百里其地廣故縣師徵之旅師斂之徵斂别官故官屬與胥徒多也注釋曰案其職云掌聚野之耡粟屋粟間粟言野故知主斂縣師所徵野之賦穀者也云旅猶處也六遂之官里宰之師也者里訓爲居旅者衆也衆之所處卽與里義同故鄭云里宰之師也遂官之内縣鄙已下正用里宰爲徵斂之官名者亦是斂民之税宜督其親民似若六鄉之中取閭名爲徵斂之官故鄭云亦謂亦閭師也稍人下士四人史二人徒十有二人注主爲縣師令都鄙丘甸之政也距王城三百里曰稍家邑小都大都自稍以出焉音義爲于僞反甸繩正反又如字疏釋曰其官在此者其職云掌令丘乘之政令言卽乘卽三等采地也故與旅師遂人等連類在此注釋曰云主爲縣師令都鄙丘甸之政也者案其職云若有會同師田行役之事則以縣師之法故云主爲縣師令都鄙丘甸之政也云距王城三百里曰稍者案載師家邑任稍地在三百里内故知三百里曰稍云家邑小都大都自稍以出焉者以其家邑在三百里小都在四百里大都在五百里從三百里向外故言自稍以出委人中士二人下士四人府二人史四人徒四十人注主斂甸稍芻薪之賦以共委積者也音義委烏僞反注同疏注釋曰案其職云掌斂野之賦斂薪芻凡疏材木材凡畜聚之物故鄭云主斂甸稍薪芻之賦共與遺人在道以供賓客故云以供委積者也亦與徵斂之官連類在此土均上士二人中士四人下士八人府二人史四人胥四人徒四十人注均猶平也主平土地之政令者也疏釋曰土均在此者案其職云掌平土地之政均地守均地事均地貢竝是徵斂土地之事故在此宜也注釋曰案其職云掌平土地以均地守故云均猶平也是主平土地之政令也草人下士四人史二人徒十有二人注草除草疏釋曰在此者案其職云掌土化之法以物地相其宜而爲之種又云凡糞種騂剛用牛之等皆是土地之事故在此宜也注釋曰案其職唯有糞種之文無殺草之事鄭云草除草者但糞種者殺草然後種之職雖不言殺草名爲草人明知除草故鄭云除草也稻人上士二人中士四人下士八人府二人史四人胥十人徒百人疏釋曰在此者案其職云掌稼下地又云澤草所生種之芒種是土地之事故在此胥徒多者以其并遣營種稻田土訓中士二人下士四人史二人徒八人注鄭司農云訓讀爲馴謂以遠方土地所生異物告道王也爾雅云訓道也𤣥謂能訓説土地善惡之勢音義訓如字司農音馴馴似遵反劉音訓徐餘倫反道音導疏釋曰在此者案其職云掌道地圖以詔地事亦是土地之事故在此注釋曰司農云訓讀爲馴又引爾雅訓道也𤣥謂能訓説土地善惡之勢不從先鄭者案其職云道地圖道地慝道自是道説不得更訓以爲道故後鄭以爲訓説土地善惡誦訓中士二人下士四人史二人徒八人注能訓説四方所誦習及人所作爲久時事疏釋曰在此者案其職云掌道方志以詔觀事以知地俗亦是土地之事故在此注釋曰知能訓説四方所誦習事者其職云掌道方志謂所識四方久遠之事是其能訓説四方所誦習者也云及人所作爲久時事者案其職云以知地俗鄭注云博事也謂博知古事是其人所作爲久時事者也山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人注虞度也度知山之大小及所生者音義度徒洛反下同疏釋曰山虞在此者案其職云掌山林之政令物爲之厲而爲之守禁山林亦是土地之事在此宜也注釋曰言度知山之大小者但山之大小里數雖曰無文據當時量度知其大小然後設官分職使掌之經文有中山鄭唯言大小者畧言之耳云及所生者山中所出金玉錫石禽獸草木或有或無是也林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞注衡平也平林麓之大小及所生者竹木生平地曰林山足曰麓音義麓本亦作㯟音鹿疏釋曰云大林麓下士十有二人者案上山虞中士四人下士八人相併亦十二人但山虞尊使中士爲官首下士爲之佐此林衡卑故下士自爲官首胥徒多於山虞者以其林麓在平地盜竊林木者多故須廵行者衆以是胥徒特多也中林麓如中山之虞小林麓如小山之虞胥徒不多者以其大林麓據特大者故胥徒特多中小已下自如尋常法故如山虞自此已下至澤虞皆是地事故在地官注釋曰云衡平也平林麓之大小者經有中林麓鄭不言者亦畧言也云竹木生平地曰林者對山中之林自是山虞掌此别言林衡故知竹木生平地者云山足曰麓者爾雅文山足亦有林木與山虞别官川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人注川流水也禹貢曰九川滌源音義滌徒歴反疏釋曰川衡者平知川之遠近寛狹及物之所出官及胥徒多者以其川路長遠廵行勞役故也中川小川之等自若常法故差少注釋曰言川流水也者對澤爲停水又引禹貢九川滌源者爲禹治洪水已訖九州之川已滌除泉源無壅塞矣引之者證川是流水澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡注澤水所鍾也水希曰藪禹貢曰九澤旣陂爾雅有八藪音義藪素口反陂彼宜反疏釋曰虞亦度也度知澤之大小及物之所出用中士尊於川衡者以其澤之所出物衆多胥徒少者以其廵行處近故也中澤小澤已下皆如川衡者自是常法注釋曰澤水所鍾者鍾聚也謂聚水於其中更無所注入案周語靈太子晉云山土之聚澤水之鍾纂要亦云水所鍾曰澤故知澤水所鍾也云水希曰藪者希乾也案鄭詩云叔在藪火列具舉舉藪中田獵明知無水又案爾雅藪在釋地之篇不入釋水故知水希曰藪以其藪與澤也有水無水爲異故於經别立官掌之案職方澤藪曰具區之類及毛傳云藪澤皆同爲一者以其有水則爲澤無水則爲藪元是一物故同解之引禹貢曰九澤旣陂者亦謂禹治洪水旣訖九州之澤旣已陂障無決溢矣引爾雅有八藪者禹貢九澤通畿内一州則有九爾雅云八藪除畿内一州而言引此二文者證藪澤有異案爾雅釋有十者以其周秦同在雍州秦有楊紆周有焦䕶一州有二故十又爾雅秦有楊陓職方冀州有楊紆蓋異所而同名也迹人中士四人下士八人史二人徒四十人注迹之言跡知禽獸處疏注釋曰案其職云掌邦田之政亦是地事故在此卝人中士二人下士四人府二人史二人胥四人徒四十人注卝之言礦也金玉未成器曰礦音義卝徐音礦虢猛反劉侯猛反礦虢猛反疏注釋曰經所云卝是總角之卝字此官取金玉於卝字無所用故轉從石邊廣以其金玉出於石左形右聲從礦字也云金玉未成器曰礦以其此官不造器物直取金錫玉石以供冬官百工故言金玉未成器曰礦金玉之等出於地故在此也角人下士二人府一人徒八人疏釋曰案其職云掌以時徵齒角凡骨物於山澤之農以其是徵斂之官故亦在此羽人下士二人府一人徒八人疏釋曰案其職云掌以時徵羽翮之政于山澤之農亦是徵斂之官故在此掌葛下士二人府一人史一人胥二人徒二十人疏釋曰案其職云掌以時徵絺綌之材于山農亦是徵斂之事故在此掌染草下士二人府一人史二人徒八人注染草藍蒨象斗之屬音義蒨千見反象本或作橡音同疏注釋曰案其職云掌以春秋斂染草之物亦徵斂之官故在此藍以染青蒨以染赤象斗染黑案其職注云染草茅蒐橐蘆豕首紫茢之屬二注不同者染草旣多言不可盡故互見畧言耳掌炭下士二人史二人徒二十人疏釋曰案其職掌灰物炭物之徵令以時入之以其徵斂之官故亦在此掌荼下士二人府一人史一人徒二十人注荼茅莠音義荼音徒徐音餘莠劉音酉毛詩注作秀疏注釋曰案其職云掌以時聚荼以共喪事徵野疏材以其徵斂之官故亦在此掌蜃下士二人府一人史一人徒八人注蜃大蛤月令孟冬雉入大水爲蜃音義蜃上忍反蛤古答反疏注釋曰案其職云掌斂互物蜃物以共闉壙之蜃亦徵斂之官故在此言蜃大蛤者對雀入大水化爲蛤者爲小蛤引月令雉入大水爲蜃者案國語大水淮也囿人中士四人下士八人府二人胥八人徒八十人注囿今之苑音義囿音又疏釋曰案其職云掌囿斿之獸禁囿是地之用故在此注釋曰此據漢法以況古古謂之囿漢家謂之苑場人每場下士二人府一人史一人徒二十人注場築地爲墠季秋除圃中爲之詩云九月築場圃十月納禾稼音義墠音善圃音補又音布疏釋曰言每場者以其九穀别場故言每以殊之場亦地之用故在此注釋曰除地曰墠築堅始得爲場故云場築地爲墠也云季秋除圃中爲之者以其春夏爲圃以種菜蔬至季秋始爲場引詩曰九月築場圃十月納禾稼者此七月詩引之證圃中爲場之意廩人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人注盛米曰廩廩人舍人倉人司祿官之長音義廩力甚反倉也盛音成疏釋曰此官使下大夫爲官首徒三百人又多者以其米廩事重出納又多故也故其職云掌九穀之數以其米穀地之所長成故在此注釋曰藏米曰廩者對下倉人藏穀曰倉云廩人舍人倉人司祿官之長者以其舍人已下同掌米穀之事皆以士爲之故廩人下大夫與之爲長舍人上士二人中士四人府二人史四人胥四人徒四十人注舍猶宫也主平宫中用穀者也疏釋曰在此者案其職云掌平宫中之政分其財守以法掌其出入謂平宫中米穀多少故與廩人倉人連類在此注釋曰鄭訓舍爲宫者案其職云掌平宫中之政故就職内主平宫中用穀解之倉人中士四人下士八人府二人史四人胥四人徒四十人疏釋曰倉人在此者案其職云掌粟之藏如廩人米粟地之所成故也司祿中士四人下士八人府二人史四人徒四十人注主班祿疏注釋曰在此者其職旣闕未知所掌云何但班祿者用粟與之司祿職次倉人明是班多少之官故鄭云主班祿故與倉人連類在此司稼下士八人史四人徒四十人注種穀曰稼如嫁女以有所生疏注釋曰云種穀曰稼者對收斂曰穡也在此者其職云廵野觀稼出斂法亦是徵斂地事故連類在此舂人奄二人女舂抭二人奚五人注女舂抭女奴能舂與抭者抭抒臼也詩云或舂或抭音義奄於檢反劉於驗反抭音由又音揄或羊笑反抒時女反疏釋曰有奄者以其與女奴同處故也在此者與倉人廩人饎人連事故亦連類在此其職云掌祭祀賓客牢禮之米所共多矣而舂人少者蓋舉其能者亦應兼有别奚於其中矣注釋曰引詩或舂或抭者彼生民詩引之者證舂抭之事也饎人奄二人女饎八人奚四十人注鄭司農云饎人主炊官也特牲饋食禮曰主婦視饎爨故書饎作􅐪音義饎尺志反注􅐪同爨七亂反疏釋曰在此者其職云凡祭祀共盛共王及后之六食凡賓客共其簠簋不在天官而在此者以其因舂人又因地道之成故在此稾人奄八人女稾每奄二人奚五人注鄭司農云稾讀爲犒師之犒主冗食者故謂之犒音義稾注音犒同苦報反冗如勇反疏釋曰案其職云掌共外内朝冗食者之食所共處多故有奄八人又女稾每奄二人奚五人也注釋曰案左傳春秋僖三十三年秦人將襲鄭鄭商人弦高將市於周遇之以乘韋先牛十二頭犒秦師遂詐之云鄭使我犒勞軍師引之者以在朝之人不得歸家亦枯稿以須犒勞之故名其官爲犒人亦同廩人連類在此周禮注疏卷九周禮注疏卷九考證乃立地官司徒疏其實五中雖不含十二十二亦含有五監本脱十二兩字詳繹文義則虞有五敎周司徒職有十二當疊用之乃明鄉老注司勲職曰掌六鄉之賞地掌監本訛作賞今据原文改正牛人注九十其􅧄釋文淳作􅧄亦可爲司裘注中􅙯字之證載師注冀州旣載臣照按此康成讀禹貢異於孔傳之解者閭師疏恐不能細悉其民悉一本作委媒氏疏媒氏在此者集名云集名未詳何書疑釋字之訛遂大夫里宰每里下士一人一人石經作二人訛林衡胥十有二人二字監本訛一今据石經及各本改正澤虞疏案周語靈太子晉云周語靈太子監本訛作周語虞太子今据下文是周靈王太子晉之言改正倉人疏倉人在此者監本脱在此者三字周禮注疏卷九考證
