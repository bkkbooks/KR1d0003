body:
  text: 周禮注疏卷一漢鄭氏注唐陸德明音義賈公彥疏天官冢宰第一音義本或作冢宰上非餘卷放此惟王建國注建立也周公居攝而作六典之職謂之周禮營邑於土中七年致政成王以此禮授之使居雒邑治天下司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉音義王如字干寳云王天子之號三代所稱雒音洛水名也本作洛後漢都洛陽改為雒景京領反下皆同疏釋曰自此以下至以為民極五句六官之首同此序者以其建國設官為民不異故也王者臨統無邊故首稱惟王眀事皆統之於王王既位矣當擇吉土以建國為先故次言建國於中辯四方正宫廟之位復體國經野自近及逺也於是設官分職助理天工衆人取中以為治體列文先後次第應然其實建國之初豈未設官分職也直以作序之意主在設官分職為民極耳故終言之惟王建國者言惟謂若尚書云惟三月之類皆辭不為義建立也惟受命之王乃可立國城於地之中必居地中者案尚書康誥云惟三月哉生魄周公初基作新大邑于東國洛鄭注云岐鎬之域處五岳之外周公以政教不均故東行於洛邑令諸侯謀作天子之居據鄭此言則文武所居為非地中政教不均故居地中也案桓二年左氏傳云昔武王克商遷九鼎於洛邑則居洛本是武王之意至成王周公時恐天下為疑更與諸侯謀定之也若然五帝以降堯治平陽舜治安邑唯湯居亳得地中以外皆不得地中而政令均天下治者其時雖不得地中竝在五岳之内又以民淳易治故不要在地中以周則不在五岳之内故鄭云岐鎬處五岳之外也注釋曰云周公居攝而作六典之職謂之周禮者案禮記明堂位云周公攝政六年制禮作樂頒度量於天下又案書傳亦云六年制禮作樂所制之禮則此周禮也又云而作六典者下文大宰之職掌建邦之六典天官治典地官教典春官禮典夏官政典秋官刑典冬官事典是六典之職也又云營邑於土中者即召誥云王來紹上帝自服于土中是也又云七年致政成王者明堂位文必七年者洛誥云誕保文武受命惟七年鄭注以文武受命七年而崩周公不敢過其數也又云以此禮授之使居洛邑治天下者此鄭解周公制禮必兼言建國於洛邑之意案尚書洛誥云周公曰孺子來相宅亂為四方新辟是使居洛邑也下云恵篤敘無有遘自疾是授以此禮使行之也又案書傳云一年救亂二年伐殷三年踐奄四年建侯衛五年營成周六年制禮作樂七年致政成王鄭用此文則四年封康叔於衛為建侯衛案康誥云周公初基作新大邑洛謂初為基阯之處至五年内營之是以書傳云五年營成周成周與王城同時營則五年營洛邑與孔安國為營洛邑封康叔制禮作樂同是攝政七年異又引司徒職曰日至之景尺有五寸謂之地中彼先鄭注云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然天地之所合者則禮記郊特牲云天地合萬物生謂天地配合萬物以生是也四時交者則尚書云宅南交孔云夏與春交舉一隅若然則秋與夏交冬與春交可知也又云風雨之所㑹者謂若禮記禮器云風雨時即謂風雨㑹時也隂陽之所和者謂若昭四年申豐云冬無愆陽夏無伏隂二氣和順也然則百物阜安者阜盛也然猶如是如是於地中得所故百物盛安也乃建王國者於百物盛安之處乃立王國王國則洛邑王城是也鄭引此者破賈馬之徒建國為諸侯國此六官同序皆云建國豈王國未立先建諸侯國乎眀不可也辨方正位注辨别也鄭司農云别四方正君臣之位君南面臣北面之屬𤣥謂考工匠人建國水地以縣置􅈏以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕是别四方召誥曰越三日戊申太保朝至于雒卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位於雒汭越五日甲寅位成正位謂此定宫廟音義辨本亦作辯徐邈劉昌宗皆方免反別也一音平勉反別彼列反下同縣音𤣥下同􅈏魚列反下同召上詔反誥古報反大音泰汭人鋭反疏釋曰謂建國之時辨别也先須視日景以別東西南北四方使有分別也正位者謂四方既有分別又於中正宫室朝廷之位使得正也注釋曰辨别也此直訓不釋者司農云别四方義當矣故康成訓之也鄭司農者鄭衆字仲師但周禮之内鄭康成所存注者有三家司農之外又有杜子春鄭大夫鄭大夫者鄭少贑二鄭皆康成之先故言官不言名字杜子春非已宗故指其名也司農云正君臣之位君南面臣北面之屬者案易緯乾鑿度云不易者天在上地在下君南面臣北面父坐子伏司農據而言焉𤣥謂者大略一部之内鄭𤣥若在司農諸家上注者是𤣥注可知悉不言𤣥謂在諸家下注者即稱𤣥謂以別諸家又在諸家前注者是諸家不釋者也又在諸家下注者或增成諸家義則此司農云別四方於文不足引考工記以證之是也或有破諸家者則此司農正位謂正君臣面位引召誥為宫室朝廷之位破之是也考工匠人建國水地以縣者謂水平之法在地置􅈏以繩縣於􅈏上然後從旁以水望縣即知地之髙下而平之也又云置􅈏以縣者既平得地欲正其東西南北之時先於中置一􅈏恐􅈏下不正先以縣正之􅈏正乃視以景景謂於􅈏端自日出晝之以至日入既得景為規識之故云為規識日出之景與日入之景規之交處即東西正也又於兩交之間中屈之指􅈏又知南北正也仍恐不審晝參諸日中之景夜考諸北極之星以正朝夕乃審矣引召誥以下者案召誥惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛汭卜宅此言越三日戊申者從三月丙午朏朏明生之名月三日也則越三日戊申月五日召公至洛汭也又云越三日庚戌太保乃以庶殷攻位于洛汭月七日也越五日甲寅位成月十一日也皆通本數之也位成宫室朝廷之位皆成也引之者證正位謂此宫室位破司農為君臣父子之位以其國家草創下論體國經野理應先定宫廟等位豈有宫廟等位未成先正君臣面位乎又與匠人建國次第不合故鄭依匠人之次及召誥之文為定宫室之位案左氏莊公傳云水昏正而栽知是十月始興土功今於三月為洛邑者左傳用十月是尋常法今建王城逺述先君之志是興作大事不可以常法難之也體國經野注體猶分也經謂為之里數鄭司農云營國方九里國中九經九緯左祖右社面朝後市野則九夫為井四井為邑之屬是也音義體鄭云體猶分也干寳云體形體朝直遥反疏釋曰體猶分也國謂城中也分國城之中為九經九緯左祖右社之屬經謂為之里數此野謂二百里以外三等采地之中有井田之法九夫為井井方一里之等是也注釋曰言體猶分者謂若人之手足分為四體得為分也經謂為之里數者此據野中而有井方一里之等故經為里數解之司農云營國方九里已下竝冬官考工記匠人文彼云營國方九里旁三門旁謂四方方三門則王城十二門門有三道三三而九則九道南北之道謂之經東西之道謂之緯經緯之道皆九軌又云左祖右社者此據中門外之左右宗廟是陽故在左社稷是隂故在右面朝後市者三朝皆是君臣治政之處陽故在前三市皆是貪利行刑之處隂故在後也又言野則九夫為井此是地官小司徒職文彼云乃井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都也井方一里邑方二里丘方四里甸方八里縣方十六里都方三十二里引彼文略故云之屬兼之也案載師職云家邑任稍地小都任縣地大都任畺地若畿内鄉遂及四等公邑皆為溝洫法無此方里為井之事家邑小都大都三等采地乃有方里為井之屬但郊外曰野大總言耳散文國外則曰野故鄉大夫職云國中七尺野自六尺是城外則經中野對國言之謂國外則曰野鄭但據小司徒成文而言設官分職注鄭司農云置冢宰司徒宗伯司馬司寇司空各有所職而百事舉疏釋曰既體國經野此須立官以治民故云設官分職也注釋曰此謂設天地四時之官即六卿也既有其官須有司職故云各有所職職謂主也天官主治地官主教春官主禮夏官主政秋官主刑冬官主事六官官各六十則合有三百六十官官各有主故云百事舉以為民極注極中也令天下之人各得其中不失其所音義令力呈反疏釋曰人一日無主不散則亂是以立君治之君不獨治也又當立臣為輔極中也言設官分職者以治民令民得其中正使不失其所故也注釋曰極中也爾雅文案尚書洪範云皇建其有極惟時厥庶民于汝極謂皇建其有中之道庶民於之取中故云令天下之人各得其中不失所也乃立天官冢宰使帥其屬而掌邦治以佐王均邦國注宰主也邦治王所以治邦國也佐猶助也鄭司農云邦治謂總六官之職也故大宰職曰掌建邦之六典以佐王治邦國六官皆總屬於冢宰故論語曰君薨百官總已以聽於冢宰言冡宰於百官無所不主爾雅曰冢大也冢宰大宰也音義宰鄭云宰主也干云濟其清濁和其剛柔而納之中和曰宰治直吏反注邦治下治官皆同大音泰注及後放此疏釋曰六官皆云乃立者以作序之由本序設官之意故先云以為民極次云新設之官故皆云乃立騰上起下之辭也天官冢宰者據下注而言則此言冢宰者據總攝六職若據當職則稱大宰也使帥其屬案小宰六屬而言則此屬唯指六十官之屬也掌邦治者掌主也言主治則兼六官以其五官雖有教禮政刑事不同皆是治法也云佐王均邦國者以大宰掌均節財用故也周禮以邦國連言者據諸侯也單言邦單言國者多據王國也然不先均王國而言均邦國者王之冢宰若言王國恐不兼諸侯今言邦國則舉外可以包内也注釋曰𤣥云邦治王所以治邦國也者此即司農所引大宰職佐王治邦國一也但司農雖引之不指釋此經邦治故𤣥就足之司農引論語者欲見天子冢宰兼百官之義言百則三百六十亦一也且論語言君薨據諸侯言冢宰百官據天子互言之者欲見天子諸侯君死世子居䘮使大臣聴政同也冢宰大宰者言不異人也治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人注變冢言大進退異名也百官總焉則謂之冢列職於王則稱大冢大之上也山頂曰冢旅衆也下士治衆事者自大宰至旅下士轉相副貳皆王臣也王之卿六命其大夫四命士以三命而下為差音義貳徐音二疏釋曰上經所陳立官所掌有異此經陳官有尊卑多少轉相副貳之事也言治官之屬者此為六十官之首別言治官之屬一句與下六十官為目以總是治官不得唯指此一經至旅下士三十有二人而已凡官尊者少卑者多以其卑者宜勞尊者宜逸是以下士稱旅以其理衆事故特言旅也小宰與大宰同名大小為異故鄭注禮記王制引此六卿下中大夫十二人為十二小卿以其宰夫是大宰之考謂若地官之考為鄉師春官之考為肆師夏官之考為軍司馬秋官之考為士師冬官之考為匠師以其掌事不與大官同故異大官也宰者調和之名夫者治也以其治此一官所主事也注釋曰變冢言大者上唯云冢宰此唯云大宰是變冢言大也云進退異名者即百官總焉謂貳王治事總攝三百六十官則謂之冢是進異名也列職于王則謂之大者不總百官與五卿竝列各自治六十官則退異名也若然總百官則稱冢以其天官象天覆萬物案經大宰職曰凡邦之小治冢宰聽之是專國小治而稱冢也司書職曰掌六典八法八則之貳以詔王及冢宰是貳王事總衆職而稱冢也又宰夫職曰乗其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之是總衆官誅賞而稱冢也又司㑹職曰以周知四國之治以詔王及冢宰廢置是總四國之治而稱冢也若主當官不兼他職則言大者謂若下文大䘮贊贈玉含玉賔客贊玉几玉爵祀五帝則涖卜如此之類與諸官竝有事則稱大也云冢大之上也者以其大宰與五官同名大今又別稱冢是冢在大之上也又引爾雅山頂曰冢者欲見山則大矣冢又在頂證冢在大上之意也又云旅衆也下士治衆事者欲見尊官逸卑官勞之意也又云自大宰至旅下士轉相副貳皆王臣也者大卿一人小卿則二人已下皆去上一倍者是轉相副貳也言王臣者自士以上得王簡䇿命之則為王臣也對下經府史胥徒不得王命官長自辟除者非王臣也又云王之卿六命其大夫四命者典命文大夫無中下之別案序官則有中下大夫則四命大夫自分為中下似若侯伯同七命子男同五命爵則有髙下不同也士以三命為差但典命直見公卿大夫命者欲見有出封之事故彼云其出封皆加一等士爵卑無出封之理故不言也彼士之命數既不言知三命以下者正見序官有上士中士下士三等典命除六命四命無三命二命一命鄭則約之上士為三命中士為再命下士為一命若然王朝三公八命卿六命大夫四命皆為隂爵以待出封為諸侯乃為陽爵九命七命五命士既不得出封故在王朝有三命一命亦為陽爵無嫌也府六人史十有二人注府治蔵史掌書者凡府史皆其官長所自辟除音義蔵才浪反下同長丁丈反下皆同辟必亦反徐方狄反疏釋曰府治府蔵史主造文書也注釋曰案下宰夫八職云五曰府掌官契以治蔵六曰史掌官書以贊治故鄭云府治蔵史掌書又云官長所自辟除者官長謂一官之長若治官六十其下府史皆大宰辟召除其課役而使之非王臣也周禮之内府史大例皆府少而史多而府又在史上唯有御史百有二十人特多而在府上鄭云以其掌贊書數多也又有府兼有史以其當職事繁故也或空有史而無府者以其當職事少得史即足故也至於角人羽人等直有府無史以其當職文書少而有税物須蔵之故直有府也腊人食醫之等府史俱無者以其専官行事更無所須故也周禮之内唯有天府一官府特多於史以其所蔵物重故也胥十有二人徒百有二十人注此民給徭役者若今衛士矣胥讀如諝謂其有才知為什長音義胥鄭徐劉思敘反戚思餘反下皆同徭音遥諝劉思敘反疏釋曰胥有才智為什長徒給使役故一胥十徒也注釋曰案下宰夫八職云七曰胥掌官敘以治敘八曰徒掌官令以徴令鄭云治敘次序官中如今侍曹伍伯傳吏朝也徵令趨走給召呼案禮記王制云下士視上農夫食九人禄足以代耕則府食八人史食七人胥食六人徒食五人禄其官竝亞士故號庶人在官者也鄭云若今衛士者衛士亦給徭役故舉漢法況之又云胥讀如諝謂其有才智為什長者案周禮之内稱胥者多謂若大胥小胥胥師之類雖不為什長皆是有才智之稱彼不讀從諝從此讀可知唯有追胥胥是伺搏盜賊非有才智也易歸妹六二以須注云須才智之稱天文有須女屈原之姊名女須彼須字與此異者蓋古有此二字通用俱得為有才智也周禮上下文有胥必有徒胥為什長故也腊人之類空有徒無胥者得徒則足不假長帥故也食醫之類胥徒竝無者以其專官行事不假胥徒也宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人注正長也宫正主宫中官之長音義此以下鄭總列六十職序干注則各於其職前列之疏釋曰上大宰至旅下士總馭羣職故為上首自此宫正已下至夏采六十官隨事緩急為先後故自宫正至宫伯二官主宫室之事安身先須宫室故為先也自膳夫至腊人皆供王膳羞飲食饌具之事人之處世在安與飽故食次宫室也自醫師已下至獸醫主療疾之事有生則有疾故醫次食饌也自酒正至宫人陳酒飲肴羞之事醫治既畢須酒食養身故次酒肴也自掌舎至掌次安不忘危出行之事故又次之自大府至掌皮竝是府蔵計㑹之事既有其餘理須貯積或出或内宜計㑹之故相次也自内宰至屨人陳后夫人已下内教婦功婦人衣服之事君子眀以訪政夜以安息故言婦人於後也夏采一職記招魂以其死事故於末言之也此宫正并下宫伯雖俱訓為長其義則異若宫正則主任三宫卿大夫士之身故為宫中官之長故其職云以時比宫中之官府故宫伯所長者亦掌之故言正長也宫伯云長者直主宫中卿大夫士之適子庶子行其秩敘授其舎次之事亦得為長故云伯長也宫正上士二人為官首中士四人為之佐下士八人理衆事府二人主蔵文書也史四人主作文書胥四人為什長徒四十人給徭役諸官體例言府史胥徒之義皆然不可文文重釋他皆放此周禮之内宗伯之類諸言伯者伯長也以尊長為名縣師之類言師者皆取可師法也諸稱人者若輪人車人腊人鼈人之類即冬官鄭云其曰某人者以其事名官言氏者有二種謂若桃氏為劍築氏為削之類鄭注冬官族有世業以氏名官若馮相氏保章氏師氏保氏之類鄭注引春秋官有世功則有官族是也諸稱司若司裘司市之類言司者皆是專任其事事由於己故以司言之也諸典婦功典絲典枲之類言典者出入由己課彼作人故謂之為典也諸稱職者謂若職幣職内職歳財不乆停職之而已凡云掌者有三義一者他官供物已則蹔掌之而已若幕人供帷幕幄帟掌次張之也二則掌徴斂之官若掌皮掌染草之類是也三者掌非已所為則掌節掌固掌疆本非已造廢壊修之而已也自外不稱典司職掌者皆是逐事立名以義銓之可曉也凡六官序官之法其義有二一則以義類相從謂若宫正宫伯同主宫中事膳夫庖人外内饔同主造食如此之類皆是類聚羣分故連類序之二則凡次序六十官不以官之尊卑為先後皆以緩急為次第故此宫正之第士官為前内宰等大夫官為後也宫伯中士二人下士四人府一人史二人胥二人徒二十人注伯長也膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人注膳之言善也今時美物曰珍膳膳夫食官之長也鄭司農以詩説之曰仲允膳夫音義膳上戰反疏注釋曰言膳夫食官之長者謂與下庖人内外饔亨人等為長也司農引詩云者是小雅刺幽王詩膳夫仲允為之引證與此膳夫為一事也庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人注庖之言苞也裹肉曰苞苴賈主市買知物賈音義庖徐扶交反賈鄭徐音古劉音嫁下放此裹音果苴子餘反物賈音嫁疏注釋曰言庖者今之厨轉作苞者欲取庖人主六獸六禽以供庖厨有裹肉之意也又云裹肉曰苞苴者詩云野有死麕白茅包之禮記内則云炮取豚若將編萑以苴之皆是裹肉之物故云裹肉曰苞苴也又云賈主市買知物賈者下文九職鄭注行曰商處曰賈賈乃在市而處者故知物賈此特有賈人者庖人牲當市之故也内饔中士四人下士八人府二人史四人胥十人徒百人注饔割亨煎和之稱内饔所主在内音義饔鄭於容反亨戚普庚反劉普孟反稱尺證反疏釋曰饔和也熟食曰饔熟食須調和故號曰饔注釋曰其職云掌王及后世子之割亨割亨則須煎和故云割亨煎和之稱又云所主在内者以其掌王及后世子及宗廟皆是在内之事外饔中士四人下士八人府二人史四人胥十人徒百人注外饔所主在外疏注釋曰案其職云掌外祭祀及邦饗孤子耆老割亨皆是在外之事故云所掌在外也此饔有内外可對故云内外饔至於内宰内豎内司服自掌婦人之事而稱内不對外為名也亨人下士四人府一人史二人胥五人徒五十人注主為外内饔煮肉者音義亨劉普庚反為于偽反下為主同疏注釋曰其職云給外内饔亨事故云為外内饔煮肉也甸師下士二人府一人史二人胥三十人徒三百人注郊外曰甸師猶長也甸師主共野物官之長音義甸田遍反共音恭下皆同疏釋曰案載師云任近郊逺郊之地次即云公邑之田任甸地甸地即在百里逺郊外天子藉田又在南方甸地故稱此官為甸師也然此官主地事不在地官者以其共野之薦又給薪蒸以供亨餁故在此次亨人也注釋曰主共野物官之長或云與地官掌葛掌炭掌蜃委人等同掌共野物故與彼官為長若然彼屬地官此屬天官越分相領恐理不愜此甸師當與下獸人已下亦共野物為長也故下數職注不言長眀甸師與之為長但獸人等中士此為下士下士得與中士為長者如太史下大夫内史中大夫鄭云太史史官之長彼下大夫與中大夫為長此下士亦與中士為長有何嫌也徒三百人特多者天子藉田千畝藉借此三百人耕耨故多也獸人中士四人下士八人府二人史四人胥四人徒四十人疏釋曰案其職云掌罟田獸冬獻狼夏獻麋供膳羞故在此也􅈄人中士二人下士四人府二人史四人胥三十人徒三百人音義􅈄音魚本又作魚亦作䰻同又音御疏釋曰案其職云掌以時􅈄為梁春獻王鮪亦供魚物故在此也徒亦三百人者馬融云池塞苑囿取魚處多故也鼈人下士四人府二人史二人徒十有六人音義鼈必列反疏釋曰案其職云祭祀供蠯蠃蚔亦是供食物故在此也腊人下士四人府二人史二人徒二十人注腊之言夕也音義腊音昔疏釋曰注腊之言夕也乾曰腊朝曝於夕乃乾故云腊之言夕或作久字久乃乾成義亦通也以其供脯腊膴胖食物故亦在此也醫師上士二人下士四人府二人史二人徒二十人注醫師衆醫之長音義醫意其反疏釋曰案其職云掌醫之政令聚毒藥以供醫事諸醫皆在此者醫亦有齊和飲食之類故設在飲食之間也食醫中士二人注食有和齊藥之類音義和胡卧反又音禾齊才計反疏釋曰案其職云春多酸夏多苦之等皆須齊和與藥同故鄭云食有和齊藥之類故在醫官之内也疾醫中士八人疏釋曰案其職云掌養萬民之疾病故連類在此瘍醫下士八人注瘍創癕也音義􅅑音羊創初良反疏釋曰案其職云掌腫􅅑潰􅅑之等故亦連類在此注釋曰案禮記上曲禮云頭有創則沐身有􅅑則浴案其職有腫􅅑等四種之􅅑注潰則未必有膿也故亦連類在此也獸醫下士四人注獸牛馬之類疏注釋曰案爾雅在野曰獸在家曰畜畜獸異矣而言獸牛馬者但此職云主治牛馬未必治其野獸而以牛馬為獸者對文則畜獸異散文通故爾雅又云兩足而羽謂之禽四足而毛謂之獸既不別釋畜則獸中可以兼牛馬是其牛馬亦有畜稱故云獸牛馬也酒正中士四人下士八人府二人史八人胥八人徒八十人注酒正酒官之長疏釋曰案其職云掌酒之政令以式法授酒材與膳食相將故在此注釋曰此酒正與下酒人漿人為長注雖不言漿文略也酒人奄十人女酒三十人奚三百人注奄精氣閉蔵者今謂之宦人月令仲冬其器閎以奄女酒女奴曉酒者古者從坐男女沒入縣官為奴其少才知以為奚今之侍史官婢或曰奚宦女音義奄於檢反劉於驗反徐於劍反奚如字又胡禮反坐才卧反疏釋曰奄十人以其與女酒及奚同職故用奄人奄不稱士則此奄亦府史之類以奄為異也言女酒三十人則女酒與奚為什長若胥徒也奚三百人以其造酒故須人多也注釋曰案月令冬三月皆云其氣閎以奄獨引仲冬者以其十一月一陽初生以其奄人雖精氣閉蔵猶少有精氣故也又云女酒女奴曉酒者云云鄭依秋官司厲從坐男女沒入縣官為奴則奴者男女同名以其曉解作酒有才智則曰女酒其少有才智給使者則曰奚已下云曉者謂曉解當職之物不復重釋之也侍史官婢舉漢法言之又云或曰宦女者漢時有此別號按左氏晉恵公之女名妾稱為宦女謂宦事秦公子亦云宦女也漿人奄五人女漿十有五人奚百有五十人注女漿女奴曉漿者音義漿子良反疏釋曰在此者案其職云掌供王之六飲入于酒府飲是酒類故在此也凌人下士二人府二人史二人胥八人徒八十人注凌氷室也詩云二之日鑿氷冲冲三之日納于凌隂音義凌力證反字從氷或力升反疏釋曰凌人在此者案其職云掌冰凡外内饔之膳羞鑑焉以供為膳羞故連類在此也注釋曰引詩曰二之日者案詩之所釋謂周之二月夏之十二月之日鑿冰者謂於深山窮谷固隂沍寒之處於是乎取之冲冲鑿冰之意三之日謂周之三月夏之建寅之正月納氷於凌隂室中案彼又云四之日其蚤獻羔祭韭唘冰之時也鄭答志以夏十二月取冰二月開冰四月班冰是其常也蔵之既晚出之又早晚者建寅乃蔵與此周禮十二月蔵冰校遲一月故出之早者四月夏之二月出冰與周禮同今豳土寒故納冰可用夏正月也引之者證凌隂即此冰室為一物也籩人奄一人女籩十人奚二十人注竹曰籩女籩女奴之曉籩者疏釋曰在此者案其職云掌四籩之實亦是薦羞之事故在此也注釋曰知竹曰籩者更無異文見竹下為字即知以竹為之故云竹曰籩也醢人奄一人女醢二十人奚四十人注醢豆實也不謂之豆此主醢豆不盡于醢也女醢女奴曉醢者音義醢呼在反盡津忍反疏釋曰案其職云掌四豆之實亦是薦羞故在此也注釋曰云不謂之豆者決上籩人不以籩中之實為名而以籩為官號此即以豆中之實為官號不謂之豆人此是問辭鄭還自答豆不盡於醢者其豆之所盛非止此職中四豆之實而已天子豆百二十上公豆四十侯伯豆三十二子男豆二十四上大夫二十下大夫十六彼有膷臐膮胾炙膾之屬其數甚多是豆不盡盛醢而已若言豆人恐彼竝掌之此醢人惟掌此四豆之實而已故不得言豆人而言醢人也醯人奄二人女醯二十人奚四十人注女醯女奴曉醯者音義醯本又作䤈呼西反疏釋曰醯人在此者案其職云掌共五齊七菹以供醯物則與醢人職通醯人惟主作醯但成齊菹必須醯物乃成故醯人兼言齊菹而連類在此也鹽人奄二人女鹽二十人奚四十人注女鹽女奴曉鹽者疏釋曰在此者案其職云掌鹽之政令以供百事之鹽鹽所以調和上食之物故亦連類在此也幂人奄一人女幂十人奚二十人注以巾覆物曰幂女幂女奴曉幂者音義幂莫歴反疏釋曰幂人在此者案其職云掌供巾幂所以覆飲食之物故次飲食後宫人中士四人下士八人府二人史四人胥八人徒八十人疏釋曰宫人在此者案其職云掌王之六寢之脩又供王沐浴掃除之事是安息王身故在此也掌舎下士四人府二人史四人徒四十人注舎行所解止之處音義解佳賣反疏釋曰在此者案其職云掌王之㑹同之舎設梐枑再重亦是安王身之事故亦在此注釋曰案其職云設車宫壇壝宫帷宫之等竝是解脱止息之處故云解止之處也幕人下士一人府二人史二人徒四十人注幕帷覆上者音義幕武博反疏釋曰在此者案其職云掌帷幕幄帟綬之事亦是安王身之事故在此也注釋曰案下職中鄭注云在旁曰帷在上曰幕是其幕乃帷之覆上者也掌次下士四人府四人史二人徒八十人注次自脩正之處疏釋曰在此者案其職云掌王次之法以待張事幕人供之掌次張之故連類在此也注釋曰案其職云張大次設重帟重案皆是自脩正故云自脩正之處也大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人注大府為王治蔵之長若今司農矣疏釋曰在此者案其職云掌九貢九賦受其貨賄之入頒其貨賄于諸府之事案尚書洪範云一曰食二曰貨已上皆言飲食此次言貨賄故大府在此也有賈者府官須有市買幷須知物貨善惡故也注釋曰大府與下諸府官為長故以大夫為之云若今司農矣者漢時司農主治蔵故史游章云司農少府國之淵玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人注工能攻玉者疏釋曰玉府在此者案其職云掌王之金玉玩好兵器凡良貨賄之蔵以玉為主故與大府同在此有工八人者以其使攻玉故也有賈者使辨玉之善惡貴賤故也注釋曰工謂作工案詩云他山之石可以攻玉故須工内府中士二人府一人史二人徒十人注内府主良貨賄蔵在内者音義賄呼罪反疏釋曰内府在此者案其職云掌九貢九賦九功之貨賄良兵良器故在此也外府中士二人府一人史二人徒十人注外府主泉蔵在外者疏釋曰外府在此者案其職云掌邦布之出入以共百事故在此也注釋曰泉布本是外物無在内府故對内府為外也司會中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人注會大計也司會主天下之大計計官之長若今尚書音義會古外反注同尚音常疏釋曰在此者案其職云掌邦之六典八法八則之貳以逆邦國都鄙官府之治主天下大計貨賄亦須計㑹故與大府連類在此也注釋曰言㑹大計者案宰夫職日計曰成月計曰要歳計曰會故知會大計也云主天下之大計者其職云逆邦國都鄙官府是勾考徧天下云若今尚書者漢之尚書亦主大計故舉以況之也司書上士二人中士四人府二人史四人徒八人注司書主計㑹之簿書音義簿步古反後簿書皆同疏注釋曰司書在此者㑹計之事司書主之故其職云凡上之用財用必攷于司㑹故連類在此也注言簿書者古有簡䇿以記事若在君前以笏記事後代用簿簿今手版故云吏當持簿簿則簿書也職内上士二人中士四人府四人史四人徒二十人注職内主入也若今之泉所入謂之少内音義少詩詔反疏釋曰在此者案其職云掌邦之賦入辨其財用之物而執其總入大府者皆由職内亦有府義故鄭云受蔵之府若職内故其職在此也注釋曰漢之少内亦主泉所入案王氏漢官解云小官嗇夫各擅其職謂倉庫少内嗇夫之屬各自擅其條理所職主由此言之少内蔵聚似今之少府但官卑職碎以少為名職歳上士四人中士八人府四人史八人徒二十人注主歲計以歲斷音義斷丁亂反疏釋曰在此者案其職云掌邦之賦出以貳官府都鄙之財出賜之數以待會計而考之總斷一歳之大計故與司會同在此也職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人疏釋曰在此者案其職云掌式法以斂官府都鄙與凡用邦財者之幣以待上之賜予與職歳通職故連類在此也若然此三職皆有府義不得名府者以財不久停故也司裘中士二人下士四人府二人史四人徒四十人疏釋曰在此者案其職云掌為大裘并掌皮亦有府義故在此掌皮下士四人府二人史四人徒四十人疏釋曰在此者案其職云掌秋斂皮冬斂革春獻之亦有府義故連類在此也内宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人注内宰宫中官之長疏釋曰名内宰者對太宰治百官内宰治婦人之事故名内宰然則大宰不稱外者為兼統内也案其職云掌治王内之政令又教后已下婦徳之事以王事少暇故次在此也注釋曰内宰與下女史已下為長故鄭云宫中官之長内小臣奄上士四人史二人徒八人注奄稱士者異其賢疏釋曰在此者案其職云掌王后之命正其服位案夏官大僕職云出入王之大命正其服位則此小臣侍后職與大僕侍王同亦是佐后之事故在此用奄者以其所掌在内故注釋曰案上酒人漿人等奄並不稱士則非士也獨此云以其有賢行命為士故稱士也案詩巷伯奄官也注云巷伯内小臣小臣於宫中為近故謂之巷伯必知巷伯與小臣為一人者以其俱名奄又言巷亦宫中為近又稱伯長也内小臣又稱士亦是長義故知一人也閽人王宫每門四人囿斿亦如之注閽人司昏晨以唘閉者刑人墨者使守門囿御苑也斿離宫也音義閽音昏囿音又斿本亦作㳺音由疏釋曰在此者以其掌守中門之禁王宫在此故亦在此周禮之内有同官別職則此閽人每門及囿斿同名閽人而職別山虞澤虞云每大澤大山及川衡林衡亦是別職同官也別官同職者唯有官聨耳注釋曰云閽人司昏晨以唘閉者此釋名閽人之意昏時閉門則此名閽人也晨時唘門則論語謂之晨人也皆以時事為名耳又云刑人墨者使守門此秋官掌戮職文鄭彼注云黥者無妨於禁禦欲使守門案其職云掌守中門之禁言中門則惟雉門耳而言每門者彼言中門據有禁守者言之其實王之五門皆使墨者守之或解以為王有五門四面皆有中門故言每門義亦通也案禮記云古者不使刑人守門彼鄭注謂夏殷時公羊云閽殺吳子餘祭近刑人輕死之道彼據人君加之寵故云近刑人輕死之道若君有防衛不親近則非近刑人其劓者使守關以其醜惡逺之不得約彼即以十二門皆使墨者也詩云昏椓靡共箋云皆奄人彼據后宫門故使奄者也又云囿御苑者案詩云王在靈囿注所以養禽獸天子百里諸侯四十里案孟子齊宣王問孟子云文王之囿方七十里猶以為小寡人囿方四十里猶以為大何也孟子答文王之囿芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎君之囿民殺其麋鹿者如殺人之罪民以為大不亦宜乎則文王之囿方七十里者大於諸侯小於天子故也白虎通又云天子百里大國四十里次國三十里小國二十里與孟子不同者白虎通細別言之也又云斿離宫者囿是大苑其門皆使閽人守之也此離宫即囿斿之獸禁故彼鄭云謂囿之離宫小苑觀處也或以為斿亦謂城郭中於宫外為之者也寺人王之正内五人注寺之言侍也詩云寺人孟子正内路寢疏釋曰在此者案其職云掌王之内人及女宫之戒令故在此注釋曰云寺之言侍者欲取親近侍御之義此奄人也知者見僖二十四年晉文公既入吕郤欲焚公宫寺人披請見公使讓之且辭焉披曰齊桓公置射鉤而使管仲相君若易之行者甚衆豈唯刑臣彼寺人披自稱刑人眀寺人奄人也若然寺人既掌内人不掌男子而秦詩云欲見國君先令寺人而掌男子者彼秦仲宣王命作大夫始大有車馬其官未備故寺人兼小臣是以寺人得掌男子詩云寺人孟子者引證經寺人孟子同也又云正内路寢者寺人既不得在王之路寢而云正内五人者謂在后之路寢耳若王之路寢不得稱内以后宫故以内言之故先鄭下注后六宫前一後五前一則路寢内豎倍寺人之數注豎未冠者之官名音義冠古亂反疏釋曰在此者案其職云掌内外之通令凡小事故與寺人連類在此也注釋曰春秋左氏傳叔孫穆子幸庚宗婦人而生牛以為豎官則亦童豎未冠者必使童子為之者鄭於其職注云使童豎通王内外之命給小事者以其無與為禮出入便疾也九嬪注嬪婦也昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理也不列夫人于此官者夫人之於后猶三公之於王坐而論婦禮無官職音義嬪符真反治直吏反疏釋曰在此者以其有婦徳其職云掌婦學之法以教九御同是内宫之官故亦在此注釋曰引昏義者彼是周之婦官之數與此經婦人數同故引以為證案禮記上檀弓云舜葬蒼梧蓋三妃未之從鄭注云帝嚳時立四妃象后妃四星其一眀者為正妃其三小者為次妃帝堯因焉至舜不告而娶不立正妃但三夫人而已夏后氏增以三三而九為十二人殷人又増有三九二十七合三十九人周人上法帝嚳而立正妃又三二十七為八十一人以增三十九幷后合百二十一人其位后也夫人也九嬪也二十七世婦也八十一女御也又云不列夫人于此惟有九嬪已下是無三夫人之數也又云夫人之於后猶三公之於王坐而論婦禮無官職者謂三百六十官無三公之官案大司徒序官云二鄉則公一人鄭注云三公者内與王論道中參六官之事外與六鄉之教又案冬官考工記云坐而論道謂之王公注云天子諸侯然則公中合有三公坐而論道無正職故云中參外與而已三夫人亦然故云坐而論婦禮無官職故不列之也世婦注不言數者君子不苟於色有婦徳者充之無則闕疏注釋曰在此者案其職云掌祭祀賔客喪紀帥女宫而濯摡故亦在此九嬪言數而世婦女御不言數者君子不苟於色有婦徳乃充之不言王而云君子者謂君子為王乃能不苟色也九嬪言數者欲見世婦女御有徳亦充若九嬪無徳亦與世婦女御同闕故迴互其文令義兩得見耳女御注昏義所謂御妻御猶進也侍也疏注釋曰彼不云女御而云御妻御進也故彼引為一物也又云御猶進也侍也者凡后下御皆從后宫進往王寢侍息宴故女御職云掌御敘于王之燕寢是以訓御云進也侍也女祝四人奚八人注女祝女奴曉祝事者音義祝之六反鄭徐之又反疏釋曰在此者案其職云掌王后之内祭祀凡内禱祠之事故在此也注釋曰言女奴曉事謂識文者為之也女史八人奚十有六人注女史女奴曉書者疏釋曰在此者案其職云掌王后之禮職内治之貳亦女奴曉文者為之其職與王之大史掌禮同故在此也典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人注典主也典婦功者主婦人絲枲功官之長疏釋曰在此者案其職云掌婦式之法以授嬪婦及内人女功之事齎故鄭注云典主也典婦功者主婦人絲枲功官之長其職中齎是也云賈四人者以其絲枲有善惡貴賤之事故須賈人也典絲下士二人府二人史二人賈四人徒十有二人疏釋曰在此者案其職云掌絲入而辨其物頒絲于外内工皆以物授之因婦功亦在此也典枲下士二人府二人史二人徒二十人音義枲絲里反疏釋曰枲麻也案喪服傳云牡麻者枲麻也則枲是雄麻對苴是麻之有蕡實者也在此者因典婦功故亦連類在此也内司服奄一人女御二人奚八人注内司服主宫中裁縫官之長有女御者以衣服進或當於王廣其禮使無色過音義縫戚奉容反徐扶用反下同疏釋曰以其掌后已下大服言内司服者非是對春官司服男子服為内但是男子之服不言外者在外是其常也故不須言外而外自顯但以婦人在内故婦人之事多言内若不言内無以得見婦人之物不與春官司服同處者以從内官之例故在此有奄一人者以其衣服事多須男子兼掌以與婦人同處故用奄也注釋曰言主宫中裁縫官之長者謂與下文縫人為長又云有女御者以衣服進或當於王廣其禮使無色過者以此女御還是女奴曉進御衣服者故與女酒女祝女史同號女也以衣服進謂進衣于王王見之或當王意廣其禮得與八十一女御同名欲見百二十人外兼有此女御之禮王合御幸之使王無淫色之過故名女御也縫人奄二人女御八人女工八十人奚三十人注女工女奴曉裁縫者音義縫劉扶用反疏釋曰在此者案其職云掌王宫縫線之事以縫王及后之衣服故在此也奄二人亦是縫線事多須有男子故也有女御者義同於上也有女工者謂女奴巧者鄭云曉裁縫者也染人下士二人府二人史二人徒二十人音義染如豔反劉而險反疏釋曰在此者案其職云掌染絲帛因婦人衣服故亦連類在此也追師下士二人府一人史二人工二人徒四人注追治玉石之名音義追丁回反一曰雕疏釋曰在此者職云掌王后之首服為副編次追衡笄亦因婦人衣服連類在此注釋曰詩云追琢其章章是玉為之則追與琢皆是治玉石之名也若然男子首服在夏官弁師者以其男子是陽義又取夏時萬物長大長大乃冠故在夏官此婦人直取首服配衣故與衣連類在此若然首反處下者以冠履自相對不與服為先後故不在上也屨人下士二人府一人史一人工八人徒四人音義屨紀具反疏釋曰在此者案其職云掌王及后之服屨故從内官衣服亦連類在此若然追師專掌婦人首服此屨人兼男子屨舄在下體賤故男子婦人同在此官也夏采下士四人史一人徒四人注夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采音義夏戸雅反注同采如字或作菜翟音狄雉名緌如誰反疏釋曰在此者其職云掌大䘮以冕服復于大祖以乗車建緌復于四郊䘮事是終故在末職也注釋曰案爾雅云伊洛而南素質五采皆備成章曰翬江淮而南青質五采皆備成章謂之鷂此則夏翟之羽色也又案禹貢徐州云羽畎夏翟是徐州貢夏翟之羽也又云有虞氏以為緌者明堂位云有虞氏之旂夏后氏之緌注云有虞氏當言緌夏后氏當言旂彼據虞氏始有緌故云有虞氏以為緌也又云後世或無者案冬官考工記有鍾氏染羽若有自然鳥羽何須染之乎故云後世或無則據此周時而言也云故染鳥羽象而用之謂之夏采者夏即五色也此職中注及彼注皆云緌謂注旄於干首不云翟羽者蓋注文不具耳周禮注疏卷一周禮注疏卷一考證惟王建國疏周公以政教不均以監本訛作於又脱教字今改正辨方正位疏在地置􅈏置􅈏監本訛􅈏日今据注引匠人文改正又太保朝至于洛汭臣照按召誥無汭字或唐時別本有之抑以下文有洛汭字而誤衍歟以為民極疏庶民於之取中監本此句下有案尚書洪範云皇建其有極十一字蓋因上文而誤衍今刪去臣照按一本作皇建其有中之道庶民於以取中於下各得其中不失所也亦可通旅下士三十有二人三十石經作卅後並同徒百有二十人二十石經作卄後並同甸師疏以其共野之薦共野下疑當有果蓏二字􅅑醫疏注潰則未必有膿也玩文義上下不相屬疑衍閽人囿斿亦如之斿監本作游石經釋文作斿今從之疏或以為斿亦謂城郭中於宫外為之者也於宫外為之監本作與公所為今改正夏采注故染鳥羽象而用之故監本訛過今改正周禮注疏卷一考證
