body:
  text: 周禮注疏卷三十漢鄭氏注唐陸德眀音義賈公彥疏小司馬之職掌注此下字脫滅札爛文闕漢興求之不得遂無識其數者疏注釋曰鄭知脫滅札爛文闕者見天官小宰地官小司徒春官小宗伯之等職掌下其文多矣凡小祭祀之言皆是於下總結以此知此下脫滅札爛文闕也言脫滅者直據職掌下一經脫滅札爛文闕者以其下經簡札為韋編折爛闕落知漢興求之不得者此闕與冬官所亡同日皆為遭暴秦燔滅典籍漢興購求遺書不得也云遂無識其數者以其無文遂無記識職掌以下之數耳凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之法疏釋曰云小祭祀已下至喪紀皆蒙此小字對大司馬大祭祀之等大司馬之小㑹同謂諸侯使卿大夫來聘王使卿大夫與之會同言饗射師田皆是諸侯卿大夫來聘王還使卿大夫與饗燕及射師田之等也小喪紀者三夫人已下云掌事如大司馬之法亦如大司馬羞魚牲授其祭之等也軍司馬闕輿司馬闕行司馬闕疏釋曰軍司馬當宰夫肆師之等皆下大夫四人輿司馬當上士八人行司馬當中士十六人餘官皆無異稱此獨有之者以軍事是重故特生别名此等皆與上同闕落之司勳掌六鄉賞地之法以等其功注賞地賞田也在逺郊之內屬六鄉焉等猶差也以功大小為差疏注釋曰知賞地是賞田在逺郊之內者以載師職云牛田賞田任逺郊之地故知也知屬六鄉者以其逺郊內置六鄉故也云以功大小為差者以下文云輕重視功則賞地大小不定故知以功大小為差王功曰勳注輔成王業若周公疏注釋曰知據王業者以其言王繼王身而言眀據王之位業而說耳以周公攝政相幼君致太平還政成王是輔成王業之事故以周公託之但經之所云不得專為周公伊尹之等故皆云若比擬之耳國功曰功注保全國家若伊尹疏注釋曰鄭知保全國家者以其言國繼國而言故知是保全國家者也以伊尹比之者以湯時天下太平湯崩孫太甲即位不眀政事伊尹為數篇書以諫之諫既不入乃放之桐宫三年思庸復歸於亳國家得全故以伊尹擬之耳民功曰庸注法施於民若后稷疏注釋曰知法施於民者以其言民繼民言之先王之業以農為本以后稷比之者周之先祖棄為堯之稷官農人植嘉榖天下為烈豈一手一足哉庸亦功也以法施於民有功故以后稷擬之事功曰勞注以勞定國若禹疏注釋曰知以勞定國者以其言勞據勤勞施國而言堯遭洪水下民昏藝國家不定命禹治之手足胼胝三過門不入弼成五服國乃獲安故以禹擬之也治功曰力注制法成治若咎繇音義治直吏反注同咎音羔繇音遙疏注釋曰以其言治言力故知制法成治出其謀力按虞書帝謂咎繇云蠻夷猾夏寇賊姦宄汝作士五刑有服是咎繇制其刑法國家治理故以咎繇擬之戰功曰多注尅敵出竒若韓信陳平司馬法曰上多前虜疏注釋曰知多是尅敵出竒者以其言多是於衆之中比校多少之事故知是尅敵出竒比彼為多者也漢之二將是尅敵出竒之人故以擬之耳云司馬法曰上多前虜者彼亦是戰以功多為上居於陳前虜獲俘囚故引以證多為戰功者也此上六者皆對文為義若散文則通是以春秋左氏云舍爵策勳彼戰還而飲至不云舍爵策多是通也眀堂位云周公為有勳勞於天下是周公德大有勳兼勞者也凡有功者銘書於王之大常祭於大蒸司勳詔之注銘之言名也生則書於王旌以識其人與其功也死則於蒸先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹豫大享於先王爾祖其從與享之是也今漢祭功臣於廟庭音義識音志盤步干反與音預疏釋曰凡有功謂上六者故云凡以該之使司勳詔之者以其司勳知功之有無大小故也詔之謂詔司常書之又以辭使春官告神注釋曰言生則書於王旌以識其人與其功也者以王建大常故云王旌必於王旌識功與人者王旌車上建之就旌上書之欲取表顯示人故也引盤庚告其卿大夫者盤庚殷王欲遷往亳殷臣民有不肯者故告之云我不掩爾善所以者何兹豫大享於先王之時爾祖其從先王與在享祭之中况爾見在不掩可知何不從我遷乎引漢法欲見古者祭功臣在廟庭也必祭功臣在冬之蒸祭者蒸者衆也冬時物成者衆故祭功臣按彼書注以大享為蒸嘗者此舉冬祭物成者衆而言其嘗時亦祭之也或可周時直於蒸時祭功臣殷時蒸嘗俱祭禮異故也大功司勳藏其二注二猶副也功書藏於天府又副於此者以其主賞疏注釋曰鄭知功書藏於天府者天府職文也掌賞地之政令注政令謂役賦疏注釋曰鄭以政為征征稅也賞地在六鄉之內亦從溝洫貢天子法其民亦從鄉之徭役之法凡賞無常輕重視功注無常者功之大小不可豫疏注釋曰賞地在逺郊之內有疆界未給者空之待有功乃隨功大小給之故云不可豫也凡頒賞地參之一食注鄭司農云不以美田為采邑𤣥謂賞地之稅參分計稅王食其一也二全入於臣疏注釋曰先鄭意以參之一食者謂以下地可食三之一似下地再易家得三頃嵗種一頃食之故云不以美田為采邑又以賞田與采邑為一物後鄭不從者不以美田為采邑亦無文以言之又按載師職家邑任稍地小都任縣地大都任疆地自三百里已外為之其賞田任在逺郊之內何得為一物故鄭不從也後鄭云賞地之稅參分計稅王食其一也二全入於臣者采地之稅四之一與小國入天子同今賞田三之一一分入天子與次國三之一入天子同惟加田無國正注加田既賞之又加賜以田所以厚恩也鄭司農云正謂稅也祿田亦有給公家之賦貢若今時侯國有司農少府錢榖矣獨加賞之田無正耳音義正音征注同本亦作征少詩照反疏釋曰言無國征無稅入天子法其民出稅入主則有之但加田未知所在或可與賞田同處以其仕田在近郊加田在逺郊可知也注釋曰知加田既賞之又加賜以田者以其文承賞田之下即云加田故知賞田之外所加賜之田可知先鄭云祿田亦有給公家之賦貢舉漢法侯國有司農少府錢榖者漢法榖入司農錢入少府故舉以為況祿田即采地之稅及賞田之等是也加田是加恩厚又不稅入天子凡大夫士賜地有四種大夫以上有采家邑任稍地之等是也又有賞田及加田載師又有仕田及王制圭田圭田即仕田是有四種禮記王制云大夫士有田則祭無田則薦少牢特牲是大夫有田者是知士亦有田之法也馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈注此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直音義賈音嫁注及下同種章勇反下同疏釋曰云馬質者質平也主平馬力及毛色與賈直之等注釋曰云此三馬買以給官府之使無種者馬有六種此三者無種買以給官府餘三者仍有種馬齊馬道馬其齊馬道馬亦無種不買之者其種馬上善似母者其齊馬道馬雖非上善似母者亦容國家所蕃育不買之也綱惡馬注鄭司農云綱讀為以亢其讐之亢書亦或為亢亢御也禁也禁去惡馬不畜也𤣥謂綱以縻索維綱狎習之音義亢苦浪反又音剛下同御魚吕反本亦作禦下同去起吕反小子注去之同縻亡皮反疏注釋曰先鄭讀為以亢其讐之亢者按僖二十八年晉子犯曰背惠食言以亢其讐是也謂禁去惡馬不畜後鄭不從者此馬質所掌皆買之無種何有惡馬禁去之類故不從也凡受馬於有司者書其齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更其外否注鄭司農云更謂償也𤣥謂旬之內死者償以齒毛與賈受之日淺飬之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪音義更音庚下及注同任用音壬又而鴆反疏注釋曰後鄭云旬內死者償以齒毛與賈受之日淺飬之惡也者所受之馬謂給公家之使旬之內雖任之過其任若飬之善未能致死以其日少故也若飬之惡雖不重任亦能致死云旬之外死入馬耳償以毛色不以齒賈任之過其任也者以其筋力既竭雖善飬之任載過多可以致死故云過其任也云其外否者旬之外踰二十日死不任用非用者罪者以其行使二十日以外馬力既竭雖齊其任飬之善容得致死故不償鄭見有三等之法下復云以任齊其行以意量之以為此解馬及行則以任齊其行注識其所載輕重及道里齊其勞逸乃復用之音義復扶又反疏注釋曰鄭知識其所載輕重及道里者以其經云馬及行眀授行者所載輕重及道里須齊勞逸乃復用之不得并其勞逸也若有馬訟則聼之注訟謂賣買之言相負疏注釋曰知賣買之言者以馬質主買馬故知之也禁原蠶者注原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與音義直音值為傷于僞反疏注釋曰云天文辰為馬者辰則大火房為天駟故云辰為馬云蠶書蠶為龍精月值大火則浴其種者月值大火謂二月則浴其種即內宰云仲春詔后帥外內命婦始蠶於北郊是也若然祭義云大昕之朝奉種浴於川注云大昕季春朔日之朝是建辰之月又浴之者蓋蠶將生重浴之故彼下文即云桑於公桑之事是也云是蠶與馬同氣者以其俱取大火是同氣也云物莫能兩大者此莊二十二年左傳文按彼陳敬仲奔齊齊侯使敬仲為卿敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賓於王此其代陳有國乎不在此其在異國乎下云若在異國必姜姓也姜大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎引此者是無並大之義也云禁再蠶者為傷馬與者二者既同氣不可兩大而禁再蠶眀恐傷馬無正文故云與以疑之也量人掌建國之法以分國為九州營國城郭營后宫量市朝道巷門渠造都邑亦如之注建立也立國有舊法式若匠人職云分國定天下之國分也后君也言君容王與諸侯音義朝直遙反下及注同國分也扶問反疏釋曰云掌建國之法者以其建國當先知逺近廣長之數故也云以分國為九州者分國謂分諸侯之國為九州假令土廣萬里中國七千七七四十九方千里者四十九其一為畿內其餘四十八八州各得方千里者六是為九州也至於中平通夷狄七千中國五千衰世通夷狄五千中國三千計皆可知故分國為九州州各有疆界故詩云帝命式於九圍是州各有圍限也云營國城郭者即匠人云營國方九里之類也云營后宫者謂若典命注公之宫方九百步天子千二百步之類也云量市朝道巷者謂若匠人云市朝一夫經塗九軌巷及門渠亦有尺數謂若門容二轍三個之等云造都邑亦如之者謂造三等采地亦有城郭宫室市朝之等故云如之但與之制度大小未必身往耳注釋曰云立國有舊法式若匠人職云者按匠人有營國方九里夏后氏世室及左祖右社面朝後市市朝一夫之等云分國定天下之國分也者以經云分國謂為諸侯國諸侯國有五百里四百里以下言為州謂九州有分界也云后君也知非王后之宫者以其不得先言后故以后為君也云言君容王與諸侯者以其言分國是諸侯若云王即不容諸侯故變王云后欲容王與諸侯兩含故也營軍之壘舍量其市朝州涂軍社之所里注軍壁曰壘鄭司農云量其市朝州涂還市朝而為道也𤣥謂州一州之衆二千五百人為師每師一處市也朝也州也皆有道以相之軍社社主在軍者里居也音義涂本又作塗還市如字劉戶串反疏釋曰此為出軍之時所營量度之事注釋曰云軍壁曰壘者軍行之所擬停之處皆為壘壁恐有非常故云軍壁曰壘也先鄭云量其市朝州塗還市朝而為道也者先鄭意還市朝而為道不釋州義故後鄭不從以一州則一師每一師各自一處各立市朝州即師也師皆有道以相湊之若然未必環繞為路也云軍社社主在軍者里居也者在軍不用命戮於社故將社之石主而行所居皆有步數故職在量人邦國之地與天下之涂數皆書而藏之注書地謂方圜山川之廣狹書涂謂支湊之逺近音義湊七豆反疏注釋曰鄭以地中有平廣兼山川之等故云書地謂方圜山川之廣狹也云書涂謂支湊之逺近者支謂支分湊謂臻湊道塗有支分及相臻湊逺近也凡祭祀饗賓制其從獻脯燔之數量注鄭司農云從獻者肉殽從酒也𤣥謂燔從於獻酒之肉炙也數多少也量長短也音義炙章夜反疏釋曰云凡者以其天地宗廟饗食事廣故云凡以該之饗賓謂若大行人上公三饗九獻之等饗賓獻有脯從若燕禮獻賓薦脯醢是也祭禮獻以燔從故總言之也注釋曰先鄭云從獻者肉殽從酒也後鄭不從者以肉殽從酒禮所不言按特牲少牢云主人獻尸以肝從主婦獻尸以燔從故後鄭據此以為從獻以燔詩云載燔載烈毛云傅火曰燔貫之加於火曰烈燔雖不貫亦是炙肉故鄭云肉炙也云數多少也量長短也者按儀禮脯十脡各長尺二寸是多少長短燔之數量未聞掌喪祭奠竁之俎實注竁亦有俎實謂所苞遣奠士喪禮下篇曰藏苞筲於旁音義竁昌鋭反筲所交反疏釋曰諸於喪祭多據虞祭而言此喪祭文連奠竁竁是壙內故鄭以喪祭為大遣奠解之是以大司馬喪祭亦為遣奠也注釋曰案冢人云請度用竁竁穿壙之名此言奠竁則奠入於壙是以云所包遣奠也引士喪禮下篇者即既夕禮是也云藏苞筲於旁者苞謂苞牲取下體葦苞一是也藏筲者即既夕禮云筲三黍稷麥並藏之於棺旁引之者證喪祭奠入壙之事也凡宰祭與鬱人受斝歷而皆飲之注言宰祭者冡宰佐王祭亦容攝祭鄭司農云斝讀如嫁娶之嫁斝器名眀堂位曰爵夏后氏以盞殷以斝周以爵𤣥謂斝讀如嘏尸之嘏宰冡宰音義斝古雅反劉依同農音嫁盞側産反劉本作湔音同嘏古雅反疏釋曰云凡宰祭者冢宰攝祭非一故云凡也注釋曰鄭云冡宰佐王祭亦容攝祭者義得兩含按大宗伯云若王不與祭祀則攝位注云王有故代行其祭事重掌者此據宗伯亦有故則冢宰攝之先鄭云斝讀如嫁娶之嫁直取音同引眀堂位者證斝是器名周獻用玉爵無用斝故後鄭云斝讀如嘏尸之嘏讀從少牢尸嘏主人郊特牲云嘏者長也大也謂使主人受長大之福疏已具於鬱人職但此有歷字者謂鬱人與量人歷皆飲之也小子掌祭祀羞羊肆羊殽肉豆注鄭司農云羞進也羊肆體薦全蒸也羊殽體解節折也肉豆者切肉也𤣥謂肆讀為鬄羊鬄者所謂豚解也音義肆依注音鬄他歷反一音餘四反折之設反疏注釋曰先鄭云羊肆體薦全蒸也者既不為豚解則先鄭讀為肆陳之肆又為賜音也先鄭為體薦全蒸後鄭不從者以此經祭用羊是用大牢為宗廟之祭非祭天按外傳云禘郊之事則有全蒸王公立飫則有房俎是以知宗廟之祭不得全蒸也是故禮運云腥其俎孰其殽注云腥其俎豚解而腥之孰其殽體解而爓之又云退而合亨體其犬豕牛羊是祭宗廟不得有全蒸也是以後鄭讀肆從鬄羊鬄者所謂豚解也所謂者所謂士虞禮記云主人不視豚解豚解之法則士喪禮特豚四鬄去蹄謂四段解之殊肩髀如解豚故名豚解若然大夫士祭自饋孰始故正祭即體解為二十一體喪事略則有豚解其天子諸侯之祭有腥有爓有孰故初朝踐有豚解而腥之饋獻則有體解而爓之酳尸乃有孰與大夫士不同也而掌珥于社稷祈于五祀注故書祀作祀鄭司農云祀讀為祀書亦或為祀珥社稷以牲頭祭也𤣥謂珥讀為衈祈或為刉刉衈者釁禮之事也用毛牲曰刉羽牲曰衈衈刉社稷五祀謂始成其宫兆時也春官肆師職祈或作畿秋官士師職曰凡刉衈則奉犬牲此刉衈正字與音義珥依注音衈而志反後同一音仍祈音機祀音祀刉音機字書云劃也一曰斷也或古愛反又公內反與音餘疏注釋曰先鄭云珥以牲頭祭漢時祈禱有牲頭祭後鄭不從者按禮記雜記釁廟之禮云門夾室用雞其衈皆於屋下衈既為釁禮此刉與衈連文則刉亦是釁禮非祭祀之法何得為牲頭祭乎是以後鄭為釁法解之𤣥謂珥讀為衈祈或為刉者以釁法無取於玉珥及祈禱之義故依士師刉衈為正也鄭知刉衈為釁禮之事約雜記而知也云用毛牲曰刉羽牲曰衈者此相對而言雜記廟用羊門用雞皆云衈散文通也知刉衈是社稷五祀始成其宫兆時也者凡物須釁者皆謂始成時是以雜記云廟成則釁之是也云春官肆師職祈或作畿者鄭欲見字有參差非一之義云秋官士師職曰凡刉衈則奉犬牲此刉衈正字與者刉從刃衈從血於義合故以此為正字也凡沈辜侯禳飾其牲注鄭司農云沈謂祭川爾雅曰祭川曰浮沈辜謂磔牲以祭也月令曰九門磔禳以畢春氣侯禳者候四時惡氣禳去之也音義禳如羊反磔陟格反疏注釋曰先鄭云沈謂祭川是以引爾雅為證案爾雅曰祭山曰庪縣祭川曰浮沈此浮沈之祭當祭天之煙祭社之血亦謂歆神節先鄭引月令季春令者證辜是辜磔牲體之義鄭彼注九門者王之五門外有國門近郊門逺郊門關門為九云侯禳者謂候四時惡氣禳除去之也釁邦器及軍器注邦器謂禮樂之器及祭器之屬雜記曰凡宗廟之器其名者成則釁之以豭豚音義豭音家疏注釋曰鄭以軍器别言即云邦器者是禮樂之器也鄭云禮器者即射器之等樂器即鐘鼓之等祭器即籩豆俎簋尊彛器皆是引雜記宗廟器成釁之以豭豚者證此等所釁亦用豭豚也凡師田斬牲以左右徇陳注示犯誓必殺之音義徇辭俊反疏釋曰此即上文誓衆之時斬牲以左右徇陳是此職也祭祀贊羞受徹焉疏釋曰贊羞謂若上文大司馬職云祭祀羞魚牲之等此官即贊之云受徹焉者謂祭畢諸宰君婦廢徹之時則此官受之羊人掌羊牲凡祭祀飾羔注羔小羊也詩曰四之日其蚤獻羔祭韭疏釋曰凡正祭皆用成牲今言祭祀飾羔則非正祭用羔是以鄭引詩為證云四之日者謂用建子為正至建卯四月夏之二月之日公始用氷欲開氷之時先獻羔祭韭而啓氷室乃出氷也祭祀割羊牲登其首江登升也升首報陽也升首於室疏注釋曰知升首於室者見郊特牲云用牲於庭升首於室注云制祭之後升牲首於北墉下云報陽者首為陽對足為陰祭祀之時三牲之首俱升此特言羊者以其羊人所升不升餘牲故言羊也凡祈珥共其羊牲注共猶給也疏釋曰犬人共犬此云共羊或羊或犬俱得為釁故兩職各共之也賓客共其法羊注法羊食饗積膳之羊音義食饗音嗣本又作飱饔疏注釋曰鄭知法羊是為此等者以其言法即是依法度多少送於賓館及道路是以掌客致於賓館有上公飧五宰饔餼九牢及殷膳大牢致於道路有五積之等其饗食及燕速賓自饌陳者不言之也凡沈辜侯禳釁積共其羊牲注積故書為眦鄭司農云眦讀為漬謂釁國寶漬軍器也𤣥謂積積柴禋祀楢燎實柴音義眦徐賜反與漬同楢羊久反燎良召反疏注釋曰先鄭不從故書眦故讀從水漬後鄭不從漬軍器者以此羊人所共異小子職彼云釁邦器及軍器以此知不得為漬軍器也後鄭云積積柴禋祀楢燎實柴歷言此三者以互而相通皆須積柴實牲幣煙氣上聞故也但祭天用犢其日月已下有用羊者故我將詩云維羊維牛維天其祐之彼亦據日月以下及配食者也若牧人無牲則受布於司馬使其賈買牲而共之疏布泉音義賈音古司爟掌行火之政令四時變國火以救時疾注行猶用也變猶易也鄭司農說以鄹子曰春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火音義柞子洛反楢羊久反又音由疏釋曰云掌行火之政令者即四時變國火及季春出火等皆是也云四時變國火以救時疾者火雖是一四時以木為變所以禳去時氣之疾也注釋曰先鄭引鄹子書論語注引周書不同者鄹子書出於周書其義是一故各引其一言春取榆栁之等舊師皆以為取五方之色同故用之今按棗杏雖赤榆栁不青槐檀不黑其義未聞季春出火民咸從之季秋內火民亦如之注火所以用陶冶民隨國而為之鄭人鑄刑書火星未出而出火後有災鄭司農云以三月本時昏心星見於辰上使民出火九月本黃昏心星伏在戌上使民內火故春秋傳曰以出內火音義見賢遍反疏注釋曰鄭知出火內火據陶冶火者以其上經四時變國火據食火眀此春秋據陶冶故引春秋傳為證也云民隨國而為之者釋民咸從之義云鄭人已下按左氏昭六年三月鄭人鑄刑書士文伯曰火見鄭其災乎火未出而作火六月丙戍鄭災是其後有災昭十七年梓慎曰火出於夏為三月於商為四月於周為五月夏數得天正先鄭云三月本時昏心星見於辰上使民出火九月本黃昏心星伏在戌上使民內火者心星則大火辰星是也三月諸星復在本位心星本位在卯三月本之昏心星始時未必出見卯南九月本始之黃昏心星亦未必伏在戌上皆據月半後而言云春秋傳曰以出內火者左氏傳襄公九年文時則施火令注焚萊之時疏注釋曰上言行火政此又言施火令則不掌火禁故鄭云焚萊之時其火禁者則宫正云春秋以木鐸修火禁注云火星以春出以秋入因天時而以戒司烜亦云仲春以木鐸修火禁於國中彼二官直掌火禁不掌火令凡祭祀則祭爟注報其為眀之功禮如祭釁疏注釋曰鄭云禮如祭爨者祭爨祭老婦也則此祭爟謂祭先出火之人凡國失火野焚萊則有刑罰焉注野焚萊民擅放火疏注釋曰國失火謂在國中民失火有罰若令民失火有杖罰野焚萊有罰者大司馬仲春田獵云火弊鄭云春田主用火因除陳生新則二月後擅放火則有罰也掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守注樹謂枳棘之屬有刺者也衆庶民遞守固者也鄭司農說樹以國語曰城守之木於是乎用之音義枳諸氏反刺七賜反遞劉待禮反又待計反疏釋曰云掌修城郭溝池者謂環城及郭皆有溝池云樹渠者非直溝池有樹兼其餘渠上亦有樹也云之固者總城郭已下數事皆是牢固之事也云頒其士庶子者即宫伯所云士謂卿大夫士之適子庶子其支庶彼據宿衛王宫此掌固所頒亦據宿衛王宫而言以其庶子不合城郭之處用之以掌固是固守之官故兼掌宿衛之事也注釋曰云衆庶民遞守固者也者謂使守城郭之所及要害之處也先鄭引國語者按楚語云靈王為章華之臺伍舉諫為臺榭云瘠磽之地於是乎為之城守之木於是乎用之是其事引之者證城有守法設其飾器疏兵甲之屬今城郭門之器亦然疏注釋曰鄭知經飾器是兵甲之屬者以其掌器是防禦之器故知是兵甲之屬也云今城郭門之器亦然者漢時城郭門守器所飾亦若今城郭門傍所執矛㦸皆有幡飾之等是也分其財用均其稍食注財用國以財所給守吏之用也稍食祿廩疏注釋曰云財用者謂所用之財物分與之眀是以財所給守吏為守事之用者也云稍食祿廩者所守之處官及民合受官食月祿廪者所守之處按月給米廩與之故謂之稍食也任其萬民用其材器注任謂以其任使之也民之材器其所用塹築及為藩落音義塹七豔反疏注釋曰云民之材器其所用塹築及為藩落者對上文財用謂官之財物此云民之材器眀材是材木用為楨幹以掘塹築作所用及不築處即用材為藩屏籬落以遮障也凡守者受法焉以通守政有移甲與其役財用唯是得通與國有司帥之以贊其不足者注凡守者士庶子及他要害之守吏通守政者兵甲役財難易多少轉移相給也其他非是不得妄離部署國有司掌固也其移之者又與掌固帥致之贊佐也音義凡守者劉收又反注凡守者下有守同易以豉反離力智反疏注釋曰云凡守者士庶子及他要害之守吏者此鄭還據上文士庶子及衆庶之守而言云他要害者謂城郭所守是其常處除此有要害之處若殽臯河漢要路之所皆為他要害也云通守政者兵甲役財難易多少轉移相給者鄭據上文飾器而言變材器言役材者欲見材器是民役之材非財用也云其他非是不得妄離部署者此則釋經惟是得通之言其餘非所通之外皆不得離其本處也晝三巡之夜亦如之注巡行也行守者為衆庶之解隋音義行下孟反下皆同為于僞反解佳賣反疏釋曰此乃掌固設法與所守之處非是掌固自巡行之也夜三鼜以號戒注杜子春云讀鼜為造次之造謂擊鼓行夜戒守也春秋傳所謂賓將趣者與趣與造音相近故曰終夕與燎𤣥謂鼜擊鼜警守鼓也三巡之間又三擊鼜音義鼜音戚造七報反下同趣莊久反劉祖侯反杜七柱反者與音餘近附近之近與燎音預疏釋曰此乃掌固設法與所守之處言以號戒者使擊鼜者所以號呼使戒守耳注釋曰引春秋者按昭二十年衛侯如死鳥齊侯使公孫青聘衛賓將掫注謂行夜不作趣者彼賈服讀字與子春意異云故曰終夕與燎者亦是彼傳文後鄭以鼜擊鼜警守鼓不從子春造音者以子春已上有注鼜讀為憂戚之戚是戒守者使有憂戚故謂此鼓為鼜也若造都邑則治其固與其守法注都邑亦為城郭疏注釋曰謂三等采地言亦為城郭者但戒守為城郭而言故亦如上王國然也凡國都之竟有溝樹之固郊亦如之注竟界也音義竟音境注及下同疏釋曰此經為上經而設仍兼見王國而言故國都雙言之言王國及三等都邑所在境界之上亦為溝樹以為阻固郊亦如之若據王國有近郊逺郊亦有溝樹以為固民皆有職焉注職謂守與任疏釋曰此亦兼上王國及都合守之處其民皆職任使勞逸遞守也若有山川則因之注山川若殽臯河漢疏釋曰謂上諸有所造溝樹為固之處值有山川之處則因之不須别造注釋曰殽謂若殽有二陵臯謂若東城臯漢謂若楚謂齊云楚國漢水以為池河為四瀆之險又齊西有濁河皆因之為固可知司險掌九州之圖以周知其山林川澤之阻而達其道路注周猶遍也達道路者山林之阻則開鑿之川澤之阻則橋梁之音義遍音遍疏釋曰序官注國曰固野曰險是掌固掌在國城郭則司險掌畿外阻固故云司險也注釋曰云山林之阻則開鑿之者謂若禹鑿龍門之類川澤之阻則橋梁之者謂若十月輿梁成之類是也設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路注五溝遂溝洫澮川也五涂徑畛涂道路也樹之林作藩落也音義洫況域反澮古外反畛之忍反疏釋曰此五溝五涂而言樹之林以為阻固皆有守禁則非遂人田間五溝五塗但溝塗所作隨所須大小而為之皆準約田間五溝五塗其溝上亦皆有道路以相支湊故以五溝五塗而言之也注釋曰遂溝至道路皆遂人文故遂人云夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路是也國有故則藩塞阻路而止行者以其屬守之唯有節者達之注有故喪災及兵也閉絶要害之道備姦寇也疏釋曰國有故之時恐有姦寇故藩塞阻路而止行者云以其屬守之者謂使司險之下胥徒四十人之屬守其要者其餘使其地之民為守也云有節者達之者節謂道路用旌節也注釋曰鄭知有故是喪災及兵者喪謂王喪災謂水火兵謂冦戎之等有故使守愼惟此而已故以此三事解之掌疆闕候人各掌其方之道治與其禁令以設候人注道治治道也國語曰候不在竟譏不居其方也禁令備姦冦也以設候人者選士卒以為之詩云彼候人兮何戈與祋音義治直吏反注道沽及下方治同何胡我反又音河祋都外反劉睹律反疏釋曰言各掌其方之道治與其禁令以設候人者以其上士六人下士十有二人徒百有二十人以道路多故設官及徒亦多也引國語者按周語定王使單襄公聘于宋遂假道于陳以聘於楚時候不在境司空不視塗膳宰不致餼司里不授館單子歸以告王曰陳侯不有大咎國必亡言譏者正謂陳侯不有大咎國必亡者也詩云彼候人兮荷戈與祋者荷揭也祋謂殳也引此二者證候人在道之事鄭言候人者選士卒以為之者即徒百二十人皆是甲士與步卒之內為之也若有方治則帥而致于朝及歸送之于竟注方治其方來治國事者也春秋傳曰晉欒盈過周王使候人出諸轘轅是其送之音義朝直遙反轘戶關反疏注釋曰方治其方來治國事者也者謂國有事不能自決當決於王國或有國事須報在上皆是也引春秋者按襄二十一年晉欒盈出奔楚過周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室若不棄書之力亡臣猶有所逃若棄書之力將歸死於尉氏惟大君命焉王使司徒禁掠欒氏者歸所取焉使候出諸轘轅彼云候鄭君以義言之故言候人也環人掌致師注致師者致其必戰之志古者將戰先使勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下掚馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復之音義菆側留反劉子侯反掚音兩又音亮掉徒弔反又奴孝反鞅於兩反折之設反下同馘古獲反俘音孚疏注釋曰云古者將戰先使勇力之士犯敵焉者按文十二年秦伯伐晉秦人欲戰秦伯謂士㑹曰若何而戰對曰若使輕者肆焉其可注云肆突言使輕鋭之兵往驅突晉軍隱九年北戎侵鄭公子突曰使勇而無剛者嘗冦而速去之注云勇則能往無剛不恥退云春秋傳者宣十二年左氏傳晉楚交戰楚許伯御樂伯已下謂凡平兵車之法射者在左御者在中戈盾在右菆矢之善者掚猶飾也掉猶正也言折馘執俘者死者取左耳曰馘生者曰俘執取之云皆行其所聞而復之者去時作言及至晉師皆行其所聞之事而復反此亦勇而無剛之人引之者證致師之事也察軍慝注慝陰姦也視軍中有為慝者則執之音義慝他得反疏釋曰按莊二十五年左民傳云惟正月朔慝未作彼以慝為陰氣則此慝亦是陰姦也欲陰私為姦取此軍之事往彼言之故察而執之環四方之故注郤其以事謀來侵伐者所謂折衝禦侮疏注釋曰此則訓環為郤郤其以事謀來侵伐此國者也云所謂折衝禦侮者謂彼國來衝能折服之彼國來輕侮能禦之故云折衝禦侮也巡邦國搏諜賊注諜賊反間為國賊音義搏音博又房布反劉音付諜音牒間間厠之間疏注釋曰云巡邦國者謂巡諸侯邦國之內有諜賊搏捉取之言諜賊者謂間伺此國之善惡諜諜然傳道之言反間者謂間伺反於彼言之也此諜賊即上軍慝之類彼據王國此據邦國故異言之訟敵國注敵國兵來則往與之訟曲直若齊國佐如師疏注釋曰云若齊國佐者成公二年晉伐齊晉師至袁婁齊侯使國佐致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也今吾子布大命於諸侯而曰必質其母以為信其若王命何又曰先王疆理天下物土之宜而布其利下云今吾子疆理諸侯而曰盡東其畝而已惟吾子戎車是利無顧土宜其無乃非先王之命也乎晉於是退師是訟敵國之事故引為證也揚軍旅注為之威武以觀敵詩云維師尚父時維鷹揚疏注釋曰引詩者大雅文王詩言太公為太師可尚可父武王伐紂之時太公奮其威武惟如鷹之揚擊是揚威武故引為證也降圍邑注圍邑欲降者受而降之春秋傳曰齊人降鄣音義降戶江反注同鄣音章劉諸讓反疏注釋曰按公羊傳莊公三十年秋七月齊人降鄣鄣者何紀人之遺邑也是紀入齊之時不俱至後乃降引之證降是圍邑之事也挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧注鄭司農云挈壺以令軍井謂為軍穿井井成挈壺縣其上令軍中士衆皆望見知此下有井壺所以盛飲故以壺表井挈轡以令舍亦縣轡于所當舍止之處使軍望見知當舍止于此轡所以駕舍故以轡表舍挈畚以令糧亦縣畚于所當稟假之處令軍望見知當稟假于此下也畚所以盛糧之器故以畚表稟軍中人多車騎雜㑹歡囂號令不能相聞故各以其物為表省煩趨疾于事便也音義畚音本為于僞反下為沃同縣音懸下皆同令力呈反盛音成下同稟彼錦反劉力鴆反歡呼端反囂五髙反一音許驕反省所景反便婢面反疏釋曰皆云挈者謂結之於竿首挈挈然故云挈也先鄭注具不復疏之也凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜注鄭司農云縣壺以為漏以序聚柝以次更聚擊柝備守也𤣥謂擊柝兩木相敲行夜時也代亦更也禮未大斂代哭以水守壺者為沃漏也以火守壺者夜則火視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉大史立成法有四十八箭音義柝音託更音庚下同敲苦交反又苦教反行下孟反共如字疏注釋曰先鄭云懸壺以為漏者謂懸壺於上以水沃之水漏下入器中以沒刻為准法云以序聚柝以次更聚擊柝備守也者先鄭意持更人擊柝𤣥謂擊柝兩木相敲行夜時也者謂行夜者擊之按修閭氏掌比國中宿互柝者先鄭云柝謂行夜擊柝野廬氏云若有賔客則令守塗地之人聚柝之司農云聚柝之聚擊柝以宿衛之也彼二注後鄭皆從先鄭及至此注不從先鄭者以野廬氏無行夜者宿人自擊故後鄭從之此文與修閭氏同有行夜者故此不從先鄭宿者自擊之是以宫正云夕擊柝而比之注云行夜以比直宿者先鄭云柝戒守者所擊也是亦為行夜者所擊也云代亦更也禮未大斂代哭者未殯已前無問尊卑皆哭不絶聲大斂之後乃更代而哭亦使哭不絶聲大夫以官士親疏代哭人君尊又以壺為漏分更相代云分以日夜異晝夜漏也者若冬至則晝短夜長夏至則晝長夜短二分則晝夜等晝夜長短不同須分之故云異晝夜漏也云漏之箭晝夜共百刻冬夏之間有長短焉者馬氏云漏尺百刻春秋分晝夜各五十刻冬至晝則四十刻夜則六十刻夏至晝六十刻夜四十刻鄭注堯典云日中者日見之漏與不見者齊日長者日見之漏五十五刻於四時最長也夜中者日不見之漏與見者齊日短者日見之漏四十五刻於四時最短此與馬義異以其馬云春秋分晝夜五十刻據日見之漏若兼日未見日沒後五刻晝五十五刻夜四十五刻若夏至晝六十刻通日未見日沒後五刻則晝六十五刻夜三十五刻一年通閏有三百六十五日四分日之一四時之間九日有餘校一刻為率云大史立成法有四十八箭者此據漢法而言則以器盛四十八箭箭各百刻以壺盛水懸於箭上節而下之水水淹一刻則為一刻四十八箭者蓋取倍二十四氣也及冬則以火爨鼎水而沸之而沃之注鄭司農云冬水凍漏不下故以火炊水沸以沃之謂沃漏也音義㸑七端反疏注釋曰沃如沃尸盥之沃謂沸水稍熱澆沃壺中使下也射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摯三公執璧孤執皮帛卿執羔大夫鴈注位將射始入見君之位不言士者此與諸侯之賓射士不與也燕禮曰公升即位于席西鄉小臣納卿大夫卿大夫皆入門右北面東上士立於西方東面北上大射亦云則凡朝燕及射臣見于君之禮同音義見君賢遍反下同不與音預鄉許亮反朝直遙反下文及注皆同疏釋曰三公特北面者君南面答陽臣之北面答君三公臣中最尊故屈之使北面答君之義孤東面者西方者賓位以孤無職尊而賓客之故在西也卿大夫西面者以其皆有職故在東在東近君居主位也注釋曰知位是將射始入見君之位者此射人唯論射事大射諸侯禮亦然故知將射見君始入見君之位也云不言士此與諸侯之賓射士不與也者無臣祭無所擇不得自大射得與君大射故司裘職大射不言士也按下文士犴侯二正則士得自行賓射不得與君賓射矣引燕禮者欲見天子諸侯朝燕射三者位同之義云凡朝燕及射臣見於君之禮同者以儀禮內諸侯有燕朝及射朝不見正朝周禮內天子有射朝與正朝不見燕朝諸侯射朝與燕朝位同則天子燕朝亦與射朝位同則諸侯正朝亦與射朝位同是天子諸侯三朝各自同故鄭引儀禮見天子諸侯互見為義耳諸侯在朝則皆北面詔相其法注謂諸侯來朝而未歸王與之射於朝者皆北面從三公位法其禮儀音義相息亮反下及相孤同疏釋曰按司几筵云凡封國命諸侯大饗射王立扆前南鄉司服云享先公饗射則鷩冕鄭注云饗射饗食賓客與諸侯射也此云王與之射言在朝當皮辨又何得有扆所以然者彼二者據大射在學故有著冕在扆之事此賓射在路門之外朝故與彼異也注釋曰云從三公位者諸侯南面之尊故屈之從三公位也云法其禮儀者謂在朝進退周旋拱揖之儀也若有國事則掌其戒令詔相其事注謂王有祭祀之事諸侯當助其薦獻者也戒令告以齊與期音義齊側皆反疏注釋曰知國事是王有祭祀之事者以其諸侯來朝未歸而有戒令詔相之事大宗伯祭事皆云詔相故知是祭祀之事云戒令告以齊與期者齊謂散齊期謂祭日也掌其治達注謂諸侯因與王射及助祭而有所治受而達之於王王有命又受而下之音義治直吏反疏注釋曰如鄭注意則治達之中非直諸侯有治於王王之有治亦下達於諸侯也以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘩五節二正注射法王射之禮治射儀謂肆之也鄭司農云三侯虎熊豹也客者乏也待獲者所蔽也九節析羽九重設於長杠也正所射也詩云終日射侯不出正兮二侯熊豹也犴侯犴者獸名也獸有貙犴熊虎𤣥謂三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已此皆與賓射於朝之禮也考工梓人職曰張五采之侯則逺國屬逺國謂諸侯來朝者也五采之侯即五正之侯也正之言正也射者內志正則能中焉畫五正之侯中朱次白次蒼次黃𤣥居外三正損𤣥黃二正去白蒼而畫以朱緑其外之廣皆居侯中參分之一中二尺今儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此說失之矣大射禮犴作干讀如宜犴宜獄之犴犴胡犬也士與士射則以犴皮節侯下大夫也大夫以上與賓射節侯以雲氣用采各如其正九節七節五節者奏樂以為射節之差言節者容侯道之數也樂記曰眀乎其節之志不失其事則功成而德行立音義射三侯食亦反下及注射侯所射射牲射豕皆同三獲如字劉胡伯反五正音征下及注同犴五旦反劉音鴈注同肆之劉餘二反一音四九重直龍反杠音江貙初誅反下同言正音政下志正大射正同能中丁仲反下文注射中中侯同去白起吕反下去撲同廣古曠反鵠古毒反下大夫戶嫁反下天子同以上時掌反下上曰以上同行下孟反疏注釋曰此則賓射在朝之儀言射法王射之禮者此經兼有諸侯臣各在家與賓客射法各自有官掌之射人但作法與之耳首云射法者是射人所掌王射之禮言王射以别諸侯已下之射也云治射儀謂肆之也者言治則非是王射之語謂若大宗伯云治其大禮皆是習禮法故鄭云肆之肆則習也先鄭云三侯虎熊豹後鄭不從云容者乏也者此言容儀禮大射鄉射之等云乏故云容者乏也言容者據唱獲者容身於其中據人而言云乏者矢至此乏極不過據矢而說也云九節析羽九重設於長杠也者若是析羽九重設於長杠即是獲旌當與三獲三容相依何得輒在騶虞之下既在騶虞詩下眀是歌之樂節故後鄭不從也云二侯熊豹也者後鄭亦不從也云犴侯犴者獸名也獸有貙犴熊虎者此皆獸類故舉言之也𤣥謂三侯者五正三正二正之侯也者大射賓射侯數同皆約大射云大侯九十糝侯七十犴侯五十而言云二侯者三正二正之侯也者謂七十五十弓者也云一侯者二正而已者據大夫士同一侯二正五十弓而已云此皆與賓射於朝之禮也者按鄉射記云於境則虎中龍旜謂諸侯賓射之禮彼又云唯君有射國中其餘臣則否注云臣不習武事於君側則臣皆不得在國射若然在朝賓射唯有天子而云此皆與賓射於朝之禮者謂諸侯已下賓射在已朝不謂於天子朝行此賓射之禮也云考工梓人職曰張五采之侯則逺國屬已下至五正之侯也引之者破先鄭以此五正之侯為虎熊豹但梓人有三等侯云張皮侯而棲鵠及司裘云虎侯熊侯豹侯皆大射之侯也梓人又云張五采之侯則逺國屬及此五正之等皆賓射之侯也梓人又云張獸侯則王以息燕及鄉射記云天子熊侯白質之等皆燕射之侯也三射各有其侯而先鄭以皮侯釋正侯非也云正之言正也射者內志正則能中焉者此意取義於射義司裘注更有一釋正為鳥名解之也云畫五正之侯中朱已下皆以相尅為次向南為首故先畫朱知三正去𤣥黃二正朱緑者皆依聘禮記繅藉而言三采者朱白蒼二采者朱緑也云其外之廣皆居侯中參分之一者此亦約梓人云參分其廣而鵠居一焉彼據大射之侯若賓射之侯亦當參分其廣正居一焉九十步者侯中丈八尺七十步者侯中丈四尺五十步者侯中一丈也云今儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此說失之矣者賓射射正大射射鵠儒家以正鵠為一解故鄭破之云鵠乃用皮其大如正不得為一故云此說失之矣云大射禮犴作干者見大射經作干侯彼注亦破從犴云讀如宜犴宜獄之犴者此讀與彼音同云犴胡犬也者謂胡地之野犬云士與士射則以犴皮飾侯下大夫也大夫以上與賓射飾侯以雲氣知義如此者此賓射正用二采而言犴侯眀於兩畔以犴皮飾之故得犴侯之名知大夫已上用雲氣者鄉射記云凡畫者丹質注云賓射之侯燕射之侯皆畫雲氣於側以為飾必先以丹采其地是賓射大夫已上皆畫雲氣其大射之侯兩畔飾以皮故鄭直言賓射燕射云用采各如其正者其側之飾采之數各如正之多少也云九節七節五節者奏樂以為射節之差者九節者五節先以聼七節者三節先以聼五節者一節先以聼尊者先聼多卑者少為差皆留四節以乘矢拾發云言節者容侯道之數者謂若九節者侯道九十弓七節者侯道七十弓五節者侯道五十弓也云樂記曰眀乎其節之志不失其事則功成德行立者證侯道逺近亦為節也此射義文云樂記者誤也若王大射則以貍步張三侯注鄭司農云貍步謂一舉足為一步於今為半步𤣥謂貍善搏者也行則止而擬度焉其發必獲是以量侯道法之也侯道者各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺大射禮曰大侯九十參七十干五十是也三侯者司裘所共虎侯熊侯豹侯也列國之君大射亦張三侯數與天子同大侯熊侯也參讀為糝糝雜也雜者豹鵠而麋飾下天子大夫音義搏音博劉音付擬本又作擬同度待洛反參讀為糝素感反干與犴同五旦反疏注釋曰此射人主賓射兼主大射之事故為大射張侯也先鄭云貍步謂一舉足為一步於今為半步者此言於射張侯義無取故後鄭不從是以後鄭為貍善搏物解之云侯道者各以弓為度九節者九十弓已下者按鄉射記鄉侯五十弓弓二寸以為侯中彼據鄉射之侯一侯五十弓者而言若大射三侯云九十七十五十亦是據弓為數弓之上制六尺六寸中制六尺三寸下制六尺六尺與步相應故鄭連引大射三侯以義相㑹諸侯三侯用物雖不與天子同侯道則同但天子侯道無文約同諸侯故更引司裘天子三侯以㑹之諸侯糝侯知豹鵠而麋飾者以司裘云諸侯熊侯豹侯卿大夫麋侯畿外不得純如天子近侯已用犴則大侯不得用虎侯眀大侯用畿內諸侯熊侯為之其中豹侯麋侯則諸侯兼此二侯乃稱糝豹尊於麋眀以豹為鵠以麋為飾耳不純用豹麋者下天子大夫故也王射則令去侯立于後以矢行告卒令取矢注鄭司農云射人主令人去侯所而立于後也以矢行告射人主以矢行髙下左右告于王也大射禮曰大射正立于公後以矢行告于公下曰留上曰揚左右曰方杜子春說以矢行告告白射事于王王則執矢也杜子春說不與禮經合疑非是也卒令取矢謂射卒射人令當取矢者使取矢也𤣥謂令去侯者命負侯者去侯也鄉射曰司馬命獲者執旌以負侯音義卒子恤反注同疏釋曰此文承賓射大射之下則王射射人皆令去侯立於後以矢行告卒令取矢注釋曰先鄭云射人主令人去侯所者不辨其去侯之人故後鄭增成其義其負侯之人是服不氏也又引鄉射直云司馬命負侯不言官者大夫士家無服不氏家臣為之故也天子射人無其事故引大射之等為證也祭侯則為位注祭侯獻服不服不以祭侯為位為服不受獻之位也大射曰服不侯西北三步北面拜受爵疏注釋曰按大射禮使服不氏負侯將祭侯之時先設位於侯西北北面服不氏於位受得獻訖乃於侯所北面祭侯故引大射受獻之位為證也與大史數射中注射中數射者中侯之算也大射曰司射適階西釋弓去撲襲進由中東立于中南北面視算音義數所主反注同撲普卜反劉方遘反說文父豆反疏注釋曰數算大史數之射人但視之耳故引大射為證大射諸侯禮謂之司射天子謂之射人司射恆執張弓搢撲但今將視數算故適階西釋去弓并去撲倚於階西襲乃適中南北面視數算也佐司馬治射正注射正射之法儀也疏注釋曰射之威儀乃是禮之正故名射儀為射正也司馬所主射儀謂若命去侯命取矢乘矢之等皆當佐之言治者亦謂預習之類也祭祀則贊射牲相孤卿大夫之法儀注蒸嘗之禮有射豕者國語曰禘郊之事天子必自射其牲今立秋有貙劉云音義貙力朱反一音如字疏注釋曰鄭知蒸嘗之禮有射豕者據逸蒸嘗禮而知云國語曰禘郊之事天子必自射其牲者據祭天之時牲則犢也若然宗廟之祭秋冬則射之春夏否也祭天則四時常射天尊故也是以司弓矢共王射牲之弓矢此射人贊射牲也諸侯已下則不射楚語云劉羊擊豕而已云今立秋有貙劉云者漢時苑中有貙劉即爾雅貙似貍劉殺也云立秋貙殺物引之者證蒸嘗在秋有射牲順時氣之法會同朝覲作大夫介凡有爵者注作讀如作止爵之作諸侯來至王使公卿有事焉則作大夫使之介也有爵者命士以上不使賤者音義介劉古拜反注及下同疏釋曰作使也有㑹同朝覲王使公卿有事於會同則射人使大夫為上介使凡有爵者命士以上為衆介也注釋曰鄭讀作如作止爵之作者讀從特牲少牢三獻作止爵按彼主人主婦二獻尸訖賔長為三獻尸爵止鄭注云欲神惠之均於室中使主人主婦致爵訖三獻則賓長也賓長作起前所止之爵使尸飲之讀從者取動作使之義也大師令有爵者乘王之倅車注倅車戎車之副音義倅七內反劉倉愛反疏注釋曰大師謂王出征伐王乘戎路副車十二乘皆從王行則使有爵者命士已上乘之知倅車戎車之副者戎僕云掌王倅車之政鄭云倅車之副也有大賓客則作卿大夫從注作者選使從王見諸侯音義從才用反注同疏注釋曰大賔客不言㑹同則是秋冬覲遇并春夏受享在廟之時從王見諸侯也戒大史及大夫介注戒戒其當行者覲禮曰諸公奉篋服加命書于其上升自西階東面大史氏右疏注釋曰此謂王有命使三公命諸侯及衣服就館賜之時則射人戒大史及大夫與諸公為介注引覲禮者證王使諸公就館賜侯氏之法云大史氏右者謂於西階東面之時大史在公之右命侯氏也是以公羊傳曰命者何加我服錫者何賜也大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罰之注僕人大僕也僕人與射人俱掌王之朝位也王崩小斂大斂遷尸于室堂朝之象也檀弓曰扶君卜人師扶右射人師扶左君薨以是舉苛謂詰問之音義比毗志反苛音何又呼何反朝直遙反下皆同疏釋曰作大夫掌事者謂王喪宜各有職掌比其廬者謂若宫正所云親者貴者居廬當比其本服親疏及貴賤注釋曰知僕人大僕也者見大僕掌內朝射人掌正朝掌事是同周禮又更無僕人職故知是大僕是以鄭云僕人與射人俱掌王之朝位也云王崩小斂大斂遷尸於室堂者始死於北牖下遷尸於南牖下又云小斂於戶內是遷尸於室小斂訖遷尸於戶外又遷尸大斂大斂於阼階大斂訖又遷尸於西階以入棺是遷尸於堂也云朝之象也者君所在臣朝之故云朝之象也引檀弓者證射人與僕人君之疾薨皆是二人之事彼鄭云尸當為僕即僕人也服不氏掌養猛獸而教擾之注猛獸虎豹熊羆之屬擾馴也教習使之馴服王者之教無不服音義擾而小反劉音饒羆彼皮反馴似遵反一音脣疏注釋曰猛獸云之屬者兼有豺狼貔貅之等故云之屬教馴之象天下皆服王者之教無不服故也凡祭祀共猛獸注謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不熟音義蹯音煩掌也疏注釋曰上云養猛獸則猛獸皆養之此言祭祀所共據堪食者故鄭云謂中膳羞中膳羞唯有熊狼故引獸人與春秋為證按內則亦云狼臅膏可食也春秋傳者宣公二年晉靈公之時宰夫胹熊蹯不熟殺之趙盾諫之是也賓客之事則抗皮注鄭司農云謂賓客來朝聘布皮帛者服不氏主舉藏之抗讀為亢其讐之亢𤣥謂抗者若聘禮曰有司二人舉皮以東音義抗注亢同苦浪反劉公郎反疏注釋曰朝聘布皮帛者按聘禮行享禮之時皮帛布於庭使服不氏舉皮以東抗即舉也故引為證也讀為亢其讐之亢者讀從僖二十八年城濮之戰子犯云背惠食言以亢其讐引之者取亢舉之義也後鄭引聘禮者增成先鄭義二人者即服不氏也射則贊張侯以旌居乏而待獲注贊佐也大射禮曰命量人巾車張三侯杜子春云待當為持書亦或為持乏讀為匱乏之乏持獲者所蔽𤣥謂待獲待射者中舉旌以獲音義巾如字劉居吝反中丁仲反疏注釋曰引大射者證服不氏佐量人巾車張侯之事後鄭云待獲待射者中舉旌以獲者以獲則大射禮唱獲者居乏中中則舉旌以宫下旌以啇者是也故不從子春待為持也射鳥氏掌射鳥注鳥謂中膳羞者鳬鴈鴇梟之屬音義射食亦反下射鳥同鳬音扶鴇音保梟于苖反疏注釋曰知中膳羞者以上文猛獸有共祭祀此下文云祭祀驅烏鳶烏鳶不中膳羞則驅之此經直云射鳥明是中膳羞者也鄭知鳬鴈鴇梟者內則云舒鳬翠鴈腎鵠梟胖此等去翠腎胖是可膳羞者也云之屬者兼有雉鶉鷃之等也祭祀以弓矢驅烏鳶凡賓客㑹同軍旅亦如之注烏鳶善鈔盜便汙人音義驅起居反鳶弋専反鈔初教反又初交反便婢面反劉符絹反疏釋曰賓客㑹同驅烏鳶者以其㑹同皆有盟詛之禮殺牲之事軍旅亦有斬牲徇陳之事故須驅烏鳶射則取矢矢在侯高則以並夾取之注鄭司農云王射則射鳥氏主取其矢矢在侯高者矢著侯高人手不能及則以並夾取之並夾針箭具夾讀為甲故司弓矢職曰大射燕射共弓矢並夾音義夾音甲著直略反針其炎反季其嚴反沈云或作鉆疏注釋曰射皆三番第一番唯有六耦三耦誘射雖中不獲第二第三皆衆耦共射皆釋獲有取矢之法先鄭引司弓矢職直有大射燕射不言賓射亦同大射燕射也羅氏掌羅烏鳥注烏謂卑居鵲之屬音義卑音匹又如字疏注釋曰鄭知烏卑居者見小辨詩云辨彼鸒斯歸飛提提注云鸒卑居卑居雅烏云鵲者即山鵲卑居之類云之屬者兼有餘鳥也蠟則作羅襦注作猶用也鄭司農云蠟謂十二月大祭萬物也郊特牲曰天子大蠟謂歲十二月合聚萬物而索饗之襦細密之羅襦讀為繻有衣絮之繻𤣥謂蠟建亥之月此時火伏蟄者畢矣豺既祭獸可以羅網圍取禽也王制曰豺祭獸然後田又曰昆蟲已蟄可以火田今俗放火張羅其遺教音義襦女俱反或音須注繻同索色白反絮女居反字又作袽疏注釋曰先鄭所云其義得矣後鄭增成之言蠟者直取當蠟之月得用細密之網羅取禽獸故後鄭云此時火伏十月之時火星已伏在戌將蟄者畢矣引王制者證十月蠟祭後得火田有張羅之事云今俗放火張羅其遺教者漢之俗間在上放火於下張羅承之以取禽獸是周禮之遺教則知周時亦上放火下張羅也中春羅春鳥獻鳩以養國老行羽物注春鳥蟄而始出者若今南郡黃雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣行謂賦賜音義中音仲疏注釋曰此文仲春行羽物按司裘職云仲秋獻良裘王乃行羽物彼注云仲秋鳩化為鷹仲春鷹化為鳩順其始殺與其將止而大班羽物若然則一年二時行羽物但彼注云此羽物小鳥鶉雀之屬鷹所擊者此注云春鳥若今南郡黃雀之屬不同者各舉一邊互見其義掌畜掌養鳥而阜蕃教擾之注阜猶盛也蕃蕃息也鳥之可養使盛大蕃息者謂鵝鶩之屬音義蕃音燔注同鵝五何反鶩音木疏注釋曰云鳥之可養使盛大蕃息者謂鵝鶩之屬者鶩即今之鴨民間所畜故云焉祭祀共卵鳥注其卵可薦之鳥音義卵劉本作卯音卵疏注釋曰還謂上經鵝鴨之屬其雞亦在焉歲時貢鳥物注梟鴈之屬以四時來疏注釋曰不言鵝鶩雞者所畜非貢物故以野鳥為貢者也共膳獻之鳥注雉及鶉鴽之屬音義鶉音純鴽音如疏注釋曰此言堪膳而獻者惟有此等是以內則及公食大夫上大夫二十豆有雉兔鶉鴽云之屬者更有餘鳥也周禮注疏卷三十周禮注疏卷三十考證司勳大功司勳藏其二疏鄭知功書藏於天府者天府職文也臣人龍按春官天府無此文鄭以意度之耳疏語未詳何據惟加田無國正疏載師又有仕田考載師職有士田無仕田又少牢特牲是大夫有田者牢監本訛宰今改正第大夫下應增士字量人凡祭祀饗賓疏毛云傅火曰燔傅監本訛傳今考詩生民篇傳改正掌喪祭奠竁之俎實疏謂苞牲取下體葦苞一是也監本苞訛包一訛二今考既夕篇改正小子凡沈辜疏九門者王之五門外有國門近郊門逺郊門關門為九關監本訛闕今改正環人掌致師注御下掚馬掉鞅而還掚監本訛􅧇左傳作兩今依釋文改正又皆行其所聞而復之左傳無之字巡邦國搏諜賊疏此諜賊即上軍慝之類彼據王國此據邦國故異言之監本脫王國此據四字既與上察軍慝節對言則當有二者相形眀矣今補正射人以射法治射儀注治射儀謂肆之也考古肄字亦作肆又疏張皮侯而棲鵠監本脫侯字今据考工記補之會同朝覲作大夫介凡有爵者疏鄭讀作如作止爵之作者讀從特牲少牢三獻作止爵臣紱按三獻作止爵特牲之文非少牢也周禮注疏卷三十考證
