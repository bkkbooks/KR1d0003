body:
  text: 周禮注疏卷四十一漢鄭氏注唐陸德明音義賈公彥疏冬官考工記下玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之注命圭者王所命之圭也朝覲執焉居則守之子守穀璧男守蒲璧不言之者闕耳故書或云命圭五寸謂之躬圭杜子春云當為七寸𤣥謂五寸者璧文之闕亂存焉音義信音身朝直遙反下皆同疏釋曰云玉人之事者謂人造玉瑞玉器之事此一句總與下諸文為目圭名鎮名信及躬備於宗伯注釋曰云命圭者王所命之圭也者公羊傳云錫者何賜也命者何加我服也於王以䇿命諸侯之時非直加之以車服時即以圭授之以為瑞信者也朝覲執焉者典瑞云公執桓圭以下朝覲宗遇㑹同于王諸侯相見亦如之是也云居則守之者謂以為鎮守者也故云居則守之子守穀璧男守蒲璧典瑞宗伯大行人俱有其文於此不言之者闕也鄭云闕者若韋氏櫛氏之類亦闕也若然經有鎮圭按典瑞云王執鎮圭繅藉五采五就以朝日鄭不言者有典瑞可參故直舉諸侯可知也子春破故書五寸當從經七寸後鄭不從以從故書為五寸五寸是璧文之闕亂存者命圭是伯五寸是子男故亂存也天子執冒四寸以朝諸侯注名玉曰冒者言德能覆蓋天下也四寸者方以尊接卑以小為貴疏注釋曰鄭知名玉曰冒言德能覆蓋天下者案書傳云古者圭必有冒言不敢專達之義天子執冒以朝諸侯見則覆之注云君恩覆之臣敢進是其冒覆之事案孔注顧命云言冒所以冒諸侯圭以齊瑞信方四寸邪刻之不言冒以覆蓋天下者義得兩含故注有異故書傳云古者圭必有冒亦是冒圭之法也此冒據朝覲諸侯時執之詩殷頌云受小球大球為下國綴旒注云小球尺二寸大球長三尺與下國結定其心如旌旗之旒彼據天子與諸侯盟㑹故云結定其心故執鎮圭不執冒也天子用全上公用龍侯用瓚伯用將注鄭司農云全純色也龍當為尨尨謂雜色𤣥謂全純玉也瓚讀為􅊡􅖸之􅖸龍瓚將皆雜名也卑者下尊以輕重為差玉多則重石多則輕公侯四玉一石伯子男三玉二石音義龍莫江反瓚才早反下同司農音讃將如字劉音陽􅊡之然反􅖸作旦反下遐嫁反疏注釋曰此經因天子以下執玉遂說尊卑之玉善惡不同注釋曰先鄭云全純色也龍當為尨尨謂雜色後鄭以為全純玉也純玉即純色義無殊瓚讀􅊡􅖸之􅖸者醢人職有􅊡食漢時有膏􅖸今連言􅊡􅖸者取雜意云龍瓚將皆雜名者謂玉之雜名此亦含雜色必知後鄭玉雜中含色者見鄭異義駮云玉雜則色雜則知玉全色亦全也云卑者下尊以輕重為差玉多則重石多則輕知者見盈不足術曰玉方寸重七兩石方寸重六兩云公侯四玉一石伯子男三玉二石者按禮緯云天子純玉尺二寸公侯九寸四玉一石伯子男三玉二石此注出於彼但此經公與侯異注及彼文公侯同又彼伯子男同七寸皆與此經不同者彼據殷法但玉石多少與周同故引之也若然公侯同四玉一石而龍瓚異者蓋玉色有别也繼子男執皮帛注謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾天子之孤表帛以虎皮此說玉及皮帛者遂言見天子之用贄音義見禮賢遍反下同疏釋曰此公之孤上不言子男而此云繼子男者以上文不見子男也不見者以子男與伯同用三玉二石故空其文見子男與伯等以是得言以皮帛繼子男也以大行人注言之此亦是孤尊更以其贄見也注釋曰知諸侯孤飾贄以豹皮天子之孤飾以虎皮者郊特牲云虎豹之皮示服猛也二者皮中為美虎皮又貴天子孤尊故知義然也天子圭中必注必讀如鹿車縪之縪謂以組約其中央為執之以備失隊音義必府結反戚如字縪劉府結反沈音畢云劉音非也按北俗今猶有此語音如劉音蓋古語乎劉音未失組約如字劉阿駮反為于僞反隊直類反疏釋曰上列天子及公侯伯之圭於此獨言天子圭中必者按聘禮記五等諸侯及聘使所執圭璋皆有繅藉及絢組絢組所以約圭中央恐失墜即此中必之類若然圭之中必尊卑皆有此不言諸侯圭舉上以明下可知注釋曰云讀如鹿車縪之縪者俗讀之也此縪絢組一也四圭尺有二寸以祀天注郊天所以禮其神也典瑞職曰四圭有邸以祀天旅上帝音義邸丁禮反又音帝下文同疏釋曰此圭典瑞直言所用禮神不言尺寸故此言之此直言尺二寸按典瑞注先鄭云中央為璧圭著其四面一玉俱成又云圭末四出若然此尺二寸者未知璧在中央通兩畔總計為尺二寸未知除璧之外兩畔之圭各有一尺二寸據下裸圭尺有二寸而言則此四圭圭别尺有二寸仍未審以璧為邸邸徑幾許禮既無文不可强記也注釋曰引典瑞者證祀天為夏正郊所感帝兼國有故旅祭五帝之事亦以此圭禮神也大圭長三尺杼上終葵首天子服之注王所搢大圭也或謂之珽終葵椎也為椎於其杼上明無所屈也杼閷也相玉書曰珽玉六寸明自照音義杼直吕反珽他頂反椎直追反下同閷色界反劉色例反殺字之異者本或作殺下取殺殺文同相息亮反照音照疏釋曰言大圭者以其長故得大圭之稱言服之者以其搢於衣帶之間同於衣服故以服言之注釋曰云王所搢大圭也者典瑞云王搢大圭執鎮圭繅藉五采五就以朝日是也云或謂之珽者玉藻云天子搢珽方正於天下也鄭云言珽然無所屈此注亦云明無所屈皆對諸侯為荼大夫前屈後屈故云無所屈也云終葵椎也者齊人謂椎為終葵故云終葵椎也云相玉書曰珽玉六寸明自照者謂於三尺圭上除六寸之下兩畔殺去之使巳止為椎頭言六寸據上不殺者而言云明自照者玉體瑜不掩瑕瑕不掩瑜善惡露見是其忠實君子於玉比德焉言忠實故云明自照也引之者證大圭者為終葵六寸以下杼之也土圭尺有五寸以致日以土地注致日度景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而致其域音義景度待洛反此下注同疏釋曰言土圭謂度土地遠近之圭故云土圭注釋曰云致日度景至不者於地中立八尺之表於中漏半夏至日表北尺五寸景與土圭等冬至日丈三尺為景至若不依此皆為不至故云度景至不也但景至與不至皆由君政得失而來度之者若不至使君改德教也云夏日至之景尺有五寸冬日至之景丈三尺者皆通卦驗文大司徒亦云夏日至之景尺有五寸謂之地中云土猶度也建邦國以度其地而致其域者此度地封諸侯日景一分地差百里五等諸侯直取五分景已下無取尺寸之義也祼圭尺有二寸有瓚以祀廟注祼之言灌也或作淉或作果祼謂始獻酌奠也瓚如盤其柄用圭有流前注音義祼古亂反注淉果皆同疏釋曰鄭注小宰云唯人道宗廟有祼天地大神至尊不祼故此唯云以祀廟典瑞兼云以祼賔客此不言者有典瑞故作文略也注釋曰讀祼為灌者取水灌之義云祼謂始獻酌奠也者小宰注云祼亦謂祭之啐之奠之以其尸不飲故云奠之按司尊彝注祼謂始獻尸郊特牲注云始獻神也蓋以其祼入獻于尸故云獻尸以灌圭為降神故云獻神三注雖曰不同其義一也云瓚如盤其柄用圭有流前注者鄭注典瑞引漢禮瓚盤大五升口徑八寸下有盤口徑一尺言有流前注者按下三璋之勺鼻寸是也言前注者以尸執之向外祭乃注之故云有流前注也琬圭九寸而繅以象德注琬猶圜也王使之瑞節也諸侯有德王命賜之使者執琬圭以致命焉繅藉也音義琬於阮反繅音早使所吏反下同藉慈夜反疏釋曰典瑞云琬圭以治德以結好此不言結好此文略彼云治德據使者而言此言象德據圭體而說彼不言有繅此言有繅亦是互見為義注釋曰云諸侯有德王命賜之使者執琬圭以致命焉者若天王使毛伯來錫公命公羊云錫者何賜也命者何加我服也是諸侯有德王使人賜命之事也琰圭九寸判規以除慝以易行注凡圭琰上寸半琰圭琰半以上又半為瑑飾諸侯有為不義使者征之執以為瑞節也除慝誅惡逆也易行去煩苛音義琰餘冉反慝吐得反易以豉反又音亦改也行下孟反注同以上時掌反瑑直轉反去起吕反苛音何疏注釋曰知凡圭琰上寸半者禮記雜記文知此琰圭琰半以上又半為瑑飾者以其言判判半也又云規明半以上琰至首規判以下為瑑飾可知云諸侯有為不義使者征之執以為瑞節也者此釋除慝故引經文除慝誅惡逆也云易行去煩苛者此非惡逆之事直政教煩多而苛虐是諸侯行惡故王使人執之以為瑞節易去惡行璧羡度尺好三寸以為度注鄭司農云羡徑也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環𤣥謂羡猶延其袤一尺而廣狹焉音義羡以善反延也又音賤徑也好呼報呼老二反注同肉柔又柔育二反下同瑗于眷反劉于願反袤音荗疏注釋曰引爾雅欲見此璧好三寸好即孔也兩畔肉各三寸兩畔共六寸是肉倍好也後鄭云羡猶延其袤一尺而廣狹焉者是羡為不圜之貌造此璧之時應圜徑九寸今減廣一寸以益上下之袤一寸則上下一尺廣八寸故云其袤一尺而廣狹焉狹焉謂八寸也以為度者天子以為量物之度也圭璧五寸以祀日月星辰注禮其神也圭其邸為璧取殺於上帝疏注釋曰此圭璧謂以璧為邸旁有一圭故云圭其邸為璧也云取殺於上帝者按上文四圭以祀天此日月星辰為天之佐故一圭是取殺於上帝也按典瑞云兩圭有邸以祀地璋邸射以祀山川彼山川亦取殺於地此不言者文略彼又有珍圭牙璋此不言者亦是文略並玉人造之可知璧琮九寸諸侯以享天子注享獻也聘禮享君以璧享夫人以琮音義琮才宗反疏注釋曰按小行人二王後享天子及后用圭璋則此璧琮九寸據上公引聘禮者欲見經云享天子用璧享后用琮此據上公九命若侯伯當七寸子男當五寸穀圭七寸天子以聘女注納徵加於束帛疏注釋曰自士已上皆用𤣥纁束帛但天子加以穀圭諸侯加以大璋也大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬注射琰出者也勺故書或作約杜子春云當為勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也𤣥謂鼻勺流也凡流皆為龍口也衡古文橫假借字也衡謂勺徑也三璋之勺形如圭瓚天子巡守有事山川則用灌焉於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事焉將有事於四海山川則校人飾黃駒音義射食亦反注及下注同勺上灼反注同衡音橫注衡謂並同祈沈如字劉居綺反小爾雅曰祭山川曰祈沈按爾雅祭山曰庪縣祭川曰浮沈祈音九委反今讀宜依爾雅音大祝音泰校户教反疏釋曰此經說王巡守出行過山川禮敬之事三璋據為勺柄黃金勺以下據為勺頭注釋曰射琰出者也者向上謂之出謂琰半已上其半已下為文飾也先鄭云鼻謂勺龍頭鼻後鄭增成其義衡謂勺柄龍頭後鄭不從𤣥謂衡古文為橫謂勺徑破先鄭為勺柄云三璋之勺形如圭瓚者圭瓚之形前注已引漢禮但彼口徑八寸下有盤徑一尺此徑四寸徑既倍狹明所容亦小但形狀相似耳故云形如圭瓚也知用灌者以其圭瓚灌宗廟明此巡守過山川用灌可知於大山川已下至半文飾皆無正文鄭君以意解之云祈沈以馬者取校人飾黃駒故知馬也知宗祝亦執勺以先之者即引大祝職云王過大山川則大祝用事焉是大祝用此經黃金勺之事也云將有事于四海山川則校人飾黃駒者校人職文引之者見禮山川非直灌亦有牲牢以山川地神故用黃駒也大祝職云王過大山川大祝用事不言中山川小山川者舉大者而言或使小祝為之也大璋亦如之諸侯以聘女注亦納徵加於束帛也大璋者以大璋之文飾之也亦如之者如邊璋七寸射四寸疏注釋曰鄭知以大璋之文飾之者以其與上大璋同名明以大璋之文飾之也又知如邊璋七寸射四寸者以其天子穀圭七寸以聘女諸侯不可過於天子為九寸既文承邊璋之下而言亦如之明知如邊璋七寸射四寸也瑑圭璋八寸璧琮八寸以眺聘注瑑文飾也眺視也聘問也衆來曰眺特來曰聘聘禮曰凡四器者唯其所寶以聘可也音義眺吐弔反疏釋曰此謂上公之臣執以眺聘用圭璋享用璧琮於天子及后也若兩諸侯自相聘亦執之侯伯之臣宜六寸子男之臣宜四寸注釋曰云瑑文飾也者凡諸侯之臣眺聘並不得執君之桓圭信圭之等直瑑為文飾耳云眺視也聘問也者按大宗伯云時聘曰問殷眺曰視故據彼而言也云衆來曰眺特來曰聘者衆來則元年七年十一年一服朝之嵗來者衆也特來則天子有事乃來無常期者是也引聘禮者彼亦云圭璋璧琮四器故引以為證云所寶謂不聘時寶之牙璋中璋七寸射二寸厚寸以起軍旅以治兵守注二璋皆有鉏牙之飾於琰側先言牙璋有文飾也音義鉏劉李側魚反沈徐加仄疏注釋曰牙璋起軍旅治兵守正與典瑞文同彼無中璋者以其大小等故不見也牙璋起軍旅則中璋亦起軍旅二璋蓋軍多用牙璋軍少用中璋鄭知二璋皆為鉏牙之飾者以其同起軍旅又以牙璋為首故知中璋亦有鉏牙但牙璋文飾多故得牙名而先言也駔琮五寸宗后以為權注駔讀為組以組繫之因名焉鄭司農云以為稱錘以起量音義駔音祖稱尺證反錘直僞反劉直危反疏釋曰此后所用故五寸降於下文天子所用七寸者也注釋曰駔讀為組者於義無取於駔故從組以其用組為繫言因名焉者以組為繫名組琮似以玉飾豆即名玉豆其類也先鄭云以為稱錘以起量者量自是斗斛之名而云為量者對文量衡異散文衡亦得為量以其量輕重故也大琮十有二寸射四寸厚寸是謂內鎮宗后守之注如王之鎮圭也射其外鉏牙疏釋曰言大琮者對上駔琮五寸為大也言十有二寸者并角徑之為尺二寸言射四寸者據角各出二寸兩相并四寸言是謂內鎮者對天子執鎮圭為內謂若內宰對大宰為內內司服對司服為內王不言外者男子居外是其常但婦人陰則得內稱也注釋曰云射其外鉏牙者據八角鋒故云鉏牙也駔琮七寸鼻寸有半寸天子以為權注鄭司農云以為權故有鼻也疏釋曰此天子以為權故有鼻上后權不言鼻者舉以見后亦有鼻可知兩圭五寸有邸以祀地以旅四望注邸謂之柢有邸僢共本也音義柢音帝劉作枑户古反僢昌絹仄疏釋曰此亦依典瑞所解謂祀神州之神於北郊及國有故旅祭四望以對四圭有邸祀天及旅上帝也若天地自用黃琮云僢共本也者亦一玉俱成兩圭尺相對為僢也瑑琮八寸諸侯以享夫人注獻於所朝聘君之夫人也疏釋曰言以享夫人則是諸侯自相朝所用致享者也五等諸侯朝天子享用璧琮不降瑞若自相享降瑞一等此八寸據上公二王後自相享亦用璧琮八寸侯伯當六寸子男自相享退用琥璜降用四寸此經直言瑑琮不言瑑璧以享君文略可知也注釋曰經言諸侯止是朝注兼云聘者其臣聘瑑圭璋璧琮亦皆降一等與君寸數同故兼言聘也案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯注純猶皆也鄭司農云案玉案也夫人天子夫人𤣥謂案玉飾案也夫人王后也記時諸侯僭稱王而夫人之號不别是以同王后於夫人也玉案十二以為列王后勞朝諸侯皆九列聘大夫皆五列則十有二列者勞二王之後也棗㮚實於器乃加於案聘禮曰夫人使下大夫勞以二竹簋方𤣥被纁裏有蓋其實棗蒸㮚擇兼執之以進音義勞力報反注同被皮寄反疏釋曰案十有二寸者謂玉案十有二枚云棗㮚十有二列案案皆有棗㮚為列十有二者還據案十二為數不謂一案之上十有二也注釋曰先鄭云夫人天子夫人後鄭不從者勞諸侯以王后為主豈不見后先見三夫人乎故不從也𤣥謂案玉飾案也者以其在玉人故知以玉飾案也云記時諸侯僭稱王者春秋之世吳楚及越僭號稱王而吳楚夫人不稱后是夫人之號不别也云是以同王后于夫人也者周王與吳楚同號王故周王后號亦下同吳楚之夫人也云案十有二以為列者微破賈馬以此十二列比聘禮醯醢夾碑百罋十以為列云王后勞朝諸侯皆九列聘大夫皆五列則十二列勞三王之後也者以其經夫人以勞諸侯文在下總結上文三者故以此義推量之也云棗㮚實于器乃加於案者此約聘禮故即引聘禮為證也聘禮五介入境張旃是侯伯之卿大夫聘者也而主國夫人使下大夫勞賓以二竹簋方者簋法圓今此竹簋方為之者此或棗㮚與黍稷簋異也𤣥被者以𤣥繒為表被聘禮諸侯夫人使下大夫勞無案直有棗㮚此后勞冇棗㮚又亦有案引之者證此棗㮚亦盛於竹簋者也璋邸射素功以祀山川以致稍餼注邸射剡而出也致稍餼造賓客納稟食也鄭司農云素功無瑑飾也餼或作氣杜子春云當為餼音義造七報反疏注釋曰云以祀山川者謂四望之外所有山川皆是云邸射剡而出也者向上謂之出半圭曰璋璋首邪却之今於邪却之處從下向上總邪却之名為剡而出云致稍餼造賓客納稟食也者謂賓客在館主君使人造賓客納稟食稟食則米者也以其經云稍餼稍稍致之是食米曰稟者也楖人闕音義楖莊密反本或作櫛雕人闕音義雕音雕本亦作雕磬氏為磬倨句一矩有半注必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳音義倨音據句沈音鉤注同劉如字先度待洛反疏注釋曰鄭云必先度一矩為句者據上曲者一矩為股據下直者而求其弦者弦謂兩頭相望者云既而以一矩有半觸其弦者假令句股各一尺今以一尺五寸觸兩弦其句股之形即磬之倨句折殺也云磬之制有大小者按有樂經云磬前長三律二尺七寸後長二律尺八寸是磬大小之制也云此假矩以定倨句非用其度耳者謂此經倨句各一矩并一矩有半皆假設言之以定倨句及其作磬非用此度自依律長短為之也其博為一注博謂股博也博廣也疏注釋曰鄭知此博是股廣在上者以其下又因此博而云股為二明此博即股廣也此上下云一二三者此亦假一二三而為長短廣狹故不言尺寸也股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚注鄭司農云股磬之上大者鼓其下小者所當擊者也𤣥謂股外面鼓內面也假令磬股廣四寸半者股長九寸也鼓廣三寸長尺三寸半厚一寸音義去起吕反令力呈反後皆同疏注釋曰先鄭云股磬之上大者鼓其下小者以其股面廣鼓面狹故以大小而言也𤣥謂股外面也者以其在上故以為外鼓內面也者以其在下故以為內言假令者經直言一二三不定尺寸是假設之言也若定尺寸自當依律為短長也以四寸半為法者直取從此以下為易計非實法也已上則摩其旁注鄭司農云磬聲大上則摩鑢其旁𤣥謂大上聲清也薄而廣則濁音義上時掌反注同大音泰劉他賀反下同鑢音慮疏注釋曰先鄭直云摩鑢其旁不言處所故後鄭增成之凡樂器厚則聲清薄則聲濁今大上是聲清故摩使薄薄而廣則濁也已下則摩其專注大下聲濁也短而厚則清音義專音端劉又音穿本或作端疏注釋曰此聲濁由薄薄不可使厚故摩使短短則形小形小則厚厚則聲清也矢人為矢鍭矢參分茀矢參分一在前二在後注參訂之而平者前有鐵重也司弓矢職茀當為殺鄭司農云一在前謂箭槀中鐵莖居參分殺一以前音義鍭矢音侯劉音候茀依注音殺色黠反劉色例反李音拂訂音亭劉當定反槀古老反下同疏注釋曰云參訂之而平者以其言參分一在前二在後明據稱量得訂而言之云前有鐵重也者若不前鐵重何以參分得訂也引司弓矢職者彼鍭矢與殺矢相對茀矢自與矰矢相對此上既言鏃矢明下宜有殺矢對之故破此茀為殺矢也鄭云一在前謂箭槀中鐵莖居參分殺一以前者後鄭意直據近鏃鐵多先鄭據長短又以參分殺之近鏃宜細以其鏃長近鏃雖殺猶重與後鄭義合故引之在下也兵矢田矢五分二在前三在後注鐵差短小也兵矢謂枉矢潔矢也此二矢亦可以田田矢謂矰矢音義潔苦結反又音結矰音增疏注釋曰云鐵差短小也者前參分一在前得訂此五分二在前得訂故知鐵差短小也云兵矢謂枉矢潔矢也者以司弓矢職參之下有七分當茀矢矰矢此五分當枉矢潔矢也云田矢為矰矢者依鄭志此云田矢謂矰矢非謂經中田矢正是下文七分者若然既非經之田矢鄭言之者欲見矰矢正田矢此經二矢亦可以田若然經枉矢潔矢非直為兵矢亦將田獵故云此二矢亦可以田也按鄭志趙商問司弓矢注云凡矢之制矰矢之屬七分三在前四在後按矢人職曰田矢五分二在前三在後注云田矢謂矰矢數不相應不知所裁答曰田矢謂矰矢此先定後云此二矢亦可以田頃若少疾此疏初在篋笥之間屬録事得之謹答若然鄭君本意以矰矢為田矢非經田矢自是尋常田矢此二矢亦可以田解經田矢是枉矢潔矢非直為兵矢此二者亦可以田也此鄭云田矢謂矰矢按司弓矢職枉矢潔矢言利諸田獵茀矢矰矢直言弋射不言田獵而云田矢者弋射即是田獵也按司弓矢職枉矢潔矢在前後乃云鍭矢殺矢此矢人先言鍭矢殺矢者彼據事之重者為先以其枉矢潔矢用諸戰伐是重故在前此據鐵輕重重者在前故不同也閷矢七分三在前四在後注鐵又差短小也司弓矢職閷當為茀音義閷依注為茀劉符弗反李音拂疏注釋曰上經已破茀當為殺此閷固宜為茀與矰矢同七分故亦引司弓矢證之也此經直言茀矢不言矰矢者以其與茀矢同制故略而不言也言鐵又差短小也者以其前五分三在前此七分三在前是差短小也參分其長而閷其一注矢槀長三尺殺其前一尺令趣鏃也音義閷本又作殺色界反注下皆同趣七喻反一音促鏃子木反或七本反疏注釋曰按槀人注矢服長短之制未聞今此注云矢槀長二尺彼以無正矢故云未聞此云三尺者約羽六寸逆差之故知三尺也五分其長而羽其一注羽者六寸音義羽于付反注及下同以其笴厚為之羽深注笴讀為槀謂矢幹古文假借字厚之數未聞音義笴古老反下相笴同水之以辨其隂陽注辨猶正也隂沈而陽浮音義辨皮勉反劉方勉反疏注釋曰就其浮沈刻記之夾其陰陽以設其比夾其比以設其羽注夾其陰陽者弓矢比在槀兩旁弩矢比在上下設羽於四角鄭司農云比謂括也音義夾古洽反劉古協反比毗志反下及注同疏注釋曰云弓矢比在槀兩旁者以其弓豎用之故比在槀之兩旁云弩矢比在上下者以其弩弓橫用之故比在槀上下云設羽於四角者無問弓之矢弩之矢比在兩旁上下皆設羽於四角同也參分其羽以設其刃注刃二寸疏注釋曰知刃二寸者以其言參分其羽以設其刃不可參分取二分作四寸刃明知參分取一得二寸為刃故知刃二寸則雖有疾風亦弗之能憚矣注故書憚或作但鄭司農云讀當為憚之以威之憚謂風不能驚憚箭也音義憚音怛都達反李直旦反注同李又直丹反刃長寸圍寸鋌十之重三垸注刃長寸脫二字鋌一尺音義鋌徒頂反垸音丸疏注釋曰知脫二字者據上參分其羽以設其刃若刃一寸則羽三寸矢一尺五寸便大短明知脫二字也前弱則俯後弱則翔中弱則紆中强則揚羽豐則遲羽殺則躁注言幹羽之病使矢行不正俯低也翔迥回顧也紆曲也揚飛也豐大也躁旁掉也音義躁音躁子到反沈又色到反掉徒弔反是故夾而搖之以視其豐殺之節也注今人以指夾矢儛衛是也音義搖本又作㨱羊招反疏釋曰上經陳幹羽失所今此經說知矢之羽病狀故云夾而搖之以視其豐殺之節也橈之以視其鴻殺之稱也注橈榒其幹音義橈乃孝反稱尺證反榒女角反疏釋曰此經說知矢幹之病狀此言鴻即上文强是也此言殺即上文弱是也凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚注相猶擇也生謂無瑕蠧也摶讀如摶黍之摶謂圜也鄭司農云欲㮚欲其色如㮚也音義相息亮反注同摶徒丸反蠧丁故反疏注釋曰云生謂無瑕蠧也者直言欲生於義無所取故以無瑕蠧解之無瑕謂無異色無蠧謂無蠧孔也云摶讀如摶黍之摶者讀如爾雅釋鳥黃鳥摶黍也此取其摶圜之義先鄭云欲㮚欲其色如㮚也者觀經㮚義取堅實先鄭云色如㮚即是堅實者陶人為甗實二釜厚半寸脣寸盆實二釜厚半寸脣寸甑實二釜厚半寸脣寸七穿注量六斗四升曰釜鄭司農云甗無底甑音義甗魚輦反又音唁劉魚建反沈魚偃反一音彥甑也釜音輔疏注釋曰六斗四升曰釜昭三年左氏傳齊晏子辭云甗無底甑者對甑七穿是有底甑鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸注鄭司農云觳讀為斛觳受三斗聘禮記有斛𤣥謂豆實三而成觳則觳受斗二升庾讀如請益與之庾之庾音義鬲實音歷觳音斛疏注釋曰先鄭云觳讀為斛觳受三斗又引聘禮記有斛者按下瓬人豆實三而成觳受斗二升有成文而先鄭讀觳為斛斛受十斗又云觳受三斗復引聘禮記冇斛其言自相亂後鄭皆不從之也𤣥謂豆實三而成觳出於下文引之破先鄭觳受三斗或十斗也讀庾為請益與之庾之庾者讀從論語孔子答冉有辭小爾雅掬二升二掬為豆豆四升四豆曰區四區曰釡二釜有半謂之庾者庾本有二法故聘禮記云十六斗曰藪注云今文藪為逾逾即庾也按昭二十六年申豐云粟五千庾杜注云庾十六斗以此知庾有二法也瓬人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺注崇高也豆實四升音義瓬方往反疏釋曰祭宗廟皆用木簋今此用瓦簋據祭天地及外神尚質器用陶匏之類也注云豆實四升者晏子辭按易損卦彖云二簋可用享四以簋進黍稷於神也初與二直其四與五承上故用二簋四巽爻也巽為木五離爻也離為日日體圜木器而圜簋象也是以知以木為之宗廟用之若祭天地外神等則用瓦簋故郊特牲云掃地而祭於其質也器用陶匏以象天地之性是其義也若然簋法圓舍人注云方曰簠圓曰簋注與此合孝經云陳其簠簋注云內圓外方者彼兼簠而言之凡陶瓬之事髺墾薜暴不入市注為其不任用也鄭司農云髺讀為刮薜讀為藥黃蘗之蘗暴讀為剝𤣥謂髺讀為跀墾頓傷也薜破裂也暴墳起不堅致也音義髺音刮墾苦很反薜卜革反劉薄駁反注同暴音剝又音雹或蒲到反為于僞反任音壬跀劉音月或五刮反一音兀又五活反墳扶粉反致直吏反疏注釋曰先鄭云髺讀為刮刮是亂刮摩之義故不任用理無所取故後鄭不從薜讀為藥黃蘗之蘗取音同又以暴為剝者凡為器無剝破之義故後鄭亦不從也𤣥謂髺讀為跀跀謂器不正欹邪者也器中膞豆中縣注膞讀如車輇之輇既拊泥而轉其均尌膞其側以擬度端其器也縣縣繩正豆之柄音義中丁仲反下同膞市專反注輇同縣音懸後皆放此拊音附又方附反尌音𣗳本又作𣗳擬疑紀反度待洛反疏注釋曰云膞讀如車輇之輇者讀從雜記載以輇車之輇取音同也云􅰹膞其側者按下文膞崇四尺上下高四尺無邪曲轉其均之時當擬度此膞宜與膞相應其器則正也豆中縣者豆柄中央把之者長一尺宜上下直與縣繩相應其豆則直膞崇四尺方四寸注凡器髙於此則垺不能相勝厚於此則火氣不交因取式焉音義垺芳符反又普回反勝音升疏注釋曰高於此謂崇四尺有餘也厚於此謂厚於方四寸謂垺拊四畔各一寸也垺厚火氣不交垺不熟則易破者也梓人為簨虡注樂器所縣橫曰簨植曰虡鄭司農云簨讀為竹筍之筍音義息允反本又作筍虡音巨植直吏反又時力反疏釋曰此文與下文為總目耳故下文重說為簨虡之法也注釋曰樂器所縣於筍虡者謂鍾磬鎛者也先鄭筍讀為竹筍之筍筍謂竹初生則醢人筍菹者也亦取音同也天下之大獸五脂者膏者裸者羽者鱗者注脂牛羊屬膏豕屬裸者謂虎豹貔􅣝為獸淺毛者之屬羽鳥屬鱗龍蛇之屬音義裸力果反下同貔音毗螭敕知反疏釋曰此文亦與下為目故下亦别列五者所用不同也注釋曰知脂是牛羊屬膏豕屬者下云二者祭宗廟以為牲故知也鄭注內則云凝者曰脂釋者曰膏裸者謂虎豹貔􅣝淺毛者之屬者按月令季夏亦云其蠱裸注云虎豹淺毛者鱗龍蛇之屬者月令春云其蟲鱗注云龍蛇之屬也宗廟之事脂者膏者以為牲注致美味也疏釋曰上總言於此巳下别言之者欲分别可為筍虡者也裸者羽者鱗者以為筍虡注貴野聲也疏釋曰此三者以為筍虡仍是總言可以為筍虡以别於上云為牲者耳至下文仍更簡别可為筍可為虡二者不同者也外骨內骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢注刻畫祭器博庶物也外骨龜屬內骨蟞屬郤行蚓衍之屬仄行蟹屬連行魚屬紆行蛇屬脰鳴蛙黽屬注鳴精列屬旁鳴蜩霓屬翼鳴發皇屬股鳴蚣蝑動股屬胸鳴榮原屬音義卻羌略反劉去逆反仄音側紆乙俱反李又杳于反脰音豆頸也注陟又反劉都豆反一音之樹反胸鳴本亦作骨又作胸干本作骨云敝屁屬也賈馬作胃賈云靈蠵也鄭云榮原屬也不知榮原之屬以何鳴作骨者恐非也沈云作胸為得亦所未詳聶音胃劉本作胸音鹵琢丁角反蟞必滅反本又作鱉蚓羊忍反衍如字爾雅云蚓衍入耳郭璞云蚰蜒也按此蟲能兩頭行是卻行劉云或作衍蚓衍音延今曲蟺也蛙戶媧反黽莫幸反蜩音條蟬也霓五兮反乂五歷反又五結反蚣息容反蝑思餘反又思呂反榮原如字原亦作螈音同又五丸反疏釋曰上云大鳥獸或為宗廟牲或為筍虡訖今此更别言小蟲之屬以飾祭器者也自紆行以上不能鳴者據行而言自脰鳴巳下能鳴者據鳴而言云以為雕琢者以雕畫及刻為琢飾者也注釋曰此注龜為外骨蟞為內骨按易說卦云離為鱉為蟹為龜注皆云骨在外與此注違者龜鱉皆外骨但此經外骨內骨相對以鱉外有肉緣故為內骨也云卻行蚓衍之屬者按爾雅釋蟲蚓衍入耳按方言云蚓衍注云由延兩音自關而東謂之蚓衍蚓音引云仄行蟹屬者今人謂之旁蟹以其側行故也云連行魚屬者以其魚唯行相隨故謂之連行也云紆行蛇屬者紆曲也以其蛇行屈曲故謂之紆行也云脰鳴蛙黽屬者蛙黽即蝦蟇也脰項也以其項中鳴也云注鳴精列屬者按釋蟲云蟋蟀蛬注云今促織也亦名青􅖹方言楚謂之蟋蟀或謂之蛬南楚之間或謂之王孫云旁鳴蜩霓屬者此即蟬也蟬鳴在脅云翼鳴發皇屬者按爾雅蛂蟥蛢郭云甲蟲也大如虎豆緑色今江東呼為黃蛢即此發皇也云股鳴蚣蝑動股屬者七月詩云五月斯螽動股陸璣云幽州人謂之舂不箕長而青長角長股股鳴者云胸鳴榮原屬者此記本同馬融以為胃鳴干寶本以為骨鳴胃在六府之內其鳴又未可以為狀骨鳴亦難信皆不如作胸鳴也揚雄以為蛇醫或謂之榮原厚脣弇口出目短耳大胸耀後大體短脰若是者謂之裸屬恆有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴注耀讀為哨頎小也鄭司農云宏讀為紘綖之紘謂聲音大也由若也音義弇於檢反耀所教反劉李羊肖反哨音稍劉李音與耀同沈蘇堯反頎音傾李一音懇疏注釋曰云耀讀為哨頎小也者哨與頎皆是少小之義故云哨頎小也凡猛獸有力者皆前粗後細故云大胸耀後先鄭讀宏為紘綖之紘讀從桓二年臧哀伯云衡紞紘綖取其音同耳鋭喙決吻數目顅脰小體騫腹若是者謂之羽屬恆無力而輕其聲清陽而逺聞無力而輕則於任輕宜其聲清陽而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴注吻口腃也顅長脰貌故書顅或作牼鄭司農云牼讀為鬝頭無髮之鬝音義鋭喙況廢反一音昌鋭反決如字又烏穴反吻劉無憤反戚亡粉反數劉音促李粗角反顅苦顔反又楷田反李又古慳反又戶弔反聞音問下同腃音權牼劉苦顔反又客田反一音工定反按左傳有華牼音苦耕反鬝劉苦顔反呂沈同云鬢秃也或苦瞎反一音枯曷反疏釋曰上既言鍾虡此說磬虡磬輕於鍾故畫鳥為飾注釋曰云吻口腃者鳥乃喙長決物食之時則以近喙本決故云決吻鄭云吻口腃也顅長脰貌者脰項也謂長項貌牼先鄭云讀為鬝頭無髮之鬝者時俗有以無髮為鬝故讀從之亦取音同也此是鍾磬之虡不言鑮虡鑮與鍾同以其鑮如鍾而大獨在一虡為異耳小首而長摶身而鴻若是者謂之鱗屬以為筍注摶圜也鴻傭也音義摶徒丸反傭敕龍反疏釋曰上論鍾磬之虡用鳥獸不同此論二者之筍同用龍蛇鱗物為之也故直云為筍不别言鍾之與磬欲見二者同也凡攫閷援簭之類必深其爪出其目作其鱗之而注謂筍虡之獸也深猶藏也作猶起也之而頰􅝋也音義攫俱縛反舊居碧反李又九夫反閷色界反劉色例及援音哀簭音筮頰􅝋許愼口忽反云秃也劉古本反李又其懇反一音苦紇反又音混疏釋曰此及下經覆釋上文鍾虡之獸云攫閷者攫著則殺之援攬則噬之如此之類必藏其瓜出其目又作其鱗之而鱗之而謂動頰􅝋此皆可畏之貌也注釋曰此說鍾虡之獸不言筍鄭言筍者筍虡相將之物故連言之耳云鱗之而頰􅝋也者舊讀􅝋字以沽罪反謂起其頰􅝋鄭𤣥以為於義無所取當為頰􅝋音壺讀之於義為允也深其爪出其目作其鱗之而則於視必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣注匪采貌也故書撥作廢匪作飛鄭司農云廢讀為撥飛讀為匪以似為發音義撥必末反沈蒲末反匪芳鬼反注下同疏釋曰此經重解上文之義鄭云匪采貌者以其以色配匪明匪是采貌也先鄭以似為發者以似非真實故為發發謂鳴聲發動者也爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣注措猶頓也故書措作厝杜子春云當為措音義穨爾如字李湯過反廢措七故反注同厝劉音錯七洛反又七故反疏釋曰此經說脂者膏者止可為牲不可以為虡之義也注釋曰子春從措不從厝者厝置之義非措頓故從措也梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣注勺尊升也觚豆字聲之誤觚當為觶豆當為斗音義勺上灼反注同觚依注作觶之豉反下同豆依注作斗舊音主亦多口反下一豆酒同觚豆音孤疏注釋曰爵制今韓詩說一升曰爵二升曰觚三升曰觶四升曰角五升曰散古周禮說亦與之同謹按周禮一獻三酬當一豆既觚二升不滿豆矣鄭𤣥駮之云觶字角旁支汝潁之間師讀所作今禮角旁單古書或作角旁氏角旁氏則與觚字相近學者多聞觚寡聞觗寫此書亂之而作觚耳又南郡太守馬季長說一獻而三酬則一豆豆當為斗一爵三觶相近禮器制度云觚大二升觶大三升是故鄭從二升觚三升觶也鄭云觚豆字聲之誤者觶字為觚是字之誤斗字為豆是聲之誤食一豆肉飲一豆酒中人之食也注一豆酒又聲之誤當為斗凡試梓飲器鄉衡而實不盡梓師罪之注鄭司農云梓師罪也衡謂麋衡也曲禮執君器齊衡𤣥謂衡平也平爵鄉口酒不盡則梓人之長罪於梓人焉音義鄉許亮反注同長丁丈反疏注釋曰先鄭云梓師罪也者謂梓師身自得罪後鄭不從者梓師是梓官之長不可自受罪故為梓師罪梓人也先鄭云衡謂麋衡也者麇即眉也但器有大小不可據上畔與眉平故後鄭不從據下畔無問大小皆得平也引曲禮者彼衡謂與心平與此義異引之者雖於處不同平義相似故引之也梓人為侯廣與崇方參分其廣而鵠居一焉注崇高也方猶等也高廣等者謂侯中也天子射禮以九為節侯道九十弓弓二寸以為侯中高廣等則天子侯中丈八尺諸侯於其國亦然鵠所射也以皮為之各如其侯也居侯中參分之一則此鵠方六尺唯大射以皮飾侯大射者將祭之射也其餘有賓射燕射音義參分方云反注參分下身居一分同鵠古篤反注下同射食亦反下射三侯下文射女同疏釋曰禮射有三有燕射賔射大射大射射鵠賓射燕射射侯法亦與此同注釋曰云高廣等者謂侯中也者鄉射記云弓二寸以為侯中中則身也云天子射禮以九為節者按射人及樂師皆云天子以騶虞九節是也云侯道九十弓者此約大射禮大侯九十弓天子九節亦九十弓可知云弓二寸以為侯中者鄉射記文鄉侯五十弓弓二寸以為侯中侯中一丈則九十弓者侯中丈八尺云諸侯於其國亦然者大射禮云大侯九十糝侯七十犴侯五十是也但天子九十弓無文約取畿外諸侯有九十七十五十弓今此以天子至尊為主故以諸侯為亦如之云鵠所射也者射義云為人君者以為君鵠為人臣者以為臣鵠又云循聲而發發而不失正鵠者其唯賢者乎是所射者也云以皮為之各如其侯也者侯謂以皮飾兩畔其鵠之皮亦與作侯用皮同也謂若虎侯以虎皮飾侯側其鵠亦用虎皮其餘熊豹麋等亦然云居侯中參分之一者釋經參分其廣而鵠居一焉云則此鵠方六尺者以侯方丈八尺三六十八故知方六尺也云唯大射以皮飾侯者對賔射射正者以五色飾侯之側為雲氣也燕射射獸侯者亦畫雲氣飾侯之側也云大射者將祭之射也者射義說大射之事云其容體比於禮其節比於樂而中多者得與於祭是將祭而射謂之大射也其餘有賔射燕射者禮射者有此三也賔射射人之所掌是也燕射燕禮所云是也又鄉射記亦云燕射之事也其餘更有鄉射不言者鄉射射采侯則亦賔射也故不别言也上兩個與其身三下兩個半之注鄭司農云兩個謂布可以維持侯者也上方兩枚與身三設身廣一丈兩個各一丈凡為三丈下兩個半之傅地故短也𤣥謂個讀若齊人搚幹之幹上個下個皆謂舌也身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌然則九節之侯身三丈六尺上個七丈二尺下個五丈四尺其制身夾中個夾身在上下各一幅此侯凡用布三十六丈言上個與其身三者明身居一分上個倍之耳亦為下個半上個出也個或謂之舌者取其出而左右也侯制上廣下狹蓋取象於人也張臂八尺張足六尺是取象率焉音義兩個讀為幹古旦反下及注同李云大鄭依字傅音附搚力答反亦為于僞反率音類本又作類又音律疏釋曰此經云身即中上布一幅者是也上兩個居二分身居一分故云上兩個與其身三謂三分如等也云下兩個半之者謂半其出者也一侯二侯三侯皆然故不定侯名也注釋曰先鄭意身即與中為一謂方丈者其上又加布一幅長三丈為兩個後鄭不從者侯有中有躬有個三者今先鄭唯有身不見中故不從之也𤣥謂個讀若齊人搚幹之幹者讀從公羊傳桓公朝齊齊侯使公子彭生搚幹而殺之是幹為脅骨故云搚幹之幹此個亦與侯為幹故讀從之也引鄉射記者欲見有中有躬有舌三者云下個五丈四尺者其上兩個各出丈八尺今此下個上出九尺兩畔共減十八尺故有五丈四尺云此侯凡用布三十六丈者古者布幅廣二尺二寸二寸為縫皆以二尺計之此侯是九十弓侯侯中丈八尺則九幅布布長丈八尺九幅九丈幅有八尺為七丈二尺添前為十六丈二尺上下躬各三丈六尺即上下共為七丈二尺其上個七丈二尺下個有五丈四尺添前總用布三十六丈也其七十弓侯侯中一丈四尺其五十弓侯侯中一丈皆倍中以為躬倍躬以為左右個計之皆可知也上綱與下綱出舌尋絹寸焉注綱所以繫侯於植者也上下皆出舌一尋者亦人張手之節也鄭司農云綱連侯繩也縜籠綱者縜讀為竹中皮之縜舌維持侯者音義縜于貧反或尤粉反劉侯犬反一音古犬反植直吏反籠鹿工反疏釋曰綱以繫侯於植者也植則在兩旁邪豎之也必知邪豎之者下個半上個皆在舌尋明知兩旁皆邪向外豎之也張皮侯而棲鵠則春以功注皮侯以皮所飾之侯司裘職曰王大射則共虎侯熊侯豹侯設其鵠謂此侯也春讀為蠢蠢作也出也天子將祭必與諸侯羣臣射以作其容體出其合於禮樂者與之事鬼神焉音義棲音西春出允反疏釋曰云張皮侯者天子三侯用虎熊豹皮飾侯之側號曰皮侯而棲鵠者各以其皮為鵠名此為鵠者綴於中央似鳥之棲故云而棲鵠也注釋曰天子將祭已下皆取射義之意以解此也張五采之侯則逺國屬注五采之侯謂以五采畫正之侯也射人職曰以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正下曰若王大射則以貍步張三侯明此五正之侯非大射之侯明矣其職又曰諸侯在朝則皆北面逺國屬者若諸侯朝㑹王張此侯與之射所謂賓射也正之方外如鵠內二尺五采者內朱白次之蒼次之黃次之黑次之其侯之飾又以五采畫雲氣焉音義畫正音征下皆同獲如字下皆同或音胡化反疏釋曰此據賓射之侯言五采是九十弓之侯若七十弓者則三正五十弓者則二正也言逺國屬者對畿內諸侯為遠國若以要服以內對夷狄諸侯則夷狄為遠國也注釋曰鄭引射人職賓射及大射二者隂破賈馬以此五采與上春以功為一物故云非大射之侯明矣云正之方外如鵠者惟云參分其侯鵠居一焉不見賓射之侯故云如鵠亦當參分其侯正居一焉云內二尺者中央畫朱方二尺故司裘注引諸家方二尺曰正以此二尺為本其外以白蒼等充其尺寸使大如鵠也凡畫正皆先以朱次白次青次黃次𤣥以射是相尅伐之事故還以向南為本其次皆以相剋為次也其三正者去𤣥黃二正者又去白青直以朱緑也云其侯之飾又以五采畫雲氣焉者皮侯以皮為飾其側此正即畫明其側亦以雲氣為飾也張獸侯則王以息燕注獸侯畫獸之侯也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質是獸侯之差也息者休農息老物也燕謂勞使臣若與羣臣飲酒而射音義勞力報反使色吏反疏注釋曰此燕射之侯也引鄉射記白質赤質者皆以白土赤土塗之大夫士言布謂白布不塗君畫一臣畫二取陽竒隂偶之義畫虎熊豹取其君臣相犯畫麋鹿豖者取其君臣相養凡畫者丹質以周尚赤故以赤為質地也云息者休農息老物也者謂十月農功畢君臣飲酒以休農止息之老萬物也云燕謂勞使臣若與羣臣飲酒而射者勞使臣謂若四牡勞使臣之來若與羣臣飲酒者君臣閒暇無事而飲酒云而射者息老物及勞使臣并無事飲酒三者燕皆有射法此燕射以其事䙝天子已下唯有五十步侯而已無尊卑之别也祭侯之禮以酒脯醢注謂司馬實爵而獻獲者于侯薦脯醢折俎獲者執以祭侯音義折之設反疏釋曰鄭云謂司馬實爵獻獲者于侯已下皆依大射而言彼雖諸侯禮天子射亦然又此不辨大射賔射燕射則三等射皆同按大射司馬正洗散遂實爵獻服不服不侯西北三步北面拜受爵乃祭侯左右個及中其辭曰惟若寧侯注若猶女也寧安也謂先有功德其鬼有神音義女音汝下文并注同疏注釋曰祭侯者祭先有功德之侯若射侯則射不寧侯有罪者也下文毋或一經是也舉有功以勸示又舉有罪以懲之故兩言之也毋或若女不寧侯不屬于王所故抗而射女注或有也若如也屬猶朝㑹也抗舉也張也音義毋音無强飲强食詒女曾孫諸侯百福注詒遺也曾孫諸侯謂女後世為諸侯者音義强其丈反下同詒羊之反又羊志反遺唯季反廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋注柲猶柄也八尺曰尋倍尋曰常酋夷長短名酋之言遒也酋近夷長矣音義廬力吳反下同祕音祕殳音殊酋在由反遒在由反或子由反沈慈有反疏注釋曰凡此經所云柄之長短皆通刃為尺數而言八尺曰尋倍尋口常皆約上文車有六等之數皆以四尺為差而知之也云酋夷長短名酋近夷長矣者按上注以酋夷為發聲則無義例至此而言長短各為義解之者鄭意雖是發聲夷為長故開口引聲而言之酋為短故合口從聲而言之也凡兵無過三其身過三其身弗能用也而無已又以害人注人長八尺與尋齊進退之度三尋用兵力之極也而無已不徒止耳疏注釋曰此據極長者夷矛三尋而言云而無已又以害人者已止也謂不徒止又以害人人自己身也故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且涉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不涉山林之阻是故兵欲長注言罷羸宜短兵壯健宜長兵音義罷音皮羸劣皮反疏釋曰按司馬法云弓矢圍殳矛守戈㦸助此言攻國之兵欲短則弓矢是也守國之兵欲長則殳矛是也言戈㦸助者攻國守國皆有戈㦸以助弓矢殳矛以其戈㦸長短處中故也凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶注句兵戈㦸屬刺兵矛屬故書彈或作但蜎或作絹鄭司農云但讀為彈丸之彈彈謂掉也絹讀為悁邑之悁悁略橈也椑讀為鼓鼙之鼙𤣥謂蜎亦掉也謂若井中蟲蜎之蜎齊人謂柯斧柄為椑則椑隋圜也摶圜也音義句劉俱具反沈音鉤下注同彈徒旦反注同刺七賜反注同蜎於全反又於兖反李又烏犬烏懸二反或巨兖反椑薄兮反注鼙同摶徒丸反掉徒弔反悁烏懸反橈乃教反下同蟲蜎巨兖反隋他果反圜音圓疏注釋曰以戈有胡孑其㦸有援向外為磬折又胡刃向下故皆得為句兵也先鄭云絹讀為悁邑之悁者猶如詩云中心悁悁是悁邑之意故以義讀之也椑讀為鼓鼙之鼙者讀從樂記云鼓鼙之聲之鼙也𤣥謂蜎亦掉也者同是欲堅徑不欲柔軟者也謂若井中蟲蜎之蜎者俗讀之井中有蟲蜎蜎擾擾然也云椑隋圜者謂側方而去楞是也􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則密是故侵之注改句言􅌛容殳無刃同强上下同也舉謂手所操鄭司農云校讀為絞而婉之絞重欲傅人謂矛柄之大者在人手中者侵之能敵也𤣥謂校疾也傅近也密審也正也人手操細以􅌛則疾操重以刺則正然則為矜句兵堅者在後刺兵堅者在前音義校古飽反李又侯巧反傅音附下及注同操七曹反絞古飽反矜巨巾反下同疏注釋曰云改句言􅌛者上云句兵謂戈㦸此經云􅌛是改句云􅌛以殳長丈二而無刃可以􅌛打人故云􅌛兵也云同强上下同也者謂本末及中央皆同堅徑故云同强也先鄭云校讀為絞而婉之絞絞疾也者按昭元年虢之㑹叔孫穆子見楚公子圍曰美矣君哉及退㑹子羽謂子皮曰叔孫絞而婉注云絞切也故讀從之取切疾之義也云然則為矜句兵堅者在後者以句兵向後牽之故云堅者在後也云刺兵堅者在前者以向前推之故云堅者在前也言此者欲見句兵手執處欲得細細則手執之牢也刺兵執處欲得粗而徑則手穩也凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍注被把中也圍之圜之也大小未聞凡矜八觚鄭司農云晉謂矛㦸下銅鐏也刺謂矛刃胸也𤣥謂晉讀如王搢大圭之搢矜所捷也首殳上鐏也為戈㦸之矜所圍如殳夷矛如酋矛音義被皮義反注同去起呂反下同晉如字又音箭把音霸鐏存悶反劉子悶反捷初洽反疏釋曰凡為殳五分其長以其一為之被而圍之者殳長丈二尺五分取一則得二尺四寸為把處而圜之也參分其圍去一以為晉圍者後鄭云晉謂矜所捷也則殳於手把處亦有銅鐏擬捷地豎之言參分其圍去一以為晉圍又五分其晉圍去一以為首圍者鄭云圍之大小未聞則二者皆未知粗細也云首圍謂在上頭上頭宜稍細之也矛云刺圍者謂柄入刃處也注釋曰云凡矜八觚者以經二者近手皆云圍之明不圜者為八觚也先鄭云刺謂矛刃胸也者人胸當前故以前為胸以其矛刃直前故名矛刃胸也𤣥謂晉讀如王搢大圭之搢者讀從典瑞云王搢大圭執鎮圭彼搢為插此晉亦插故從之是以云矜所捷也云首殳上鐏也者殳下有銅鐏取其入地此殳首無銅鐏亦以上頭為首而稍細之以其似鐏故鄭云首殳上鐏也云為戈㦸之矜所圍如殳者以其上文云句兵次云􅌛兵注云改句言􅌛容殳無刃此文即云殳以此互見言之足明戈㦸之體與殳同也知夷矛與酋矛同者以其同是矛但長短為異故知體亦同也凡試廬事置而搖之以視其蜎也灸諸牆以視其橈之均也橫而搖之以視其徑也注置猶尌也灸猶柱也以柱兩牆之間挽而內之本末勝負可知也正於牆牆歰音義置如字李直吏反灸音救尌音樹柱知主反下同鞔音挽歰所立反本又作澀又作同疏釋曰此經有三事置而搖之謂豎之於地上以手搖之以視其蜎蜎然均否灸諸牆謂柱之兩牆觀其體之强弱均否橫而搖之謂橫置於膝上以一手執一頭搖之以視其堅徑與否也六建既備車不反覆謂之國工注六建五兵與人也反覆猶軒輖音義覆芳服反注同輖音周疏注釋曰知六建五兵與人者以其從上而下廬人所造有柄者戈㦸殳與酋矛夷矛五兵而已按上車有六等除軫與人四兵此云六建建在車上明無軫自取人與五兵為六建可知也匠人建國注立王國若邦國者疏注釋曰周禮單言國者據王國邦國連言據諸侯經既單言國鄭兼言邦國者以其下文有王及諸侯城制明此以王國為主其中兼諸侯邦國可知下文又有都城制則此亦兼都城也水地以縣注於四角立植而縣以水望其高下高下既定乃為位而平地疏釋曰此經說欲置國城先當以水平地欲高下四方皆平乃始營造城郭也注釋曰云於四角立植而縣者植即柱也於造城之處四角立四柱而縣謂於柱四畔縣繩以正柱柱正然後去柱遠以水平之法遙望柱高下定即知地之高下然後平高就下地乃平也乃後行下以景正四方之事置𣙗以縣視以景注故書𣙗或作弋杜子春云𣙗當為弋讀為杙𤣥謂𣙗古文臬假借字於所平之地中央樹八尺之臬以縣正之視之以其景將以正四方也爾雅曰在牆者謂之杙在地者謂之臬音義𣙗魚列反注臬同弋以職反下杙同劉杙音豫則反疏釋曰此經說既得平地乃於中營治也云置𣙗者𣙗亦謂柱也云以縣者欲取柱之景先須柱正欲取柱正當以繩縣而垂之於柱之四角四中以八繩縣之其繩皆附柱則其柱正矣然後視柱之景故云視以景也注釋曰𤣥謂𣙗古文臬假借字者今之𣙗從木執聲之省者也古之𣙗為臬法字故尚書康誥云女陳時臬臬法字亦得為𣙗柱之字故云假借字也云於其所平之地中央樹八尺之臬以縣正之者天文志云夏日至立八尺之表通卦驗亦云立八神樹八尺之表故知樹八尺之臬臬即表也必八尺者按考靈曜曰從上向下八萬里故以八尺為法也彼云八神此縣一也以於四角四中故須八神神即引也向下引而縣之故云神也云視之以其景將以正四方也者即下云為規識日出日入之景是也引爾雅在牆者謂之杙在地者謂之臬者證此臬是在地樹之者也為規識日出之景與日入之景注日出日入之景其端則東西正也又為規以識之者為其難審也自日出而畫其景端以至日入既則為規測景兩端之內規之規之交乃審也度兩交之間中屈之以指臬則南北正音義為其于僞反度待落反疏注釋曰云日出日入之景其端則東西正也者謂於前平地之中央立表訖乃於日出之時畫記景之端於日入之時又畫記景以繩測景之兩端則東西正矣云又為規以識之者為其難審也者謂此經為規識日出與日入之景者為景兩端長短難審故為規規景也云自日出而畫其景端以至日入者還是景之兩端耳云既則為規測景兩端之內規之規之交乃審也者謂於中臬以繩規取景之兩端一匝則景之遠近定遠近定則東西乃審云度兩交之間中屈之以指臬則南北正者兩交間正謂兩景端之半度景兩間中屈之以指臬則南北正必中屈之者於夏日至中漏半於臬南向北所度之處於東西景端亦相當故須中屈之也晝參諸日中之景夜考之極星以正朝夕注日中之景最短者也極星謂北辰音義朝如字疏釋曰前經已正東西南北恐其不審猶更以此二者以正南北言朝夕即東西也南北正則東西亦正故兼言東西也注釋曰日中景最短者也者大司徒云日至之景尺有五寸以其在上臨下故最短也云極星謂北辰者當夜半考之爾雅云北極謂之北辰辰時也天下取正焉故謂之北辰極中也以居天之中故謂之北極也匠人營國方九里旁三門注營謂丈尺其大小天子十二門通十二子疏釋曰按典命云上公九命國家宫室車旗衣服禮儀以九為節侯伯子男已下皆依命數鄭云國家謂城方公之城蓋方九里侯伯七里子男五里并文王有聲詩箋差之天子當十二里此云九里者按下文冇夏殷則此九里通異代也鄭異義駮或云周亦九里城則公七里侯伯五里子男三里不取典命等注由鄭兩解故義有異也疏備在典命也注釋曰云丈尺據高下而言云大小據逺近而說也云天子十二門以通十二子者按孝經援神契云天子即政置三公九卿二十七大夫八十一元士愼文命下各十二子如甲乙丙丁之屬十日為母子丑寅卯等十二辰為子故王城面各三門以通十二子也國中九經九緯經涂九軌注國中城內也經緯謂涂也經緯之涂皆容方九軌軌謂轍廣乘車六尺六寸旁加七寸凡八尺是謂轍廣九軌積七十二尺則此涂十二步也旁加七寸者輻內二寸半輻廣三寸半綆三分寸之二金轄之間三分寸之一音義涂音塗綆方穎反轄胡瞎反疏釋曰言九經九緯者南北之道為經東西之道為緯王城而有三門門有三塗男子由右女子由左車從中央注釋曰鄭云旁加七寸者輻內二寸半者計轂在輻內九寸有餘今言輻內有二寸半者不加輿下覆轂者也左祖右社面朝後市注王宮所居也祖宗廟面猶鄉也王宮當中經之涂也音義鄉許亮反疏注釋曰言王宮所居也者謂經左右前後者據王宮所居處中而言之故云王宮所居也云王宮當中經之涂也者按祭義注云周尚左桓二年取郜大鼎納於大廟何休云質家右宗廟尚親親文家左宗廟尚尊尊義與此合按劉向别録云路寢在北堂之西社稷宗廟在路寢之西又云左明堂辟雍右宗廟社稷皆不與禮合鄭皆不從之矣市朝一夫注方各百步疏注釋曰按司市市有三期總於一市之上為之若市總一夫之地則為大狹蓋市曹司次介次所居之處與天子二朝皆居一夫之地各方百步也夏后氏世室堂修二七廣四修一注世室者宗廟也魯廟有世室牲有白牡此用先王之禮修南北之深也夏度以步令堂修十四步其廣益以四分修之一則堂廣十七步半疏注釋曰鄭云此用先王之禮者世室用此經夏法白牡用殷法皆是用先王之禮也云夏度以步者下文云三四步明此二七是十四步也云令堂修十四步者言假令以此堂云二七約之知用步非正文故鄭以假令言之也知堂廣十七步半者以南北為修十四步四分之取十二步益三步為十五步餘二步益半步為二步半添前十五步是十七步半也五室三四步四三尺注堂上為五室象五行也三四步室方也四三尺以益廣也木室於東北火室於東南金室於西南水室於西北其方皆三步其廣益之以三尺土室於中央方四步其廣益之以四尺此五室居堂南北六丈東西七丈疏注釋曰云五室象五行者以其宗廟制如明堂明堂之中有五天帝五人帝五人神之坐皆法五行故知五室象五行也東北之室言木東南之室言火西南之室言金西北之室言水五行先起東方故東北方之室言木其實東北之室兼水矣東南之室兼木矣西南之室兼火矣西北之室兼金矣以其中央大室有四堂四角之室皆有室故知義然也中央之室大一尺者以其在中號為大室故多一尺也云此五室居堂南北六丈東西七丈者以其大室居中四角之室皆於大室外接四角為之大室四步四角室各三步則南北三室十步故六丈東西三室六丈外加四三尺又一丈故七丈也九階注南面三三面各二疏注釋曰按賈馬諸家皆以為九等階鄭不從者以周殷差之夏人卑宮室當一尺之堂為九等階於義不可故為旁九階也鄭知南面三階者見明堂位云三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上故知南面三階也知餘三面各二者大射禮云工人士與梓人升自北階又雜記云夫人至入自闈門升自側階奔喪云婦人奔喪升自東階以此而言四面有階可知四旁兩夾窗注窗助戶為明每室四戶八窗音義夾古洽反劉古協反窗初江反一音忽疏注釋曰言四旁者五室室有四戶四戶之旁皆有兩夾窗則五室二十戶四十窗也白盛注蜃灰也盛之言成也以蜃灰堊牆所以飾成宮室音義蜃常軫反堊烏路反又烏洛反疏注釋曰地官掌蜃掌供白盛之蜃則此蜃灰出自掌蜃也云以蜃灰堊牆者爾雅云地謂之􅉳牆謂之堊堊即白蜃堊之使壁白也門堂三之一注門堂門側之堂取數於正堂令堂如上制則門堂南北九步二尺東西十一步四尺爾雅曰門側之堂謂之孰音義孰音孰劉又音育疏注釋曰鄭云令堂如上制者以上堂不言步故此注亦云令假令如上制南北十四步東西十七步半今云三之二謂三分取二分以十四步取十二步三分之得八步二步為丈二尺三分之得八尺以六尺為一步添前為九步餘二尺故云南北九步二尺也云東西十一步四尺者十七步半以十五步得十步餘二步半為丈五尺三分之得一丈以六尺為一步餘四尺添前為十一步四尺也引爾雅門側之堂謂之孰者證此經門堂為孰之義也尚書顧命左孰右孰亦此類也室三之一注兩室與門各居一分疏注釋曰此室即在門堂之上作之也言各居一分者謂兩室與門各居一分鄭不言尺數義可知故略而不言也殷人重屋堂修七尋堂崇三尺四阿重屋注重屋者王宮正堂若大寢也其修七尋五丈六尺放夏周則其廣九尋七丈二尺也五室各二尋崇高也四阿若今四注屋重屋復笮也音義重直龍反下及注同放方往反復音福笮側白反疏注釋曰云王宮正堂若大寢也者謂對燕寢側室非正故以此為正堂大寢也言放夏周者夏在殷前可得言放其周在殷後亦言放者此非謂殷人在周而為之鄭直據上文夏法下文周法言放猶言約夏周者也雖言放夏周經云堂修七尋則其廣九尋若周言南北七筵則東西九筵是偏放周法而言放夏者七九偏據周夏后氏南北狹東西長亦是放之故得兼言放夏也云四阿若今四注屋者燕禮云設洗當東霤則此四阿四霤者也云重屋復笮也者若明堂位云復廟重檐鄭注云重檐重承壁材也則此復笮亦重承壁材故謂之重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵注明堂者明政教之堂周度以筵亦王者相改周堂高九尺殷三尺則夏一尺矣相參之數禹卑宮室謂此一尺之堂與此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制音義度九劉直路反戚待洛反下及注同禹卑如字劉音婢與音餘疏注釋曰此記人據周作說故其文備於周而略於夏殷是以下文皆據周而說也以夏之世室其室皆東西廣於南北也周亦五室直言凡室二筵不言東西廣鄭亦不言東西益廣或五室皆方二筵與夏異制也若然殷人重屋亦直云堂修七尋不言室如鄭意以夏周皆有五室十二堂明殷亦五室十二堂云明堂者明政教之堂者以其於中聽朔故以政教言之明堂者明諸侯之尊卑孝經緯援神契云得陽氣明朗謂之明堂以明堂義大故所合理廣也云周度以筵亦王者相改者對夏度以步殷度以尋是王者相改也云周堂高九尺殷三尺則夏一尺矣者夏無文以後代文而漸髙則夏當一尺故云相參之數禹卑宮室謂此一尺之堂與言與者以無正文故言與以疑之也云此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制者互言之者夏舉宗廟則王寢明堂亦與宗廟同制也殷舉王寢則宗廟明堂亦與王寢同制也周舉明堂則宗廟王寢亦與明堂制同也云其同制者謂當代三者其制同非謂三代制同也若然周人殯于西階之上王寢與明堂同則南北七筵惟有六十三尺三室居六筵南北共有一筵一面惟有四尺半何得容殯者按書傳云周人路寢南北七雉東西九雉室居二雉則三室之外南北各有半雉雉長三丈則各有一丈五尺足容殯矣若然云同制者直制法同無妨大矣據周而言則夏殷王寢亦制同而大可知也室中度以几堂上度以筵宮中度以尋野度以步涂度以軌注周文者各因物宜為之數室中舉謂四壁之內疏注釋曰云周文者各因物宜為之數者對殷已上質夏度以步殷度以尋無異稱也因物宜者謂室中坐時馮几堂上行禮用筵宮中合院之內無几無筵故用手之尋也在野論里數皆以步故用步涂有三道車從中央故用車之軌是因物所宜也云室中舉謂四壁之內者對宮中是合院之內依爾雅宮猶室室猶宮者是散文宮室通也廟門容大扃七個注大扃牛鼎之扃長三尺每扃為一個七個二丈一尺音義扃古熒反個古賀反注及下同疏注釋曰知大扃牛鼎之扃長三尺者此約漢禮器制度闈門容小扃參個注廟中之門曰闈小扃膷鼎之扃長二尺參個六尺音義闈音韋劉音暉膷音香疏注釋曰云廟中之門曰闈門者爾雅文此即雜記云夫人至入自闈門是也云小扃膷鼎之扃長二尺者亦漢禮器制度知之膷鼎亦牛鼎但上牛鼎扁長三尺據正鼎而言此言膷鼎據陪鼎三膷臐膮而說也路門不容乘車之五個注路門者大寢之門乘車廣六尺六寸五個三丈三尺言不容者是兩門乃容之兩門乃容之則此門半之丈六尺五寸疏注釋曰下云應門則此路門以近路寢故特小為之經言乘車據輿廣六尺六寸者按輿人云輪崇車廣衡長參如一鄭注云車輿也故知此云車亦據輿也云言不容者是兩門乃容之者若容兩個三個四個正應云容乘車之兩個三個四個若四個上復有餘分應云四個然後見其分數多少今直云不容乘車之五個明兩門乃容之猶如上文云中地食者其民可任者二家五人之類也應門二徹參個注正門謂之應門謂朝門也二徹之內八尺三個二丈四尺疏注釋曰云正門謂之應門者爾雅文以其應門內路門外有正朝臣入應門至朝處君臣正治之所故謂此門為應門是以鄭云謂朝門也內有九室九嬪居之外有九室九卿朝焉注內路寢之裏也外路門之表也九室如今朝堂諸曹治事處九嬪掌婦學之法以教九御六卿三孤為九卿疏注釋曰內外據路寢之表裏言之則九卿之九室在門外正朝之左右為之故鄭據漢法朝堂諸曹治事處謂正朝之左右為廬舍者也云九嬪掌婦學之法以教九御者九嬪職文按內宰王有六宮九嬪已下分居之若然不得復分居九室矣此九嬪之九室與九卿九室相對而言之九卿九室是治事之處則九嬪九室亦是治事之處故與六宮不同是以鄭引九嬪職掌婦學之法則九室是教九御之所也云六卿三孤為九卿孤同卿數者以命數同故也按昏義以夏之九卿謂三孤與六卿為九此云九卿亦謂周之三孤六卿為九卿九分其國以為九分九卿治之注九分其國分國之職也三孤佐三公論道六卿治六官之屬疏注釋曰云九分其國分國之職也者鄭恐九分其國分其地域故云分國之職也云三孤佐三公論道六卿治六官之屬者欲見分職為九分之意以其三公三孤無正職天地四時正職六卿治之其餘非正職者分為三分三公治之三孤則佐三公者也但三公中參六官之事外與六卿之教書傳又云司徒公司馬公司空公則三公六卿亦有職此亦據夏而言周則未見分為九分也王宫門阿之制五雉宫隅之制七雉城隅之制九雉注阿棟也宮隅城隅謂角浮思也雉長三丈高一丈度高以高度廣以廣音義浮思竝如字本或作罘罳同高一古報反後放此度待洛反下同疏釋曰云王宮門阿之制五雉者五雉謂高五丈云宮隅之制七雉者七雉亦謂高七丈不言宮牆宮牆亦高五丈也云城隅之制九雉者九雉亦謂高九丈不言城身城身宜七丈也注釋曰云阿棟也者謂門之屋兩下為之其脊高五丈鄭以浮思釋隅者按漢時云東闕浮思災言災則浮思者小樓也按明堂位云疏屏注亦云今浮思也刻之為雲氣蟲獸如今闕上為之矣則門屏有屋覆之與城隅及闕皆有浮思刻畫為雲氣并蟲獸者也云雉長三丈高一丈度高以高度廣以廣者凡版廣二尺公羊云五版為堵高一丈五堵為雉書傳云雉長二丈度高以高度長以長廣則長也言高一雉則一丈言長三雉則三丈引之者證經五雉七雉九雉雉皆為丈之義經涂九軌環涂七軌野涂五軌注廣狹之差也故書環或作轘杜子春云當為環環涂謂環城之道音義環如字劉戶串反轘戶關反疏注釋曰環涂謂繞城道如環然故謂之環也野涂國外謂之野通至二百里內以其下有都之涂三軌言都則三百里大夫家涂亦三軌也故知此野通二百里內也不言緯者以與經同也門阿之制以為都城之制注都四百里外距五百里王子弟所封其城隅高五丈宮隅門阿皆三丈疏注釋曰鄭云都四百里外距五百里王子弟所封者則惟據大都而言不通小都卿之采地以司裘諸侯共熊侯豹侯卿大夫共麋侯則卿不入諸侯中此云都據諸侯而言故不及小都也大都諸侯兼三公直云王子其言略兼有三公可知云城隅高五丈者以上文王門阿五雉今云門阿之制為都城制城制五雉若據城身則與下諸侯同故知此城制據城隅也云宮隅門阿皆三丈者以下丈畿外諸侯尊得伸為臺門高五丈此畿內屈故宮隅門阿皆三丈也宫隅之制以為諸侯之城制注諸侯畿以外也其城隅制高七丈宮隅門阿皆五丈禮器曰天子諸侯臺門疏注釋曰鄭知諸侯畿以外者上文都據畿內諸侯故知此諸侯據畿以外也引禮器者欲見諸侯門阿得與天子同之意也按異義古周禮說云天子城高七雉隅高九雉公之城高五雉隅高七雉侯伯之城髙三雉隅髙五雉都城之髙皆如子男之城高隱元年服注與古周禮說同其天子及公城與此匠人同其侯伯以下與此匠人說異者此匠人云門阿之制以為都城之制高五雉亦謂城隅也其城高三雉與侯伯等如是子男豈不如都乎明子男城亦與伯等是以周禮說不云子男及都城之高直云都城之高皆如子男之城高有此匠人相參以知子男皆為本耳亦互相曉明子男之城不止高一丈隅二丈而已如是王宮隅之制以為諸侯城制者惟謂上公耳以此計之王城隅高九雉城高七雉上公之城隅高七雉城高五雉侯伯已下城隅高五雉城高三雉天子門阿五雉則宮亦五雉其隅七雉上公之城鄭云宮隅門阿皆五雉則其宮亦五雉都之制鄭云宮隅門阿皆三雉則其宮高亦三雉何者天子門阿與宮等明知其餘皆等惟伯子男宮與都等其門阿蓋高於宮當如天子五雉何者禮器云天子諸侯臺門大夫不臺門以此觀之天子及五等諸侯其門阿皆五雉可知都城據大都而言其小都及家之城都當約中五之一家當小九之一為差降之數未聞也環涂以為諸侯經涂野涂以為都經涂注經亦謂城中道諸侯環涂五軌其野涂及都環涂野涂皆三軌疏注釋曰諸侯直云經涂不言緯涂緯涂亦與天子環涂同可知諸侯及都皆不言環涂野涂文略有可知故鄭增成之也知諸侯環涂五軌野涂三軌者以經涂七軌以下差降為之故知義然也又知都環涂野涂皆三軌者凡涂皆男子由右女子由左車從中央三者各一軌則都之野涂不得降為一軌是以遂人注云路容三軌遙釋此也云都之野涂與環涂同以其野涂不得上於田間川上之路故也周禮注疏卷四十一周禮注疏卷四十一考證玉人之事大圭長三尺注明無所屈也疏皆對諸侯為荼大夫前屈後屈故云無所屈也臣紱按大夫句及玉藻推之則為荼下似當有前屈後直四字土圭尺有五寸疏夏至口表北尺五寸景與土圭等北監本訛此今改正兩圭五寸有邸疏云僢共本也者亦一玉俱成兩圭尺相對為僢也尺當是足字之誤王制注云卧則僢孔疏云首在外足相鄉內亦引此證之案十有二寸注聘禮曰夫人使下大夫勞以二竹簋方大夫監本作夫人今考聘禮改正磬氏已下則摩其專注短而厚則清短監本訛矩今依疏改正矢人為矢鍭矢參分疏此上既言鏃矢矢中無鏃矢之名當是鍭字之訛耳閷矢七分閷監本作殺石經亦作殺今從釋文梓人為虡石經作筍外骨內骨疏按爾雅釋蟲蚓衍入耳按方言云蚓衍注云由延兩音自關而東謂之蚓衍此一段與原文小異爾雅云蚓衍入耳方言云蚰􅣓自關而東謂之蚓􅣓其小注云蚰􅣓由延二字又云連行魚屬者以其魚唯行相隨唯下當叠唯字唯唯出齊風厚脣弇口出目短耳大胸耀後注耀頎小也頎釋文作頃凡攫閷援簭之類疏云攫閷者攫著則殺之援攬則噬之援攬上以上句對觀之疑當有援簭者三字梓人為飲器疏鄭𤣥駁之云觶字角旁支支監本訛作友今改正梓人為侯疏賔射射人之所掌是也監本脫人字今考官名補之匠人營國四旁兩夾窗窗石經作窗周禮注疏卷四十一考證
