body:
  text: 周禮注疏卷十九漢鄭氏注唐陸德眀音義賈公彥疏小宗伯之職掌建國之神位右社稷左宗廟注庫門內雉門外之左右故書位作立鄭司農云立讀為位古者立位同字古文春秋經公即位為公即立疏釋曰建立也言立邦之神位者從內向外故據國中神位而言對下經在四郊等為外神也言右社稷左宗廟者案匠人亦云左宗廟右社稷彼掌其營作此掌其成事位次耳案禮記祭義注云周尚左又案桓公二年取郜大鼎納於大廟何休云質家右宗廟尚親親文家右社稷尚尊尊若然周人右社稷者地道尊右故社稷在右是尚尊尊之義此據外神在國中者社稷為尊故鄭注郊特牲云國中神莫大於社祭義注周尚左者據內神而言若據衣服尊卑先王衮冕先公鷩冕亦貴於社稷故云周尚左各有所對故注不同也注釋曰鄭知庫門內雉門外者後鄭義以雉門為中門周人外宗廟故知雉門外庫門內之左右也先鄭云古者立位同字者是古者假借字同也云古文春秋者藝文志云春秋古經十二卷是此古文經所藏之書文帝除挾書之律此本然後行於世故稱古文兆五帝於四郊四望四類亦如之注兆為壇之營域五帝蒼曰靈威仰大昊食焉赤曰赤熛怒炎帝食焉黃曰含樞紐黃帝食焉白曰白招拒少昊食焉黑曰汁光紀顓頊食焉黃帝亦於南郊鄭司農云四望道氣出入四類三皇五帝九皇六十四氏咸祀之𤣥謂四望五嶽四鎮四竇四類日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊音義仰如字劉五郎反熛必消反樞昌朱反紐女久反拒居禹反沈又音巨汁音叶劉子集反疏釋曰自此以下立外神從尊至卑故先云五帝此不云大帝者此文上下唯論在四郊以對國中右社稷左宗廟其大帝與崑崙自相對而在四郊之內有自然之圜丘及澤中之方丘以其不在四郊故不言也注釋曰云兆為壇之營域者案封人云社稷之壝謂壝土為之即此壇之營域一也不言壇者舉外營域有壇可知云五帝蒼曰靈威仰之等此於大宗伯釋訖但彼據禮神五幣而言此據壇域處所而說故兩處各言之也司農云四望道氣出入者案上注司農以為日月星海後鄭不從矣今此云道氣出入與上注不同者以無正文故兩注有異若然云道氣出入則非日月星海謂五嶽之等也故後鄭就足之還為五嶽之屬解之先鄭云四類三皇五帝九皇六十四氏咸祀之者案史記云九皇氏沒六十四氏興六十四氏沒三皇興彼雖無三皇五帝之文先鄭意三皇已祀之眀并祭五帝三皇可知後鄭不從者以其兆五帝以下皆據外神大昊句芒等配祭而已今輒特祭人帝於其中非所宜故不從是以取五嶽之屬易之也後鄭注云四類日月星辰者以其言類眀以氣類而為位以祭之故知是日月之等知兆日於東郊者案祭義云大眀生於東故覲禮亦云拜日於東郊玉藻又云朝日於東門之外也又知兆月於西郊者月生於西知風師亦於西郊者以其五行金為暘土為風風雖屬土秋氣之時萬物燥落由風故風亦於西郊也云兆司中司命於南郊者以其南方盛陽之方司中司命又是陽故司中司命在南郊也云兆雨師於北郊者以其雨是水宜在水位故知雨師在北郊天子四望諸侯三望境內山川案僖三十一年夏四月猶三望服氏云三望分野星國中山川又上文先鄭云四望日月星海後鄭必知望祭中無天神者案哀六年云初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也爾雅又云梁山晉望又案尚書云望于山川則知望祭中無天神可知若天神日月之等當入四類之內也若然尚書云望于山川必知四望非山川是五嶽四瀆者以其下云兆山川丘陵之等山川既在下故知此四望是五嶽之屬山川之大者也兆山川丘陵墳衍各因其方注順其所在疏釋曰案大司徒職地有十等此不言林澤原隰亦順其所在可知故略不言也掌五禮之禁令與其用等注用等牲器尊卑之差鄭司農云五禮吉凶軍賓嘉疏注釋曰云用等牲器尊卑之差者謂若天子大夫已上大牢士少牢諸侯之大夫少牢士特牲之等其器謂若少牢四敦特牲二敦士二豆四爼大夫四豆五俎諸侯六豆七俎天子八豆九爼其餘尊罍爵勺及饗食之等各依尊卑之差先鄭云五禮吉凶軍賔嘉者大宗伯職文辨廟祧之昭穆注祧遷主所藏之廟自始祖之後父曰昭子曰穆音義昭常遙反疏釋曰案禮記王制云天子七廟三昭三穆與大祖之廟而七諸侯二昭二穆與大祖之廟而五大夫一昭一穆與大祖之廟而三士一廟案祭法適士二廟王制不言之者取自上而下降殺以兩故略而不言祧有二廟故此總云廟祧之昭穆諸侯無二祧謂始封大祖廟為祧故聘禮云不腆先君之祧是大祖為祧也注釋曰案祭法注祧之言超超然上去意以其遠廟為祧故云上去意也周以文武為二祧文王第稱穆武王第稱昭當文武後穆之木主入文王祧昭之木主入武王祧故云遷主所藏之廟曰祧也云自始祖之後父曰昭子曰穆者周以后稷廟為始祖特立廟不毁即從不窋以後為數不窋父為昭鞠子為穆從此以後皆父為昭子為穆至文王十四世文王第稱穆也辨吉凶之五服車旗宫室之禁注五服王及公卿大夫士之服疏釋曰云吉凶之五服者皆據人數而云五也又云車旗宫室之禁者謂若典命云國家宫室車旗衣服禮儀以九以七以五為節言禁令者謂五服及車旗宫室皆不得上僭下逼當各依品命為法注釋曰案尚書五服五章哉鄭注云十二也九也七也五也三也又云豫欲觀古人之象日月星辰注云此十二章天子備有公自山而下孝經云非先王之法服注云先王制五服天子服日月星辰諸侯服山龍云云皆據章數而言今此注五服以為王及公卿大夫士之服不據章數為五者以其喪服自天子達於士唯一而已不得數服為五即知吉之五服亦不得數服故皆據人為五也掌三族之别以辨親疏其正室皆謂之門子掌其政令注三族謂父子孫人屬之正名喪服小記曰親親以三為五以五為九正室適子也將代父當門者也政令謂役守之事音義適丁歷反疏釋曰此三族謂父子孫一本而言推此而往其中則兼九族矣云辨親疏者據已上至高祖下至𤣥孫傍至緦麻重服者則親輕服者則疏也云正室皆謂之門子者還據九族之內但是適子正體主皆是正室亦謂之門子注釋曰云三族謂父子孫者此據已上親父下親孫是父子孫此即親親以三是也云以三為五者謂此父子孫之三以父親祖以子親孫則五也云以五為九者謂以祖親曾高以孫親曾𤣥即是以五為九也若然不言以五為七乃云以五為九者齊衰三月章云為曾祖鄭注云服之數盡於五則高祖宜緦麻曾祖宜小功也據祖期則曾祖宜大功高祖宜小功也高祖曾祖皆有小功之差則曾孫𤣥孫為之服同也重其衰麻尊尊也減其日月恩殺也以此而言曾祖高祖服同齊衰三月則為曾孫𤣥孫服同緦麻三月以尊卑服同故經云以五為九不須言以五為七也云政令役守之事者案諸子職云掌國子之倅若有甲兵之事致於大子惟所用之是其役事案宫伯職云掌士庶子又有八次八舍宿衛之事是其守之事故總云政令役守之事也毛六牲辨其名物而頒之于五官使共奉之注毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕音義毛戚如字劉莫報反疏釋曰言辨其名物者若六牲皆有名若馬牛羊豕犬雞物色也皆有毛色若宗廟用騂之等云頒之于五官者六卿應言六官而云五者以其天官二王治事尊而不使奉牲故五官也云使共奉之者謂充人養之至祭日之旦在廟門之前頒與五官使共奉之助王牽入廟即祭義所云卿大夫贊幣而從之彼雖諸侯法可況天子也注釋曰先鄭云司徒主牛已下皆案職知之若大司徒有牛人即云奉牛牲宗伯職有雞人即云供雞牲司馬職有羊人校人掌馬即云共羊牲奉馬牲司冦職有犬人即云奉犬牲是以先鄭依而用焉唯司空職亡先鄭知主豕者五行傳聽之不聰則有豕禍是豕屬北方司空冬官故奉豕牲也辨六齍之名物與其用使六宫之人共奉之注齍讀為粢六粢謂六穀黍稷稻粱麥苽音義苽音孤疏釋曰六榖云名物者謂六穀各有名其色異故云名物也云與其用者六穀所用若六牲六彝所用不同故須辨之云使六宫之人共奉之者黍稷簠簋是婦人所奉之事故使六宫之人奉之六宫之人謂若世婦職云女宫之宿戒者也注釋曰讀齍為粢者爾雅釋草粢稷也粢字從米以次為聲其齍字從皿以齊為聲從皿不如從米故讀粢也云六粢黍稷稻粱麥苽者約食醫和王六食云黍稷稻粱麥苽而言辨六彝之名物以待果將注六彝雞彝鳥彝斝彝黃彝虎彝蜼彝果讀為祼音義斝音假又音嫁蜼音誄又以水反疏注釋曰上二經皆云使共奉之此及下經不云使共奉之而云以待文不同者上二者官衆故云使共奉此反下文竝是司尊彝一職之事又是春官當司所主故直云以待也祼言將者將送也謂以圭瓚酌之送與尸及賓故云將六彝之名出司尊彝也云果讀為祼者諸文皆云祼故讀從之其實祼更讀為灌辨六尊之名物以待祭祀賓客注待者有事則給之鄭司農云六尊獻尊象尊壺尊著尊大尊山尊音義獻素何反著直略反大音泰疏釋曰案司尊彝唯為祭祀陳六彝六尊不見為賓客陳六尊此兼言賔客則在廟饗賓客時陳六尊亦依祭禮四時所用唯在野外饗不用祭祀之尊故春秋左傳云犧象不出門世若然案鬱人云掌祼器凡祭祀賓客之祼事則上六彝亦為祭祀賓客而辨之而不言祭祀賓客者舉下以眀上故略而不言注釋曰云待者有事則給之者所須則祭祀賓客是也上經六彝亦云以待鄭不言者上經不言祭祀賓客故鄭亦略而不言亦就此以待祭祀賓客而解之先鄭解六尊亦據司尊彝而言也掌衣服車旗宫室之賞賜注王以賞賜有功者書曰車服以庸疏釋曰衣服謂若司服衮冕以下唯有大裘不可以賞賜以其諸侯不合用之是以魯祭天用衮冕則二王後祭天亦不得用大裘也云車旗者謂若巾車金路象路革路木路及夏篆已下亦得依所乘者賜之唯玉路不得賜與大裘同是以魯用殷之大路也注釋曰引書者尚書舜典文孔云賜以車服旌其能用掌四時祭祀之序事與其禮注序事卜日省牲視滌濯饔爨之事次序之時疏注釋曰云序事卜日省牲之等者此以經云掌四時祭祀之序事序謂次第先後故取上大宗伯凡祀大神享大鬼祭大祗帥執事而卜日已下之事此下亦有省牲已下故取以證序事唯饔爨之言出於特牲即大宗伯云牲鑊一也若國大貞則奉玉帛以詔號注號神號幣號鄭司農云大貞謂卜立君卜大封疏釋曰此國大貞則大卜所云凡國大貞卜大封之等視高作龜者是也注釋曰此言卜事而云神號者案大祝有神號幣號又案下天府職云季冬陳玉以貞來歲之嫩惡鄭云問事之正曰貞謂問於龜大卜職大貞之屬陳玉陳禮神之玉龜有天地四方則玉有六器者與此既言玉帛眀亦有六幣以禮神也先鄭云大貞謂卜立君卜大封大卜文不言大遷者引文略也大祭祀省牲眂滌濯祭之日逆齍省鑊告時于王告備于王注逆齍受饎人之盛以入省鑊視亨腥熟時薦陳之晚早備謂饌具音義饎昌志反亨普庚反劉普孟反疏釋曰此云省牲視滌濯省鑊與大宗伯文同謂佐大宗伯其大宰省牲者察其不如法其逆齍即大宗伯涖玉齍者是也大宗伯涖之小宗伯迎之是相佐也其告時告備是其專職耳注釋曰知齍受饎人之盛以入者案少牢饎爨在廟門之外明天子諸侯饎爨亦在廟門外今言迎齍眀於廟門之外迎入向廟堂東實之於簠簋也云省鑊視亨腥熟者案禮運云腥其俎熟其殽鄭云腥其爼豚解而腥之熟其殽體解而爓之此謂祭宗廟朝踐饋獻節彼下文更有體其犬豕牛羊謂室中饋熟亦須鑊鄭不言略也云時薦陳之晚早者陳謂祭前陳饌於堂東薦謂薦之於神坐皆有晚早云備謂饌具者此饌具即堂東所陳陳備即告告王祭時已至當行事也凡祭祀賓客以時將瓚祼注將送也猶奉也祭祀以時奉而授王賓客以時奉而授宗伯天子圭瓚諸侯璋瓚音義瓚才但反疏注釋曰云祭祀以時奉而授王者案小宰職云凡祭祀贊王幣爵之事祼將之事注云又從大宰助王也將送也祼送送祼謂贊王酌鬱鬯以獻尸以人道宗廟有祼此小宗伯又奉而授王者此據授王彼小宰據授尸謂瓚既在王手小宰乃贊王授尸故二官俱言也云賓客以時奉而授宗伯者大宗伯云大賓客攝而載祼者是也云天子用圭瓚者玉人云祼圭尺有二寸者是也云諸侯用璋瓚者此謂未得圭瓚之賜者故王制云諸侯賜圭瓚然後為鬯未賜圭瓚則資鬯於天子是用璋瓚謂未得圭瓚賜者也是以祭統云君用圭瓚灌大宗用璋瓚亞灌鄭云大宗亞灌容夫人有故是諸侯亦用圭瓚也若然天于用圭瓚則后亦用璋瓚也其諸侯未得圭瓚者君與夫人同用璋瓚也詔相祭祀之小禮凡大禮佐大宗伯注小禮羣臣之禮疏釋曰云詔相祭祀之小禮者謂王有故不親行事使臣攝祭則為小禮故鄭云羣臣之禮云凡大禮佐大宗伯者大宗伯所云者小宗伯佐之也此經所云既未至職末輒言此者此以下皆小宗伯專行事不佐大宗伯故於此申言之以結上也賜卿大夫士爵則儐注賜猶命也儐之如命諸侯之儀春秋文元年天王使毛伯來錫公命傳曰錫者何賜也命者何加我服也疏釋曰諸侯尊故大宗伯儐卿大夫士卑故小宗伯儐之注釋曰云賜猶命也者但命謂以簡䇿以辭命之并加以服賜自是以車馬賜之則賜命别矣而言賜猶命者欲見賜命相將之物故覲禮賜侯氏以車馬及命書與篋服同時也云如命諸侯之儀者儀法雖同禮數則異也引公羊傳者欲見賜命相將之事小祭祀掌事如大宗伯之禮大賓客受其將幣之齎注謂所齎來貢獻之財物音義齎子兮反本又作賫疏釋曰小祭祀謂王𤣥冕所祭則小宗伯專掌其事其法如大宗伯也注釋曰此謂諸侯來朝覲禮畢每國於廟貢國所有行三享之禮諸侯以玉幣致享既訖其庭實之物則小宗伯受之以東故云受其將幣之齎也若大師則帥有司而立軍社奉主車注有司大祝也王出軍必先有事於社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼓祝奉以從曾子問曰天子巡守以遷廟主行載于齊車言必有尊也書曰用命賞于祖不用命戮于社社之主蓋用石為之奉謂將行音義祓孚物反劉音廢從才用反齊車側皆反疏釋曰言大師者大起軍師以征伐云帥有司而立軍社者謂小宗伯帥領有司大祝而立軍社載於齊車以行云奉主車者謂遷主亦載於齊車以行也注釋曰鄭知有司是大祝者見大祝職云大師設軍社故也鄭知王出軍必先有事於社及遷廟而以其主行者見大誓及王制將出軍皆云類于上帝宜于社又曾于問云以遷廟主行載於齊車故知也云社主曰軍社者以其載社在於軍中故以軍社言之云遷主曰祖者此經直云奉主車雖不云祖鄭意欲取尚書賞于祖為證故先言遷主曰祖也引春秋者定四年召陵之㑹將㑹衛子行敬子言於靈公曰㑹同難其使祝他從祝他曰君以軍行祓社釁鼓祝奉以從若軍行師從卿行旅從祝不出境祝他言此者欲見召陵之會是朝聘吉行大祝不合行意時靈公抑遣行祝他遂行引者欲見此經有司立軍社是大祝之事也引曾子問者欲見軍行天子諸侯皆用遷廟木主行之意也尚書者是甘誓啓與有扈戰於甘之野誓士衆之辭引之者欲見軍行須軍社遷主也云社之主蓋用石為之者案許愼云今山陽俗祠有石主彼雖施於神祠要有石主主類其社其社既以土為壇石是土之類故鄭注社主蓋以石為之無正文故云蓋以疑之也云奉謂將行者以曾子問云載於齊車又尚書用命賞于祖故知奉謂將行也若軍將有事則與祭有司將事于四望注軍將有事將與敵合戰也鄭司農云則與祭謂軍祭表禡軍社之屬小宗伯與其祭事𤣥謂與祭有司謂大祝之屬蓋司馬之官實典焉音義與音預注則與與其祭與祭與執事同疏釋曰其四望者謂五嶽四鎮四瀆王軍將有事與敵合戰之時則小宗伯與祭有司大祝之等祭四望之神以求福但四望之神去戰處遠者不必祭之王之戰處要有近之者祭之故以四望言之也注釋曰先鄭以與祭以上絶讀之若然則與祭者與祭何神乎其有司將事於四望則有司自有事於四望矣不干小宗伯輒於此言之是何義也於義不然故鄭合為一事解之也鄭知有司是大祝者案大祝職云大師國將有事於四望與此義同故知有司大祝知司馬實典之者以其軍事是司馬所掌故知司馬實典主其事也無正文故云蓋以疑之也若大甸則帥有司而饁獸于郊遂頒禽注甸讀曰田有司大司馬之屬饁饋也以禽饋四方之神於郊郊有羣神之兆頒禽謂以豫羣臣詩傳曰禽雖多擇取三十焉其餘以豫大夫士以習射於澤宫而分之音義甸音田出注下甸役同饁于輒反劉于法反疏釋曰言大甸者天子四時田獵也云則帥有司而饁獸于郊者謂田在四郊之外田訖以禽獸饋於郊者將入國過四郊四郊皆有天地日月山川之位便以獸薦於神位以歆神非正祭直是野饁獸于郊云遂頒禽者因事曰遂以在郊饁獸訖入至澤宫中而射以主皮行班餘獲射之禮故云遂頒禽注釋曰甸者以郊外曰甸獵在甸地故云甸今讀曰田者義將兩兼非直獵在甸地亦得取田義以其似治田去不秀實故以田言之云有司大司馬之屬者以其軍事是司馬之事故大司馬職云徒弊致禽饁獸於郊故知大司馬之屬但小宗伯不可帥大司馬故知所帥者司馬之屬官故以之屬言之也云四方之神者即天地山川之等云郊有羣神之兆者上文兆五帝於四郊四類四望亦如之兆山川丘陵各於其方是羣神之兆也引詩傳者證頒禽之義書傳亦云焉大烖及執事禱祠于上下神示注執事大祝及男巫女巫也求福曰禱得求曰祠讄曰禱爾于上下神祗鄭司農云小宗伯與執事共禱祠音義讄音誄疏釋曰云大烖者謂國遭水火及年穀不熟則禱祠于上下天地神祗注釋曰鄭知執事之中大祝及男巫女巫者見大祝職云國有大故天灾則彌祀社稷司巫云國大烖則帥巫而造巫恆男巫職中雖無事其司巫所帥者即帥男巫也女巫職云凡邦之大烖歌哭而請是以鄭君歷而言焉以充事也云求福曰禱得求曰祠兩言之者欲見初禱後得福則祠之也王崩大肆以秬鬯渳注鄭司農云大肆大浴也杜子春讀渳為泯以秬鬯浴尸𤣥謂大肆始陳尸伸之音義渳亡婢反杜音泯亡忍反李亡辨反疏注釋曰先鄭與子春所解皆不釋肆字故後鄭就足之特解肆為始陳尸伸之者肆訓為陳為伸故也必用秬鬯者以死者人所惡故以秬鬯浴尸使之香也大祝職云大喪始崩以肆鬯渳尸小祝又云大喪贊渳彼二官已掌之此言之者察其不如儀也及執事涖大斂小斂帥異族而佐注執事大祝之屬涖臨也親斂者蓋事官之屬為之喪大記曰小斂衣十九稱君大夫士一也大斂君百稱大夫五十稱士三十稱異族佐斂疏者可以相助音義斂力豔反下及注同稱尺證反疏注釋曰鄭知執事是大祝之屬者案大祝職云大喪贊斂眀大祝執事小宗伯涖之云親斂者蓋事官之屬為之者以其諸處更不見主斂事者事官又主工巧之事以無正文故疑事官之屬為之也引喪大記者以天子之喪大小斂稱數無文故約諸侯法推出天子斂之稱數也案喪大記注小斂十九稱法天地之成數故尊卑同至於襲與大斂乃異大斂五等諸侯同百稱天子蓋百二十稱也天子大夫士約與諸侯之卿大夫士同以其執贄同故祿與廟數及襲斂亦無嫌也云異族佐斂疏者可以相助者此異族據姓而言之縣衰冠之式于路門之外注制色宜齊同音義縣音𤣥衰七雷反疏釋曰式謂制及色故鄭云制色宜齊同知式中兼有色者案禮記問喪云斬衰貌若苴齊衰貌若枲齊斬之衰其色亦如貌故鄭知式中兼有色也但冠不據色是以喪服傳云冠六升鍛而勿灰眀不色如苴也縣衰冠者大僕云縣喪首服之法于宫門注云首服謂免髽笄總廣狹長短之數與此不同故彼别縣之也及執事視葬獻器遂哭之注執事蓋梓匠之屬至將葬獻明器之材又獻素獻成皆於殯門外王不親哭有官代之疏釋曰此文承衰冠之下卜葬之上謂既殯之後事故禮記檀弓云既殯旬而布材與明器云執事視葬獻器遂哭之謂獻明器之時小宗伯哭此眀器哀其生死異也注釋曰鄭知執事是梓匠之屬者以其明器所為是工巧之事梓人匠人見主工巧故知是梓匠也言之屬者冬官總主人工事故以之屬兼之但無正文故云蓋以疑之也云至將葬獻眀器之材者亦約檀弓云既殯旬而布材故知將葬獻材也又知獻素獻成皆於殯門外者見士喪禮云獻材于殯門外西面北上請主人遍視之如哭椁獻素獻成亦如之注云形法定為素飾治畢為成是其事也云王不親哭有官代之者案士喪禮主人親哭以無官此王不親哭以其有官有官即小宗伯哭之是也卜葬兆甫竁亦如之注兆墓塋域甫始也鄭大夫讀竁皆為穿杜子春讀竁為毳皆謂葬穿壙也今南陽名穿地為竁聲如腐脆之脆音義竁昌絹反李依杜昌鋭反鄭大夫音穿腐房甫反脆七歲反舊作脺誤劉清劣反或倉沒反字書無此字但有膬字音千劣反今注本或有作膬字者則與劉音為協沈云字林有脺音卒脺者牛羊脂膬者耎易破恐字誤案如沈解義則可通聲恐未協脺已下皆非鄭義疏釋曰王喪七月而葬將葬先卜墓之塋兆故云卜葬兆也云甫竁者既得吉而始穿地為壙故云甫竁也云亦如之者亦如上明器哭之但明器材哭於殯門外此卜葬地在壙所其哭亦與在殯所哭之相似故云亦知之注釋曰孝經云卜其宅兆注以兆為龜兆解之此兆為墓塋兆者彼此義得兩合相兼乃具故注各據一邊而言也鄭大夫讀竁皆為穿此經唯有一竁而云皆并下冢人甫竁皆為穿也杜子春讀竁為毳毳亦是穿當時有此語後鄭從之故云皆謂葬穿壙也云今南陽名穿地為竁聲如腐脆之脆者時南陽郡人名穿地為竁竁之聲如腐脆之脆則以竁為脆也既葬詔相喪祭之禮注喪祭虞祔也檀弓曰葬日虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭明日祔于祖父音義離力知反疏注釋曰鄭知喪祭是虞祔也者以文承卜葬之下成葬之上其中唯有虞祔而已故以虞祔解之也檀弓曰葬日虞弗忍一日離也者自始死至葬前未忍異於生故無尸而設奠象生時薦羞於坐前也既葬送形而往迎魂而反日中而虞虞者鄭注士虞禮云虞安也所以安神是也葬之朝為大遣奠反日中而虞是不忍一日使父母精神離散故云不忍一日離也云是日也以虞易奠者以士虞禮云男男尸女女尸為神象鬼事之是以虞易奠也云卒哭曰成事是日也以吉祭易喪祭者案士虞禮三虞卒哭他用剛日云哀薦成事故檀弓記人解士虞禮云卒哭曰成事祭以吉為成故云是日也以吉祭易喪祭注云喪祭虞祭是也云明日祔於祖父者引之證經喪祭為虞祭又為祔祭士之禮葬用柔日假令丁日葬葬日第一虞隔戊日己日為第二虞後虞改用剛用庚日卒哭亦用剛日隔辛日壬日為卒哭祭其祔祭又用柔日則癸日為祔祭是士從始虞至祔日總用七日以此差之大夫五虞諸侯七虞天子九虞相次日數可知耳此喪中自相對虞為喪祭卒哭即為吉祭以卒哭無時哭哀殺故為吉祭若喪中對二十八月復平常為吉祭則禫祭已前皆為喪祭也若然喪中自相對虞為喪祭卒哭為吉祭而鄭云喪祭虞祔并祔祭亦為喪祭者此鄭欲引檀弓并祔祭總釋故喪中之祭總為喪祭而言其實卒哭既為吉祭祔祭在卒哭後是吉祭可知也成葬而祭墓為位注成葬丘已封也天子之冢蓋不一日而畢位壇位也先祖形體託於此地祀其神以安之冢人職曰大喪既有日請度甫竁遂為之尸疏釋曰云成葬者謂造丘墳已訖以王之靈柩託於此土故祭后土之神使安祐之當設祭位於墓左也注釋曰成葬丘已封也者案冢人以爵等為丘封之度據彼有丘封之文故依而言之天子之冢蓋不一日而畢云者案檀弓云有司以几筵舍奠於墓左反日中而虞注云所使奠墓有司來歸乃虞也則虞祭在奠墓後以其士之墳蓋高四尺故日中虞祭待奠墓有司來歸此上文既云詔相喪祭則虞祭訖矣於下乃云成葬祭墓為位則虞祭不待奠墓有司來歸者由天子之冢高大蓋不一日而畢故設奠喪祭在成葬之上也引冢人職者證祭墓為位時冢人為尸以祭后土也凡王之會同軍旅甸役之禱祠肄儀為位注肄習也故書肄為肆儀為義杜子春讀肆當為肄義為儀若今時肄司徒府也小宗伯主其位音義肄以志反習也沈音四李又似二反疏釋曰言王有會同軍旅甸役之事皆有禱祠之法云肄儀為位者數者禱祠皆須豫習威儀乃為之故云肄儀也當習威儀之時則小宗伯為位也國有禍烖則亦如之注謂有所禱祈疏釋曰禍烖謂國遭水火凶荒則有禱祈之事故云亦如之凡天地之大烖類社稷宗廟則為位注禱祈禮輕類者依其正禮而為之疏釋曰天烖謂日月食星辰奔殞地烖謂震裂則類祭社稷及宗廟亦小宗伯為位祭之注釋曰凡言類者皆謂依事類而為之但求福曰禱禱禮輕得求曰祠祠禮重是祠者依正祭之禮也則禱禮輕者雖依正禮祭饌略少凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀疏釋曰凡言大禮者王親為之者小禮者羣臣攝而為之者小禮小宗伯專掌其事其法如大宗伯之儀但非王親行則謂之小禮也肆師之職掌立國祀之禮以佐大宗伯注佐助也疏釋曰肆師是宗伯之考每事皆佐宗伯此經與下為目其立國祀之禮則下經所云立大祀已下是也立大祀用玉帛牲牷立次祀用牲幣立小祀用牲注鄭司農云大祀天地次祀日月星辰小祀司命已下𤣥謂大祀又有宗廟次祀又有社稷五祀五嶽小祀又有司中風師雨師山川百物音義牷音全疏釋曰此則佐宗伯之事案大宗伯有禋祀已下并宗廟六享之事此肆師陳用玉帛牲牷之等注釋曰司農云大祀天地至司命以下先鄭據大宗伯直據天神大次小而言唯天神中兼言地而已其於地示不言次小人鬼之中又不言大次小故後鄭就足之耳後鄭云大祀又有宗廟者以其先鄭於大祀中無人鬼故後鄭特舉之云次祀又有社稷五祀五嶽者此後鄭特舉社稷已下者以先鄭次祀中不言血祭社稷已下故也云小祀又有司中風師雨師山川百物者此後鄭見先鄭天神小祀中唯云司命以下其言不備故具之山川百物就足先鄭地示小祀耳若然後鄭直云大祀又有宗廟更不言宗廟次小祀者但宗廟次祀即先公是也不言之者已於酒正云次祀鷩冕毳冕所祭已具於彼故也又不言宗廟小祀者宗廟小祀其神不眀馬君雖云宗廟小祀殤與無後無眀文故後鄭亦不言也經言立大祀用玉帛牲牷者天神中非直有升煙玉帛牲亦有禮神者也地示中非直瘞埋中有玉帛牲亦兼有禮神玉帛牲也宗廟中無煙瘞埋直有禮神幣帛與牲又不見有禮神之玉或可以灌圭為禮神之玉亦通一塗立次祀用牲幣者天神日月星辰地示血祭社稷五祀五嶽是也宗廟次祀已下與大祀同亦直有禮神幣帛而已以歲時序其祭祀及其祈珥注序第次其先後大小故書祈為幾杜子春讀幾當為祈珥當為餌𤣥謂祈當為進禨之禨珥當為衈禨衈者釁禮之事雜記曰成廟則釁之雍人舉羊升屋自中中屋南面刲羊血流于前乃降門夾室皆用雞其衈皆於屋下割雞門當門夾室中室然則是禨謂羊血也小子職曰掌珥于社稷祈于五祀是也亦謂其宫兆始成時也春秋僖十九年夏邾人執鄫子用之傳曰用之者何蓋叩其鼻以衈社也音義祈及注禨同巨既反或巨依反珥而志反注衈同刲苦圭反夾古洽反劉古協反疏釋曰言歲時序其祭祀者即上立大祀已下至小祀皆依歲之四時次序其大小先後也及其刉珥謂釁禮之事用毛牲即曰刉用羽牲即曰衈注釋曰云序第次其先後者不必先大後小天地人之鬼神各有大次小或小而應先或大而應後各自當其時以祭之故云第次其先後也云故書祈為幾杜子春讀幾當為祈珥為餌者皆義無所取故鄭不從之也𤣥謂祈當為進禨之禨者案禮記玉藻沐畢云進禨鄭以為沐而飲酒曰禨彼禨為禨福之義此直取音讀不取其義云珥當為衈者經言珥是玉珥非取血之義故讀從雜記下血傍為之也云雜記曰成廟則釁之雍人舉羊升屋自中者謂升上其屋當屋脊之中央云門夾室皆用雞者謂廟門及兩廂夾室三處皆用雞其衈皆於屋下者謂三處皆不升屋而在屋下殺雞也云割雞門當門夾室中室者中謂當室中央云然則是禨謂羊血也者鄭既引雜記之衈欲破經珥及子春餌之意也云小子職曰掌珥于社稷祈于五祀是也者引證血傍為之以證衈義也其祈字猶不從故彼注引秋官士師曰凡刉衈則奉犬牲毛牲曰刉羽牲曰衈此刉衈正字與若然刉既正字而讀從進禨者且從故書幾音耳至士師别為正解也云春秋傳曰者公羊傳文引之者謂證衈是取血以釁之事大祭祀展犧牲繫于牢頒于職人注展省閲也職讀為樴樴可以繫牲者此職人謂充人及監門人音義職劉之弋反戚音弋注樴同監古銜反疏釋曰肆師以將有天地宗廟大祭祀牧人以牲與充人之時肆師省閲其牲看完否及色堪為祭牲乃繫于牢頒付于職人也注釋曰鄭讀職為樴者但三百六十官皆有職司若言職則無所指斥若為樴為聲謂置臬之時樴樴然作聲故讀從樴可以繫牲者也云此樴人謂充人及監門人者案充人云祀五帝繫于牢芻之三月凡散祭祀之牲繫于國門使養之故知樴人是此二官也言此樴人對彼樴人不要是充人監門人也牛人所云樴人者彼鄭注充人并牧人在其中矣此有監門人者謂兼祭諸神司中之等凡祭祀之卜日宿為期詔相其禮視滌濯亦如之注宿先卜祭之夕疏釋曰言凡祭祀之卜日謂天地宗廟之等將祭前有散齊七日致齊三日十日矣若然卜日吉則齊今云祭祀之卜日宿為期則是卜前之夕與卜者及諸執事者以眀旦為期也云詔相其禮者謂肆師詔告相助其卜之威儀及齊戒之禮云視滌濯亦如之者謂祭前之夕視滌濯祭器亦詔相其禮故云亦如之祭之日表齍盛告潔展器陳告備及果築煮相治小禮誅其慢怠者注粢六穀也在器曰盛陳陳列也果築煮者所築煮以祼也故書表為剽剽表皆謂徽識也鄭司農云築煮築香草煮以為鬯音義果古亂反下同煮音煮相息亮反下相其禮及注同剽芳遙反或祊遙反識式志反又昌志反疏釋曰云祭之日表齍盛告潔者當祭之日旦具黍稷等盛於簠簋陳於廟堂東又以徽識表其名又告潔淨云展器陳告備者謂祭日旦於堂東陳祭器實之既訖則又展省視之而告備具故云展器陳告備也云及果築煮者謂於宗廟有祼案禮記雜記築鬱臼以椈杵以梧而築鬱金煮以和秬鬯之酒以泲之而祼矣云相治小禮者謂羣臣行事則肆師相治之云誅其慢怠者謂執事之人有惰慢懈怠者則誅責之注釋曰爾雅云粢稷也彼特訓粢為稷者以稷為五穀之長其總而言之六穀皆是粢故此經總六穀為粢故鄭云粢六穀也案食醫和王六食黍稷稻粱麥苽六食即膳夫云六穀一物故鄭云六穀也鄭司農云築煮築香草煮以為鬯者此言築煮鬱人云祼事和鬱鬯謂取鬱金煮和秬鬯之酒泲以祼神及賓客故二鄭俱言之云皆謂徽識也者以剽表字雖不同俱是徽識也於六粢之上皆為徽識小旌書其黍稷之名以表之餘饌不表獨此表之者以其餘器所盛各異覩器則知其實此六穀者簠盛稻粱簋盛黍稷皆有盒蓋覆之覩器不知其實故特須表顯之也但鬱人自掌鬱此又掌之者彼官正職此肆師察其不如儀者也掌兆中廟中之禁令注兆壇塋域疏釋曰案小宗伯云兆五帝於四郊已下則四郊之上神兆多矣皆掌不得使人干犯神位七廟亦然故云掌其禁令也注釋曰凡為壇者四面皆塋域圍之若宫墻然故云兆壇塋域也凡祭祀禮成則告事畢大賓客涖筵几築煮注此王所以禮賓客疏釋曰案大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢大宗伯云大賓客攝而載祼則此官主以築鬱金煮之和鬯酒也筵几云涖謂司几筵設之肆師臨之也注釋曰言此以對彼彼則上經築煮禮宗廟神也贊祼將注酌鬱鬯授大宗伯載祼疏注釋曰此據大宗伯職而言案小宰亦云賓客贊祼者容有故相代也大朝覲佐儐注為承儐疏注釋曰此言大朝覲為承儐謂大會同朝覲時若四時常朝則小行人為承儐小行人所云者是也共設匪罋之禮注設於賓客之館公食大夫禮曰若不親食使大夫以侑幣致之豆實實于罋簋實實于筐匪其筐字之誤與禮不親饗則以酬幣致之或者匪以致饗音義罋於貢反食音嗣下同與音餘下侯與同疏釋曰此肆師不掌飲食而共設者肆師主禮事謂依禮使掌客之等及諸官共設之也注釋曰鄭知設於賓客之館者凡待賓客之禮饗食在廟其器不用匪罋今言共設匪罋眀是王不親饗食於賓館設之可知引公食禮者欲見此經與彼同同是不親食之事又欲破匪從筐之事也云字之誤與者無正文約同彼故云與以疑之也云禮不親饗則以酬幣致之者此亦公食大夫禮文云或者匪以致饗者鄭君向引公食大夫須破匪從筐又言饗禮者饗禮亡無妨致饗時用匪不用筐但無正文故云或以疑之也饗食授祭注授賓祭肺疏注釋曰饗者亨大牢以飲賓獻依命數食者亦亨大牢以食賓舉依命數云授祭者祭謂祭先造食者案膳夫云授王祭則此授祭者非授王可知故鄭云授賓祭肺也必知祭肺者有虞氏祭首夏后氏祭心殷祭肝周祭肺肺周所祭故知祭者祭肺也與祝侯禳于疆及郊注侯禳小祝職也疆五百里遠郊百里近郊五十里疏釋曰侯者候迎善祥禳者禳去殃氣故肆師與小祝為此侯禳二事于疆及郊凡侯禳從內向外應先言郊後言疆今先言疆倒言之者可遠則遠可近則近任當時之宜故倒文以見義也注釋曰知疆五百里者王畿千里中置國城面五百里故大司馬云方千里曰國畿也知遠郊百里者司馬法文知近郊五十里者案尚書君陳序云分正東郊成周鄭彼注云成周在近郊五十里案今河南洛陽相去則然以其漢法於王城置河南縣於成周置洛陽縣相去見五十里是近郊五十里故云東郊也大喪大渳以鬯則築煮注築香草煮以為鬯以浴尸香草鬱也疏釋曰上小宗伯大喪以鬯渳則肆師與之築鬱金香草和鬯酒以浴尸使之香也令外內命婦序哭注序使相次秩疏釋曰案下注六鄉以出及朝廷卿大夫妻皆為外命婦其內命婦即下經內命女是也謂三夫人以下至女御也注釋曰哭法以服之輕重為先後若然則內命婦為王斬衰居前諸臣之妻從服齊衰者居後也禁外內命男女之衰不中法者且授之杖注外命男六鄉以出也內命男朝廷卿大夫士也其妻為外命女喪服為夫之君齊衰不杖內命女王之三夫人以下不中法違升數與裁制者鄭司農云三日授子杖五日授大夫杖七日授士杖此舊說也喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖無七日授士杖文𤣥謂授杖日數王喪依諸侯與七日授士杖四制云音義衰七雷反注同中丁仲反注同為夫于僞反下為取同疏釋曰外內命男女為王雖有齊斬不同其衰皆有升數多少及裁制故禁之使依法也云且授之杖者外內命男及內命女皆為王斬者有杖授之其外命女為王齊衰無杖故云且見不定之義也注釋曰云內外男女者無正文鄭以意言之以王宮為正朝廷在王宮內為內命男故以六鄉六遂及公邑大夫等皆為外命男其妻總為外命女者此對三夫人以下既為內命女則此朝廷及六鄉以外卿大夫妻為外命女可知云喪服為夫之君齊衰不杖者是喪服不杖齊衰章文云內命女王之三夫人以下者通九嬪二十七世婦八十一御妻皆為王斬衰而杖也云不中法違升數與裁制者諸臣妻為夫之君義服衰六升諸臣為王義服斬衰衰三升半冠六升三夫人已下為王正服斬衰衰三升是其數也言裁制者據喪服云凡衰外削幅裳內削幅幅三袧已下具有裁制司農所云三日授子杖五日授大夫杖七日授士杖雖云舊說仍是四制之文也𤣥謂王喪依諸侯者王喪諸臣等無授杖之日數以諸侯之臣與王之臣同斬衰杖竹故授杖日數亦宜同也以檀弓云天子崩三日祝先服鄭注云祝佐含斂先服眀子與夫人亦服矣則天子之子及后亦服矣五日官長服注官長大夫士眀天子三公已下及三夫人已下亦亦服矣但服杖俱同時有服即杖矣士為天子服授杖當七日矣是以王喪約同諸侯之法也凡師甸用牲于社宗則為位注社軍社也宗遷主也尚書傳曰王升舟入水鼓鐘亞觀臺亞將舟亞宗廟亞故書位為涖杜子春云涖當為位書亦或為位宗謂宗廟音義甸音田下大甸同疏釋曰師謂出師征伐甸謂四時田獵二者在外或有祈請皆當用牲于社及宗時皆肆師為祭位也注釋曰云社軍社也者在軍不用命戮於社又君以軍行祓社釁鼓故名軍社也鄭知宗遷主者曾子問云師行必以遷廟主行載於齊車故知遷主也尚書傳曰王升舟已下者謂說武王於文王受命十一年觀兵之時武王於孟津渡河升舟入水在前鼓鍾亞亞王舟後觀臺亞者觀臺可以望氛祥亞鼓鍾後將舟亞者以社主主殺戮與軍將同故名社主為將將舟亞在觀臺後宗廟亞者宗廟則遷主也亞在將舟後引之者證在軍有社及宗之意也異義公羊說天子有三臺有靈臺所以觀天文有時臺以觀四時施化有囿臺所以觀鳥獸魚鱉諸侯卑無靈臺不得觀天文有時臺囿臺左氏說天子有靈臺諸侯有觀臺若然文王時已有靈臺今武王而曰觀臺者鄭君之意觀臺則靈臺對文有異散文則通類造上帝封于大神祭兵于山川亦如之注造猶即也為兆以類禮即祭上帝也類禮依郊祀而為之者封謂壇也大神社及方嶽也山川蓋軍之所依止大傳曰牧之野武王之大事也既事而退柴於上帝祈于社設奠於牧室音義造七報反注造猶同牧戚音目劉音茂疏釋曰上輕用牲於社宗據在軍下云師不功據敗退後則此經據尅勝後告天及社之事注釋曰諸文皆云造于禰類於上帝造屬於禰此以類造同云于上帝則造與類同屬于上帝故鄭云造猶即與造門之造同也云為兆以類禮即祭上帝者若依國四郊則自有尋常兆域今戰訖而祭故須新為壇兆故鄭云為兆也鄭知類禮依郊祀而為之者此直是告祭非常非是禱祈之所祭故知依正禮郊祀而為之謂如四時迎氣於四郊皆是也云大神社及方嶽也者以其今所報告皆是出時告者以出時類于上帝宜于社造于禰今大神文在上帝下而云封祭之明是社也知兼有方嶽者見小宗伯云軍將有事於四望謂將戰時今戰訖所告明兼祭方嶽方嶽即四望也云山川蓋軍之所依止者以其山川衆多不可竝祭軍旅思險阻軍止必依山川故知祭軍所依止者也云大傳者禮記大傳篇云牧之野武王之大事也者牧誓序云時甲子昧爽武王與受戰於牧野鄭注云紂近郊三十里名牧是武王伐紂之事故云大事云既事而退者武王與紂於牧地戰紂敗退入紂都自焚於宣室武王入紂都既封建乃退向牧地云柴於上帝者以實柴祭帝即此經類于上帝一也云祈于社者即此經封于大神一也云設奠於牧室者謂祭行主文王於牧野之室於此文無所當連引之者欲見此經亦當有祭行主不言者文不備也凡師不功則助牽主車注助助大司馬也故書功為工鄭司農工讀為功古者工與功同字謂師無功肆師助牽之恐為敵所得疏釋曰師不功謂戰敗云助牽主車者主中有二謂社之石主遷廟木主也注釋曰知助助大司馬也者案大司馬職云若師不功則厭而奉主車故知此肆師助大司馬也若然案小宗伯云立軍社奉主車謂未敗時若敗即大司馬奉之凡四時之大甸獵祭表貉則為位注貉師祭也貉讀為十百之百於所立表之處為師祭造軍法者禱氣勢之增倍也其神蓋蚩蛔或曰黃帝音義貉莫駕反鄭音陌後表貉皆同蛔音尤疏釋曰案大司馬仲冬教大閲教戰訖入防將田既陳乃設驅逆之車有司表貉于陳前此時肆師為位而祭也注釋曰知貉師祭也者爾雅云是類是禡師祭也故知貉為師祭也云貉讀為十百之百者鄭以聲讀之必名此祭為貉者以其取應十得百為十倍之義云祭造軍法者凡言祭者祭先明是先世創首造軍法者也云禱氣勢之增倍也者謂禱祈使師有氣勢望得所獲增益十倍還釋貉字之意也云其神蓋蚩尤或曰黃帝者案史記黃帝與蚩尤戰于涿鹿之野俱是造兵之首案王制云天子將出類乎上帝注云帝謂五德之帝是黃帝以德配類則貉祭祭蚩尤是以公羊說曰師出曰祠兵入曰振旅祠者祠五兵矛㦸劍楯弓矢及祠蚩尤之造兵者謹案三朝記曰蚩尤庶人之强者何兵之能造故鄭云或曰黃帝也又禮說云黃帝以德行蚩尤與黃帝戰亦是造兵之首故漢高亦祭黃帝蚩尤於沛庭也嘗之日涖卜來歲之芟注芟芟草除田也古之始耕者除田種穀嘗者嘗新穀此芟之功也卜者問後歲宜芟不詩云載芟載柞其耕澤澤音義芟色銜反柞側百反疏釋曰秋祭曰嘗以其物新熟可嘗而為祭名也正當嘗祭日肆師涖卜來歲之芟者以其餘事卜則大宗伯涖卜或大卜涖卜此及下三事皆肆師涖卜也則陳龜貞龜命龜視高作龜使卜師卜人之等為之注釋曰芟芟草對柞是殺木引詩者欲見載芟即此經芟也云載柞者柞是除木於經雖無所當欲見有草則芟之有木則柞之皆是治田以稼種故并言之也云其耕澤澤者既除草木則耕之澤澤和柔也獮之日涖卜來歲之戒注秋田為獮始習兵戒不虞也卜者問後歲兵寇之備音義獮思淺反疏釋曰謂肆師正當出獮田之日則涖卜來歲之戒不虞之事注釋曰秋田曰獮大司馬職文云始習兵戒不虞者鄭解不於春搜夏苗涖卜來歲之戒必於秋獮之日為戒者以其春教振旅夏教茇舍非正習兵秋教治兵之日故於是戒不虞也言不虞者虞度也以兵寇之事來否不可億度當豫戒備之故鄭云卜者問後歲兵寇之備也社之日涖卜來歲之稼注社祭土為取財焉卜者問後歲稼所宜疏釋曰類上文嘗獮是秋則此社亦是秋祭社之日也言涖卜來歲之稼者祭社有二時謂春祈秋報報者報其成熟之功今卜者卜來歲亦如今年宜稼與不但春稼秋穡不言穡而言稼者秋穡由於春稼故據稼而言之注釋曰案郊特牲云社祭土而主隂氣也取財於地取法於天又孝經緯云社者五土之總神故云社祭土為取財焉若國有大故則令國人祭注大故謂水旱凶荒所令祭者社及禜酺音義禜音詠酺音蒲又音步疏注釋曰知大故是水旱凶荒者以其命國人祭明大故是天下皆有故知水旱凶荒凶荒謂年穀不熟知所命祭是社及禜酺者經云命國人祭案地官州祭社黨祭禜族祭酺於六遂之中亦縣祭社鄙祭禜酇祭酺皆是國人所祭之事也歲時之祭祀亦如之注月令仲春命民社此其一隅疏釋曰云歲時之祭祀者王經據禱祈非時祭故此經見其常祭也云亦如之者亦命國人祭也注釋曰凡言歲時者謂歲之四時月令唯見一時故鄭云此其一隅也若然月令唯言春者特舉春祈而言舉一隅可以三隅反則餘三時亦祭也凡卿大夫之喪相其禮注相其適子疏注釋曰鄭知相適子者庶子無事適子則有拜賓送賓之事且卿大夫適子為天子斬衰故知所相者適子也凡國之大事治其禮儀以佐宗伯注治謂如今每事者更奏白王禮也故書儀為義鄭司農云義讀為儀古者書儀但為義今時所謂義為誼疏釋曰案小宗伯已云佐宗伯此又言之者但肆師與小宗伯中下大夫命數是一故二人同佐宗伯無嫌也案大宗伯云治其大禮小宗伯云相治小禮此又云治其禮儀者謂佐大小宗伯治之謹習其事也凡國之小事治其禮儀而掌其事如宗伯之禮疏釋曰此一經於職末總結之也鬱人掌祼器注祼器謂彝及舟與瓚疏注釋曰知祼器中有彝及舟者此經下文云和鬱鬯以實彝又見司尊彝云春祠夏禴祼用雞彝鳥彝皆有舟秋冬及追享朝享皆云焉故知有彝舟也知有瓚者案禮記王制云諸侯賜圭瓚然後為鬯尚書序云平王錫晉文侯秬鬯圭瓚皆與秬鬯相將即下文祼玉是也故知祼器中有瓚瓚則兼圭瓚璋瓚也凡祭祀賓客之祼事和鬱鬯以實彝而陳之注築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之焦中停於祭前鬱為草若蘭音義焦子遙反劉似消反本又作鐎音同李又即修反疏釋曰天地大神至尊不祼至於山川及門社等事在鬯人亦無祼事此云祭祀唯據宗廟耳其賓客祼則大行人云公再祼之等是也云和鬱鬯者謂和鬯人所造秬黍之鬯酒也為宗廟賓客用鬱者則鬱人築鬱金草煮之以和鬯酒更和以盎齊泲之以實彝陳於廟中饗賓客及祭宗廟之處也注釋曰鄭知築鬱金草煮之者見肆師云築煮故知之也司農云十葉為貫百二十貫為築者未知出何文云以煮之鐎中停於祭前者此似直煮鬱停之無鬯酒者文略其實和鬯酒也云鬱為草若蘭者蘭則蘭芝以其俱是香草故比類言之案王度記云天子以鬯諸侯以薰大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以薰謂未得圭瓚之賜得賜則以鬱耳王度記云天子以鬯及禮緯云鬯草生庭皆是鬱金之草以其和鬯酒因號為鬯草也凡祼玉濯之陳之以贊祼事注祼玉謂圭瓚璋瓚疏釋曰此祼玉即圭璋是也故玉人典瑞皆云祼圭只有二寸禮記郊特牲云灌以圭璋用玉氣也注釋曰案禮記祭統云君用圭瓚祼尸大宗用璋瓚亞祼鄭云大宗亞祼容夫人有故攝焉若然王用圭瓚后用璋瓚可知故鄭并言之也詔祼將之儀與其節注節謂王奉玉送祼早晏之時疏釋曰云祼將之儀者即是奉玉送祼之威儀云節者即早晚時節故兩言之注釋曰云奉玉謂王與后祼時奉瓚而酌鬱鬯云送祼者謂送之以授尸尸得祭之嚌之奠之不飲故上文司農云停於祭前也凡祼事沃盥疏釋曰凡言非一若賓客則大宗伯祼若祭祀王及后祼皆鬱人沃以水盥手及洗瓚也大喪之渳共其肆器注肆器陳尸之器喪大記曰君設大盤造冰焉大夫設夷盤造冰焉士併瓦盤無冰設牀䄠第有枕此之謂肆器天子亦用夷盤音義造七報反下同併薄冷反䄠章善反沈又音但第側几反疏注釋曰肆訓為陳故鄭云謂陳尸之器也云喪大記云君設大盤造冰焉大夫設夷盤造冰焉者此謂二月已後至八月鄭注喪大記造猶內也引漢禮大盤廣八尺長丈二深三尺赤中夷盤小焉云士併瓦盤無冰者則盛水以寒尸士喪禮君賜冰用夷盤云設牀䄠第有枕者此謂陳尸之牀設冰於其下云天子亦用夷盤者淩人職云大喪共夷盤冰此夷盤則諸侯大盤之類與大夫夷盤同名耳大小則異也及葬共其祼器遂貍之注遣奠之彝與瓚也貍之於祖廟階間明奠終於此音義貍亡皆反遣棄戰反疏注釋曰知葬共祼器據遣奠時者以葬時不見有設奠之事祖祭已前奠小不合有彝器奠之大者唯有遣奠故知於始祖廟中厥明將葬之時設大遣奠有此祼器也此即司尊彝云大喪存奠彝者是也以奠無尸直陳之於奠處耳言貍之於祖廟階間者此案曾子問無遷主者以幣帛皮圭以為主命行反遂貍之於祖廟兩階之間此大遣奠在始祖廟事訖明亦貍之於階間也云明奠終於此者自此已前不忍異於生設奠食象生而無尸自此已後葬訖反日中而虞則有尸故士虞禮云男男尸女女尸以神事之謂之祭異於生故云明奠終於此也大祭祀與量人受舉斝之卒爵而飲之注斝受福之嘏聲之誤也王酳尸尸嘏王此其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯㸋事相成音義斝古雅反嘏古雅反酳侯吝反又音𦙍㸋音煩疏釋曰此大祭祀云受嘏謂祭宗廟者也云與量人受舉嘏之卒爵而飲之者謂王酳尸後尸嘏王之節也注釋曰鄭知斝是受福之嘏非天子奠斝殷爵名者案郊特牲云舉斝角詔妥尸其時無鬱人量人受爵飲之法唯有受嘏時受王卒爵飲之禮故破斝為受福之嘏也云王酳尸尸嘏王此其卒爵也者此約少牢特牲禮故鄭即引少牢以為證也云少牢饋食禮主人受嘏詩懷之卒爵者天子諸侯祭有二灌朝踐饋獻各二獻之事乃有陰厭迎尸入户尸食訖王酳尸大夫士無饋獻已前之事直有陰厭已後酳尸之事天子諸侯祭禮亡故陰厭已後取少牢特牲續之今獻鬱人量人之節當大夫獻祝及佐食之時云主人受嘏詩懷之者謂隂厭後迎尸入升席坐尸食訖主人酳尸尸酢主人在户東西面受尸酢時尸命祝嘏主人以大福遂以黍稷肺授主人詩承也主人承之內於懷中挂於季指乃拜而飲卒爵也云執爵以興出宰夫以籩受嗇黍者嗇黍即所斂聚黍稷肺授之者也云主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也者大夫士有獻祝及佐食無獻鬱人量人法天子有獻鬱人量人之禮無獻祝及佐食之事但其節同故引為證也云必與量人者鬱人贊祼尸者即上文贊祼事詔祼將之儀是也云量人制從獻之脯㸋者案量人云凡祭祀饗實制其從獻脯㸋之數量是也云事相成者前祼後獻祭事乃成故云事相成也鬯人掌共秬鬯而飾之注秬鬯不和鬱者飾之謂設巾疏釋曰云掌共秬鬯者此直共秬黍之酒無鬱也故注云不和鬱者也鄭知飾之謂設巾者此上下雖無設巾之事案幂人云以疏布巾幂八尊以畫布巾幂六彝凡王巾皆黼凡尊皆有巾幂明秬鬯之酒尊亦設巾可知故知所飾者設巾也凡祭祀社壝用大罍注壝謂委土為墠壇所以祭也大罍瓦罍音義壝唯癸反劉欲鬼反罍音雷或郎追反墠音善又音禪疏注釋曰壝謂委土為墠壇所以祭者謂四邊委土為壝於中除地為墠墠內作壇謂若三壇同墠之類也此經云社壝謂若封人及大司徒皆云社壝皆直據外壝而言也知大罍是瓦罍者旊人為瓦簋據外神明此罍亦用瓦取質略之意也禜門用瓢齎注禜謂營酇所祭門國門也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之魯莊二十五年秋大水鼓用牲于社于門故書瓢作剽鄭司農讀剽為瓢杜子春讀齎為粢瓢謂瓠蠡也粢盛也𤣥謂齎讀為齊取甘瓠割去柢以齊為尊音義禜音詠瓢婢遙反齎音齊在兮反杜音資酇作管反剽匹召反蠡力兮反或郎戈反去起吕反柢音帝疏注釋曰鄭知禜謂營酇者欲見祭神非一取營酇而祭之義故也鄭知門是國門者禮記祭法云天子祭七祀有國門故知也春秋傳者昭元年子産辭彼先云山川後云日月此先云日月者鄭君所讀春秋先日月與賈服傳不同故也彼無不時此有之者鄭以義增之非傳文引之者證禜是營酇而祭之義引莊二十五年傳者證有門之義但彼譏伐鼓用牲其大水祭門是也𤣥謂齎讀為齊者以其割齊為尊亦取質略之意故不從子春也廟用修凡山川四方用蜃凡祼事用概凡疈事用散注祼當為貍字之誤也故書蜃或為謨杜子春云謨當為蜃書亦或為蜃蜃水中蜃也鄭司農云修謨概散皆器名𤣥謂廟用修者謂始禘時自饋食始修蜃概散皆漆尊也修讀曰卣卣中尊謂獻象之屬尊者彝為上罍為下蜃畫為蜃形蚌曰合將尊之象概尊以朱帶者無飾曰散音義修音卣羊久反又音由中尊也祼音埋出注概古愛反疈孚逼反散素旱反注及下注同獻素何反蚌步項反曰合音含本亦作含將如字本又作漿疏注釋曰鄭破祼為埋者若祼則用鬱當用彝尊不合在此而用概尊故破從埋也埋謂祭山林則山川用蜃者大山川司農云修謨概散皆器名者先鄭從古云謨後鄭亦不從之矣𤣥謂廟用修者謂始禘時者謂練祭後遷廟時以其宗廟之祭從此始自始死已來無祭今為遷廟以新死者木主入廟特為此祭故云始禘時也以三年喪畢明年春禘為終禘故云始也云自饋食始者天子諸侯之祭自灌始有朝踐饋獻乃有饋食進黍稷大夫士禮無饋獻已前事直自饋食始即特牲少牢皆云饋食之禮是也今以喪中為吉祭不可與吉時同故略同大夫士禮且案大宗伯宗廟六享皆以祼為始當在鬱人用彝今不用鬱在鬯人用卣尊故知略用饋食始也若然鄭知義遷廟在練時者案文二年穀梁傳云作主壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也是時木主新入廟禘祭之是以左氏說凡君薨祔而作主特祀主於寢畢三時之祭朞年然後蒸嘗禘於廟許愼云左氏說與禮同鄭無駮明用此禮同義與穀梁傳合賈服以為三年終禘遭蒸嘗則行祭禮與前解違非鄭義也鄭知修蜃概散皆漆尊也者以稱散凡物無飾曰散直有漆眀概蜃之等漆外别有飾故知皆尊也鄭以修從卣者詩與尚書及爾雅皆為卣修字於尊義無所取故從卣也云卣中尊謂獻象之屬者案下司尊彝職云春祠夏礿祼用雞彝鳥彝朝踐用兩獻尊饋獻用兩象尊皆有罍諸臣之所酢是尊者彝為上罍為下獻象之屬在其中故云中尊獻象之屬更云彝為上罍為下者欲推出卣為中尊之意也云之屬者秋冬及追享朝享皆彝為上罍為下著尊壺尊之等在其中也云蜃畫為蜃形者亦謂漆畫之云蚌曰含漿尊之象者蚌蛤一名含漿含漿則是容酒之類故畫為蜃而尊名也云概尊以朱帶者𤣥纁相對既是黑漆為尊以朱帶落腹故名概概者橫概之義故知落腹也云無飾曰散者以對概蜃獻象之等有異物之飾此無故曰散云疈事者即大宗伯云疈辜祭四方百物者也大喪之大渳設斗共其釁鬯注斗所以沃尸也釁尸以鬯酒使之香美者鄭司農云釁讀為徽音義斗音主注同疏注釋曰鄭云釁尸以鬯酒使之香美者案肆師云大喪築煮則此鬯酒中兼有鬱金香草故得香美也司農云釁讀為徽者以鬯釁尸故以徽為莊飾義也凡王之齊事共其秬鬯注給淬浴音義淬七內反疏注釋曰鄭知王齊以鬯為洗浴以其鬯酒非如三酒可飲之物大喪以鬯浴尸明此亦給王洗浴使之香美也凡王弔臨共介鬯注以尊適卑曰臨春秋傳曰照臨敝邑鄭司農云鬯香草王行弔喪被之故曰介𤣥謂曲禮曰摯天子鬯王至尊介為執致之以禮於鬼神與檀弓曰臨諸侯畛於鬼神曰有天王某父此王適四方舍諸侯祖廟祝告其神之辭介於是進鬯音義介音界被普皮反又皮寄反為執于僞反與音餘畛之忍反致也父音甫本又作甫疏釋曰介副也王弔臨諸臣則有副使從行者天子所往停在諸侯之廟祝致辭告廟介使則進此鬯於神前故云介鬯注釋曰云以尊適卑曰臨者欲解臨非如雜記云上客臨彼謂哭臨也此王弔諸侯諸臣故以以尊適卑解之引春秋者昭三年齊晏嬰辭引之者證以尊適卑稱臨之義司農云鬯香草者見王度記云天子以鬯諸侯以薰禮緯亦云鬯草生庭故知鬯香草也此直是秬鬯無香草故後鄭不從也云王行弔喪被之故曰介者先鄭之意以介為被似若春秋被練之義故云被之後鄭亦不從𤣥謂曲禮曰者下曲禮文云摯天子鬯者彼摯下與天子鬯諸侯圭卿羊已下為目此天子以鬯為摯若卿羔之類但天子至尊不自執使介為執致之以禮於鬼神與者無正文蓋置於神前故云與以疑之云檀弓曰者此亦下曲禮文言檀弓者誤案彼注云畛致也謂使祝告至于鬼神王至尊臣不名君故云某父某字也周禮注疏卷十九周禮注疏卷十九考證小宗伯之職兆五帝於四郊注九皇六十四氏氏一本作民見序說掌五禮之禁令疏士二豆四俎臣紱按鼎俎當竒四疑三字之訛辨吉凶之五服疏先王制五服天子服日月星辰諸侯服山龍監本脫天子服三字以鄭氏尚書義補之大祭祀疏其逆齍即大宗伯涖玉齍者是也大宗伯涖之臣松齡按据本職涖當作奉小祭祀疏其庭實之物則小宗伯受之以東東或疑作陳誤也臣紱按聘禮皮如入右首而東是其例也雜記亦云宰舉以東若大甸注以禽饋四方之神於郊郊有羣神之兆下神字監本訛臣今改正縣衰冠之式疏案禮記問喪云臣青藜按下所引者是間傳文肆師以歲時序其祭祀注夾室中室上室字監本訛作屋今据雜記正之饗食授祭疏饗者亨大牢以飲賓監本脫者亨二字今補入凡四時之大甸獵疏爾雅云是類是禡師祭也監本脫師祭也三字臣松齡按無此三字即疑於引大雅矣今据爾雅補之凡國之大事治其禮儀注故書儀為義鄭司農云義讀為儀古者書儀但為義今時所謂義為誼臣麟昌按漢書禮儀之義多作誼先鄭之說可以互證凡王弔臨注春秋傳曰照臨敝邑敝監本訛幣又檀弓曰臨諸侯畛於鬼神鬼訛於俱据原文改正周禮注疏卷十九考證
