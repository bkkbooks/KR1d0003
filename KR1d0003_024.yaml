body:
  text: 周禮注疏卷二十四漢鄭氏注唐陸德明音義賈公彥疏磬師掌教擊磬擊編鍾注教教視瞭也磬亦編於鍾言之者鍾有不編不編者鍾師擊之杜子春讀編為編書之編疏注釋曰鄭知教教視瞭者視瞭職云掌播鼗擊笙磬頌磬若然視瞭不言擊鍾知亦教視瞭擊編鍾者以磬是樂縣之首故特舉此言其實編鍾亦視瞭擊之故鎛師注云擊鎛者亦視瞭也云磬亦編於鍾言之者鍾有不編不編者鍾師擊之者鄭知鍾有不編者以此經云擊磬不言編則磬無不編以其無可對故不言編鍾言編則對不編者故鄭云磬亦編於鍾言之者鍾有不編不編者鍾師自擊之也鄭必知鍾有不編使鍾師自擊者以其言教視瞭擊編鍾明不編者不教視瞭不教者自擊之可知是以鍾師云掌金奏又云以鍾鼓奏九夏明是鍾不編者十二辰零鍾也若書傳云左五鍾右五鍾也杜子春讀編為編書之編者按史記孔子讀易韋編三絶是古者未有紙皆以韋編竹簡此鍾磬亦編之十六枚在一虡故讀從之也教縵樂燕樂之鍾磬注杜子春讀縵為怠慢之慢玄謂縵讀為縵錦之縵謂雜聲之和樂者也學記曰不學操縵不能安弦燕樂房中之樂所謂隂聲也二樂皆教其鍾磬音義縵莫半反杜音慢操七曹反疏注釋曰于春讀縵為慢後鄭不從之也玄謂縵讀為縵錦之縵者時有縵錦之言依俗讀之也云謂雜聲之和樂者也者謂雜弄調和引學記為證按彼鄭注云操縵雜弄即今之調辭曲若不學調弦則不能安意於弦也云燕樂房中之樂者此即關雎二南也謂之房中者房中謂婦人后妃以風喻君子之詩故謂之房中之樂及祭祀奏縵樂鍾師掌金奏注金奏擊金以為奏樂之節金謂鍾及鎛疏注釋曰此即鍾師自擊不編之鍾凡作樂先擊鍾故鄭云金奏擊金以為奏樂之節是以下云以鍾鼓奏九夏亦先云鍾也鄭云金謂鍾及鎛者以是二者皆不編獨縣而已凡樂事以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏注以鍾鼓者先擊鍾次擊鼓以奏九夏夏大也樂之大歌有九故書納作內杜子春云內當為納祴讀為陔鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏肆夏詩也春秋傳曰穆叔如晉晉侯享之金奏肆夏三不拜工歌文王之三又不拜歌鹿鳴之三三拜曰三夏天子所以享元侯也使臣不敢與聞肆夏與文王鹿鳴俱稱三謂其三章也以此知肆夏詩也國語曰金奏肆夏繁遏渠天子所以享元侯肆夏繁遏渠所謂三夏矣吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執傹也渠思文也肆遂也夏大也言遂於大位謂王位也故時邁曰肆于時夏允王保之繁多也遏止也言福祿止於周之多也故執傹曰降福穰穰降福簡簡福祿來反渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天故國語謂之曰皆昭令德以合好也玄謂以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具音義納夏本或作夏納齊側皆反本又作齋祴音陔古哀反驁五羔反劉五到反使色吏反與音預遏於葛反傹音競詩作競穰如羊反好呼報反疏注釋曰云以鍾鼓者先擊鍾次擊鼓者鍾師直擊鍾不擊鼓而兼云鼓者凡作樂先擊鍾次擊鼓欲見鼓鍾先後次第故兼言之也鍾中得奏九夏者謂堂上歌之堂下以鍾鼓應之故左氏傳云晉侯歌鍾二肆亦謂歌與鍾相應而言也云夏大也者欲明此九夏者皆詩之大者故云樂之大歌有九杜子春云祴讀為陔鼓之陔者漢有陔鼓之法故樂師先鄭云若今時行禮於大學罷出以鼓陔為節故讀從之也云王出入奏王夏尸出入奏肆夏牲出入奏昭夏者皆大司樂文云四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏者此四夏皆無明文或子春别有所見故後鄭從之云賔醉而出奏陔夏者賔醉將出奏之恐其失禮故陔切之使不失禮是以鄉飲酒鄉射燕禮大射賔醉將出之時皆云奏陔云公出入奏驁夏者按大射云公入奏驁夏是諸侯射於西郊自外入時奏驁夏不見出時而云出者見樂師云行以肆夏趨以采薺出入禮同則驁夏亦出入禮同故兼云出也此九夏者惟王夏惟天子得奏諸侯已下不得其肆夏則諸侯亦得用故燕禮奏肆夏大夫已下皆不得故郊特牲云大夫之奏肆夏由趙文子始明不合也其昭夏已下諸侯亦用之其驁夏天子大射入時無文故子春取大射公入奏驁以明天子亦用也云肆夏詩也者子春之意九夏皆不言詩是以解者不同故杜注春秋云肆夏為樂曲名今云肆夏詩則九夏皆詩後鄭從之春秋傳曰已下襄公四年傳文云俱稱三謂其三章者此皆篇而云章者子春之意以章名篇耳引國語曰金奏肆夏繁遏渠天子所以享元侯者歌詩尊卑各别若天子享元侯升歌肆夏頌合大雅享五等諸侯升歌大雅合小雅享臣子歌小雅合鄉樂若兩元侯自相享與天子享已同五等諸侯自相享亦與天子享已同諸侯享臣子亦與天子享臣子同燕之用樂與享同故燕禮燕臣子升歌鹿鳴之等三篇襄四年晉侯享穆叔為之歌鹿鳴云君所以嘉寡君是享燕同樂也云所謂三夏矣者即上引春秋肆夏三不拜三是三夏故云三夏吕叔玉云是子春引之者子春之意與叔玉同三夏並是在周頌篇故以時邁執競思文三篇當之後鄭不從者見文王大明綿及鹿鳴四牡皇皇者華皆舉見在詩篇名及肆夏繁遏渠舉篇中義意故知義非也玄謂以文王鹿鳴言之則九夏皆詩篇名者以襄四年晉侯享穆叔奏肆夏與文王鹿鳴同時而作以類而言文王鹿鳴等既是詩明肆夏之三亦是詩也肆夏既是詩則九夏皆詩篇名也云頌之族類也者九夏並是頌之族類也云此歌之大者以其皆稱夏也云載在樂章者此九夏本是頌以其大而配樂歌之則為樂章載在樂章也云樂崩亦從而亡是以頌不能具者樂崩在秦始皇之世隨樂而亡頌內無故云頌不能具也凡祭祀饗食奏燕樂注以鍾鼓奏之疏注釋曰饗食謂與諸侯行饗食之禮在廟故與祭祀同樂故連言之知以鍾鼓奏之者以其鍾師奏九夏用鍾鼓故知此燕樂亦用鍾鼓奏之可知也凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩注鄭司農云騶虞聖獸疏釋曰言凡射則大射賔射等同用此為射節故言凡射人與樂師辨其節數見其作樂於此人為之故數職重言注釋曰按異義今詩韓魯説騶虞天子掌鳥獸官古毛詩説騶虞義獸白虎黑文食自死之肉不食生物人君有至信之德則應之周南終麟趾召南終騶虞俱稱嗟嘆之是麟與騶虞皆獸名謹按古山海經鄒書云騶虞獸説與毛詩同是其聖獸也掌鼙鼓縵樂注鼓讀如莊王鼓之鼓玄謂作縵樂擊鼙以和之音義和胡卧反疏注釋曰鼓讀如莊王鼓之鼓者讀從左氏傳莊王親鼓之鼓玄謂作縵樂擊鼙以和之者此官主擊鼙於磬師作縵樂則鍾師擊鼙以和之笙師掌教吹竽笙塤籥簫篪笛管舂牘應雅以教祴樂注教教視瞭也鄭司農云竽三十六簧笙十三簧篪七空舂牘以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫杜子春讀笛為蕩滌之滌今時所吹五空竹笛玄謂籥如笛三空祴樂祴夏之樂牘應雅教其舂者謂以築地笙師教之則三器在庭可知矣賔醉而出奏祴夏以此三器築地為之行節明不失禮音義吹昌垂反竽音于牘音獨或大録反空音孔下同髤香牛反或七利反鞔莫干反疏注釋曰此樂器瞽矇有視瞭無所以知不教瞽矇者按小師云教鼓鼗祝敔塤簫管絃歌注云教教瞽矇也以小師在瞽矇之上又瞽矇所作與小師同故知小師所教瞽矇笙師所教文在視瞭之下不可隔視瞭教瞽矇其視瞭雖不云其器明所教教視瞭也先鄭云竽三十六簧笙十三簧者按通卦驗竽長四尺二寸注云竽類管用竹為之形參差象鳥翼鳥火禽火數七冬至之時吹之冬水用事水數六六七四十二竽之長蓋取於此也笙十三簧廣雅云笙以匏為之十三管宫管在左方竽象笙三十六管宫管在中央禮圖云竽長四尺二寸此竽三十六簧興禮圖同云篪七空者廣雅云篪以竹為之長尺四寸八孔一孔上出寸三分禮圖云篪九空司農云七孔蓋寫者誤當云八空也或司農别有所見云舂牘以竹大五六寸長七尺短者一二尺其端有兩孔髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫者此皆約漢法知之而言鄭注巾車髤赤多黑少之色疏畫者長疏而畫之子春讀笛為蕩滌之滌讀從郊特牲臭味未成蕩滌其聲之滌云今時所吹五空竹笛後鄭從之也玄謂祴樂祴夏之樂者以其鍾師有祴夏此祴樂與之同故知此所教祴樂是鍾師所作祴夏者也云笙師教之則三器在庭可知矣者以其笙管在堂下近堂則三者亦在堂下逺堂在庭可知云賔醉而出奏祴夏者此則鄉飲酒及鄉射之等賔出奏陔是也云以此三器築地為之行節明不失禮者三器言舂舂是向下之稱是其築地與祴樂連文明與祴樂為節可知也經中樂器不解塤與簫管者上文已釋也凡祭祀饗射共其鍾笙之樂注鍾笙與鍾聲相應之笙疏注釋曰鄭為此解者以其笙師不掌鍾而兼言鍾故知義然也燕樂亦如之疏釋曰言亦如之者謂作燕樂亦如上共其鍾笙之樂也大喪廞其樂器及葬奉而藏之注廞興也興謂作之奉猶送疏注釋曰此所興作即上竽笙已下皆作之送之於壙而藏之也大旅則陳之注陳於饌處而己不涖其縣疏注釋曰此經直言陳之明陳於饌處而已不臨其縣其臨縣者大司樂故大司樂云大喪涖廞樂器注云臨笙師鎛師之屬是也鎛師掌金奏之鼓注謂主擊晉鼓以奏其鍾鎛也然則擊鎛者亦視瞭疏釋曰鎛師不自擊鎛使視瞭擊之但擊金奏之鼓耳注釋曰知金奏之鼓是主擊晉鼓者鼓人職云以晉鼓鼓金奏故知之也金奏謂奏金金即鍾鎛鍾鎛以金為之故言金云然則擊鎛者亦視瞭者按磬師職云掌教擊編鍾不言鎛鎛與鍾同類大小異耳既擊鍾明亦擊鎛故云亦視瞭也凡祭祀鼓其金奏之樂饗食賔射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之注守鼜備守鼓也鼓之以鼖鼓杜子春云一夜三擊備守鼜也春秋傳所謂賔將趨者音聲相似音義鼖扶云反趨左傳作掫莊九反杜注云行夜疏釋曰云鼓其金奏之樂者金奏之樂即八音是也亦以晉鼓鼓之饗食謂饗食來朝諸侯賔射亦謂與來朝諸侯射於朝皆鼓其金奏之樂也軍大獻謂獻捷於祖作愷歌亦以晉鼓鼓之云凡軍之夜三鼜皆鼓之守鼜亦如之者亦鼓之也注釋曰鄭知用鼖鼓者鼓人職云鼖鼓鼓軍事此並軍事故知用鼖鼓也子春云一夜三擊備守鼜也者鼓人注引司馬法云昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫是一夜三擊備守鼜也春秋傳者昭二十年衛侯如死鳥齊侯使公孫青聘衛賔將掫注云掫謂行夜子春云賔將趨讀人音異云音聲相似者趨與鼜音聲相似皆是夜戒守也大喪廞其樂器奉而藏之疏釋曰此官所廞謂作晉鼓鼖鼓而已以其當職所擊者也韎師掌教韎樂祭祀則帥其屬而舞之注舞之以東夷之舞疏注釋曰知舞之以東夷之舞者以其專主夷樂則東夷之樂曰韎是也凡舞夷樂皆門外為之大饗亦如之旄人掌教舞散樂舞夷樂注散樂野人為樂之善者若今黃門倡矣自有舞夷樂四夷之樂亦皆有聲歌及舞疏釋曰云掌教舞散樂舞夷樂者旄人教夷樂而不掌鞮鞻氏掌四夷之樂而不教二職互相統耳但旄人加以教散樂鞮鞻氏不掌之也注釋曰云散樂野人為樂之善者以其不在官之員內謂之為散故以為野人為樂善者也云若今黃門倡矣者漢倡優之人亦非官樂之內故舉以為説也云夷樂四夷之樂者即孝經緯云東夷之樂曰韎南夷之樂曰任西夷之樂曰侏離北夷之樂曰禁知亦皆有聲歌及舞者此經有舞下鞮鞻氏云掌四夷之樂與其聲歌是也凡四方之以舞仕者屬焉疏釋曰云凡四方之以舞仕者屬焉者此即野人能舞者屬旄人選舞人當於中取之故也凡祭祀賔客舞其燕樂疏釋曰賔客亦謂饗燕時舞其燕樂謂作燕樂時使四方舞士舞之以夷樂籥師掌教國子舞羽吹籥注文舞有持羽吹籥者所謂籥舞也文王世子曰秋冬學羽籥詩云左手執籥右手秉翟疏注釋曰此籥師掌文舞故教羽籥若武舞則教干戚也故云文舞有持羽吹籥者也云所謂籥舞也者所謂詩頌籥舞笙鼓彼亦文舞也文王世子曰秋冬學羽籥彼對春夏學干戈陽時學之法陽動秋冬學羽籥隂時學之法隂靜詩云左手執籥右手秉翟者邶風簡兮之篇引此二文者證皆文舞所執之器也此官所教當與樂帥教小舞互相足故文王世子云小樂正學干大胥贊之籥師學戈籥師丞贊之注云四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也祭祀則鼓羽籥之舞注鼓之者恆為之節疏注釋曰祭祀先作樂下神及合樂之時則使國子舞鼓動以羽籥之舞與樂節相應使不相奪倫故鄭云鼓之者恆為之節賔客饗食則亦如之疏釋曰亦鼓之以羽籥之舞與祭祀同以其俱在廟故樂亦同也大喪廞其樂器奉而藏之疏釋曰此所廞亦惟羽籥而已不作餘器籥章掌土鼓豳籥注杜子春云土鼓以瓦為匡以革為兩面可擊也鄭司農云豳籥邠國之地竹豳詩亦如之玄謂豳籥邠人吹籥之聲章明堂位曰土鼓蒯桴葦籥伊耆氏之樂音義豳彼貧反注邠同蒯苦對反劉苦壞反桴音孚伊耆又作帆􅢿二皆音耆疏注釋曰子春云土鼓以瓦為匡以革為兩面可擊也後鄭不從者土鼓因於中古神農之器黃帝以前未有瓦器故不從也先鄭云豳籥豳國之地竹豳詩亦如之後鄭不從者按下文吹豳詩吹豳雅吹豳頌更不見豳籥則是籥中吹豳詩及雅頌謂之豳籥何得有豳國之地竹乎若用豳國之地竹當云之籥故後鄭云豳人吹籥之聲章云豳人吹籥其義難明謂作豳人吹籥之聲章商祝夏祝之類聲章即下文豳詩之等是也明堂位曰土鼓蒯桴葦籥伊耆氏之樂者鄭注禮運云土鼓築土為鼓也蒯桴桴謂擊鼓之物以土塊為桴引之者破子春土鼓用瓦中春晝擊土鼓吹豳詩以逆暑注豳詩豳風七月也吹之者以籥為之聲七月言寒暑之事迎氣歌其類也此風也而言詩詩總名也迎暑以晝求諸陽音義中音仲下同疏釋曰中春二月也言迎暑者謂中春晝夜等已後漸暄故預迎之耳注釋曰鄭知吹之者以籥為之聲者以發首云掌土鼓豳籥故知詩與雅頌皆用籥吹之也云七月言寒暑之事者七月云一之日觱發二之日栗烈七月流火之詩是寒暑之事云迎氣歌其類也者解經吹豳詩逆暑及下迎寒皆當歌此寒暑之詩也云此風也而言詩詩總名也者對下有雅有頌即此是風而言詩詩總名含豳風矣故云詩不言風也云迎暑以晝求諸陽者對下迎寒以夜求諸隂也中秋夜迎寒亦如之注迎寒以夜求諸隂疏釋曰言亦如之亦當擊土鼓吹豳詩也凡國祈年于田祖吹豳雅擊土鼓以樂田畯注祈年祈豐年也田祖始耕田者謂神農也豳雅亦七月也七月又有于耜舉趾饁彼南畝之事是亦歌其類謂之雅者以其言男女之正鄭司農云田畯古之先教田者爾雅曰畯農夫也音義樂音洛畯音俊饁于輒反劉于法反疏釋曰此祈年於田祖并上迎暑迎寒並不言有祀事既告神當有祀事可知但以告祭非常故不言之耳若有禮物不過如祭法埋少牢之類耳此田祖與田畯所祈當同日但位别禮殊樂則同故連言之也注釋曰祈年祈豐年也者義取小柷求豐年俱是求甘雨使年豐故引彼解此也云田祖始耕田者謂神農也者此即郊特牲云先嗇一也故甫田詩云琴瑟擊鼓以御田祖以祈甘雨以介我稷黍毛云田祖先嗇者也七月又有于耜舉趾饁彼南畝之事亦是歌其類者按彼七月云三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜並次在寒暑之下彼為風此為雅者也云謂之雅者以其言男女之正者先王之業以農為本是男女之正故名雅也司農云田畯古之先教田者此即月令命田舍東郊鄭云田謂田畯是也爾雅曰畯農夫也者以其教農故號農夫國祭蠟則吹豳頌擊土鼓以息老物注故書蠟為蠶杜子春云蠶當為蠟郊特牲曰天子大蠟八伊耆氏始為蠟嵗十二月而合聚萬物而索饗之也蠟之祭也主先嗇而祭司嗇也黃衣黃冠而祭息田夫也既蠟而收民息已玄謂十二月建亥之月也求萬物而祭之者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事是亦歌其類也謂之頌者以其言嵗終人功之成音義索色白反為于偽反勞力報反穫户郭反躋子兮反疆居良反疏釋曰此祭蠟直擊土鼓按明堂位云土鼓葦籥伊耆氏之樂即此亦各有葦籥可知言以息老物者謂息田夫萬物也注釋曰子春引郊特牲後鄭從之增成其義耳故還引郊特牲而解之云求萬物而祭之者即合聚萬物而索饗之是也云乃祀而老息之者老即老物蠟祭是也息之者即息田夫臘祭宗廟是也云於是國亦飬老焉者即所引月令孟冬勞農以休息之是也云豳頌亦七月也七月又有穫稻作酒等至之事是亦歌其類也者其類謂穫稻已下是也云謂之頌者以其言嵗終人功之成者凡言頌者頌美成功之事故於七月風詩之中亦有雅頌也鄭注郊特牲云嵗十二月周之正數故此鄭以建亥解之知非夏十二月者以其建亥萬物成故月令祈來年及臘先祖之等皆在孟冬月是十二月據周於夏為建亥十月也鞮鞻氏掌四夷之樂與其聲歌注四夷之樂東方曰韎南方曰任西方曰侏離北方曰禁詩云以雅以南是也王者必作四夷之樂一天下也言與其聲歌則云樂者主於舞音義任音壬下同疏注釋曰四夷樂名出於孝經緯鉤命決故彼云東夷之樂曰韎持矛助時生南夷之樂曰任持弓助時養西夷之樂曰侏離持鉞助時殺北夷之樂曰禁持楯助時藏皆於四門之外右辟是也按明堂位亦有東夷之樂曰韎南夷之樂曰任又按虞傳云陽伯之樂舞侏離則東夷之樂亦名侏離者東夷樂有二名亦召侏離鄭注云侏離舞曲名言象萬物生侏離若詩云彼黍離離是物生亦曰離云王者必作四夷之樂一天下也者按白虎通云王者制夷狄樂不制夷狄禮者禮者所以均中國不制禮恐夷人不能隨中國禮故也四夷之樂誰舞謂使國之人也云與其聲歌則云樂者主於舞者凡樂止有聲歌及舞既下别云聲歌明上云樂主於舞可知也按月令仲春云命樂正入學習樂注云歌與八音知非舞以其下季春云大合樂明所合多故知非直舞而有歌與八音也祭祀則吹而歌之燕亦如之注吹之以管籥為之聲疏注釋曰知吹之以管籥為之聲者以其歌者在上管籥在下既言吹之用氣明據管籥為之聲可知是以笙師教吹籥管之等典庸器掌藏樂器庸器注庸器伐國所獲之器若崇鼎貫鼎及以其兵物所鑄銘也疏注釋曰庸功也言功器者伐國所獲之器也云若崇鼎貫鼎者明堂位文云及以其兵物所鏄銘也者謂左氏傳季氏以所得齊之兵作林鍾而銘魯功是經中樂器也彼既譏其非時征伐又藉晉之功引之取一邉證鑄作銘功之事耳及祭祀帥其屬而設筍虡陳庸器注設筍虡視瞭當以縣樂器焉陳功器以華國也杜子春云筍讀為博選之選橫者為筍從者為鐻音義選胥兖反從子容反鐻音距舊本作此字今或作虡疏注釋曰鄭知此設筍虡視瞭當以縣樂器焉者按視瞭職云掌大師之縣此直云設筍虡明是視瞭縣之可知子春云筍讀為博選之選者此從俗讀當時語者有博選之言故讀從之也饗食賔射亦如之大喪廞筍虡注廞興也興謂作之疏注釋曰按檀弓有鍾磬而無筍虡鄭注云不縣之彼鄭注見此文有筍虡明有而不縣以喪事略故也司干掌舞器注舞器羽籥之屬疏注釋曰鄭知司干所掌舞器是羽籥以其文武之舞所執有異則二者之器皆司干掌之言司干者周尚武故以干為職首其籥師教而不掌若然干與戈相配不言戈者下文云祭祀授舞器則所授者授干與羽籥也按司戈盾亦云祭祀授旅賁殳故士戈盾授舞者兵云舞者兵惟謂戈其干亦於此官授之司兵云祭祀授舞者兵鄭注云授以朱干玉戚謂授大武之舞與此授小舞干戈别也祭祀舞者既陳則授舞器既舞則受之注既已也受取藏之賔饗亦如之大喪廞舞器及葬奉而藏之疏釋曰此官掌干盾及羽籥及其所廞廞干盾而已其羽籥籥師廞之故其職云大喪廞其樂器及葬奉而藏之其視瞭所廞者謂鼓與磬鍾師不云廞則鍾亦視瞭廞之如是瞽矇及大師小師皆不云廞者以其無目其瞽矇所云柷敔塤簫管及琴瑟皆當視瞭廞之不云奉而藏之文不具笙師云竽笙以下則笙師自廞之故其職云廞藏鎛師云擊晉鼓則晉鼓鎛師廞之其兵舞所廞入五兵中故司兵云大喪廞五兵凡廞樂器皆大司樂臨之故其職云大喪涖廞樂器典同不云廞者以其律吕與鍾器等為制度不掌成器故不云廞韎師旄人鞮鞻氏等不云廞者死後無一天下之事故不云廞也典庸器不云廞者以其庸器非常故不廞也以其樂師非一故諸官各廞不同大卜掌三􅪃之法一曰玉􅪃二曰瓦􅪃三曰原􅪃注􅪃者灼龜發於火其形可占者其象似玉瓦原之璺鏬是用名之焉上古以來作其法可用者有三原原田也杜子春云玉􅪃帝顓頊之􅪃瓦􅪃帝堯之􅪃原􅪃有周之􅪃音義􅪃音兆亦作兆舋舊許鄞反沈一依聶氏音問云依字一作璺璺玉之坼也龜兆文似之占人注同鏬劉火嫁反又音呼坼之呼疏釋曰大卜所掌先三兆後三易次三夢者筮短龜長夢以叶卜筮故以先後為次注釋曰云兆者灼龜發於火者此依下文菙氏云凡卜以明火爇燋遂吹其焌契是以火灼龜其兆發於火也云其形可占者則占人云君占體大夫占色之等彼不云占玉瓦原體色中含之是其形可占也云象似玉瓦原之璺罅謂破而不相離也謂似玉瓦原之破裂或解以為玉瓦原之色云是用名之焉者謂用是似玉瓦原名之為玉兆瓦兆原兆也云上古以來作其法可用者有三者但卜筮是先聖王之所作蓋伏犧時已有其時未有此玉瓦原之名至顓頊以來始有此名故云然也云原原田也者謂若左氏僖二十八年傳云原田每每以其原與原田字同故為此傳解也子春云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆者趙商問此并問下文子春云連山虙戲歸藏黃帝今當從此説以下敢問杜子春何由知之鄭答云此數者非無明文改之無據故著子春説而已近師皆以為夏殷周鄭既為此説故易贊云夏曰連山殷曰歸藏又注禮運云其書存者有歸藏如是玉兆為夏瓦兆為殷可知是皆從近師之説也按今歸藏坤開筮帝堯降二女為舜妃又見節卦云殷王其國常母谷若然依子春之説歸藏黃帝得有帝堯及殷王之事者蓋子春之意虙戲黃帝造其名夏殷因其名以作易故鄭云改之無據是以皇甫謐記亦云夏人因炎帝曰連山殷人因黃帝曰歸藏雖炎帝與子春虙戲不同是亦相因之義也其經兆之體皆百有二十其頌皆千有二百注頌謂繇也三法體繇之數同其名占異耳百二十每體十繇體有五色又重之以墨坼也五色者洪範所謂曰雨曰濟曰圛曰蟊曰尅音義繇直又反下同重直用反坼敕白反濟節細反又才禮反圛音亦蟊音濛劉莫溝反沈音謀疏釋曰云經兆者謂龜之正經云體者謂龜之金木水火土五兆之體云經兆之體名體為經也云皆百有二十者三代皆同百有二十若經卦皆八然也若然龜兆有五而為百二十者則兆别分為二十四分云其頌千有二百者每體十繇故千二百也注釋曰云頌謂繇者繇之説兆若易之説卦故名占兆之書曰繇云三法體繇之數同者上云三代兆有異此云皆百有二十皆千有二百故云體繇之數同也云其名占異者上云玉瓦原是名異其云占異者三代占兆無文異否不可知但三易名異占亦異則三兆名異占亦異可知故鄭云名占異也云百二十每體十繇也者鄭欲解體百有二十而繇有千二百之意體既有百二十每體十繇則得千有二百也云體有五色又重之以墨坼也者按占人云君占體大夫占色史占墨卜人占坼彼注云體兆象色兆氣墨兆廣坼兆璺若然體色墨坼各不同今鄭云體有五色又重之以墨坼則四者皆相因而有也何者以其有五行兆體體中有五色既有體色則因之以兆廣狹為墨又因墨之廣狹支分小璺為坼是皆相因之事也今每體有十繇其體有五色曰雨曰濟之等其色統得體每色皆有墨坼則五色中各有五墨坼含得五色不復别云五色似若八卦卦别重得七通本為八卦總云八八六十四卦不復别云八卦以其六十四卦含有八卦故也云洪範所謂曰雨曰濟曰圛曰蟊曰尅者彼鄭注云曰雨者兆之體氣如雨氣然曰濟者兆之光明如雨止曰蟊者氣不澤鬱冥也曰圛者色澤者曰尅者氣色相犯入此鄭義若孔注則云有似雨者有似雨止者蟊謂隂暗圛氣落圛不連屬尅兆相交錯與鄭異也掌三易之法一曰連山二曰歸藏三曰周易注易者揲蓍變易之數可占者也名曰連山似山出內氣也歸藏者萬物莫不歸而藏於其中杜子春云連山虙戲歸藏黃帝音義揲時設反劉音舌虙音伏戲本又作虧音羲疏注釋曰云易者揲蓍變易之數可占者也者按易繫辭云分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏此是揲蓍變易之數可占者也就易文卦畫七八爻稱九六用四十九蓍三多為交錢六為老隂也三少為重錢九為老陽也兩多一少為單錢七為少陽也兩少一多為拆錢八為少隂也夏殷易以七八不變為占周易以九六變者為占按襄九年左傳云穆薑薨於東宫始往而筮之遇艮之八注云爻在初六九三六四六五上九惟六二不變連山歸藏之占以不變者為主但周易占九六而云遇艮之八是據夏殷不變為占之事云名曰連山似山出內氣也者此連山易其卦以純艮為首艮為山山上山下是名連山雲氣出內於山故名易為連山歸藏者萬物莫不歸而藏於其中者此歸藏易以純坤為首坤為地故萬物莫不歸而藏於中故名為歸藏也鄭雖不解周易其名周易者連山歸藏皆不言地號以義名易則周非地號以周易以純乾為首乾為天天能周布於四時故名易為周也必以三者為首者取三正三統之義故律厯志云黃鍾為天統黃鍾子為天正林鍾為地統未之衝丑故為地正大蔟為人統寅為人正周以十一月為正天統故以乾為首殷以十二月為正地統故以坤為首夏以十三月為正人統人無為卦首之理艮漸正月故以艮為首也杜子春云連山虙戲歸藏黃帝者鄭志答趙商云非無明文改之無據且從子春近師皆以為夏殷也其經卦皆八其别皆六十有四注三易卦别之數亦同其名占異也每卦八别者重之數音義重直龍反疏釋曰云經卦皆八者謂以卦為經即周易上經下經是也皆八者連山歸藏周易皆以八卦乾坤震巽坎離艮兌為本其别六十四鄭云謂重之數通本相乘數之為六十四也注釋曰云三易卦别之數亦同者三代易之卦皆八而别皆六十四亦如上三兆體别之數故云亦同云其名占異也者其名謂連山歸藏周易是名異也占異者謂連山歸藏占七八周易占九六是占異也云每卦八别者重之數者據周易以八卦為本是八卦重之則得六十四何者伏犧本畫八卦直有三爻法天地人後以重之重之法先以乾之三爻為下體上加乾之三爻為純乾卦又以乾為下體以坤之三爻加之為泰卦又以乾為本上加震之三爻於上為大壯卦又以乾為本上加巽於上為小畜卦又以乾為本上加坎於上為需卦又以乾為本上加離於上為大有卦又以乾為本上加艮於上為大畜卦又以乾為本上加兌於上為夬卦此是乾之一重得七為八又以坤之三爻為本上加坤為純坤卦又以坤為本上加乾為否卦又以坤為本上加震為豫卦又以坤為本上加巽為觀卦又以坤為本上加坎為比卦又以坤為本上加離為晉卦又以坤為本上加艮為剝卦又以坤為本上加兌為萃卦是亦通本為八卦也自震巽坎離艮兌其法皆如此則為八八六十四故云别者重之數後鄭專以為伏犧畫八卦神農重之諸家以為伏犧畫八卦還自重之掌三􅬤之法一曰致􅬤二曰觭􅬤三曰咸陟注􅬤者人精神所寤可占者致􅬤言􅬤之所至夏后氏作焉咸皆也陟之言得也讀如王德翟人之德言􅬤之皆得周人作焉杜子春云觭讀為竒偉之竒其字直當為竒玄謂觭讀如諸戎掎之掎掎亦得也亦言􅬤之所得殷人作焉音義􅬤音夢本多作夢觭居綺反注掎同又紀宜反杜其宜反陟如字或音得疏注釋曰云夢者人精神所寤可占者謂人之寐形魄不動而精神寤見覺而占之故云精神所寤可占者也云致夢言夢之所至者訓致為至故云夢之所至也云夏后氏作焉者上文三兆三易有子春所解且從子春至於餘文正解即從近師所説此三夢子春等不説故即從近師為夏殷周也云讀如王德翟人之德者按僖二十四年左傳云王德翟人以其女為后德亦為得義故讀從之杜子春讀觭為竒偉之竒讀從家語玄謂觭讀如諸戎掎之掎掎亦得也者按襄十四年左傳云戎子駒支曰秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之是掎為得也其經運十其别九十注運或作緷當為輝是視祲所掌十輝也王者於天日也夜有夢則晝視日旁之氣以占其吉凶凡所占者十輝每輝九變此術今亡音義緷胡本反字林云大束也説文音運云緯也聶音徽輝音運祲子鴆反疏注釋曰運或作緷者此經運一部周禮或作緷字並不從故云當為輝讀從視祲十輝之輝故引視祲所掌十輝為證也云王者於天日也夜有夢則晝視日旁之氣以占其吉凶者此按占夢云以日月星辰占六夢之吉凶注引趙簡子夜夢旦而日食史墨占之又視祲有十輝之法五曰暗先鄭云謂日月食餘九輝皆日旁氣故以日旁氣解之云凡所占者十輝每輝九變者此類上三兆三易皆有頌别之數此經輝十其别有九十以義言之明一輝九變故為九十解之云此術今亡者數見十輝為九十變此術今亡未知其義耳以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳注國之大事待蓍龜而決者有八定作其辭於將卜以命龜也鄭司農云征謂征伐人也象謂災變雲物如衆赤烏之屬有所象似易曰天垂象見吉凶春秋傳曰天事恆象皆是也與謂豫人物也謀謂謀議也果謂事成與不也至謂至不也雨謂雨不也瘳謂疾瘳不也玄謂征亦云行巡守也象謂有所造立也易曰以制器者尚其象與謂所與共事也果謂以勇決為之若吳伐楚楚司馬子魚卜戰令龜曰鮒也以其屬死之楚師繼之尚大克之吉是也音義瘳敕留反命龜命亦作令災音災見賢遍反鮒音附左傳作魴疏釋曰云以邦事者謂國家有大事須卜故特作龜而命之其事有八注釋曰云國之大事待蓍龜而決者有八者謂此八者皆大事除此八者即小事入於九筮也若然大事卜小事筮此既大事而兼言筮者凡大事皆先筮而後卜故兼言蓍也云定作其辭於將卜以命龜也者凡命龜辭大夫以上有三命筮辭有二士命龜辭有二命筮辭一知者按士喪禮命筮者命曰哀子某為其父某甫筮宅度兹幽宅兆基無有後艱筮人許諾不述命注云既命而申之曰述不述者士禮略凡筮因會命筮為述命及卜葬日云涖卜命曰哀子某來日卜葬其父某甫考降無有近悔許諾不述命還即席西面坐命龜注云不述命亦士禮略凡卜述命命龜異龜重威儀多也筮云不述命下無西面命筮明命筮共述命作一辭不述命則其所命筮辭兼在其中故曰因命也卜云不述命猶有西面命龜則知命龜與述命異故曰述命命龜異龜重威儀多是士禮命龜辭有二命筮辭有一之事大夫已上命筮辭有二命龜辭有三者按少牢云史執䇿受命於主人曰孝孫某來日丁亥用薦嵗事於皇祖伯某以某妃配某氏尚饗史曰諾又述命曰假爾大筮有常孝孫某以下與前同以其述命述前辭以命筮冠述命首大夫筮既得述命即卜亦得述命也是知大夫以上命龜有三命筮有二也先鄭云征謂征伐人也後鄭從之云象謂災變雲物如衆赤烏之屬有所象似者按哀六年楚子卒是嵗有雲如衆赤烏夾日以飛三日使問諸周大史史曰其當王身乎若禜之可移令尹司馬是赤烏之事云易曰天垂象見吉凶春秋傳曰天事恆象者昭十七年冬有星孛於大辰西及漢申須曰彗所以除舊布新也天事恆象是也此所解後鄭不從之與謂豫人物後鄭亦不從云謀謂謀議後鄭從之果謂事成與不後鄭亦不從云至謂至不也雨謂雨不也瘳謂疾瘳不也此後鄭皆從也玄謂征亦云行巡守也者增成先鄭義知征兼有巡守者左氏傳鄭良霄云先王卜征五年嵗襲其祥是征亦得為巡守之事也云易曰以制器者尚其象者上繫辭文注云此四者存於氣象可得而用一切器物及造立皆是云與謂所與共事不從先鄭豫人物者與物情義可知不須卜與人共事得失不可知故須卜也云果謂以勇決為之若吳伐楚者昭十七年吳人伐楚陽丐為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰於長岸子魚先死楚師繼之大敗吳師是果決之事也以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政注鄭司農云以此八事命卜筮蓍龜參之以夢故云以八命者贊三兆三易三夢之占春秋傳曰筮襲于夢武王所用玄謂贊佐也詔告也非徒占其事吉則為否則止又佐明其繇之占演其意以視國家餘事之吉凶凶則告王救其政音義演以善反疏釋曰云以八命者贊三兆三易三夢之占者以上文八事命龜之辭贊佐也佐明三兆三易三夢之占辭將此辭演出其意以觀國家之吉凶詔告也凶則告王救其政使王改過自新注釋曰先鄭云以此八事命卜筮蓍龜參之以夢者先筮後卜聖人有大事必夢故又參之以夢云故曰以八命者贊三兆三易三夢之占者此先鄭不釋贊意後鄭增成其義云春秋傳曰筮襲於夢武王所用者按昭七年左傳云衛靈公之立成子以周易筮之遇屯之比以示史朝史朝曰元亨又何疑焉又云筮襲於夢武王所用也弗從何為外傳曰大誓曰朕夢協朕卜襲于休祥戎商必克此外內傳相包乃具引之者證夢與卜筮相參也玄謂非徒占其事吉則為否則止者此解以八命命龜之常事也云又佐明其繇之占演其意以視國家餘事之吉凶者以釋八命者贊三兆三易三夢之占以觀國家之吉凶也凡國大貞卜立君卜大封則視髙作龜注卜立君君無冢適卜可立者卜大封謂竟界侵削卜以兵征之若魯昭元年秋叔弓帥師疆鄆田是也視髙以龜骨髙者可灼處示宗伯也大事宗伯涖卜卜因龜之腹骨骨近足者其部髙鄭司農云貞問也國有大疑問於蓍龜作龜謂鑿龜令可爇也玄謂貞之為問問於正者必先正之乃從問焉易曰師貞丈人吉作龜謂以火灼之以作其兆也春灼後左夏灼前左秋灼前右冬灼後右士喪禮曰宗人受卜人龜示髙涖卜受視反之又曰卜人坐作龜音義視音示下同適丁歷反竟音境疆居良反鄆音運近附近之近令力呈反爇人悅反疏釋曰言凡國大貞者言凡非一貞正也凡國家有大事正問於龜之事有二則卜立君卜大封是也云則視髙作龜者凡卜法在禰廟廟門閾外闑西南北面有席先陳龜於廟門外之西孰上又有貞龜貞龜謂正龜於閾外席上又有涖卜命龜視髙作龜六節尊者宜逸卑者宜勞從下向上差之作龜視髙二者勞事以大貞事大故大卜身為勞事則大宗伯臨卜其餘陳龜貞龜皆小宗伯為之也注釋曰鄭云君無冢適卜可立者若然君無冢適則有卜法按昭二十六年傳曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也休以為春秋之義三代異建適媵别貴賤有姪娣以辨親疏立適以長不以賢立子以貴不以長王后無適明尊之敬之義無所卜筮不以賢者人狀難别嫌有所私故絶其怨望防其覬覦今如左氏言云年鈞以德德鈞以卜君之所賢下必從之豈復有卜隱桓之禍皆由是興乃曰古制不亦謬哉又大夫不世如并為公卿通繼嗣之禮左氏為短玄針之曰立適固以長矣無適而立子固以貴矣今言無適則擇立長謂貴均始立長王不得立愛之法年均則會羣臣羣吏萬民而詢之有司以序進而問大衆之中非君所能掩是王不得立愛之法也禮有詢立君示義在此短之言謬失春秋與禮之義矣公卿之世立者有功德先王之命有所不犯如是經中卜立君亦是年均德均也云卜大封謂境界侵削卜以兵征之若魯昭元年秋叔弓帥師疆鄆田是也者按彼莒魯爭鄆故魯叔弓往定其疆界以其出兵故須卜知吉凶也云視髙以龜骨髙者可灼處示宗伯也者以鄭言示宗伯則示字不得為視但古字通用以目視物以物示人同為視也知大事宗伯涖卜者按大宗伯云祀大神享大鬼祭大示帥執事而卜日官尊故知涖卜也云大事宗伯臨則小事不使宗伯故下文云凡小事涖卜是大卜臨之也云卜用龜之腹骨骨近足者其部髙者言龜近四足其下腹骨部然而髙髙處灼之也先鄭云貞問也者謂正意問龜非謂訓貞為問也云國有大疑問於蓍龜者義取尚書洪範云女則有大疑謀及乃心謀及卜筮是也云作龜謂鑿龜令可爇也者按下菙氏云凡卜以明火爇燋鑿即灼也故云令可爇也玄謂易曰師貞丈人吉者此師卦繇辭丈人者嚴莊之辭師法須嚴莊則吉云作龜謂以火灼之以作其兆也者作謂發使舋坼云春灼後左已下並取義於禮記中庸彼云國家將興亡見於蓍龜動於四體鄭注云四體龜之四足亦云春占後左夏占前左秋占前右冬占後右彼云占此云灼即灼而占之亦一也云士喪禮者彼謂卜葬日引之證有示髙作龜之事彼云士宗族長尊故云臨卜也大祭祀則視髙命龜注命龜告龜以所卜之事不親作龜者大祭祀輕於大貞也士喪禮曰宗人即席西面坐命龜疏注釋曰云不親作龜者大祭祀輕於大貞也者大貞之內有立君大封大卜作龜不命龜此大祭祀不作龜惟命龜作龜是勞事故云大祭祀輕於大貞也引士喪禮宗人即席西面坐命龜者證天子命龜處所與士禮同凡小事涖卜注代宗伯疏釋曰凡大事卜小事筮若事小當入九筮不合入此大卜大卜云小事者此謂就大事中差小者非謂筮人之小事也小事既大卜涖卜則其餘仍有陳龜已下則陳龜貞龜命龜視髙皆卜師為之其作龜則卜人也大宗伯六命卿小宗伯四命中大夫大卜亦四命下大夫卜師上士卜人中士其大宗伯涖卜大卜視髙作龜其中陳龜貞龜命龜皆小宗伯為之下文大遷大師大卜貞龜貞龜上有涖卜亦大宗伯為之陳龜亦宜小宗伯也其命龜視髙卜師作龜卜人次下云凡旅陳龜則涖卜仍是大宗伯貞龜命龜視髙皆卜師亦卜人作龜次下云凡喪事命龜命龜之上有陳龜貞龜亦小宗伯涖卜還是大宗伯視髙作龜卜師也國大遷大師則貞龜注正龜於卜位也士喪禮曰卜人抱龜燋先奠龜西面是也又不親命龜亦大遷大師輕於大祭祀也音義燋哉約反疏注釋曰正龜於卜位卜位即閾外席上也故引士喪禮為證也云又不親命龜亦大遷大師輕於大祭祀者以命龜在貞龜後而為勞故云輕於大祭祀也凡旅陳龜注陳龜於饌處也士喪禮曰卜人先奠龜於西孰上南首是也不親貞龜亦以卜旅祭非常輕於大遷大師也音義孰音孰舊音育疏注釋曰云陳龜於饌處也者饌處謂在西孰南首故引士喪禮為證也云亦以卜旅祭非常輕於大遷大師者按大宗伯國有故旅上帝及四望則祀天亦是大祭祀而輕於大遷大師退在下者鄭以旅為非常祭故也凡喪事命龜注重喪禮次大祭祀也士喪禮則筮宅卜日天子卜葬兆凡大事大卜陳龜貞龜命龜視髙其他以差降焉疏注釋曰云重喪禮次大祭祀也者大祭祀大卜非直命龜兼眂髙此喪事亦命龜與大祭祀同但不兼視髙即輕於大祭祀也但以喪事為終故文退在凡旅下也云士喪禮則筮宅卜日天子卜葬兆者欲見此經天子法卜葬日與士同其宅亦卜之與士異孝經云卜其宅兆亦據大夫以上若士則筮宅也云凡大事大卜陳龜貞龜命龜視髙者據此大卜所掌皆是大事故大卜或陳龜或貞龜或視髙雖不言作龜於大貞亦作龜不言之者在其他以差降之中云其他以差降者更有涖卜已下至作龜官之尊卑以次為之是也按上所解陳龜在前重於命龜而士喪禮卜人卑而陳龜宗人尊而命龜在後者士之官少故所執不依官之尊卑也卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆注開開出其占書也經兆百二十體今言四兆者分之為四部若易之二篇書金縢曰開籥見書是謂與其云方功義弓之名未聞音義與音餘疏注釋曰云開開出其占書也者鄭意兆出於龜其體一百二十今云開龜之四兆謂開出其占兆之書分為四部若易之二篇故引金縢為證也云開籥見書謂啓匱以籥乃見其書云是謂與者但開出占兆書為四兆以意言無正文故云是謂與以疑之云其云方功義弓之名未聞者但名此四部為方功義弓必有其義但無文以其疑事無質故云未聞凡卜事視髙注示涖卜也疏釋曰按上大卜而言則大貞使大卜視髙今云凡卜事視髙者謂大卜不視髙者皆卜師視髙以龜髙處示涖卜也揚火以作龜致其墨注揚猶熾也致其墨者熟灼之明其兆疏注釋曰云致其墨者熟灼之明其兆者按占人注墨兆廣也墨大坼明則逢吉坼稱明墨稱大今鄭云熟灼之明其兆以解墨者彼各偏據一邉而言其實墨大兼明乃可得吉故以明解墨凡卜辨龜之上下左右隂陽以授命龜者而詔相之注所卜者當各用其龜也大祭祀喪事大卜命龜則大貞小宗伯命龜其他卜師命龜卜人作龜卜人作龜則亦辨龜以授卜師上仰者也下俯者也左左倪也右右倪也隂後弇也陽前弇也詔相告以其辭及威儀音義辨如字劉皮勉反倪五計反又五未反弇於檢反疏釋曰卜師辨此龜上下左右隂陽六種授命龜者據大卜命龜之人無定但是命龜即辨而授之注釋曰云所卜者當各用其龜也者即上下左右隂陽者是也云大祭祀喪事已下皆據大卜而言鄭知大貞小宗伯命龜者以其大貞大卜下大夫視髙視髙之上有命龜貞龜陳龜小宗伯中大夫尊於大卜卑於大宗伯故知大貞小宗伯命龜也云其他卜師命龜者其他謂凡小事大卜涖卜大遷大師大卜貞龜凡旅陳龜如此之輩則卜師命龜卜師命龜則卜人作龜卜人作龜則亦辨龜以授卜師按序官卜人中士八人於此不列其職者以其與卜師同職不見之也云上仰者也者爾雅云仰者謝言此經上即爾雅云仰者也此已下皆據爾雅及下文而言按爾雅云龜俯者靈行頭低仰者謝行頭仰前弇諸果甲前長後弇諸獵甲後長左倪不類行頭左痺右倪不若行頭右痺故鄭據而言焉云詔相告以其辭及威儀者辭謂命龜之辭威儀者謂若士喪禮卜日在廟門外涖卜在門東西面龜在閾外席上西首執事者門西東面行立皆是威儀之事也龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之注屬言非一也色謂天龜玄地龜黃東龜青西龜白南龜赤北龜黑龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜卻西龜左北龜右各從其耦也杜子春讀果為裸音義繹音亦果魯火反注裸同靁力胃反又如字郤起略反疏釋曰云各有名物物色也六方之龜各有其名其色各異也注釋曰云龜俯者靈已下鄭亦取爾雅云俯者靈此云天龜曰靈屬為一物但天在上法之故向下低也爾雅云仰者繹此云地龜曰繹同稱故為一物但地在下法之故向上仰爾雅云前弇果此云東龜曰果同稱果故為一物但在陽方故甲向前長而前弇也云後弇獵者爾雅云後弇獵此云南龜曰獵故為一物亦在陽方故甲後長而後弇云左倪靁者爾雅云左倪不類不類即靁一也以其在陰方故不能長前後而頭向左相聛聣然云右倪若者爾雅云右倪不若不若即若也同稱若故為一物亦在隂方故亦不長前後而頭向右聛聣然云是其體也者體有二法此經體據頭甲而言古人云君占體體謂兆象與此異也云東龜南龜長前後在陽象經也者據甲而言凡天地之間南北為經東西為緯云西龜北龜長左右在隂象緯也者據頭為説此解稱果獵之意云天龜俯地龜仰東龜前南龜郤西龜左北龜右各從其耦者此鄭解兩兩相對為長短低仰之意也杜子春讀果為裸者此龜前甲長後甲短露出邉為裸得為一義故鄭引之在下凡取龜用秋時攻龜用春時各以其物入于龜室注六龜各異室也秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也音義解音蟹一音佳買反疏釋曰云各以其物入于龜室龜有六室物色也六龜各入于一室以其蓍龜嵗易秋取春攻訖即欲易去前龜也上春釁龜祭祀先卜注釁者殺牲以血之神之也鄭司農云祭祀先卜者卜其日與其牲玄謂先卜始用卜筮者言祭言祀尊焉天地之也世本曰巫咸作筮作卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祠龜䇿相互矣秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳音義釁許靳反疏注釋曰云釁者殺牲以血之神之也者謂若禮記雜記云廟成則釁之廟用羊門夾室用雞之類皆是神之故血之也先鄭云祭祀先卜者卜其日與其牲後鄭不從者以其此官不主卜事故不從也故解先卜始用卜筮者云言祭言祀尊焉天地之也者按大宗伯天稱禋祀地稱血祭是天地稱祭祀今此先卜是人應曰享而云祭祀與天地同稱故云尊焉天地之也云世本曰巫咸作筮作卜未聞其人也者曲禮云卜筮者先聖王之所以信時日其易所作即伏犧為之矣但未有揲蓍之法至巫咸乃教人為之故巫咸得作筮之名作卜未聞其源世本又不言其人故云未聞其人也云是上春者夏正建寅之月月令孟冬云釁祠龜策相互矣者言周與秦各二時釁龜策月令孟冬釁則周孟冬亦釁之周以建寅上春釁秦亦建寅上春釁之故云相互也云秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳若據此注則周秦各一時釁此鄭兩解按月令注云周禮龜人上春釁龜謂建寅之月秦以其嵗首使大史釁龜策與周異矣彼注與此後注義同也若有祭事則奉龜以往注奉猶送也送之於所當卜疏釋曰此云祭事不辨外內則外內俱當卜皆奉龜以往所當卜處旅亦如之喪亦如之疏釋曰旅謂祈禱天地及山川喪謂卜葬宅及日皆亦奉龜往卜處也按爾雅有十龜一曰神龜龜之最神明者二曰靈龜涪陵郡出大龜甲可以卜緣甲文似玳瑁俗呼為靈龜即今大觜蠵龜也一名靈蠵能鳴也三曰攝龜小龜也腹甲曲折解能自張閉好食蛇江東呼為陵龜也四曰寶龜大寶龜也五曰文龜甲有文采者也河圗曰靈龜負書丹甲青文六曰筮龜常在蓍叢下潛伏七曰山龜八曰澤龜九曰水龜十曰火龜山澤水火皆説龜生之處所也火龜猶火鼠也菙氏掌共燋契以待卜事注杜子春云燋讀為細目燋之燋或曰如薪樵之樵謂所爇灼龜之木也故謂之樵契謂契龜之鑿也詩云爰始爰謀爰契我龜玄謂士喪禮曰楚焞置于燋在龜東楚焞即契所用灼龜也燋謂炬其存火音義菙本又作菙同時髓反燋哉約反李又粗堯反一音哉益反契苦計反劉苦潔反樵在消反焞吐敦反又徒敦反又在悶反又祖悶反一音純李一音祖館反炬其吕反疏注釋曰子春讀燋樵二者皆作俗讀為柴樵之樵後鄭不從依音為雀意取莊子爝火之義熒熒然也玄謂士喪禮曰楚焞置于燋在龜東者謂陳龜於西孰上龜南首燋在龜東置楚焞于上言楚焞者謂荆為楚用之焞龜開兆故云楚焞也凡卜以明火爇燋遂吹其焌契以授卜師遂役之注杜子春云明火以陽燧取火於日焌讀為英俊之俊書亦或為俊玄謂焌讀如戈鐏之鐏謂以契柱燋火而吹之也契既然以授卜師用作龜也役之使助之音義焌音俊又存悶反又祖悶反李祖館反鐏存悶反劉祖悶反柱張主反疏釋曰云遂吹其焌契以授卜師者謂若大卜視髙已上則卜師作龜故以焌契授卜師若差次使卜人作龜則授卜人言遂役之者因事曰遂以因授契訖即受卜師所役使也注釋曰子春云明火以陽燧取火於日者此秋官司烜氏職文謂將此明火以燒爇燋使然也云焌讀為英俊之俊者意取荆樵之中英俊者為楚焞用之灼龜也後鄭讀焌為戈鐏之鐏者讀從曲禮云進戈者前其鐏意取鋭頭以灼龜也云謂以契柱燋火而吹之也者解經遂吹其焌契謂將此焌契以柱於燋火吹之使熾也占人掌占龜以八簭占八頌以八卦占簭之八故以視吉凶注占人亦占筮言掌占龜者筮短龜長主於長者以八簭占八頌謂將卜八事先以筮筮之言頌者同於龜占也以八卦占筮之八故謂八事不卜而徒筮之也其非八事則用九筮占人亦占焉音義簭音筮長如字下同疏注釋曰云占人亦占筮言掌占龜者筮短龜長主於長者占筮即此經云以八筮占八頌又云以八卦占筮之八故並是占筮故首云掌占龜不云占筮故云主於長者也鄭知筮短龜長者按左氏僖四年傳云初晉獻公欲以驪姬為夫人卜之不吉筮之吉公從筮卜人曰筮短龜長不如從長是龜長筮短之事龜長者以其龜知一二三四五天地之生數知本易知七八九六之成數知末是以僖十五年傳韓簡云龜象也筮數也物生而後有象象而後有滋滋而後有數故象長如易歷三聖而成窮理盡性云短者以其易雖窮理盡性仍六經並列龜之繇辭譬若讖緯圗書不見不可測量故為長短馬融曰筮史短龜史長者非鄭義也云以八筮占八頌謂將卜八事先以筮筮之者凡大事皆先筮而後卜此八事還是上文大事之八也凡筮之卦自用易之爻占之龜之兆用頌辭占之今言八筮占八頌者鄭云同於龜占也以其吉凶是同故占筮之辭亦名頌故云同於龜占龜占則繇辭是也云以八卦占筮之八故謂八事不卜而徒筮之也者此出人君之意此八事即大卜大事之八故令先筮後卜今人君欲得徒筮吉凶占則行之不假更卜故云占筮之八故云非八事則用九筮占人亦占焉者此云九筮即下筮人所云九筮是也知占人亦占焉者以其占人於此占筮明下九筮亦占可知也凡卜簭君占體大夫占色史占墨卜人占坼注體兆象也色兆氣也墨兆廣也坼兆璺也體有吉凶色有善惡墨有大小坼有微明尊者視兆象而已卑者以次詳其餘也周公卜武王占之曰體王其無害凡卜象吉色善墨大坼明則逢吉疏釋曰此君體已下皆據卜而言而兼云筮者凡卜皆先筮故連言之注釋曰云體兆象也者謂金木水火土五種之兆言體言象者謂兆之墨縱橫其形體象似金木水火土也凡卜欲作龜之時灼龜之四足依四時而灼之其兆直上向背者為木兆直下向足者為水兆邪向背者為火兆邪向下者為金兆橫者為土兆是兆象也云色兆氣也者就兆中視其色氣似有雨及雨止之等是兆色也墨兆廣也者據兆之正璺處為兆廣坼兆璺者就正墨傍有竒璺罅者為兆璺也云體有吉凶色有善惡墨有大小坼有微明者據鄭後云象吉色善墨大坼明則逢吉若然則此四者各舉一邉而言則善與大及明皆是吉惡小及微皆凶也引周公卜武王是尚書金縢彼為武王有疾不愈恐死周公欲代武王死為三壇因告大王王季文王以請天未知天之許不故壇所即卜云三龜一習吉啓籥見書乃并是吉周公曰體王其無害引之者證君占體之事也凡卜簭既事則􅌛幣以比其命嵗終則計其占之中否注杜子春云􅌛幣者以帛書其占􅌛之於龜也玄謂既卜筮史必書其命龜之事及兆於䇿􅌛其禮神之幣而合藏焉書曰王與大夫盡辨開金縢之書乃得周公所自以為功代武王之説是命龜書音義􅌛音係比毗志反一音必履反中丁仲反疏釋曰既事者卜筮事訖卜筮皆有禮神之幣及命龜筮之辭書其辭及兆於簡䇿之上并繫其幣合藏府庫之中至嵗終總計占之中否而句考之注釋曰子春云繫幣者以帛書其占繫之於龜也者後鄭不從云書其命龜之事及兆於䇿者云既卜筮即筮亦有命筮之辭及卦不言者舉龜重者而略筮不言可知或有筮短龜長直據龜而言其筮則否書曰已下亦金縢文按彼武王崩後周公將攝政遭管蔡流言成王未寤遭雷風之變王與大夫盡辨以啓金縢之書乃得周公所自以為功代武王之説辨謂爵升應天變之服功事也事謂請命之事故云是命龜書也引之證比其命藏之事也簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶注此九巫讀皆當為筮字之誤也更謂筮遷都邑也咸猶僉也謂筮衆心歡不也式謂筮制作法式也目謂事衆筮其要所當也易謂民衆不説筮所改易也此謂筮與民和比也祠謂筮牲與日也參謂筮御與右也環謂筮可致師不也音義九巫皆音筮出注比毗志反注同僉七亷反説音悅下同疏釋曰此簭人掌三易者若卜用三龜此筮人用三易故云掌三易也注釋曰鄭破巫為筮者此筮人掌筮不主巫事故從筮也云更謂筮遷都邑也者此遷都謂公卿大夫之都邑鄭答趙商若武王遷洛盤庚遷殷之等則卜故大卜有卜大遷之事云咸猶僉也謂筮衆心歡不也者謂國有營建之事恐衆心不齊故筮之也云式謂筮制作法式也者式是法式故知制作法式也云目謂事衆筮其要所當也者目是事之要故論語顔回云請問其目鄭云欲知其要顔回意以禮有三百三千卒難同備故請問其目此云事衆故亦筮其要目所當者也云易謂民衆不説筮所改易者改易之事上既有更為遷都邑故以此易為民衆不和説須筮改易政教之事云比謂筮與民和也者比是相親比之事故比卦云建萬國親諸侯故知比為筮與民和比云祠謂筮牲與日也者按大卜大祭祀而卜之今此祀不卜而筮者彼大祀用卜此謂小祭祀故用筮也云參謂筮御與右也者參謂參乘之事故知是御及車右勇力與君為參乘故筮之也云環謂筮可致師不者此環與環人字同彼環人注致師引宣公十二年楚許伯御樂伯攝叔為右以致晉師之事明此經筮環亦是主致師以卜之事也趙商問僖十五年秦晉相戰晉卜右慶鄭吉襄二十四年晉致楚師求御於鄭鄭人卜宛射犬吉皆用卜今此用筮何且此云筮是國之大事先筮而後卜曲禮注引春秋獻公卜娶驪姬不吉公曰筮之又尚書龜從筮從請明所據鄭答天子具官有常人官非一人故筮有可使者諸侯兼官無常人故臨時卜之也凡國之大事先簭而後卜注當用卜者先筮之即事漸也於筮之凶則止不卜疏注釋曰此大事者即大卜之八命及大貞大祭祀之事大卜所掌者皆是大事皆先筮而後卜故鄭云當用卜者先筮之即事漸也者筮輕龜重賤者先即事故云即事漸也云於筮之凶則止者曲禮云卜筮不相襲若筮不吉而又卜是卜襲筮故於筮凶則止不卜按洪範云龜從筮逆又云龜筮共違于人彼有先卜後筮筮不吉又卜與此經違者彼是箕子所陳用殷法殷質故與此不同上春相簭注相謂更選擇其蓍也蓍龜嵗易者與音義相息亮反注同與音餘疏注釋曰上春謂建寅之月嵗之始除舊布新故更選擇其蓍易去其舊者據此則蓍嵗易也兼云龜者龜人云攻龜用春時明亦以新易故故知龜亦嵗易此龜之嵗易者謂龜人天地四時之龜若大寶龜者非常用之龜不嵗易凡國事共簭周禮注疏卷二十四周禮注疏卷二十四考證磬師掌教擊磬擊編鍾疏故鎛師注云擊鎛者亦視瞭也鎛監本訛作鍾今據鎛師注原文改正及祭祀奏縵樂及石經作凡凡射王奏騶虞疏山海經鄒書云騶虞獸説與毛詩同臣浩按山海經有騶吾蓋鄒騶虞吾一也書疑吾字之訛鎛師掌金奏之鼓疏按磬師職云掌教擊編鍾一本作按視瞭職云樂則擊編鍾籥章國祭蠟疏鄭注郊特牲云嵗十二月周之正數數蓋朔字之訛大卜凡國大貞注卜因龜之腹背因字疑用字之訛龜人掌六龜之屬注左倪靁靁監本訛作靈今據疏併爾雅正之又杜子春讀果為裸裸監本訛作羸今依釋文改正占人凡卜簭卜人占坼注坼兆璺也璺字監本訛作釁今從大卜注文正之周禮注疏卷二十四考證
