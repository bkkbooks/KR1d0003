body:
  text: 周禮注疏卷十六漢鄭氏注唐陸德眀音義賈公彥疏旅師掌聚野之鋤粟屋粟間粟注野謂逺郊之外也鋤粟民相助作一井之中所出九夫之稅粟也屋粟民有田不耕所罰三夫之稅粟間粟閒民無職事者所出一天之征粟音義間音間注同疏釋曰此旅師斂六遂之稅六遂在野故云掌聚野之鋤粟之等注釋曰云野謂逺郊之外也者案鄉大夫野自六尺彼野謂城外此野據逺郊之外六遂之中也云鋤粟民相助作一井之中所出九夫之稅粟也者六鄉六遂與公邑三處皆為溝洫法三等采地乃為井田今此六遂之中鄭云一井之中出九夫之稅粟以為井田與例違者但鄉遂之中雖為溝洫法及其出稅亦為井田稅之是以小司徒職云考夫屋注云夫三為屋屋三為井出地貢者三三相任是出地稅亦取井有九夫三三相保而稅之故以井言之云屋粟民有田不耕所罰三夫之稅粟間粟閒民無職事者所出一夫之征粟者此竝載師職文但彼云出夫家之征彼注云夫稅者百畝之稅家稅者出士徒車輦此經云粟無取於家征之義故略不言也而用之以質劑致民平頒其興積施其惠散其利而均其政令注而讀為若聲之誤也若用之謂恤民之囏厄委積於野如遺人於鄉里也以質劑致民案入稅者名㑹而貸之興積所興之積謂三者之粟也平頒之不得偏頗有多少縣官徴聚物曰興今云軍興是也是粟縣師徴之旅師斂之而用之以賙衣食曰惠以作事業曰利均其政令者皆以國服為之息音義而用而音若出注積子賜反注同疏釋曰若用謂用三者之粟也注釋曰鄭必讀而為若者所聚之粟民有囏厄乃用之無則貯待凶年則若為不定之辭其而字無義例故鄭轉為若也云若用之謂恤民之囏厄者案遺人云鄉里之委積以恤民之囏厄此六遂即鄉里也故鄭云委積於野如遺人之於鄉里也云以質劑致民案入稅者名㑹而貸之者所聚之粟遇有凶年賑恤所輸入之人欲與之粟還案入稅者之人名㑹計多少以貸之簿書若市劵有長短故云質劑也云縣官徴聚物曰興者六遂已外縣師徴之故云縣官徴聚物曰興云今云軍興是也者鄭舉漢法況之興皆是積聚之義也云是粟縣師徴之者案上縣師職云嵗時徴野之賦貢故知也云旅師斂之者即上文聚三等粟是也云而用之則若用之是也云以賙衣食曰惠知者以衣食先當時用不生其利故云惠所為事業後即有利故云利此對文惠利兩有故為此釋若通而言之惠利為一故論語孔子云因民所利而利之不亦惠而不費是惠利通也云均其政令者皆以國服為之息者亦如泉府凡民之貸者以國服為之息鄭彼注云以其於國服事之稅而出息也於國事受園門里之田而貸萬泉者則朞出息五百若然近郊之田貸萬泉朞出息一千已外逺郊甸稍縣都皆依國服出息可知凡用粟春頒而秋斂之注困時施之饒時收之疏釋曰上經所云是貸而生利此經所云是直給不生利也官得舊易新民得濟其困乏官民俱益之也凡新氓之治皆聽之使無征役以地之媺惡為之等注新氓新徙來者也治謂有所求乞也使無征役復之也王制曰自諸侯來徙家期不從政以地美惡為之等七人以上授以上地六口授以中地五口以下授以下地與舊民同旅師掌斂地稅而又施惠散利是以屬用新民焉音義治直吏反注同復音福期音基上時掌反疏注釋曰云新氓新徙來者也者即上徙於他者是也云治謂有所求乞也者此無正文鄭以意解之以其無征役可治又新來未有業次故知治是求乞也引王制自諸侯來徙家期不從政者彼仍有自家徙於諸侯三月不從政不引之者略引之以證有復除之法云以地美惡為之等七人以上授之以上地已下者此皆據小司徒職文此三等據中地而言故注云有夫有婦乃成家自二人以至十人為九等七六五者為其中但彼六鄉上地無萊此據六遂上地有萊五十畝已外中地下地外內同皆三百畝耳稍人掌令丘乘之政令注丘乘四丘為甸甸讀與維禹敶之之敶同其訓曰乘由是改云是掌令都鄙修治井邑丘甸縣都之溝涂云丘甸者舉中言之溝涂之人名井别邑異則民之家數存焉音義丘乘繩證反注丘乘曰乘丘甸并為甸甸讀禹敶之敶皆同音疏釋曰云掌令丘乘之政令者四井為邑四邑為丘四丘為甸甸出長轂一乘故云丘乘不言令井邑者舉中而言也言令者謂三等采地之中為溝涂之法耳注釋曰丘乘四丘為甸據小司徒而言之也云甸讀與維禹敶之之敶同音案毛詩云維禹甸之不為敶者鄭先通韓詩此據韓詩而言敶敶是軍陳故訓為乘言由是改云者由甸出車一乘可以為軍故改云乘不為甸也云是掌令都鄙修治井邑丘甸縣都之溝涂云丘甸者舉中言之者此據小司徒職云四井為邑四邑為丘四丘為甸四甸為縣四縣為都而言也知直令為溝涂者以下文云若有㑹同則以縣師之法作其同徒彼是令軍法明此惟令治溝涂而已云溝涂之人名井别邑異則民之家數存焉者謂甸方八里其中六十四井使出田稅外加一里三十六井使治溝洫不出稅云民之家數存者假令上地一井地有九夫中央一夫助入公傍八夫各治一夫以自入則一井地有九夫家則有八四井為邑三十二家據一成而言則三十六井使治溝涂各有人名故云溝涂之人名井别邑異民之家數存在於一成之中矣若有㑹同師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽於司馬注有軍旅㑹同田役之戒縣師受法於司馬邦國都鄙稍甸郊里唯司馬所調以其法作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至是以書令之耳其所調若在家邑小都大都則稍人用縣師所受司馬之法作之帥之以致於司馬也同徒司馬所調之同凡用役者不必一時皆遍以人數調之使勞逸遞焉音義輂居録反卒伍子忽反調徒弔反下同遍音遍遞徒禮反又音弟本又作適音釋疏釋曰云若者此等或有或無故云若為不定之辭也云㑹同者謂時見曰㑹殷見曰同云師田者謂出師征伐及田獵云行役者謂巡守及興役云則以縣師之法作其同徒者稍人屬縣師縣師屬大司馬大司馬得王進止縣師即受法於司馬縣師既得法稍人又受法於縣師故云以縣師之法作其同徒也既作同徒乃致於大司馬故云以聽於司馬也注釋曰有軍旅㑹同田役之戒縣師受法於司馬邦國都鄙稍甸郊里唯司馬所調者縣師注云郊里郊所居也謂六鄉之民布在國中外至逺郊故有居在郊者也云以其法作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至者竝縣師職文其問云縣師及邦國都鄙稍甸郊里唯司馬所調以其法竝鄭所加加之者欲見縣師受法於司馬稍人又受法於縣師之意也云是以書令之耳者此鄭君之言是以此稍人書而令作其同徒之事云其所調若在家邑小都大都則稍人用縣師所受司馬之法作之帥之以致於司馬也者此鄭取縣師之文合於此經欲見此稍人受法於縣師即縣師所受司馬之法云同徒司馬所調之同者此即縣師受法於司馬者也云凡用役者不必一時已下此釋同徒為同其勞逸遞等也大喪帥蜃車與其役以至掌其政令以聽於司徒注蜃車及役遂人共之稍人者野監是以帥而致之既夕禮曰既正柩賔出遂匠納車於階間則天子以至於士柩路皆從遂來疏釋曰此經釋天子之喪將葬使稍人帥蜃車及役人使至之事云以聽於司徒者以其司徒地官卿掌徒庶之政令故稍人帥衆以聽於司徒也注釋曰鄭知蜃車及役遂人共之者案遂人職云大喪帥六遂之役而致之又云及葬帥而屬六綍又遂師職亦共丘籠及蜃車之役故知遂人共之也云稍人者野監是以帥而致之者北欲釋得在稍人之意以其監三等采地是野監故得并監六遂蜃車之事也云天子以至于士柩路皆從遂來者此經上舉天子既夕下舉士則其中有諸侯卿大夫之喪蜃車柩路皆從遂人而來可知委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物注野謂逺郊以外也所斂野之賦謂野之園圃山澤之賦也凡疏材草木有實者也凡畜聚之物瓜瓠葵芋禦冬之具也野之農賦旅師斂之工商嬪婦遂師以入玉府其牧則遂師又以共野牲音義斂力豔反畜敕六反注同芋于附反疏注釋曰委人所斂皆據六遂以外至王畿故鄭云野謂逺郊以外總言之也云所斂野之賦謂野之園圃山澤之賦也者此則九職所出貢貢賦通言之九職之中有園圃育草木又有虞衡作山澤之材故以園圃山澤言之也云凡疏材草木有實者也者疏是草之實材是木之實故鄭并言之九職中有臣妾聚斂疏材鄭彼注云疏材百草根實不以木解材文略也彼臣妾聚斂雖無貢法要知此疏材亦是草木有根實者鄭不言根亦略言之也云凡畜聚之物瓜瓠葵芋禦冬之具也者七月詩有八月斷壺壺瓠也有甘可食者信南山詩疆埸有瓜士喪禮又有葵菹芋故知畜聚物中有瓜瓠葵芋之等但以士喪禮籩豆差之葵菹芋芋為長菹不得為芋子其南方有芋子堪食與士喪禮芋别也云野之農賦旅師斂之者即上旅師所云聚野之鋤粟之等是也云工商嬪婦遂師以入玉府者案遂師云入野職野賦於玉府雖不言工商嬪婦但遂師既入野之賦貢眀嬪婦工商之賦也知者以其玉府掌玩好之物其工商嬪婦所作堪為玩好故入玉府者工商嬪婦也云其收則遂師又以共野牲者上遂師云凡國祭祀共其野牲是知九職之中藪收養鳥獸者遂師共之也以稍聚待賔客以甸聚待羇旅注聚凡畜聚之物也故書羇作竒杜子春云當為羇音義聚俗裕反下文同疏釋曰委人掌斂野賦故以三百里稍地之聚二百里甸之聚以待羇旅過客之等注釋曰鄭知聚是凡畜聚者見上文凡畜聚之物故知此聚亦是畜聚之物凡其余聚以待頒賜注余當為餘聲之誤也餘謂縣都畜聚之物疏注釋曰知餘聚是縣都者以其委人掌斂野物從三百里至王畿上巳云甸稍明此言餘聚是縣四百里都五百里中畜聚之物如上稍甸畜聚之物也以式法共祭祀之薪蒸木材賔客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡疏材共野委兵器與其野囿財用注式法故事之多少也薪蒸給炊及燎粗者曰薪細者曰蒸木材給張事委積薪芻者委積之薪芻也軍旅又有疏材以助禾粟野委謂廬宿止之薪芻也其兵器謂守衛陳兵之器也野囿之財用者苑囿藩蘿之材音義蘿音羅本亦作羅疏釋曰此一經以委人掌斂野賦故所有委積皆供之注釋曰云式法故事之多少也者總此一經皆當依舊法式用之故以法式目之也云薪蒸給炊及燎者以其祭祀所用薪蒸無過炊米與燔燎也知粗者曰薪細者曰蒸者左氏傳云其父析薪薪既云析明其大者曰薪其蒸不言析明其細也云木材給張事者以其祭祀而云木材等更無用木材之處案掌次云張大次小次及幕竝須木材明據此所用故云給張事云委積薪芻者委積之薪芻也者案大行人掌客皆有委積委積之中有牲牢米禾薪芻之等委人所供唯供薪芻鄭恐委積之中有米牲牢亦供之故云委積薪芻是委積之中供薪芻以别之也云軍旅又有疏材以助禾粟者以其疏材是百草根實可得助禾粟以供馬牛故云助禾粟也云野委謂廬宿止之薪芻也者案遺人云十里有廬廬有飲食三十里有宿宿有委五十里有市市有積委積之中有薪芻在野外故云野委也其六鄉之廬宿委積薪芻自六鄉供之云其兵器謂守衛陳兵之器也者兵文承野委之下明與野委同為賔客所用故知是守衛賔客陳兵之器也云野囿之財用者苑囿藩羅之材者委人所為皆據二百里上經稍聚待賔客據三百里故知此囿在野故鄭以苑囿言之古者田獵皆在囿故書傳云嚮之取於囿是勇力取今之取於澤是揖讓取若然田在澤澤中有囿田在山山中有苑其苑囿藩羅以遮禽獸故云野囿財用也凡軍旅之賔客館焉注館舍也必舍此者就牛馬之用疏釋曰言軍旅賔客者謂諸侯以軍旅助王征討者故謂之軍旅之賔客也土均掌平土地之政以均地守以均地事以均地貢注政讀為征所平之稅邦國都鄙也地守虞衡之屬地事農圃之職地貢諸侯之九貢音義政音征出注疏注釋曰鄭破政為征者不取於政教之政故破從征稅之征也云所平之稅邦國都鄙也者案下文云以和邦國都鄙者故知此平者亦據邦國都鄙若六鄉六遂及公邑征稅自均人平之云地守虞衡之屬者按下文山虞澤虞川衡林衡之屬皆云守故知地守是虞衡之屬也云地事農圃之職者九職任萬民使民事之故知地事是九職三農園圃之職也云地貢諸侯之九貢者此主均邦國都鄙而云均地貢明據大宰九貢而言但諸侯九貢是嵗之常貢則小行人春令入貢者是也其諸侯九貢皆民之地稅市取美物貢王若禹貢厥篚厥貢之類是也以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令注施讀亦為弛也禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳禮器曰禮也者合於天時設於地財順於鬼神合於人心理於萬物音義為于僞反省所景反疏釋曰土均主調即是和義故以和畿外邦國畿內都鄙之政令及五刑五禁與其施舍不役之等并須調和之使之得所也云禮俗喪紀祭祀皆以地媺惡為輕重之法而行之者自禮俗喪紀祭祀三事皆以地之媺惡為輕重地媺則重行之地惡則輕行之以其禮許儉不許無故也云掌其禁令者恐有僣踰與下逼故有禁令也注釋曰云施讀亦為弛也者上遂人注已云施讀為弛故此云亦云禮俗邦國都鄙民之所行先王舊禮也者俗者續也續代不易此土均和邦國都鄙是知先王舊禮故引曲禮君子行禮不求變俗以證之謂若周公封康叔於殷墟其民還行殷之禮俗者也云隨其土地厚薄為之制豐省之節耳者以厚薄解經媺惡豐省解經為輕重之法也云禮器曰禮也者合於天時者天有四時四時生者則將為禮是合於天時也云設於地財者土地有財則用為禮是所設依於地之財也云順於鬼神者鬼神享德不享味若不合天時不設地財而為禮則鬼神不享若能合天時設地財則鬼神享之是順於鬼神也云合於人心者若不合天時不設地財則不合人心若合天時設地財則合人心也云理萬物者若順鬼神合人心則萬物得其道理故可以理萬物也引之證行禮依地媺惡之義草人掌土化之法以物地相其宜而為之種注土化之法化之使美若泛勝之術也以物地占其形色為之種黃白宜以種禾之屬音義相息亮反種章勇反注除種禾以外竝同泛芳劒反李又音凡疏釋曰掌土化之法者即下經所云糞種是化土使和美注釋曰云化之使美者謂若騂剛用牛糞種化騂剛之地使美也云若泛勝之術也者漢時農書有數家泛勝為上故月令注亦引泛勝故云泛勝之術也云黃白宜以種禾之屬者鄭依孝經緯援神契而言也凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬注凡所以糞種者皆謂煮取汁也赤緹縓色也渴澤故水處也潟鹵也貆貒也勃壤粉解者埴壚黏疏者彊㯺彊堅者輕爂輕脆者故書騂為挈墳作蚠杜子春挈讀為騂謂地色赤而土剛強也鄭司農云用牛以牛骨汁漬其種也謂之糞種墳壤多蚠鼠也壤白色蕡麻也𤣥謂墳壤潤解音義糞粉運反本亦作糞緹音低李他奚反聶吐弟反墳符粉反麋音眉渴其列反舄音昔一音鵲貆呼丸反又音丸李一音喜元反埴時力反一音職壚音盧李一音閭彊其兩反注同㯺本又作呼覽反劉音攬蕡扶云反一音蒲悶反爂孚照反李音婦堯反縓七絹反鹵音魯貒他官反解胡買反下同蚠符粉反疏釋曰案禹貢冀州云白壤青州云白墳兗州云黑墳徐州云赤埴墳揚州荆州云塗泥豫州云墳壚梁州云青黎雍州云黃壤九等與此騂剛之屬為九等不同者以禹貢自是九州大判各為一等此九等者無妨一州即有此九等之類故不同也注釋曰云凡所以糞種者皆謂煮取汁也者雖無正文以意量之用牛羊之類不可以骨肉明煮取汁和種也云赤緹縓色也者爾雅云一染謂之縓故以縓赤當之也云渴澤故水處也者以水鍾曰澤今澤云渴明是故時停水今乃渴故云故水處也云潟鹵也者近水之處水已寫去其地為鹹鹵故云潟鹵也云貆貒也者案爾雅云貈子貒或曰貆故以貆貒為一也云勃壤粉解者壤是和緩故為粉解也云埴壚黏疏者以埴為黏以壚為疏故云黏疏也云彊㯺彊堅者以㯺為堅故為彊堅云輕爂輕脆者爂脆聲相近故知爂即脆也先鄭云用牛以牛骨汁漬其種也者此與後鄭義合也云墳壤多蚠鼠也壤白色後鄭皆不從者餘八等之地皆據地之形色唯此墳壤以蚠鼠外物為名於義不可故還從墳為正謂潤解也又禹貢有黃壤則此壤不得專據白色解之故不從壤白色也稻人掌稼下地注以水澤之地種榖也謂之稼者有似嫁女相生疏釋曰以下田種稻麥故云稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田注鄭司農說瀦防以春秋傳曰町原防規偃瀦以列舍水列者非一道以去水也以涉揚其芟以其水寫故得行其田中舉其芟鉤也杜子春讀蕩為和蕩謂以溝行水也𤣥謂偃瀦者畜流水之陂也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝作猶治也開遂舍水於列中因涉之揚去前年所芟之草而治田種稻音義畜敕六反注同蕩如字李吐黨反列祿計反注同澮古外反寫戚如字劉殤故反芟所銜反町徒頂反去起呂反下同畦劉音圭又下圭反㽟音劣疏釋曰所為防瀦之法皆具鄭注注釋曰春秋傳者事在襄二十五年楚蒍掩書土田法以授子木之事彼云町原防規偃瀦是楚之惡地有防偃之法與此防瀦同故引為證也先鄭云以列舍水列者非一道去水也者以舍為舍去之舍後鄭以為止舍之舍以澮是寫去水以舍為止水於其中故不從先鄭也凡稼澤夏以水殄草而芟荑之注殄病也絶也鄭司農說芟夷以春秋傳曰芟夷薀崇之今時謂禾下麥為荑下麥言芟刈其禾於下種麥也𤣥謂將以澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼音義荑音夷薀紆粉反或憂羣反涸胡洛反疏注釋曰春秋傳者隱六年五月鄭伯侵陳大獲往歲鄭伯請成於陳陳侯不許五父諌云周任有言曰為國家者見惡如農夫之務去草焉芟夷薀崇之絶其本根勿使能殖注云芟刈薀積崇聚也引之者證芟荑為刈殺之義也𤣥謂必於夏六月之時大雨時行者此月令文引之證經夏以水殄草之義也云至秋水涸芟之者解經芟荑之義也澤草所生種之芒種注鄭司農云澤草之所生其地可種芒種芒種稻麥也音義芒種章勇反注芒種同疏釋曰澤草所生種之芒種者但水鍾曰澤有水及鹹鹵皆不生草即不得芒種故云草所生旱暵共其雩斂注稻人共雩斂稻急水者也鄭司農云雩事所發斂音義暵呼旦反斂戚力驗反注同疏釋曰此旱雩據夏五月已後修雩者暵者旱之熱氣若四月龍見而雩未必旱暵也然二種雩皆供雩斂也注釋曰鄭意餘官不言共雩斂於此官特言共者以稻是水穀急須水故旱時特使共雩之發斂也喪紀共其葦事注葦以闉壙禦濕之物音義闉音因疏注釋曰春秋左氏有井闉闉塞也鄭知葦以塞壙所以約之為闉壙言禦水之物則在棺下用之或以為抗席即是禦土與禦水義乖恐非也土訓掌道地圖以詔地事注道說也說地圖九州形勢山川所宜告王以施其事也若云荆揚地宜稻幽并地宜麻音義麻如字一本作麋李及聶氏亡皮反劉沈皆作麇音紀倫反案注辨土所宜荆揚皆言穀幽并不應論獸紀倫之音恐非疏注釋曰其九州地圖乃是諸國所獻以入職方今土訓乃於職方取九州地圖依而說向王使依而責其貢獻之物云若云荆揚地宜稻幽并地宜麻者案職方荆揚之州實宜稻幽并之州竝不言宜麻者鄭以目驗見宜麻職方不言麻乃非民所要用故也道地慝以辨地物而原其生以詔地求注地慝若瘴蠱然也辨其物者别其所有所無原其生生有時也以此二者告王之求也地所無及物未生則不求也鄭司農云地慝地所生惡物害人者若虺蝮之屬音義慝他得反别彼列反虺虛鬼反蝮孚目反疏注釋曰云若瘴蠱然也者謂土地所生惡物瘴即瘴氣出於地也蠱即蠱毒人所為也云别其所有所無者若職方九州所有所無也云原其生生有時也者雖是當州所有而生有時也云以此二者告王之求也者謂辨地物原其生者告王求地所有也地所無及物未生則不求也先鄭云地慝所生惡物害人者若虺蝮之屬者此與後鄭瘴蠱義不同引之在下亦得為一義也王巡守則夾王車注巡守行視所守也天子以四海為守音義行下孟反疏釋曰夾王車者亦在國掌道地圖已下之事注釋曰云行視所守也者此解諸侯為天子守土云天子以四海為守者此解天子自守天下之義蓋巡狩之中含此二義誦訓掌道方志以詔觀事注說四方所識久逺之事以告王觀博古所識若魯有大庭氏之庫殽之二陵疏釋曰云掌道方志者志即今之識也謂道四方所記識久逺之事以告王也云以詔觀事者謂告王觀博古之事也注釋曰左氏傳昭十八年宋衛陳鄭皆火梓慎登大庭氏之庫以望之注云大庭氏古亡國之君在黃帝前其處髙顯殽之二陵僖三十一年秦蹇叔見師襲鄭哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也竝所識久逺之事故引之以證方志之義掌道方慝以詔辟忌以知地俗注方慝四方言語所惡也不辟其忌則其方以為茍於言語也知地俗博事也鄭司農云以詔辟忌不違其俗也曲禮曰君子行禮不求變俗音義辟音避注同惡烏路反疏釋曰誦訓又掌說四方言語所惡之事以詔告令王避其忌惡所以然者使王博知地俗言語之事故鄭云博事也注釋曰引曲禮君子行禮不求變俗者上土均云禮俗注亦引此文彼謂先王舊俗是禮事不變之此引不求變俗謂不變其鄉俗所嫌惡是皆不求變俗各證一邊之義故不同也王巡守則夾王車疏釋曰此亦與土訓同各以所掌以告王也山虞掌山林之政令物為之厲而為之守禁注物為之厲每物有蕃界也為之守禁為守者設禁令也守者謂其地之民占伐林木者也鄭司農云厲遮列守之音義為守者于僞反下為久同疏釋曰案下文林自有衡官掌之今山虞兼云林者彼林是竹木生平地者林衡掌之此山林并云者自是山內之林即山虞兼掌之注釋曰但山內林木金玉錫石禽獸所有不同每物各有藩界設禁亦不同云守者謂其地之民占伐林木者也者案下澤虞職云使其地之人守其財物以時入之于玉府頒其餘于萬民彼是其地之民占取澤物者守之明此山虞所守亦然是以此下文亦令萬民時斬材有期日明是守山林之人也仲冬斬陽木仲夏斬陰木注鄭司農云陽木春夏生者陰木秋冬生者若松柏之屬𤣥謂陽木生山南者陰木生山北者冬斬陽夏斬陰堅濡調音義濡戚如兖反又音柔疏注釋曰先鄭云陽木春夏生者陰木秋冬生者若松柏之屬後鄭不從以為山南為陽木北為陰木者案月令十一月日短至伐木取竹箭竹箭秋冬生不用仲夏斬之故知先鄭之義非也凡服耜斬季材以時入之注季猶稚也服與耜宜用稚材尚柔忍也服牝服車之材音義忍音刃疏釋曰服謂牝服即車平較皆有鑿孔以軨子貫之故謂之牝服也耜謂耒耜隨曲長六尺六寸車人所造者二木皆須堅刃故斬季材少木為之云時入者以其須堅故須依上文仲冬仲夏之時也令萬民時斬材有期日注時斬材斬材之時也有期日入出有日數為久盡物疏釋曰案禮記王制云草木零落然後入山林彼據萬民伐木之時謂十月之中此云萬民時斬材亦謂十月時注釋曰鄭云時斬材斬材之時也者正在十月也云有期日入出有日數為久盡物者經直云有期日鄭云有日數蓋當有日數多少但無文不知幾日為限也凡邦工入山林而掄材不禁注掄猶擇也不禁者山林國之有不拘日也音義掄魯門反又音倫拘音俱本亦作佝音同疏釋曰上文云仲冬斬陽木仲夏斬陰木彼據堅刃之極時但國家須材不定在仲冬仲夏故此邦工入山林不禁又不言時節須即取之故也注釋曰此對萬民不得非時入入又有曰數春秋之斬木不入禁注非冬夏之時不得入所禁之中斬木也斬四野之木可疏注釋曰上經云邦工入山林不禁此又云春秋之斬木不入禁與上違者上文據國家使工取擇木故非冬夏亦得入山林此據萬民取木故十月入山春秋之斬木不入禁故鄭云斬四野之木可雖斬四野未至於三月不得伐桑柘故月令季春云無伐桑柘彼注愛蠶食也凡竊木者有刑罰注竊盜也疏釋曰此謂非萬民入山之時而民盜山林之木與之以刑罰若祭山林則為主而修除且蹕注為主主辨護之也修除治道路場壇音義壇徒丹反或音禪疏釋曰此山林在畿內王國四方各依四時而祭云則為主者謂主當祭事者也而修除者謂掃除糞灑云且蹕者且復蹕止行人也注釋曰云為主主辨護之也者案中候握河紀堯受河圖云帝立壇磬折西向禹進迎舜契陪位稷辨護注云辨護者供時用相禮儀則此云辨護者亦謂供時用相禮儀者也云修除治道路場壇者案守祧職云其廟則有司修除之鄭云有司恆主修除謂掃除糞灑場謂禪即除地之處壇神位之所也若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉注萊除其草萊也弊田田者止也植猶樹也田止樹旗令獲者皆致其禽而校其耳以知獲數也山虞有旗以其主山得畫熊虎其仞數則短也鄭司農云珥者取禽左耳以效功也大司馬職曰獲者取左耳音義植時力反又音值珥如志反又音耳疏釋曰言大田獵者謂玉親行若田在山則山虞芟萊草木於可陳之處故云萊山田之野又及弊田植虞旗于中使民得禽牲者望見之致禽於其所而珥焉珥當為衈謂輸禽者割取左耳以效功也注釋曰云萊除其草萊也者謂於防南擬教戰之處芟去草萊南北三百五十步東西步數雖未聞廣狹可容六軍三三而居一偏耳云山虞有旗以其主山得畫熊虎其仞數則短也者案司常云師都建旗大夫士建物此山虞是士不建物而建旗者以其主山山多熊虎故得有旗禮緯旌旗之杠尺子九仞諸侯七仞大夫五仞士三仞若軍吏是卿大夫則杠長五仞今山虞是士雖有熊虎為旗仞數則短冝三仞必取左耳者以其聽鄉任左故皆取左耳也林衡掌巡林㯟之禁令而平其守注平其守者平其地之民守林㯟之部分音義㯟音鹿分扶問反下同疏釋曰此材衡兼麓者以爾雅山足曰麓雖連於山山虞不掌以麓上有林故屬林衡也注釋曰經直言平其守明不平其稅但平均其守而已故云平其地之民守林麓之部分謂部伍有多少逺近之分也以時計林㯟而賞罰之注計林㯟者計其守之功也林㯟蕃茂民不竊盜則有賞不則罰之音義蕃扶袁反疏釋曰此時考校而計林麓以行賞罰者林衡之官既平民之守護林麓而㑹計民有功者賞之損林麓之財者罰之故注云不則罰之也若斬木材則受法于山虞而掌其政令注法萬民入出時日之期疏釋曰上山虞官尊故設法是以此林衡若斬木材則於虞邊受焉注釋曰案山虞云仲冬仲夏及春秋是時之期令萬民斬材有期日是日之期也川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之注舍其守者時案視守者於其舍申戒之疏釋曰川注瀆者皆是也水鍾曰澤澤與川不同官今川衡兼云澤者澤與川連渚則川衡兼掌之謂若濟水溢為滎澤滎澤則與濟連則管濟川者兼滎澤掌之如此之類皆是注釋曰此舍其守謂川衡之官時復巡行所守之民當案視其所守守人當於其舍申重戒飭之也祭祀賓客共川奠注川奠籩豆之實魚鱐蜃蛤之屬音義奠音電下同鱐所留反蜃上忍反蛤古答反疏注釋曰鄭此注皆據醢人及籩人而言案籩人職云朝事之籩有麷蕡白黑形鹽膴鮑魚鱐醢人云饋食之豆有蜃醢蠯醢蜃蠯是蛤則魚鱐及蜃皆川中所生之物故引為證川奠也言之屬者具有螺醢亦是川奠故云之屬澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于玉府頒其餘于萬民注其地之人占取澤物者因以部分使守之以時入之于玉府謂皮角珠貝也入之以當邦賦然後得取其餘以自為也入出亦有時日之期音義當丁浪反後文皆同為于僞反下注同疏釋曰案上山虞林衡川衡皆不言國獨澤虞云國澤者周公設經二虞二衡文有不同皆是互見為義故也此澤虞云以時入之于玉府頒其餘于萬民亦據中所出入玉府者多故特言之無妨山虞川衡之等亦入玉府亦是互見其義也注釋曰以時入之于玉府者但萬民入澤雖無正文案王制獺祭魚然後虞人入澤梁草木零落然後入山林則萬民入澤可同時云謂皮角珠貝也者澤中所出無過此四物皮謂犀皮角麋角犀角珠出於蚌蛤蚌蛤在澤其貝亦出澤水故知之也云入出亦有時日之期者亦如山虞職所云也凡祭祀賓客共澤物之奠注澤物之奠亦籩豆之實芹茆菱芡之屬音義芹音勤茆音卯菱音陵芡音儉疏注釋曰案籩人職加籩之實有菱芡朝事之豆有茒菹加豆之實有芹菹是皆澤中所出故引證澤物之奠也言之屬者兼有深蒲昌本之等故云之屬喪紀共其葦蒲之事注葦以闉壙蒲以為席疏注釋曰蒲以為席者謂抗席及禮記云虞卒哭芐翦不納者是也若大田獵則萊澤野及弊田植虞旌以屬禽注屬禽猶致禽而珥焉澤虞有旌以其主澤澤鳥所集故得注析羽疏釋曰萊所田之野一如山虞之職也注釋曰云屬禽猶致禽者案山虞致禽之義謂輸之於公當致之於虞旗之中而珥焉以效功此云屬禽者謂百姓致禽訖虞人屬聚之别其等類每禽取三十焉若然則致禽與屬不同而鄭云屬禽猶致禽者鄭欲明山虞澤虞文皆不足故互見為義彼此有其事故云屬禽猶致禽而珥焉云澤虞有旌以其主澤澤鳥所集故得注析羽者以澤是鳥之所集故得建析羽之旌迹人掌邦田之地政為之厲禁而守之注田之地若今苑也疏釋曰迹人主迹知禽獸之處故掌邦田之地政云為之厲禁而守之者有禽獸之處則為苑囿以林木為藩羅使其地之民遮厲守之故鄭云田之地若今苑也凡田獵者受令焉注令謂時與處也疏注釋曰云時與處者謂若仲春仲夏仲秋仲冬是其時云處者謂山澤也其受令者謂夏官主田獵者禁麛卵者與其毒矢射者注為其夭物且害心多也麛麋鹿子音義麛音迷卵力管反疏注釋曰此謂四時常禁案月令孟春云毋麛毋卵又曲禮云國君春田不圍澤大夫不掩羣士不取麛卵者彼以春時先乳特禁之其月令季春云餧獸之藥毋出九門者彼亦崇其春時彼鄭注云凡諸罟及毒藥禁其出九門明其常有時不得用耳云為其夭物釋經禁麛卯者且害心多釋毒矢射者也草人掌金玉錫石之地而為之厲禁以守之注錫鈏也音義草革猛反又虢猛反劉侯猛反沈工猛反錫星歷反鈏以忍反劉常忍反疏釋曰此金玉錫石四者皆在於山言地者即山也為之厲禁亦謂使其地之民遮護守之若以時取之則物其地圖而授之注物地占其形色知鹹啖也授之教取者之處音義啖直覽反本亦作淡疏釋曰取此四者雖無四時之文當取之日應亦有時故云以時取之注釋曰經云物故以占其形色言之云知鹹淡者鄭以當時有人採者嘗知鹹淡即知有金玉故以時事言之也巡其禁令注行其禁明其令角人掌以時徴齒角凡骨物於山澤之農以當邦賦之政令注山澤出齒角骨物大者犀象其小者麋鹿疏釋曰角人止應徴角物兼言齒骨者以其齒骨竝是角類以細小之事因類兼掌之云以當邦賦者言農則皆有夫田出稅今以此農近山澤山澤有此骨角及齒此三者國之所須故使以時入採而稅之以當地稅民益國之事者自此已上皆不言以當邦賦者皆文不具舉此一事餘可知竝是省文之義也注釋曰鄭言山澤出齒角骨物者欲見不言川林直言山澤以其不出川林故特言山澤也云大者犀象其小者麋鹿者無正文鄭以意目驗而知之犀牛有角而象有牙是其大者也月令十一月麋角解五月鹿角解是其小者也以度量受之以共財用注骨入漆浣者受之以量其餘以度度所中音義浣戶玩反度度上如字下待洛反羽人掌以時徴羽翮之政于山澤之農以當邦賦之政令注翮羽本音義翮戶革反疏釋曰此羽人所徴羽者當入於鍾氏染以為后之車飾及旌旗之屬也凡受羽十羽為審百羽為摶十摶為縳注審摶縳羽數束名也爾雅曰一羽謂之針十羽謂之縳百羽謂之緷其名音相近也一羽有名蓋失之矣音義摶除轉反注同劉徒端反縳劉古本反沈除轉反針之材反緷古本反劉音渾一音戶本反李又基遠反近附近之近疏注釋曰鄭引爾雅說乃云名音相近也一羽有名蓋失之矣者規爾雅誤意所以爾雅一羽則有名者只由一者十數之始十為百數之始是名相近既有十百故誤一羽遂有名也掌葛掌以時徴絺綌之材于山農凡葛征徴草貢之材于澤農以當邦賦之政令注草貢出澤檾紵之屬可緝績者音義檾苦迥反緝七入反疏釋曰所以徴絺綌於山農者以其葛出於山故也凡葛征者其徴絺綌之材即葛是也又云凡葛征者總結之也云徴草貢之材于澤農者以檾紵出於澤故也經直言草貢不言檾紵者設文以互換為義故以其絺綌亦以葛草草貢亦是檾紵者也以權度受之注以知輕重長短也故書受或為授杜子春云當為受疏釋曰上角人齒骨與角不須稱直言度量此經葛草等不須量故以權度受之使知斤兩長短故也掌染草掌以春秋斂染草之物注染草茅搜橐蘆豕首紫茢之屬音義茅如字劉音妹搜所留反茅搜蒨也槖音託又音妒茢音列劉閭計反或音例疏注釋曰案爾雅茹藘茅搜郭注云今之蒨也可以染絳橐蘆者爾雅無文豕首者爾雅云茢薽豕首郭注云本草曰彘盧一名蟾蜍蘭今江東呼豨首可以煼蠶蛹郭氏雖有此注不言可染何色則此槖盧豕首未審鄭之所據也紫茢者爾雅云藐茈草郭注云可以染紫一名茈䓞廣雅云即此紫茢也言之屬者更有藍皂象斗之等衆多故以之屬兼之也以權量受之以待時而頒之注權量以知輕重多少時染夏之時音義染夏如琰反疏注釋曰案天官染人云春暴練夏纁𤣥秋染夏夏為五色至秋染五色故鄭云染夏之時時謂秋時也掌炭掌灰物炭物之徴令以時入之注灰炭皆山澤之農所出也灰給浣練炭之所共多疏注釋曰灰炭既出山澤不云徴于山澤之農者義可知經略而不言也以權量受之以共邦之用凡炭灰之事掌荼掌以時聚荼以共喪事注共喪事者以著物也既夕禮曰茵著用荼疏注釋曰云共喪事者以著物也者即引既夕禮茵著用荼是也案既夕禮為茵之法用緇翦布謂淺黑色之布各一幅合縫著以荼柩未入壙之時先陳於棺下縮二於下橫三於上乃下棺於茵上是也徴野疏材之物以待邦事凡畜聚之物注荼茅莠疏材之類也因使掌焉徴者徴於山澤入於委人音義畜敕六反莠音秀劉音酉疏注釋曰知掌荼所徴入委人者以其委人掌斂野之賦凡疏材木材所斂者衆故知此掌荼所徴亦入委人也掌蜃掌斂互物蜃物以共闉壙之蜃注互物蚌蛤之屬闉猶塞也將井椁先塞下以蜃御濕也鄭司農說以春秋傳曰始用蜃炭言僭天子也音義互戶故反蚌蒲項反御魚呂反本亦作禦疏釋曰斂互物者以其互物是蜃之類故因類使兼掌之又云蜃物者共百事之蜃與下共闉壙之蜃别注釋曰云互物蚌蛤之屬者案鱉人云掌取互物先鄭云互物謂有甲䓣胡龜鱉之屬此後鄭互物為蚌蛤者彼下文别有蠯蠯即蛤故從先鄭為龜鱉至此别為蚌蛤亦是有甲㒼胡故也云將井椁先塞下以蜃禦濕也者案士喪禮筮宅還井椁於殯門之外注云既哭之則往施之竁中是未葬前井椁材乃往施之壙中則未施椁前已施蜃炭於椁下以擬禦濕也引春秋者是成公之時宋文公卒始厚葬用蜃炭雖二王之後不得純如天子亦用蜃故被譏引之者證天子之宜也祭祀共蜃器之蜃注飾祭器之屬也鬯人職曰凡四方山川用蜃器春秋定十四年秋天王使石尚來歸脤脤之器以蜃飾因名焉鄭司農云蜃可以白器令色白音義白器如字劉薄霸反疏注釋曰經直云蜃器之蜃鄭總云祭器之屬不辨宗廟及社稷之器則宗廟社稷皆用蜃飾之知義然者案此注引左氏云石尚來歸脤杜預以為宜社之肉以蜃器而盛肉故名肉為脤是祭社之器為蜃也大行人云歸脤以交諸侯之福彼則宗廟社稷之器物謂之為脤是其宗廟社稷之器皆蜃灰飾之事也共白盛之蜃注盛猶成也謂飾牆使白之蜃也今東萊用蛤謂之義灰云疏注釋曰言白盛謂飾牆使白之蜃也案爾雅云地謂之黝牆謂之堊黝黑也堊白也若然此經所云白盛主於宗廟堊牆也云今東萊用蛤謂之義灰云者蜃蛤在泥水之中東萊人義取以為灰故以蛤灰為義灰云也囿人掌囿游之獸禁注囿游囿之離宮小苑觀處也養獸以宴樂視之禁者其蕃衛也鄭司農云囿游之獸游牧之獸音義觀古亂反樂音洛疏注釋曰鄭云囿游囿之離宮小苑觀處也者案孟子文王之囿七十里芻蕘者往焉天子之囿百里竝是田獵之處又書傳云鄉之取於囿是勇力取今之取於澤是揖讓取是為搜狩之常處也今此云禁故知非大囿是小苑觀處也云禁者其蕃衛也者非即守門者也其守門則墨者故閽人云王宮每門四人囿游亦如之鄭云墨者使守門是也言離宮者謂於王宫之外於苑中離别為宫故名離宮於宮外為客館亦名離宫也先鄭云囿游之獸游牧之獸者此與後鄭義異謂獸之游非人游觀引之在下亦得為一義故也牧百獸注備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備焉音義鶴户各反又作鸛古亂反疏釋曰此於小囿中牧養百獸言百者舉成數而言雖以百獸為主其中亦有飛鳥故鄭注引漢之掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備焉為證也祭祀喪紀賓客共其生獸死獸之物場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之注果棗李之屬蓏瓜瓠之屬珍異蒲萄枇杷之屬音義枇蒲梨反或房迷反杷白加反疏釋曰場圃連言場圃同地耳春夏為圃秋冬為場其場因圃而為之故并言之也注釋曰張晏云有核曰果無核曰蓏臣瓚以為在地曰蓏在樹曰果則不辨有核無核此鄭不指定言不知義從何者案閭師云任圃以樹事貢草木此場人又掌之者此據共祭祀賓客者場人徴斂藏之其餘則閭師徴斂之也凡祭祀賓客共其果蓏享亦如之注享納牲音義享許丈反劉凡享皆音向後倣此疏注釋曰享納牲謂祭祀宗廟二灌後君迎牲納之於庭時后夫人薦朝事之豆籩豆籩中有果蓏之物故云享亦如之若然上言祭祀餘祭祀也廩人掌九穀之數以待國之匪頒賙賜稍食注匪讀為分分頒謂委人之職諸委積也賙賜謂王所賜豫給好用之式也稍食祿廪音義匪頒上音分亦如字下音班食音嗣注同好呼報反疏釋曰廩人掌米倉人掌榖今廩人云九榖者以廩人雖專主米亦兼主榖故以九榖言之也注釋曰破匪為分者米榖非是匪所盛之物又以為廬宿市在道分頒義合故不為匪也云分頒謂委人之職諸委積也者委人委積之文具於彼云賙賜謂王所賜豫給好用之式也者此即九式之中九曰好用之式是也故彼注好用燕好所賜豫也云稍食祿廪者此即司士以功詔祿又王制云下士視上農夫九人祿中士倍下士之類是也廩法有數名春秋桓十四年八月御廩災天子亦有御廪單云廪則平常藏米之廩此不言御廩則廪中可以兼之矣明堂位魯有米廩有虞氏之學以有虞氏尚孝合藏粢盛之委故名學為米廪非廪稱也詩云亦有髙廩又云萬億及秭注云廪所以藏粢盛之穗以其萬億及秭數多非藏米之數故以藏穗言之與常廩御廪又異以歲之上下數邦用以知足否以詔榖用以治年之凶豐注數猶計也音義上下時掌反司稼職同數色主反注同疏釋曰上下即豐凶廪人之官以歲之豐凶得稅物多少之帳計國之用以知足否若歲凶稅物少而用多則不足廪人既知多少足否乃詔告在上用榖之法以治年之凶豐此則王制云制國用必於歲之杪者是也凡萬民之食食者人四釜上也人三釜中也人二釜下也注此皆謂一月食米也六斗四升曰釜疏釋曰此謂給萬民糧食之法故云凡萬民之食食者謂民食國家糧食者人四釜上也上謂大豐年也人食三釜中也謂中豐年人食二釜下也謂少儉年此雖列三等之年以中年是其常法釜當今六斗四升即今給請亦然注釋曰知此皆謂一月食米者計中歲頒祿人食三釜不得為數月古今皆月月給請故知此皆一月食米也六斗四升曰釜昭公傳晏子辭若食不能人二釜則令邦移民就榖詔王殺邦用注就榖就都鄙之有者殺猶減也音義殺所界反下注同疏釋曰此即穀梁傳所云五榖不熟謂之大侵謂大凶年之時用如此法也注釋曰知就都鄙之有者此據天子畿內六鄉六遂及公邑純屬天子與三等采地不同若民有不能人二釜之歲移民就賤當先嚮都鄙三等采地之中都鄙亦凶乃出嚮畿外也故知就都鄙之有者也凡邦有㑹同師役之事則治其糧與其食注行道曰糧謂糒也止居曰食謂米也音義糒音備疏釋曰此㑹同師役皆有軍人給糧食故須治之使均給之也注釋曰案書傳云行而無資謂之乏居而無食謂之困是止居曰食謂此廩人米也詩云乃裹糇糧是行道曰糧謂糒也者即尚書費誓云峙乃糗糧即糒也大祭祀則共其接盛注接讀為一扱再祭之扱扱以授舂人舂之大祭祀之榖藉田之收藏於神倉者也不以給小用音義接依注音扱扱初洽反劉初輒反又差及反李聶創涉反疏注釋曰此即廩人兼掌御廪所藏藉田之收以共祭祀之用者也鄭必讀接為一扱再祭之扱者此粗米與舂人舂之當頒扱與舂人無取於接義故讀如特牲少牢云藏於神倉者也者據月令而言知不給小用者祭義云天子藉田千畝諸侯藉田百畝以事天地社稷先公敬之至也是不給小用也舍人掌平宮中之政分其財守以法掌其出入注政謂用榖之政也分其財守者計其用榖之數分送宮正內宰使守而頒之也而行出於廪人其有空缺則計之還入疏釋曰舍人總主給米之事而掌平王宫中之政謂平其給米多少不得特多特少也云分其財守者財即米也故喪大記云納財朝一溢米亦謂米為財謂分米與宫正內宰守禁之所使頒與所使守之人云以法掌其出入者出謂米出於廪人以出給入謂其有空缺則還入廩人皆當以法不可虛也注釋曰必送米與宫正內宰者此二官皆有宿衛之人須米料之數故也凡祭祀共簠簋實之陳之注方曰簠圓曰簋盛黍稷稻粱器音義簠音甫或音蒲李又方于反疏釋曰祭祀言凡則天地宗廟大次小祭皆有黍稷於簠簋實之陳之故云凡以廣之也注釋曰云方曰簠圓曰簋皆據外而言案孝經云陳其簠簋注云內圓外方受斗二升者直據簠而言若簋則內方外圓知皆受斗二升者旊人云為簋實一觳豆實三而成觳豆四升三豆則斗二升可知但外神用瓦簋宗廟當用木故易損卦云二簋可用享損卦以離巽為之離為日日圓巽為木木器圓簋象是用木明矣云盛黍稷稻粱器者案公食大夫簠盛稻粱簋盛黍稷故鄭總云黍稷稻粱器也賓客亦如之共其禮車米筥米芻禾注禮致饔餼之禮音義筥姜呂反又音呂疏釋曰云亦如之者亦有簠簋實之陳之事故亦如祭祀也言實之陳之則據饔餼及饗食之時也云共其禮車米筥米芻禾者鄭云禮致饔餼之禮案聘禮曰致饔使卿韋辨歸饔餼米百筥設于中庭車米三十車陳於門外禾三十車芻薪倍禾又案掌客上公米百有二十莒車米四十車禾五十車芻薪倍禾侯伯米百莒車米三十車禾四十車芻薪倍禾子男米八十莒車米二十車禾三十車芻薪倍禾皆言陳是其饔餼車米莒米芻禾所陳多少之事喪紀共飯米熬榖注飯所以實口不忍虛也君用粱大夫用稷士用粱皆四升實者唯盈熬榖者錯于棺旁所以惑蚍蜉也喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚臘焉音義飯扶晚反注同熬五羔反錯七故反蚍鼻夷反蜉音孚種章勇反下同疏注釋曰云飯所以實口不忍虛也者案檀弓云飯用米貝不忍虛也不以食道用美焉爾故云不忍虛也云君用粱大夫用稷士用粱者此喪大記文彼據沐時所用今引證飯者但飯米沐米與重鬲所盛用米皆同是以士喪禮云貝三實于笲稻米一豆實於筐據飯含所用下即云祝淅米管人受潘煮于垼外御者沐又云鬻餘飯盛以二鬲是其三者用米同故引沐法以證飯也但喪大記注士沐粱蓋天子之士以其士喪禮諸侯之士沐稻喪大記注又云差率而上天子沐黍與則天子飯用黍也云皆四升者用米不同别貴賤但人口大小同故知皆四升也云實者唯盈者士喪禮文故彼云主人左扱米實于右三實一貝左中亦如之又實米唯盈是也云熬榖者錯于棺旁所以惑蚍蜉也者解榖所以熬之將殯設之者將熬榖以惑蚍蜉又有魚臘香蚍蜉欲向棺值此惑之故云所以惑蚍蜉也引喪大記者見尊卑用筐榖多少不同之意云熬君四種八筐大夫三種六筐士二種四筐加魚臘焉鄭彼注引士喪禮曰熬黍稷各二筐又曰設熬旁一筐大夫三種加以粱君四種加以稻四筐則首足皆一其餘設於左右若然天子當加麥苽六種十筐首足亦各一筐其餘亦設於左右也以歲時縣穜稑之種以共王后之春獻種注縣之者欲其風氣燥達也鄭司農云春王當耕于藉則后獻其種也后獻其種見內宰職音義縣音懸注下同穜直龍反稑音六司稼職同見賢遍反疏釋曰內宰注云先種後熟謂之穜後種先熟謂之稑彼內宰上春后獻種示不敗壞且助王耕事此云歲時縣者從納禾始得子即縣之以至春獻之是以先鄭云春王當耕于藉則后獻其種也掌米粟之出入辨其物注九榖六米别為書疏釋曰太宰九職有九榖月令有五榖今止言粟者粟即粢也爾雅釋草粢稷也稷為五榖之長故特舉以配米也其實九榖皆有注釋曰九榖之名已見大宰注今云六米者九榖之中黍稷稻粱苽大豆六者皆有米麻與小豆小麥三者無米故云九榖六米别為書釋經辨其物也歲終則㑹計其政注政用榖之多少倉人掌粟入之藏注九榖盡藏焉以粟為主疏注釋曰案月令首種不入鄭注引舊記首種謂稷即種粟是五榖之長下文辨九榖此云粟是以粟為主也辨九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之注止猶殺也殺餘法用謂道路之委積所以豐優賓客之屬疏注釋曰知殺餘法用是道路之委積者案上遺人注委積者廩人倉人計九榖之數足國以其餘共之所謂餘法用也則彼委積是法用以此餘者為之是豐優賓客者今倉人榖不足故止彼餘法用故鄭據遺人而言焉鄭云之屬者彼遺人注云職內邦之移用亦如此也今榖不足亦止之故云之屬凡國之大事共道路之榖積食飲之具注大事謂喪戎疏注釋曰案左氏成公傳國之大事在祀與戎不言喪事今此喪戎不言祀者此經云共道路惟軍戎及喪在外行於道路故據而言焉祭祀逺無過在近郊之內無在道共糧之事故不言祭祀也司祿闕司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為法而縣于邑閭注周猶遍也遍知種所宜之地縣以示民後年種榖用為法也音義種章勇反注知種同遍音遍下同疏釋曰云巡邦野之稼者謂秋熟之時觀之矣若然春稼秋穡不云穡而云稼者穡由稼而有故本之言稼也巡野觀稼以年之上下出斂法注斂法者豐年從正凶荒則損若今十傷二三實除減半音義斂力驗反注同疏釋曰此觀稼亦謂秋熟時觀稼善惡則知年上下豐凶以此豐凶而出稅斂之法注釋曰鄭云豐年從正者年雖豐與中平一皆從正法十一而稅之也云凶荒則損者凶荒謂年榖不熟則減于十一而稅之云若今十傷二三實除減半者鄭舉漢法以況義十傷二三者謂漢時十分之內傷二分三分餘有七分八分在實除減半者謂就七分八分中為實在仍減去半不稅於半內稅之以凶荒故優饒民可也掌均萬民之食而賙其急而平其興注均謂度其多少賙稟其囏厄興所徴賦音義度徒洛反疏釋曰詩云瓶之罄矣維罍之恥詩刺王富不能分貧以是司稼既知民之禾稼多少則使之均萬民之食減取多者以賙給其急困者云平其興者興謂徴賦當各計十一而稅不得特多特少是平其興也舂人掌共米物注米物言非一米疏釋曰按上文倉人廩人言物者據米榖多者而言故鄭言米物言非一米是也祭祀其其齍盛之米注齍盛謂黍稷稻粱之屬可盛以為簠簋實音義齍音資注同本亦作粢疏釋曰器實曰齍則黍稷稻粱是也在器曰盛則簠簋是也故鄭總言齍盛謂黍稷稻粱之屬屬中兼有麥苽可盛以為簠簋之實也賓客共其宰禮之米注謂可以實筐筥疏釋曰下别言饗食則此言牢禮謂饔餼之米鄭云實筐筥知非車米者以其公車米四十侯伯車米三十子男車米二十非舂人所供故知惟謂筐筥者也若然車米出於民稅故禹貢云五百里納米是也凡饗食共其食米注饗有食米則饗禮兼燕與食音義食音嗣注燕與食及􅐪人職同疏釋曰燕禮無食米食禮無飲酒若饗禮有飲酒有食米故云饗禮兼燕與食也若然經云其食米則饗禮但供食米也掌凡米事􅐪人掌凡祭祀共盛注炊而共之音義􅐪昌志反疏釋曰鄭知炊而共之者以其􅐪人主以炊米而盛之於器共王及后之六食今云共盛明炊而供之共王及后之六食注六食六榖之飯疏釋曰案醫師云和王六食六食即飯也膳夫云饋六榖六榖即六食故鄭合而解之凡賓客共其簠簋之實注謂致飧饔音義飧音孫疏釋曰鄭知是致饔飧者下云饗食亦如之故知此是飧饔也饗食亦如之槁人掌共外內朝冗食者之食注外朝司寇斷獄弊訟之朝也今司徒府中有百官朝㑹之殿云天子與丞相舊決大事焉是外朝之存者與內朝路門外之朝也冗食者謂留治文書若今尚書之屬諸直上者音義槁苦報反朝直遙反注同冗如勇反食音嗣斷丁亂反弊必世反相息亮反與音餘尚音常又時掌反上時掌反疏釋曰天子三朝路寢庭朝是圖宗人嘉事之朝大僕掌之又有路門外朝是常朝之處司士掌之又有外朝在臯門內庫門外三槐九棘之朝是斷獄弊訟之朝朝士掌之今言外內朝明據三槐與路門外二者以其路寢庭非常朝之處也鄭引今司徒府已下況義也云冗食者謂留治文書若今尚書之屬諸直上者者亦引漢法況之謂以次當直留在朝宿不還須以食供之冗食者冗散也外內朝上直諸吏謂之冗吏亦曰散吏以上直不歸家食槀人供之因名冗食者若饗耆老孤子士庶子共其食注士庶子鄉大夫士之子弟宿衛王宮者疏釋曰耆老謂死王事者之父孤子謂死王事者之子國家春饗孤子秋食耆老及士庶子謂若宮正宮伯士謂適子庶子其支庶宿衛王宮者國家饗食之則亦槀人供其食也掌豢祭祀之犬注養犬豕曰豢不於􅐪人言其共至尊雖其潘灡戔餘不可䙝也音義豢音患潘芳袁反本或作蕃音同灡魯旦反戔音淺本亦作殘䙝息列反疏釋曰養犬曰豢此經是也知養豕亦曰豢者見禮記樂記云豢豕作酒非以為禍是養豕曰豢也云不於􅐪人言其共至尊雖其潘灡戔餘不可䙝也者以其􅐪人所炊米為祭祀及共王與后竝是至尊故雖米之潘灡戔餘亦不得褻之與犬故於此言之也周禮注疏卷十六周禮注疏卷十六考證旅師掌聚野之鋤粟屋粟閒粟疏案鄉大夫野自六尺鄉監本訛作卿今据鄉大夫職改正稍人掌令丘乘之政令疏四邑為丘四丘為甸監本脫為丘四丘四字今据小司徒職文補之委人以式法共祭祀之薪蒸木材疏上經稍聚待賓客據三百里故知此囿在野故鄭以苑囿言之監本三訛二此囿訛在故知上苑訛野俱從經及注訂正之稻人以涉揚其芟作田揚監本訛作楊今從石經改正川衡祭祀賓客共川奠疏此注皆據醢人及籩人而言醢監本訛作鹽今改正迹人禁麛卵者注且害心多也心監本訛必今据疏改正疏曲禮云曲禮二字監本訛作王制今据本文改正角人以度量受之注骨入漆浣者臣紱按巾車注有軟讀為漆垸之漆之語輪人注有丸漆之之語皆謂以骨灰和漆以髤器也然則浣垸丸蓋一字而聲之通轉不同耳掌蜃祭祀共蜃器之蜃注天王使石尚來歸蜃蜃春秋作脤又疏公羊以為宜社之肉臣人龍按公羊無此文杜預左傳注有之蓋賈氏誤記耳舍人注而行出於廪人臣紱按行字不可解据疏云出謂米出於廩人疑米字之訛司稼掌均萬民之食疏詩刺王富不能分貧詩箋原文作王不使富分貧周禮注疏卷十六考證
