body:
  text: 周禮注疏卷三十八漢鄭氏注唐陸德明音義賈公彥疏司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節注出接賔曰擯入贊禮曰相以詔者以禮告王音義相息亮反此職內經注除相為賔相朝相授相親相隨相待相為國客相聘相禮皆同疏釋曰此經總與下諸侯文為目言九儀是大行人九儀命者五爵者四是也儀容辭令揖讓之節並見下文注釋曰云出接賔曰擯者即下文交擯而在門外是也云入贊禮曰相者下文及廟惟上相入是也云詔者以禮告王者即下云詔王儀是也將合諸侯則令為壇三成宫旁一門注合諸侯謂有事而會也為壇於國外以命事宫謂壝土以為牆處所謂為壇壝宫也天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北既拜禮而還加方明於壇上而祀焉所以教尊尊也覲禮曰諸侯覲於天子為宫方三百步四門壇十有二尋深四尺是也王巡守殷國而同則其為宫亦如此與鄭司農云三成三重也爾雅曰丘一成為敦丘再成為陶丘三成為昆侖丘謂三重音義壝惟癸反劉欲鬼反與音餘下尺與同重直龍反下三重重耳同敦音頓沈又都門反陶徒刀反侖力門反疏釋曰云將合諸侯者合會也謂時見曰會云則令為壇三成者謂封人為壇三成注釋曰云有事而會也者春秋左氏傳文但春秋時有事而會不協而盟是霸者法引之者時雖不同為有事而行會禮則同故引以為證云為壇於國外以命事者宫方三百步明在國外也言命事則上大行人云時會以發四方之禁禁即九伐是其事也云宫謂壝土以為牆處所謂為壇壝宫也者所謂掌舍但掘地為塹壝土為堳埒當牆處故云牆處也云天子春帥諸侯自此已下至國北皆覲禮文其為壇之語鄭加之耳云既拜禮而還加方明於壇上而祀焉所以教尊尊也者言教尊尊者天子親自拜日禮月之等是尊尊之法教諸侯以下尊敬在上者也引覲禮者是見為壇大小尺寸之法據時會諸侯為壇之法云王巡守殷國者謂巡守就方嶽為壇殷國就王國左右為壇皆如時會云如此與者約同之故云與以疑之先鄭引爾雅者見三成者三重重高一尺詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓注謂王既祀方明諸侯上介皆奉其君之旗置於宫乃詔王升壇諸侯皆就其旗而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者也土揖推手小下之也異姓昏姻也時揖平推手也衛將軍文子曰獨居思仁公言言義其聞詩也一日三復白圭之玷是南宫縚之行也夫子信其仁以為異姓故妻之也天揖推手小舉之音義復音服或芳服反玷丁簟反沈都念反縚吐刀反行下孟反疏釋曰詔告也謂諸侯各就位立王在壇亦立司儀乃告王降壇南向見諸侯乃揖之土揖庶姓已下先疏後親為次按隱十一年滕侯薛侯來朝爭長云周之宗盟異姓為後是先同姓今此先庶姓後同姓者此經直據揖之儀容從下至高不據盟之先後也注釋曰云謂王既祀方明諸侯上介皆奉其君之旗置於宫乃詔王升壇諸侯皆就其旗而立者案覲禮云諸侯覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上方明者木也方四尺設六色東方青南方赤西方白北方黑上玄下黃設六玉上圭下璧南方璋西方琥北方璜東方圭上介各奉其君之旗置於宫尚左公侯伯子男皆就其旗而立四傳擯天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明注引朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乘大路建大常十有二旒樊纓十有二就二車十有二乘帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以會同之禮見諸侯也若然覲禮上介奉君之旗置於宫尚左及公侯伯子男就其旗而立并四傳擯者並陳設其位其立當在祀方明後是以彼下文乃始云拜日之禮反祀方明之事故彼置旗於宫之下注云置於宫者建之豫為其君見王之位也是其未即立也此鄭注依次第而言故云謂王既祀方明諸侯上介皆奉其君之旗置於宫乃詔王升壇諸侯皆就其旗而立也云諸公中階之前至諸男門西北面東上皆明堂位周公朝諸侯之禮覲禮注亦引之證五等諸侯立位處所也皆以近王為上云王揖之者定其位也者此約燕禮云卿大夫皆入門右北面立公降階揖之卿得揖東廂西面大夫得揖中庭少進北面其位乃定此王揖亦得揖乃定有少别者彼諸侯揖臣臣皆北面得揖就位此五等立已在位王揖之逡巡而已位乃定是其别也凡揖皆摧手至於撎即引手為異也衛將軍文子者此大戴禮文引之證有異姓之事也案大戴禮文衛將軍文子問子貢曰蓋受教者七十有餘人聞之孰為賢子貢對之歷陳諸子行遂陳南宫縚之行此乃子貢之辭而云衛將軍文子曰者此實子貢辭篇名衛將軍文子故引篇名耳及其擯之各以其禮公於上等侯伯於中等子男於下等注謂執玉而前見於王也擯之各以其禮者謂擯公者五人侯伯四人子男三人也上等中等下等者謂所奠玉處也壇三成深四尺則一等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各於其等奠玉降拜升成拜明臣禮也既乃升堂授王玉音義見賢遍反疏釋曰此即上四傳擯之時也四傳擯彼注云公也侯也伯也各一位子男俠門而俱東上亦一位是子男共為位故共一擯也注釋曰下云將幣據三享故知此文擯之據執玉見王也云擯之各以其禮者謂擯公者五人侯伯四人子男三人也者大行人云公擯者五人已下此云擯之各以其禮是據擯為數不據餘禮也云上等中等下等者謂所奠玉處也者上云為壇三成此言三等明據三等壇奠玉處而言也云壇三成者據上文云深四尺者覲禮文云則一等一尺已下鄭君以意解之無正丈一等為一尺發地一尺上有三成為三尺總四尺也鄭注覲禮云從上向下為深故云深四尺云壇十有二尋者覲禮文云方九十六尺者尋八尺計之所得九十六尺云則堂上二丈四尺每等丈二尺與者並鄭以意解之故云與以疑之上二丈四尺為堂王立之處并祀方明之所云諸侯各於其等奠玉降拜升成拜明臣禮也者公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地及升成拜皆於奠玉之處必知有降拜升成拜者亦約燕禮臣得君酬酒皆降拜君使小臣辭之乃升成拜明此王禮亦然言成拜者鄉於下拜之時王使人辭下拜之不成故於升乃更成前拜故云成拜是敬上之禮故云明臣禮也云既乃升堂授王玉者禮法禮敵並授禮不敵者訝受此行臣禮則諸侯皆北面授之於堂上也王既受玉約聘禮亦當側授宰玉此壇上無坫不得取明堂位崇坫亢圭為義也其將幣亦如之其禮亦如之注將幣享也禮謂以鬱鬯祼之也皆於其等之上疏釋曰云將幣者即將幣三享一也但彼大行人據在廟此據在壇云亦如之者璧以帛琮以錦如前公於上等之類云其禮亦如之者即大行人上公再祼而酢亦如公於上等之類也王燕則諸侯毛注謂以須髮坐也朝事尊尊上爵燕則親親上齒鄭司農云謂老者在上也老者二毛故曰毛音義毛謂須髮也劉本作耄音毛疏注釋曰此燕則公三燕侯伯再燕子男一燕云朝事尊尊上爵者依爵尊卑為先後云燕則親親上齒者此乃不問爵之尊卑取以年齒為先後也凡諸公相為賔注謂相朝也疏注釋曰云相朝則是兩公自相朝故下經云諸侯諸伯諸子諸男相為賔客以禮相待並是兩諸侯相朝之事也主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送注賔所停止則積間闊則問行道則勞其禮皆使卿大夫致之從來至去數如此也三辭辭其以禮來於外也積問不言登受之於庭也鄭司農云旅讀為旅於泰山之旅謂九人傳辭相授於上下竟問賔從末上行介還受上傳之玄謂旅讀為鴻臚之臚臚陳之也賔之介九人使者七人皆陳擯位不傳辭也賔之上介出請使者則前對位皆當其末擯焉三揖謂庭中時也拜送送使者音義旅如字又音臚力於反傳直專反下除春秋傳皆同末上時掌反下上傳上車同疏注釋曰云賔所停止則積者謂遺人云十里有廬廬有飲食三十里有宿宿有委五十里有市市有積是也云間闊則問者上注問問不恙也云行道則勞者謂勞苦之云皆使卿大夫致之者彼聘禮遣卿行勞禮臣來尚遣卿勞明君來遣卿勞可知此再勞一勞在境一勞在遠郊皆使卿其近郊勞當主君親為之也其積問當使大夫故下文云致飧如致積之禮注云俱使大夫禮同也知致飧使大夫者見聘禮宰夫朝服設飧宰夫即大夫問亦小禮明亦使大夫也云從來至去數如此也者五積三問再勞來去皆有此數故云數如此也先鄭云旅讀為旅於泰山之旅謂九人傳辭相授於上下竟問賔從末上行介還受上傳之者此先鄭以為旅擯與交擯同之後鄭不從者此臣禮云旗擯下文云主君郊勞交擯三辭明其别旅直陳擯介不傳辭交則一往一來傳辭也云玄謂旅讀為鴻臚之臚臚陳之也者案爾雅釋詁云尸旅陳也釋言云豫臚敘也注云皆陳敘也後鄭不從旅泰山之旅從臚者欲取敘義也云賔之介九人者自從公介九人之禮云使者七人者自從降二等之禮云皆陳擯位不傳辭也賔之上介出請使者則前對位皆當其末擯焉者此皆約聘禮主君大門內迎聘賔之位也云三揖謂庭中時也者如聘禮入門揖當曲揖當碑揖是也主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜注主君郊勞備三勞而親之也鄭司農云交擯三辭謂賔主之擯者俱三辭也車逆主人以車迎賔於館也拜辱賔拜謝辱也玄謂交擯者各陳九介使傳辭也車迎拜辱者賔以主君親來乘車出舍門而迎之若欲遠就之然見之則下拜迎謝其自屈辱來也至去又出車若欲遠送然主君三還辭之乃再拜送之也車送迎之節各以其等則諸公九十步立當車軹也三辭重者先辭辭其以禮來於外後辭辭升堂疏釋曰此當近郊勞交擯三辭者主君至郊郊有館舍賔在內主君至館大門外主君北面而陳此九介去門九十步東面賔在大門內於門外之東亦陳九介西面不陳五擯者非主君從賔禮故也三辭者賔三辭主君以禮來於外車迎拜辱者傳辭既訖賔乘車出大門迎主君至主君處下車拜主君屈辱自至郊也三揖者入門及當曲當碑為三揖三辭者辭讓升堂拜受賔再拜乃受幣主君亦當拜送不言省文也車送者賔乘車出門就主君若欲遠送之三還者主君見賔送已三還辭之再拜者賔見主君辭遂再拜送主君也注釋曰云備三勞而親之也者大行人有三問三勞之文也主君身自勞是親之也先鄭云車逆主人以車迎賔於館也拜辱賔拜謝辱也後鄭不從者此直是備三勞既來至國何有輒迎賔於館乎玄謂各陳九介者以其在道俱不為主故無五擯之事故各陳九介也云立當車軹也者賔主俱立當軹大行人文云後辭辭升堂者案鄉飲酒禮主人取爵降洗賔降主人坐奠爵於階前辭注云事同曰讓事異曰辭禮升堂是事同不云讓而云辭者此賔主敵者主人之意欲有受於庭之心故從事異曰辭是以下諸公之臣等升堂皆云讓依事同曰讓非敵故聘義云三讓而後傳命三讓而後入廟門並事異不云辭者欲取致尊讓之意變文耳又彼記文非正經故不為例也致館亦如之注館舍也使大夫授之君又以禮親致焉疏釋曰凡云致者皆有幣以致之致之使若已有然也云亦如之者上主君郊勞此親致館明亦如之也注釋曰鄭知使大夫授舍者見聘禮云大夫帥至館卿致之以此知先遣大夫授館也此大夫亦應是卿致飧如致積之禮注俱使大夫禮同也飧食也小禮曰飧大禮曰饔餼音義飧素尊反下同疏注釋曰上公飧五牢賔始至之禮故致館後即言之云如致積之禮者積在道已致故云如之以其俱小禮不使卿故云俱使大夫禮同也云飧食也者以其有芻薪米禾食之類故云食也云小禮曰飧者聘禮使宰夫設飧禮物又少故曰小云大禮曰饔餼者以其有腥有牽芻薪米禾又多故曰大是以聘禮記云聘日致饔注云急歸大禮又以下文致饔餼亦在將幣後即致之也及將幣交擯三辭車逆拜辱賔車進答拜三揖三讓每門止一相及廟唯上相入賔三揖三讓登再拜授幣賔拜送幣每事如初賔亦如之及出車送三請三進再拜賔三還三辭告辟注鄭司農云交擯擯者交也賔車進答拜賔上車進主人乃答其拜也及出車送三請主人三請留賔也三進進隨賔也賔三還三辭告辟賔三還辭謝言已辟去也玄謂既三辭主君則乘車出大門而迎賔見之而下拜其辱賔車乃前下答拜也三揖者相去九十步揖之使前也至而三讓讓入門也相謂主君擯者及賔之介也謂之相者於外傳辭耳入門當以禮詔侑也介紹而傳命者君子於其所尊不敢質敬之至也每門止一相彌相親也君入門介拂闑大夫中棖與闑之間士介拂棖此為介鴈行相隨也止之者絶行在後耳賔三揖三讓讓升也登再拜授幣授當為受主人拜至且受玉也每事如初謂享及有言也賔當為儐謂以鬱鬯禮賔也上於下曰禮敵者曰儐禮器曰諸侯相朝灌用鬱鬯無籩豆之薦謂此朝禮畢儐賔也三請三進請賔就車也主君每一請車一進欲遠送之也三還三辭主君一請者賔亦一還一辭音義授依注音受賔亦依注音擯下賔使者同辟音避劉薄歷反注同下客辟三辟趨辟放此已辟音避侑音又闑魚列反棖直庚反行戶剛反疏釋曰及至也至將幣謂賔初至館後日行朝禮之時故云至將幣幣即圭璋也云交擯三辭車逆拜辱賔車進答拜者此並在主君大門外賔去門九十步而陳九介主君在大門內之東陳五擯上擯入受命出請事傳辭與承擯承擯傳與末擯末擯傳與末介末介傳與承介承介傳與上介上介傳與賔賔又傳與上介上介傳與承介承介傳與末介末介傳與末擯末擯傳與承擯承擯傳與上擯上擯入告君如是者三謂之交擯三辭諸交擯者例皆如此也車逆拜辱者傳辭既訖主君乘車出大門至賔所下車拜賔屈辱來此也賔車進答拜者賔初升車進就主君主君下賔亦下車答主君拜也三揖者主君遙揖賔使前北面三讓入大門也云每門止一相者既入門迥回面東至祖廟之時祖廟西仍有二廟以其諸侯五廟始祖廟在中兩廂各有二廟各别院為之則有二門門傍皆有南北隔牆隔牆皆通門故得有每門若不然從大門內即至祖廟之門何得有每門而云門止一相乎故為此解也云上相入者上相即上擯上介須詔禮故須入云三揖者亦謂入門揖當曲揖當碑揖也云三讓登者至階主君讓賔賔讓主君如是者三主君先升云再拜授幣者授當為受賔主俱升主人在阼階上北面拜乃就兩楹間南面賔亦就主君賔授玉主君受之故云再拜受幣也云賔拜送幣者賔既授乃退向西階上北面拜送幣乃降也注釋曰先鄭云賔車進答拜賔上車進主人乃答其拜也後鄭不從者車逆拜辱已是主人今云車進答拜當是客何得主人再度拜故不從也云及出車送三請主人三請留賔也後鄭亦不從者行朝享禮賔訖送賔出禮既有限何因更有留賔之事故不從也云介紹而傳命者此聘義文案彼介紹而傳命謂聘者旅擯法引證此交擯者但紹繼也謂介相繼而陳則交擯旅擯皆得為紹故此交擯亦得介紹而傳命也案彼注質謂正自相當賔主不敢正自相當故須擯介通情也云君入門介拂闑大夫中棖與闑之間士介拂棖者玉藻文君入門不言所拂者朝君入由闑西亦拂闑不言之者君特行不與介連類故不言也介拂闑者上介隨君後與大夫士介自為鴈行於後也云止之者絶行在後耳者知不全入而為絶行在後者以聘禮介皆入廟門門西北面西上故知此君介亦入門門西北面西上可知故云絶行在後後亦入廟也云登再拜授幣授當為受者欲見登再拜受玉者主君止得為受不得為授之義故也云拜至且受玉也者拜中含此二事故也云每事如初謂享及有言也者案聘禮享夫人下云若有言束帛如享禮是也云上於下曰禮敵者曰儐者大行人云王禮再祼而酢之屬是上於下曰禮此諸侯云儐是敵者曰儐也云禮器曰諸侯相朝灌用鬱鬯無籩豆之薦引之者證儐亦用鬱鬯也云主君一請賔亦一還一辭者則主君三請三進其賔三還三辭一一相將但别言之耳致饔餼還圭饗食致贈郊送皆如將幣之儀注此六禮者惟饗食速賔耳其餘主君親往親往者賔為主人主人為賔君如有故不親饗食則使大夫以酬幣侑幣致之鄭司農云還圭歸其玉也故公子重耳受飧反璧玄謂聘以圭璋禮也享以璧琮財也已聘而還圭璋輕財而重禮贈送以財既贈又送至於郊音義還音環又音旋食音嗣凡饗食皆同疏注釋曰知饗食速賔者案公食大夫禮君親食之君不親食則以侑幣致之聘禮云公於賔一食再饗上介一食一饗若不親食致之以侑幣致饗以酬幣以此知二者皆速賔也云其餘主君親往親往者賔為主人主人為賔者見聘禮云君使卿歸饔餼又云賔迎於外門外又云大夫東面致命君使卿還玉於館賔迎於外門外不拜帥大夫以入鄭君以此二者知賔為主人主人為賔致贈郊送亦然可知也聘禮乃君於臣此兩君敵明主君親為之矣先鄭云公子重耳事見僖公二十三年公子重耳反國及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮者曹其首也子盍蚤自二焉乃饋盤飧置璧焉公子受飧反璧是其事引之者證還圭之事但彼反璧者義取不貪寶意非還圭故後鄭不從也玄謂聘以圭璋禮也者聘義云以圭璋聘重禮也謂行聘禮也云享以璧琮財也者貢財貨時用璧琮以致之故云財也云已聘而還圭璋輕財而重禮者還圭璋是重禮璧琮不還是輕財也云贈送以財者聘禮賔遂行舍於郊公使卿贈如覿幣注云言如覿幣見為反報是贈并送至於郊賔之拜禮拜饔餼拜饗食注鄭司農云賔之拜禮者因言賔所當拜者之禮也所當拜者拜饔餼拜饗食玄謂賔將去就朝拜謝此三禮三禮禮之重者也賔既拜主君乃至館贈之去又送之於郊疏注釋曰先鄭所説是後鄭增成其義案聘禮饔餼燕羞俶獻之明日賔皆拜於朝將去又三拜乘禽於朝彼臣故盡拜謝此賔之拜禮在致贈郊送之下則不及燕羞俶獻乘禽以其君略小惠將去惟拜其大禮也案聘禮賔三拜乘禽於朝遂行舍於郊公使卿贈若然此致贈郊送在拜禮後今設文在前者欲取如將幣之儀故進文在前其贈送合在後也云賔既拜主君乃至館贈之去又送之於郊者鄭以贈送之文在前拜禮在後恐疑顛到故此解之是其次也賔繼主君皆如主國之禮注鄭司農云賔繼主君復主人之禮費也故曰皆如主國之禮玄謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭贈郊送之時也如其禮者謂玉帛皮馬也有饌陳之積者不如也若饗食主君及燕亦速焉音義費芳味反疏注釋曰先鄭云繼主君復主人之禮費也後鄭不從者主人禮費既多非賔所能復玄謂繼主君者儐主君也者案聘禮君遣卿勞及致館等皆儐儐者報也上注云敵者曰儐故此報主君為儐云儐之者主君郊勞致館饔餼還圭贈郊送之時也如其禮者謂玉帛皮馬也者案聘禮云賔至於近郊君使卿朝服用束帛勞又云賔用束錦儐勞者君使卿韋辨歸饔餼又云大夫奉束帛又云賔降授老幣出迎大夫注云出迎欲儐之庭實設馬乘賔降堂授老束錦賔奉幣西面大夫東面賔致幣是皆有儐法彼兩臣有儐此兩公有儐可知也若然彼聘禮致館無儐者彼君使卿致館不以幣故亦無儐明此兩君致時有幣合亦儐之也彼聘禮賔不見有饗食速主君者臣於君雖他國亦不敢速君故禮記云大夫饗君非禮是也此兩君即得其燕食等皆得速主君也主君有故不能親以侑幣酬幣致之亦無儐鄭彼注云以已本宜往還玉於館及還享雖無束帛文亦當儐之矣諸侯諸伯諸子諸男之相為賔也各以其禮相待也如諸公之儀注賔主相待之儀與諸公同也饔餼饗食之禮則有降殺音義殺色界反下豐殺則殺及後殺禮皆同疏注釋曰五等諸侯以命數分為三等其圭璋饔餼飧積步數儐介皆降殺備於大行人掌客其進退揖讓之儀一與公同故云如諸公之儀諸公之臣相為國客注謂相聘也疏釋曰謂上諸公之臣相聘往來為國客相待相送之儀此法皆備於下文也則三積皆三辭拜受注受者受之於庭也侯伯之臣不致積疏釋曰此謂在道之禮於路館致之亦有束帛致之云三辭拜受者辭不受三辭後受之故云三辭拜受也注釋曰云受者受之於庭也者上諸公即云登登謂登堂此不云登故知受於庭也知侯伯之臣不致積者案聘禮以五介又張旜是侯伯之卿聘使者經不云積明侯伯之臣不致積可知但不以束帛行禮致之豈於道全無積乎明有也及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賔使者如初之儀及退拜送注登聽命賔登堂也賔當為儐勞用束帛儐用束錦侯伯之臣受勞於庭疏釋曰案聘禮此亦近郊勞也旅擯不傳辭賔使各陳七介而已云三辭拜辱者賔從館內出於大門拜使者辱命來於外云三讓者讓升堂云登聽命者賔登堂聽使者傳主君之命也云下拜登受者賔聽命訖下堂拜命訖登堂受幣也云賔使者如初之儀者謂使傳命訖禮畢出門賔以束帛賔使者如初行勞時之儀前賔受幣今使者受幣受幣雖異威儀則同敬主君使者也知勞用束帛儐用束錦者約聘禮郊勞知之知侯伯之臣受勞於庭者亦案聘禮賔是侯伯之臣云受於舍門內是不登堂也致館如初之儀注如郊勞也不儐耳侯伯之臣致館於庭不言致飧者君於聘大夫不致飧也聘禮曰飧不致賔不拜疏注釋曰案聘禮賔至使大夫帥至館卿致館此公之臣亦當然上云郊勞此云如初如初郊勞也鄭知不儐者聘禮致館無束帛賔亦無儐知此亦然也云侯伯之臣致館於庭者亦案聘禮知之云君於聘大夫不致飧也引聘禮飧不致賔不拜者案聘禮致館之下即云宰夫設飧即此致館下不云致飧故云君於聘大夫不致飧如是五等之臣皆無致飧也及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀注客辟逡巡不答拜也惟君相入客臣也相不入矣拜主君拜客至也客三辟三退負序也每事享及有言音義逡七旬反疏釋曰及至也謂賔在館至將幣將幣亦謂圭璋也云旅擯三辭者亦謂於主君大門外主君陳五擯客陳七介不傳辭故云旅擯也云三辭者前郊勞三辭辭其以禮來於外此三辭辭其主君以大客禮當已云拜逆客辟者謂三辭訖主君遣上擯納賔賔入大門主君在大門內南面拜拜賔奉君命屈辱來見已客辟不受拜者使者奉君命來不敢當拜故逡巡辟君拜也云三揖者亦揖之使前云每門止一相者謂彌相親也云及廟惟君相入者與前諸公少異彼是兩君故云惟上相入則兩君擯介各有上相亦不入故據君而言也云三讓客登者按聘義云三讓而後入廟門三揖而後至階此不言者文不具客登者主君與客俱登據客而言故云客登也云拜客三辟者主君與客俱登訖主君於阼階上北面拜拜賔喜至此堂并拜受幣云客三辟者三退負序不敢當君拜云授幣者授玉與主君也注釋曰云客辟逡巡不答拜也者釋上拜逆客辟也云客三辟三退負序也者按聘禮云賔三退負序注云三退三逡巡也不言辟者以執圭將進授之此亦執圭將授言辟者儀禮是委曲行事故云執圭將進不得云辟此周禮事未見據大總而言故云辟無嫌三退負序聘禮文云每事享及有言者亦約聘禮知之及禮私面私獻皆再拜稽首君答拜注禮以醴禮客私面私覿也既覿則或有私獻者鄭司農説私面以春秋傳曰楚公子棄疾見鄭伯以其乘馬私面疏釋曰此三者皆於聘日行之故并言之云君答拜者雖見異國之臣當空首拜也注釋曰知禮以醴禮客者按聘禮禮客用醴齊異於君鬱鬯也云私面私覿也者按聘禮賔奉束錦請覿又云問卿訖賔面如覿幣注云面亦見也其謂之面威儀質也彼不見有私獻又於君謂之覿於卿謂之面覿面别此云私面私覿為一者以彼文兩見則私覿據君私面據卿此文不見有私覿直言私面豈不見君直見臣也明此私面主於君故以私面為私覿也彼無私獻非常故彼記云既覿賔若私獻奉獻將命故此注云既覿則或有私獻者也云春秋者按左氏昭六年楚公子棄疾如晉過鄭見鄭伯如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子大叔以馬二匹稱面者以其面亦覿也且過鄭非正聘故以面言之出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟注中門之外即大門之內也問君曰君不恙乎對曰使臣之來寡君命臣於庭問大夫曰二三子不恙乎對曰寡君命使臣於庭二三子皆在勞客曰道路悠遠客甚勞勞介則曰二三子甚勞問君客再拜對者為敬慎也音義客甚勞如字下甚勞勞辱同疏注釋曰賔來主為以君命行聘享是以先行聘享訖乃始行私相慰問之事是以聘禮注云卿以公禮將事無由問也云中門之外即大門之內也者聘禮云及大門內公問君故指彼云即大門內也案聘禮云及大門內公問君賔對公再拜注云賔至始入門之位北面將揖而出衆介亦在其右少退西上於此可以問君居處何如序殷勤也時承擯紹擯亦於門東北面東上上擯往來傳君命南面云問君曰已下未知鄭君所出何文或云是孔子聘問之辭亦未得其實也爾雅云恙憂也致饔餼如勞之禮饗食還圭如將幣之儀注饗食亦謂君不親而使大夫以幣致之疏釋曰云致饔餼如勞之禮者同使卿威儀進止皆如上郊勞之禮還以本圭故云如也注釋曰知饗食是君不親者以其與還圭共文同是致之故知君不親使大夫致之也致饗及還玉賔主皆是大夫其將幣主君與使臣行禮如將幣者蓋不盡如之所如者如旅擯主人皮辨賔皮辨襲將幣同自餘則别是以聘禮君使卿皮辨還玉於館賔皮辨襲迎於外門外不拜帥大夫以入大夫升自西階鉤楹賔自碑內聽命升自西階自左南面受圭退負右房而立是與將幣别之事也君館客客辟介受命遂送客從拜辱於朝注君館客者客將去就省之盡殷勤也遂送君拜以送客音義從本亦作從同才用反疏釋曰案聘禮云公館賔賔辟注云言辟者君在廟門敬也又云上介聽命注云聽命於廟門中西面如相拜然也然則此中行事亦爾鄭知君拜送者見聘禮云聘享夫人之聘享問大夫送賔公皆再拜是其有拜此云客從拜辱於朝者聘禮曰公退賔從請命於朝公辭賔退是也明日客拜禮賜遂行如入之積注禮賜謂乘禽君之加惠也如入之積則三積從來至去音義乘繩證反下乘皮同疏注釋曰案聘禮云館賔下云賔三拜乘禽於朝以此知禮賜是乘禽也云遂行如入之積鄭云如入之積則三積從來至去者入與出各三積故得以後如前以此而言諸侯言出入五積四積三積之類入出各五各四各三者也凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之注爵卿也大夫也士也疏注釋曰諸侯之臣言爵相為客而相禮者不離三等卿大夫士鄭注掌客云爵卿也則飧二牢饔餼五牢大夫也則飧大牢饔餼三牢士也則飧少牢饔餼大牢也此降小禮豐大禮也以命數則參差難等略於臣用爵而已以此三等相禮也云其儀亦如之者亦以三等相差七十步七介五十步五介三十步三介小聘使大夫又降殺也凡四方之賔客禮儀辭命餼牢賜獻以二等從其爵而上下之注上下猶豐殺也音義上時掌反疏釋曰上經云爵鄭以卿大夫士三等解之此經云二等即與大行人云諸侯之卿各下其君二等大夫士亦如之大夫下卿士下大夫降殺以兩解之同也云從其爵者以三等降殺從三等而為之云上下猶豐殺也者爵尊者禮豐爵卑者禮殺以二等為豐殺也凡賔客送逆同禮注謂郊勞郊送之屬疏注釋曰經云送逆故知郊勞郊送也郊勞是逆郊送是送尊卑不同此二者一也凡諸侯之交各稱其邦而為之幣以其幣為之禮注幣享幣也於大國則豐於小國則殺主國禮之如其豐殺謂賄用束紡禮用玉帛乘皮及贈之屬音義稱尺證反紡芳往反疏釋曰此一經惟論享幣多少及主國報禮輕重之事言交者兩國一往一來謂之交言各稱其邦而為之幣者據朝聘所齎享幣大國多小國少云以其幣為之禮者據主國賄客還依來者多少而報之注釋曰鄭知幣是享幣者以其經云稱其邦復云幣明幣是享幣不得據圭璋璧琮也知是賄用束紡禮用玉帛乘皮及贈之屬者案聘禮還玉之下云賔裼迎大夫賄用束紡注云所以遺聘君可以為衣服又云禮玉束帛乘皮注云禮禮聘君也所以報享也又云遂行舍於郊公使卿贈如覿幣記云賄在聘為賄是其豐殺多少者也凡行人之儀不朝不夕不正其主面亦不背客注謂擯相傳辭時也不正東鄉不正西鄉常視賔主之前却得兩鄉之而已音義朝如字又直遙反背音佩鄉許亮反下同疏注釋曰此經論司儀謂擯相之法朝謂日出時為正鄉東夕謂日入時為正鄉西云不正其主面則亦不背客故鄭云常視賔主之前却得兩鄉之而已言此者正謂司儀隨機旋轉不常厥處者也行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達注傳遽若今時乘傳騎驛而使者也美福慶也惡喪荒也此事之小者無禮行夫主使之道有難謂遭疾病他故不以時至也必達王命不可廢也其大者有禮大小行人使之有故則介傳命不嫌不達音義傳張戀反注同遽其庶反使色吏反注及下同難乃旦反注同傳直宣反象胥職同疏釋曰行夫者以身自行於外言媺惡無禮者無擯介而單行謂之無禮也云必以旌節者道路用旌節故也云雖道有難而不時者無難者即依程至祗由有難故不時云必達者雖不時必達於所往之處也注釋曰云美福慶也者謂諸侯國有生男及嫁娶等云惡喪荒也者謂民有死喪及年榖不孰若諸侯薨之等大事即使卿大夫若春秋王使榮叔宰咺之等有禮不使行夫也云他故者謂賊冦及水旱之等云必達王命不可廢也者以其行夫下士三十二人以人數多縱有難必達也云其大者有禮大小行人使之者案大行人雖不云身使之事其間問及王之所以撫諸侯之等或身自行小行人云使適四方是身行之事也居於其國則掌行人之勞辱事焉使則介之注使謂大小行人也故書曰夷使鄭司農云夷使使於四夷則行夫主為之介玄謂夷發聲音義焉劉音夷疏注釋曰先鄭以夷使使於四夷後鄭不從以為夷發聲者以經云居則掌行人之勞辱事是行人所使即云介明還與行人為介文勢不容與行人别行直四夷使自使象胥何得使行夫也故不從之也環人掌送逆邦國之通賔客以路節達諸四方注通賔客以常事往來者也路節旌節也四方圻上疏釋曰此環人與夏官環字雖同義則異彼環人主致師此環人主環繞賔客使不失脫是其異也注釋曰云通賔客以常事往來者也者謂朝覲會同者也云路節旌節也者以其道路用旌節故知路節旌節也云四方圻上者至畿即入諸侯國諸侯國自有通之者也舍則授館令聚柝有任器則令環之注令令野廬氏也鄭司農云四方人有任器者則環人主令殉環守之音義殉徐音循或辭俊反疏釋曰館則道上廬宿市所館舍任器謂賔客任用之器注釋曰令令野廬氏也者其職云若有賔客則令守塗地之人聚柝之故知令野廬也凡門關無幾送逆及疆注鄭司農云門關不得苛留環人也玄謂環人送逆之則賔客出入不見幾音義疆居良反苛音何又呼何反疏注釋曰先鄭云門關不得苛留環人也者以環人乃是執節之人自不畏門關苛留故後鄭以為環人送逆之則門關不得苛留賔客象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之注謂蕃國之臣來俯聘者音義閩亡巾反又音文貉亡百反使所吏反疏注釋曰蕃國之君世一見其臣得有俯聘者彼雖無聘使法有國事來小行人受其幣聽其辭以中國俯聘況之耳其實無俯聘也若以時入賔則協其禮與其辭言傳之注以時入賔謂其君以世一見來朝為賔者音義見賢遍反疏釋曰云協其禮者夷狄之君以不能行中國禮及其行朝聘亦當以禮和合之使得其所也云與其辭言傳之者但夷狄之君亦是中國卿大夫有罪使任於彼計應言辭可知今言協其辭言傳之者謂君外之衆須譯語者也凡其出入送逆之禮節幣帛辭令而賔相之注從來至去皆為擯而相侑其禮儀音義賔音儐下同相息亮反下同疏釋曰夷狄無玉帛來向中國而云幣帛者謂王有賜與之禮也凡國之大喪詔相國客之禮儀而正其位注客謂諸侯使臣來弔者疏釋曰大喪言凡則非王喪若王喪諸侯皆來何得有使臣來諸侯既絶無來者則大喪王后世子也或大喪王喪不言諸侯者餘官掌之此象胥直掌臣也又象胥本主夷狄之使亦兼掌中國之使故下有大事諸侯之等也凡軍旅會同受國客幣而賔禮之注謂諸侯以王有軍旅之事使臣奉幣來問疏注釋曰言諸侯以王有軍旅之事使臣奉幣帛來問者正謂禮動不虛以為相見之禮以幣致其君命非謂别有幣也凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子注作使也鄭司農云王之大事諸侯使諸侯執大事也次事卿使卿執其次事也次事使大夫次事使上士下事使庶子疏釋曰直言上士不言中士下士者總以王之三等之士皆曰上士與王制所云元士同也云庶子者謂若宫伯所云士庶子之等直云庶子兼適子在其中也掌客掌四方賔客之牢禮餼獻飲食之等數與其政治注政治邦新殺禮之屬音義治直吏反注同疏注釋曰此經與下文為總目其事並在下文云政治邦新殺禮之屬者下文云新國則殺禮殺禮類多故云之屬以通之王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻注饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫敵用也諸侯長九命作伯者也獻公侯以下如其命數音義長丁丈反注同敵丁歷反疏注釋曰云王禮之數者則十二牢是故哀七年吳來徴百牢魯使子服景伯對曰周之王也制禮上物不過十二以為天之大數也王公以九為節則十二者是王禮之數也云以公侯伯子男盡在是兼饗之者以經云合則時會殷同是盡在於是兼饗故用十二牢也云莫敵用也者若單饗一國即有賔主之敵則單用大牢今兼饗諸侯無二相敵故云莫敵用也若曲禮云大饗不問卜鄭云莫適卜也彼亦非一帝總饗五帝莫適卜也云諸侯長九命作伯者也者大宗伯云九命作伯注云上公有功德者加命為二伯云獻公侯以下如其命數者大行人云上公饗禮九獻侯伯七獻子男五獻是也王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公視上公之禮卿視侯伯之禮大夫視子男之禮士視諸侯之卿禮庶子一視其大夫之禮注國君者王所過之國君也犢繭栗之犢也以膳天子貴誠也牲孕天子不食也祭帝不用也凡賔客則皆角尺令者掌客令主國也百牲皆具言無有不具備音義從才用反下注從賔同繭古典反疏釋曰王巡守則殷同殷同則殷國也王巡守至於四嶽之下當方諸侯或所在經過或至方嶽之下若殷國或在王城出畿外在諸侯之國所在之處皆設禮待王故巡守殷國並言也云則國君膳以牲犢者膳亦謂殷膳時也云令百官百牲皆具者此文與下為目百官即三公已下是也云三公視上公之禮云云者明上公已下及侯伯子男禮備於大行人及掌客諸侯之卿及諸侯大夫禮亦備於聘禮及公食大夫也注釋曰云國君者王所過之國君也者鄭偏舉一邊而言所在亦須共待云犢繭栗之犢也者王制云天地之牛角繭栗郊特牲云天子適諸侯諸侯膳用犢謂殷膳時特與祭天之牲同用犢則天子繭栗可知也云以膳天子貴誠也牲孕天子不食也祭帝不用也者皆郊特牲文言此者見天子牲與天同貴誠慤故用繭栗也云凡賔客則皆角尺者亦王制文云令者掌客令主國也者以其掌客掌諸侯已下牢禮故知掌客令也凡諸侯之禮上公五積皆視飧牽三問皆修羣介行人宰史皆有牢飧五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飧之陳牽四牢米百有二十筥醯醢百有二十甕皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飧饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆視飧牽再問皆修飧四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飧之陳牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飧饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八邊膳大牢致饔大牢卿皆見以羔膳特牛子男三積皆抵飧牽一問以修飧三牢食二十有四簠六豆三十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飧之陳牽二牢米八十筥醯醢八十甕皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有飧饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛注積皆視飧牽謂所共如飧而牽牲以往不殺也不殺則無鉶鼎簠簋之實其米實於筐豆實實於甕其設筐陳於楹內甕陳於楹外牢陳於門西車米禾芻薪陳於門外壺之有無未聞三問皆修修脯也上公三問皆修下句云羣介行人宰史皆有牢君用修而臣有牢非禮也蓋著脫字失處且誤耳飧客始至致小禮也公侯伯子男飧皆飪一牢其餘牢則腥食者其庶羞美可食者也其設蓋陳於楹外東西不過四列簠稻粱器也公十簠堂上六西夾東夾各二也侯伯八簠堂上四西夾東夾各二子男六簠堂上二西夾東夾各二豆菹醢器也公四十豆堂上十六西夾東夾各十二侯伯三十二豆堂上十二西夾東夾各十子男二十四豆堂上十二西夾東夾各六禮器曰天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六以聘禮差之則堂上之數與此同鉶羮器也公鉶四十二侯伯二十八子男十八非衰差也二十八書或為二十四亦非也其於衰公又當三十於言又為無施禮之大數鉶少於豆推其衰公鉶四十二宜為三十八蓋近之矣則公鉶堂上十八西夾東夾各十侯伯堂上十二西夾東夾各八子男堂上十西夾東夾各四壺酒器也其設於堂夾如豆之數鼎牲器也簋黍稷器也鼎十有二者飪一牢正鼎九與陪鼎三皆設於西階前簋十二者堂上八西夾東夾各二合言鼎簋者牲與黍稷俱食之主也牲當為腥聲之誤也腥謂腥鼎也於侯伯云腥二十有七其故腥字也諸侯禮盛腥鼎有鮮魚鮮臘每牢皆九為列設於阼階前公腥鼎三十六腥四牢也侯伯腥鼎二十七腥三牢也子男腥鼎十八腥二牢也皆陳陳列也飧門內之實備於是矣亦有車米禾芻薪公飧五牢米二十車禾三十車侯伯四牢米禾皆二十車子男三牢米十車禾二十車芻薪皆倍其禾饔餼既相見致大禮也大老既兼飱積有生有腥有孰餘又多也死牢如飱之陳亦飪一牢在西餘腥在東也牽生牢也陳于門西如積也米橫陳於中庭十為列每筥半斛公侯伯子男黍粱稻皆二行公稷六行侯伯稷四行子男二行醯醢夾碑從陳亦十為列醯在碑東醢在碑西皆陳於門內者於公門內之陳也言車者衍字耳車米載米之車也聘禮曰十斗曰斛十六斗曰籔十籔曰秉每車秉有五籔則二十四斛也禾稿實并刈者也聘禮曰四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也稯猶束也米禾之秉筥字同數異禾之秉手把耳筥讀為棟梠之梠謂一穧也皆陳橫陳門外者也米在門東禾在門西芻薪雖取數於禾薪從米芻從禾也乘禽乘行羣處之禽謂雉鴈之屬於禮以雙為數殷中也中又致膳示念賔也若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之凡介行人宰史衆臣從賔者也行人主禮宰主具史主書皆有飧饔餼尊其君以及臣也以其爵等為之牢禮之陳數爵卿也則飧二牢饔餼五牢大夫也則飧大牢饔餼三牢士也則飧少牢饔餼大牢也此降小禮豐大禮也以命數則參差難等略於臣用爵而已夫人致禮助君飬賔也籩豆陳於户東壺陳於東序凡夫人之禮皆使下大夫致之於子男云膳視致饗言夫人致膳於小國君以致饗之禮則是不復饗也饗有壺酒卿皆見者見於賔也既見之又膳之亦所以助君飬賔也卿見又膳此聘禮卿大夫勞賔餼賔之類與於子男云親見卿皆膳特牛見讀如卿皆見之見言卿於小國之君有不故造館見者故造館見者乃致膳鄭司農説牽云牲可牽行者也故春秋傳曰餼牽竭矣秅讀為秅秭麻答之秅音義鉶音刑牲三十依注牲音星下牲十有八受牲禮同筥薑吕反甕烏弄反籔素口反劉色縷反秅丁故反或丈加反乘繩證反下及注同食音嗣下食大牢再食一食注不食同見賢遍反注下除相見見讀皆同飪而甚反夾古洽反劉古協反下同衰初危反下同差初佳反又初宜反陪音裴行戶剛反下六行四行二行皆同從子容反稿古老反并必政反又必盈反總本又作緵子工反李又音總把必馬反梠音吕穧才計反參初林反差初宜反復扶又反勞老報反造七報反秭徐音姊劉祖禮反疏注釋曰云凡諸侯之禮者此一句與下為總目也此一經並是諸侯自相朝主國待賔之禮若然天子掌客不見天子待諸侯之禮而見諸侯自相待者天子掌客自掌天子禮則諸侯相待之禮無由得見今以天子之官輒見諸侯自相待以外包內天子待諸侯亦同諸侯自相待可知是以見諸侯相待之法也云上公五積皆視飧牽者公國自相朝是上公待上公之禮有五積皆視飧一積視一飧飧五牢五積則二十五牢言牽者數雖視飧飧則殺積全不殺並生致之故云牽侯伯四積皆視飧牽食四牢一積視一飧則一積四牢總十六牢亦牽不殺子男三積積亦視飧飧三牢一積三牢三積九牢亦牽之不殺也必牽之不殺者以其在道分置豫往故不殺之容至自殺也既云視飧飧則有芻薪米禾之等故鄭解積皆依飧解之也云不殺則無鉶鼎者鉶鼎即陪鼎是也但殺乃有鉶鼎不殺則無鉶鼎可知侯伯子男皆然鄭云簠簋之實已下皆約公食大夫親食則有簠簋之實已下皆飪在俎若不親食使大夫各以其爵朝服以侑幣致之則生往今積既不殺與公食生致同故鄭皆約公食大夫解之也云其設筐陳於楹內者彼云簋實實於筐陳於楹內兩楹間二以並南陳云甕陳於楹外者彼云豆實實於甕陳於楹外二以並北陳云牢陳於門西者彼云牛羊豕陳於門內西方東上是鄭皆依公食大夫之文也云車米禾芻薪陳於門外者此約聘禮致饔餼之文彼云米三十車設於門東為三列東陳禾三十車設於門西西陳薪芻倍禾注云薪從米芻從禾是其事也侯伯子男積之簠豆菜禾薪芻等陳列亦與此同也云壺之有無未聞者以其酒不可生致故云未聞云三問皆修羣介行人宰史皆有牢者鄭云三問皆修修脯也對文修是段修加薑桂捶之者脯乾肉薄者散文修脯一也云上公三問皆修下句云羣介行人宰史皆有牢君用修而臣有牢非禮也者言非禮者君尊用修臣卑用牢故云非禮云蓋著脫字失處案下文凡介行人宰史皆在饗食燕下此特在上有人見下文脫此語錯差著於此更有人於下著訖此剩不去故云蓋著脫字失處也云且誤耳者下文皆云凡介此云羣介故云且誤耳云飧客始至致小禮也者案賔聘大夫帥至館卿致館即云宰夫朝服設飧是其客始至之禮言小禮者對饔餼為大禮也云公侯伯子男飧皆飪一牢其餘牢則腥者鄭言此者下惟言腥不言飪此有鉶及鼎皆為飪一牢而言以是經雖不言飪須言飪之矣云其餘牢則腥腥之數備於下也云食者其庶羞美可食者也其設蓋陳於楹外東西不過四列者前所陳皆約公食大夫致食之禮今案公食若不親食庶羞陳於碑內者設飧之時堂上皆有正饌無容庶羞之處楹外既空不須向碑內及堂下故疑在楹外陳之十以為列故四列也公食陳於碑內者由饔陳於楹外故在下也必知為四列見公食云庶羞東西不過四列故知也云簠稻粱器也者見公食大夫簠盛稻粱云公十簠堂上六西夾東夾各二也侯伯八簠堂上四西夾東夾各二子男六簠堂上二西夾東夾各二鄭知此者見聘禮致饔餼堂上二簠東西各二簠今此公十侯伯八子男六禮之陳列堂上之數與東西夾之數不多則等鄭遂以意裁之五等東西夾各二以外置於堂上故云公六侯伯四子男二也聘禮設飧鄭約致饔餼今亦約致饔餼也但聘禮設飧云西夾六無東夾之饌者蓋降於君禮故也云豆菹醢器也者見公食大夫及特牲少牢豆皆以豆盛菹醢故知也云公四十豆堂上十六至各六鄭以堂上豆數取聘禮致饔餼於上大夫八豆下大夫六豆並是堂上豆數又取禮器天子之豆二十有六諸公十有六諸侯十有二謂侯伯子男同則亦是堂上豆數可知以此文公言四十明十六在堂上餘二十四豆分之於東西夾此侯伯言三十二亦以十二為堂上豆數餘二十分於東西夾各十此子男云二十四以十二為堂上豆數其餘十二分為東西夾各六其堂上豆數既約聘禮與禮器東西多少鄭以意差之可知故云以聘禮差之則堂上豆數與此同也云鉶羮器也者鉶器名鉶器所以盛膷臐膮三等之羮故為鉶羮云公鉶四十二侯伯二十八子男十八非衰差也者衰差之法上下節級似若九若七若五校一節是衰差今公四十二侯伯二十八子男十八公於侯伯子男大縣絶故云非衰差也云二十八書或為二十四亦非也者侯伯若二十四為比公四十二校十八又以二十四比子男十八校六亦非其類故云亦非也云其于衰公又當三十於言又為無施者為三十亦非衰法以其無所倚就故云無所施也云禮之大數鉶少於豆者案侯伯豆三十二鉶二十八子男豆二十四鉶十八是鉶少豆多公食大夫豆六鉶四是其鉶少於豆也云推其衰公鉶四十二宜為三十八蓋近之矣者子男十八侯伯二十八公三十八以十為降殺是其衰也言蓋者無正文故疑而生蓋也云公鉶堂上十八西夾東夾各十侯伯堂上十二西夾東夾各八子男堂上十西夾東夾各四知如此差者亦約聘禮致饔餼兼以意準量而言云壺酒器也者司尊彜有兩壺尊春秋傳云尊以魯壺皆以壺為酒尊也此所設亦約聘禮但彼堂上八壺東西夾各六壺此壺與豆數同四十故云其設於堂夾如豆之數也云鼎牲器者謂烹牲體之器云簋黍稷器也者鼎十有二者飪一牢正鼎九與陪鼎三皆設於西階前者其陪鼎三設於內廉云簋十二者堂上八西夾東夾各二知設如此者約聘禮而知之也牢鼎九者謂牛羊豕魚臘膚與腸胃鮮魚鮮臘陪鼎三者膷臐膮也云合言鼎簋者牲與黍稷俱食之主也者黍稷與衆饌為主牲與羞物為主是俱得為食之主也此五等諸侯同簋十二案聘禮致饔餼堂上八簋東西夾各六簋總二十簋彼臣多此君少者禮有損之而益故也云牲當為腥聲之誤也腥謂腥鼎也於侯伯云腥二十有七其故腥字也者子男亦云牲十八是亦當為腥聲之誤也云諸侯禮盛腥鼎有鮮魚鮮臘每牢皆九為列設於阼階前者此皆約聘禮設飧而言案彼飪一牢在西鼎九羞鼎三腥一牢在東鼎七致饔餼云腥二牢鼎二七無鮮魚鮮臘設於阼階前西面南陳如飪二列此云三十六故知有鮮魚鮮臘也云飧門內之實備於是矣者鄭言此者欲見門內既備仍有車米之等也是以云亦有車米禾芻薪也云公飧五牢米二十車禾三十車已下皆約饔餼死牢而言以其饔餼云死牢如飧之陳上公五牢死侯伯四牢死子男三牢死皆如飧之陳明此米禾數如此云芻薪皆倍其禾者亦約饔餼禮也若然案聘禮米禾皆二十車者彼大夫禮豐小禮大夫飧二牢故米禾皆視之米禾各二十車也云饔餼既相見致大禮也者知既相見所致者案聘禮記云聘日致饔鄭云急歸大禮是既相見致大禮也云大者既兼飧積有生有腥有孰餘又多也者假令上公饔餼九牢五牢死四牢牽上公五積皆視飧牽則是一積五牢言兼飧死五牢與飧同言兼積則兼不盡止兼四耳知兼積者以其牽與積同故云兼之也侯伯子男皆兼積不盡言餘又多者謂米禾芻薪醯醢芻米之屬云死牢如飧之陳亦飪一牢在西餘腥在東也者約聘禮知之也云牽生牢也陳於門西如積者亦橫陳於門西而東上云米橫陳於中庭十為列每筥半斛知然者前飧之陳及積之陳皆約聘禮致饔餼法今於此文積在前已説故以此饔餼向前如之故云如積也言如積則亦如聘禮饔餼也今此自米已下還約聘禮致饔餼法云公侯伯子男黍粱稻皆二行公稷六行侯伯稷四行子男稷二行者彼云米百筥筥半斛設於中庭十以為列北上黍粱稻皆二行稷四行此以增稷餘不增故知公稷六行子男米八筥黍稷稻各二行更得二即足故知稷二行云醯醢夾碑從陳亦十為列醯在碑東醢在碑西者彼注云夾碑在庭之中央也醯在東醯榖陽也醢在西醢肉隂也言夾碑故知從陳然侯伯醯醢百甕米百筥上介筥及甕如上賔上介四人米百筥此數多於子男與侯伯等者上公醯醢百二十甕與王舉百二十甕同故鄭志云此公乃二王後如是王之上公與侯伯俱同百甕子男八十甕其筥米皆同甕數此是尊卑之差至於聘禮乃是臣法自為一禮不相與亦是損之而益云於公門內之陳也言車衍字耳者言車載米之車不合在醯醢下言之又案侯伯子男醯醢下皆無車字故知衍字也云車米載米之車也聘禮曰十斗曰斛十六斗曰籔十籔曰秉每車秉有五籔則二十四斛也禾稿實并刈者也者聘禮記文云筥讀為棟梠之梠謂一穧也者時有棟梠之言故讀從之亦曰一穧穧即詩云此有不斂穧穧即鋪也云皆橫陳門外者也米在門東禾在門西者皆約聘禮致饔餼法云芻薪雖取數於禾已下鄭以義言也云乘禽乘行羣處之禽謂雉鴈之屬者此禽謂兩足而羽者不兼四足而毛故云雉鴈以其兼有雞鶩之等故云之屬是以大宗伯以禽作六摰有雉鴈雞鶩之等也云於禮以雙為數者即此九十五十及士中日則二雙皆以雙為數是也云殷中也中又致膳示念賔也者此為牢禮之外見賔中間未去恐賔慮主人有倦更致此爵所以示念賔之意無倦也云若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之者此皆約聘禮文不言致燕者饗食在廟在寢禮惟言致饗食者以合在廟嚴凝之事不親即須致之燕禮褻不親酌蓋不致也云凡介行人宰史行人主禮宰主具史主書者案王制云大史典禮執簡記大史職亦云執其禮事與此史主書行人主禮違者大史在國則專主書故曲禮云史載筆士載言此云史止謂大史之屬官以其有爵等故知也云行人主禮者主賔客之禮大行人之類是掌賔禮也案聘禮云史讀書宰執書告備具於君又掌饌具故公食大夫云宰夫具饌於房是掌具也云爵卿也則飧二牢饔餼五牢已下皆約聘禮賔之卿上介之大夫士介四人歸饔餼降殺而言也云此降小禮豐大禮也者小禮謂飧飧則去君遠矣并乘禽之等皆是小禮也大禮謂饔餼卿五牢子男卿與君等是豐大禮也云以命數則參差難等略於臣用爵而已者依命公侯伯卿三命大夫再命士一命子男卿再命大夫一命士不命并有大國孤一人四命是從孤已下通一命不命有五等若以此命數五等為之則參差難可等級略於臣用爵而已爵則有三等易為等級也言略於臣用爵則若不依爵而用命即諸侯爵五等命帷三等大行人掌客皆依命是也云夫人致禮助君飬賔也籩豆陳於戶東壺陳於東序至下大夫致之知義然者見聘禮夫人使下大夫韋辨歸禮堂上籩豆設於户東西上二以並東陳注設於户東辟饌位壺設於東序北上南陳醙黍清皆兩壺約此故知之也若然不使卿者案內宰云致后之賔客之禮注云謂諸侯來朝覲及女賔之賔客內宰是下大夫王后尚使下大夫况諸侯夫人乎故知使下大夫也云於子男云膳視致饗言夫人致膳於小國君以致饗之禮則是不復饗也饗有壺酒者公侯伯夫人致禮則云八壺八豆八籩與膳大牢致饗大牢三者各别彼子男夫人則云視膳致饗鄭云饗有壺酒則致膳無酒矣故云饗有酒若然子男夫人於諸侯惟有二禮矣聘禮夫人於聘大夫直有籩豆壺又不致饗是其差也云卿皆見者見於賔也既見之又膳之亦所以助君養賔也者言亦者亦大夫也云卿見又膳此聘禮大夫勞賔餼賔之類與者案聘禮聘畢賔即館卿大夫勞賔賔不見大夫奠鴈再拜上介受注云不言卿卿與大夫同執鴈下見於國君周禮凡諸侯之卿見朝君皆執羔勞上介亦如之又云餼賔大牢米八筐上介亦如之此朝君有膳無勞餼聘客有勞餼無膳明此事相當故云勞賔餼賔之類與約同之故云與以疑之云於子男云親見卿皆膳特牛見讀如卿皆見之見者上公侯伯直云卿皆見以羔於子男即云親見卿作文有異此言親見卿似朝君親自來見卿有此嫌故讀從上文卿皆見以兼之明此見亦是見朝君三卿之內有見者不見者若故造館見則致膳若不故造館見則不致膳是以鄭云言卿於小國之君有不故造館見者故造館見者乃致膳也先鄭説牽云牲可牽行者也故春秋傳曰餼牽竭矣者案僖三十二年左氏傳云把子自鄭告於秦曰鄭人使我掌其北門之管若潛師以來國可得也秦師將至鄭鄭人知之使皇武子辭焉曰吾子淹久於弊邑惟是脯資餼牽竭矣注餼死牢牽生牢引之證牽亦生牢未殺者也云秅讀為秅秭麻答之秅者時有秅秭麻答之言故讀從之秅是束之總名如詩云萬億及秭秭亦數之總號答是鋪名刈麻者數把共為一鋪言此者見秅為束之總號之意也凡諸侯之卿大夫士為國客則如其介之禮以待之注言其特來聘問待之禮如其為介時也然則聘禮所以禮賔是亦禮介疏注釋曰前文云凡介行人宰史是從君之法今言此者見不從君而特來聘問者亦有三等之爵爵卿也爵大夫也爵士也若大聘曰聘卿為賔大夫為上介士為衆介小聘曰問大夫為賔介皆士也故歷言卿大夫也云待之禮如其為介之時也者則前注爵卿已下是也云然則聘禮所以禮賔是亦禮介者此即聘禮致饔餼之時賔與上介衆介皆别行於館者是也凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮注皆為國省用愛費也國新新建國也凶荒無年也禍災新有兵寇水火也音義為于偽反下同費芳味反疏注釋曰云國新新建國也者謂若刑新國用輕典鄭云新辟地立君之國故云新建國也云凶荒無年也者此則曲禮云歲凶年榖不登者也云禍災者兵寇來侵為禍水火來害為災也云在野在外殺禮者以其野外匆遽禮物不可卒備故亦殺之凡賔客死致禮以喪用注死則主人為之具而殯矣喪用者饋奠之物疏注釋曰若諸侯之君出行則以三年之戒以椑從死時除棺之外主人皆借之若臣從者死棺物皆共之云死則主人為之具而殯矣者此乃在館權殯還日以柩行知者聘賔死以柩造朝是也云喪用者饋奠之物者小斂特豚一鼎大斂時特豚三鼎之類是也賔客有喪惟芻稍之受注不受饗食饗食加也喪謂父母死也客則又有君焉芻給牛馬稍人稟也其正禮飧饔餼主人致之則受音義稍所教反舊疏詔反疏注釋曰上文賔客身死此文據為賔客聘至彼國後有喪來告者云惟芻稍之受者君行師從卿行旅從須得資給故受芻稍也注釋曰云不受饗食饗食加也者二者並速賔於朝飲食之事故自為而不受之聘禮亦云聘君若薨於後入境則遂受禮注云受饔餼也不受饗食云喪謂父母死也者據正賔而言若諸侯止應母死而有父者或始封之君舊為卿大夫容有父或父有廢疾不立以受位於祖亦云有父也云客則又有君焉者謂介已下非直有父母又有君喪以其俱三年故聘禮若有私喪則哭於館衰而居云芻給牛馬者從行之牛馬云稍人稟也者師從旅從須給稍即月稟是也飧饔餼主人致之則受者以正禮故受之若饗食加主人致之亦不受也遭主國之喪不受饗食受牲禮注牲亦當為腥聲之誤也有喪不忍煎烹正禮飧饔餼常熟者腥致之也音義煎子然反劉子賤反烹普庚反劉普孟反疏注釋曰牲亦當為腥者亦上文公與子男腥三十有六當為腥是也主人有喪不忍煎烹腥致之也按聘禮聘遭喪入境則遂也注云遭喪主國君薨也主人畢歸禮注云賔所飲食不可廢也禮謂饔餼饗食賔惟饔餼之受注云受正不受加饗食雖主人歸賔賔不受其加若饗主人致之亦應受以其正受腥禮掌訝掌邦國之等籍以待賔客注等九儀之差數疏注釋曰九儀之差數即大行人命者五爵者四以九以七以五為差數是也若將有國賔客至則戒官修委積與士逆賔於疆為前驅而入注官謂牛人羊人舍人委人之屬士訝士也既戒乃出迎賔疏注釋曰云國賔客至者謂五等諸侯及其臣來朝聘至謂入畿內至廬宿市當共待之以委積有牛羊豕米禾芻薪之等故知戒官者謂牛人已下也舍人掌給米稟委人掌芻薪之委布於道遺人道上十里有廬廬有飲食三十里有宿宿有委五十里有市市有積之等是也及宿則令聚柝注令令野廬氏音義廬力於反疏注釋曰知令野廬氏其職云有賔客令其地之民聚柝之故知也及委則致積注以王命致於賔疏注釋曰凡致禮於賔無非王命故知以王命至於國賔入館次於舍門外待事於客注次如今官府門外更衣處待事於客通其所求索音義索色白反疏注釋曰賔客至王使卿致館掌訝既為賔客前驅入館掌訝次止于舍門外待事于客之次如今官府門外更衣處舉漢法以況之即今門外亦然及將幣為前驅注道之以如朝音義道音導下文注道之道賔道王同疏注釋曰將幣謂至行朝聘之日道之以如朝謂至大門外之朝也至于朝詔其位入復及退亦如之注鄭司農云詔其位告客以其位次也入復客入則掌訝出復其故位也客退復入迎為之前驅至於館也玄謂入復者入告王以客至也退亦如之如其為前驅音義退復扶又反為於偽反亦如字疏注釋曰解諸侯外朝之法有二稱解之或解取閔公傳季友將生間于兩社為公室輔注云兩社周社亳社此二社在大門內內門外既云兩社為公室輔則外朝所在也或解以為聘禮聘賔在外卒以柩造朝柩不可入公門造朝朝在大門外可知是其兩解不同驗此文云於朝者即是大門外陳擯介之處言朝即外朝在大門外於義可矣云詔其位者謂告賔門外立位云入復者復白也白王賔已至位云及退亦如之者賔客行朝聘訖出還館謂之退亦如前與之道至館先鄭以入復為掌訝詔客自復已之故位後鄭不從以入復為入白王於義為允也凡賔客之治令訝訝治之注賔客之治謂欲正其貢賦理國事也以告訝訝為如朝而理之音義治直吏反注下同為于偽反下注為同疏注釋曰但諸侯之理其事衆多鄭以貢賦為主兼再理國事以該之凡從者出則使人道之注從者凡介以下也人其屬胥徒也使道賔客之從者營護之音義從才用反注同疏注釋曰從者凡介以下也者上掌客凡介行人宰史從賔客來者皆是從者也知人是其屬胥徒也者訝士即下士下士使人明使在下胥徒之等故知胥徒也云營護之者使不得侵陵從者也及歸送亦如之注如之者送至於竟如其前驅聚柝待事之屬音義竟音境疏釋曰來時訝為之道今歸又為之道及聚柝待事皆如前故云亦如之凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝注此謂朝覲聘問之日王所使迎賔客於館之訝疏注釋曰此訝是諸侯朝覲卿大夫士聘問之日至朝聘之時訝之入案聘禮記云卿大夫訝大夫士訝士皆有訝賔即館訝將公命注云使已迎待之命又云又見之以其摯注云訝將舍於館之外宜相親也聘問之日亦使之訝者但天子有掌訝之官即館之訝餘事皆掌主之惟朝覲聘問之日使卿大夫訝諸侯兼官故大夫士為訝賔即館時即為之訝與此掌訝不同也凡訝者賔客至而往詔相其事而掌其治令音義相息亮反掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之注節以為行信幣以見諸侯也咸皆也辟讀如辟忌之辟使皆知王之所好者而行之知王所惡者辟而不為音義好呼報反注下皆同惡烏路反注同辟音避注同疏釋曰按序官掌交中士八人今言掌以節與幣巡邦國之諸侯及萬民之所聚者道王之德意志慮使咸知之者天下九州千六百餘國使皆周遍必無遍理今言之者蓋是國有不知治者遍使知之也使和諸侯之好注有欲相與修好者則為和合之疏注釋曰下有結其交好為朝聘則此好謂使為婚姻之好也是以鄭云有欲修好者則為和合之達萬民之説注説所喜也達者達之於王若其國君音義説音悅注同疏注釋曰掌交既巡民間見民有喜説之事王與國君未知掌交通達於王及國君也掌邦國之通事而結其交好注通事謂朝覲聘問也疏注釋曰言邦國通事是兩國交通之事惟有君臣朝覲聘問之事結使交好故以朝覲聘問解則易云先王建萬國親諸侯也以諭九稅之利九禮之親九牧之維九禁之難九戎之威注諭告曉也九稅所稅民九職也九禮九儀之禮九牧九州之牧九禁九法之禁九戎九伐之戎音義難乃旦反疏注釋曰云九稅所稅民九職也者大宰云以九職任萬民既任之使之營種因即稅之三農生九榖稅九榖園圃育草木稅草木九稅唯臣妾聚斂疏材者無稅總言九稅耳今掌交還以此九稅之法告曉使之任之稅之故云九稅所稅民九職也云九禮九儀之禮者以其大行人小行人掌訝皆掌九儀之禮以其專據諸侯國不得以大宗伯九儀解此也言之親則朝聘是也云九牧之維者大司馬九法建牧立監以維邦國故云維九禁之難者大司馬設九法使邦國有所畏難云九戎之威者大司馬設九伐有所威刑故言難言威也掌察闕掌貨賄闕朝大夫掌都家之國治注都家王子弟公卿及大夫之采地也主其國治者平理其來文書於朝者音義治直吏反注下同疏釋曰都家同言國者雖有百里五十里二十五里不同皆謂之國此則王制云畿內九十三國者也云國治者都家有文書來者平理之也注釋曰王子弟亦以親疏分置於三處食采地公卿大夫者公百里任疆地卿五十里任縣地大夫五十里任稍地日朝以聽國事故以告其君長注國事故天子之事當施於都家者也告其君長使知而行之也君謂其國君長其卿大夫也音義長丁丈反注同疏注釋曰云日朝者朝大夫日日在朝以聽受國事故以天子之事告采地之君長也云君謂其國君長其卿大夫也者總而言之皆曰國君别而言之惟三公及王子弟得稱國君卿大夫總稱長是以司裘國君共熊侯豹侯卿大夫共麋侯是其别稱也國有政令則令其朝大夫注使以告其都家之吏疏注釋曰上文據天子國事遣朝大夫告君長此經據天子政令告朝大夫之事凡都家之治於國者必因其朝大夫然後聽之唯大事弗因注謂以小事文書來者朝大夫先平理之乃以告有司也大事者非朝大夫所能平理疏釋曰此經據都家有事上諸王府之事凡都家之治有不及者則誅其朝大夫注不及謂有稽殿之音義殿都練反疏注釋曰都家治有不及稽殿誅朝大夫者以其朝大夫專主都家責其不能崔促故也在軍旅則誅其有司注有司都司馬家司馬疏注釋曰言此者見軍旅不干朝大夫之事都司馬王家之司馬王臣為之者家司馬卿大夫使家臣自置其司馬者也都則闕疏釋曰諸言闕者皆是因秦燔滅典籍漢興購求不得也都士闕家士闕周禮注疏卷三十八周禮注疏卷三十八考證司儀主君郊勞疏不陳五擯者非主君從賔禮故也臣紱按主當作王非王句言王見諸侯則陳五擯從臣禮也此諸公相賔則君從賔禮以其非王耳凡四方之賔客禮儀辭命餼牢賜獻以二等從其爵而上下之疏以三等降殺從三等而為之三當作二經文自明象胥凡國之大喪三節黃氏度謂是小行人之錯簡凡諸侯之禮疏見聘禮夫人使下大夫韋辨歸禮夫人使三字監本訛作致饔餼今據原文改正賔客有喪惟芻稍之受注不受饗食饗食加也臣紱按此注二句并疏云不受饗食起至不受饗食共五十四字俱屬下節遭主國之喪不受饗食此為錯簡周禮注疏卷三十八考證
