body:
  text: 周禮注疏卷二十一漢鄭氏注唐陸德明音義賈公彥疏典命掌諸侯之五儀諸臣之五等之命注五儀公侯伯子男之儀五等謂孤以下四命三命再命一命不命也或言儀或言命互文也故書儀作義鄭司農義讀為儀疏注釋曰云五儀公侯伯子男之儀者此五儀有三等之命命雖有同者其儀皆異若然大宗伯注云每命異儀貴賤之位乃正是命異儀即異此則命同儀有異於義乖者但大宗伯經云九儀之命據九等之命為九儀故注每命異儀是命異儀即異此經云掌諸侯之五儀即是據五等之爵為五儀是以命同儀有異乃各有所據於義無乖也云五等謂孤以下四命三命再命一命不命也鄭知義然者此經諸臣五等在諸侯之下則還據諸侯之下臣有五等而言諸侯之下既無一命以至五命明臣有五等通不命也是以諸侯及諸臣皆據下文諸侯諸臣而充此上之數也故下文諸侯下說大國孤四命其卿三命大夫再命士一命侯伯之卿已下如公子男之卿再命大夫一命士不命云或言儀或言命互文也者謂或言儀者亦有命此則諸侯之命也或言命者亦有儀此乃臣之儀也今若據爵而言則孤卿大夫士四等之儀也若據命而說則通不命為五儀上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節注上公謂王之三公有德者加命為二伯二王之後亦為上公國家國之所居謂城方也公之城蓋方九里宫方九百步侯伯之城蓋方七里宫方七百步子男之城蓋方五里宫方五百步大行人職則有諸侯圭藉冕服建常樊纓二車介牢禮朝位之數焉音義樊畔干反介音界疏注釋曰鄭云上公謂王之三公有德者加命為二伯者案下文三公八命出封皆加一等謂若周公太公有德封於齊魯身雖在王朝使其子就國亦是出封加命為上公九命者此上公則為二伯分陜者也故大宗伯云九命作伯是也云二王之後亦為上公者案孝經緯援神契云二王之後稱公大國稱侯故知也若然宋公為殷之後稱公春秋之代把為夏後或稱侯或稱伯或稱子者把君無道或用夷禮故貶之而不稱公也若虞公虢公非王之三公出封亦得稱公者此殷時稱公武王滅殷虞虢無過可退無功可進雖周之親戚仍守百里之地而稱公也自外雖是周之同族有出封惟稱侯伯而已是以魯晋鄭衛等皆稱侯伯鄭注巾車云王子母弟雖為侯伯畫服如上公乘金路是也云國家國之所居謂城方也者若孝經諸侯稱國大夫稱家今此文無卿大夫則國家總據諸侯城方者也云公之城蓋方九里云云則經國家及宫室車旗以下皆依命數而言既言國家宫室以九以七以五為節以天子城方十二里而言此九七五亦當為九里七里五里為差矣但無正文故言蓋以疑之也案書無逸傳云古者百里之國九里之城𤣥或疑焉周禮匠人營國方九里謂天子之城今大國與之同非也然大國七里次國五里小國三里之城為近可也或者天子實十二里之城諸侯大國九里次國七里小國五里如是鄭自兩解不定鄭必兩解者若案匠人營國方九里據周天子而言則公宜七里侯伯宜五里子男宜三里為差也若據此文九命者以九為節七命者以七為節五命者以五為節又案文王有聲箋云築城伊洫適與成方十里等小於天子大於諸侯以其雖改殷制仍服事殷未敢十二里據此二文而言則周之天子城方十二里公宜九里侯伯宜七里子男宜五里也若周天子十二里則匠人云九里或據異代法以其匠人有夏殷法故也鄭不言異代者以其無正文不敢斥言也是以隱公元年祭仲云都城不過百雉雉長三丈百雉五百步大都三之一則鄭是伯爵城有千五百步為五里是公七里侯伯五里子男三里矣此賈服杜君等義與鄭𤣥一解也鄭又云鄭伯之城方七里大都三之一方七百步實過百雉矣而云都城不過百雉舉子男小國之大都以駮京城之大其實鄭之大都過百雉矣又是天子城十二里而言也引大行人之職者經云國家宫室鄭已解訖其云車旗衣服禮儀不可具言故引大行人為證欲見彼具見車旗以下之數也案大行人云上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賔主之間九十步侯伯於上公降殺以兩子男比於侯伯又降殺以兩為差耳故鄭云數焉王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之注四命中下大夫也出封出畿內封於八州之中加一等褒有德也大夫為子男卿為侯伯其在朝廷則亦如命數耳王之上士三命中士再命下士一命疏釋曰云王之三公八命其卿六命其大夫四命皆是在朝者云及其出封皆加一等者三公八命者為九命上公六命卿為七命侯伯四命大夫為五命子男云其國家宫室車旗衣服禮儀亦如之者亦如上經以命數為差也注釋曰云四命中下大夫也者見序官有中下大夫於此經唯見四命大夫是知中下大夫同四命也云出封出畿內封於八州之中者其王朝公卿大夫亦有舊在畿內有采地之封是封畿內者也今乃封於畿外在八州之中為諸侯也云加一等褒有德也者王朝公卿大夫無功可進無過可退者不得出封以知加一等為南面之君者是褒有德也卿為侯伯大夫為子男也鄭不言三公者雖出封加命爵仍是公不異故不言也云其在朝廷則亦如命數耳者若先鄭出加入亦加若毛君則出加入減若鄭君出加八則不加不減則義已備宗伯職也云王之上士三命中士再命下士一命經既不言而鄭言之者此典命所以主命數序官有三等之士此文不見故以意推之必知士有三命以下者見經大夫四命四命以下唯有三等之命序官有上士中士下士故以三等之命而說之也然公卿大夫以八命六命四命為隂爵者一則擬出封加為陽爵二則在王下為臣是隂官不可為陽爵故也士既無出封之理又極卑賤故有三命一命為陽爵無嫌也凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男注誓猶命也言誓者明天子既命以為之嗣樹子不易也春秋桓九年曹伯使其世子射姑來朝行國君之禮是也公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝㑹焉其賔之皆以上卿之禮焉音義適丁厯反下遐嫁反射姑音亦疏注釋曰鄭以誓為命者諸侯世子皆往朝天子天子命之為世子故以誓為命也云言誓者明天子既命以為之嗣樹子不易也者實是命而經云誓者謂既命以為繼嗣使為樹子不可改易義取公羊僖公三年齊桓公㑹于陽榖管仲命諸侯云無易樹子無以妾為妻是也引桓九年曹伯使其世子射姑來朝行國君之禮者以其稱朝是行國君之禮引者證經誓於天子攝其君事也云公之子如侯伯而執圭侯伯之子如子男而執璧者以其上公九命侯伯七命子男五命經云下其君一等明依命數為降以知義然也若公之子如侯伯在侯伯下侯伯子如子男在子男下也云子男之子與未誓者皆次小國之君執皮帛者以經云下一等子男身五命執璧眀子雖得誓以下父一等自然與公侯伯之適子未誓者同執皮帛朝㑹可知也云其賔之皆以上卿之禮焉者此亦約曹世子射姑來朝賔之以上卿之禮而言之也若行朝禮擯介依諸侯法其饔餼饗食一與卿同也此經誓與未誓皆據父在而言若父卒後得誓者皆得與諸侯序以無父得與正君同故也是以雜記云君薨太子號稱子待猶君也注引春秋葵丘之㑹宋襄公稱子而與諸侯序又定四年二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯以下于召陵陳子在鄭伯上則是得誓者與諸侯序也若未誓則亦當執皮帛也公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各視其命之數注視小國之君者列於卿大夫之位而禮如子男也鄭司農云九命上公得置孤卿一人春秋傳曰列國之卿當小國之君固周制也𤣥謂王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人疏注釋曰云視小國之君者列於卿大夫之位而禮如子男也知義然者案大行人云大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君鄭注云此以君命來聘者也孤尊既聘享更自以其贄見執束帛而已豹皮表之為飾繼小國之君言次之也其他謂二車及介牢禮賔主之間擯將幣祼酢饗食之數以此而言則以皮帛者亦是更以贄見若正聘當以圭璋也若然彼云繼小國之君謂執皮帛次小國君後則與此注列於卿大夫位一也此言視小國之君注云而禮如子男則彼其他視小國君並彼注二車及介以下是也司農云九命上公得置孤卿一人春秋傳曰列國之卿當小國之君固周制也者案昭二十三年左傳云叔孫婼為晉所執晉人使與邾大夫坐訟叔孫曰列國之卿當小國之君固周制也寡君命介子服回在是其事也若然先鄭引魯之卿以證孤者孤亦得名卿故匠人云外冇九室九卿朝焉是并六卿與三孤為九卿亦得名卿者以其命數同也魯是侯爵非上公亦得置孤者魯為州牧立孤與公同若然其孤則以卿為之故叔孫婼自此於孤也𤣥謂王制曰大國三卿皆命於天子以下者案王制之文多據夏殷此命卿亦是夏殷法故彼下文大國之卿不過三命下卿再命小國之卿與下大夫一命鄭注云不著次國之卿者以大國之下互眀之此卿命則異大夫皆同以此言之則大國卿三命次國卿與夫國下卿同再命小國卿與大夫同一命彼注即引此周禮命卿大夫之法以證與古不同之義若然此引彼夏殷命臣法周禮諸侯卿大夫命雖與古不同五等諸侯國國皆有三卿得天子命者與夏殷同故引之若然云大國三卿皆命於天子者上卿則命數足矣中卿天子再命已君加一命亦為三命下卿天子一命若夏殷已君加一命二命足矣周則已君加二命為三命亦足矣云下大夫五人不言命數者並不得天子命夏殷並已君加一命周則大國之大夫再命也云上士二十七人者夏殷之士不命其二十七士亦應有上九中九下九而皆云上士者亦是勉人為髙行故總以上士言之也云次國三卿二卿命於天子者上卿天子二命已君不加中卿天子一命已君加一命下卿天子不命已君亦加二命為再命故云一卿命於其君是次國之卿皆再命也若周禮次國卿竝三命亦下大夫五人上士二十七人義與大國同也云小國二卿皆命於其君者案彼鄭注云此文似誤脫云脫者類上文大國次國則此小國亦當有三卿宜云小國三卿一卿命於天子二卿命於其君則是脫亦三卿一卿命於天子九字矣云誤者次國云二卿命於天子不言皆此小國云二卿皆命於其君而言皆是誤故云誤也若依此三卿解之則三卿之內一卿命於天子為一命二卿命於其君亦各一命亦下大夫五人上士二十七人義與上同也若周禮小國三卿皆再命亦一卿命於天子一命已若加一命為再命二卿命於其君不得天子命竝已君再命矣又周法次國五大夫亦與大國五大夫同再命小國下大夫五人各一命其士公侯伯之士同一命子男之士不命與夏殷同此文是也大司馬云大國三軍次國二軍小國一軍軍將皆命卿者謂得天子之命者得為軍將也若然諸侯之臣有四命三命再命一命不命而經云各視其命數者謂宫室之等四命者四百步二車四乘旗四斿冕服四章三命者以三為節再命一命者亦以命數為降殺也但大夫𤣥冕一命者一章裳上刺黻而已衣無章故得𤣥名也則冕亦象衣無旒其士服爵辨竝無章飾是以變冕言爵辨也諸侯之大夫一命已上即有二車士雖一命亦無二車天子之士再命已上可有二車也司服掌王之吉凶衣服辨其名物與其用事注用事祭祀視朝甸凶弔之事衣服各有所用疏釋曰此一經與下文為總目王吉服有九大裘已下是也凶服即下文凶事與弔是也云辨其名物者衣服有名則物色有異同也注釋曰云用事祭祀視朝甸凶弔之事者是其事各異云衣服各有所用者謂若祀昊天用大裘之等是也王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕注六服同冕者首飾尊也先公謂后稷之後大王之前不窋至諸盩饗射饗食賔客與諸侯射也羣小祀林澤墳衍四方百物之屬鄭司農云大裘羔裘也衮卷龍衣也鷩裨衣也毳罽衣也𤣥謂書曰豫欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻希繡此古天子冕服十二章舜欲觀焉華蟲五色之蟲繢人職曰鳥獸蛇雜四時五色以章之謂是也希讀為絺或作黹字之誤也王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章登龍於山登火於宗彝尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳音義鷩必滅反劉府弊反毳昌鋭反劉清嵗反希本作絺陟里反劉猪履反注下皆同窋張律反盩直留反或音胄裨婢支反又方支反罽居例反繢胡對反黹張里反刺七亦反劉七賜反沈此擊反下同疏釋曰王之吉服並下三者亦是今尊其祭服且言六矣注釋曰云六服同冕者首飾尊也者六服服雖不同首同用冕以首為一身之尊故少變同用冕耳下經五服同名辨亦是首飾尊鄭不言者義可知也冕名雖同其旒數則亦有異但冕名同耳云先公謂后稷之後大王之前不窋至諸盩者但后稷雖是公不諡為王要是周之始祖感神靈而生文武之功因之而就故特尊之與先王同是以尚書武成云先王建邦啓土尊之亦謂之先王也是以鄭云后稷之後大王之前不數后稷不窋后稷子諸盩大王父二者之間竝為先公矣周本紀云后稷卒子不窋立不窋卒子鞠立鞠卒子公劉立卒子慶節立卒子皇僕立卒子羌弗立卒子毁榆立卒子公非立卒子髙圉立卒子亞圉立卒子公祖類立卒子古公亶父立古公亶父則大王亶父也公祖類即紺亦曰諸盩也大祫於大祖后稷廟中尸服衮冕王服亦衮冕也案中庸注云先公組紺以上至后稷天保詩注先公謂后稷至諸盩天作詩注云先公謂諸盩至不窋經皆云先公注或言后稷或不言后稷者中庸云周公成文武之德追王大王王季上祀先公以天子之禮后稷既不追王故注先公中有后稷也天保詩云禴祠蒸嘗是四時常祭故注先公中有后稷天作詩是祫之祭禮在后稷廟中不嫌不及后稷故注不言后稷各有所據故注不同也云饗射饗食賔客與諸侯射也者饗食則大行人云上公三饗三食之等是也但饗食在廟故亦服鷩冕也與諸侯射者此大射在西郊虞庠中亦服鷩冕也若燕射在寢則朝服若賔射在朝則皮辨服云羣小祀林澤墳衍四方百物者此據地之小祀以血祭社稷為中祀貍沈已下為小祀也若天之小祀則司中司命風師雨師鄭不言者義可知鄭司農云大裘羔裘也者司裘文先鄭注云大裘黑羔裘然則凡祭天皆同羔裘義具於司裘也云衮卷龍衣也者鄭注禮記云卷俗讀其通則曰衮故先鄭衮卷並言之也云鷩裨衣也者案禮記曾子問云諸侯裨冕覲禮侯氏裨冕鄭注云裨之言埤也天子大裘為上其餘為裨若然則裨衣自衮以下皆是先鄭獨以鷩為裨衣其言不足矣云毳罽衣也者案爾雅云毛氂謂之罽則績毛為之若今之毛布但此毳則宗彞謂虎蜼而先鄭以為罽衣於義不可故後鄭不從也𤣥謂書曰至希繡而云此古天子冕服十二章舜欲觀焉者欲明舜時十二章至周無十二章之意也然古人必為日月星辰於衣者取其明也山取其人所仰龍取其能變化華蟲取其文理作繢者繢畫也衣是陽陽至輕浮畫亦輕浮故衣繢也宗彝者據周之彞尊有虎彞蜼彞因於前代則虞時有蜼彝虎彝可知若然宗彝是宗廟彞尊非蟲獸之號而言宗彞者以虎蜼畫於宗彞則因號虎蜼為宗彞其實是虎蜼也但虎蜼同在於彞故此亦並為一章也虎取其嚴猛蜼取其有智以其卬鼻長尾大雨則懸於樹以尾塞其鼻是其智也藻水草亦取其有文象衣上華蟲火亦取其明粉米共為一章取其潔亦取養人黼謂白黑為形則斧文近刃白近上黑取斷割焉黻黑與青為形則兩已相背取臣民背惡向善亦取君臣冇合離之義去就之理也希繡者孔君以為細葛上為繡鄭君讀希為黹黹紩也謂刺繒為繡次但裳主隂刺亦是沉深之義故裳刺也云華蟲五色之蟲孔君注以為華象草華蟲雉也義亦通以其草華有五色故引繢人鳥獸蛇雜四時五色以章之為證也華蟲名鷩者以其頭似鷩以有兩翼則曰鳥以其體有鱗似蛇則曰蛇以其有五色成章則曰雉故鄭注考工記云蟲之毛鱗有文采者也云希讀為絺或作黹字之誤也者本有此二文不同故云誤當從絺為正也云王者相變至周而以日月星辰畫於旌旗者若孔君義虞時亦以日月星畫於旌旗與周同鄭意虞時無日月星畫於旌旗若虞時日月星畫於旌旗則衣無日月星也云所謂三辰旗旗昭其明也者謂桓公二年哀伯辭彼三辰則此日月星辰旗旗者謂交龍為旗熊虎為旗不畫日月星連引之耳引之者證周世日月星畫於旌旗之意也云而冕服九章者據周法而言既去日月星三章明有九章在也云登龍於山登火於宗彝尊其神明也者鄭知登龍於山者周法皆以蟲獸為章首若不登龍於山則當以山為章首何得猶名衮龍乎明知登龍於山取其神也又知登火於宗彞者宗彝則毳也若不登火在於宗彝上則毳是六章之首不得以毳為五章之首故知登火於宗彝取其明也云九章初一曰龍至凡五也此無正文並鄭以意解之以其衣是陽從竒數裳是隂從偶數云希刺粉米無畫也者衣是陽應畫今希冕三章在裳者自然刺繡但粉米不可畫之物今雖在衣亦刺之不變故得希名故鄭特言粉米也然則毳冕之粉米亦刺之也云𤣥者衣無文裳刺黻而已者以其祭服衣本是𤣥今𤣥冕一章仍以𤣥為名明衣上無畫一章者刺黻於裳而已是以謂𤣥焉云凡冕服皆𤣥衣纁裳者六冕皆然故云凡以該之知𤣥衣纁裳者見易繫辭黃帝堯舜垂衣裳蓋取諸乾坤乾為天其色𤣥坤為地其色黃但土無正位託於南方火赤色赤與黃即是纁色故以纁為名也凡兵事韋辨服注韋辨以韎韋為辨又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也今時伍伯緹衣古兵服之遺色音義韎劉音妹又莫拜反衣於既反跗芳符反又音附注之樹反緹音體戚音提疏釋曰以兵事有侵戰伐圍入滅非一故云凡云韋辨服者以韋為冕又以為服故云韋辨服注釋曰韎是舊染謂赤色也以赤色韋為辨云又以為衣裳者左傳成十六年楚子曰韎韋之跗注君子也使工尹襄問郤至以弓若賈服等說跗謂足跗注屬也袴而屬於跗若據鄭雜問志則以跗為幅注亦為屬以韎韋幅如布帛之幅而連屬以為衣而素裳既與諸家不同又與此注裳亦用韎韋有同異者鄭君兩解此注與賈服同裳亦用韎韋也至彼雜問志裳用素者從白舄之義若然案聘禮云卿韋辨歸饔餼注云韋辨韎韋之辨蓋韎布為衣而素裳與此又不同者彼非兵事入廟不可純如兵服故疑用韎布為衣也言素裳者亦從白屨為正也以其屨從裳色天子諸侯白舄大夫士白屨皆施於皮辨故也云今時伍伯緹衣古兵服之遺色者鄭取韎為赤色韋猶以為疑故舉漢事以為況言伍伯者伍行也伯長也謂宿衛者之行長見服纁赤之衣是古兵服赤色遺象至漢時尚存是其兵服赤之驗也視朝則皮辨服注視朝視內外朝之事皮辨之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕音義視音視疏注釋曰天子三朝外朝二內朝一皆用皮辨故經總云視朝則皮辨服也知皮辨之服十五升白布衣積素以為裳者案禮記雜記云朝服十五升士冠禮云皮辨素積故知義然也云王受諸侯朝覲於廟則衮冕者案覲禮云天子衮冕負黼扆節服氏云祭祀朝覲衮冕六人維王之大常注云服衮冕者從王服故知朝覲在廟王服衮冕若然春夏受贄在朝則是視朝皮辨服也其受享於廟與覲同衮冕故於廟連言朝也凡甸冠辨服注甸田獵也冠辨委貌其服緇布衣亦積素以為裳諸侯以為視朝之服詩國風曰緇衣之宜兮謂王服此以田王卒食而居則𤣥端音義甸音田注同疏注釋曰言凡者田獵非一故以凡廣之不言事者田獵有專事故不言也上視朝不言凡事者朝有常日比於田獵為數故凡事皆不言也云冠辨委貌者士冠禮及郊特牲皆云委貌周道鄭注士冠禮云委猶安也言所以安正容貌故云委貌若以色言則曰𤣥冠也云其服緇布衣亦積素以為裳者士冠禮云主人𤣥冠朝服緇帶素韠注云衣不言色者衣與冠同裳又與韠同色是其朝服緇布衣亦如皮辨積素以為裳也云諸侯以為視朝之服者士冠禮云𤣥冠朝服注云天子與其臣𤣥冕以視朔皮辨以日視朝諸侯與其臣皮辨以視朔朝服以日視朝是也引詩國風曰者是鄭緇衣之詩引之證鄭伯是諸侯服緇衣為朝服之義也云王卒食而居則𤣥端者案玉藻韠君朱大夫素士爵韋鄭注云天子諸侯𤣥端朱裳以其云朱韠韠同裳色故也鄭因朝服而說𤣥端者以朝服與𤣥端大同小異以其𤣥冠緇布衣皆有正幅為端則同但易其裳耳故因說𤣥端也若然大夫素韠則素裳其士韠言爵爵是不純之名以其士冠禮上士𤣥裳中士黃裳下士雜裳雜裳者前三幅𤣥後四幅黃故爵韠也言凡甸冠辨服據習兵之時若正田時則當戎服是以月令季秋天子乃教於田獵以習五戎司徒搢撲北面以誓之天子乃厲飾執弓挾矢以獵注云厲飾謂戎服尚威武也以此觀之習五戎司徒誓之不戎服著冠辨可知是以襄十四年夏四月左傳云衛獻公戒孫文子寧惠子食而射鴻於囿二子從之公不釋皮冠則皮辨韋辨同但色異耳故以韋辨為皮辨是其正田用韋辨也凡凶事服辨服注服辨喪冠也其服斬衰齊衰音義衰七雷反下皆同齊音咨疏注釋曰辨服於上下文不類者以是喪服故變其文也天子諸侯絶傍期正統之期猶不降故兼云齊衰其正服大功亦似不降也大功章曰適婦注云適子之婦傳曰何以大功也不降其適也既無所指斥明關之天子諸侯也又服問云君所主夫人妻大子適婦既言君所主眀不降也如是則為嫡孫之婦又當小功今注止云斬衰齊衰者以其正服齊衰是不降之首然則王為適子斬衰其為適孫適曾孫適𤣥孫適來孫則皆齊衰不杖章云適孫傳曰何以期也不敢降其適也有適子者無適孫孫婦亦如之𤣥謂凡父於將為後者非長子皆期然則王禮亦適子死有適孫適孫死有適曽孫向下皆然也又案喪服傳云始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟天子之義亦當然若虞舜之與漢髙皆庶人起為天子蓋亦不臣諸父昆弟而有服也凡弔事辨絰服注辨絰者如爵辨而素加環絰論語曰羔裘𤣥冠不以弔絰大如緦之絰其服錫衰緦衰疑衰諸侯及卿大夫亦以錫衰為弔服喪服小記曰諸侯弔必皮辨錫衰則變其冠耳喪服舊說以為士弔服素委貌冠朝服此近庶人弔服而衣猶非也士當事辨絰疑衰變其裳以素耳國君於其臣辨絰他國之臣則皮辨大夫士有朋友之恩亦辨絰故書辨作􅩕鄭司農􅩕讀為辨而加環絰環絰即辨絰服音義近附近之近􅩕音辨疏釋曰弔事言凡者以其弔事非一故亦云凡以廣之也辨絰其服則錫衰緦衰之等也注釋曰云辨絰者如爵弃而素者爵辨之形以木為體廣八寸長尺六寸以三十升布染為爵頭色赤多黑少今為辨絰之辨其體亦然但不同爵色之布而用素為之故云如爵辨而素云加環絰者凡五服之絰皆兩股絞之今言環絰即與絞絰有異矣謂以麻為體又以一股麻為體糾而橫纒之如環然故謂之環絰加於素辨之上故言加環絰也云論語曰羔裘𤣥冠不以弔者彼謂小斂之後主人已改服客則不用𤣥冠羔裘朝服以弔之引之者證凡弔服及辨絰皆施之於小斂已後也云絰大如緦之絰者弔服環絰大小無文但五服之絰緦絰最小弔服之絰亦不過之是以約同緦絰故云絰大如緦之絰也云其服錫衰緦衰疑衰者此文陳弔事之絰下文陳三等弔服錫衰以下眀上下相成故據下文而說也云諸侯及卿大夫亦以錫衰為弔服知者案服問云君為卿大夫錫衰當事則辨絰大夫相為亦然故知之也云喪服小記曰諸侯弔必皮辨錫衰則變其冠耳者不言君而言諸侯則是弔異國之臣法不著辨絰而云皮辨故云變其冠耳云喪服舊說以為士弔服素委貌冠朝服此近庶人弔服而衣猶非也者此引舊說而破之庶人弔服首服素冠而素裳其衣裳當疑衰故喪服鄭注云士疑衰素裳冠則皮辨之絰庶人不爵辨則其弔冠素委貌也若然士與庶人服同冠辨則異也云國君於其臣辨絰者服問云當事則辨絰是也云他國之臣則皮辨者喪服小記文是也云大夫士冇朋友之恩亦辨絰者喪服記云朋友麻故知大夫於士士自相於有朋友之恩者服麻也大夫相於不假朋友恩以其服問卿大夫相為亦錫衰辨絰不言朋友也凡弔服天子之服於此上下文具矣其諸侯弔服亦應三衰俱有知者以天子自大裘以下至素服上公自衮冕以下如王之服侯伯自鷩冕而下如公之服子男自毳冕而下如侯伯之服皆相如明諸侯三衰皆有但所用據文唯有服問云為卿大夫錫衰以居出亦如之當事則辨絰其用緦衰疑衰則文王世子注同姓之士緦衰異姓之士疑衰以其卿大夫已用錫衰故以二衰施於同姓異姓之士也案士喪禮注云君弔必錫衰者蓋士有朋友之恩者加之與大夫同用錫衰耳大夫相於必用錫衰者以大夫雖已降服仍有小功降至緦麻則不得以緦衰為弔緦衰既不弔眀疑衰亦不可為故以錫衰為弔服也士之弔服不用錫衰者避大夫疑衰不用疑裳者鄭注喪服云避諸侯也凡弔服皆既葬除之其大夫妻亦與大夫同故喪服云大夫弔於命婦錫衰命婦弔於大夫亦錫衰注云弔於命婦命婦死也是也服問云為其妻出則不弔與大夫小異耳凡喪為天王斬衰為王后齊衰注王后小君也諸侯為之不杖期音義為于僞反下及注除為害一字皆同疏注釋曰云凡喪者諸侯諸臣皆為天王斬衰王后齊衰故云凡以廣之鄭云王后小君也者解經臣為王后著齊衰之意鄭又云諸侯為之不杖期者案喪服不杖章云為君之母妻傳曰何以期也從服也但諸臣亦為王斬衰為后期鄭特言諸侯者以喪服斬衰章云臣為君諸侯為天子及至不杖章直云為君之母妻不别見諸侯為后之文故鄭解之本不見諸侯為后者以其諸侯為后與臣為之同故不别見也其卿大夫適子為君夫人亦與諸臣同士之子賤無服當從庶人禮服問云諸侯之世子不為天子服注云逺嫌也與畿外之民同服服問又云大夫之適子為君夫人大子如士服注大夫不世子不嫌也士為國君斬小君期大子君服斬臣從服期天子卿大夫適子亦當然故云如士服也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆辨絰注君為臣服弔服也鄭司農云錫麻之滑易者十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升衰𤣥謂無事其縷哀在內無事其布哀在外疑之言擬也擬於吉音義易以䜴反去起吕反下同疏釋曰天子臣多故三公與六卿同錫衰諸侯五等同緦衰大夫與士同疑衰不見三孤者與六卿同又不辨同姓異姓亦以臣故也云首服皆辨絰者三衰同皆辨絰注釋曰云君為臣服弔服也者欲見臣為君斬君為臣無服直弔服既葬除之而已鄭司農解錫衰緦衰者喪服傳文其疑衰無文先鄭當更有所見後鄭皆從但增成其義耳鄭注喪服破升皆為登布八十縷為登登成也今云十五升則千二百縷去其半則六百縷也云有事其縷及有事其布者皆謂以水濯治去其垢者也𤣥謂疑之言擬也擬於吉者以其吉服十五升今疑衰十四升少一升而已故云擬於吉者也凡弔皆不見婦人弔服者以婦與夫同故喪服云大夫弔於命婦錫衰命婦弔於大夫亦錫衰是婦與夫同其首服即鄭注喪服云凡婦人弔服吉笄無首素總是也大札大荒大烖素服注大札疫病也大荒饑饉也大烖水火為害君臣素服縞冠若晉伯宗哭梁山之崩音義縞古老反劉剛操反疏注釋曰知大札疫病者以春秋傳有夭昏札瘥之文故知札為疫病也云大荒饑饉也者爾雅榖不熟曰饑蔬不熟曰饉即曲禮云嵗凶年穀不登是也云大烖水火為害者謂若春秋宋災謂有水災為害又孔子世家云哀三年孔子云桓僖災又公羊云雉門災之類皆火災也云君臣素服縞冠若晉伯宗哭梁山之崩者事在成五年引之者證此服素服首服縞冠之意若然梁山崩非大札大荒大烖引為證者欲見山崩與大札大荒服同是以大司樂云凡日月食四鎮五嶽崩令去樂下文云大札大凶大烖令弛縣弛縣與去樂互相明則去樂是同梁山崩又是四鎮五嶽之類則大札大荒素服縞冠與哭梁山崩同可知若然此言素服案玉藻云年不順成則天子素服乘素車食無樂義與此合彼又云年不順成大夫不得造車馬君衣布搢本義與此違者彼衣布謂常服為禱祈義與此同也公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服其凶服加以大功小功士之服自皮辨而下如大夫之服其凶服亦如之其齊服有𤣥端素端注自公之衮冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭於已雜記曰大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已大夫爵辨自祭家廟唯孤爾其餘皆𤣥冠與士同𤣥冠自祭其廟者其服朝服𤣥端諸侯之自相朝聘皆皮辨服此天子日視朝之服喪服天子諸侯齊斬而已卿大夫加以大功小功士亦如之又加緦焉士齊有素端者亦為札荒有所禱請變素服言素端者明異制鄭司農云衣有襦裳者為端𤣥謂端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸袪尺八寸音義其齊側皆反注士齊同有襦音儒本亦作襦屬音燭廣古曠反後廣袤同袪起吕反上時掌反侈昌氏反疏釋曰陳天子吉凶之服訖自此已下陳諸侯及其臣之服貴賤不同之事也但上具列天子之服此文以上公自衮冕以下差次如之上得兼下下不得僭上也大夫云凶服加以大功小功者天子諸侯自旁期已下皆絶而不為服大夫加以大功小功謂本服大功小功者其降一等小功降仍有服緦者其本服之緦則降而無服云士之服自皮辨而下者士之助祭服爵辨不言爵辨者以其爵辨之服惟有承天變時及天子哭諸侯乃服之所服非常故列天子吉服不言之今以次轉相如不得輒於士上加爵辨故以皮辨為首但皮辨亦是士助君視朔之服也云其凶服亦如之者亦如大夫有大功小功但士無降服則亦有緦服故鄭增之也其齊服有𤣥端者則士冠禮上士𤣥裳中士黃裳下士雜裳特牲士之享祭之服也素端者即上素服為札荒祈請之服也注釋曰云自公衮冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服者此上公衮已下既非自相朝聘之服又非已之祭服案曽子問云諸侯裨冕出視朝鄭云為將廟受謂朝天子時也春夏受享於廟秋冬一受之於廟是受享受覲皆在廟是受朝之事及助祭在廟理當裨冕也若卿大夫聘天子受之在廟及助祭亦用冕服可知故鄭君臣朝聘並言也云諸侯非二王後其餘皆𤣥冕而祭於已知之者案玉藻云諸侯𤣥端而祭注云端當為冕是諸侯𤣥冕自祭於已也案玉藻注云諸侯祭宗廟之服惟魯與天子同此注云諸侯非二王後其餘皆𤣥冕祭於已彼不言二王後此不言魯者彼此各舉一邉而言其實相兼乃具也魯雖得與天子同惟在周公文王廟中得用衮冕故明堂位云季夏六月以禘禮祀周公於大廟云天子之禮是也若餘廟亦𤣥冕或可依公羊傳云白牡周公牲騂犅魯公牲羣公不毛魯公既與羣公别牲而用騂犅則其服宜用鷩冕可也其二王後惟祭受命王得用衮冕其餘廟亦用𤣥冕也云雜記曰大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已大夫爵辨自祭家廟惟孤爾其餘皆𤣥冠與士同者鄭引雜記者上已說諸侯祭於已訖更明孤已下自祭不得用上服之意也云其餘皆𤣥冠與士同者諸侯除孤用爵辨之外卿大夫等皆用𤣥冠與士同故少牢是上大夫祭用𤣥冠朝服特牲是士禮用𤣥冠𤣥端是其餘皆𤣥冠與士同也其天子大夫四命與諸侯之孤同亦以爵辨自祭天子之士宜與諸侯上大夫同用朝服也云𤣥冠自祭其廟者其服朝服𤣥端者朝服據少牢大夫禮𤣥端據特牲士禮而言也云諸侯之自相朝聘皆皮辨服者欲見此經上服惟施於入天子廟不得入諸侯廟之意必知諸侯自相朝聘用皮辨者見聘禮主君及賔皆皮辨諸侯相朝其服雖無文聘禮主君待聘者皮辨明待諸侯朝亦皮辨可知且曾子問云諸侯朝天子冕而出視朝為將廟受及彼下文諸侯相朝云朝服而出視朝鄭云為事故據此上下而言明自相朝不得與天子同即用皮辨可知也云此天子日視朝之服者此解皮辨非諸侯常服之物惟於朝聘乃服之意也云喪服天子諸侯齊斬而已者欲見大夫言大功小功天子諸侯不言之意也天子諸侯絶旁期此云齊者據為后夫人而言若然天子於適孫承重亦期周之道有適子無適孫若無適子自然立適孫若無適孫立適曽孫亦期及至適𤣥孫皆然也既為適孫有服而適子之婦大功若於適孫已下之婦承重者皆小功矣今特言齊者舉后夫人重者而言云卿大夫加以大功小功者是據正服大功小功若緦則降而無服故不言云士亦如之又加緦焉者士不降服明知更加緦也云士齊有素端者亦為札荒有所禱請者然上文已云素服士既轉相如已有素服矣今於經别云𤣥端素端為士設文者以其大夫已上侈袂同惟士不得侈袂以端為之故經别見端文也若然士之素端言齊者見禱請也則上文素服亦是齊服禱請可知也云變素服言素端者明異制者鄭解士别見素文意也鄭司農云衣有襦裳者為端者此端據正幅不據襦裳故後鄭不從也𤣥謂端者取其正也者端正也故以正幅解之也云士之衣袂皆二尺二寸而屬幅是廣袤等也者云衣袂二尺二寸喪服記文故彼云衣二尺有二寸注云此謂袂中也言衣者明與身參齊是𤣥端之身長二尺二寸今兩邉袂亦各屬一幅幅長二尺二寸上下亦廣二尺二寸故云屬幅廣袤等袤則長也言皆者皆𤣥端素端二者同也云其袪尺二寸者據玉藻深衣之袪尺二寸而言也云大夫已上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸祛尺八寸者此亦無正文案禮記雜記云凡辨絰服其衰侈袂少牢主婦衣綃衣亦云侈袂侈大也鄭以侈為大即以意為半而益一以解之也孔子大袂單衣亦如此也凡天子冕服有章者舊說天子九章據大章而言其章别小章章依命數則皆十二為節上公亦九章與天子同無升龍有降龍其小章章别皆九而已自餘鷩冕毳冕以下皆然必知有小章者若無小章絺冕三章則孤有四命六命卿大夫𤣥冕一章卿大夫中則有三命二命一命天子之卿六命大夫四命明中有小章乃可得依命數凡大祭祀大賔客共其衣服而奉之注奉猶送也送之於王所疏釋曰云大祭祀則中兼有次小祭祀以其皆是王親祭故舉大而言賔客言大者據諸侯來朝也王者不敢遺小國之臣則其臣來聘亦有接待之法亦略舉大而言皆當奉衣服而送之於王所王服之以祭祀及接賔客也大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序注奠衣服今坐上魂衣也故書廞為淫鄭司農云淫讀為廞廞陳也𤣥謂廞衣服所藏於椁中音義斂力驗反廞虛今反疏釋曰云大喪王喪其中兼小喪也復衣服謂始死招魂復魄之服案雜記云復西上注云復者多少各如其命數天子則十二人諸侯九人七人五人大夫士亦依命數人執一領天子衮冕已下上公亦皆用助祭之上服云斂衣服者小斂皆十九稱大斂則士三十稱大夫五十稱諸侯皆百稱天子蓋百二十稱注釋曰云奠衣服今坐上魂衣也者案下守祧職云遺衣服藏焉鄭云大斂之餘也至祭祀之時則出而陳於坐上則此奠衣服也云𤣥謂廞衣服所藏於槨中者此則明器之衣服亦沽而小者也典祀掌外祀之兆守皆有域掌其禁令注外祀謂所祀於四郊者域兆表之塋域疏釋曰云掌外祀之兆守皆有域掌其禁令者謂遮列不得有人來入域中故云禁令也注釋曰云所祀於四郊者域兆表之塋域者此即小宗伯所云兆五帝於四郊四類四望亦如之兆山川丘陵已下皆是典祀掌之也言兆域據壇外為溝渠為表塋域者也若以時祭祀則帥其屬而修除徴役于司隸而役之注屬其屬胥徒也修除芟掃之徵召也役之作使之疏釋曰云以時祭祀者謂天地山川祭祀皆有時也注釋曰鄭知其屬是胥徒者以其典祀身是下士其下惟有胥徒故知也不言府史者府史非役者也徵召也以其司隸主衆隸主供役使故云作使之也及祭帥其屬而守其厲禁而蹕之注鄭司農云遮列禁人不得令入音義蹕音畢遮章奢反令力呈反疏注釋曰其屬還是胥徒厲是遮列蹕是止行人故云遮列禁人不得令入也守祧掌守先王先公之廟祧其遺衣服藏焉注廟謂大祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟遺衣服大斂之餘也故書祧作濯鄭司農濯讀為祧此王者之宫而有先公謂大王以前為諸侯疏注釋曰云廟謂大祖之廟及三昭三穆者王制云天子七廟三昭三穆與大祖之廟而七又祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之有二祧享嘗乃止據周而言是知廟祧中有三昭三穆與大祖之廟也云遷主所藏曰祧者以祭法云逺廟為祧去祧為壇既言去祧為壇明遷主先入祧乃至壇耳故知祧是遷主所藏云先公之遷主藏于后稷之廟者先公謂諸盩已前不追諡為王者先公之主不可下入子孫廟故知向上入后稷廟案聘禮云不腆先君之祧既拚以俟諸侯無二祧先祖之主皆藏於大祖廟故名祧若然后稷廟藏先公不名祧者以有大祖廟名又文武已名祧故后稷不名祧也若然大王王季之主不可入文武祧亦當藏於后稷廟也云先王之遷主藏于文武之廟者當周公制禮之時文武在親廟四之內未毁不得為祧然文武雖未為祧已立其廟至後子孫文武應遷而不遷乃為祧也其立廟之法后稷廟在中央當昭者處東當穆者處西皆别為宫院者也案孔君王肅之義二祧乃是髙祖之父髙祖之祖與親廟四皆次第而遷文武為祖宗不毁矣鄭不然者以其守祧有奄八人守七廟並姜嫄廟則足矣若益二祧則十廟矣奄八人何以配之明其義非也云遺衣服大斂之餘也者案士喪禮云小斂十九稱不必盡服則小斂亦有餘衣必知據大斂之餘者小斂之餘至大斂更用之大斂餘乃留之故知其遺衣服無小斂餘也先鄭云此王者之宫而有先公謂大王以前為諸侯者謂不窋已後諸盩已前為諸侯者后稷雖不諡為王以其為始祖故祫祭在焉從先王例也若將祭祀則各以其服授尸注尸當服卒者之上服以象生時疏注釋曰尸服卒者之上服士虞禮文鄭引之者欲見天子已下凡尸皆服死者大斂之遺衣其不服者以為奠衣服故云以象生也既言卒者上服則先王之尸服衮冕先公之尸服鷩冕也若然士爵辨以助祭祭宗廟服𤣥端而士虞特牲尸不服爵辨者爵辨是助祭諸侯廟中乃服之士尸還在士廟故尸還服𤣥端為上服也曽子問云尸辨冕而出卿大夫士皆下之注云辨冕者君之先祖或有為大夫士者則是先君之先祖為士尸服卒者上服不服𤣥端而服爵辨者爵辨本以助祭在君廟君先祖雖為士今為尸還在君廟中故服爵辨不服𤣥端其廟則有司修除之其祧則守祧黝堊之注廟祭此廟也祧祭遷主有司宗伯也修除黝堊互言之有司恆主修除守祧恆主黝堊鄭司農云黝讀為幽幽黑也堊白也爾雅曰地謂之黝牆謂之堊音義黝於糾反司農音幽堊烏路反或烏洛反本或作惡同疏注釋曰云廟祭此廟也者凡廟舊皆修除黝堊祭更修除黝堊示新之敬也今將祭而云修除知祭此廟也云祧祭遷主者以遷主藏於祧故也案上司尊彝有追享鄭云追祭遷廟之主謂禱祈則此祭遷主之謂也云有司宗伯也者以其宗伯主主國祀又視滌濯修除亦是潔靜之事故知有司是宗伯為之云修除黝堊互言之者鄭以二者廟祧竝有而經廟直言修除祧直言黝堊故互而通之明皆有也是以鄭云有司恆主修除祧亦修除之守祧恆主黝堊廟亦黝堊之先鄭讀黝為幽幽是北方北方其色黑欲見地謂之幽取黑義也知堊是白者以其堊與幽黑白相對故知堊是白即掌蜃之白盛之蜃故引爾雅證之既祭則藏其隋與其服注鄭司農云隋謂神前所沃灌器名𤣥謂隋尸所祭肺脊黍稷之屬藏之以依神音義隋許恚反劉相恚反疏注釋曰案特牲少牢及曽子問皆有隋祭之事今先鄭以隋為神前沃灌器故後鄭不從也𤣥謂隋尸所祭肺脊黍稷之屬者案特牲禮祝命挼祭尸取菹㨎于醢祭于豆間佐食取黍稷肺祭授尸尸祭之注云肺祭刌肺是其隋者彼不言脊此言脊似誤所以誤有脊者特牲禮云佐食舉肺脊以授尸尸受振祭嚌之是以於此誤有脊但彼是尸食而舉者故有脊此隋祭不合有也云藏之以依神者此義與祭地瘞埋之理同故云依神也世婦掌女宫之宿戒及祭祀比其具注女宫刑女給宫中事者宿戒當給事豫告之齊戒也比次也具所濯溉及粢盛之㸑鄭司農比讀為庀庀具也音義比本亦作庀鄭毗志反注及下同司農匹氏反劉芳美反沈又上二反疏注釋曰此世婦是宫卿之官也言女宫刑女給宫中之事者古者從坐男女沒入縣官男子為奴隸女子入宫給使役故云刑女也云宿戒當給事豫告之齊戒也者此亦祭前十日戒之使齊祭前三日又宿之故宿戒並言知比具所濯溉及粢盛之㸑者濯溉粢盛皆婦人之事二十七世婦職云帥女宫而濯溉為齍盛儀禮特牲云主婦視饎㸑饎㸑亦女宫之事故知也先鄭云庀庀具也者先鄭周禮內有比皆為庀具釋之詔王后之禮事注薦徹之節疏注釋曰知此詔王后之禮事是薦徹之節者見外宗云佐王后薦徹故知詔告是薦徹籩豆之節帥六宫之人共齍盛注帥世婦女御音義齍音咨下文同疏注釋曰知帥六宫之人是世婦女御者案二十七世婦職云帥女宫為齍盛女御職云凡祭祀贊世婦鄭注云助其帥涖女宫是以知齍盛世婦女御之事也相外內宗之禮事注同姓異姓之女有爵佐后者音義相息亮反疏注釋曰鄭以同姓異姓之女有爵以解外內宗者序官云內宗凡內女之有爵者是同姓之女有爵又云外宗凡外女之有爵者是異姓之女有爵故知之也知相是佐后者外宗云佐后薦徹豆籩內宗云及以樂徹則佐傳豆籩注云佐外宗故知外內宗轉相佐后此官相之也大賔客之饗食亦如之注比帥詔相其事同疏釋曰賔客饗食王后亦有助王禮賔之法故內宰凡賔客之祼獻瑤爵皆贊注云謂王同姓及二王之後來朝覲為賔客者祼之禮亞王而禮賔獻謂王饗燕亞王獻賔也瑶爵所以亞王酬賔也是其饗有后事也彼不言食食之禮亦當有后助王之事故此言之也注釋曰此總說上文四經所云比帥詔相言雖不同其事則同故云亦如之大喪比外內命婦之朝莫哭不敬者而苛罰之注苛譴也音義莫音暮下同苛胡何反譴棄戰反疏釋曰大喪謂王喪王喪則殯後有朝夕哭事外命婦朝廷卿大夫士之妻內命婦九嬪已下以尊卑為位而哭而有不敬者則呵責罰之凡王后有􅉔事於婦人則詔相注鄭司農云謂爵婦人𤣥謂拜拜謝之也喪大記曰夫人亦拜寄公夫人於堂上疏注釋曰先鄭云謂爵婦人者此以經自為一義不連上大喪之事言爵婦人者天子命其臣后亦命其婦是爵命婦人也言王后有拜事於婦人謂受爵命之時有拜謝王后也後鄭不從者上言大喪下言后之拜事則所拜者為大喪而拜故引喪大記為證但喪大記所云者是諸侯之喪主人拜寄公於門西夫人亦拜寄公夫人於堂上其寄公與主人體敵故也明知天子之喪世子亦拜二王後於堂下后亦拜二王後夫人於堂上可知是以僖公二十四年左氏傳云宋公過鄭鄭伯問禮於皇武子武子對曰宋於周為客天子有事膰焉有喪拜焉謂王喪二王後來奔嗣王拜之明二王後夫人來弔后有拜法若然二王後夫人得冇赴王喪者或夫人家在畿內來歸寧值王喪則弔赴也凡內事有達於外官者世婦掌之注主通之使相共授疏注釋曰王后六宫之內有徵索之事須通達於外官者世婦宫卿主通之使相共給付授之也內宗掌宗廟之祭祀薦加豆籩注加爵之豆籩故書為籩豆鄭司農云謂婦人所薦杜子春云當為豆籩疏釋曰婦人無外事惟有宗廟祭祀薦加豆籩以豆籩是婦人之事故薦之注釋曰鄭知加豆籩是加爵之豆籩者以其食後稱加特牲少牢食後三獻為正獻其後皆有加爵今天子禮以尸既食后亞獻尸為加此時薦之故云加爵之豆籩即醢人籩人加豆加籩之實是也及以樂徹則佐傳豆籩注佐傳佐外宗音義傳直專反注同疏注釋曰鄭知佐外宗者見外宗云佐王后薦玉豆籩故云佐外宗也但籩豆后於神前徹之傳與外宗外宗傳與內宗內宗傳與外者故知佐傳也賔客之饗食亦如之王后有事則從大喪序哭者注次序外內宗及命婦哭王音義從才用反疏釋曰饗食賔客俱在廟饗食訖徹器與祭祀同亦后徹外內宗佐傳故云亦如之云王后有事則從者內宗於后有事皆從故以此總結之也注釋曰知次序外內宗者見外宗云大喪則敘外內朝莫哭者故知所次序有外內宗也知有命婦者上世婦職已云大喪比外內命婦之朝莫哭者故序哭中有命婦也哭諸侯亦如之凡卿大夫之喪掌其弔臨注王后弔臨諸侯而已是以言掌卿大夫云疏釋曰此諸侯來朝薨於王國王為之緦衰者也若檀弓云以爵辨純衣哭諸侯彼謂薨於本國王遙哭之則婦人不哭之婦人無外事故也注釋曰云王后弔臨諸侯而已是以言掌卿大夫云者諸侯為賔王后弔臨之卿大夫已臣輕故王后不弔故遣內宗掌弔臨之事明為后掌之若然天官世婦云掌弔臨于卿大夫之喪者彼為王故彼注云王使往弔也此后不弔臨卿大夫之喪案喪大記諸侯夫人弔臨卿大夫者諸侯臣少故也外宗掌宗廟之祭祀佐王后薦玉豆視豆籩及以樂徹亦如之注視視其實疏釋曰云佐王后薦玉豆者凡王之豆籩皆玉飾之餘文豆籩不云玉者文略皆有玉可知若然直云薦豆不云籩者以豆云玉略籩不言義可知也云視豆籩者謂在堂東未設之時視其實也云及以樂徹亦如之者亦佐后也猶仍有內宗佐傳也王后以樂羞齍則贊注贊猶佐也音義齍音咨疏釋曰羞進也齍黍稷也后進黍稷之時依樂以進之言則贊者亦佐后進之案九嬪職云凡祭祀贊玉齍贊后薦徹豆籩則薦徹俱言玉齍玉敦盛黍稷言贊不言徹則后薦而不徹也其徹諸官為之故楚茨詩云諸宰君婦廢徹不遲黍稷宰徹之若然豆籩與齍此官已贊九嬪又贊者以籩豆及黍稷器多故諸官共贊凡王后之獻亦如之注獻獻酒於尸疏釋曰云獻獻酒於尸者則朝踐饋獻及酳尸以食後酳尸亦是獻獻中可以兼之亦贊可知也王后不與則贊宗伯注后有故不與祭宗伯攝其事音義與音預注同疏注釋曰案宗伯云凡大祭祀王后不與則攝而薦徹豆籩若然宗伯非直攝其祼獻而已於后有事豆籩及簠簋等盡攝之耳小祭祀掌事賔客之事亦如之注小祭祀謂在宫中疏注釋曰知小祭祀謂在宫中者以其后無外事故知謂宫中宫中小祭祀則祭法王立七祀七祀之中行中霤司命大厲是外神后不與惟有門户竈而已案小司徒云小祭祀奉牛牲注云小祭祀王𤣥冕所祭者彼兼外神故以𤣥冕該之也云賔客之事亦如之者饗食亦掌事如小祭祀也大喪則敘外內朝莫哭者哭諸侯亦如之注內內外宗及外命婦疏注釋曰經直云外內鄭云內外宗及外命婦則內中已兼外宗外中不兼內命婦也經不云內外宗內外命婦者意欲見內是內宗舉內以見外其外中則不得舉外以見內以其內命婦九嬪敘之也故九嬪職云大喪帥敘哭者注云后哭衆乃哭是內命婦九嬪敘之故鄭亦不言內命婦也冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右注公君也圖謂畫其地形及丘壟所處而藏之先王造塋者昭居左穆居右夾處東西音義夾古洽反劉古協反疏注釋曰訓公為君者言公則諸侯之通稱言君則上通天子此既王之墓域故訓為君也云圖謂畫其地形及丘壟所處而藏之者謂未有死者之時先畫其地之形勢豫圖出其丘壟之處丘壟之言即下文丘封是也既為之圖明藏掌後須葬者依圖置之也云先王造塋者但王者之都有遷徙之法若文王居豐武王居鎬平王居於洛邑所都而葬即是造塋者也若文王在豐葬於畢子孫皆就而葬之即以文王居中文王第當穆則武王為昭居左成王為穆居右康王為昭居左昭王為穆居右已下皆然至平王東遷死葬即又是造塋者子孫據昭穆夾處東西若然兄死弟及倛為君則以兄弟為昭穆以其弟已為臣臣子一例則如父子故别昭穆也必知義然者案文二年秋八月大事於大廟躋僖公謂以惠公當昭隱公為穆桓公為昭莊公為穆閔公為昭僖公為穆今升僖公於閔公之上為昭閔公為穆故云逆祀也知不以兄弟同昭位升僖公於閔公之上為逆祀者案定公八年經云從祀先公傳曰順祀先公而祈焉若本同倫以僖公升於閔公之上則以後諸公昭穆不亂何因至定八年始云順祀乎明本以僖閔昭穆倒故於後皆亂也若然兄弟相事後事兄為君則昭穆易可知但置塋以昭穆夾處與置廟同也凡諸侯居左右以前卿大夫士居後各以其族注子孫各就其所出王以尊卑處其前後而亦併昭穆音義併薄令反疏釋曰言凡者以其非一故並卿大夫以凡之此因上而言以其王之子孫皆適為天子庶為諸侯卿大夫士若出封畿外為諸侯卿大夫士者因彼國葬而為造塋之主今言諸侯卿大夫士者謂上文先王子孫為畿內諸侯王朝卿大夫士死者則居先王前後之左右言居左右者若父為先王是昭則子為穆居右若父是穆則子為昭居左為卿大夫居後亦然但昭穆不定故左右俱言謂一父之前後左右竝有也云各以其族者謂次第假令同昭穆兄當近王墓弟則逺王墓為次第諸侯言左右卿大夫士下云各以其族互相通也注釋曰言子孫者據造塋者所生為子已後左右王之所生纍世皆是孫言以尊卑處其前後者尊謂諸侯卑謂卿大夫士云亦併昭穆者謂兄弟同倫當昭自與昭併當穆自與穆併不謂昭穆併有也凡死於兵者不入兆域注戰敗無勇投諸塋外以罰之疏注釋曰曲禮云死冦曰兵注云當饗祿其後即下文云凡有功者居前是也此是戰敗故投之塋外罰之也凡有功者居前注居王墓之前處昭穆之中央疏注釋曰云居前則不問為諸侯與卿大夫士但是有功則皆得居王墓之前以表顯之也此則曲禮云死冦曰兵兼餘功若司勳王功事功國功之等皆是也言處昭穆之中央者上云諸侯居左右已前即是昭居左穆居右今云昭穆之中央謂正當王冢前由其有功故特居中顯異之也以爵等為丘封之度與其樹數注别尊卑也王公曰丘諸臣曰封漢律曰列侯墳髙四丈關內侯以下至庶人各有差音義别彼列反疏釋曰此文自王以下皆有而云爵等為丘封之度則天子亦是爵號也雖云度與樹數天子已下無差次之文注釋曰云别尊卑者尊者丘髙而樹多卑者封下而樹少故云别尊卑也鄭知王公曰丘諸臣曰封者此無正文爾雅云土之髙者曰丘髙丘曰阜是自然之物故屬之王公也聚土曰封人所造故屬之諸臣若然則公中可以兼五等也鄭引漢律者周禮丘封髙下樹木之數無文以漢法況之也若然案春秋緯云天子墳髙三仞樹以松諸侯半之樹以柏大夫八尺樹以藥草士四尺樹以槐庶人無墳樹以楊栁鄭不引之者以春秋緯或說異代多與周禮乖故不引或鄭所不見也王制云庶人不封不樹而春秋緯云庶人樹以楊栁者以庶人禮所不制故樹楊栁也大喪既有日請度甫竁遂為之尸注甫始也請量度所始竁之處地為尸者成葬為祭墓地之尸也鄭司農云既有日既有葬日也始竁時祭以告后土冢人為之尸音義度待洛反注量度同疏釋曰大喪謂王喪有日謂葬日天子十月而葬葬用下旬云請度甫竁者謂冢人請於冢宰量度始穿地之處也言遂為尸者因事曰遂初請量度至葬訖祭墓故冢人遂為尸也注釋曰先鄭以遂為之尸據始穿地時祭墓地冢人為之尸後鄭據始穿地無祭事至葬訖成墓乃始祭墓故冢人為尸不從先鄭者見小宗伯云卜葬兆甫竁哭之又云既葬詔相喪祭之禮喪祭謂虞祔下乃云成葬而祭墓為位據彼文則初穿地時無祭墓地之事葬訖乃有祭墓地即此遂為之尸一也故後鄭不從先鄭若然引之在下者小宗伯雖無初祭墓地之事亦得通一義故引之在下及竁以度為丘隧共喪之窆器注隧羡道也度丘與羡道廣袤所至窆器下棺豐碑之屬喪大記曰凡封用綍去碑負引君封以衡大夫以咸音義窆彼驗反又補鄧反去起吕反咸本又作緘同古鹹反疏釋曰上經已甫竁祭墓訖此經復云及竁以度為丘隧者此更本初欲竁之時先量度作丘作隧道之處廣狹長短故文重耳注釋曰案僖二十五年左氏傳云晉文公請隧不許王曰未有代德而有二王則天子有隧諸侯已下有羡道隧與羡異者隧道則上有負土謂若鄭莊公與母掘地隧而相見者也羡道上無負土若然隧與羡别而鄭云隧羡道者對則異散則通故鄭舉羡為況也云下棺豐碑之屬者此按檀弓公肩假云公室視豐碑三家視桓楹注云豐大也天子斫大木為碑形如石碑前後重鹿盧是大碑之事言之屬者仍有六繂之等故引喪大記也凡封者封即窆謂下棺云執紼去碑負引者謂天子千人分執六紼諸侯五百人分執四紼其棺當於壙上執紼者皆負紼背碑以鼓為節而下之云君封以衡大夫以咸者衡橫也謂以木橫之於棺傍乃以紼繫木下棺大夫以咸者大夫卑不得以木橫之直有棺傍咸耳以紼繫之而下棺也彼諸侯及大夫法但天子無文故引之以為證天子之法耳及葬言鸞車象人注鸞車巾車所飾遣車也亦設鸞旗鄭司農云象人謂以芻為人言言問其不如法度者𤣥謂言猶語也語之者告當行若於生存者於是巾車行之孔子謂為芻靈者善謂為俑者不仁非作象人者不殆於用生乎音義巾如字劉居覲反語魚據反下同俑音勇疏釋曰及至也謂至葬冢人語巾車之官將明器鸞車及象人使行向壙注釋曰云鸞車巾車所飾遣車也者巾車職云大喪飾遣車遣車則明器遣送死者之車也云亦設鸞旗者以其遣車有鸞和之鈴兼有旌旗經直云鸞車不言鸞旗故鄭言之以其旌旗在車所建故知有車亦有旗先鄭云象人謂以芻為人者後鄭不從以其上古有芻人至周不用而用象人則象人與芻靈别也云言言問其不如法度者此後鄭亦不從以其臨葬不得始問其不如法度𤣥謂語之者吾當行若於生存者於是巾車行之者遣車之數依檀弓云諸侯七乘大夫五乘鄭云天子九乘遣車所載所苞大遣奠大夫苞五個諸侯七個天子當九個令向壙巾車抱之而行也云孔子謂為芻靈者善謂為俑者不仁非作象人者不殆於用生乎者此檀弓文彼鄭云俑偶人也謂以為木人與生人相對偶有似於人此則不仁又云非作象人不殆於用生乎哉是記人釋孔子語殆近也言用象人不近於生人乎是孔子善古而非周人也鄭引此者欲破先鄭以芻靈與象人為一若然則古時有塗車芻靈至周仍存塗車惟改芻靈為象人及窆執斧以涖注臨下棺也音義涖音利又音類疏釋曰案鄉師云執斧以涖匠師則此亦臨匠師兩官俱臨者葬事大故二官共臨也遂入藏凶器注凶器明器疏注釋曰因上文窆下棺訖即遂入壙藏明器明器即檀弓云木不成斫瓦不成味琴瑟張而不平笙竽備而不和神明死者之器者也正墓位蹕墓域守墓禁注位謂丘封所居前後也禁所為塋限疏釋曰墓位即上文昭穆為左右是須正之使不失本位墓域即上文兆域是也謂四畔溝兆蹕謂止行人不得近之守墓禁謂禁制不得漫入也注釋曰云丘封所居前後者即上文為諸侯及有功者居前為卿大夫士者居後是也云禁所為塋限者謂禁者以塋域為限而禁之凡祭墓為尸注祭墓為尸或禱祈焉鄭司農云為尸冢人為尸疏注釋曰後鄭知此祭墓為禱祈者上文遂為尸是墓新成祭后土此文云凡非一故知謂禱祈也先鄭云為尸冡人為尸者上文祭墓謂始穿地時此文據成墓為尸後鄭以此亦得通一義故引之在下是以禮記檀弓云有司舍奠於墓左彼是成墓所祭亦引此凡祭墓為尸證成墓之事也凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁疏釋曰上文惟見王及子孫之墓地不見同姓異姓諸侯之墓地故此經總見之若然此墓地舊有兆域今新死者隨即授之耳墓大夫掌凡邦墓之地域為之圖注凡邦中之墓地萬民所葬地疏注釋曰鄭知邦中之墓地是萬民葬地者以其冢人掌王墓地下文云令國民族葬非有爵者故知經邦墓是萬民若然下文掌其度數鄭云度數爵等之大小而見有爵者謂本為庶人設墓其有子孫為卿大夫士其葬不離父祖故兼見卿大夫士也令國民族葬而掌其禁令注族葬各從其親疏注釋曰經云族葬則據五服之內親者共為一所而葬異族即别塋知族是五服之內者見左傳哭諸侯之例云異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟故知族是服內是以鄭云各從其親也正其位掌其度數注位謂昭穆也度數爵等之大小疏注釋曰凡萬民墓地亦如上文豫有昭穆為左右故云正其位云度數爵等之大小者亦如冢人云丘封之度與其樹數也使皆有私地域注古者萬民墓地同處分其地使各有區域得以族葬使相容疏注釋曰知古者墓地同處者上文云族葬是同處云使相容者釋經私地域也凡爭墓地者聽其獄訟注爭墓地相侵區域帥其屬而巡墓厲居其中之室以守之注厲塋限遮列處鄭司農云居其中之室有官寺在墓中疏釋曰云帥其屬者墓大夫帥下屬官也云巡墓厲者謂墓大夫帥其屬巡行遮列之處云居其中之室以守之者謂萬民墓地於族葬地中央為室而萬民各自守之注先鄭云官寺寺則室也職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事注國之喪禮喪服士喪既夕士虞今存者其餘則亡事謂小斂大斂葬也疏釋曰言諸侯者謂畿內王子母弟得稱諸侯者若司裘云諸侯共熊侯豹侯者也言凡有爵者還是卿大夫士言凡以該之耳云序其事者謂若襲斂殯葬先後之事注釋曰云國之喪禮喪服士喪既夕士虞今存者此據儀禮之內見在者而言故云今存者但士喪禮始死時事既夕葬時事士虞葬訖及日中而虞事也云其餘則亡者但儀禮本事義三千條其時有天子諸侯卿大夫士喪與既夕及虞卒哭與祔小祥大祥禮皆有遭暴秦而亡漢興惟得十七篇髙堂生所傳即今儀禮是也故云其餘則亡云事謂小斂大斂葬也者舉大事而言其間仍有襲事亦掌之下文别見祭故此不兼也凡國有司以王命有事焉則詔贊主人注有事謂含襚贈賵之屬詔贊者以告主人佐其受之鄭司農云凡國謂諸侯國有司謂王有司也以王命有事職喪主詔贊主人𤣥謂凡國有司有司從王國以王命往音義賵芳鳯反疏注釋曰知有事謂含襚贈賵之屬者春秋云王使榮叔歸含且賵又兩小傳皆言衣被曰襚貨財曰賻車馬曰賵珠玉曰含明知有含襚贈賵之屬又案士喪禮兼有贈賵無常惟玩好是也不言賻者賻施於生者故亦不言也先鄭云凡國謂諸侯國有司謂王有司也後鄭不從者下文云公有司豈得公分之為諸侯有司為王有司乎明此國有司亦不得分之也故後鄭云國有司有司從王國以王命往向喪家者也凡其喪祭詔其號治其禮注鄭司農云號謂諡號𤣥謂告以牲號齍號之屬當以祝之音義齍音咨疏釋曰喪祭餘文皆為虞此言凡者以其喪中自相對則虞為喪祭卒哭為吉祭若對二十八月為吉祭則祥禫已前皆是喪祭故言凡以該之是以鄭亦不言喪祭為虞也云治其禮者案大宗伯亦云治其禮鄭云謂簡習其事此治其禮義亦然也注釋曰先鄭云號謂諡號後鄭不從者小宗伯云小喪賜諡讀誄不在此故後鄭云告以牲號齍號之屬當以祝之有牲號齍號謂若特牲少牢云柔毛剛鬛嘉薦普淖皆是祝辭故云當以祝之也凡公有司之所共職喪令之趣其事注令令其當供物者給事之期也有司或言公或言國言國者由其君所來居其官曰公謂王遣使奉命有贈之物各從其官出職喪當催督也疏注釋曰云令令其當供物者給事之期也者此謂諸官依法合供給喪家者不待王命職喪依式令之使相供云有司或言公或言國言國者由其君所來者解稱國之意君則王也云居其官曰公者謂不須王命自居其官之職往供則曰公公謂官之常職也周禮注疏卷二十一周禮注疏卷二十一考證典命凡諸侯之適子疏其饔餼饗食一與卿同也監本脫食字今据聘禮補之司服注祭祀視朝甸凶弔之事衣服各有所用臣松齡按甸上疑當有兵字凡兵事韋辨服疏以韋為冕又以為服冕當作辨公之服自衮冕而下如王之服疏諸侯非二王後其餘皆𤣥冕祭於己祭監本訛服今据玉藻改正守祧既祭則藏其隋與其服疏案特牲禮祝命挼祭尸取菹㨎于醢監本祝訛祀挼訛授㨎訛梗今据特牲禮經文改正世婦凡王后有􅉔事於婦人則詔相􅉔古拜字監本訛作摻石經訛作􅉔今改正周禮注疏卷二十一考證
