body:
  text: 周禮注疏卷二十三漢鄭氏注唐陸徳明音義賈公彦疏樂師掌國學之政以敎國子小舞注謂以年幼少時敎之舞内則曰十三舞勺成童舞象二十舞大夏音義少詩照反勺章略反疏釋曰此樂師教小舞即下文帗舞已下是也此言小舞對大司樂教雲門已下為大舞也注釋曰云謂以年幼少時教之舞者對二十已後學大舞鄭知者所引内則文是也云十三舞勺者按彼上文云十年岀就外𫝊又云十三舞勺勺即周頌酌序云酌告成大武也言能酌先祖之道以養天下也鄭注云周公居攝六年所作是也云成童舞象者即周頌序云維淸奏象舞也注云象舞象用兵時刺伐之舞武王制焉是也此皆詩詩為樂章與舞人為節故以詩為舞也此勺與象皆小舞所用幼少時學之也云二十舞大夏者人年二十加冠成人而舞大夏大夏夏禹之舞雖舉大夏其實雲門已下六舞皆學以其自夏已上揖讓而得天下自夏以下征伐而得天下夏為文武中故特舉之可以兼前後也凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞注故書皇作䍿鄭司農云帗舞者全羽羽舞者析羽皇舞者以羽冒覆頭上衣師翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞社稷以帗宗廟以羽四方以皇辟廱以旄兵事以干星辰以人舞䍿讀為皇書亦或為皇𤣥謂帗析五采繒今靈星舞子持之是也皇雜五采羽如鳳皇色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇音義帗音拂一音弗䍿音皇析星歴反下同氂舊音毛劉音來沈音狸或音茅字或作犛或作斄皆同暵呼旦反疏釋曰此六舞者即小舞也若天地宗廟正祭用大舞即上分樂序之是也此小舞按舞師亦陳此小舞云敎皇舞帥而舞旱暵之事即皆據祈請時所用也注釋曰故書皇作䍿鄭司農破䍿為皇也先鄭云帗舞者全羽者先鄭意以司常有全羽為旞析羽為旌相對即以此帗舞為全羽羽舞為析羽相對觧之後鄭破帗舞不破羽舞也云皇舞以羽冒覆頭上衣飾翡翠之羽者此後鄭亦不從之云旄舞者氂牛之尾者按山海經云潘侯之山有獸如牛而節有毛其名曰旄牛注云今旄牛髀脚胡尾皆有長毛故先鄭據而言之云干舞者兵舞者此有干舞舞師有兵舞先鄭以干戈兵事所用故以干舞為兵舞後鄭亦從之也云人舞者手舞者後鄭亦從之矣自社稷以帗已下至星辰以人舞後鄭從其二不從其四者社稷以帗依舞師辟廱以旄以無正文後鄭從之後鄭云帗析五采繒不從司農者若今者可以言古以漢時有靈星舞子持之而舞故知帗舞亦析五色繒為之也云皇雜五采羽如鳳皇色持以舞者按山海經鳳皇出丹穴山形似鶴首文曰徳背文曰義翼文曰順腹文曰信膺文曰仁又按京房易傳云鳳皇麟前鹿後蛇頸龜背魚尾雞喙鷰翼五采髙二尺漢世鳳皇數出五色今皇舞與鳳皇之字同明雜以五采羽如鳳皇色持之以舞故不從先鄭以羽覆頭上衣飾翡翠之羽也云人舞無所執以手袖為威儀者此就足先鄭手舞手舞用袖為威儀也云四方以羽者依舞師云宗廟以人者雖無文宗廟是人鬼故知用人也云山川以干者干舞即兵舞舞師云教兵舞帥而舞山川之祭祀是也旱暵以皇亦依舞師也教樂儀行以肆夏趨以采齊車亦如之環拜以鍾鼓爲節注教樂儀敎王以樂出入於大寢朝廷之儀故書趨作跢鄭司農云跢當為趨書亦或為趨肆夏采齊皆樂名或曰皆逸詩謂人君行歩以肆夏為節趨疾於歩則以采齊為節若今時行禮於太學罷出以鼓陔為節環謂旋也拜直拜也𤣥謂行者謂於大寢之中趨謂於朝廷爾雅曰堂上謂之行門外謂之趨然則王出既服至堂而肆夏作出路門而采齊作其反入至應門路門亦如之此謂歩迎賓客王如有車出之事登車於大寢西階之前反降於阼階之前尚書傳曰天子将出撞黄鍾之鍾右五鍾皆應入則撞蕤賓之鍾左五鍾皆應大師於是奏樂音義趨劉清須反齊本又作薺才私反朝直揺反下同跢倉注反陔改才反撞直江反疏釋曰此王行迎賓若春夏受贄於朝無迎灋受享於廟則迎之若秋冬一受之於廟竝無迎灋若饗食在廟燕在寢則皆有迎灋若然鄭此注據大寢而言則是燕時若饗食在廟則與此大寝同也注釋曰鄭知教王以樂出入於大寝之儀者此經先言行後言趨又云環拜據從内向外而言是出時也禮記玉藻云趨以采薺行以肆夏先言趨後言行據從外向内是入時也樂節是同故鄭出入並言也先鄭云肆夏采齊皆樂名者按襄四年穆叔如晉晉侯饗之金奏肆夏杜亦云肆夏樂曲名按鍾師注九夏皆歌之大者載在樂章樂崩從而亡以此言之肆夏亦詩篇名先鄭云或曰皆逸詩得通一義也按玉藻注齊讀如楚茨之茨此齊讀亦從茨可知𤣥謂引爾雅者證行是門内趨是門外之事也按爾雅云室中謂之時堂上謂之行堂下謂之歩門外謂之趨中庭謂之走大路謂之奔但庭中走大路奔據助祭者而言故詩云駿奔走在廟也今總言行者謂大寢之中不言堂下歩者人之行必由堂下始歩與行小異大同故略歩而言其行也云然則王出既服至堂而肆夏作者是行以肆夏出路門而采齊作是趨以采齊也云其反入至應門路門亦如之者反入至應門即是路門外當奏采齊也入至路門即是門内行以肆夏也但王有五門外仍有臯庫雉三門經不言樂節鄭亦不言故但據路門外内而言若以義量之既言趨以采齊即門外謂之趨可總該五門之外皆於庭中遙奏采齊矣云此謂歩迎賓客者以其言行與趨是歩迎之灋可知也云王如有車出之事者則經車亦如之是也但車無行趨之灋亦如門外奏采齊門内奏肆夏鄭知有登車於大寝西階之前反降於阼階之前者以書傳云天子將出撞黄鍾之鍾明知出入升降皆在階前可知出必撞黄鍾之鍾者黄鍾在子是陽生之月黄鍾又陽聲之首陽主動出而撞之云右五鍾者謂林鍾至應鍾右是陰隂主静恐王大動故以右五鍾應黄鍾是動以告静者云入則撞蕤賓之鍾左五鍾皆應者蕤賓在午五月陰生之月隂主静入亦是静故撞蕤賓之鍾左五鍾謂大呂至中呂左是陽陽主動入静以告動也云大師於是奏樂者謂王有此出入之時則大師於時奏此采齊肆夏也按曲禮云國君下卿位彼注云出過之而上車入未至而下車彼謂諸侯禮與天子禮異不得升降於階前也凡射王以騶虞為節諸侯以貍首為節大夫以采蘋爲節士以采蘩爲節注騶虞采蘋采蘩皆樂章名在國風召南惟貍首在樂記射義曰騶虞者樂官備也貍首者樂㑹時也采蘋者樂循灋也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹為節卿大夫以循灋為節士以不失職為節鄭司農説以大射禮曰樂正命大師曰奏貍首間若一大師不興許諾樂正反位奏貍首以射貍首曾孫音義蘋音頻蘩音煩疏釋曰凡此為節之等者無問尊卑人皆四矢射節則不同故射人云天子九節諸侯七節大夫士皆五節尊卑皆以四節為乗矢拾發其餘天子五節諸侯三節大夫士一節皆以為先以聼先聼未射之時作之使射者預聼知射之樂節以其射灋須其體比於禮其節比於樂而中多者乃得預於祭故須預聼但優尊者故射前節多也注釋曰鄭知云騶虞采蘋采蘩皆樂章名者以其詩為樂章故也云在國風召南者見闗雎已下為周南鵲巢已下為召南三篇見在召南卷内也云惟貍首在樂記者按樂記云左射貍首右射騶虞是也按射義亦云貍首曰曾孫侯氏四正具舉小大莫處御於君所不引之者鄭略引其一以證耳云射義已下者證用此篇之義也先鄭引大射者證大師用樂節之事云間若一者謂七節五節之間緩急稀稠如一彼諸侯禮故有樂正命大師此天子禮故樂師命大師也云貍首曾孫者貍首是篇名曾孫章頭即射義所云是也凡樂掌其序事治其樂政注序事次序用樂之事疏釋曰云凡樂者謂凡用樂之時也云掌其序事者謂陳列樂噐及作之次第皆序之使不錯繆云治其樂政者謂治理樂聲使得其正不滛放也凡國之小事用樂者令奏鍾鼓注小事小祭祀之事疏釋曰此小事鄭云小祭祀之事謂王𤣥冕所祭皆有鍾鼓樂師令之若大次二者之樂則天地及宗廟大司樂令之也此小祭有鍾鼓但無舞故舞師云小祭祀不興舞是也凡樂成則告備注成謂所奏一竟書曰簫韶九成燕禮曰大師告于樂正曰正歌備疏注釋曰云成謂所奏一竟者竟則終也所奏八音俱作一曲終則為一成則樂師告備如是者六則六成餘八變九變亦然故鄭引書簫韶九成為證也又云燕禮者欲見彼諸侯燕禮大師告於樂正樂正告於賓與君此天子祭禮亦大師於樂成之時告樂師樂師乃告王彼據燕禮此據祭禮事節相當故引為證也詔來瞽臯舞注鄭司農云瞽當為鼓臯當為告呼擊鼔者又告當舞者持鼔與舞俱來也鼔字或作瞽詔來瞽或曰來勅也勅爾瞽率爾衆工奏爾悲誦肅肅雍雍毋怠毋凶𤣥謂詔來瞽詔眡瞭扶瞽者來入也臯之言號告國子當舞者舞音義毋音無下同瞭音了疏釋曰倒讀之云詔瞽來謂詔告眡瞭扶瞽人來入升堂作樂也臯舞者謂號呼國子舞者使當舞注釋曰先鄭破瞽為鼔後鄭從字或為瞽於義是但文不足後鄭増成之耳云或曰來勅已下但瞽人無目而云勅爾瞽率爾衆工於義不可且奏爾悲誦等似逸詩不知何從而出故後鄭不從之𤣥謂詔來瞽者以來為入按大祝云來瞽令臯舞注云來嘷者皆謂呼之入彼來為呼之者以彼來上無詔字故以來為呼之義與此無異也及徹帥學士而歌徹注學士國子也鄭司農云謂將徹之時自有樂故帥學士而歌徹𤣥謂徹者歌雍雍在周頌臣工之什疏釋曰此亦文承祭祀之下亦謂祭末至徹祭噐之時樂師帥學士而歌徹但學士主舞瞽人主歌今云帥學士而歌徹者此絶讀之然後合義歌徹之時歌舞俱有謂帥學士使之舞歌者自是瞽人歌雍詩也徹者主宰君婦耳注釋曰鄭云學士國子也者此學士即下大胥職云掌學士之版以待致諸子故知學士是國子國子即諸子是也𤣥謂徹者歌雍者見論語云三家者以雍徹孔子云相維辟公天子穆穆奚取於三家之堂若然皆要辟公助祭并天子之容穆穆乃可用雍詩徹祭噐是大夫及諸侯皆不得用雍故知此云歌徹者歌雍詩也又云雍在周頌臣工之什者從清廟已下皆周頌但此雍在臣工之什内云之什者謂聚十篇為一卷故云之什也令相注令眡瞭扶工鄭司農云告當相瞽師者言當罷也瞽師盲者皆有相道之者故師冕見及階曰階也及席曰席也皆坐曰某在斯某在斯曰相師之道與音義相息亮反注及下同見賢遍反下注同疏注釋曰此令相之文在祭祀歌徹之下者欲見大小祭祀皆有令相之事故於下總結之鄭知令相令眡瞭扶工者見儀禮扶工者皆稱相以其瞽人無目而稱工故云令眡瞭扶工也先鄭引論語者亦見相是扶工也饗食諸侯序其樂事令奏鍾鼓令相如祭之儀音義食音嗣下注疏食同凡言饗食皆放此疏釋曰言如祭之儀者非直序樂令鍾鼓令相其中詔來瞽歌徹等皆如之但祭祀歌雍而徹饗食徹噐亦歌雍知者下大師與此文皆云大饗亦如祭祀登歌下管故知皆同也燕射帥射夫以弓矢舞注射夫衆耦也故書燕為舞帥為率射夫為射矢鄭司農云舞當為燕率當為帥射矢書亦或為射夫疏注釋曰凡射有三番又天子六耦畿内諸侯四耦畿外諸侯三耦前番直六耦三耦等射所以誘射故也第二番六耦與衆耦俱射第三番又兼作樂經直云射夫鄭知衆耦者以其三番射皆弓矢舞若言六耦等不兼衆耦若言衆耦則兼三耦故鄭據衆耦而言也言以弓矢舞謂射時執弓挾矢及發矢其體比於禮其節比於樂節相應於樂節也樂出入令奏鍾鼓注樂出入謂笙歌舞者及其噐疏注釋曰鄭知樂是笙歌已下者按禮樂記單出曰聲雜比曰音又云雜以干戚羽毛謂之樂凡此笙并瞽人歌者及國子舞者及噐皆湏出入故知樂中兼此數事也凡軍大獻敎愷歌遂倡之注故書倡為昌鄭司農云樂師主倡也昌當為倡書亦或為倡音義倡昌亮反疏釋曰軍事言凡者有大軍旅王自行小軍旅遣臣法故言凡以該之云大獻者謂師克勝獻捷於祖廟也云教愷歌者愷謂愷詩師還未至之時預教瞽矇入祖廟遂使樂師倡道為之故云遂倡之凡喪陳樂噐則帥樂官注帥樂官往陳之疏釋曰喪言凡者王家有大䘮小喪皆有明噐之樂噐故亦言凡以該之明噐之樂噐者謂若檀弓云木不成斲瓦不成味琴瑟張而不平竽笙備而不和是也注釋曰樂官亦謂笙師鎛師之屬廞樂藏之者也云往陳之者謂如既夕禮陳噐於祖廟之前庭及壙道東者也及序哭亦如之注哭此樂噐亦帥之疏注釋曰按小宗伯云及執事眡葬獻噐遂哭之注云至将葬獻明噐之材又獻素獻成皆於殯門外王不親哭有官代之彼據未葬獻材時小宗伯哭之此序哭明噐之樂噐文承陳樂噐之下而云序哭謂使人持此樂噐向壙及入壙之時序哭之也凡樂官掌其政令聽其治訟音義治直吏反疏釋曰凡樂官謂此已下大胥至司干皆無聽訟之事則皆樂師聽之耳大胥掌學士之版以待致諸子注鄭司農云學士謂卿大夫諸子學舞者版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則按此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關内侯到五大夫子先取適子高七尺已上年十二到年三十顔色和順身體脩治者以為舞人與古用卿大夫子同義音義版音板酎直救反適丁歴反上時掌反下六上同疏注釋曰先鄭知學士謂卿大夫諸子者按夏官諸子職云掌國子之倅則國中兼有元士之適子不言之以其漢灋卑者之子不得舞宗廟之酎則元士之子不入故知卿大夫之諸子也知學舞者下云入學合舞故知也云不得舞宗廟之酎者按月令四月云天子與羣臣飲酎鄭注云酎之言醇謂重釀之酒春酒至此始成此酎以宗廟言之謂重釀之酒祭宗廟而用之祭末有相飲之灋云除吏二千石已下在前漢紀注云漢承秦爵二十等五大夫九爵闗内侯十九爵列侯二十爵宗廟舞人用貴人子弟與周同故先鄭引以為證也既云取七尺以上而云十二到三十則十二者誤當云二十至三十何者按鄉大夫職云國中自七尺以及六十野自六尺以及六十有五皆征之按韓詩二十從役與國中七尺同是七尺為二十矣眀不得為十二也春入學舍采合舞注春始以學士入學宮而學之合舞等其進退使應節奏鄭司農云舍采謂舞者皆持芬香之采或曰古者士見於君以雉為贄見於師以菜為摯采直謂疏食菜羮之菜或曰學者皆人君卿大夫之子衣服采飾舍采者減損觧釋盛服以下其師也月令仲春之月上丁命樂正習舞釋采仲丁又命樂正入學習樂𤣥謂舍即釋也采讀為菜始入學必釋菜禮先師也菜蘋蘩之屬音義舎音釋采音菜注同疏所居反劉音蘇下戸嫁反疏注釋曰云春始以學士入學者歳初貴始云學宮者則文王世子云春誦夏弦皆於東序是也云合舞等其進退使應節奏者謂等其舞者或進或退周旋使應八音奏樂之節合也按月令注春合舞者象物出地鼓舞也先鄭觧舎采三家之説後鄭皆不從者按王制有釋菜奠幣文王世子又云始立學釋菜不舞不授噐舍即釋也采即菜也故以為學子始入學必釋菜禮先師也但學子始入學釋菜禮輕故不及先聖也其先師者鄭注文王世子云若漢禮有高堂生樂有制氏詩有毛公書有伏生知菜是蘋蘩之屬者詩有采蘋采蘩皆菜名言之屬者周禮又有芹茆之等亦菜名也秋頒學合聲注春使之學秋頒其才藝所為合聲亦等其曲折使應節奏音義折之設反疏釋曰春物生之時學子入學秋物成之時頒分也分其才藝高下故鄭云春使之學秋頒其才藝所為也云合聲者春為陽陽主動舞亦動春合舞象物出地鼓舞秋為陰陰主静聲亦静故秋合聲象秋静也但舞與聲遞相合故鄭云合聲亦等其曲折使應節奏也以六樂之㑹正舞位注大同六樂之節奏正其位使相應也言為大合樂習之音義為于偽反疏釋曰六樂者即六代之樂六舞雲門之等是也注釋曰云大同者觧經中㑹㑹合即大同也云大同六樂之節奏者謂六代之舞一一作之使節奏大同而無錯謬故云正其位使相應也云為大合樂習之者按月令仲春上丁命樂正習舞釋菜季春云大合樂則此云六樂之會為季春大合樂習之也若然此六樂之會與上春入學舎采合舞者别矣按文王世子云凡大合樂必遂養老注大合樂謂春入學舍菜合舞秋頒學合聲則是合舞合聲與大合樂又為一者季春大合樂與合舞合聲實别但春合舞秋合聲對春大合樂不為大然於四時而言亦為大合樂何者文王世子云凡大合樂必遂養老其中舍有合舞合聲必知舍此二者以其言凡非一按月令仲春習舞釋菜天子親往視之季春云大合樂天子親往視之至仲春合聲雖不云天子親往視之視之可知若然三者天子親往視之同則皆有養老之事則春合舞秋合聲皆得為大合樂文王世子以大合樂為合舞合聲觧之也以序出入舞者注以長幼次之使出入不紕錯音義紕匹毗反劉博雞反疏注釋曰凡在學皆以長幼為齒令為舞者八八六十四人所湏為舞之處皆當以長幼出入若使幼者在前則為紕錯故云使出入不紕錯也比樂官注比猶校也杜子春云次比樂官也鄭大夫讀比為庀庀具也録具樂官音義比劉如字下同杜毗志反鄭大夫匹婢反庀匹婢反疏注釋曰杜子春云次比樂官也與後鄭同鄭大夫以比為庀録具樂官者雖與後鄭不同得為一義故引之在下也展樂器注展謂陳數之音義數所主反疏注釋曰樂噐謂鼓鐘笙磬柷敔之等皆當陳列校數凡祭祀之用樂者以鼓徴學士注擊鼓以召之文王世子曰大昕鼓徴所以警衆音義昕音欣疏釋曰祭祀言凢者則天地宗廟之祀用樂舞之處以鼓召學士選之當舞者往舞焉舞師云小祭祀不興舞注云小祭祀王𤣥冕所祭則亦不徵學士也序宮中之事小胥掌學士之徴令而比之觵其不敬者注比猶校也不敬謂慢期不時至也觵罰爵也詩云兕觵其觩音義觵古横反本或作觥同兕徐履反觩巨樛反疏釋曰大胥掌學士之版以待召聚舞者小胥贊大胥為徵令校比之知其在不仍觥其不敬者也注釋曰引詩者是周頌絲衣之篇祭末飲酒恐有過矢故設罰爵其時無犯非禮角爵觩然陳設而已引之者證觥是罰爵也廵舞列而撻其怠慢者注撻猶抶也抶以荆扑音義撻吐達反抶勅乙反又勅栗反扑普卜反疏注釋曰按文十八年齊懿公為公子也與邴歜之父争田不勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乗公遊於申池二人浴于池歜以扑抶職職怒歜曰人奪汝妻而不怒一抶汝庸何傷是抶為撻以荆故云扑也正樂縣之位王宮縣諸侯軒縣卿大夫判縣士犆縣辨其聲注樂縣謂鍾磬之屬縣於筍簴者鄭司農云宮縣四面縣軒縣去其一面判縣又去其一面犆縣又去其一面四面象宮室四面有牆故謂之宮縣軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯之禮也故曰惟器與名不可以假人𤣥謂軒縣去南靣辟王也判縣左右之合又空北靣犆縣縣於東方或於階間而已音義犆音特本亦作特筍息允反簴音巨去起呂反下同繁歩干反朝直遙反辟音避疏注釋曰云樂懸謂鍾磬之屬縣於筍虡者凢縣者通有鼔鑮亦縣之鄭直云鍾磬者據下成文而言先鄭云軒縣判縣特縣皆直云去一面不辯所去之靣故後鄭増成之也所引春秋傳者按成二年左氏傳云衞孫良夫将侵齊與齊師遇敗仲叔于奚救孫桓子桓子是以免既衞人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑惟噐與名不可以假人注云諸侯軒縣闕南方形如車輿是曲也引之者證軒為曲義也𤣥謂軒縣去南靣避王也若然則諸侯軒縣三靣皆闕南靣是以大射云樂人宿縣于阼階東笙磬西靣其南笙鍾其南鑮皆南陳西階之西頌磬東靣其南鍾其南鑮皆南陳又云一建鼓在西階之東南靣注云言面者國君於其臣備三靣爾無鐘磬有鼓而已其為諸侯則軒縣是其去南靣之事也以諸侯大射於臣備三靣惟有鼔則大夫全去北靣為判縣可知云特縣縣於東方或於階間而已者按鄉飲酒記云磬階間縮霤注云縮從也霤以東西為從是其階間也按鄉射云縣於洗東北西面注云此縣謂縣磬也縣於東方避射位也是其東方也云而已者言其少耳凡縣鍾磬半為堵全為肆注鍾磬者編縣之二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬士亦半天子之士縣磬而已鄭司農云以春秋傳曰歌鍾二肆音義堵丁古反疏釋曰云凡縣鍾磬總目語也所縣者則半之為堵全之為肆是也云堵者若牆之一堵肆者行肆之名二物乃可為肆半者一堵半其一肆故云半為堵全為肆也注釋曰經直言鍾磬不言鼓鎛者周人縣鼓與鎛之大鍾惟縣一而已不編縣故不言之其十二辰頭之零鍾亦縣一而已今所言縣鍾磬者謂編縣之二八十六枚共在一虡者也鄭必知有十六枚在一虡者按左氏隱五年考仲子之宮初獻六羽衆仲云夫舞所以節八音而行八風故以八為數樂縣之灋取數於此又倍之為十六若漏刻四十八箭亦倍十二月二十四氣故以十六為數也是以淮南子云樂生於風亦是取數於八風之義也按昭二十年晏子云六律七音服注云七律為七器音黄鍾為宮林鍾為徴大蔟為商南呂為羽姑洗為角應鍾為變宮蕤賔為變徴外傳云武王克商嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿鶉火及天駟七列也南北之揆七月也鳬氏為鍾以律計自倍半一縣十九鍾鍾七律十二縣二百二十八鍾為八十四律此一歲之閏數此服以音定之以一縣十九鍾十二鍾當一月十二月十二辰辰加七律之鍾則十九鍾一月有七律當一月之小餘十二月八十四小餘故云一歲之閏數按大射笙磬西面頌磬東靣皆云其南鍾其南鑮北方直有鼓無鍾磬避射位則三靣鍾磐鎛天子宮縣四靣鍾磬鎛而已不見有十二縣服氏云十二縣非鄭義也云半之者謂諸侯之卿大夫士也又云諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬者天子諸侯縣皆有鎛今以諸侯之卿大夫士半天子之卿大夫士言之則卿大夫士直有鍾磬無鎛也若有鎛不得半之耳必知諸侯卿大夫分鍾磬為東西者以其諸侯卿大夫亦稱判縣故知諸侯卿大夫以天子卿大夫判縣之一肆分為西東也云士亦半天子之士者天子之士直有東方一肆二堵諸侯之士半之謂取一堵或於階間或於東方也先鄭引春秋者㐮十一年鄭賂晉侯歌鍾二肆晋侯以樂之半賜魏絳魏絳於是乎始有金石之樂禮也按彼鄭賂晋侯止有二肆當天子卿大夫判縣故取半賜魏絳魏絳得之分為左右故云始有金石之樂引之者證諸侯之卿大夫判縣有鍾磬之義也大師掌六律六同以合陰陽之聲陽聲黄鍾大蔟姑洗蕤賓夷則無射陰聲大呂應鍾南呂函鍾小呂夾鍾皆文之以五聲宮商角徴羽皆播之以八音金石土革絲木匏竹注以合陰陽之聲者聲之隂陽各有合黄鍾子之氣也十一月建焉而辰在星紀大呂丑之氣也十二月建焉而辰在𤣥枵大蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南呂酉之氣也八月建焉而辰在夀星蕤賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中呂巳之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以陰陽六體為之黄鍾初九也下生林鍾之初六林鍾又上生大蔟之九二大蔟又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又下生大呂之六四大呂又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九無射又下生中呂之上六同位者象夫妻異位者象子母所謂律取妻而呂生子也黄鍾長九寸其實一籥下生者三分去一上生者三分益一五下六上乃一終矣大呂長八寸二百四十三分寸之一百四大蔟長八寸夾鍾長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一中呂長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賓長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十七分寸之四百五十一南呂長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十文之者以調五聲使之相次如錦繡之有文章播猶揚也揚之以八音乃可得而觀之矣金鍾鎛也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹管簫也音義匏白交反枵虚驕反娵子榆反訾子斯反大梁如字劉音泰降户江反貿音茂取七喻反塤虚袁反疏注釋曰此大師無目於音聲審故使合六律六同及五聲八音也鄭云以合陰陽之聲者聲之隂陽各有合者六律為陽六同為陰兩兩相合十二律為六合故云各有合也云黄鍾子之氣也十一月建焉而辰在星紀者以經云以合陰陽之聲即言陽聲黄鍾大蔟姑洗等據左旋而言云隂聲大呂應鍾南呂等據右轉而説其左右相合之義按斗柄所建順十二辰而左旋日體十二月與月合宿而右轉但斗之所建建在地上十二辰故言子丑之等辰者日月之會㑹在天上十二次故言娵訾降婁之等以十二律是候氣之管故皆以氣言之耳以黄鍾律之首與大呂合故先言之云辰與建交錯貿處如表裏然是其合者貿易也謂若詩云抱布貿絲是貿易也十二月皆先言建後言辰皆覆之亦先言建後言辰是辰與建交錯貿易處互為先後如衣有表裏然是其交合也假令十一月先舉黄鍾後言星紀覆之則先舉大呂後言𤣥枵十二月皆然義可知也云其相生則以陰陽六體為之者向上所説順經六律左旋六同右轉以隂陽左右為相合若相生則六律六同皆左旋以律為夫以同為婦婦從夫之義故皆左旋鄭知有隂陽六體灋者見律厯志云黄鍾初九律之首陽之變也因而六之以九為灋得林鍾林鍾初六呂之首隂之變也皆三天地之灋也是其隂陽六體其黄鍾在子一陽爻生為初九林鍾在未二隂爻生得為初六者以隂故退位在未故曰乾貞於十一月子坤貞於六月末也云同位者象夫妻異位者象母子者同位謂若黄鍾之初九下生林鍾之初六俱是初之第一夫婦一體是象夫婦也異位象子母謂若林鍾上生大蔟之九二二於第一為異位象母子但律所生者為夫婦呂所生者為母子十二律呂律所生者常同位呂所生者常異位故云律取妻而呂生子也故曰黄鍾為天統律長九寸林鍾為地統律長六寸大蔟為人統律長八寸林鍾位在未得為地統者以未衝丑故也志又云十二管相生皆八八上生下生盡於中呂陰陽相生自黄鍾始而左旋八八為伍又云皆參天兩地之灋也注云三三而九二三而六上生下生皆以九為灋九六陰陽夫婦子母之道律取妻而呂生子天地之情也六律六呂而十二辰立矣五聲清濁而十日行矣鄭注皆取義於此也云黄鍾長九寸其實一籥者亦律歴志文按彼云子穀秬黍中者千有二百其實一籥彼又云黄鍾者律之實也云下生者三分去一上生者三分益一者子午已東為上生子午已西為下生東為陽陽主其益西為陰陰主其減故上生益下生減必以三為灋者以其生故取灋於天之生數三也云大呂長八寸二百四十三分寸之一百四者以黄鍾之律為本以八相生下生林鍾林鍾上生大蔟大蔟下生南呂已後皆然以此為次今鄭以黄鍾大呂大蔟等相比為次第不依相生為次第者鄭意既以上生下生得寸數長短乃依十二辰次第而言耳此之寸數所生以黄鍾長九寸下生林鍾三分減一去三寸故林鍾長六寸林鍾上生大蔟三分益一六寸益二寸故大蔟長八寸此三者以為三統故無餘分大蔟下生南呂三分减一八寸取六寸減二寸得四寸在餘二寸寸為三分合為六分去二分四分在取三分為一寸添前四寸為五寸餘一分在是南呂之管長五寸三分寸之一也南呂上生姑洗三分益一五寸取三寸益一寸為四寸又餘二寸者為十八分又以餘一分者為三分添前十八分為二十一分益七分為二十八分取二十七分為三寸添前四寸為七寸餘一分在是為姑洗之管長七寸九分寸之一姑洗下生應鍾三分去一取六寸去二寸得四寸又以餘一寸者為二十七分餘一分者為三分添二十七分為三十分減十分餘二十分在是應鍾之管長四寸二十七分寸之二十自此以下相生皆以三分為數而為減益之灋其義可知故不具詳也云文之者以調五聲使之相次如錦繡之有文章者謂據律呂以調五聲相次如錦繡有文章故名五聲為文也此即八十一絲為宮七十二絲為商之等是也又云播猶揚也揚之以八音乃可得而観之矣者五聲以律呂調之其八音亦使與律呂相應八音亦合五聲則絲是一但其聲𤼵揚出聲故云播揚也云可得觀者義取左氏季札請観周樂故以観言之也云金鍾鎛已下鄭以義約之按下瞽矇職云播鼗柷敔塤簫管絃歌眡瞭職云掌擊頌磬笙磬磬師掌擊編鍾鼔人掌敎六鼓笙師掌教吹笙是樂器中有此鍾磬等八者鍾鎛以金為之磬以石為之塤以土為之鼔鼗以革為之柷敔以木為之笙以插竹於匏但匏笙一也故鄭以笙觧匏簫管以竹為之故以鍾磬等釋金石等八音但匏笙亦以竹為之以經别言匏故匏不得竹名也敎六詩曰風曰賦曰比曰興曰雅曰頌注敎教瞽矇也風言賢聖治道之遺化也賦之言鋪直鋪陳今之政敎善惡比見今之失不敢斥言取比類以言之興見今之美嫌於媚諛取善事以喻勸之雅正也言今之正者以為後世灋頌之言誦也容也誦今之徳廣以美之鄭司農云古而自有風雅頌之名故延陵季子觀樂於魯時孔子尚幼未定詩書而因為之歌邶鄘衞曰是其衞風乎又為之歌小雅大雅又為之歌頌論語曰吾自衞反魯然後樂正雅頌各得其所時禮樂自諸侯出頗有謬亂不正孔子正之曰比曰興比者比方於物也興者託事於物音義興虚應反注皆同治直吏反下治功皆同鋪普呉反又音孚為于偽反下為之為作皆同邶歩内反疏釋曰按詩上下惟有風雅頌是詩之名也但就三者之中有比賦興故總謂之六詩也注釋曰鄭知此教是敎瞽矇者按下瞽矇職云諷誦詩故知教者教瞽矇也云風言賢聖治道之遺化也者但風是十五國風從闗雎至七月則是總號其中或有刺責人君或有褒美主上今鄭云言賢聖治道之遺化者鄭據二南正風而言周南是聖人治道遺化召南是賢人治道遺化自邶鄘已下是變風非賢聖之治道者也云賦之言鋪直鋪陳今之政教善惡者凡言賦者直陳君之善惡不假外物為喻故云鋪陳者也云比見今之失不敢斥言取比類以言之興見今之美嫌於媚諛取善事以喻勸之者謂若闗雎興后妃之類是也云雅正也言今之正者以為後世灋者謂若鹿鳴文王之類是也云頌之言誦也容也誦今之德廣以美之者凡言頌者美盛徳之形容以其成功告於神明謂若清廟頌文王之樂歌之類是也鄭司農云古而自有風雅頌之名已下後鄭從之故不破若然此經有風雅頌則在周公時明不在孔子時矣而先鄭引春秋為證者以時人不信周禮者故以春秋為證以與春秋同明此是周公所作耳按襄二十九年季札聘魯請觀周樂為之歌邶鄘衞小雅大雅及頌等先鄭彼注云孔子自衞反魯然後樂正雅頌各得其所自衞反魯在哀公十一年當此時雅頌未定而云為歌大雅小雅頌者傳家據已定録之言季札之於樂與聖人同與此注違者先鄭兩觧雖然據此經是周公時已有風雅頌則彼注非也以六徳為之本注所敎詩必有知仁聖義忠和之道然後可敎以樂歌音義知音智疏注釋曰凢受敎者必以行為本故使先有六徳為本乃可習六詩也按大司徒職云以鄉三物敎萬民一曰六徳知仁聖義忠和又按師氏以三徳教國子至徳敏徳孝徳此既教瞽矇故取教萬民之六徳以釋之耳以六律為之音注以律視其人為之音知其宜何歌子貢見師乙而問曰賜也聞樂歌各有宜若賜者宜何歌此問人性也本人之性莫善於律疏注釋曰鄭云以律視其人為之音知其宜何歌者則大師以吹律為聲又使其人作聲而合之聽人聲與律呂之聲合謂之為音或合宮聲或合商聲或合角徵羽之聲聽其人之聲則知宜歌何詩若然經云以六律為之音據大師吹律共學者之聲合乃為音似若曲合樂曰歌之類也云子貢已下樂記文師乙乃魯之大師瞽之無目知音者也故子貢不自審就師乙而問之云此問人之性者謂子貢所問問人之性性之動宜見於聲氣故云本人之性莫善於律也引之者證以律為音本人性所宜之事也大祭祀帥瞽登歌令奏擊拊注擊拊瞽乃歌也故書拊為付鄭司農云登歌歌者在堂也付字當為拊書亦或為拊樂或當擊或當拊登歌下管貴人聲也𤣥謂拊形如鼔以韋為之著之以穅音義拊音撫疏釋曰謂凡大祭之時大師有此一事言帥瞽登歌者謂下神合樂皆升歌清廟故将作樂時大師帥取瞽人登堂於西階之東北靣坐而歌歌者比瑟以歌詩也令奏撃拊者拊所以導引歌者故先撃拊瞽乃歌也歌者出聲謂之奏故云奏也注釋曰云撃拊瞽乃歌也者見經云令奏撃拊故知擊拊乃歌也先鄭云樂或當撃或當拊者先鄭之意撃拊謂若尚書云撃石拊石皆是作用之名拊非樂噐後鄭不從者此撃拊謂若下文鼔朄及撃應鼙之類彼朄鼙是樂器則知此拊亦樂噐也𤣥謂拊形如鼔以韋為之著之以穅者此破先鄭拊非樂器知義如此者約白虎通引尚書大傳云拊革裝之以穅今書傳無者在亡逸中下管播樂噐令奏鼔􅉧注鼓􅉧管乃作也特言管者貴人氣也鄭司農云下管吹管者在堂下朄小鼔也先擊小鼔乃擊大鼓小鼓為大鼓先引故曰朄朄讀為道引之引𤣥謂鼔朄猶言擊􅉧詩云應朄縣鼓音義朄音𦙍導音道引之引竝音𦙍疏釋曰凡樂歌者在上匏竹在下故云下管播樂噐樂器即笙簫及管皆是出聲曰播謂播揚其聲令奏鼔朄者奏即播亦一也欲令奏樂器之時亦先擊􅉧導之也注釋曰鄭云鼓朄管乃作也者亦如上注擊拊瞽乃歌云特言管者貴人氣也者以管簫皆用氣故云貴人氣若然先鄭云登歌下管貴人聲此後鄭云特言管者貴人氣不同者各有所對若以歌者在上對匏竹在下歌用人人聲為貴故在上若以匏竹在堂下對鍾鼔在庭則匏竹用氣貴於用手故在階間也後鄭云鼓朄猶言撃朄者此上下文拊與鼓皆言撃則此鼔謂出聲亦擊之類也詩云應朄縣鼔周頌有瞽篇也大饗亦如之疏釋曰此大饗謂諸侯來朝即大行人上公三饗侯伯再饗子男一饗之類其在廟行饗之時作樂與大祭祀同亦如上大祭祀帥瞽登歌下管播樂噐令奏皆同故云亦如之凡祭祀大饗及賓射升歌下管一皆大師令奏小師佐之其鍾鼔則大祝令奏故大祝云隋釁逆尸令鍾鼔侑亦如之若賓射及饗鍾鼔亦當大祝令之與祭祀同也其小祭祀及小賓客文不見或無升歌之樂其外祭祀山川社稷皆凖大祭祀令奏也大射帥瞽而歌射節注射節主歌騶虞疏注釋曰言射節者謂若射人所云樂以騶虞九節貍首七節采蘋采蘩五節之類則大師為之歌也大師執同律以聽軍聲而詔吉凶注大師大起軍師兵書曰王者行師出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士强角則軍擾多變失士心宮則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威明鄭司農云以師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功音義将子匠反下同卒子忽反下同呼火故反數所角反疏注釋曰兵書者武王出兵之書云合音商則戰勝軍士强者商屬西方金金主剛斷故兵士强也角則軍擾多變失士心者東方木木主曲直故軍士擾多變失士心宮則軍和士卒同心者中央土土主生長又載四行故軍士和而同心徵則将急數怒軍士勞者南方火火主熛怒故将急數怒羽則兵弱少威明者北方水水主柔弱又主幽闇故兵弱少威眀也先鄭引師曠曰者按襄公十八年左氏傳楚子使子庚帥師侵鄭甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功注云北風夾鍾無射以北南風姑洗南呂以南南律氣不至故死聲多吹律而言歌與風者出聲曰歌以律是候氣之管氣則風也故言歌風引之者證吹律知吉凶之事也大喪帥瞽而廞作匶諡注廞興也興言王之行謂諷誦其治功之詩故書廞為淫鄭司農云淫陳也陳其生時行迹為作諡音義行下孟反下同疏釋曰大䘮言凡則大䘮中兼王后雖婦從夫諡亦須論行乃諡之言帥瞽者即帥瞽矇歌王治功之詩廞作匶諡者匶即柩也古字通用之以其興喻王治功之詩為柩作諡故云廞作柩諡是以瞽矇職云諷誦詩謂作諡時也注釋曰云廞興也者先鄭以從古書廞作淫淫陳也周禮之内先鄭皆從淫為陳後鄭皆為興引之在下者以無正文亦得為一義故也凡作諡謂將葬時故檀弓云公叔文子卒其子戍請於君曰日月有時將葬矣請所以易其名者曾子問云賤不誄貴幼不誄長天子稱天以誄之引公羊傳制諡於南郊是也凡國之瞽矇正焉注從大師之政敎疏注釋曰大師是瞽人之中樂官之長故瞽矇屬焉而受其政教也小師掌敎鼓鼗柷敔塤簫管絃歌注教敎瞽矇也出音曰鼓鼗如鼓而小持其柄摇之旁耳還自撃塤燒土為之大如鴈卵簫編小竹管如今賣飴餳所吹者絃謂琴瑟也歌依詠詩也鄭司農云柷如漆筩中有椎敔木虎也塤六空管如箎六空𤣥謂管如篴而小併兩而吹之今大予樂官有焉音義搖音遙本亦作揺飴以之反餳辭盈反李音唐筩音動椎直追反空音孔箎音馳篴音狄併薄令反疏注釋曰鄭知教瞽矇者按瞽矇所作樂噐與此所教者同明此教教瞽矇也鄭知此經鼔非六鼓之鼓者按鼔人云掌敎六鼔眡瞭職云掌大師之縣又云賓射皆奏其鍾鼔則六鼓鼓人教之眡瞭撃之非此小師教又瞽矇所作不言鼓眀此鼓既在鼗已下諸噐之上是出聲為鼓也後鄭觧鼗依漢灋而知云塤燒土為之大如鴈卵先鄭云塤六孔者按廣雅云塤象秤錘以土為之六孔故二鄭為此觧也云簫編小竹者按通卦驗云簫長尺四寸注云簫管形象鳥翼鳥為火火成數七生數二二七一十四簫之長由此廣雅云簫大者二十四管小者十六管有底三禮圖云簫長尺四寸頌簫長尺二寸此諸文簫有長短不同古者有此制也云管如今賣飴餳所吹者先鄭云管如箎六孔按廣雅云管象簫長尺圍寸八孔無底八孔者葢傳寫誤當從六孔為正也云絃謂琴瑟也歌依詠詩也者謂工歌詩依琴瑟而詠之此詩即詩傳云曲合樂曰歌亦一也故鄉飲酒之属升歌皆有瑟依詠詩也若不依琴瑟即爾雅徒歌曰謠也先鄭云柷狀如漆筩中有椎敔木虎也者書云合止柷敔注云柷狀如漆筩而有椎合之者投椎其中而撞之敔狀如木虎背有刻所以鼓之以止樂爾雅注云柷如漆桶方二尺四寸深一尺八寸敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之𤣥謂管如􅐟而小併兩而吹之今大予樂官有焉者觀後鄭意以不與諸家同故引漢灋大予樂官為況也大祭祀登歌撃拊注亦自有拊撃之佐大師令奏鄭司農云拊者撃石音義令力呈反疏注釋曰鄭知小師亦自撃拊不共大師同撃拊者見大師下管鼔朄此小師下管别自撃應鼙不同明撃拊亦别可知但小師佐大師耳引先鄭拊為撃石者先鄭上注已觧拊與撃同後鄭不從今引之在下者以無正文引之或得為一義故也下管擊應鼓注應鼙也應與朄及朔皆小鼓也其所用别未聞音義鼙薄西反疏注釋曰鄭知應是應鼙及有朔鼙者按大射建鼓在阼階西南鼓應鼙在其東以是知應是應鼙彼又云一建鼓在西階之西朔鼙在其北是知有朔鼙也知皆小鼓者撃鼓者即事之漸先擊小後撃大故大射云應鼙在其東朔鼙在其北鼙者皆在人右鄭彼注云便其先撃小後撃大既便其事是鼙皆小鼓也云其所用别未聞者此上下祭祀之事有應有朄無朔大射有朔有應無朄凡言應者應朔鼙祭祀既有應明有朔但無文不可强定之故云用别未聞也徹歌注於有司徹而歌雍疏注釋曰鄭知徹祭器歌詩者見論語八佾云三家者以雍徹孔子云相維辟公天子穆穆奚取於三家之堂以三家無辟公助祭又無天子之容則諸侯亦不得用惟天子得用之是天子之祭則徹器用徹詩故云歌雍也大饗亦如之疏釋曰其大饗饗諸侯之來朝者徹噐亦歌雍若諸侯自相饗徹噐即歌振鷺故仲尼燕居云大饗有四焉云徹以振羽振羽當為振鷺是其事也大喪與廞注從大師音義與音預疏注釋曰知從大師者見大師職云廞作匶諡此言與謂與在廞中明從大師也凡小祭祀小樂事鼓朄注如大師鄭司農云朄小鼓名掌六樂聲音之節與其和注和錞于音義和戸卧反注同錞音淳本或作淳疏注釋曰鄭知和是錞于者見鼔人云金錞和鼓故知和是錞于也瞽矇掌播鼗柷敔塤簫管絃歌注播謂發揚其音疏釋曰此八者皆小師教此瞽矇令於作樂之時播揚以出聲也諷誦詩世奠繋鼓琴瑟注諷誦詩謂闇讀之不依詠也故書奠或為帝鄭司農云諷誦詩主誦詩以刺君過故國語曰瞍賦矇誦謂詩也杜子春云帝讀為定其字為奠書亦或為奠世奠繋謂帝繋諸侯卿大夫世本之屬是也小史主次序先王之世昭穆之繋述其徳行瞽矇主誦詩并誦世繋以戒勸人君也故國語曰敎之世為之昭明徳而廢幽昏焉以怵懼其動𤣥謂諷誦詩主謂廞作柩諡時也諷誦王治功之詩以為諡世之而定其繋謂書於世本也雖不歌猶鼓琴瑟以播其音美之音義奠音定繋户計反注同刺七賜反瞍素口反行下孟反怵勅律反北本作休疏釋曰諷誦詩謂於王䘮將葬之時則使此瞽矇諷誦王治功之詩觀其行以作諡葬後當呼之云世奠繋者奠定也謂辨其昭穆以世之序而定其繋繋即帝繋世本是也鼓琴瑟者詩與世本二者雖不歌詠猶鼓琴瑟而合之以美之也注釋曰按上注云背文曰諷以聲節之曰誦别釋之此總云闇讀之不依詠者語異義同背文與以聲節之皆是闇讀之不依琴瑟而詠也直背文闇讀之而已故雖有琴瑟猶不得為曲合樂曰歌是以鄭云雖不歌猶鼓琴瑟以播其音美之也若然誦則以聲節之兼琴瑟則為歌矣而得不為歌者此止有諷而言誦者諷誦相將連言誦耳先鄭云諷誦詩主誦詩以刺君過并引國語皆是諫諍人君灋度鄭不從而為廞作柩諡時者以其與世繋連文皆是王崩後事不得為諫諍是以大師廞作柩諡此瞽矇諷詩事相成故也子春與先鄭同但兼觧世繋耳帝撃據王即經繋也諸侯卿大夫謂之世本即經世也云小史主次序先王之世昭穆之繋者小史職云奠繋世辨昭穆故知小史次序之云述其徳行者取義於國語云為之昭明徳是也子春之意與先鄭同為諫諍之事後鄭亦不從也國語者按楚語云莊王使士亹𫝊大子臧辭王卒使傅之問於申叔時申叔時曰敎之春秋而為之聳善而抑惡焉以戒勸之敎之世而為之昭明徳而廢幽昏焉以怵懼其動注云先王之繫世本使知有徳者長無徳者短子春引之者證帝繫世本之事後鄭云世之而定其繋謂書於世本以世與繋為一事觧之又對文言之王謂之帝繋諸侯卿大夫謂之世本散則通故云書於世本世本即帝王繋也掌九徳六詩之歌以役大師注役為之使眡瞭掌凡樂事播鼗撃頌磬笙磬注眡瞭播鼗又撃磬磬在東方曰笙笙生也在西方曰頌頌或作庸庸功也大射禮曰樂人宿縣于阼階東笙磬西面其南笙鍾其南鎛皆南陳又曰西階之西頌磬東面其南鍾其南鎛皆南陳音義頌衆家不音當依字戚音容疏釋曰按序官眡瞭三百人皆所以扶工以其扶工之外無事而兼使作樂故云掌凡樂事則播鼗已下至職末皆是也注釋曰云眡瞭播鼗又撃磬者按小師教鼓鼗注云教教瞽矇瞽矇云掌播鼗今眡瞭亦掌播鼗但有目不須小師教之耳故鄭云眡瞭播鼗又撃磬是眡瞭兼掌鼗也云磬在東方謂之笙笙生也在西方曰頌頌或作庸庸功也者以東方是生長之方故云笙西方是成功之方故云庸庸功也謂之頌者頌者美盛徳之形容以其成功告於神明故云頌言或作庸者尚書云笙庸以間孔以庸為大鍾鄭云庸即大射頌一也引大射者證東方之磬為笙西方之磬為頌之事也掌大師之縣注大師當縣則為之疏注釋曰按大司樂有宿縣之事小胥正樂縣之位大師無縣樂之事此大師之縣者大師掌六律六同五聲八音以其無目於音聲審本職雖不言縣樂噐文寄於此明縣之可知言當縣則為之者以其有目故也凡樂事相瞽注相謂扶工音義相息亮反注同疏注釋曰能其事曰工故樂稱工是以儀禮鄉飲酒鄉射燕禮大射皆言工相者以眡瞭有目瞽人無目須人扶持故也大喪廞樂噐大旅亦如之注旅非常祭於時乃興造其樂器疏注釋曰大䘮廞樂噐謂眀器故檀弓云木不成斵瓦不成味竹不成用琴瑟張而不平竽笙備而不和是沽而小耳是臨時乃造之大旅非常祭亦臨時乃造故云亦如之旅不用尋常祭噐者以其旅是非常則其噐亦如明噐沽而小故文承明器而云亦如之也賓射皆奏其鍾鼓注撃􅉧以奏之其登歌大師自奏之疏注釋曰鄭知撃朄以奏之者見大師職云下管令奏鼔􅉧以其鍾鼓與管俱在下管既撃朄令奏則鍾鼓亦撃朄奏之可知云其登歌大師自奏之者見大師職大祭祀登歌撃拊雖不言賓射賓射登歌自然大師令奏撃拊也若然大射之時鍾鼓眡瞭撃􅉧登歌亦大師自奏也鼜愷獻亦如之注愷獻獻功愷樂也杜子春鼜讀為憂戚之戚謂戒守鼓也撃鼓聲疾數故曰戚音義鼜音戚樂音洛數音朔疏釋曰鼜謂夜戒守之鼓愷獻謂戰勝獻俘之時作愷樂二者皆眡瞭奏其鍾鼓故云亦如之也典同掌六律六同之和以辨天地四方隂陽之聲以為樂器注陽聲屬天隂聲屬地天地之聲布於四方為作也故書同作銅鄭司農云陽律以竹為管隂律以銅為管竹陽也銅隂也各順其性凡十二律故大師職曰執同律以聽軍聲𤣥謂律述氣者也同助陽宣氣與之同皆以銅為之疏注釋曰云陽聲屬天隂聲屬地天地之聲布於四方者此典同既云掌六律六同即覆云以辨天地四方隂陽之聲明天地四方陰陽之聲還是六律六同也但於十二辰在陽辰為律屬天在隂辰為同屬地十二律布在四方方有三也此即大師所云六律左旋六同右轉陰陽相合者也先鄭云陽律以竹為管陰律以銅為管竹陽也銅陰也各順其性并大師執同亦為銅字觧之後鄭不從之故云律述氣者也同助陽宣氣與之同皆以銅為之鄭知義然者按律厯志云律有十二陽六為律陰六為呂有三統之義焉其傳曰黄帝之所作也黄帝使伶倫自大夏之西崑崙之陰取竹之觧谷生其竅厚均者斷兩節間而吹之以為黄鐘之宮制十二筩以聽鳳之鳴其䧺鳴為六雌鳴為六應劭曰大夏西戎之國也孟康曰觧脱也谷竹溝也取竹之脱無溝節者也一説崑崙之北谷名也此則上古用竹又按律厯志云度者分寸尺丈引也所以度長短也本起黄鍾之長一黍為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其灋用銅是陽律用銅可知是後世用銅之明證也凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石注故書䃂或作硍杜子春讀䃂為鏗鎗之鏗髙謂鍾形容髙也韽讀為闇不眀之闇筰讀為行扈唶唶之唶石如磬石之聲鄭大夫讀䃂為衮冕之衮陂讀為人短罷之罷韽讀為鶉韽之韽鄭司農云鍾形下當蹕正者不髙不下鍾形上下正傭𤣥謂髙鍾形大上上大也髙則聲上藏衮然旋如裏正謂上下直正則聲緩無所勤下謂鍾形大下下大也下則聲出去放肆陂讀為險陂之陂陂謂偏侈陂則聲離散也險謂偏弇也險則聲斂不越也達謂其形微大也達則聲有餘若大放也微謂其形微小也韽讀為飛鉆涅韽之韽韽聲小不成也回謂其形微圜也回則其聲淫衍無鴻殺也侈謂中央約也侈則聲廹筰出去疾也弇謂中央寛也弇則聲鬱勃不出也甄讀為甄燿之甄甄猶掉也鍾微薄則聲掉鍾大厚則如石叩之無聲音義䃂古本反或胡本反陂彼義反韽劉音闇又於瞻反鄭於貪反戚於感反李烏南反侈昌氏反又式氏反筰側百反弇沈戚音掩劉於驗反甄音震注同硍音艱又苦耕反字林音限鏗苦耕反鎗初衡反劉初耕反唶側百反罷皮買反字或作矲音同桂林之間謂人短為矲矮矮音苦買反韽烏南反蹕音婢李又孚葵反一音豐已反或音蒲至反傭勅龍反形大音泰下形大下大厚同舊菟佐反上時掌反鉆張林反又其亷反戚或音沾劉又渠金反説文云鐵鋷也一曰膏車鐵鉆鋷竹涉反涅乃結反劉其兼反殺色介反舊色例反約舊如字戚於敎反掉徒弔反劉奴較反疏注釋曰此十二種竝是鍾之病此職掌十二律之鍾是十二辰之零鍾非編者直言病鍾者欲見除此病外即是鍾之善者故言病鍾而已杜子春讀䃂為鏗鎗之鏗者讀從樂記鍾聲鏗鏗以立號是鏗鎗之鏗後鄭不從又讀筰為行扈唶唶之唶讀從左氏傳少皥以鳥名官有行扈唶唶後鄭亦不從也云石如磬石之聲者磬用石者故讀從磬聲後鄭増成之鄭大夫讀䃂為衮冕之衮取音同後鄭從之陂讀為人短罷之罷從俗語讀之後鄭不從韽讀為鶉韽之韽讀從孝經緯後鄭亦不從此讀鄭司農云下謂鍾形下當蹕後鄭不從云正者不髙不下鍾形上下正傭後鄭増成其義𤣥謂高鍾形大上上大也高則聲上藏衮然旋如裏者言旋如裏謂聲周旋如在裏云正謂上下直正則聲緩無所動者由無鴻殺故也云下謂鍾形大下下大也下則聲出去放肆者由下大故也鄭知上是上大下是下大者以其正是上下直則上是上大下是下大可知故為此觧云陂讀為險陂之陂者讀從詩序險陂私謁之心陂是偏私之意故為偏侈也云險謂偏弇也者此險與陂相對陂既為偏侈故險為偏弇也云達謂其形微大也者凡物大則疏達故為微大對髙為上大故此達為微大微大則聲有餘若大放也云微謂其形微小也者此微對達達為微大則微為微小矣云韽讀為飛鉗涅韽之韽者謂鬼谷子有飛鉗揣摩之篇皆言從横辨説之術飛鉗者言察是非語飛而鉗持之揣摩者云揣人主之情而摩近之云韽聲小不成也者飛鉗涅韽使之不語此鍾聲韽亦是聲小不成也云回謂其形微圜也者凡鍾依鳬氏所作若鈴不圜今此回而微圜故聲淫衍無鴻殺也云侈謂中央約也者此非偏侈謂鍾口總寛則聲廹筰出去疾由口寛故也云弇謂中央寛者此與侈相對侈既口總寛則弇是口總狹是中央寛也云弇則聲鬱勃不出也者由口籠故也云甄讀從甄燿之甄者讀從春秋緯甄燿度之篇名云甄猶掉也鍾微薄則聲掉者由薄故也云鍾大厚則如石者按鳬氏為鍾云鍾已厚則石已薄則播是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚是厚薄得中也凡為樂器以十有二律為之數度以十有二聲為之齊量注數度廣長也齊量侈弇之所容音義齊才計反注同廣古曠反長直亮反疏注釋曰樂器據典同所作謂鍾也云以十有二律為之度數者依律厯志云古之神瞽度律均鍾以律計倍半假令黄鍾之管長九寸倍之為尺八寸又九寸得四寸半總二只二寸半以為鍾口之徑及上下之數自外十二辰頭皆以管長短計之可知故云度數廣長也廣則口徑長則上下也云以十有二聲為之齊量者十二聲則十二辰零鍾鍾則聲也十二鍾皆有所容多少之齊量故云侈弇之所容者上文侈弇雖是鍾病所容多少則依灋故舉侈弇見文而言也凡和樂亦如之注和謂調其故器也疏注釋曰鄭知調故噐者上文凡為樂噐是新造者今更言和樂明是調故噐知聲得否及容多少當依灋度也周禮注疏卷二十三周禮注疏卷二十三考證樂師凡國之小事疏鄭云小祭祀之事謂王𤣥冕所祭皆有鍾鼓樂師令之若大次二者之樂則天地及宗廟大司樂令之也則天地及宗廟六字監本錯在𤣥冕所祭之下今改正大胥掌學士之版疏酎之言醇謂重醸之酒春酒至此始成此酎以宗廟言之謂重醸之酒祭宗廟而用之祭末有相飲之灋以宗廟言之五字監本錯在相飲之灋下今改正大師掌六律六同注蕤賔又下生大呂之六四大呂又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九臣宗楷按此四句朱子鍾律篇引之上生下生皆互易葢康成之法以陽生陰為下生隂生陽為上生但至蕤賓下生則大呂之律短而以下皆遞短朱子所以易之與以六律為之音疏性之動宜見於聲氣之動監本訛作即性今据樂記原文訂正大祭祀帥瞽登歌令奏撃拊臣照按樂記魏文侯問樂章鄭注引此作合奏撃拊以合字釋㑹字之義然從大司樂令奏王夏令奏鍾鼓之例推之則此經令字非合之譌也豈注家不妨於互異與下管播樂器令奏鼓􅉧樂記注引此亦作合奏小師注今太子樂官有焉子當作予大予漢樂官名典同凡聲注鄭司農云鍾形下當蹕蹕當作䠋周禮注疏卷二十三考證
