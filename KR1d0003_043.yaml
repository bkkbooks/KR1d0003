body:
  text: 編修臣紱謹言周官一經或斥爲瀆亂不驗或指爲六國隂謀又因劉歆王安石不善用之而敗詆譏者滋多唯鄭氏康成識其爲周公致太平之迹程子朱子皆尊信之以爲非周公不能作我皇上聖學崇深御製日知薈說論著周官數則妙契古聖人制作之精可爲治經者之準的臣等學識蕪陋大經大灋未能仰窺第見五官中所言祭祀朝覲會同聘問饗燕蒐狩軍旅䘮荒諸事所共之職相次之節壇廟宫室冕服車旗器用之制大概與儀禮禮記相表裏而春秋三傳亦可與之相證明則其非三代以下人所能僞託可不辨而決也臣等奉命校讐苦無善本此錯彼差雷同什九經文以開成石經爲主据之以勘舊刻之訛而石經之訛則還以注疏訂之注疏舊刻各本或有異同則從其理之長者而更以前後注疏及他經之注疏凡古籍之有關於此經者參互考核期歸於是已改者識其改之由其舛謬難通絶無左證以意測之而未敢信者尚仍其柢而亦略陳所疑並附於卷末冀使後之讀者又復因是推究探討埽葉拂塵脫文衍字減之又減以至於無鄭賈之文不爲魯魚亥豕所蔽蝕而聖經釐然益明彌仰聖天子尊經隆禮繼往開來敎澤所敷永永無極謹言
