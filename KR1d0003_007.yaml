body:
  text: 周禮注疏卷七漢鄭氏注唐陸德明音義賈公彥疏司書掌邦之六典八法八則九職九正九事邦中之版土地之圖以周知入出百物以敘其財受其幣使入于職幣注九正謂九賦九貢正稅也九事謂九式變言之者重其職明本而掌之非徒相副二也敘猶比次也謂鉤考其財幣所給及其餘見為之簿書故書受為授鄭司農云授當為受謂受財幣之簿書也𤣥謂亦受録其餘幣而為之簿書使之入于職幣幣物當以時用之久藏將朽蠧音義正音征注同比毗志反見賢遍反下同簿步故反下同蠧都路反疏釋曰言掌邦之六典已下至周知入出百物已上所掌與司㑹同者以其司㑹主鉤考司書掌書記之司書所記司㑹鉤考之故二官所掌其事通焉九職即司㑹九功也九正即司㑹九賦九貢也九事即司㑹九式也邦中之版土地之圖即司㑹版圖也周知入出百物者即司㑹百物財用一也云以敘其財者敘謂比次其財知用多少云受其幣者百官所用餘財送來與司書司書受其幣使入於職幣之官不入本府注釋曰知九正謂九賦九貢者案上司㑹有九賦九貢此司書則有九正無九賦九貢故知九正即是九賦九貢也言九正者謂此二者之財皆出於正稅故鄭云正稅也又云九事謂九式者九式據用財言之九事據用財所為之事其理一也云變言之者重其職謂變九賦九貢言九正變九式言九事也重於其職明本而掌之非徒相副二也其相副二者謂司㑹八法八則之二是也云所給及其餘見為之簿書者司書周知入出百物以敘其財明知敘其財幣所給諸官餘不盡者即以餘見為之簿書擬與司㑹鉤考之𤣥謂亦受録其餘幣而為之簿書者此增成先鄭受謂受財幣之簿書云幣物當以時用之久藏將朽蠧者釋經百官餘幣不入於本府而入於職幣之意若入本府即是久藏將恐朽爛蠧敗故入職幣使人占賣之本在生利也凡上之用財用必考于司㑹注上謂王與冢宰王雖不㑹亦當知多少而闕之司㑹以九式均節邦之財用疏注釋曰知上謂王與冢宰者案內府職云凡王及冢宰賜與則共之明此上中有冢宰可知云王雖不㑹亦當知多少而闕之者案上膳夫庖人及外府等皆言王及后不㑹此經上之用財必考於司㑹者此之所考但知多少而闕之非是㑹計與王為限云司㑹以九式均節邦之財用者欲見司書用財必考於司㑹之意三歲則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徴令注械猶兵也逆受而鉤考之山林川澤童枯則不稅音義械户戒反畜許又反疏釋曰言三歲者三年一閏天道小成考校羣吏須有黜陟故云三歲則大計羣吏之治羣吏則百官也以知民之財用器械之數者民之財用謂幣帛多少器謂禮樂之器械謂兵器弓矢戈殳㦸矛此等則器械之數皆知之以知田野謂百畝之田在野夫家者謂男夫婦女六畜者謂馬牛羊豕犬雞之數又云以知山林川澤之數者案大司徒地有十等不言邱陵墳衍原隰者略言之也又云以逆羣吏之徴令者逆謂鉤考也此司書知民之財器已下川澤已上恐其羣吏濫徴斂萬民故知此本數乃鉤考其徴令也注釋曰山林川澤童枯則不稅者山林不茂為童川澤無水為枯所稅者稅其有今山林不茂則無材木川澤無水則無魚鱉蒲葦故不稅之凡稅斂掌事者受法焉及事成則入要二焉注法猶數也應當稅者之數成猶畢也音義斂力驗反疏釋曰言凡稅斂者謂若地官閭師旅師徴斂之官所欲稅斂掌事者皆來司書處受法焉及事成收斂畢入要寫一通副二文書名為要入司書故云入要二焉必來受法又入要二者以司書知財器已下之數擬後鉤考之也注釋曰云應當稅者之數者即上田野夫家之等是其本出稅者之數也凡邦治考焉注考其法於司書疏釋曰邦之所治有善惡皆來考於司書者以司書大計羣吏之治知其功過故也職內掌邦之賦入辨其財用之物而執其總以二官府都鄙之財入之數以逆邦國之賦用注辨財用之物處之使種類相從總謂簿書之種别與大凡官府之有財入若關市之屬音義種章勇反疏釋曰云掌邦之賦入者謂九職九貢九賦之稅入皆掌之獨云賦入者賦是總名下言賦者皆此類也辨其財用之物凡所稅入者種類不同須分别之而執其總者總謂稅入多少總要簿書又云以二官府都鄙之財入之數者官府財入謂若關市之稅都鄙之財入都鄙謂三等采地采地之稅四之一言二者謂職內受取一通副二文書備擬鉤考云以逆邦國之賦用者職內既知財入之數鉤考用賦多少知其得失注釋曰言辨財用之物使種類相從者但賦之所入先由職內始至大府大府分致於衆府以是分别使衆類相從云官府之有財入若關市之屬者司關司市皆屬地官關市皆有出稅故知官府之有財入若關市也言之屬者兼有城十二門亦有稅入凡受財者受其二令而書之注受財受於職內以給公用者二令者謂若今御史所寫下本奏王所可者書之若言某月某日某甲詔書出某物若干給某官某事音義下户嫁反疏釋曰其有官府合用官物而受財者竝副寫一通敕令文書與職內然後職內依數付之故云受其二令書之注釋曰云二令謂若今御史所寫下本奏王所可者案御史職云掌贊書彼注云王有令則以書致之則贊為辭若今尚書作詔文是其用官財者先奏白於王王許可則御史贊王為辭下職內是其二令職內則書之為本案然後給物與之若然職內主入職歲主出職內分置於衆府所以得有物出與入者職內雖分置衆府職內亦有府貨賄留之者故得出給故大府職云頒其賄於受用之府鄭注云受用之府若職內是也及㑹以逆職歲與官府財用之出注亦參互鉤考之疏釋曰言㑹者謂至歲終㑹計以逆職歲者逆謂鉤考也職歲主出職內主入以已之入財之數鉤考職歲出財之數又云與官府財用之出者謂職歲出財與官府所用之數竝鉤考之注釋曰鄭云參互鉤考者案司㑹以參互考之鄭彼注云參互謂司書之要二職內之入職歲之出以三官相鉤考此職內逆職歲明兼有司書之要二故言參互言亦者亦如大府也而敘其財以待邦之移用注亦鉤考今藏中餘見為之簿移用謂轉運給他音義藏才浪反疏釋曰案司書云以敘其財鄭彼注云敘猶比次謂鉤考其財幣所給及其餘見為之簿書入職幣也此言敘財亦謂比次職內藏中餘見為簿書以待邦之移用更給他官若然職內既非常府其所藏者唯當歲所用故用不盡者移用之也職歲掌邦之賦出以二官府都鄙之財出賜之數以待會計而考之注以二者亦如職內書其二令而編存之音義編必綿反又必連反一音方千反疏釋曰云掌邦之賦出者職內主入職歲主出職內所入於衆府所用之多少皆主之故云掌邦之賦出但九貢九賦九功之用皆主之特言賦者亦如職內云賦賦是總稱也云以二官府都鄙之財出賜之數者職內云以二官府都鄙之財入之數此職歲以二官府都鄙之財出賜之數二官一入一出皆書其二共相鉤考故職內云以逆邦之賦用此職歲云以待㑹計而考之其事通也注釋曰云亦如職內書其二令而編存之者職內云凡受財者受其二令而書之此官主出所出亦皆由上令所出前後不同亦皆書其二令編存為案以待㑹計而考之也凡官府都鄙羣吏之出財用受式法于職歲注百官之公用式法多少職歲掌出之舊用事存焉疏釋曰官府都鄙出財用皆來受法者以其出財用皆為有事事有舊法用有常式歲出財皆有舊法式在於職歲故須受法於職歲也凡上之賜豫以敘與職幣授之注敘受賜者之尊卑疏釋曰上謂王與冢宰所有小賜豫之事則職幣所云小用賜豫是也故云以敘與職幣授之及㑹以式法贊逆㑹注助司會鉤考羣吏之計疏釋曰案司㑹以逆羣吏之治而聽其會計此官主式法出財用及至也至歲終㑹計之時則以式法贊助司㑹鉤考㑹計之事故云以式法贊逆㑹職幣掌式法以斂官府都鄙與凡用邦財者之幣注幣謂給公用之餘凡用邦財者謂軍旅疏釋曰職幣主餘幣給諸官之用亦依法式與之故云掌式法以斂官府已下之幣幣則餘幣也注釋曰云幣謂給公用之餘者以其此官主斂餘幣故知幣謂給公用之餘知凡用邦財是軍旅者見經斂官府都鄙别言用邦財故知用邦財謂國之大事唯有軍旅振掌事者之餘財注振猶拯也檢也掌事謂以王命有所作為先言斂幣後言振財互之音義拯音拯疏釋曰振者拯也檢也以財與之謂之拯知其足剩謂之檢掌事奉王命有所造為故職幣檢掌事者有餘則受取故云振掌事者之餘財注釋曰知掌事謂以王命有所作為者以其上經官府已下是其國家常事此别言掌事是王命有所作為又云先言斂幣後言振財互之者凡用國家財物皆先振而後斂今於上文直言斂不言振亦振之下言振財有餘亦斂之可知故言互之也皆辨其物而奠其録以書楬之以詔上之小用賜豫注奠定也故書録為祿杜子春云祿當為録定其録籍鄭司農云楬之若今時為書以著其幣音義楬其列反著直略反徐張恕反疏釋曰上經既斂得幣皆當辨其物知其色類及善惡而奠其録者謂定其所録簿書色别各入一府以書楬之者謂府别各為一牌書知善惡價數多少謂之楬又云以詔上之小用賜豫者詔猶告也職幣既知府內則告王與冢宰小用賜豫之事此謂上之常賜豫玉府所云凡王之好賜共其貨賄及內府云凡王冢宰之好賜此三者非常賜與外府及典絲枲三官言賜豫者與此職幣同亦是國家常賜豫歲終則㑹其出疏釋曰以其職幣主出故歲終與司㑹㑹之下贊之亦謂贊司㑹㑹之事也凡邦之會事以式法贊之司裘掌為大裘以共王祀天之服注鄭司農云大裘黑羔裘服以祀天示質疏釋曰言為大裘者謂造作黑羔裘裘言大者以其祭天地之服故以大言之非謂裘體侈大則義同於大射也云以共王祀天之服者謂四時所有祀天之事皆共之不限六天之大小直言祀天案孝經緯鉤命決云祭地之禮與天同牲玉皆不同言同者唯據衣服則知昆崘神州亦用大裘可知注釋曰先鄭知大裘黑羔裘者祭服皆𤣥上纁下明此裘亦羔裘之黑者故知大裘黑羔裘又云服以祀天示質者以其衮已下皆有采章為此大裘更無采章故云質案鄭志大裘之上又有𤣥衣與裘同色亦是無文采中秋獻良裘王乃行羽物注良善也中秋鳥獸㲝毨因其良時而用之鄭司農云良裘王所服也行羽物以羽物飛鳥賜羣吏𤣥謂良裘玉藻所謂黼裘與此羽物小鳥鶉雀之屬鷹所擊者中秋鳩化為鷹中春鷹化為鳩順其始殺與其將止而大班羽物音義中音仲注同㲝音毛毨先典反與音餘鶉音淳疏釋曰良善也仲秋所獻善裘者為八月誓獮田所用故獻之王乃行羽物者行賜也以羽鳥之物賜羣臣以應秋氣也注釋曰云中秋鳥獸㲝毨者此是尚書堯典文案彼注毨理也毛更生整理引之者證仲秋有良裘意故鄭云因其良時而用之也司農云良裘王所服者先鄭意良裘王所服故仲秋獻之羣臣所服裘在下經季秋獻功裘是也後鄭不從之者月令云孟冬天子始裘此良裘若是王之所服裘何得在仲秋故後鄭不從𤣥謂良裘玉藻所謂黼裘與者案彼文云唯君有黼裘以誓獮獮是仲秋田獵之名彼獮田用黼裘與此仲秋獻良裘同時皆不為寒設故知此良裘則與彼黼裘一也但無正文約與之同故言與以疑之也言黼裘者白與黑謂之黼謂狐白與黑羔合為黼文故謂之黼裘秋氣嚴猛取斷割之義故用黼謂之良裘者下經功裘之等臣所服見人功粗良裘與大裘皆君所服針功細密故得良裘之名又云此羽物小鳥鶉雀之屬鷹所擊者案夏官羅氏仲春羅春鳥行羽物彼注云羽物若今南郡黃雀之屬彼黃雀即此雀之屬此鶉與雀亦是鷹所擊故連言鶉也云仲秋鳩化為鷹仲春鷹化為鳩者此竝月令文引此者證此仲秋行羽物與月令仲秋鳩化為鷹殺物之時是順其始殺也故行羽物又云仲春鷹化為鳩者證羅氏仲春行羽物與月令仲春鷹化為鳩止殺之時故云與其將止云班羽物者總結春秋二時皆大班行羽物季秋獻功裘以待頒賜注功裘人功微粗謂狐青麛裘之屬鄭司農云功裘卿大夫所服音義麛音迷疏釋曰案詩云七月流火九月授衣此季秋則是九月授衣之節季秋獻功裘以待頒賜者功裘之內有羣臣所服之裘故言以待頒賜注釋曰言功裘人功微粗者此對良裘與大裘人功微密此裘人功粗故名功裘又云謂狐青麛裘之屬者案玉藻君子狐青裘豹褎麛裘青犴褎彼云君子鄭云君子大夫士也以其彼云豹褎青犴褎褎用雜故為大夫士若君則用純引此者證功裘中有此狐青麛裘以待頒賜玉藻仍有羔裘狐裘亦是臣之所服裘不引之者之屬中含之矣若然狐青裘者鄭玉藻注云蓋𤣥衣之裘天子下士𤣥端之服皆服之又云麛裘者鄭彼注引孔子素衣麑裘謂是君臣視朔之服彼云羔裘注引孔子緇衣羔裘鄭注論語云君之視朝之服亦卿大夫士祭於君之服若然卿大夫助祭用冕服士用爵辨君朝服冕服羔裘卿大夫士辨冕用羔裘至於朝服亦用羔裘即是君臣祭服朝服同服羔裘也又云狐裘者鄭注玉藻引孔子黃衣狐裘謂是十月農功畢臘祭先祖之服據鄉來所解四種之裘君臣同有以其經云以待頒賜唯據其臣若據天子諸侯除大裘之外亦入此功裘之中案玉藻仍有狐白裘據天子之朝大夫已上所服亦入此功裘之中鄭司農云功裘卿大夫所服者先鄭之意以良裘王所服故此功裘是卿大夫所服後鄭引之在下者經云以待頒賜據臣而言司農云功裘卿大夫所服得為一義故引之在下王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠注大射者為祭祀射王將有郊廟之事以射擇諸侯及羣臣與邦國所貢之士可以與祭者射者可以觀德行其容體比於禮其節比於樂而中多者得與於祭諸侯謂三公及王子弟封於畿內者卿大夫亦皆有采地焉其將祀其先祖亦與羣臣射以擇之凡大射各於其射宮侯者其所射也以虎熊豹麋之皮飾其側又方制之以為􅙯謂之鵠著于侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十遠尊得伸可同耳所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯鄭司農云鵠鵠毛也方十尺曰侯四尺曰鵠二尺曰正四寸曰質𤣥謂侯中之大小取數於侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈尊卑異等此數明矣考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直已志用虎熊豹麋之皮示服猛討迷惑者射者大禮故取義衆也士不大射士無臣祭無所擇故書諸侯則共熊侯虎侯杜子春云虎當為豹音義鵠古毒反為祭于僞反以與音預下得與同行下孟反比毗志反下同而中丁仲反下天子中之以下中之而難中以中皆同所射食亦反下自射所射共射皆同􅙯諸允反本亦作準著直略反又張略反參素感反干五旦反劉音鴈本又作犴遠于萬反正音征下同鳱音干劉音鴈一音岸疏釋曰言王大射者王將祭祀選助祭之人故於西郊小學之中王與諸侯及羣臣等行大射之法故云王大射也則共虎侯熊侯豹侯者虎侯者謂以虎皮飾其側九十步之侯王自射之也熊侯者以熊皮飾其側七十步之侯諸侯射之也豹侯者謂以豹皮飾其側五十步之侯孤卿大夫已下射之也云設其鵠者其鵠還以虎熊豹皮為之方制之三分其侯鵠居其一故云設其鵠也云諸侯則共熊侯者謂畿內諸侯三公王子母弟熊侯亦如王之熊侯諸侯自射之豹侯者亦如王之豹侯羣臣共射之也卿大夫者謂王朝卿大夫則共麋侯者亦五十步以麋皮飾其側君臣共射之云皆設其鵠者熊侯已下亦以熊豹麋之皮為鵠三分其侯鵠居一焉故云設其鵠也注釋曰知大射為祭祀射者見禮記射義云天子大射謂之射侯既云天子將祭必先習射故知大射是將祭而射也云王將有郊廟之事者郊謂祭五天帝於四郊不言圜丘祭昊天亦有可知廟謂祭先王先公皆是也云以射擇諸侯至得與於祭皆禮記射義文案彼云天子以射擇諸侯卿大夫士即云是故古者天子之制諸侯歲獻貢士於天子試之射宫其容體比於禮其節比於樂而中多者得與於祭而中少者不得與於祭是其大射擇諸侯羣臣貢士得與祭之事也云諸侯謂三公及王子弟封於畿內者若六命賜官及建其長立其兩可得及卿此經卿與大夫同麋侯明諸侯之內唯有三公王子弟也言封於畿內者此謂王子弟無官直得采地而已封於畿內對魯衛晉鄭之等封在外為諸侯者也云卿大夫亦皆有采地焉者案載師大都任疆地是此諸侯也又云小都任縣地家邑任稍地是其卿大夫亦皆有采地焉云其將祀其先祖亦與其羣臣射以擇之者諸侯亦與畿外諸侯同五廟卿大夫亦三廟此經不云孤孤六命亦與卿同是其祀先祖之事也云凡大射各於其射宫者謂從王已下至大夫大射各自於其西郊之學射宫之中知然者案儀禮大射云公入驁自外而來入明王已下皆於郊學也云侯者其所射也者以其雖有正鵠之别侯是總名故云侯者所射也云以虎熊豹麋之皮飾其側者侯中上下俱有布一幅夾之所飾者唯有兩傍之側故云飾其側也云又方制之以為􅙯謂之鵠著于侯中者梓人為侯廣與崇方故云方制之質者正也所射之處故名為質三分其侯鵠著於侯中云所謂皮侯者所謂梓人張皮侯而棲鵠云王之大射虎侯王所自射也者逺近三等人有尊卑分為三節尊者射逺卑者射近故知王射虎侯諸侯卑於天子其自射射熊侯明助王祭亦射熊侯卿大夫卑於諸侯以其自家射射麋侯五十步明助王亦射豹侯五十步故知射豹侯卿大夫更言已下者兼有士亦射豹侯諸侯之大射熊侯諸侯所自射豹侯羣臣所射以其唯有二侯故分為二等云卿大夫之大射麋侯君臣共射焉者以其唯有一侯故也云凡此侯道虎九十弓至五十弓竝約鄉射記案鄉射記云鄉侯侯道五十弓案大射大侯糝侯犴侯直言九十七十五十不云弓故注鄉射記云大侯九十弓糝侯七十弓犴侯五十弓竝約鄉侯有弓字則大射所云九十者九十弓七十者七十弓五十者五十弓可知也天子三侯與彼畿外諸侯同但用皮别耳故此注虎侯九十弓熊侯七十弓豹麋五十弓云列國之諸侯大射大侯亦九十糝七十犴五十者大射所云者是也鄭注大射云大侯者熊侯也糝侯者糝雜也豹鵠而麋飾下天子大夫也犴侯者犴鵠犴飾也云逺尊得伸可同耳者對此經畿內諸侯之近尊不得同於天子三侯云所射正謂之侯者天子中之已下皆禮記射義云鄭司農云鵠鵠毛也者先鄭意以鵠字與鴻鵠字同故為鵠毛解之案梓人云張皮侯而棲鵠毛非可棲之物故後鄭不從云方十尺曰侯者此先鄭之意見鄉射侯五十弓弓二寸以為侯中侯中一丈故云十尺此先鄭唯解五十步侯於義則可若九十七十五十其侯總方一丈則不可故後鄭不從云四尺曰鵠者案梓人三分其侯鵠居一焉則無此方四尺曰鵠故後鄭亦不從云二尺曰正者案梓人張皮侯而棲鵠大射之侯也又云張五采之侯逺國屬賔射之侯也若然賔射射正大射射鵠此既大射正鵠雜言故後鄭亦不從也云四寸曰質者言質即詩云發彼有的及鵠皆是一物其鵠不止四寸而已故後鄭亦不從𤣥謂侯中之大小取數於侯道者其侯道則去侯逺近之道故引鄉射記鄉射記曰弓二寸以為侯中者二寸據把中側骨中身也弓别取二寸以為侯身也則九十弓者侯中廣丈八尺者據虎侯也又云七十弓者侯中廣丈四尺者據熊侯也五十弓者侯中廣一丈也者據豹侯麋侯也云尊卑異等此數明矣者破司農總方十尺曰侯之言云考工記曰梓人為侯廣與崇方者崇髙也上下為崇橫度為廣如鄉射侯中丈八丈四一丈皆方故云廣與崇方也云參分其廣鵠居一焉者謂三分丈八丈四一丈之侯各取一分而為鵠故云三分其廣鵠居一焉又云然則侯中丈八尺者鵠方六尺自此已下皆重釋鵠居一焉之義以其侯中丈八三六十八故鵠居六尺侯中丈四尺者鵠方四尺六寸大半寸者以其侯中丈四尺取丈二尺三四十二得四尺有二尺在又取尺八寸三六十八又得六寸有二寸在寸各為三分二寸併為六分取二分名為三分寸之二即是大半寸也故云鵠方四尺六寸大半寸也侯中一丈者鵠方三尺三寸少半寸者一丈取九尺三三而九得三尺一尺在又取九寸得三寸仍有一寸分為三分得一分名為少半寸故云鵠方三尺三寸少半寸云謂之鵠者此鄭釋鵠還是虎豹等皮名為鵠意故云謂之鵠者取名於鳱鵠鳱鵠者案淮南子鳱鵠知來俗云鳱鵠是小鳥捷黠者也故云鳱鵠小鳥而難中云亦取鵠之言較較者直也射所以直己志者案禮記射義云循聲而發不失正鵠若然正鵠相對之物若鵠為鳥正亦為鳥若鵠為直正則為正直之正故射義云射者內志正外體直是正鵠之名各有二義又云用虎熊豹麋之皮示伏猛討迷惑者虎熊豹是猛獸將以為侯侯則諸侯也是示能伏得猛厲諸侯麋者迷也將以為侯示能討擊迷惑諸侯云射者大禮故取義衆也者以其祭者是大事射者觀德故為大禮故於三侯之上取義衆多云士不大射士無臣祭無所擇者案孝經云天子諸侯大夫皆言爭臣士則言爭友是無臣也大射者所以擇臣士則無臣可擇故經不言士之大射士自無大射之禮得與天子大射者以其得助祭故也是以鄭注云豹侯卿大夫已下所射已下即士也至於賔射士自為賔射故射人云士犴侯二正不得與天子賔射是以鄭射人注云此與諸侯射士不與是也云故書諸侯則共熊侯虎侯杜子春云虎當為豹不從故書者虎侯是天子大侯不宜在諸侯熊侯之下故不從也大喪廞裘飾皮車注皮車遣車之革路故書廞為淫鄭司農云淫裘陳裘也𤣥謂廞興也若詩之興謂象似而作之凡為神之偶衣物必沽而小耳音義廞許金反徐又火飲反遣棄戰反興虛譍反下同疏釋曰大喪謂王喪廞猶興也興象生時裘而為之謂明器中之裘即上良裘功裘等云飾皮車者亦謂明器之車以皮飾之注釋曰皮車遣車之革路者案冬官考工記飾車欲侈棧車欲弇除棧車之外皆用革鞔即此皮車非專革路鄭特云皮車革路者此司裘所飾唯革路而已云故書廞為淫鄭司農云淫裘陳裘也者此周禮一部之內稱廞者衆多故書皆為淫先鄭皆為陳後鄭皆破從興興謂興象生時之物而作之必知為陳非為興是者車僕云大喪廞革車圉人云廞馬亦如之即是所廞車馬又禮記檀弓云竹不成用瓦不成味琴瑟張而不平竽笙偹而不和皆是興象所作明器非陳設之理故不從先鄭𤣥謂廞興也若詩之興謂象似而作之者象似生時而作但粗惡而小耳云凡為神之偶衣物必沽而小耳者案禮記檀弓孔子云謂為俑者不仁鄭以俑為偶也故鄭云神之偶衣謂作送死之衣與生時衣服相似又云物沽而小者沽粗也謂其物沽略而又小即竹不成用瓦不成味是也凡邦之皮事掌之歲終則㑹唯王之裘與其皮事不㑹掌皮掌秋斂皮冬斂革春獻之注皮革踰歲乾久乃可用獻之獻其良者於王以入司裘給王用疏釋曰云秋斂皮冬斂革春獻之者許氏說文獸皮治去其毛曰革秋斂皮者鳥獸毛毨之時其皮善故秋斂之革乃須治用功深故冬斂之乾久成善乃可獻故春獻之也注釋曰知良者入司裘者以其司裘掌為王大裘以下故知良者入司裘也遂以式法頒皮革于百工注式法作物所用多少故事疏釋曰上文獻良者入司裘其餘入百工因上事故云遂也百工者即冬官六十官主作器物若裘氏韋氏函人之類用皮者也注釋曰云式法作物所用多少故事者作若裘氏作裘函人作甲胄謂皮革皆有用物多少之數有舊法者也共其毳毛為氈以待邦事注當用氈則共之毳毛毛細縟者音義毳尺稅反縟音辱疏釋曰鄭云當用氈則共之謂若掌次張氈案是當其用氈則掌皮共毳毛與冬官使作氈與掌次也歲終則㑹其財齎注財斂財本數及餘見者齎所給豫人以物曰齎今時詔書或曰齎計吏鄭司農云齎或為資音義見賢遍反疏釋曰歲終周之十二月則㑹計其皮之本數之財及出與人物之齎計知多少也注釋曰財斂財本數者經云財與齎二者竝據皮革而言也言斂財本數者謂四方所有皮革之入掌皮之數是本數也云及餘見者謂出給不盡見在庫者也云豫人以物曰齎者齎有兩義上外府注行道曰齎此皮革無行道所用之義故齎為出給與人物解之也云今時詔書或曰齎計吏者漢時考使謂之計吏有詔賜與之則曰齎引之證齎是與人物也鄭司農云齎或為資先鄭意一部書齎或為資也內宰掌書版圖之法以治主內之政令均其稍食分其人民以居之注版謂宫中閽寺之屬及其子弟録籍也圖王及后世子之宫中吏官府之形象也政令謂施閽寺者稍食吏祿稟也人民吏子弟分之使衆者就寡均宿衛疏注釋曰內宰既職當內事與大宰主外事相似故知版之所書者謂宫中閽寺之屬并宫中官之子弟皆屬內宰書之於版焉既主內事故知所圖者不出王及后世子之宫中吏官府之形象也又知政令謂施閽寺者以其閽人主中門之禁寺人掌王之內人之戒令內宰為之長故知政令者施之於閽人寺人也不言內小臣及內豎者蓋亦施之也云稍食吏祿稟也者吏即閽寺弟子宿衛后宫者宫正所均謂宿衛王宫者以米稟為祿之月俸均之者當知見在空闕也云人民吏子弟者以其所均稍食是吏之子弟明所分宿衛還是吏之子弟也以隂禮教六宫注鄭司農云隂禮婦人之禮六宫後五前一王之妃百二十人后一人夫人三人嬪九人世婦二十七人女御八十一人𤣥謂六宮謂后也婦人稱寢曰宫宫隱蔽之言后象王立六宫而居之亦正寢一燕寢五教者不敢斥言之謂之六宫若今稱皇后為中宫矣昏禮母戒女曰夙夜毋違宫事疏釋曰先鄭意以陰禮婦人之禮教六宫之人自后已下至女御後鄭意以婦人之禮教后一人六宫即后也注釋曰先鄭知陰禮婦人之禮者以其將用教婦人故知陰禮是婦人之禮也云六宫後五前一者天子謂之六寢宫人所云者是也后亦象王立宫亦後五前一在王六寢之後為之南北相當耳云王之妃百二十人至八十一人此是禮記昏義之文彼據周法引之者先鄭意欲見內宰教此六宫之人也𤣥謂六宫謂后不從先鄭者若此文兼后至女御應言及與凡殊之下别自教三夫人已下此文既在於上明專教后一人而已云若今稱皇后為中宫矣者漢舊儀有此事也引昏禮者證婦人稱宫之意也以隂禮教九嬪注教以婦人之禮不言教夫人世婦者舉中省文音義省所景反疏注釋曰司農意上文教六宫之人訖此復教九嬪者先鄭意以九嬪掌婦學之法使之教九御故內宰特更别教之也後鄭意下文别教九御故知此教三夫人已下不言三夫人世婦者舉中以見上下省文以婦職之法教九御使各有屬以作二事正其服禁其奇邪展其功緒注婦職謂織紝組紃縫線之事九御女御也九九而御于王因以號焉使之九九為屬同時御又同事也正其服止踰侈竒邪若今媚道展猶録也緒業也故書二為三杜子春云當為二二事謂絲枲之事音義奇紀宜反邪似嗟反本亦作邪紝女金反組音祖紃似倫反線仙戰反字亦作線疏釋曰內宰以婦人職業之法教九御上文世婦已上皆直言陰禮不言職此言職者以其世婦以上貴無絲枲等職業之法故也云使各有屬者女御八十一人九人為一屬屬猶聚也九人同時御又同為絲枲之事注釋曰婦職謂織紝織紝為一事組紃又為一事縫線又為一事三者皆婦職也案詩注云王后織𤣥紞公侯夫人紘綖卿之內子大帶大夫命婦成祭服士妻朝服庶士以下各衣其夫貴賤皆有職者彼示雖貴無得遊手率先之意非如此絲枲二事責其功緒也又云九御女御也者序官云女御故就而釋之也云九九而御于王因以號焉者案下女御職云掌御敘于王之燕寢此云九御是九九而御于王因以號焉云使之九九為屬同時御又同事也者此鄭釋九人為屬之意也云正其服止踰侈者女御褖衣是正不得踰侈服展衣以上也云奇邪若今媚道者案漢書漢孝文時婦人蠱惑媚道更相呪詛作木偶人埋之於地漢法又有宫禁云敢行媚道者若然媚道謂道妖邪巫蠱以自衒媚故鄭舉漢法證經竒邪也大祭祀后祼獻則贊瑶爵亦如之注謂祭宗廟王既祼而出迎牲后乃從後祼也祭統曰君執圭瓚祼尸大宗執璋瓚亞祼此大宗亞祼謂夫人不與而攝耳獻謂王薦腥薦熟后亦從後獻也瑶爵謂尸卒食王既酳尸后亞獻之其爵以瑶為飾音義祼古亂反瑶音遙不與音預酳七靳反劉侯吝反又音𦙍疏釋曰大祭祀謂祭宗廟也后祼者謂室中二祼后亞王祼尸獻謂朝踐饋獻后以玉爵亞王而獻尸則贊者此三事內宰皆佐后祼時以璋瓚授后獻時以玉爵授后故云則贊也瑶爵亦如之者謂尸卒食王酳尸后亞王而酳尸則內宰以瑶爵授后后親酌盎齊以酳尸云瑶爵亦如之者亦贊之也注釋曰以其天地山川社稷等外神后夫人不與又天地無祼此云祼故知經云大祭祀者據宗廟而言也但宗廟之祭四時與禘祫六享皆有此祼獻瑶爵之事故總言宗廟也云王既祼而出迎牲后乃從後祼也者案郊特牲云既灌而出迎牲彼據君而言則知王既祼而出迎牲后乃從祼也案司尊彞注后亞王灌訖乃出迎牲者以郊特牲云既灌而出迎牲以既灌之中不言無后灌是以鄭云后灌後乃迎牲此云迎牲後后乃祼鄭以迎牲是王事欲取王事自相亞故退后祼於迎牲後也又引祭統已下者彼雖諸侯禮欲見后有從王亞祼之事與諸侯同也又云獻謂王薦腥薦孰后亦從後獻也者案禮記禮運云腥其爼孰其殽鄭云腥其爼謂豚解而腥之孰其殽謂體解而孰之是其薦腥薦熟也此二者是堂上朝踐饋獻之節室中二灌訖王出迎牲時祝延尸於户外之西南面后薦八豆八籩王牽牲入以血毛告訖以此腥其爼薦於神前王以玉爵酌醴齊以獻尸后亦以玉爵酌醴齊以獻尸也朝踐訖乃孰其殽薦於神前王以玉爵酌盎齊以獻尸后亦以玉爵酌盎齊以獻尸名為饋獻云瑶爵謂尸卒食王既酳尸后亞獻之者案儀禮鄭注云諸侯尸十三飯天子尸十五飯尸食後王以玉爵酌朝踐醴齊以酳尸謂之朝獻后亦於後以瑶爵酌饋獻時盎齊以酳尸謂之再獻故云后亞獻也云其爵以瑶為飾者鄉來所解知后以瑶爵亞酳尸者約明堂位云爵用玉盞仍雕加以璧散璧角食後稱加彼魯用王禮即知王酳尸亦用玉盞后酳尸用璧角賔長酳尸用璧散彼云璧此云瑶不同者瑶玉名瑶玉為璧形飾角口則曰璧角角受四升爵為總號故鄭云其爵以瑶為飾也正后之服位而詔其禮樂之儀注薦徹之禮當與樂相應位謂房中户內及阼所立處疏釋曰云正后之服位者服謂若內司服褘衣已下六服皆正之使服當其用位謂后助祭之位正之使不失其所而詔其禮樂之儀者后之行禮之時皆合于樂節各當其威儀皆內宰告后使依於法度故云詔其禮樂之儀也注釋曰案九嬪職云贊后薦徹豆籩是后薦徹也天子之禮薦時歌清廟及徹歌雍是薦徹皆有樂節但內宰所詔唯詔禮耳經兼云樂者禮樂相應也云位謂房中户內及阼所六處者但天子諸侯祭禮亡今云位謂房中者案儀禮特牲云主婦亞獻尸尸拜受主婦北面拜送主婦北面拜者避內子及尸酢主婦主婦適房中南面祭酒及主人致爵于主婦亦於房中南面拜受爵至於少牢主婦入户西面獻尸及酢主婦無入房之文則此云位謂房中户內者據特牲士禮而言也云及阼所立處者案少牢有司徹云主人位于阼階上獻尸侑訖主婦乃洗爵于房中出實爵尊南西面獻尸尸拜于筵上受主婦西面于主人席北拜送爵云主人席北即當阼階故云阼所立處此約有司徹而言也贊九嬪之禮事注助九嬪贊后之事九嬪者贊后薦玉齍薦徹豆籩音義齍音咨疏注釋曰贊助也鄭云助九嬪贊后之事者以經云贊九嬪之禮事則助九嬪經自明矣知九嬪贊后者即鄭所引九嬪職贊后為后薦玉齍薦徹豆籩等是九嬪贊后之事即是內宰助九嬪九嬪贊后也凡賔客之祼獻瑤爵皆贊注謂王同姓及二王之後來朝覲為賔客者祼之禮亞王而禮賔獻謂王饗燕亞王獻賔也瑶爵所以亞王酬賔也坊記曰陽侯殺穆侯而竊其夫人故大饗廢夫人之禮疏釋曰賔客則王同姓及二王後以其非一故云凡以廣之云祼者謂行朝覲禮訖即行三享之禮享訖乃賔於户牖之間獻謂饗燕賔客后亦助王獻賔瑶爵謂王饗燕酬賔時后亦助王酬賔皆贊助于后也注釋曰鄭知賔客是王同姓及二王之後者見大行人云上公之禮再祼而酢侯伯一祼而酢子男一祼不酢則是上公乃有再祼王先一祼次后再祼按孝經緯云二王之後稱公則知二王之後有后祼也又案巾車云同姓金路鄭云王子母弟雖為侯伯畫服如上公則此云王之同姓亦謂為侯伯得與上公同再祼亦有后祼可知若同姓為子男者則與異姓同一祼無后祼也故鄭云謂王同姓及二王之後來朝覲為賔客者但祼時大宗伯代后至于拜送則后則內宰亦贊后拜送爵云祼之禮亞王而禮賔者案聘禮有以醴禮賔之言故鄭依而言之若據大行人則云祼也云獻謂王饗燕亞王獻賔也者后之祼者饗燕亦與焉案大行人云上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕無飲酒之禮唯有饗燕耳饗者亨大牢以飲賔立行禮在廟獻依命數爵盈而不飲燕禮其牲狗行一獻之禮四舉旅降脫屨升坐其爵以醉為度饗燕皆有獻賔酬賔后亦助王獻賔酬賔之事內宰皆贊后也引坊記者陽國之侯來朝於穆侯穆侯饗陽侯之時穆侯夫人亦助君獻酬于賔其時陽侯見穆侯夫人色美遂殺穆侯而竊其夫人歸國故大饗廢夫人之禮引之者證古者諸侯夫人助君饗賔明天子后亦有助王饗燕賔故經云后祼獻之事也致后之賔客之禮注謂諸侯來朝覲及女賔之賔客疏注釋曰致后之賔客之禮者謂若酒正云致后之賔客之禮其掌客致夫人之禮彼諸侯夫人致禮于賔客法明后亦致牢禮於賔鄭注掌客凡夫人禮皆使下大夫致之則此內宰亦下大夫也云女賔之賔客者謂畿內同姓諸侯夫人有㑹見王后之法故亦致禮焉凡喪事佐后使治外內命婦正其服位注使使其屬之上士內命婦謂九嬪世婦女御鄭司農云外命婦卿大夫之妻王命其夫后命其婦𤣥謂士妻亦為命婦疏釋曰喪言凡則王及后世子已下皆是以其皆有服位故云凡以廣之凡有喪事內宰皆佐后使其屬官治外內之命婦正其服之精粗位之前後也注釋曰以外內命婦卑故內宰不自治之故經云使明使其屬之上士治之云內命婦謂九嬪世婦女御者以其對外命婦故知內命婦是九嬪已下可知也不言三夫人者三夫人從后不在治限故不言也司農云王命其夫后命其婦者先鄭見禮記玉藻曰君命屈狄是子男夫人彼是后命之明王朝之臣亦王命其夫后命其婦可知𤣥謂士妻亦為命婦者夏殷之禮爵命不及於士周之禮上士三命中士再命下士一命夫尊于朝妻榮於室明士妻亦為命婦可知若然喪服命其命婦皆據大夫不含士者彼據降服不降服為說故唯據大夫為命夫其妻為命婦不及士也凡建國佐后立市設其次置其敘正其肆陳其貨賄出其度量制祭之以隂禮注市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相成之義次思次也敘介次也陳猶處也度丈尺也量豆區之屬鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立社也故書淳為敦杜子春讀敦為純純謂幅廣也制謂匹長𤣥謂純制天子巡守禮所云制幣丈八尺純四􅡥與隂禮婦人之祭禮音義劉諸允反注皆同徐音純朝直遙反下同介音界或作分非純諸允反下同􅡥音紙與音餘疏釋曰王者建國非定一所隨世而遷謂若自契至湯八遷大王遷岐文王遷豐武王遷鎬成王營洛皆是建國故云凡以該之也凡建國內宰佐后立市設其次謂司市所居置其敘謂胥師賈師等所居正其肆謂諸行列肆之等陳其貨賄貨賄為有諸物皆陳列之也出其度量謂內宰佐后出度之丈尺量之斗斛及出淳之幅廣狹并制之丈八尺又於市中祭之以陰禮謂婦人之祭禮也注釋曰云市朝者君所以建國也者謂建國必須有市朝故鄭即覆釋云建國者必面朝後市面朝後市乃冬官匠人文云王立朝者即三朝皆王立之也而后立市者即此文是也云陰陽相成之義者朝是陽王立之市是陰后立之獨陽不生獨陰不成故云陰陽相成之義也云次思次也者地官司市云思次介次彼注破思為司字解之云敍介次也者亦司市文介副也謂若胥師賈師等所居也案司市注次謂吏所治舍思次介次也若今市亭然敘肆行列也與此注不同者鄭望文解之彼經無肆文故以敘為行列并思次介次共為一所解之此文自有肆文故分思次介次别釋也云陳猶處也者謂處置其貨賄也云度丈尺也者律厯有分寸尺丈引五度今只言丈尺略言之也云量豆區之屬者此案左氏昭公傳晏子云齊舊四量豆區釡鍾又案律厯五量籥合升斗斛此獨言豆區者之屬中含之又云祭之以陰禮者市中之社先后所立社也者市乃先后所立故以陰禮為市中之社亦先后所立社也云故書淳為敦杜子春讀敦為純純謂幅廣也制謂匹長𤣥謂純制天子巡守禮所云制丈八尺純四􅡥與此二者竝增成子春義趙商問云天子巡守禮制丈八尺純四􅡥何答云巡守禮制丈八尺咫八寸四咫三尺二寸又大廣四當為三三八二十四二尺四寸幅廣也古三四積畫是以三誤為四也中春詔后帥外內命婦始蠶于北郊以為祭服注蠶于北郊婦人以純隂為尊郊必有公桑蠶室焉音義中音仲疏釋曰云中春詔后帥外內命婦始蠶于北郊者內宰以仲春二月詔告也告后帥領外命婦諸臣之妻內命婦三夫人已下始蠶於北郊云以為祭服者禮記祭義亦云蠶事既畢遂朱緑之𤣥黃之以為祭服此亦當染之以為祭服也注釋曰云蠶於北郊婦人以純陰為尊者案禮記祭統云天子親耕於南郊鄭以諸侯為少陽是天子以純陽為尊則后蠶於北郊純陰為尊也云郊必有公桑蠶室焉者案月令三月后妃親東鄉躬桑此云二月與彼不同者案馬職云禁原蠶者彼注天文辰為馬引蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣故此亦仲春始蠶蠶者亦謂浴種至三月臨生蠶之時又浴種乃生之故設文異也歲終則㑹內人之稍食稽其功事注內人主謂九御疏釋曰歲終亦謂周之季冬內宰則㑹計內人女御之稍食稍食則月請是也云稽其功事者稽計也又當計女御絲枲二者之功事以知多少注釋曰知內人主是女御者案典婦功授嬪婦及內人女功之事齎嬪婦既是九嬪世婦明內人是九御也佐后而受獻功者比其小大與其粗良而賞罰之注獻功者九御之屬鄭司農云蒸而獻功𤣥謂典婦功曰及秋獻功疏釋曰佐后而受獻功者謂內宰佐助后而受女御等獻絲枲之功布帛等云比其小大與其粗良者布帛之等縷小者則細良縷大者則粗惡今言粗不云惡言良不云細者互見為義也云而賞罰之者良則賞之粗則罰之以示懲勸也注釋曰鄭知獻功是九御之屬者上文云以婦職之法教九御明所受獻功還是九御之屬可知司農云蒸而獻功謂冬獻功𤣥引典婦功職秋獻功不從先鄭者以其內宰佐后受明是婦官所造還是典婦功女御等秋獻功也㑹內宫之財用注計夫人以下所用財疏釋曰以其云內宫是總六宫之內所有財用皆會計之故鄭云計夫人以下所用財也正歲均其稍食施其功事憲禁令于王之北宫而糾其守注均猶調度也施猶賦也北宫后之六宫謂之北宫者繫于王言之明用王之禁令令之守宿衛者音義調徒弔反度待洛反或如字疏釋曰正歲謂建寅之月歲始故總均宫中所受稍食月俸之人因歲始又施其女功絲枲之事憲禁令于王之北宫者亦以歲始憲謂表縣禁令于王之北宫北宫則后宫而糾其守者謂宿衛之子弟糾其惰慢者也注釋曰鄭以均為調度者受月請者尊卑各有常度今均之者謂調之使依常度云謂之北宫者係於王言之明用王之禁令令之者欲見王有六寢后有六宫各自不同必繫王而言者婦人有三從之義后雖自有六宫必資王之禁令故繫王而言也云守宿衛者謂若宫伯所掌士庶子者也上春詔王后帥六宫之人而生穜稑之種而獻之于王注六宫之人夫人以下分居后之六宫者古者使后宫藏種以其有傳類蕃孳之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後孰謂之穜後種先孰謂之稑王當以耕種于籍田𤣥謂詩云黍稷穜稑是也夫人以下分居后之六宫者每宫九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯其所燕息焉從后者五日而沐浴其次又上十五日而遍云夫人如三公從容論婦禮音義穜直龍反本或作重音同案如字書禾旁作重是種稑之字作童是穜殖之字今俗則反之稑音六本又作穋同種章勇反注藏種同傳直宣反下同蕃音煩孳音兹又作滋又上時掌反而遍云音遍絶句從容如字疏釋曰上春者亦謂正歲以其春事將興故云上春也內宰以上春建寅之月又詔告王后帥領六宫之人而生穜稑之種而獻之於王者一則助王耕事二則示於宫內無傷敗之義也注釋曰云古者使后宫藏種以其有傳類蕃孳之祥者王妃百二十人使之多為種類藏種者亦是種類蕃孳之祥故使藏種也云必生而獻之示能育之使不傷敗者生此種乃獻之非直道此種不傷敗示於宫內懷孕者亦不傷也云且以佐王耕事者王親耕后親蠶皆為祭事今后雖不耕藏種獻之者亦是佐王耕事云共禘郊也者禘謂祭廟郊謂祀天舉尊言之其實山川社稷等皆用之也鄭司農云先種後孰謂之穜後種先孰謂之稑者今世見有此先種後孰後種先孰目驗可知也𤣥謂詩云黍稷穜稑是也此增成先鄭義亦以其先鄭直云先種後種不見榖名後鄭意黍稷皆有穜稑云夫人以下分居后之六宫者此已下亦是增成鄭義所分居者唯據九嬪以下三夫人不分居而云三夫人以下則除三夫人亦得為三夫人以下也云每宫者后六宫故云每此言與下為目也九嬪一人者九嬪九人六宫各一人則三人在也世婦三人者世婦二十七人六宫每宫三人則九人在也女御九人者女御八十一人六宫宫各九人餘二十七人在也其餘謂不分者故云其餘九嬪三人世婦九人女御二十七人也云從后唯其所燕息焉者后不專居一宫須往即停故云唯其燕息焉云從后者五日而沐浴者凡侍尊者須潔淨故須沐髮浴身體也其次又上十五日而遍云者鄉所分居六宫九嬪以下皆三分之一分從后兩分居宫假令月一日一分從后至月五日從后者五日滿則右邊三宫之中舊居宫者來替此從后者從后者又來入右邊三宫從后者至十日又滿則左邊三宫者來替此從后者從后者來居左邊三宫又至十五日則三番總遍故云十五日而遍云者無正文鄭以意配之故言云以疑之云夫人如三公從容論婦禮者王后六宫夫人有三分居不遍因即尊之三公坐與王論道三夫人尊卑與三公同三公侍王三夫人亦待后故取竝焉者以證三夫人不分居宫之義也內小臣掌王后之命正其服位注命謂使令所為或言王后或言后通耳音義令力呈反疏釋曰敘官云奄上士四人案夏官太僕云掌正王之服位出入王之大命則太僕掌王命及服位此小臣亦云掌王后之命正其服位則小臣侍后與太僕侍王同也注釋曰云命謂使令所為者以其后無外事明云命者是使令所為云或言王后或言后通耳者以此經及上經皆云王后下文則皆云后鄭恐人以為别有義意故云通耳無義例也后出入則前驅注道之音義道音導疏釋曰此小臣是奄人與后導道是其常也若有祭祀賔客喪紀則擯詔后之禮事相九嬪之禮事正內人之禮事徹后之俎注擯為后傳辭有所求為詔相正者異尊卑也俎謂后受尸之爵飲于房中之俎音義相息亮反注同為后于僞反疏釋曰云若有祭祀賔客喪紀則擯者此三者事至無常故云若若不定之辭也則擯者此三者后皆有事九嬪以下從后往也三事皆與后為擯贊也云詔后之禮事相九嬪之禮事正內人之禮事者詔相正皆是上擯但據尊卑不同故以詔相别之云徹后之俎者謂后於東房中受尸酢之俎內小臣徹之注釋曰言擯為后傳辭有所求為者后為上三事須物則小臣擯贊而傳辭與諸司求物供所為也云詔相正者異尊卑也者后尊云詔詔告而已九嬪稍卑則言相相佐助之言也女御卑直正之而已云俎謂后受尸之爵飲於房中之俎者天子諸侯祭禮亡案特牲薦俎乃受尸之酢次主婦酳尸尸酢主婦於東房中受尸之酢亦有薦爼后之俎小臣所徹亦約與士禮主婦之俎同也后有好事于四方則使往有好令於卿大夫則亦如之注后於其族親所善者使往問遺之音義好呼報反下同遺唯季反疏注釋曰后於其族親者后有族親在四方謂畿外諸侯於王有親謂若魯衛晉鄭之等也於卿大夫亦謂同姓族在朝廷者也王后意有所善遣小臣往以物問遺之四方諸侯言事卿大夫言令者后雖無正令施與卿大夫時有言教至焉故云令也后於畿外全無言教所及故以事言之也掌王之隂事隂令注隂事羣妃御見之事若今掖庭令晝漏不盡八刻白録所記推當御見者隂令王所求為於北宫音義見賢遍反下同掖劉音亦疏注釋曰云隂事羣妃御見之事者謂若九嬪職後鄭所云者是也又云隂令王所求為於北宫者王於北宫求為謂若縫人女御為王裁縫衣裳及絲枲織紝之等皆是王之所求索王之所造為者也言北宫者對王六寢在南以后六宫在北故云北宫也閽人掌守王宫之中門之禁注中門於外內為中若今宫闕門鄭司農云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門𤣥謂雉門三門也春秋傳曰雉門災及兩觀音義觀古喚反疏釋曰言閽人者墨者使守門閽人守王宫中門耳中門者王有五門雉門為中門掌守雉門之禁譏其出入之者也注釋曰中門於外內為中者雉門外有臯庫內有應路故云於外內為中也鄭司農云王有五門庫門在雉門內為中門路門一曰畢門者取尚書顧命云二人爵辨立于畢門之內言路門者路大也人君所居皆曰路以大為名言畢門者從外而入路門為終畢𤣥謂雉門為三門者破先鄭雉門為二門必知雉門為中門者凡平常諸侯三門有臯應路詩云乃立臯門臯門有亢乃立應門應門將將者是也若魯三門則有庫雉路故明堂位說魯制三兼四云庫門天子臯門則庫門向外兼臯門矣又云雉門天子應門則雉門向內兼應門矣既言庫門向外兼臯門雉門向內兼應門則天子五門庫門在雉門外明矣又引春秋傳者定公二年夏五月壬辰雉門及兩觀災公羊傳曰曷為不言雉門災及兩觀主災者兩觀也主災者兩觀則曷為後言之不以微及大也今鄭所引不與彼傳同者鄭勦傳非彼正文也引之者證魯有三門雉門有兩觀為中門則知天子五門雉門亦為中門有兩觀矣喪服凶器不入宫潛服賊器不入宫奇服怪民不入宫注喪服衰絰也凶器明器也潛服若衷甲者賊器盜賊之任器兵物皆有刻識奇服衣非常春秋傳曰尨竒無常怪民狂易音義衰徐音崔識式志反又音式尨亡江反易以豉反徐音陽疏注釋曰鄭云喪服衰絰也者案下曲禮云苞屨扱衽厭冠不入公門苞屨謂杖齊衰扱衽斬衰初死服厭冠緦小功冠檀弓云士唯公門脫齊衰服問云大功免絰鄭云衰絰義出於彼也云凶器明器也者案士喪禮主人所造曰明器賔客所致曰就器此經凶器亦應兼有就器而云凶器明器者以主人明器為主也云潛服若衷甲者謂若襄公二十七年將盟于宋西門之外楚人衷甲是也云兵物皆有刻識者案定十年侯犯以郈叛叔孫氏之甲有物是也云竒服衣非常春秋傳曰尨竒無常者案閔二年晉使大子申生伐東山臯落氏衣以偏衣佩之金玦罕夷曰尨竒無常金玦不復先丹木曰狂夫阻之是也凡內人公器賔客無帥則幾其出入注三者之出入當須使者符節乃行鄭司農云公器將持公家器出入者幾謂無將帥引之者則苛其出入音義帥色類反注同使色吏反將帥子匠反苛本又作呵呼河反又音何徐黑嗟反疏注釋曰云當須使者符節者道路用旌節乃得行耳以時啓閉注時漏盡疏注釋曰漏盡者謂若夏至晝則日見之漏六十刻夜則四十刻冬至晝則日見漏四十刻夜則六十刻就時之間大判九日校一刻凡外內命夫命婦出入則為之闢注辟行人使無干也內命夫卿大夫士之在宫中者音義為于僞反闢本又作辟婢亦反避也注同疏注釋曰內命夫卿大夫士之在宫中者謂若宫正所掌者也對在朝卿大夫士為外命夫鄭雖不解外內命婦其外命婦則總外內命夫之妻內命婦即三夫人已下也掌掃門庭注門庭門相當之地音義掃素報反疏注釋曰閽人掌中門則門相當之地唯中門外之地謂之門庭也若餘門庭則各有守門者掃之也大祭祀喪紀之事設門燎蹕宫門廟門注燎地燭也蹕止行者廟在中門之外音義燎力召反又力弔反疏釋曰喪紀設門燎蹕宫門廟門者大喪以下朝廟及出葬之時宫中及廟門皆設門燎蹕止行人也注釋曰燎地燭也者燭在地曰燎謂若天子百公五十侯伯子男皆三十所作之狀蓋百根葦皆以布纒之以蜜塗其上若今臘燭矣對人手爇者為手燭故云地燭也又云廟在中門之外者謂若小宗伯云左宗廟右社稷凡賔客亦如之疏釋曰賔客在宫中廟中謂若饗食在廟燕在寢皆為設門燎及蹕止行人寺人掌王之內人及女宫之戒令相道其出入之事而糾之注內人女御也女宫刑女之在宫中者糾猶割察也音義相息亮反下及注同道徒報反後同疏注釋曰女宫刑女之在宫中者謂男女沒入在宫為嬪者也若有喪紀賔客祭祀之事則帥女宫而致於有司注有司謂宫卿世婦疏注釋曰知有司是宫卿世婦者案春官宫卿世婦云掌女宫之宿戒及祭祀比其具此既言致於有司明是男子官宫卿所掌女宫也非是下文世婦之帥女宫者也佐世婦治禮事注世婦二十七世婦疏注釋曰上云有司是宫卿世婦恐此亦是彼世婦故鄭云二十七世婦以寺人是奄者故得佐世婦治喪事禮事即世婦所掌祭祀賔客喪紀之事是也掌內人之禁令凡內人弔臨於外則帥而往立于其前而詔相之注從世婦所弔若哭其族親立其前者賤也賤而必詔相之者出入於王宫不可以闕於禮音義臨良鴆反後同疏注釋曰鄭知從世婦不自弔臨者此直言凡內人弔臨于外不指斥其事故知不自弔臨案世婦職云掌弔臨于卿大夫之喪故內人得從之也云若哭族親者世婦所掌弔唯云弔卿大夫云哭族親據理而言王后有哭族親之法則內人女御亦往哭之內豎掌內外之通令凡小事注內后六宫外卿大夫也使童豎通王內外之命給小事者以其無與為禮出入便疾內外以大事聞王則俟朝而自復音義便婢面反朝直遙反下同疏注釋曰鄭知豎是童子者謂若春秋左氏叔孫穆子於庚宗婦人生牛牛能奉雉使為豎也又知童子無與為禮者案禮記玉藻云童子無事則立於主人之南北面云內外以大事聞王則俟朝而自復者經云凡通小事復白也明大事待朝自復不使內豎也若有祭祀賔客喪紀之事則為內人蹕注內人從世婦有事於廟者內豎為六宫蹕者以其掌內小事音義為于僞反注下同疏釋曰此豎為祭祀賔客喪紀三事為內人蹕者皆謂在廟時若然祭祀在廟謂禘祫四時之祭祀也賔客在廟謂饗食時也喪紀在廟謂喪朝廟為祖奠遣奠時也皆為內人蹕止行人也注釋曰鄭知此內人從世婦者內人卑不專行事案下世婦職云掌祭祀已下三事與此經三事同明此內人從世婦而濯溉及為粢盛也云內豎為六宫蹕者以其掌內小事者以其蹕止行人既是小事故還使內豎掌小事者蹕也王后之喪遷于宫中則前蹕及葬執褻器以從遣車注喪遷者將葬朝于廟褻器振節頮沐之器音義遣棄戰反後遣車皆放此頮呼內反疏釋曰后喪遷於宫中謂七月而葬將葬而朝七廟則亦使內豎在車前蹕止行人也云及葬執褻器以從遣車者謂朝七廟訖且將行在大祖廟中為大遣奠苞牲取下體天子大牢苞九箇遣車九乘后亦同使人持之往如墓則此內豎執褻器從遣車之後以其遣車載牲體鬼神依之故使執褻器從之若生時亦執褻器從也注釋曰鄭知喪遷是將葬朝於廟者以其喪柩遷在宫中唯有朝廟時故禮記檀弓云周朝而遂葬是也云褻器振飾頮沐之器者以其從遣車若生時從后后之私褻小器唯有振飾頮沐之器故為此解也若然玉府云凡褻器鄭注以為清器虎子不為振飾頮沐器者彼據生時故與牀第等連文但死者器物雖皆不用仍法其威儀者故此注褻器為振飾頮沐之器不為清器虎子也知其振飾頮沐器者案特牲為尸而有槃匜并有簟巾巾為振飾槃匜為盥手明其頮面沐髮亦有之故既夕禮用器之中有槃匜是送葬之時有褻器也九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所注婦德謂貞順婦言謂辭令婦容謂婉娩婦功謂絲枲自九嬪以下九九而御於王所九嬪者既習於四事又備於從人之道是以教女御也教各帥其屬者使亦九九相與從於王所息之燕寢御猶進也勸也進勸王息亦相次敘凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而遍云自望後反之孔子云日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀音義婉於阮反娩音晚見賢遍反月上時掌反放方往反疏釋曰云掌婦學之法者謂婦人所學之法即婦德已下是也言以時御敘于王所者謂月初卑者為始望後尊者為先是也注釋曰鄭知婦德謂貞順已下義如此者但此經唯有四事之言無别事目案內則云姆教婉娩聽從執麻枲治絲繭織紝組紃故鄭此注婦德謂貞順當彼聽從此云婦容謂婉娩還當彼婉娩也此云婦功謂絲枲還當彼執麻枲已下惟婦言注與彼少異此注以婦言謂辭令彼內則注以婉為言語婉之言媚也謂容貌也不同者以彼經無四事之言故分婉娩為二事以充四德此有四事之言故并婉娩為容貌别以辭令解婦言然彼以婉娩亦兼婦言者以其言語婉順亦得為容貌故也云自九嬪以下九九而御於王所者欲見三夫人及后各當一夕不為九御也言此者釋經稱女御為九御之意云九嬪者既習於四事又偹於從人之道是以教女御也者釋經使九嬪教女御之意云既習於四事即經婦德之等是也云又備於從人之道謂御序之事即經各帥其屬以時御敘於王所是也云各帥其屬者使亦九九相與從於王所息之燕寢者此釋經以時御敘于王所之事云亦九九相與從王者亦上居宫及以作二事皆九人相配故以亦言之也云御猶進也勸也進勸王息者案左傳云君子晝以訪問夜以安身女者定男於夜節宣其氣故云勸王息也云亦相次敘者亦上居宫有次敘也云凡羣妃御見已下無正文鄭以意消息婦人者隂象月紀故月與后妃共象也云卑者宜先尊者宜後者案禮運云三五而盈三五而闕后以下法之故從微嚮著卑者宜先從著嚮微卑者宜後也云亦十五日而遍云者言亦者亦上居宫言云者亦無正文故以云疑之也云孔子云已下者孝經援神契文但彼是孔子所作故言孔子云也云日者天之明者本合在天云月者地之理者本合在地今以陽尊而隂卑月乃為天契制所使故云隂契制上屬為天使是以月上屬於天隨日而行云婦從夫放月紀者解后已下就王燕寢而御之意凡祭祀贊玉齍贊后薦徹豆籩注玉齍玉敦受黍稷器后進之而不徹故書玉為王杜子春讀為玉音義齍音咨劉祖稽反敦音對疏釋曰言凡祭祀者后無外事唯有宗廟禘祫與四時月祭等故云凡祭祀贊玉齍者但祭祀之時男子進俎婦人設豆籩簠簋贊助也助后薦玉齍也云贊后薦徹豆籩者豆籩之薦與徹皆助后也注釋曰云玉齍玉敦受黍稷器者案明堂位云有虞氏之兩敦周之八簋則周用簋特牲少牢大夫士用敦今周天子用玉敦者明堂位賜魯得兼用四代之器用敦明天子亦兼用可知云玉敦者謂以玉飾敦謂若玉府云珠盤玉敦但彼以珠盤盛牛耳玉敦盛血此玉敦盛黍稷為異耳云后進之而不徹知者豆籩云贊薦徹玉齍直贊不云薦徹明直贊進之而已案禮器云管仲鏤簋注云天子飾以玉此直云玉敦則簋亦飾以玉而不云者但玉敦后親執而設之故特言之其簋則九嬪執而授后后設之若少牢主婦親受韭菹醯醢其餘婦贊者授主婦主婦設之故不言也若有賔客則從后注當贊后事疏注釋曰后之有事於賔客者唯有諸侯來朝王親饗燕后當助王饗燕時九嬪從后往也大喪帥敘哭者亦如之注亦從后帥猶道也后哭之衆次敘者乃哭疏釋曰大喪謂王喪帥敘哭者謂若外內命婦哭時皆依尊卑命數在后後為前後列位哭之故須帥導使有次敘也周禮注疏卷七周禮注疏卷七考證職內疏云以逆邦國之賦用者監本脫云字國字今据經文改正職歲凡官府都鄙羣吏之出財用疏用有常式式監本訛作職今依大宰九式之式改正司裘王大射注又方制之以為􅙯臣紱按􅙯字字書無之當作􅙯從享從羊音義本亦作凖是也內宰職淳制之淳釋文作足以證之內宰大祭祀后祼獻則贊瑶爵亦如之石經瑶爵上衍贊字既云亦如之則不必言贊矣凡建國佐后立市注王立朝而后立市隂陽相成之義次思次也監本成訛作承思訛司今据疏及司市職文改正閽人掌守王宫之中門之禁疏雉門外有臯庫內有應路內監本訛作門今改正寺人掌王之內人及女宫之戒令疏女宫刑女之在宫中者謂男女沒入在宫為嬪者也嬪疑是役字周禮注疏卷七考證
