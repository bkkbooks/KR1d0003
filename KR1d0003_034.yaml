body:
  text: 周禮注疏卷三十四漢鄭氏注唐陸德明音義賈公彥疏秋官司寇第五惟王建國辨方正位體國經野設官分職以為民極疏釋曰義已具在天官乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國注禁所以防姦者也刑正人之法孝經説曰刑者侀也過出罪施音義侀音刑疏注釋曰云禁所以防姦者也者案士師五禁以左右刑罰王者恐民以姦入罪故先設禁示之防其姦惡若有不忌為姦然後以刑罪之云刑正人之法者刑期於無刑以殺止殺故云刑正人之法也云孝經説曰者孝經援神契五刑章曰刑者侀也過出罪施者下侀為著也行刑者所以著人身體過誤者出之實罪者施刑是以尚書云眚災肆赦怙終賊刑引之者證司冦行刑當審慎也刑官之屬大司寇卿一人小司寇中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人注士察也主察獄訟之事者鄭司農説以論語曰柳下惠為士師鄉士主六鄉之獄音義鄉音香注同疏釋曰自此已下論設官分職之事云刑官之屬者此一句總為刑官六十官為目故云之屬云大司冦卿一人六命小司冦中大夫二人四命士師者秋官之考雖下大夫四人亦四命鄉士其職云掌國中國中兼百里內六鄉以八人分主六鄉故謂之鄉士上士八人三命中士十有六人二命旅下士三十有二人一命下士言旅旅衆也小官理衆事也注釋曰訓士為察者義取察理獄訟是以刑官多稱士先鄭引論語士師欲見士官理獄訟之事案上代以來獄官之名有異是以月令命理瞻傷察瘡鄭注云有虞氏曰士夏曰大理周曰大司冦天子諸侯同故魯有司冦晉魏絳亦云歸死於司冦至於衰世國異政家殊俗官名隨意所造故僖二十八年晉有士榮為大士文十年楚子西云臣歸死于司敗論語云陳司敗昭十四年士景伯如楚叔魚攝理是後官號不同者也府六人史十有二人胥十有二人徒百有二十人疏釋曰在此者府治藏吏史作文書胥為什長徒給繇役義已在天官疏自大司冦已下至胥徒皆是同官别職故各有職而同府史也遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人注遂士主六遂之獄者疏釋曰在此者案其職云掌四郊四郊有六遂之獄故也鄉士主六鄉之獄遂士主六遂之獄所以鄉士使上士官尊而人少遂士使中士官卑而人多者六遂去王遠故官卑以六遂在逺郊外兼主公邑地廣人衆故官多縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人注距王城三百里至四百里曰縣縣士主縣之獄者疏釋曰在此者案其職云掌野謂掌三等公邑之獄故鄭於縣士職注云二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都郊外曰野大總言之故其職云掌野其六遂之中公邑之獄遂士兼掌之矣既三處獄並掌而此注云距王城三百里至四百里曰縣似不主三百里中五百里中獄者縣在四百里中故舉中以言其實外內皆掌之耳方士中士十有六人府八人史十有六人胥十有六人徒百有六十人注方士主四方都家之獄者疏釋曰在此者案其職云掌都家鄭彼注云都王子弟及公卿之采地家大夫之采地此三等采地之獄采地在王城四方故云方士也是以鄭此注云方士主四方都家之獄者也訝士中士八人府四人史八人胥八人徒八十人注訝迎也士官之迎四方賔客音義訝五嫁反疏釋曰在此者案其職云掌四方之獄訟非直迎賔客實以獄訟為主故亦以士名之也朝士中士六人府三人史六人胥六人徒六十人注朝士主外朝之法音義朝直遙反卷內同疏釋曰在此者案其職云掌建邦外朝之法左九棘右九棘之事以朝主為詢衆庶讞疑獄故屬秋官但序官之法秋官雖為刑獄所施至於防禁之屬皆在秋官又以賔客是主人所敬故鄉飲酒坐賔於西北象天地嚴凝之氣始於西南盛於西北是以賔客之事亦屬焉注釋曰云朝士主外朝之法者天子諸侯皆三朝內朝二路門外與路寢庭是也外朝一此朝在臯門內庫門外是也司民中士六人府三人史六人胥三人徒三十人注司民主民數疏釋曰在此者案其職云掌登萬民之數凡斷獄弊訟必須知民年幾老幼是以司民雖非刑獄連類在此也司刑中士二人府一人史二人胥二人徒二十人疏釋曰在此者案其職云掌五刑之法以麗萬民之罪故其職在此司刺下士二人府一人史二人徒四人注刺殺也三訊罪定則殺之音義刺七賜反訊音信疏釋曰在此者案其職云掌三刺三宥三赦之法亦是刑獄之類故在此司約下士二人府一人史二人徒四人注約言語之約束音義約劉於妙反一音如字注同束劉詩樹反一音如字疏釋曰在此者案其職云掌邦國及萬民之約劑亦是禁戒之事故在此司盟下士二人府一人史二人徒四人注盟以約辭告神殺牲歃血明著其信也曲禮曰涖牲曰盟音義約於妙反歃所洽反疏釋曰在此者案其職云掌盟載之法亦是禁戒之事故在此職金上士二人下士四人府工人史四人胥八人徒八十人注職主也疏釋曰在此者案其職云掌凡金玉之戒令又云掌受金罰貨罰亦是刑獄之事故在此司厲下士二人史一人徒十有二人注犯政為惡曰厲厲士主盜賊之兵器及其奴者疏釋曰在此者案其職云掌盜賊之任器又云其奴男子入于罪隸亦是刑獄之事故在此也注釋曰云犯政為惡曰厲者厲是惡鬼殺厲之事故以造惡為厲也云厲士主盜賊之兵器者其職文也犬人下士二人府一人史二人賈四人徒十六人音義賈音嫁又音古疏釋曰在此者案其職云凡祭祀共犬牲犬是金畜故五行傳云二曰言言之不從則有犬禍故連類在此犬有兩義案説卦艮為狗艮卦在丑艮為止以能吠守止人則屬艮以能言則屬兌兌為言故也司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人注鄭司農云圜謂圜土也圜土謂獄城也今獄城曰圜司圜職中言凡圜土之刑人也以此知圜者謂圜土也又大司寇職曰以圜土聚教罷民故司圜職曰掌收教罷民音義圜于權反罷音皮下同疏釋曰在此者案其職云掌圜土之刑人亦刑獄之事故在此注釋曰先鄭所引皆當其義故後鄭從之但獄城圜者東方主規規主仁恩凡斷獄以仁恩求出之故圜也掌囚下士十有二人府六人史十有二人徒百有二十人注囚拘也主拘繫當刑殺之者疏釋曰在此者案其職云掌守盜賊凡囚者刑獄之事故在此也掌戮下士二人史一人徒十有二人注戮猶辱也既斬殺又辱之疏釋曰在此者案其職云掌斬殺賊諜而搏之刑罪之事故在此司隸中士二人下士十有二人府五人史十人胥二十人徒二百人注隸給勞辱之役者漢始置司隸亦使將徒治道溝渠之役後稍尊之使主官府及近郡疏釋曰在此者案其職云掌五隸之法五隸皆是罪人故在此注釋曰以隸是罪人為奴隸故知給勞辱之役也又引漢始置司隸云云者以漢時司隸官與周同故舉以為況也罪隸百有二十人注盜賊之家為奴者疏釋曰此中國之隸言罪隸古者有大罪身既從戮男女緣坐男子入於罪隸女子入於舂稿故注云盜賊之家為奴者也蠻隸已下皆百二十人者鄭云凡隸衆矣此其選以為役員者謂隸中選取善者以為役之員數以百二十人為限其餘衆者以為隸民故司隸職云帥其民而搏盜賊役國中之辱事之等是百二十人外謂之民者也蠻隸百有二十人注征南夷所獲閩隸百有二十人注閩南蠻之别音義閩亡巾反又音文夷隸百有二十人注征東夷所獲貉隸百有二十人注征東北夷所獲凡隸衆矣此其選以為役員其餘謂之隸民音義貉孟百反布憲中士二人下士四人府二人史四人胥四人徒四十人注憲表也主表刑禁者疏釋曰在此者案其職云掌憲邦之刑禁故在此也注釋曰知憲不為法而為表者案其職云正月之吉執旌節以宣布於四方而憲邦之刑禁明憲為表懸示人使知者也禁殺戮下士二人史一人徒十有二人注禁殺戮者禁民不得相殺戮疏釋曰在此者案其職云掌司斬殺戮者以告而誅之是禁民相殺戮之事故在此也禁暴氏下士六人史三人胥六人徒六十人疏釋曰此亦謂禁民不得相陵暴在此者案其職云掌禁庶民之亂暴力正者亦是防禁之事故在此也野廬氏下士六人胥十有二人徒百有二十人注廬賔客行道所舍疏釋曰在此者案其職云掌達國道路又云掌凡道禁亦是禁戒之事故在此也注釋曰知廬是賔客行道所舍者見遺人云十里有廬三十里有宿故知之也蠟氏下士四人徒四十人注蠟骨肉腐臭蠅蟲所蠟也月令曰掩骼貍胔此官之職也蠟讀如狙司之狙音義蠟清預反注同蠅以繩反骼更白反貍亡皆反本又作埋胔本又作胔似賜反疏釋曰在此者案其職云掌除胔又云凡國之大祭祀禁刑者凶服者亦是禁戒之事故在此注釋曰引月令掩骼埋胔者案彼注骨枯曰骼肉腐曰胔掩亦埋但骼胔不同故别言也言骼胔者凡人物皆是云蠟讀如狙司之狙者俗有狙司之言故讀從音也若然月令所云是春時今不在春官者彼月令為春時陽不欲行隂之事故在春此取禁戒之事故在秋也雍氏下士二人徒八人注雍謂隄坊止水者也音義雍於勇反劉如字注同隄丁兮反疏釋曰在此者案其職云掌溝瀆澮池之禁亦是禁戒之事故在此也萍氏下士二人徒八人注鄭司農云萍讀為蛢或為萍號起雨之萍玄謂今天問萍號作萍爾雅曰萍蓱其大者蘋讀如小子言平之平萍氏主水禁萍之草無根而浮取名於其不沈溺音義萍音平又蒲丁反蛢蒲丁反爾雅云蛂蟥蛢郭注云甲蟲大如虎豆緑色萍號蒲丁反萍蓱音平本亦作蘋同萍蒲丁反蘋音頻疏釋曰在此者按其職云掌國之水禁亦是禁戒之事故在此也注釋曰先鄭讀萍為蛢取音同云或為萍號起雨之萍者亦天問之文萍亦浮萍之草也玄謂今天問者離騷有天問篇天不可問故以天問為名此就足先鄭音義同引爾雅萍蓱其大者蘋者此以義相曉也云讀如小子言平之平者俗讀取音同皆取萍水草無根而浮不沉禁人使不沉溺如萍也司寤氏下士二人徒八人注寤覺也主夜覺者音義覺音教下同疏釋曰在此者案其職云禦晨行者禁宵行者夜遊者是禁戒之事故在此也注釋曰言寤覺也主夜覺者凡人之寐卧恆在寢得禁之者人有夜寐忽覺而漫出門者故謂之為夜覺也司烜氏下士六人徒十有二人注烜火也讀如衛侯燬之燬故書燬為垣鄭司農云當為烜音義烜音毁注燬同垣劉音袁疏釋曰在此者案其職云掌取明火又以木鐸修火禁亦是禁戒之事故在此也注釋曰云讀如衛侯燬之燬者春秋左氏衛侯燬滅邢詩云王室如燬燬火之别名也條狼氏下士六人胥六人徒六十人注杜子春云條當為滌器之滌玄謂滌除也狼狼扈道上音義條音滌徒歷反注同疏釋曰在此者案其職云掌執鞕以趨辟凡誓僕及誓馭之等是禁戒之事故在此也注釋曰云滌器之滌者讀從郊特牲在滌少牢命滌等之滌也云狼狼扈道上者謂不蠲之物在道猶今言狼藉也修閭氏下士二人史一人徒十有二人注閭謂里門疏釋曰在此者案其職云掌比國中宿互柝者亦是禁戒之事故在此也注釋曰云閭謂里門者爾雅云巷門謂之閭故知是二十五家之里門也冥氏下士二人徒八人注鄭司農云冥讀為冥氏春秋之冥玄謂冥方之冥以繩縻取禽獸之名音義冥如字又莫厯反縻亡皮反疏釋曰在此者案其職云掌設弧張為阱獲以攻猛獸是冥然使之不覺亦是禁守之事故在此注釋曰云冥氏春秋者冥氏作春秋書名若晏子吕氏春秋之類取其音讀也後鄭云冥方之冥亦取音同云以繩縻取禽獸之名者解冥是冥然使不覺之意也庶氏下士一人徒四人注庶讀如藥煮之煮驅除毒蠱之言書不作蠱者字從聲音義庶依注音藥煮之煮又章預反蠱音古疏釋曰在此者案其職云掌除毒蠱是除惡之事故在此也注釋曰云庶讀如藥煮之煮者俗讀意取以藥煮去病去毒蠱亦如是云書不作蠱者字從聲者除蠱者庶是去之意故為庶不為蠱也是其取聲穴氏下士一人徒四人注穴搏蟄獸所藏者音義搏音博劉音付蟄直立反疏釋曰在此者案其職云掌攻蟄獸是除猛惡之事故在此也注釋曰云穴搏蟄獸所藏者凡獸蟄皆藏在穴中故以穴為官名使取蟄獸也翨氏下士二人徒八人注翨鳥翮也鄭司農云翨讀為趐翼之趐音義翨音趐失豉反又吉䜴反疏釋曰在此者案其職云掌攻猛鳥亦是除惡之義故在此注釋曰云翨鳥翮也者翥本曰翮凡鳥有羽翨者皆有翮故云翨鳥翮也凡翼趐皆作趐不作翼故彼從之也柞氏下士八人徒二十人注柞除木之名除木者必先刋剝之鄭司農云柞讀為音聲唶唶之唶屋笮之笮音義柞側百反注唶屋笮皆同剝古飽反疏釋曰在此者案其職云掌攻草木亦是除惡之義故在此注釋曰知柞是除木之名者見詩云載芟載柞芟是除草明柞是除木也云除木者必先刋剝之者見其職云夏日至令刋陽木而火之冬日至令剝隂木而水之是先刋剝之先鄭讀柞為音聲唶唶之唶者讀從春秋行扈唶唶之唶又為屋笮之笮者俗讀皆從音同也剃氏下士二人徒二十人注書剃或作夷鄭司農云掌殺草故春秋傳曰如農夫之務去草芟夷藴崇之又今俗間謂麥下為夷下言芟夷其麥以其下種禾豆也玄謂剃讀如剃小兒頭之剃書或作夷此皆剪草也字從類耳月令曰燒剃行水謂燒所芟草乃水之音義剃字或作雉同他計反徐庭計反去起吕反芟所䘖反藴紆紛反徐憂羣反剃他計反疏釋曰在此者案其職云掌殺草亦是除惡之義故在此也注釋曰先鄭從古書剃為夷故引古今而為證也春秋者左氏傳隱六年夏五月鄭伯侵陳往嵗鄭伯請成於陳陳侯不許五父諫曰親仁善鄰國之寶也又云周任有言曰為國家者見惡如農夫之務去草芟夷藴崇之注云芟刈夷殺藴積崇聚玄謂剃讀如剃小兒頭之剃者俗讀也云字從類耳者人髮之剃從髮剃草還草下為之故云類也月令者仲夏令引之者欲見剃草須燒之又須水之意也硩蔟氏下士一人徒二人注鄭司農云硩讀為擲蔟讀為爵蔟之蔟謂巢也玄謂硩古字從石折聲音義硩音摘他厯反徐丈列反沈敕徹反李又思亦反蔟倉獨反疏釋曰在此者案其職云掌覆夭鳥之巢是除惡之類故在此注釋曰先鄭讀硩為擲後鄭不從者先鄭意以為杖擲破之故從擲後鄭意以石物等投擲為義故不從先鄭又讀蔟為爵蔟之蔟者爵蔟是雀窠後鄭從之玄謂硩古字從石折聲者以石投擲毁之故古字從石以折為聲是上聲下形字也翦氏下士一人徒二人注翦斷滅之言也主除蟲蠧者詩云實始翦商音義蠧都路反疏注釋曰在此者案其職云掌除蠧物故鄭云翦斷滅之言也主除蟲蠧者故在此引詩者證翦是翦除赤犮氏下士一人徒二人注赤犮猶言捇拔也主除蟲豸自埋者音義赤如字一音采昔反犮徐音拔畔末反劉房末反捇采昔反徐呼陌反拔畔末反劉房末反或蒲八反豸直氏反疏釋曰在此者案其職云掌除墻屋注除蟲豸藏逃其中者爾雅釋蟲云有足曰蟲無足曰豸亦是除惡之義故在此注釋曰言赤犮猶言捇拔者捇拔除去之也蟈氏下士一人徒二人注鄭司農云蟈讀為蜮蜮蝦蟇也月令曰螻蟈鳴故曰掌去蛙黽蛙黽蝦蟇屬書或為掌去蝦蟇玄謂蟈今御所食蛙也字從蟲國聲也蜮乃短狐與音義蟈音古獲反注同劉音或又音國蜮劉音或一音古獲反蝦音遐蟇音麻螻音樓蛙戶蝸反又斛佳反黽莫幸反蛙户蝸反劉斛佳反沈和佳反與音餘下官與同疏釋曰在此者案其職云掌去蛙黽亦是除惡之義故在此也注釋曰先鄭以蟈為蜮又以蜮為蝦蟇後鄭不從蛙黽蝦蟇屬是其類也云書或為掌去蝦蟇者於義可也玄謂蟈今御所食蛙也者蛙蟈為一物云字從蟲國聲也者國與蟈為聲所謂左形右聲者也云蜮乃短狐與者案莊公十八年秋有蜮服云短狐南方盛暑所生其狀如鱉古無今有含沙射入人皮肉中其瘡如疥遍身中濩濩蜮蜮故曰災禮曰惑君則有案五行志劉向以為蜮生南越由齊薑淫惑莊公故生於魯壺涿氏下士一人徒二人注壺謂瓦鼓涿擊之也故書涿為獨鄭司農云獨讀為濁其源之濁音與涿相近書亦或為獨音義涿陟角反又音濁近附近之近疏釋曰在此者案其職云掌除水蟲亦是除惡之類故在此也注釋曰壺乃盛酒之器非可涿之物故知是瓦鼓必知是瓦者雖無正文考工記有陶人瓬人造瓦器驅水蟲非六鼓故知瓦鼓也先鄭雖讀涿為濁聲轉字誤故為濁猶從涿為義故後鄭引之在下濁其源太玄經文也庭氏下士一人徒二人注庭氏主射妖鳥令國中潔清如庭者也音義射食亦反清才性反又如字疏釋曰在此者案其職云掌射國中夭鳥亦是除惡之類故在此也銜枚氏下士二人徒八人注銜枚止言語囂歡也枚狀如箸橫銜之為之繣結於項音義囂五髙反一音許驕反下同歡音歡箸直慮反繣戶卦反又胡麥反疏釋曰在此者案其職云大祭祀令禁無囂亦是禁戒之事故在此也注釋曰云狀如箸橫銜之為之繣結於項者繣謂以組為之繫著兩頭於項後結之伊耆氏下士一人徒二人注伊耆古王者號始為蠟以息老物此主王者之齒杖後王識伊耆氏之舊德而以名官與今姓有伊耆氏音義耆巨之反蠟仕詐反疏釋曰在此者案其職云掌共杖杖老者所依秋是長老之方故在此注釋曰案明堂位云土鼓蕢桴葦籥伊耆氏之樂也鄭注亦云伊耆氏古天子有天下之號云始為蠟以息老物者郊特牲及春官籥章文引之者取息老物證伊耆供杖於老者之事故也云此主王者之齒杖後王識伊耆氏之舊德而以名官與者言後王識伊耆氏之舊德則周家以前為後王至周又因之故不指周而云後王也大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人注行夫主國使之禮音義使所吏反疏釋曰此四官在此者皆主賔客嚴凝之事故也亦謂别職同官故四官各有職司而共府史胥徒也注釋曰大行人小行人司儀皆掌賔客之禮不見注解至行夫獨注之以官獨多於餘官以主國使之禮至於美惡無禮皆使之故官多於餘官也環人中士四人史四人胥四人徒四十人注環猶圍也主圍賔客任器為之守衛音義環戶關反劉户串反疏釋曰在此者案其職云賔客舍則授館令聚柝亦是禁守之事故在此也注釋曰云主圍賔客之任器為之守衛者其職文也象胥每翟上士一人中士二人下士八人徒二十人注通夷狄之言者曰象胥其有才知者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之德先致南方也音義知音智鞮丁兮反譯音亦疏釋曰在此者案其職云掌四夷之國使以傳賔主之語故亦連類在此也注釋曰云此類之本名東方已下皆王制文云寄者賔主不相解語故寄中國語於東夷又寄東夷語於中國使相領解云象者傳南方於中國還象中國以傳之與南方人語則還象南方語而傳之云狄鞮者鄭彼注云鞮之言知也雖不訓狄狄即敵也謂言語相敵使之知也云北方曰譯者譯即易謂換易言語使相解也云總名曰象者四方别稱經唯有一象故云總名曰象云周之德先致南方也者即詩序所云文王之德被於江漢是也又書序云巢伯來朝注巢伯殷之諸侯聞武王克商慕義而來朝此皆致南方故象得總名也掌客上士二人下士四人府一人史二人胥二人徒二十人疏釋曰在此者案其職云掌賔客牢禮之陳亦是賔客嚴凝象秋故在此掌訝中士八人府二人史四人胥四人徒四十人注訝迎也賔客來主迎之鄭司農云訝讀為跛者訝跛者之訝音義跛波可反疏釋曰在此者案其職云掌迎賔客故連類在此注釋曰先鄭云跛者訝跛者之訝此公羊傳文時晉使卻克聘齊卻克跛齊使跛者往御御亦訝也故讀從之也掌交中士八人府二人史四人徒三十有二人注主交通結諸侯之好音義好呼報反疏釋曰在此者案其職云掌九禁之難有禁戒之事故在此也掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人疏釋曰在此者蓋督察邦國之事及掌邦國所致貨賄但二官闕不可強言也朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人注此王之士也使主都家之國治而命之朝大夫云音義治直吏反疏釋曰在此者案其職云掌都家之國治因有邦國賔客象秋故都家之治亦在此注釋曰此云每國上士二人是王朝之士以其主采地之國治事重則名之曰朝大夫云畿內三等采地地雖有百里五十里二十五里總謂之國若王制云九十三國也云庶子者蓋亦主采地之諸子今在府史之下蓋官長所自辟除也都則中士一人下士二人府一人史二人庶子四人徒八十人注都則主都家之八則者也當言每都如朝大夫及都司馬云疏注釋曰此官已闕鄭知主八則者太宰云八則治都鄙此經云都則故知則八則也都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之注都家之士主治都家吏民之獄訟以告方士者也亦當言每都疏注釋曰在此者此官雖關義理可言以其稱士則知主獄故鄭云都家之士主治都家吏民之獄訟以告方士者也必知王家不置都士而云都家之士者以其都司馬使王臣為之家司馬家自置司馬以司馬主軍事重故王置都司馬此刑事輕於軍故都家王皆不置都士但已有方士主其獄故使都家之士以獄告也大司寇之職掌建邦之三典以佐王刑邦國詰四方注典法也詰謹也書曰王旄荒度作詳刑以詰四方音義詰起吉反旄莫報反度待洛反疏釋曰大司冦云佐王刑邦國詰四方不言刑王國詰畿內者王官不嫌不刑詰在內故舉外以見內也大宰云以六典治邦國今此更言建三典者彼六典自是六官之典此三典自是刑之三典與彼别故司冦别施之注釋曰典法也案大宰注云典法則所用異異其名也故云典法也引書者吕刑篇文吕侯訓夏贖刑王耄荒度作詳刑以詰四方謂周穆王年老耄亂荒忽猶能用賢量度詳審之刑以詰謹四方引之者證詰為謹義也一曰刑新國用輕典注新國者新辟地立君之國用輕法者為其民未習於教音義為于偽反疏注釋曰云新國者新辟地立君之國者謂若世衰夷狄內侵國君誅滅聖人後作日辟國百里既攘夷狄國空無主民不獨治須立君化之則是新辟地立君之國者也趙商問族師職曰四閭為族八閭為聨使之相保相受刑罰慶賞相及在康誥曰父不慈子不孝兄不友弟不恭不相及也族師之職鄰比相坐康誥之云門內尚寬不知書禮孰錯未達指趣答曰族師之職周公新制禮使民相拱敕法康誥之時周法未定天下又新誅三監務在尚寬以安天下先後量時各有云為乃謂是錯也若然言周公之時未定天下即是新國更云新誅三監假令周法先定新誅之國亦是新國故此云新辟地立君也二曰刑平國用中典注平國承平守成之國也用中典者常行之法疏注釋曰云平國承平守成之國也者謂先君受封後君承前平安守持成立之國民已被化則用常行之法以治之三曰刑亂國用重典注亂國篡殺叛逆之國用重典者以其化惡伐滅之音義篡初患反殺音試本亦作弒疏注釋曰云亂國篡弒叛逆之國也者謂若州吁篡國崔杼弒君臧紇叛魯此皆逆亂之國如此之國民起惡心故於常法之外為惡者則當伐滅之也以五刑糾萬民注刑亦法也糾猶察異之疏注釋曰此五刑與尋常正五刑墨劓之等别刑亦法也此五法者或一刑之中而含五或此五刑全不入五刑者云糾猶察異之者謂萬民犯五刑察取與之罪使别異善惡則尚書畢命云旌别淑慝表厥宅里是也一曰野刑上功糾力注功農功力勤力疏注釋曰以其言野則國外若鄉大夫云野自六尺之類既言在野為功故知功是農功力是勤力也二曰軍刑上命糾守注命將命也守不失部伍音義守劉音狩注同將于匠反疏注釋曰以其在軍梱外之事將軍裁之故知命是將命也軍行必有部分卒伍故云不失部伍也三曰鄉刑上德糾孝注德六德也善父母為孝疏注釋曰謂在鄉中之刑大司徒云以鄉三物教萬民一曰六德知仁聖義忠和既言在鄉故知德是六德教民者非教國子三德教胄九德者也善父母為孝爾雅釋訓文四曰官刑上能糾職注能能其事也職職事修理疏注釋曰知能是能其事職職事修理者以其言官官中見能見職明知義然五曰國刑上願糾暴注願慤慎也暴當為恭字之誤也音義願音願劉又音原依注暴作恭慤苦角反疏注釋曰知為恭不作暴者以其上四刑皆糾察其善不糾其惡以類言之故知是恭恭又似暴字故云字之誤也以圜土聚教罷民注圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷音義罷音皮注下皆同愍音敏劉亡覲反尚書作暋又作昏皆訓強疏注釋曰此已下説罷民云教之者正謂夜入圜土晝則役之司空困苦則歸善故鄭云困苦以教之為善云民不愍作勞有似於罷者罷謂困極罷弊此圜土被囚而役是不愍強作勞之民有似罷弊之民也凡害人者置之圜土而施職事焉以明刑恥之注害人謂為邪惡已有過失麗於法者以其不故犯法置之圜土繫教之庶其困悔而能改也置置也施職事以所能役使之明刑書其罪惡於大方版著其背音義置之䜴反又音示邪似嗟反下同著丁略反一音直略反疏注釋曰云害人謂為邪惡已有過失麗於法者案司救職云凡民之有邪惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空即此下文者是也此謂語言無忌侮慢長老過淺直坐之嘉石不入圜土者也彼下文又云其有過失者三讓而罰三罰而歸于圜土此謂抽拔兵劒誤以傷人罪重不坐嘉石徑入圜土晝日亦役之司空夜入圜土者也此罷民本無故心直是過誤比入五刑者為輕比坐嘉石者為重故云已麗於法麗於法乃入圜土者也其能改者反于中國不齒三年注反于中國謂舍之還於故鄉里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者不得以年次列於平民疏釋曰云能改正謂在圜土不出自思己過是能改也注釋曰言反于中國者虞書有五宅三居彼不在中國此則反還於故鄉里也引司圜職已下見舍之逺近此所舍鄉則玉藻所謂垂緌五寸惰遊之士也是也其不能改而出圜土者殺注出謂逃亡疏釋曰云不能改正謂不能伏思己過而出圜土也以兩造禁民訟入束矢於朝然後聽之注訟謂以財貨相告者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩曰其直如矢古者一弓百矢束矢其百個與音義造七報反注同個古賀反與音餘疏釋曰此并下二經論禁民獄訟不使虛誣之事言禁者謂先令入束矢不實則沒入官若不入則是自服不直是禁民省事之法也注釋曰云訟謂以貨財相告者以對下文獄是相告以罪名也此相對之法若散文則通是以衛侯與元咺訟是罪名亦曰訟云古者一弓百矢者尚書文侯之命平王賜晉文侯及僖二十八年襄王賜晉文公皆云彤弓一彤矢百故知一弓百矢云束矢其百箇與者彼是所賜此乃入官約同之故云與以疑之泮水詩云束矢其搜毛云五十矢曰束後鄭從之者彼或據現在弓矢數與受賜者異故從毛傳也以兩劑禁民獄入鈞金三日乃致于朝然後聽之注獄謂相告以罪名者劑今券書也使獄者各齎券書既兩券書使入鈞金又三日乃治之重刑也不券書不入金則是亦自服不直者也必入金者取其堅也三十斤曰鈞音義劑子隨反疏釋曰此一經聽爭罪之事與上聽訟有異此則各遣持劑之書契又入金不入矢三日乃致于朝者皆謂以獄事重於訟事故鄭云重刑也注釋曰云獄謂相告以罪名者對前相告以財貨為訟也云劑今券書也者小宰云聽賣買以質劑質人云大市以質小市以劑鄭小宰注云簿書之最目獄訟之要辭皆曰契則劑謂券書者謂獄訟之要辭若王叔氏不能舉其契是也三十斤曰鈞律厯志文以嘉石平罷民注嘉石文石也之外朝門左平成也成之使善音義文如字劉音問音樹疏注釋曰此嘉石肺石在朝士職朝士屬大司冦故見之爾云嘉石文石也者以其言嘉嘉善也有文乃稱嘉故知文石也欲使罷民思其文理以改悔自修樹之外朝門左朝士文也凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之注有罪過謂邪惡之人所罪過者也麗附也未附於法未著於法也木在足曰桎在手曰梏役諸司空坐日訖使給百工之役也役月訖使其州里之人任之乃赦之宥寬也音義桎音質梏古毒反著直略反下附猶著皆同疏釋曰云未麗於法祗謂入圜土為法此坐嘉石之罷民未入圜土差輕故也云害於州里者謂語言無忌侮慢長老云桎梏而坐諸嘉石者謂坐時坐日滿役諸司空則無桎梏也此已下輕重有五節皆就語言侮慢之中斟酌為輕重分五等也云使州里任之者仍恐習前為非而不改故使州長里宰保任乃舍之以稍輕入鄉則得與鄉人齒亦無垂緌五寸之事也鄭云木在足曰桎在手曰梏知者無正文見掌囚云上罪梏拲而桎拲謂兩手共一木梏與拲連言故知梏在手桎在足也廣雅云手間之梏械足間之桎械亦是手曰梏足曰桎易志冷剛問大畜六四童牛之梏元吉注巽為木互體震震為牛之足足在艮體之中艮為手持木以就足是施梏又蒙初六注云木在足曰桎在手曰梏今大畜六四施梏于足不審桎梏手足定有别否答曰牛無手故以足言之以肺石達窮民注肺石赤石也窮民天民之窮而無告者音義肺芳廢反疏注釋曰云肺石赤石也者隂陽療疾法肺屬南方火火色赤肺亦赤故知名肺石是赤石也必使之坐赤石者使之赤心不妄告也云窮民天民之窮而無告者王制文彼上文云少而無父者謂之孤老而無子者謂之獨老而無妻者謂之鰥老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼凡逺近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長注無兄弟曰惸無子孫曰獨復猶報也上謂王與六卿也報之者若上書詣公府言事矣長謂諸侯若鄉遂大夫音義惸其營反長丁丈反下及注同上時掌反疏釋曰言逺近者無有逺近畿外畿內之民皆有惸獨老幼之等云欲有復於上而其長弗達者謂長官不肯通達審知其貧困者故須復報於上如此之類是上窮民即來立於石也注釋曰鄭知惸是無兄弟者王制已有孤獨鰥寡不見惸則惸是無兄弟可知也是以尚書洪範亦云無虐惸獨而畏髙明孔云惸單無兄弟也無子曰獨云無子孫曰獨者案王制唯云老而無子曰獨今兼云孫者無子有孫不為獨故兼云無孫也鄭不釋經老幼者老則無夫無妻幼則無父可知故不釋也知上是王與六卿者六卿並知國政皆得受寃訴故兼六卿言之云長謂諸侯若鄉遂大夫者寃訴之人天下皆是故長亦兼天下故以畿外諸侯及畿內鄉遂大夫皆得為長也若然不言三等采地之主及三公邑大夫者在長中可知故舉外內以包之也正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之注正月朔日布五刑於天下正嵗又縣其書重之音義縣音懸注及下同挾子協反疏釋曰正月之吉者謂建子之月正月一日也言始和者大宰注凡治有故言始和者若改造云爾其實不改也云布刑于邦國都鄙者正月和即以此月布于天下云乃縣刑象之法于象魏者謂建寅正歲邦國及都鄙并王家雉門皆一時縣之斂之者天子斂藏於明堂諸侯斂藏於祖廟日月受而行之謂之聼朔注釋曰鄭云天下即邦國都鄙也云正歲又縣其書重之知正嵗乃縣者亦約小司冦知之也凡邦之大盟約涖其盟書而登之于天府注涖臨也天府祖廟之藏音義約於妙反藏才浪反疏釋曰云凡邦之大盟約者謂王與諸侯因大會同而與盟所有約誓之辭云涖其盟書而登于天府者既臨其盟書因即登此盟書于天府注釋曰云天府祖廟之藏者天府職文大史內史司會及六官皆受其二而藏之注六官六卿之官也二副也音義會古外反下司會皆同疏釋曰大史內史司會掌事皆與六卿同故皆有副二盟辭而藏之擬相勘當也凡諸侯之獄訟以邦典定之注邦典六典也以六典待邦國之治音義治直吏反下同疏注釋曰云邦典六典也者案大宰職以典待邦國之治故邦國有獄訟之事來詣王府還以邦典定之凡卿大夫之獄訟以邦法斷之注邦法八法也以八法待官府之治音義斷丁亂反下注皆同疏釋曰案大宰云以八法治官府是以卿大夫有獄訟還以邦之八法斷之也若然大宰有八則治都鄙此不言都鄙有獄訟以八則斷之者都鄙有獄訟都家之士告于方士治之故此不言也凡庶民之獄訟以邦成弊之注邦成八成也以官成待萬民之治故書弊為憋鄭司農云憋當為弊邦成謂若今時決事比也弊之斷其獄訟也故春秋傳曰弊獄邢侯音義弊必世反斷也後訓斷者皆同憋劉芳滅反又音卑設反比必利反疏注釋曰大宰云以官成待萬民之治是以庶民有獄訟故以邦成弊之弊亦斷也異其文耳云邦成八成也者則小宰云一曰聼政役以比居二曰聽師田以簡稽已下是也先鄭云邦成謂若今時決事比也者此八者皆是舊法成事品式若今律其有斷事皆依舊事斷之其無條取比類以決之故云決事比也春秋傳者春秋左氏傳晉邢侯與雍子爭鄐田邢侯不勝乃弊獄邢侯引之者證弊為斷義同也大祭祀奉犬牲注奉猶進也疏釋曰犬屬西方金犬既當方之畜故司寇奉進犬牲也若禋祀五帝則戒之日涖誓百官戒于百族注戒之日卜之日也百族謂府史以下也郊特牲曰卜之日王立于澤親聽誓命受教諫之義也獻命庫門之內戒百官也太廟之內戒百姓也疏釋曰禋之言煙禋祀五帝謂迎氣於四郊及總享五帝於明堂也云戒之日者謂前十日卜之日卜吉即戒之使散齊云涖誓百官者謂餘官誓百官之時大司冦則臨之云戒於百族者大司冦親自戒之其百官所戒者當大宰為之是以大宰云祀五帝前期十日帥執事而卜日遂戒故知大宰戒百官也若然大宰云祀五帝則掌百官之誓戒大宰雖云掌百官誓戒戒則親為之誓則掌之而不親誓何者此司冦卑於大宰此云涖誓百官豈司冦得臨大宰乎故知大宰掌之餘小官誓之司冦臨之也注釋曰鄭知百族府史以下者以其王之百姓亦同大宰戒之故知百族府史胥徒也引郊特牲者欲見百族非王之親是府史以下也云獻命庫門之內戒百官也者王自澤宫而還入臯門至庫門之內大宰獻命命即戒百官又於庫門內而東入廟門廟門之內戒百姓彼注云百姓王之親也以親故入廟乃戒之及納亨前王祭之日亦如之注納亨致牲音義亨普庚反劉普孟反注同下納亨放此疏釋曰鄭云納亨致牲者謂將祭之辰祭之日謂旦明也此二者大司冦為王引道故云亦如之奉其明水火注明水火所取於日月者疏注釋曰司烜氏以陽燧取火於日中以隂鑑取水於月中明者潔也王人誠明潔水火乃可得是明水火所取於日月者也奉此水火者水以配鬱鬯與五齊火以給㸑亨也凡朝覲會同前王大喪亦如之注大喪所前或嗣王疏釋曰朝覲不言大則四時朝也會同謂時見曰會殷見曰同此皆司冦在王前為導也其大喪亦如之亦導王也注釋曰知嗣王者以經云大喪是王喪復云前王明是嗣王也言或者大喪或是先后及王世子皆是大喪若先后及世子大喪則王為正王也既言前王明以先后世子為正故云或嗣王也凡大喪之禮有三大宰云大喪贊贈玉含玉大司馬云大喪平士大夫此主謂王喪大宗伯云朝覲會同則為上相大喪亦如之注云王后世子及此大喪亦如之二者容有先后及后世子又宰夫云大喪小喪掌小官之戒令注云大喪王后世子也小喪夫人以下然則大喪與小喪相連則不容有王喪大軍旅涖戮于社注社謂社主在軍者也鄭司農説以書曰用命賞于祖不用命戮于社疏注釋曰鄭知社謂社主在軍者也者以其大軍旅非在國故先鄭引書為證彼書謂甘誓啓與有扈戰于甘之野誓士衆辭社是隂殺亦隂賞是陽祖是遷主亦陽故各於其所必於祖社主前者尊祖嚴社之義也凡邦之大事使其屬蹕注屬士師以下也故書蹕作避杜子春云避當為辟謂辟除姦人也玄謂蹕止行也音義蹕本亦作蹕音畢疏釋曰云凡邦之大事者言凡語廣則國有大事王動行皆使其屬蹕注釋曰鄭知其屬是士師以下者見士師職云諸侯為賔則帥其屬而蹕于王宫注云諸侯來朝若饗食時士師云帥其屬則士師以下上士中士下士皆蹕知者以此注云士師以下故也小司寇之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君注外朝朝在雉門之外者也國危謂有兵寇之難國遷謂徙都改邑也立君謂無冢適選於庶也鄭司農云致萬民聚萬民也詢謀也詩曰詢于芻蕘書曰謀及庶人音義難乃旦反適丁歷反蕘而招反疏釋曰外朝之職朝士專掌但小司冦既為副二長官亦與朝士同掌之耳故云掌外朝之政云以致萬民者案下文羣吏並在內而此經獨云致萬民者但羣吏在朝是常萬民不合在朝惟有大事及疑獄乃致之故特言之也注釋曰外朝在雉門之外則亦在庫門之外也云國危謂有兵寇之難者謂鄰國來侵伐與國為難者也云國遷謂徙都改邑也者謂王國遷徙若殷之盤庚遷殷之類若遷卿大夫都邑不在詢限云立君謂無冢適選於庶也者冢適雙言案內則而言謂適后所生最長者為冢若無冢適后所生次冢以下為適則適者非一若無適則於衆妾所生擇立之衆妾所生非一是以須與衆人共詢可否此三者皆採衆心衆同乃可依用也先鄭引詩及書者證致萬民之意也其位王南鄉三公及州長百姓北面羣臣西面羣吏東面注羣臣卿大夫士也羣吏府史也其孤不見者孤從羣臣卿大夫在公後音義鄉許亮反長丁丈反見賢遍反疏注釋曰案射人及司士孤位皆西方東面北上今此獨在東方西面從羣臣之位者孤無職尊之如賔恆在西但此三詢之朝即朝士所掌之位案朝士外朝云左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後以此故知孤從羣臣之位三公北面者案郊特牲君之南鄉答陽之義也臣之北面答君也三公臣中之尊北面屈之答君之意知卿大夫在公後者以州長衆鄉之屬在公後又二鄉公一人鄉大夫亦在公後可知也每鄉大夫皆别命卿為之六卿别也小司寇擯以敘進而問焉以衆輔志而弊謀注擯謂揖之使前也敘更也輔志者尊王賢明也音義擯必刃反注同更音庚疏釋曰云以敘進者案小宰六敘皆先尊後卑則此言以敘進謂先公卿以次而下注釋曰此既在朝立定而問之明擯者無别相見之禮故知以次一一揖之使前問之云輔志者尊王賢明也者專欲難成捨己稽衆聖人無心以百姓心為心今能以衆輔成己志是尊王賢明者也以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法注附猶著也故書附作付訊言也用情理言之冀有可以出之者十日乃斷之王制曰刑者侀也侀者成也一成而不可變故君子盡心焉鄭司農云讀書則用法如今時讀鞫已乃論之音義訊音信盡津忍反鞫九六反疏釋曰云附于刑用情訊之者以囚所犯罪附于五刑恐有枉濫故用情實問之使得真實則用法者謂五刑之時當讀刑書罪狀則用法刑之注釋曰引王制云刑者侀也者上刑為法下刑為著謂行法著人身體又訓為成者意取一成不可變死者不可復生斷者不可更續是其不可變也故君子盡心焉不可濫此釋用情訊之也漢時讀鞫已乃論之者鞫謂劾囚之要辭行刑之時讀已乃論其罪也凡命夫命婦不躬坐獄訟注為治獄吏褻尊者也躬身也不身坐者必使其屬若子弟也喪服傳曰命夫者其男子之為大夫者命婦者其婦人之為大夫妻者春秋傳曰衛侯與元咺訟寧武子為輔針嚴子為坐士榮為大理音義為治于偽反咺況阮反針其亷反嚴劉音莊左傳作莊案漢書明帝名莊改為嚴疏注釋曰古者取囚要辭皆對坐治獄之吏皆有嚴威恐獄吏褻尊故不使命夫命婦親坐若取辭之時不得不坐當使其屬或子弟代坐也引喪服傳者喪服經有大夫命婦子夏傳解之云大夫者其男子之為大夫者也今此云命夫者其男子之為大夫者誤當以彼為正云春秋傳者左氏僖二十八年衛侯坐殺弟叔武元咺訴於晉晉使人斷之引之者證命夫命婦不身坐獄訟之事若然元咺寧子針莊子皆大夫得坐訟者大夫身不得與士坐訟若兩大夫或代君皆得坐無嫌以是衛侯不得坐使莊子與元咺對坐也若然觀此文命夫命婦唯據大夫不通士案內宰云佐后使治外內命婦先鄭云外命婦卿大夫之妻後鄭云士妻亦為命婦又閽人云凡外內命夫命婦注內命夫卿大夫士之在宫中者如是士及士妻亦得為命夫命婦者彼皆據王臣而言王之士有三命二命一命皆得王命此文兼諸侯臣子男士則不命以是知此文命夫婦惟專據大夫為文不通士也凡王之同族有罪不即市注鄭司農云刑諸甸師氏禮記曰刑于隱者不與國人慮兄弟疏注釋曰此因上論斷獄之事故説王之同族有罪不即市者不與國人慮兄弟也故先鄭云當刑諸甸師氏故甸師云王之同姓有罪則死刑焉是也必於甸師者甸師掌耕耨王籍其場上多屋就隱處刑之引禮記者文王世子文彼據諸侯法云刑于隱者謂就屋中云不與國人慮兄弟者若在市朝刑殺國人見之亦謀慮兄弟是與國人慮兄弟若不於市朝是不與也天子之禮亦然故引為證也以五聲聽獄訟求民情疏釋曰案下五事惟辭聽一是聲而以五聲目之者四事雖不是聲亦以聲為本故也案吕刑云惟貌有稽在獄定之後則此五聽亦在要辭定訖恐其濫失更以五聽觀之以求民情也一曰辭聽注觀其出言不直則煩疏注釋曰直則言要理深虛則辭煩義寡故云不直則煩二曰色聽注觀其顔色不直則赧然音義赧女板反疏注釋曰理直則顔色有厲理曲則顔色愧赧小爾雅云不直失節謂之慙愧面慙曰赧心慙曰恧體慙曰逡三曰氣聽注觀其氣息不直則喘音義喘昌兗反疏注釋曰虛本心知氣從內發理既不直吐氣則喘四曰耳聽注觀其聽聆不直則惑音義聆音零疏注釋曰尚書云作德心逸日休作偽心勞日拙觀其事直聽物明審其理不直聽物致疑五曰目聽注觀其眸子視不直則眊然音義眸莫侯反劉無不反眊莫報反本又作旄同疏注釋曰目為心視視由心起理若直實視盼分明理若虛陳視乃眊亂以八辟麗邦法附刑罰注辟法也杜子春讀麗為羅玄謂麗附也易曰日月麗于天故書附作付猶著也疏釋曰案曲禮云刑不上大夫鄭注云其犯法則在八議輕重不在刑書若然此八辟為不在刑書若有罪當議議得其罪乃附邦法而附于刑罰也注釋曰以辟為法謂八者之法子春讀麗為羅後鄭不從謂麗附也破子春為羅若作羅則入羅網當在刑書何須更議之也後鄭以不在刑書故須議議訖乃附邦法易曰日月麗于天但天自然無形而得附著者天者自然之氣日月在虛空而附自然之氣故得為附著也一曰議親之辟注鄭司農云若今時宗室有罪先請是也疏釋曰親謂五屬之內及外親有服者皆是議限親不假貴故賢能及功勤若貴亦不假餘賢能之等各據一邊則得入議假令既有親兼有餘事亦不離議限二曰議故之辟注故謂舊知也鄭司農云故舊不遺則民不偷音義偷他侯反徐吐豆反疏注釋曰此故舊據王為言是以大宗伯注故舊朋友謂共在學者若伐木詩亦是故友之類先鄭引論語故舊不遺則民不偷言民不偷上行下效亦據人君而説故引以證議故也三曰議賢之辟注鄭司農云若今時亷吏有罪先請是也玄謂賢有德行者音義行下孟反疏注釋曰先鄭舉漢亷吏為賢後鄭足成故言賢有德行者謂若鄉大夫興賢者能者賢即有六德六行者也四曰議能之辟注能謂有道藝者春秋傳曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎音義夫音扶鮮息淺反向許亮反疏注釋曰云能謂有道藝者此即卿大夫興能者能有道藝若保氏云掌飬國子以道而教之六藝是國子賢者有德行兼道藝若能者惟有道藝未必兼有德也引春秋傳者左氏襄二十一年叔向被囚祁奚作此辭以告晉侯使赦小罪存大能引之者證以能議也五曰議功之辟注謂有大勳勞立功者疏釋曰此即司勳所掌王功國功之等皆入此功也是以彼皆言功為首也六曰議貴之辟注鄭司農云若今時吏墨綬有罪先請是也疏注釋曰先鄭雖引漢法墨綬為貴若據周大夫以上皆貴也墨綬者漢法丞相中二千石金印紫綬御史大夫二千石銀印黃綬縣令六百石銅印墨綬是也七曰議勤之辟注謂憔悴以事國音義憔昨遙反悴秦醉反疏注釋曰案詩云或憔悴事國自此已上七者雖以王為主諸侯一國之尊賞罰自制亦應有此議法是以議能鄭引叔向之事是其一隅也惟八曰議賓惟據王者而言不及諸侯也入曰議賔之辟注謂所不臣者三恪二代之後與音義與音餘疏注釋曰春秋襄二十五年傳有虞閼父為周陶正而封諸陳以備三恪之言郊特牲有尊賢不過二代之語故鄭云三恪二代之後案樂記云武王克殷及商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞殷之後於宋此皆自行當代禮樂王所不臣為賔禮禮之故為賔也言與者經直云賔不斥所據約彼同之故云與以疑之也以三刺斷庶民獄訟之中注中謂罪正所定音義刺七賜反斷丁亂反後皆同疏釋曰此經與下文為目但三刺之言當是罪定斷訖乃向外朝始行三刺庶民已上皆應有刺直言庶民者庶民賤恐不刺賤者尚刺已上刺可知注釋曰云中謂罪正所定者斷獄終始有三刺刺則罪正所定即當行刑故云罪正所定也一曰訊羣臣二曰訊羣吏三曰訊萬民注刺殺也三訊罪定則殺之訊言也疏釋曰云羣臣者士已上云羣吏者府吏胥徒庶人在官者云萬民者民間有德行不仕者注釋曰云刺殺三訊罪定即殺之但所刺不必是殺餘四刑亦當三刺直言殺者舉法重者而言其實皆三刺是以下文云聼民之所刺宥以施上服下服之刑是兼輕重皆刺也聽民之所刺宥以施上服下服之刑注宥寬也民言殺殺之言寬寬之上服劓墨也下服宫刖也音義劓魚器反刖音月又五刮反疏釋曰墨劓施於面故為上服宫刖施於下體故為下服凡行刺必先以物規之如衣服乃施刑故言服也及大比登民數自生齒以上登于天府注大比三年大數民之衆寡也人生齒而體備男八月而生齒女七月而生齒音義比毗志反注同上時掌反下注同數所生反疏釋曰小司冦至三年大按比之時則使司民之官登上民數自生齒已上皆登之小司冦乃登於天府注釋曰云男八月女七月而生齒者按家語本命男子八月生齒八歲而齔齒女子七月而生齒七歲而齔齒男子陽得隂而生得隂而落女子隂得陽而生得陽而落故男偶女竒也內史司會冢宰二之以制國用注人數定而九賦可知國用乃可制耳疏釋曰內史掌八柄之等司會主計會冢宰所主兼設故皆取副二民數簿書得民數乃制國用以其國用出於民故也注釋曰云人數定九賦可知國用乃可制者鄭偏據九賦而言至九貢九功亦可知也小祭祀奉犬牲注奉猶進也疏釋曰大祭祀自大司冦奉犬牲若小祭祀王玄冕所祭則小司冦奉進犬牲也凡禋祀五帝實鑊水納亨亦如之注納亨致牲也其時鑊水當以洗解牲體肉音義鑊户郭反疏釋曰云禋祀五帝者祭天曰燔柴即禋祀也故云禋祀五帝五帝所祀謂四時迎氣總享明堂實鑊水以擬洗肉所用也納亨亦如之納亨致牲謂將祭亨祭之晨實以水亨牲也注釋曰鄭知實鑊水為洗解牲肉者以下云納亨亦如之是實鑊水亨煮肉故知此是洗肉也封人云共其水稿亦謂洗牲肉也大賔客前王而辟注鄭司農云小司寇為王道辟除姦人也若今時執金吾下至令尉奉引矣音義辟婢亦反劉符益反一音匹亦反沈音避注同後而辟皆放此道音導疏釋曰下士師云諸侯為賔帥其屬蹕於王宫饗燕時此小司寇為王辟亦謂於宫中饗燕在寢及廟時也注釋曰云若今時執金吾下至令尉奉引者漢時執金吾及令尉為帝奉引猶如小司冦為王導故引以為況后世子之喪亦如之疏釋曰謂后世子之喪當朝廟之時王出入亦為王而辟也小師涖戮注小師王不自出之師疏注釋曰王不自出使卿大夫出軍閫外之事將軍裁之軍將有所斬戮於社主前則小司冦涖戮也凡國之大事使其屬蹕注屬士師以下疏注釋曰此國之大事即士師云諸侯為賔是也士師云帥其屬則士師已下皆蹕故此據而言之孟冬祀司民獻民數於王王拜受之以圖國用而進退之注司民星名謂軒轅角也小司寇於祀司民而獻民數於王重民也進退猶損益也國用民衆則益民寡則損疏釋曰前文大比登民數於天府據三年大比而言此則據年年民數皆有增減於孟冬春官祭司民之時小司寇以民數多少獻於王也注釋曰案星經軒轅角有大民小民之星是軒轅角也云國用民衆則益民寡則損者國家所用財物由民上而來是以國用多少要由民衆寡故民衆則益豐用之民寡則損儉用之歲終則令羣士計獄弊訟登中于天府注上其所斷獄訟之數疏釋曰羣士謂鄉士遂士已下皆是必登斷獄之書於祖廟天府者重其斷刑使神監之正歲帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士注羣士遂士以下疏注釋曰此所戒令六官各因其所掌知羣士是遂士以下者以其鄉士已入帥其屬中遂士縣士方士訝士等雖是六十官之屬以其主六遂以外漸逺恐不在屬中故經特云令羣士明羣士是遂士以下可知乃宣布于四方憲刑禁注宣遍也憲表也謂縣之也刑禁士師之五禁音義遍音遍疏釋曰此所宣布則布憲所云者是也此官主之彼乃布之事相成也乃命其屬入會乃致事注得其屬之計乃令致之於王音義會古外反後要會之字皆放此疏釋曰命其屬謂命已下屬官使入會計文狀來乃致事於王故云乃乃緩辭士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭注左右助也助刑罰者助其禁民為非也宫王宫也官官府也國城中也古之禁書亡矣今宫門有符籍官府有無故擅入城門有離載下帷野有田律軍有囂歡夜行之禁其粗可言者音義法音法左音佐右音又注左右助也同徇似俊反縣音懸粗劉音粗沈才古反疏釋曰凡設五刑者刑期于無刑以刑止刑以殺止殺殺一人使萬人懲是欲不使犯罪令於刑外豫施禁禁民使不犯刑是左右助刑罰無使罪麗于民也云書而縣于門閭者爾雅云巷門謂之閭則縣于處處巷門使知之注釋曰云宫王宫也者謂臯門也云官官府也者謂廬官人聼事之門云國城中者若王城十二門云古之禁書亡矣者謂在儀禮三千條內而在亡中故舉漢法以况之云離載下帷者謂在車離耦耦載而下帷恐是姦非故禁之云粗可言者古之禁書具不惟如此故云粗可言也以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙注先後猶左右也誓誥於書則甘誓大誥康誥之屬禁則軍禮曰無干車無自後射此其類也糾憲未有聞焉音義誥古報反射食亦反疏釋曰戒與禁謂典法則亦是所用異異其名耳同是告語使不犯刑罰注釋曰先後猶左右也者皆是相助之義異其名而已云甘誓者啓與有扈戰於甘之野作甘誓云湯誓者湯將伐桀以誓衆云大誥者武王崩周公輔相成王令以大義告天下以誅三監故作誥云康誥者周公以成王命封康叔於殷墟誥康叔以治政之事故作誥云之屬者仍有泰誓費誓召誥洛誥之等故言之屬也凡誥誓皆因大會乃為之故用之於軍旅用之於會同也云禁則軍禮曰無干車無自後射此其類也者易比之九五曰王用三驅失前禽注云王因天下顯習兵于搜狩焉驅禽而射之三發則已失前禽者謂禽在前來者不逆而射旁去又不射惟其走者順而射之不中亦已是皆所習軍禮用兵之法亦如之降者不殺奔者不禁背敵不殺以仁恩飬威之道若然此不自後射亦謂不中之後不重射前敵不破則有追法春秋公追戎於濟西是也掌鄉合州黨族閭比之聨與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞注鄉合鄉所合也追追冦也胥讀如宿偦之偦偦謂司搏盜賊也音義比毗志反下同追如字劉張類反胥如字劉思敘反注偦同搏音博劉音付疏釋曰士師掌鄉中合聚之法者以為有施刑罰也云州黨族閭比之聨即是鄉合之事云與其人民之什伍者此即因內政寄軍令之類五家為比比即一伍也二伍為什據追胥之時云使之相安相受者宅舍有故使當比當閭相受寄託使得安穩也云以比追胥者以比什伍使任追胥二事也云以施刑罰慶賞者使鄰伍相及也注釋曰云追追冦者即公追戎於濟西是也胥讀如宿偦之偦者時有夜宿逐賊謂之偦即司搏盜賊是也掌官中之政令注大司寇之官府中也疏注釋曰士師所施政令惟在當官故鄭云大司冦之官府中也察獄訟之辭以詔司寇斷獄弊訟致邦令注詔司寇若今白聽正法解也致邦令者以法報之疏釋曰獄訟辭訴各有司存謂若鄉士遂士縣士方士各主當司之獄訟其有不決來問都頭士師者則士師審察以告大司冦斷獄弊訟也云致邦令者此即所察獄訟斷訖致與本官謂之致邦令也掌士之八成注鄭司農云八成者行事有八篇若今時決事比音義比必利反疏釋曰士之八成言士者此八者皆是獄官斷事成品式士即士師已下是也注釋曰先鄭云八成者行事有八篇若今時決事比者即若小宰八成凡言成者皆舊有成事品式後人依而行之決事依前比類決之一曰邦汋注鄭司農云汋讀如酌酒尊中之酌國汋者斟酌盜取國家密事若今時刺探尚書事音義汋上灼反注同斟之林反酌音灼刺七亦反又七賜反疏注釋曰云汋讀如酌酒尊中之酌者俗讀之若今刺探尚書事者漢時尚書掌機密有刺探尚書密事斟酌私知故舉為況也二曰邦賊注為逆亂者疏注釋曰既云邦賊罪無過此故知為逆亂若崔杼州吁之等三曰邦諜注為異國反間音義諜音牒間間廁之間疏注釋曰異國欲來侵伐先遣人往間候取其委曲反來説之其言諜諜然故謂之邦諜用兵之策莫善於此故孫子兵法云興師十萬日費千金內外騷動以爭一日之勝而受爵祿金寶於人者非民之將故三軍之事莫密於反間殷之興也伊摯在夏周之興也吕牙在殷唯賢聖將能用間以成此兵之要者也四曰犯邦令注干冒王教令者音義冒音墨疏注釋曰鄭云干冒王教令者謂犯邦令不肯依行五曰嬌邦令注稱詐以有為者音義嬌音矯疏注釋曰嬌即詐也故鄭云稱詐以有為者謂詐上命營搆偽物之類也六曰為邦盜注竊取國之寶藏者音義藏才浪反疏注釋曰謂若定八年陽貨盜竊寶玉大弓以出奔之類是也七曰為邦朋注朋黨相阿使政不平者故書朋作傰鄭司農云傰讀如朋友之朋音義傰劉音崩徐音朋又補鄧反疏注釋曰朋謂朋黨阿曲相阿違國家正法擅生曲法使政不平以罔國法故曰邦朋也八曰為邦誣注誣罔君臣使事失實疏注釋曰謂若君臣相得政教平美其有佞臣誣以惡事致使善政失實者也若邦凶荒則以荒辨之法治之注鄭司農云辨讀為風别之别救荒之政十有二而士師别受其教條是為荒别之法玄謂辨當為貶聲之誤也遭飢荒則刑罰國事有所貶損作權時法也朝士職曰若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶音義辨依注音貶風别之别皆彼列反下傅别及注同數所主反疏釋曰凶荒謂年榖不熟民皆困苦則以荒貶之法治之不得用尋常之法注釋曰先鄭之言義庶所據故後鄭不從後鄭破辨為貶從朝士職之文也朝士職慮刑貶者彼謂謀慮緩刑減損國用為民困苦故也令移民通財糾守緩刑注移民就賤救困也通財補不足也糾守備盜賊也緩刑紓民心也音義紓音舒本亦作舒疏注釋曰移民就賤謂可移者將身往也通財補不足謂不可移者即於豐處將財榖以補不足凡以財獄訟者正之以傅别約劑注傅别中别手書也約劑各所持券也故書别為辨鄭司農云傅或為符辨讀為風别之别若今時市買為券書以别之各得其一訟則案券以正之音義傅音附注同約於妙反又如字疏注釋曰此注云傅别中别手書也小宰注為大手書於一札中字别之語異義同此先鄭云若今時市買為券書以别之各得其一義與後鄭同故引之在下小宰注先鄭云傅著約束於文書别别為兩兩家各得其一後鄭不從先鄭至此更為一解故從之若祭勝國之社稷則為之尸注以刑官為尸略之也周謂亡殷之社為亳社音義亳步各反疏注釋曰案鳬鷖詩宗廟社稷七祀皆稱公尸不使刑官今祭勝國之社稷用士師為尸故鄭云用刑官為尸略之也云周謂亡殷之社為亳社者經云勝國注為亡殷又云亳社者據周勝殷謂之勝據殷亡即云亡國即郊特牲云喪國之社必屋之是也據地而言即言亳社春秋亳社災是也王燕出入則前驅而辟注道王且辟行人音義道音導下三公道盜賊道同疏注釋曰導王解前驅且辟行人解而辟言燕出入謂宫苑皆是祀五帝則沃尸及王盥洎鑊水注洎謂增其沃汁音義洎其器反或音冀疏注釋曰案特牲少牢尸尊不就洗入門北面則以盤匜盥手王盥謂將獻尸時先就洗盥洎鑊水增其沃汁鑊在門外之東亨牲之㸑言須鑊水就㸑增之亨實鑊水此官增之示敬而已此直言祀五帝沃尸及王盥其餘冬至夏至及祭先王先公所沃盥者案小祝職云大祭祀沃尸盥小臣職云大祭祀朝覲沃王盥如是則冬至夏至及先王先公小祝沃尸盥小臣沃王盥鬱人云凡祼事沃盥惟在宗廟為祼時凡刉珥則奉犬牲注珥讀為衈刉衈釁禮之事用牲毛者曰刉羽者曰衈音義刉音機劉音竒珥而志反注衈同疏注釋曰鄭知珥為衈者珥是玉名故破從衈取用血之意知刉衈是釁禮者雜記曰成廟則釁之門夾室皆用雞其衈皆於屋下彼雖不言刉刉衈相將故知是釁禮知用牲毛者曰刉羽者曰衈者雜記雞言衈即毛曰刉可知諸侯為賔則帥其屬而蹕于王宫注謂諸侯來朝若燕饗時疏釋曰士師言帥其屬當官下云屬上士已下皆是也注釋曰經云蹕于王宫饗在廟燕在寢言于王宫故知燕饗時也大喪亦如之疏釋曰大喪在宫中謂朝廟亦在宫中為蹕也大師帥其屬而禁逆軍旅者與犯師禁者而戮之注逆軍旅反將命也犯師禁干行陳也音義將子匠反行戶剛反陳直刃反疏釋曰帥其屬亦謂上士已下在軍而戮亦謂戮於社主前注釋曰逆軍旅反將命者王在軍自將違王命亦是反將命王不在梱外之事將軍裁之亦是反將命犯師禁干行陳者干犯軍之行陳案昭元年晉荀吳敗狄于太原將戰魏絳曰請皆卒自我始荀吳之嬖人不肯即卒斬以徇襄三年雞澤之盟晉侯之弟揚干亂行於曲梁魏絳戮其僕魏絳曰軍事有死無犯為敬此二者是反將命干行陳之事也歲終則令正要會注定計簿音義簿步古反疏注釋曰定計簿者年終將考之故也正歲帥其屬而憲禁令于國及郊野注去國百里為郊郊外謂之野疏釋曰正歲憲禁令者取除舊布新之義言于國及郊野者則自國至百里外皆憲禁之也注釋曰云去國百里曰郊司馬法文郊外謂之野爾雅文周禮注疏卷三十四周禮注疏卷三十四考證罪隸百有二十人疏數以百二十人為限監本脫以百二十人五字今補入萍氏下士二人音義蛂蟥蛢郭注云甲蟲大如虎豆緑色監本脫郭注下十一字今依釋文并爾雅原文補正伊耆氏疏云始為蠟以息老物者郊特牲及春官籥章文監本脫及春官籥章五字息老物籥章有之今補正大司寇之職注書曰王旄荒度作詳旄尚書作耄今從釋文又尚書無詳字以兩劑禁民獄疏質人云大市以質小市以劑質人監本訛作貨又今據質人職文改正一曰訊羣臣注刺殺也刺殺也三字句應屬上節經以三刺斷庶民獄訟之中下周禮注疏卷三十四考證
