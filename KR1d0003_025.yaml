body:
  text: 周禮注疏卷二十五漢鄭氏注唐陸德明音義賈公彥疏占夢掌其歲時觀天地之會辨陰陽之氣注其嵗時今嵗四時也天地之會建厭所處之日辰陰陽之氣休王前後音義夢夲又作夢音同厭於琰反王于況反疏注釋曰鄭云其嵗時今嵗四時也者以天地之會陰陽之氣年年不同若今厯日今嵗亦與前嵗不同故云今嵗四時也云天地之會建厭所處之日辰者建謂斗柄所建謂之陽建故左還於天厭謂日前一次謂之隂建故右還於天故堪輿天老曰假令正月陽建於寅隂建在戌日辰者日據幹辰據支云隂陽之氣休王前後者按春秋緯云當時者王生王者休王所勝者死相所勝者囚假令春之三月木王水生木水休木勝土土死木王火相王所生者相相所勝者囚火勝金春三月金囚以此推之火王金王水王義可知觀此建厭所在辨隂陽之氣以知吉凶也以日月星辰占六夢之吉凶注日月星辰謂日月之行及合辰所在春秋昭三十一年十二月辛亥朔日有食之是夜也晉趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有適火勝金故弗克此以日月星辰占夢者其術則今八會其遺象也用占夢則亡音義倮魯火反轉如字又張戀反郢以井反劉餘政反適直革反疏釋曰六夢者即下云一曰二曰是也以日月星辰占知者謂夜作夢旦於日月星辰以占其夢以知吉凶所在注釋曰張逸問占夢注云春秋昭三十一年十二月辛亥朔日有食之是夜也趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢乎終亦弗克入郢必一庚辰日月在辰尾庚午之日日始有謫火勝金故弗克此以日月星辰占夢者不知何術占之前問不了答曰日月在辰尾夏之九月辰在房末有尾星建戌厭寅寅與申對辰與戌對申近庚辰與戌對故知庚辰干上為客辰下為主人故午為主人金侵火故不勝雖不勝即復故云弗克日有適氣時九月節者以庚午在甲子篇辛亥在甲辰篇也中有甲戌甲申甲午成一月也從庚午以下四日從甲辰至辛亥八日并之十二日通同四十二日如是庚午之日當在八月十九日故言時得九月節也言雖不勝即復者以其庚金午火位相連故云雖不勝即復也言雖不勝者吳君臣爭宫秦救復至不能定楚是其不勝不能損吳是其即復也問曰何知有此厭對之義乎答曰按堪輿黃帝問天老事云四月陽建於巳破於亥隂建於未破於癸是為陽破陰陰破陽故四月有癸亥為隂陽交會十月丁巳為陰陽交會言未破癸者即是未與丑對而近癸也交會惟有四月十月也若有變異之時十二月皆有建厭對配之義也云則今八會其遺象也者按堪輿大會有八也小會亦有八服氏云是嵗嵗在析木後六年在大梁大梁水宗十一月日在星紀為吳國分楚之先顓頊之子老童老童楚象行歌象楚走哭姬姓日日在星紀星紀之分姬姓吳也楚衰則吳得志吳世世與楚怨楚走去其國故曰吳其入郢吳屬水水數六十月水位故曰六年及此月也有適而食故知吳終亦不克又彼注云後六年定四年五月閏十一月在閏月後其十一月晦日庚辰吳入郢在立冬後復此月也十二月辛亥日月會於龍尾而食庚午日初有適故曰庚辰一曰日月在辰尾尾為亡臣是嵗吳始用子胥之謀以伐楚故天垂象又注云午火庚金也火當勝金而反有適故為不克晉諸侯之霸與楚同盟趙簡子為執政之卿逺夷將伐同盟日應之食故夢發簡子服氏以庚午之日日始適火勝金故不克入楚必以庚辰此與鄭義别其餘略相依也問曰周之十二月夏之十月日體正應在析木而云在星紀何答曰據此月中有十一月節故舉言之成長以為誤也此六夢蓋三王同有六夢法也一曰正夢注無所感動平安自夢疏注釋曰鄭知無感動平安自夢者以其言正是平安之義故知無所感動平安自夢二曰噩夢注杜子春云噩當為驚愕之愕謂驚愕而夢音義噩五各反注愕同疏注釋曰以其言噩噩是驚愕之意故子春讀噩從驚愕解之三曰思夢注覺時所思念之而夢音義覺古孝反下同疏注釋曰以其思是思念之意故解云覺時所思念而夢也四曰寤夢注覺時道之而夢音義寤夲又作五故反疏注釋曰以其字為覺寤之字故知覺寤時道之睡而夢也五曰喜夢注喜恱而夢疏注釋曰以其字為喜恱之字故知未睡心説睡而為夢六曰懼夢注恐懼而夢疏注釋曰以其字為恐懼之字故云恐懼而夢季冬聘王夢獻吉夢于王王拜而受之注聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星回于天數將幾終於是發幣而問焉若休慶之云爾因獻羣臣之吉夢於王歸美焉詩云牧人乃夢衆維魚矣旐維旟矣此所獻吉夢音義幾如字又音祈疏釋曰季冬嵗終除舊惡擬來嵗布新善故問王夢之善惡夢惡者贈去之下文是也獻吉夢於王者歸美於王注釋曰云夢者事之祥者若對文禎祥是善妖孽是惡散文祥中可以兼惡夢者有吉有惡故云夢者事之祥也云吉凶之占在日月星辰者即上文以日月星辰占六夢之吉凶是也云季冬日窮於次月窮於紀星回於天數將幾終者皆月令文日窮於次者次謂日辰所在季冬日月會于玄枵是日窮於次月窮於紀紀謂星紀日月五星會聚之處月謂斗建所在十二月斗建丑故云月窮於紀星回於天者星謂二十八宿十三月復位此十二月未到夲位故直云星回於天數將幾終者幾近也至此十二月厯數將終云於是發幣而問焉若休慶之云爾者鄭以禮動不虛必以幣帛行禮乃始問王故云發幣而問焉休美也問王夢若美慶云爾云因獻羣臣之吉夢於王歸美焉者君吉夢由於羣臣君統臣功故獻吉夢歸美於王也詩云牧人乃夢是無羊美宣王詩也牧人乃夢衆維魚矣旐維旟矣者牧人謂牧牛羊之人彼注衆維魚矣豐年之祥旐旟所以聚衆引之者證獻吉夢之事乃舍萌于四方以贈惡夢注杜子春讀萌為明又云其字當為明明謂驅疫也謂嵗竟逐疫置四方書亦或為明玄謂舍讀為釋舍萌猶釋采也古書釋菜釋奠多作舍字萌菜始生也贈送也欲以新善去故惡音義舍音釋注舍萌同萌亡耕反去起吕反疏注釋曰子春之説舍萌為驅疫按下文自有驅疫於此以舍萌為之其義不可故後鄭不從玄謂舍萌猶釋采也者按王制有釋采奠幣之事故從之云萌菜始生也者按樂記區萌達鄭注云屈生曰區芒而直出曰萌故知萌菜始生者云欲以新善去故惡者舊嵗將盡新年方至故於此時贈去惡夢遂令始難驅疫注令令方相氏也難謂執兵以有難卻也方相氏掌蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百隸為之驅疫厲鬼也故書難或為儺杜子春難讀為難問之難其字當作儺月令季春之月命國難九門磔禳以畢春氣仲秋之月天子乃難以達秋氣季冬之月命有司大難旁磔出土牛以送寒氣音義難戚乃多反劉依杜乃旦反注以意求之儺字亦同磔陟百反禳如羊反疏釋曰因事曰遂上經贈惡夢遂令方相氏始難驅疫注釋曰云令令方相氏者以方相氏專主難故云令方相氏云難謂執兵以有難郤也者所引方相氐以下是也杜子春云難讀為難問之難者以其難去疫厲故為此讀又引月令云季春之月命國難按彼鄭注此月之中日行歷昴昴有大陵積尸之氣氣佚則厲鬼隨而出行故難之云命國難者惟天子諸侯有國者令難云九門磔禳者九門依彼注路門應雉庫臯國近郊逺郊關張磔牲體攘去惡氣也云以畢春氣者畢盡也季春行之故以盡春氣云仲秋之月天子乃難以達秋氣者按彼鄭注陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行故難之以通達秋氣此月難陽氣故惟天子得難云季冬之月命有司大難旁磔出土牛以送寒氣者按彼鄭注此月之中日歷虛危虛危有墳墓四司之氣為厲鬼將隨強陰出害人也故難之命有司者謂命方相氏言大難者從天子下至庶人皆得難言旁磔者謂四方於四方之門皆張磔牲體云出土牛以送寒氣者彼鄭注云出猶作也作土牛者丑為牛牛可牽可止送猶畢也故作土牛以送寒氣此子春所引雖引三時之難惟據季冬大難知者此經始難文承季冬之下是以方相氏亦據季冬大難而言視祲掌十輝之法以觀妖祥辨吉凶注妖祥善惡之徴鄭司農云輝謂日光氣也音義輝音運氣音氣夲亦作氣疏釋曰按下十等惟一曰言祲故據一曰以為官首言掌十輝之法者一曰以下十等多是日旁之氣言輝亦是日旁輝光故總以輝言之注釋曰云妖祥善惡之徴者祥是善之徴妖是惡之徴故言善惡之徴此妖祥相對若散文祥亦是惡徴亳有祥桑之類是也鄭司農云輝謂日光氣也者就十等之中五曰暗暗謂日食則無光氣而云十輝皆謂日光氣者據多而言一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰敘九曰隮十曰想注故書彌作迷隮作資鄭司農云祲陰陽氣相侵也象者如赤烏也鐫謂日旁氣四面反鄉如暈狀也監雲氣臨日也暗日月食也瞢日月瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者升氣也想者輝光也玄謂鐫讀如童子佩鐫之鐫謂日旁氣刺日也監冠珥也彌氣貫日也隮虹也詩云朝隮于西想雜氣有似可形想音義鐫鄭許規反劉思隨反或下圭反瞢亡鄧反隮子兮反鄉許亮反暈音運夲又作輝音同虹音洪又古巷反劉古項反疏注釋曰此經十事先鄭皆解之後鄭從其六不從其四先鄭云祲隂陽氣相侵也者赤雲為陽黑雲為隂如春秋傳云赤黑之祲在日旁云象者如赤烏也者楚有雲如衆赤烏在日旁者也云鐫謂日旁氣四面反鄉如暈狀也者後鄭不從云監雲氣臨日也者後鄭亦不從云暗日月食也者以其日月如光消故暗朦也云瞢日月瞢瞢無光也者以其瞢瞢無光之貌故知無光云彌者白虹彌天也者此從故書為迷後鄭不從云敘者雲有次敘如山在日上也者以其此十輝皆在日旁敘為次敘之字故知敘者雲氣次敘如山在日上云隮者升氣也者以其隮訓為升故隮者是升氣也此後鄭不破增成其義云想者輝光此後鄭亦不從玄謂鐫讀如童子佩鐫之鐫謂日旁氣刺日也者此讀從芄蘭詩童子佩鐫能不我知鐫是錐類故為雲氣刺日云監冠珥也者謂有赤雲氣在日旁如冠耳珥即耳也今人猶謂之曰珥云彌氣貫日也者以其言彌故知雲氣貫日而過云隮虹也者即爾雅螮蝀謂之虹日在東則西邉見日在西則東邉見故引詩云朝隮于西為證也云想雜氣有似可形想者以其雲氣雜有所象似故可形想掌安宅敘降注宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之疏注釋曰掌主也此官主安居者人見妖祥則意不安主安其居處不使不安故次敘其凶禍所下之地禳移之其心則安正歲則行事注占夢以季冬贈惡夢此正月而行安宅之事所以順民疏注釋曰民心欲得除惡樹善占夢之官以季冬贈去惡夢至此嵗之正月行是安宅之事順民心也歲終則弊其事注弊斷也謂計其吉凶然否多少音義弊必世反下注同斷丁亂反疏注釋曰占夢之官見有妖祥則告之吉凶之事其吉凶或中或否故至嵗終斷計其吉凶也云然否多少者然謂中也知中否多少而行賞罰大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰策祝注永長也貞正也求多福歷年得正命也鄭司農云順祝順豐年也年祝求永貞也吉祝祈福祥也化祝弭災兵也瑞祝逆時雨寧風旱也策祝逺罪疾音義祝之秀反後除大祝宗祝諸官皆同以意求之長如字逺于万反疏釋曰云掌六祝之辭者此六辭皆是祈禱之事皆有辭説以告神故云六祝之辭云以事鬼神示者此六祝皆所以事人鬼及天神地祗云祈福祥求永貞者禱祈者皆所以祈福祥求永貞之事按一日以下其事有六祈福祥即三曰吉祝是也求永貞二曰年祝是也今特取此二事為總目者欲見餘四者亦有此福祥永貞之事故也注釋曰云求多福歷年得正命也者經祈福祥求永貞祈亦求也今鄭云求多福即經祈福祥也歷年得正命即經求永貞也歷年之上宜有求鄭不言之者多福之上一求鄭則該此二事故鄭歷年之上略不言求鄭司農云順祝順豐年已下皆約小祝而説小祝有順豐年此言順祝故知當小祝順豐年也云年祝求永貞也者以祈永貞是命年之事故知年祝當求永貞也云吉祝祈福祥也者以其小祝有祈福祥之事此上總目亦有祈福祥福祥是吉慶之事故知吉祝當祈福祥也云化祝弭災兵也者弭安也安去災兵是化惡從善之事小祝有弭災兵故知化祝當之云瑞祝逆時雨寧風旱也者小祝有逆時雨寧風旱此逆時雨即寧風旱寧風旱即逆時雨對則異理則通此二者似若天之應瑞故總謂之瑞祝云策祝逺罪疾者自此以上差次與小祝不同惟有策祝與小祝逺罪疾相當宜為一也此六祝有求永貞小祝不言之者大祝已見故小祝略不言也此六祝一曰順祝已下差次與小祝次第不同者欲見事起無常故先後有異掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰説注祈嘄也謂為有災變號呼告神以求福天神人鬼地祗不和則六癘作見故以祈禮同之故書造作竈杜子春讀竈為造次之造書亦或為造造祭於祖也鄭司農云類造禬禜攻説皆祭名也類祭于上帝詩曰是類是禡爾雅曰是類是禡師祭也又曰乃立冡土戎醜攸行爾雅曰起大事動大衆必先有事乎社而後出謂之宜故曰大師宜于社造于祖設軍社類上帝司馬法曰將用師乃告于皇天上帝日月星辰以禱于后土四海神祗山川冡社乃造于先王然後冡宰徴師于諸侯曰某國為不道征之以某年某月某日師至某國禜日月星辰山川之祭也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之玄謂類造加誠肅求如志禬禜告之以時有災變也攻説則以辭責之禜如日食以朱絲縈社攻如其鳴鼓然董仲舒救日食祝曰照照大明瀐滅無光奈何以陰侵陽以卑侵尊是之謂説也禬未聞焉造類禬禜皆有牲攻説用幣而已音義造七報反注下皆同禬戚古外反劉音會禜音詠嘄音叫劉音禱為于偽反號户羔反呼火故反見賢遍反禡莫駕反縈烏營反照章搖反瀐子亷反疏釋曰上經六祝此云六祈皆是祈禱之事别見其文者按小祝重掌六祝云將事侯禳禱祠之祝號鬼神雖和同為事禱請此六祈為百神不和同即六癘作見而為祈禱故云以同鬼神祗是以别見其文注釋曰云謂為有災變號呼告神以求福者鄭知號呼者見小祝云掌禱祠之祝號故知此六祈亦號呼以告神云天神人鬼地祗不和則六癘作見故以祈禮同之者鄭知鬼神祗不和者見經云掌六祈以同鬼神祗明是不和設六祈以和同之按五行傳云六沴作見云貌之不恭惟金沴木視之不明惟水沴火言之不從惟火沴金聽之不聰惟土沴水思之不睿惟金木水火沴土五行而沴有六者除夲五外來沴已則六彼云沴此云癘者沴有六則癘鬼作見故變沴言癘杜子春云造謂造祭於祖知者禮記云造于祖故後鄭從之先鄭云類造禬禜攻説皆祭名以其祈禱皆是祭事按後鄭類造禬禜皆有牲攻説用幣而已用幣非祭亦入祭科之中云類祭于上帝知者禮記王制及尚書泰誓皆云類于上帝故知類祭上帝也引詩曰已下至師至某國以類造為出軍之祭後鄭皆不從矣所以不從者以出軍之祭自是求福此經六祈皆為鬼神不和同設祈禮以同之不得將出軍之禮以解之故後鄭不從先鄭引大雅皇矣詩即引爾雅者所以釋此詩故也云又曰乃立冡土戎醜攸行者大雅綿詩云爾雅曰起大事以下亦釋此詩故也又曰乃立引以相副故曰大師宜于社造于祖設軍社類上帝並是此大祝下文云司馬法曰將用師三字司農語云禜日月星辰山川之祭也者引春秋為證春秋傳曰者昭元年左氏傳云鄭子産聘晉晉侯有疾問於子産子産對此辭按彼傳文癘疫之災於是乎禜之此云不時者鄭君讀傳有異玄謂類造加誠肅求如志者欲明天神人鬼地祗不得同名類造故云加誠肅求如志云禬禜告之以時有災變也者春秋所云雪霜風雨水旱癘疫之不時於是乎禜之禬雖未聞禬是除去之義故知禬亦災變云攻説則以辭責之者引論語及董仲舒皆是以辭責之云禜如日食以朱絲縈社者按莊公二十五年六月辛未朔日有食之鼓用牲于社公羊傳云日食則曷為鼓用牲于社求乎隂之道也以朱絲縈社或曰脅之或曰為暗恐人犯之故縈之何休云朱絲縈之助陽抑陰也或曰為暗者恐人犯歷之故縈之然此説非也記或傳者示不欲絶異説爾先言鼓後言用牲者明先以尊命責之後以臣子禮接之所以為順也鄭引公羊傳者欲見禜是縈之義云攻如其鳴鼓然者此是論語先進篇孔子責冉有為季氏聚斂之臣故云小子鳴鼓而攻之可也彼是以辭攻責之此攻責之亦以辭責故引以為證引董仲舒者是漢禮救日食之辭以證經説是以辭責之云禬未聞焉者經傳無文不知禬用何禮故云未聞鄭知類造襘禜皆有牲者按禮記祭法云埋少牢於泰昭祭時也下云幽禜祭星雩禜祭水旱鄭注云凡此以下皆祭用少牢禜既用牲故知類造皆亦有牲故云皆有牲也云攻説用幣而已者知攻説用幣者是日食伐鼓之屬天災有幣無牲故知用幣而已既云天災有幣無牲其類禮似亦是天災得有牲者災始見時無牲及其災成之後即有牲故詩云靡愛斯牲是也作六辭以通上下親疏逺近一曰祠二曰命三曰誥四曰會五曰禱六曰誄注鄭司農云祠當為辭謂辭令也命論語所謂為命禆諶草創之誥謂康誥盤庚之誥之屬也盤庚將遷于殷誥其世臣卿大夫道其先祖之善功故曰以通上下親疏逺近會謂王官之伯命事於會胥命于蒲主為其命也禱謂禱於天地社稷宗廟主為其辭也春秋傳曰鐵之戰衛大子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無破骨無面夷無作三祖羞大命不敢請佩玉不敢愛若此之屬誄謂積纍生時德行以賜之命主為其辭也春秋傳曰孔子卒哀公誄之曰閔天不淑不憗遺一老俾屏余一人以在位嬛嬛豫在疚嗚呼哀哉尼父無自律此皆有文雅辭令難為者也故大祝官主作六辭或曰誄論語所謂誄曰禱爾于上下神祗杜子春曰誥當為告書亦或為告玄謂一曰祠者交接之辭春秋傳曰古者諸侯相見號辭必稱先君以相接此之辭也會謂會同盟誓之辭禱賀慶言福祚之辭晉趙文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱是禱之詞音義會如字注同禆婢支反諶市林反蒯苦怪反聵五怪反難乃旦反佚音逸行下孟反閔音旻武巾反憗魚覲反嬛求營反疚九又反父音甫奐音喚京音原疏釋曰此六者惟一曰稱辭自餘二曰已下皆不稱辭而六事皆以辭目之者二曰已下雖不稱辭命誥之等亦以言辭為主故以辭包之云以通上下親疏逺近者此六辭之中皆兼包父祖子孫上則疏而逺下則親而近故云以通上下親疏逺近也注釋曰先鄭破祠為辭謂辭令者一以其目云六辭明知為言辭之字不得為禱祠言為辭令者則玄謂增成之云交接之辭是也云命謂論語所謂為命禆諶草創之誥謂康誥盤庚之誥之屬也者盤庚雖不言誥亦是誥臣遷徙之事故同為誥又云盤庚將遷于殷誥其世臣卿大夫道其先祖之善功者即盤庚云乃祖乃父世選爾勞是也此命誥之義後鄭從之云會謂王官之伯命事於會胥命于蒲主為其命也後鄭不從之者按公羊傳曰胥命者何相命也何言乎相命近正也此其為近正奈何古者不盟結言而退又見昭四年楚椒舉云商湯有景亳之命周穆王有塗山之會以此觀之胥命于蒲與會有異今先鄭以胥命解會於義不可故不從云禱謂禱於天地社稷宗廟主為其辭也又引春秋鐵之戰事在哀二年按哀二年衛靈公卒六月乙酉晉趙鞅納衛大子于戚秋八月齊人輸范氏粟鄭子姚子般送之趙鞅禦之衛大子為右衛大子為禱而為此辭言曽孫者凡祭外神皆稱曾孫言昭告于皇祖文王者皇君也衛得立文王廟故云君祖文王烈祖康叔者衛之始封君有功烈之祖云鄭勝亂從者勝鄭伯名助范氏亂故云亂從云晉午在難者午晉定公名范氏等作亂與君為難故云在難云備持矛焉者蒯聵與趙鞅為車右車右執持戈矛故云備持矛焉云無作三祖羞者三祖謂文王康叔襄公戰不克則以為三祖羞辱先鄭此義後鄭皆不從之者此六辭皆為生人作辭無為死者之事故不從云誄謂積纍生時德行以賜之命而引春秋傳曰者哀公十六年傳辭此義後鄭從之引論語者為孔子病子路請禱孔子問曰有諸子路對此辭生人有疾亦誄列生時德行而為辭與哀公誄孔子意同故引以相續玄謂一曰辭者司農云謂辭令無所指斥故後鄭相事而言引春秋傳曰者按莊四年公羊傳云古者諸侯必有會聚之事相朝聘之道號辭必稱先君以相接是此之辭也彼無相見二字鄭以義增之云會謂會同盟誓之辭會中兼有誓盟者以其盟時皆云公會某侯某侯盟于某以此出會中含有盟其誓必因征伐按春秋征伐皆云公會某侯某侵某既有士卒當有誓辭故出會中兼有誓也云禱賀慶言福祚之辭者破先鄭禱鬼神之事云晉趙文子成室者禮記檀弓文按彼文云晉獻文子成室鄭注云獻猶賀也晉君賀文子成室此云晉趙文子成室引文略趙文子則趙武也晉大夫發焉見文子室成卿大夫皆發幣以往慶賀之張老者亦晉大夫云美哉輪焉者謂輪囷髙大云美哉奐焉者謂奐爛有文章云歌於斯者斯此也謂作樂饗宴之處云哭於斯謂死於適寢之處聚國族於斯謂與族人族食宴之處張老言此者譏其奢泰一室兼此數事防其更為云文子曰武也者武文子名謂武得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也古者有要斬領斬故要領並言按彼注九京當為九原晉卿大夫之墓地在九原故言以從先大夫於九原云北面再拜稽首者平敵相於並列則頓首臣於君作稽首今文子作稽首者時晉君在焉北面向君拜故作稽首云君子謂之善頌善禱者君子謂知禮之人彼注云善頌謂張老之言善禱謂文子之言云是禱之辭者是經禱之辭也此六者皆以辭解之辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號注號謂尊其名更為美稱焉神號若云皇天上帝鬼號若云皇祖伯某祗號若云后土地祗幣號若玉云嘉玉幣云量幣鄭司農云牲號為犧牲皆有名號曲禮曰牛曰一元大武豕曰剛鬛羊曰柔毛雞曰翰音齍號為黍稷皆有名號也曲禮曰黍曰薌合粱曰香其稻曰嘉疏少牢饋食禮曰敢用柔毛剛鬛士虞禮曰敢用潔牲剛鬛香合音義齍音咨稱尺證反大如字劉音泰鬛力輒反其音基疏所魚反劉音蘇疏注釋曰云號謂尊其名更為美稱焉者謂若尊天地人之鬼神示不號為鬼神示而稱皇天后土及牲幣等皆别為美號焉云神號若云皇天上帝者月令季夏云以飬犧牲以供皇天上帝皇天謂北辰曜魄寶上帝謂大微五帝云鬼號若云皇祖伯某者謂若儀禮少牢特牲祝辭稱皇祖伯某云祗號若云后土地祗者左氏傳云君戴皇天而履后土地祗謂若大司樂云若樂八變地祗皆出云幣號若玉云嘉玉幣云量幣此並曲禮文經無玉號鄭兼言玉者祭祀禮神有玉曲禮亦有玉號按小行人合六幣圭以馬璋以皮玉得與幣同號故鄭兼言玉也先鄭云牲號為犧牲皆有名號引曲禮曰牛曰一元大武者鄭彼注元頭也武迹也一頭大迹豕曰剛鬛者豕肥則鬃鬛剛強羊曰柔毛者羊肥則毛柔潤雞曰翰音者翰長也音鳴也謂長鳴雞齍號謂黍稷皆有名號引曲禮黍曰薌合者言此黍薌合以為祭云粱曰薌其者鄭注云其辭也言此粱香可祭云稻曰嘉疏者言稻下萊地所生嘉善也疏草也言此稻善疏草可祭云少牢饋食禮曰敢用柔毛剛鬛者大夫少牢祭故號此三牲云士虞禮曰敢用潔牲剛鬛者士祭用特豕故號一牲言香合者據曲禮黍之號也故彼鄭注云黍也大夫士於黍稷之號合言普淖而已此言香合蓋記者誤耳此連引之耳無所取證此士虞記文而云禮者記亦是禮辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭注杜子春云命祭祭有所主命也振祭振讀為慎禮家讀振為振旅之振擩祭擩讀為虞芮之芮鄭司農云衍祭羡之道中如今祭殤無所主命周祭四面為坐也炮祭燔柴也爾雅曰祭天曰燔柴擩祭以肝肺菹擩鹽醢中以祭也繚祭以手從持胏夲循之至于末乃絶以祭也絶祭不循其本直絶肺以祭也重肺賤肝故初祭絶肺以祭謂之絶祭至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀弗祭謂之振祭特牲饋食禮曰取菹擩于醢祭于豆間鄉射禮曰取肺坐絶祭鄉飲酒禮曰右取肺卻左手執本坐弗繚右絶末以祭少牢曰取肝擩于鹽振祭玄謂九祭皆謂祭食者命祭者玉藻曰君若賜之食而君客之則命之祭然後祭是也衍字當為延炮字當為包聲之誤也延祭者曲禮曰客若降等執食興辭主人興辭於客然後客坐主人延客祭是也包猶兼也兼祭者有司曰宰夫贊者取白黑以授尸尸受兼祭于豆間是也周猶遍也遍祭者曲禮曰殽之序遍祭之是也振祭擩祭本同不食者擩則祭之將食者既擩必振乃祭也絶祭繚祭亦本同禮多者繚之禮略者絶則祭之共猶授也王祭食宰夫授祭孝經説曰共綏執授音義衍音延炮百交反劉依司農白交反擩而泉反一音而劣反劉又而誰反繚音了劉音料共音恭注同芮人劣反又而嵗反下同坐才卧反從持胏劉沈皆子容反今本或無持字從則如字殺色界反劉色例反郤去逆反又起略反執食音嗣遍音遍下同疏釋曰此九祭先鄭自周祭已上皆是祭鬼神之事振祭以下皆是生人之祭食之禮後鄭不從之者祭天神地祗人鬼大宗伯辨之大祝不須别列且生人祭食不合與祭鬼神同科故皆以為生人祭食法注釋曰杜子春云命祭祭有所主命也者凡祭祀天子諸侯木主大夫士有幣帛主其神曾子問以幣帛皮圭以為主命當主之處此子春之意亦當以幣帛謂之主命但此經文皆是祭食法不得為主命故後鄭不從之又讀振為慎或為振旅之振或讀擩為虞芮之芮此讀皆無義意故後鄭皆不從之鄭司農云衍祭羡之道中如今祭殤無所主命者此據生人祭食法而云如今祭殤故後鄭亦不從之云周祭四面為坐也謂若祭百神四面各自為坐炮祭燔柴以其炮是燔燒之義故為燔柴祭天此皆生人祭食法非祭鬼神故後鄭亦不從之云擩祭以肝肺菹擩鹽醢中以祭也者按特牲少牢墮祭之時皆有以菹擩醢中以祭主人獻尸時賔長以肝從尸以肝擩鹽中以祭故先鄭云以肝肺菹擩鹽醢中以祭彼無云肝肺擩鹽醢中先鄭連引之耳按彼肝擩鹽中以振祭嚌之加于肵爼此則是振祭司農云以初時擩于鹽即同擩祭解之於義不可云繚祭以手從肺夲循之至于末乃絶以祭也者此據鄉飲酒而言云絶祭不循其夲直絶肺以祭也者據鄉射而言云重肺賤肝故初祭絶肺以祭謂之絶祭至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀弗祭謂之振祭云重肺者此繚祭絶祭二者皆據肺而言周貴肺故云重肺云賤肝者司農意上云以肝擩于鹽據特牲少牢尸食後賔長以肝從之意云故初祭絶肺以祭謂之絶祭者此絶祭依特牲少牢無此絶祭之事於義不可云至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀者此還據少牢擩肝祭而云若祭狀弗祭於義不可引特牲饋食禮曰取菹擩于醢祭于豆間者此據挼祭而言也引鄉射禮及鄉飲酒禮證有絶祭之事引少牢禮證有振祭之事此先鄭所引四文後鄭皆從故增成其義但先鄭所引特牲少牢皆據一邉而言按特牲少牢皆擩祭振祭兩有玄謂九祭皆謂祭食者謂生人將食先以少許祭先造食者故謂之祭食命祭引玉藻彼注云侍食不祭其侍食之人而君賔客之雖得祭待君命之祭然後祭是命祭也云衍字當為延炮字當為包者衍與炮於義無所取故破從延與包延祭者曲禮曰賔若降等執食興辭鄭彼注云辭者辭主人之臨已食若欲食於堂下然云有司曰宰夫贊者取白黑以授尸者彼注云白謂稻黑謂黍又引曲禮曰殽之序遍祭之是也者凡祭者皆盛主人之饌故所設殽羞次第遍祭按公食大夫惟魚臘湆醬不祭以其薄故也其餘皆祭故謂之周祭云振祭擩祭夲同者凡祭皆擩但振者先擩復振但擩者不振言不食者擩則祭之者特牲少牢皆有挼祭挼祭未食之前以菹擩于醢祭于豆間是不食者擩則祭之云將食者既擩必振乃祭也者特牲少牢皆有主人獻尸賔長以肝從尸右取肝擩于鹽振祭嚌之加于菹豆是謂振祭言將食者振訖嚌之是將食也云絶祭繚祭亦本同者同者絶之但絶者不繚繚者亦絶故云夲同云禮多者繚之者此據鄉飲酒鄉大夫行鄉飲酒賔賢能之禮故云禮多所繚之法即司農所引右取肺已下是也云禮略者絶則祭之者此據鄉射州長射則士禮故云禮略者絶則祭之祭法即上先鄭所引鄉射禮取肺坐絶祭是也云共猶授也王祭食宰夫授祭者此則膳夫職云王祭食則授是也不謂之膳夫而謂之宰夫者據諸侯是宰夫云孝經説曰共綏執授者孝經緯文漢時禁緯故云説云共綏執授者謂將綏祭之時共此綏祭以授尸引之者證共為授之義辨九􅉔一曰􅹎首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰奇􅉔八曰褒􅉔九曰肅􅉔以享右祭祀注􅹎首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也吉拜拜而后稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜云凶拜稽顙而后拜謂三年服者杜子春云振讀為振鐸之振動讀為哀慟之慟奇讀為奇偶之奇謂先屈一膝今雅拜是也或云奇讀曰倚倚拜謂持節持戟拜身倚之以拜鄭大夫云動讀為董書亦或為董振董以兩手相擊也奇拜謂一拜也褒讀為報報拜再拜是也鄭司農云褒拜今時持節拜是也肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者玄謂振動戰栗變動之拜書曰王動色變一拜答臣下拜再拜拜神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜音義􅉔音拜下同􅹎音啓夲又作稽振動如字李依大夫音董杜徒弄反今俀人拜以兩手相擊如鄭大夫之説蓋古之遺法奇紀宜反褒音報右音又近附近之近慟徒弄反倚於綺反下同撎於立反即今之揖為于偽反使所吏反朝直遙反疏釋曰此九拜之中四種是正拜五者逐事生名還依四種正拜而為之也一曰稽首二曰頓首三曰空首此三者相因而為之空首者先以兩手拱至地乃頭至手是為空首也以其頭不至地故名空首頓首者為空首之時引頭至地首頓地即舉故名頓首一曰稽首其字稽留之稽頭至地多時則為稽首也此三者正拜也稽首拜中最重臣拜君之拜二曰頓首者平敵自相拜之拜三曰空首拜者君答臣下拜知義然者按哀十七年公會齊侯盟於蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首襄三年公如晉孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首郊特牲曰大夫之臣不稽首非尊家臣以避君也如是相禮諸侯于天子臣于君稽首禮之正然諸相於大夫之臣及凡自敵者皆當從頓首之拜也如是差之君拜臣下當從空首拜其有敬事亦稽首故大誓云周公曰都懋哉豫聞古先哲王之格言以下大子發拜手稽首是其君于臣稽首事洛誥云周公拜手稽首朕復子明辟成王拜手稽首公不敢不敬天之休者此即兩相尊敬故皆稽首九曰肅拜者拜中最輕惟軍中有此肅拜婦人亦以肅拜為正其餘五者附此四種正拜者四曰振動附稽首五曰吉拜附頓首六曰凶拜亦附稽首七曰奇拜附空首八曰褒拜亦附稽首以享侑祭祀者享獻也謂朝踐獻尸時拜侑侑食侑勸尸食時而拜此九拜不専為祭祀而以祭祀結之者祭祀事重故舉以言之注釋曰稽首拜頭至地頓首拜頭叩地也者二種拜俱頭至地但稽首至地多時頓首至地則舉故以叩地言之謂若以首叩物然云空首拜頭至手所謂拜手也者即尚書拜手稽首云吉拜拜而後稽顙謂齊衰不杖以下者此謂齊衰已下喪拜而云吉者對凶拜為輕此拜先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙云齊衰不杖以下者以其杖齊衰入凶拜中故雜記云父在為妻不杖不稽顙明知父沒為妻杖而稽顙是以知此吉拜謂齊衰不杖已下云言吉者此殷之凶拜者按檀弓云拜而後稽顙頺乎其順也稽顙而後拜頎乎其至也三年之喪吾從其至者鄭注云自期如殷可言自期則是齊衰不杖已下用殷之喪拜故云此殷之凶拜也云周以其拜與頓首相近故謂之吉拜者言相近者非謂文相近是拜體相近以其先作頓首后作稽顙稽顙還依頓首而為之是其拜體相近以其約義故言云以疑之云凶拜稽顙而後拜謂三年服者此雜記云三年之喪即以喪拜非三年喪以其吉拜又檀弓云稽顙而後拜頎乎其至孔子云三年之喪吾從其至者若然上吉拜齊衰不杖已下則齊衰入此凶拜中鄭不言之者以雜記云父在為妻不杖不稽顙父卒乃稽顙則是適子為妻有不得稽顙時故略而不言但適子妻父為主故適子父在不稽顙則衆子為妻父在亦稽顙不據衆子當稽顙者據雜記成文杜子春云振讀為振鐸之振者讀從小宰職振木鐸于朝之振云動讀為哀慟之慟者謂從孔子哭顔回哀慟之慟云奇讀為奇耦之竒者謂從郊特牲鼎爼竒籩豆耦之奇已上讀字後鄭皆從之云先屈一膝今雅拜是也或曰奇讀曰倚倚拜謂持節持戟拜身倚之以拜此二者後鄭皆不從之鄭大夫云動讀為董書亦或為董振之董者此讀從左氏董之以威是董振之董云以兩手相擊此後鄭皆不從云奇拜謂一拜也一拜者謂君拜臣下按燕禮大射有一拜之時君答一拜後鄭從之云褒讀為報報拜謂再拜是也後鄭亦從鄭司農云褒拜今之持節拜是也者後鄭不從云肅拜但俯下手今時撎是也按儀禮鄉飲酒賔客入門有撎入門之法推手曰揖引手曰撎云介者不拜故曰為事故敢肅使者按成十六年晉楚戰於鄢陵楚子使工尹襄問郤至以弓郤至見客免胄承命又云不敢拜命注云介者不拜又云君命之辱為事故敢肅使者三肅使者而退是軍中有肅拜法按成二年鞍之戰獲齊侯晉郤至投戟逡巡再拜稽首軍中得拜者公羊之義將軍不介胄故得有拜法玄謂振動戰栗變動之拜書曰王動色變按中候我膺云季秋七月甲子赤雀銜丹書入酆至昌户再拜稽首受按今文大誓得火烏之瑞使上附以周公書報誥於王王動色變雖不見拜文與文王受赤雀之命同為稽首拜也云一拜答臣下拜再拜拜神與尸此二者增鄭大夫之義知再拜拜神與尸者按特牲禮祝酌奠於鉶南主人再拜祝在左也再拜於尸謂獻尸尸拜受主人拜送是也天子諸侯亦當然或解一拜答臣下亦據祭祀時以其宴禮君答拜臣時或再拜故也云享獻也謂朝獻饋獻也者以祭祀二灌之後惟有朝踐饋獻稱獻故知享獻據朝踐饋獻時也云古讀為侑侑勸尸食而拜者按特牲尸食祝侑主人拜少牢主人不言拜侑故知侑尸時有拜凡大禋祀肆享祭示則執明水火而號祝注明水火司烜所共日月之氣以給蒸享執之加以六號祝明此圭潔也禋祀祭天神也肆享祭宗廟也故書祗為祊杜子春云祊當為祗音義禋音因烜況晚反祊必庚反疏注釋曰知明水火司烜所共日月之氣者按司烜氏職云以夫遂取明火於日以鑒取明水於月彼雖不云氣此水火皆由日月之氣所照得之故以氣言之云以給蒸享執之加以六號祝明此圭潔也者經云執明水火而號祝明知六號皆執之明潔也號祝執明水火明主人圭潔之德云禋祀祭天神也者大宗伯昊天稱禋日月稱實柴司中之等稱槱燎通而言之三者之禮皆有禋義則知禋祀祭天神通星辰已下云肆享祭宗廟也者按宗伯宗廟之祭六等皆稱享則此含六種之享杜子春云祊當為祗宗伯血祭已下是也隋釁逆牲逆尸令鐘鼓右亦如之注隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右讀亦當為侑音義隋許規反又思圭反後同右音又疏注釋曰鄭云隋釁謂薦血也者賈氏云釁釁宗廟馬氏云血以塗鐘鼓鄭不從而以為薦血祭祀者下文云既祭令徹則此上下皆是祭祀之事何得於中輒有釁廟塗鼓直稱釁何得兼言隋故為祭祀薦血解之鄭云凡血祭曰釁者此經文承上禋祀肆享祭示之下即此血祭之中含上三祀但天地薦血于座前宗廟薦血以告殺故言凡血祭曰釁云既隋釁後言逆牲容逆鼎者凡祭祀之法先逆牲後隋釁今隋釁在前逆牲在後者以其鼎在門外薦血後乃有爓孰之事逆鼎而入故云容逆鼎知鼎在門外者按中霤禮竈在廟門外之東主人迎鼎事云右讀亦為侑者亦上九拜之下享右之字皆為侑來瞽令臯舞注臯讀為卒嘷呼之嘷來嘷者皆謂呼之入音義臯音嘷户髙反劉户報反卒劉子忽反呼火故反疏注釋曰臯讀為卒嘷呼之嘷者依俗讀云來嘷者皆謂呼之入者經云瞽人擬升堂歌舞謂學孑舞人瞽人言來亦呼之乃入臯舞令呼亦來入故鄭云來嘷皆謂呼之入也相尸禮注延其出入詔其坐作音義相息亮反下同疏注釋曰凡言相尸者諸事皆相故以出入坐作解之尸出入者謂祭初延之入二灌訖退出坐于堂上南面朝踐饋獻訖又延之入室言詔其坐作者郊特牲云詔祝於室坐尸於堂饋獻訖又入室坐言作者凡坐皆有作及與主人答拜皆有坐作之事故云詔其坐作也既祭令徹疏釋曰祭訖尸謖之後大祝命徹祭器即詩云諸宰君婦廢徹不遲是也大喪始崩以肆鬯渳尸相飯贊斂徹奠注肆鬯所為陳尸設鬯也鄭司農云渳尸以鬯浴尸音義渳彌爾反飯扶晚反斂力驗反疏釋曰此經皆是大祝之事云始崩以肆鬯渳尸者肆陳也渳浴也王喪始崩陳尸以鬯浴尸取其香美云相飯者浴訖即飯含故言相飯也不言相含者大宰云大喪贊贈玉含玉此故不言云贊斂者小斂十九稱在户內大斂百二十稱在阼階冬官主斂事大祝贊之徹奠者小祝注奠奠爵也謂正祭時此文承大喪之下故奠為始死之奠小斂大斂奠並大祝徹之言甸人讀禱付練祥掌國事注鄭司農云甸人主設復梯大祝主言問其具梯物玄謂言猶語也禱六辭之屬禱也甸人喪事代王受眚災大祝為禱辭語之使以禱於藉田之神也付當為祔祭於先王以祔後死者掌國事辨護之音義付音附出注梯他兮反語魚據反下同疏釋曰既殯之後大祝為禱辭與甸人言猶語也故言語甸人讀禱辭代王受眚災云祔練祥掌國事者祔謂虞卒哭後附祭於祖廟練謂十三月小祥練祭祥謂二十五月大祥除衰杖此三者皆以國事大祝掌之故云掌國事也注釋曰先鄭云甸人主設復梯大祝主言問其具梯物者此文承贊斂之下則是既殯之事始云設復梯者故後鄭不從玄謂禱六辭之屬禱也者此經讀禱則六辭之中五曰禱故云六辭之禱也云甸人喪事代王受眚災者按甸師職云喪事代王受眚災按彼注云粢盛者祭祀之主也今國遭大喪若云此黍稷不馨使鬼神不逞於王既殯大祝作禱辭授甸人使以禱藉田之神受眚災弭後殃彼注與此意同言弭後殃者今王已崩雖無救為後王而謝過故云弭後殃鄭知既殯後者此文承贊斂之下斂訖則殯故知此讀禱在既殯之後也云付當為祔祭於先王以祔後死者按喪服小記以孫祔於祖以其昭穆同先王即祖也故云祭於先王祔後死者云掌國事辨護之者辨護之中侯文按中侯握河紀云堯受河圖時伯禹進迎舜契陪位稷辨護注云進迎接神也稷官名謂棄辨護者供時用相禮儀引之以證掌國事則此大祝於祔練祥之時共其祭用之物及相其禮儀也國有大故天災彌祀社稷禱祠注大故兵寇也天災疫癘水旱也彌猶遍也遍祀社稷及諸所禱既則祠之以報焉疏注釋曰鄭知大故兵寇也者下列云天災故知大故直是兵寇也知天災疫癘水旱者見宗伯云以荒禮哀凶札鄭注云荒人物有害又云弔禮哀禍災注云禍災謂水火此皆是天災流行故云天災謂疫癘水旱云彌猶遍也遍祀社稷及諸所禱按小祝云弭災兵弭為安此彌為遍不同者義各有所施彼是災兵之事故弭為安此禱祀之事靡神不舉以彌為遍云既則祠之以報焉者以其始為曰禱得求曰祠故以報賽解祠大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝注鄭司農説設軍社以春秋傳曰所謂君以師行祓社釁鼓祝奉以從者也則前祝大祝自前祝也玄謂前祝者王出也歸也將有事於此神大祝居前先以祝辭告之音義祓芳弗反劉音廢從才用反一音如字下注同疏釋曰此經六事皆大祝所掌言大師者王出六軍親行征伐故曰大師云宜于社者軍將出宜祭於社即將社主行不用命戮於社云造於祖者出必造即七廟俱祭取遷廟之主行用命賞于祖皆載於齊車云設軍社者此則據社在軍中故云設軍社云類上帝者非常而祭曰類軍將出類祭上帝告天將行云國將有事於四望者謂軍行所過山川造祭乃過及軍歸獻于社者謂征伐有功得囚俘而歸獻捷于社按王制云出征執有罪反以釋奠于學注云釋菜奠幣禮先師也引詩執訊獲醜則亦獻于學云則前祝者此經六事皆大祝前辭注釋曰司農引春秋傳者定四年左氏傳按彼祝他云君以軍行者師則軍也故尚書云大巡六師詩云六師及之皆以師名軍引之者證社在軍謂之軍社之事玄謂前祝者王出也歸也將有事於此神據此經四望已上為出時獻於社為歸時皆大祝前祝以辭告之按尚書武成丁未祀于周廟庚戌柴望皆是軍歸告宗廟告天及山川即此經出時告之歸亦告之此經上帝四望不見歸時所告故鄭總云王出也歸也而將有事於此神以該之大會同造于廟宜于社過大山川則用事焉反行舍奠注用事亦用祭事告行也玉人職有宗祝以黃金勺前馬之禮是謂過大山川與曾子問曰凡告必用牲幣反亦如之音義舍音釋一音赦與音餘疏釋曰大會同者王與諸侯時見曰會殷見曰同或在畿內或在畿外亦告廟而行云造者以其非時而祭造次之意即上文造于祖一也云反行舍奠者曲禮云出必告反必面據生時人子出入之法今王出行時造于廟將遷廟主行反行還祭七廟非時而祭曰奠故云反行舍奠也注釋曰言用事亦用祭事告行也者言亦如上經大師用祭事告行引玉人職者按玉人職大璋中璋九寸邉璋七寸射四寸厚寸黃金勺青金外天子以巡守宗祝以前馬此云有宗祝以黃金勺前馬之禮非是彼正文義略言之耳云是謂過大山川與者彼不云過山川此言過大山川此不言用黃金勺彼言以黃金勺以義約為一故言與以疑之彼注云大山川用大璋中山川用中璋小山川用邉璋此直見過大山川不見中小者欲見中小山川共大山川一處直告大山川不告中小故不見中小山川各自别處則用中璋邉璋此所過山川非直用黃金勺酌獻而已亦有牢故校人職云將有事於四海山川則飾黃駒注云四海猶四方王巡守過大山川則有殺駒以祈沈之禮與是其牲牢也引曾子問曰凡告必用牲幣反亦如之者按彼注破牲為制此用牲幣不破之者彼文不取牲義直取出告反亦告而已故破牲為制於此經皆用牲知者王制云歸假于祖禰用特堯典亦云歸格于藝祖用特校人有飾黃駒之文則知此經出入皆有牲禮故不破牲為制建邦國先告后土用牲幣注后土社神也疏注釋曰按大宗伯王大封則先告后土注云后土土神土神則社神也按孝經緯云社者五土之總神郊特牲云社祭土而主隂氣故名社為土神勾龍生為后土之官死則配社故舉配食人神以言社其實告社神也以其建邦國土地之事故先告后土雖告祭非常有牲有幣禮動不虛故也禁督逆祀命者注督正也正王之所命諸侯之所祀有逆者則刑罰焉疏釋曰王者有命命諸侯祭祀之事不使上僣下逼謂之禮若有違者即謂之逆命大祝掌鬼神之官故禁正逆祀命也注釋曰經直云禁督逆祀命鄭以諸侯解之者承上建邦國故知據諸侯云有逆者則刑罰焉者大祝主諸侯逆祀告上與之刑罪不得自施刑罰頒祭號于邦國都鄙注祭號六號疏注釋曰邦國謂畿外諸侯都鄙畿內三等采地大祝主祭號故大祝頒之六號之中兼有天地諸侯不得祭天地而鄭云祭號六號鄭據大祝掌六號據上成文而言魯與二王之後得祭所感帝兼有神號小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌災兵逺罪疾注侯之言候也候嘉慶祈福祥之屬禳禳卻凶咎寧風旱之屬順豐年而順為之祝辭逆迎也彌讀曰敉敉安也音義彌依注音敉亡爾反下注同逺于万反疏釋曰掌小祭祀者即是將事侯禳已下禱祠之事是也小祭祀與將事侯禳已下作目將事侯禳禱祠祝號又與祈福祥順豐年已下為目祈福祥順豐年逆時雨三者皆是侯寧風旱彌災兵逺罪疾三者即是禳求福謂之禱報賽謂之祠皆有祝號故總謂之禱祠之祝號祈福祥已下不言一曰二曰者大祝已言訖小祝佐大祝行事故略而不言亦欲見事起無常故不言其次第注釋曰侯之言候也候嘉慶祈福祥之屬者之屬中兼有順豐年逆時雨嘉善也此三者皆是善慶之事故設祈禱候迎之云禳禳卻凶咎寧風旱之屬者之屬中兼有彌災兵逺罪疾三者是凶咎之事故設禱祠禳卻之云順豐年而順為之祝辭者按管子云倉廪實而知禮節衣食足知榮辱意皆欲如此是豐年順民意也故設祈禮以求豐年而順民故云為之祝辭也云彌讀曰敉敉安也者按洛誥云亦未克敉公功注云敉安也故知此彌讀曰敉敉安也大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠注隋尸之祭也奠奠爵也祭祀奠先徹後反言之者明所佐大祝非一疏釋曰云逆齍盛者祭宗廟饋獻後尸將入室食小祝於廟門外迎饎人之齍盛於廟堂東實之薦於神座前送逆尸者為始祭迎尸而入祭末送尸而出祭義云樂以迎來哀以送往是也云沃尸盥者尸尊不就洗按特牲少牢尸入廟門盥於盤其時小祝沃水云贊隋者按特牲少牢尸始入室拜妥尸尸隋祭以韭菹擩于醢以祭於豆間小祝其時贊尸以授之云贊徹者大祝云既祭命徹諸宰君婦徹時小祝贊之云贊奠者大祝酌酒奠于鉶南則郊特牲注天子奠斝諸侯奠角小祝其時贊之注釋曰主人受尸酢時亦有隋祭但此經贊隋文承逆尸沃尸之下故隋是尸之祭也云奠奠爵也者則特牲祝酌奠于鉶南是也云祭祀奠先徹後者奠爵在尸食前徹在尸謖後故云奠先徹後云反言之者經先言徹後言奠反言之者欲見所佐大祝非一故倒文以見義凡事佐大祝注唯大祝所有事疏注釋曰經云凡事諸有事皆佐大祝故鄭云唯大祝所有事乃佐之據大祝職不言之者或佐餘官或小祝專行之也若然佐大祝不在職末言之於此見文者欲見自此已上有佐大祝者自此已下唯大喪贊渳佐大祝設熬以下小祝專行大喪贊渳注故書弭為攝杜子春云當為渳渳謂浴尸設熬置銘注銘今書或作名鄭司農云銘書死者名於旌今謂之柩士喪禮曰為名各以其物亡則以緇長半幅赬末長終幅廣三寸書名于末曰某氏某之柩竹杠長三尺置于西階上重木置于中庭參分庭一在南粥餘飯盛以二鬲縣于重冪用葦席取名置于重杜子春云熬謂重也檀弓曰銘明旌也以死者為不可别識故以其旗識之愛之斯録之矣敬之斯盡其道焉爾重主道也殷主綴重焉周主徹重焉奠以素器以主人有哀素之心也玄謂熬者棺既蓋設於其旁所以惑蚍蜉也喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚臘焉士喪禮曰熬黍稷各二筐有魚臘饌于西坫南又曰設熬旁一筐乃塗音義熬五羔反為名音銘下取名同赬敕貞反杠音江重直龍反下同粥之六反又音育盛音成鬲音歷别彼列反識識並傷志反一讀下識如字盡津忍反蚍音毗蜉音浮種章勇反下同坫丁念反疏釋曰熬謂熬榖殯在堂時設於棺旁所以惑蚍蜉云置銘者銘謂銘旌書死者名既殯置於階西上所以表柩注釋曰銘今書或作名者非古書出見今周禮或作名以其銘書死者名亦得通一義故司農以名解之司農云銘書死者名於旌今謂之柩者銘所以表旌故漢時謂銘為柩士喪禮曰為銘各以其物者謂為銘旌用生時旌旗但沽而小按喪大記注王則大常諸侯則建旗孤卿建旜大夫士建物云亡則以緇長半幅者亡無也為生時無旌旗子男之士不命是也生時無旌旗故用緇長半幅長一尺云赬末長終幅廣三寸者依爾雅一入赤汁謂之縓再入謂之赬赬赤色繒也長終幅長二尺云書名于末者書死者名於赬末之上云曰某氏某之柩者某氏是姓下某是名此謂士禮按喪服小記云周天子諸侯大夫書銘並與士同云竹杠長三尺者依禮緯天子旌旗之杠九仞諸侯七仞大夫五仞士三仞今士三尺者則天子以下皆以尺易仞云置于西階上者始死即作銘倚于重殯訖置於西階上屋宇下云重木以下亦士喪禮文經雖不言重士喪禮有取銘置于重是以因銘兼解重言粥餘飯者飯米與沐米同按喪大記君沐梁大夫沐稷天子之士沐粱諸侯士沐稻天子當沐黍飯米之餘以為粥盛以二鬲按鄭注士喪禮鬲與簋同差天子八諸侯六大夫四士二云取銘置于重者謂未殯以前殯訖則置于西階上是也杜子春云熬謂重也者以士喪禮云取銘置於重與此經云設熬置銘亦謂設熬訖置銘於熬上事相當故以熬為重後鄭以熬與重所設不同故不從也引檀弓者子春既解熬為重遂引銘與重為證耳云銘明旌也者謂神明死者之旌故云明死者之銘云愛之斯録之矣敬之斯盡其道焉爾鄭彼注謂重與奠則斯録之據重斯盡其道據奠以是子春引證重則取愛之斯録之不取敬之斯盡其道連引之耳云重主道也者始死作重葬後乃有主是始死雖未有主其重則是木主之道故云重主道也云殷主綴重焉者鄭彼注云殷人作主而聯其重懸諸廟也去顯考乃埋之謂始死作重之時至葬後作木主乃綴連重之鬲懸於祖廟大祥遷廟乃埋重於廟門外之左故云殷主綴重焉云周主徹重焉者周人不綴重亦始死作重至葬朝廟重先柩從入祖廟朝廟訖明旦將葬重先出倚于道左葬後既虞埋於所倚之處故鄭注云周人作主徹重埋之云奠以素器以主人有哀素之心也者杜子春連引於經無所當玄謂熬者棺既蓋設於其旁者約士喪禮而知云所以惑蚍蜉也者無正文鄭君以意解之以其熬榖似蚍蜉蚍蜉見之不至棺旁故言惑云喪大記曰熬君四種八筐者黍稷稻粱各二筐云大夫三種六筐者黍稷粱各二筐云士二種四筐者黍稷各二筐云加魚臘焉者君大夫士同云士喪禮曰熬黍稷各二筐有魚臘饌于西坫南者堂西南隅謂之坫饌於此者據未用時加之蓋後設於棺旁云又曰設熬旁一筐乃塗者此皆所設之處言旁一筐則首足各一筐大夫亦旁各二筐首足各一筐君八筐左右各二筐首足亦各二筐鄭君引此者將以破子春為重及葬設道齎之奠分禱五祀注杜子春云齎當為粢道中祭也漢儀每街路輒祭玄謂齎猶送也送道之奠謂遣奠也分其牲體以祭五祀告王去此宫中不復反故興祭祀也王七祀祀五者司命大厲平生出入不以告音義齎音咨遣棄戰反疏釋曰齎送也送道之奠謂將葬於祖廟之庭設大遣奠遣送死者故謂之送道之奠因分此奠以告五祀言王去此宫中也注釋曰子春云讀齎為粢粢謂黍稷以為道中祭也者引漢法為證後鄭不從者按既夕禮祖廟之庭禮道中無祭法玄謂齎猶送也送道之奠謂遣奠也者按既夕禮祖廟之庭厥明設大遣奠包牲取下體是也云分其牲體以祭五祀告王去此宫中不復反者言分牲體者包牲而取其下體下體之外分之為五處祭也云王七祀者祭法文云司命大厲平生出入不以告者按月令春祀户夏祀竈季夏祀中霤秋則祀門冬則祀行此並是人之所由從之處非直四時合祭所以出入亦宜告之也按祭法王七祀之中有司命大厲此經五祀與月令同月令不祭司命及大厲之等則此不祭可知既夕士禮亦云分禱五祀者鄭注云博求之依祭法士二祀大師掌釁祈號祝注鄭司農云釁謂釁鼓也春秋傳曰君以軍行祓社釁鼓祝奉以從疏釋曰言掌釁者據大師之文而言則惟為以血釁鼓耳祈號也者將出軍禱祈之禮皆小祝號以讀祝辭蓋所以令將軍祈而請之也此皆小事故大師用小祝以讀祝耳注釋曰引春秋傳曰者定四年祝他辭引之者證軍師有釁鼓之事所引之辭者將以證軍師有必取威於天下欲使敵人畏之也所以必有征伐四方之事須用血以釁於鼓故有釁鼓之事有寇戎之事則保郊祀于社注故書祀或作祀鄭司農云謂保守郊祭諸祀及社無令寇侵犯之杜子春讀祀為祀書亦或為祀玄謂保祀互文郊社皆守而祀之彌災兵音義祀音祀令力呈反下令可同疏注釋曰先鄭云謂保守郊祭諸祀及社者先鄭之義經之祀謂祀神故云祭諸祀及社後鄭不從者以其經祀為諸祀祀與社文孤不見祭事故祀於社共為一事解之玄謂保祀互文者郊言保守亦祀社言祀亦保守故云郊社皆守而祀之云彌災兵者經言有寇戎之事則亦是災兵故引小祝彌災兵而解之凡外內小祭祀小喪紀小會同小軍旅掌事焉疏釋曰外內小祭祀者按小司徒小祭祀奉牛牲鄭注云小祭祀王玄冕所祭按司服羣小祀用玄冕鄭注云小祭祀謂林澤四方百物是外小祭祀也其內小祀謂宫中七祀之等小喪紀者王后以下之喪小會同謂諸侯遣臣來王使卿大夫與之行會同之禮小軍旅者王不自行遣卿大夫征伐掌事者此數事皆小祝專掌其事也周禮注疏卷二十五周禮注疏卷二十五考證占夢掌其歲時疏案春秋緯云當時者王生王者休監夲脫上句又脫生字今補正遂令始難毆疫毆石經作毆大祝掌六祈以同鬼神示四曰禜禜石經訛作榮又疏又曰乃立立監夲訛並故曰大師宜于社師監夲訛事今俱依爾雅注文改正辨六號注粱曰香其其曲禮作萁監夲訛箕今從釋文辨九祭注鄉飲酒禮曰右取肺郤左手郤左手監夲訛作左郤手今據禮文改正疏凡祭皆擩監夲脫凡祭二字今補入辨九􅉔一曰􅹎首􅹎字從釋文石經作稽疏襄三年公如晉監夲無上三字則不知為何年事且與上文哀十七年事相連混矣隋釁疏宗廟薦血以告殺薦監夲訛即今據注謂薦血也改正設熬置銘案喪大記注喪大記監夲訛作士喪禮今考所引注文正之周禮注疏卷二十五考證
